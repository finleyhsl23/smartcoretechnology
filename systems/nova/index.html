<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Nova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/systems/nova/nova.css"/>
</head>
<body>

<div class="nova-screen">

  <!-- Ambient background layers -->
  <div class="bg-base"></div>
  <div class="bg-glow" id="bgGlow"></div>

  <!-- Clock -->
  <div class="screen-clock" id="screenClock">00:00</div>

  <!-- Center orb -->
  <div class="orb-scene" id="orbScene">
    <div class="orb-rings">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
    </div>
    <div class="nova-orb" id="novaOrb">
      <div class="orb-inner">✦</div>
    </div>
    <div class="orb-waves" id="orbWaves">
      <svg viewBox="0 0 300 60" preserveAspectRatio="none">
        <path class="wave w1" d=""/>
        <path class="wave w2" d=""/>
        <path class="wave w3" d=""/>
      </svg>
    </div>
  </div>

  <!-- Status -->
  <div class="orb-status" id="orbStatus">Nova</div>

  <!-- Message display -->
  <div class="msg-display" id="msgDisplay"></div>

  <!-- Input bar -->
  <div class="input-bar" id="inputBar">
    <button class="ib-btn mic" id="micBtn" title="Voice">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <textarea id="novaTextarea" placeholder="Ask Nova…" rows="1" autocomplete="off" spellcheck="true"></textarea>
    <button class="ib-btn send" id="sendBtn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
    <button class="ib-btn mute" id="muteBtn" title="Mute">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>
  </div>

</div>

<!-- Voice transcript -->
<div class="voice-bar" id="voiceBar">
  <span id="transcriptText">Listening…</span>
</div>

<div id="toastwrap"></div>

<script type="module" src="/systems/nova/nova.js"></script>
</body>
</html>
