<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Nova — SmartCore AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/systems/nova/nova.css"/>
</head>
<body>

<!-- Animated background -->
<div class="bg">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>
</div>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-orb" id="brandOrb"></div>
    <span class="brand-name">NOVA</span>
    <span class="brand-dot">·</span>
    <span class="brand-sub">SmartCore AI</span>
  </div>
  <div class="topbar-right">
    <div class="status-pill" id="statusPill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusLabel">Ready</span>
    </div>
    <div class="topbar-clock" id="clock">00:00</div>
  </div>
</header>

<!-- Welcome screen -->
<main class="welcome" id="welcome">
  <div class="welcome-greeting" id="welcomeGreeting">
    <h1 id="greetingText">Good morning.</h1>
    <p id="greetingSubtitle">What can I help you with today?</p>
  </div>

  <div class="feature-tiles" id="featureTiles">
    <div class="tile" onclick="window._prompt('What\'s on my calendar today?')">
      <div class="tile-icon">📅</div>
      <div class="tile-label">Calendar</div>
      <div class="tile-desc">Events &amp; schedule</div>
    </div>
    <div class="tile" onclick="window._prompt('Show my tasks and to-dos')">
      <div class="tile-icon">✅</div>
      <div class="tile-label">Tasks</div>
      <div class="tile-desc">To-dos &amp; priorities</div>
    </div>
    <div class="tile" onclick="window._prompt('Give me my daily briefing')">
      <div class="tile-icon">✦</div>
      <div class="tile-label">Briefing</div>
      <div class="tile-desc">Daily overview</div>
    </div>
    <div class="tile" onclick="window._prompt('Draft an email for me')">
      <div class="tile-icon">✉️</div>
      <div class="tile-label">Email</div>
      <div class="tile-desc">Draft &amp; compose</div>
    </div>
  </div>
</main>

<!-- Chat area -->
<div class="chat-area" id="chatArea">
  <div class="chat-scroll" id="chatScroll"></div>
</div>

<!-- Cards panel (slides in from right when data comes back) -->
<aside class="cards-panel" id="cardsPanel"></aside>

<!-- Voice transcript bar -->
<div class="transcript-bar" id="transcriptBar">
  <span class="transcript-mic">🎙</span>
  <span id="transcriptText">Listening…</span>
</div>

<!-- Input -->
<div class="input-wrap">
  <div class="input-shell" id="inputShell">
    <button class="ctrl-btn mic-btn" id="micBtn" title="Voice input">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <textarea id="novaTextarea" placeholder="Ask Nova anything…" rows="1" autocomplete="off" spellcheck="true"></textarea>
    <button class="ctrl-btn mute-btn" id="muteBtn" title="Mute">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </button>
    <button class="ctrl-btn send-btn" id="sendBtn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
  <p class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</div>

<!-- Orb overlay when speaking -->
<div class="speak-overlay" id="speakOverlay">
  <div class="speak-orb" id="speakOrb">
    <div class="speak-orb-inner">✦</div>
    <div class="speak-rings">
      <div class="speak-ring"></div>
      <div class="speak-ring"></div>
      <div class="speak-ring"></div>
      <div class="speak-ring"></div>
    </div>
  </div>
  <div class="speak-waves">
    <div class="sw"></div><div class="sw"></div><div class="sw"></div>
    <div class="sw"></div><div class="sw"></div><div class="sw"></div>
    <div class="sw"></div><div class="sw"></div>
  </div>
</div>

<div id="toastwrap"></div>
<script type="module" src="/systems/nova/nova.js"></script>
</body>
</html>
