<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Nova — SmartCore AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07091a;
  --glass:   rgba(255,255,255,0.035);
  --glass2:  rgba(255,255,255,0.06);
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text:    rgba(255,255,255,0.88);
  --text2:   rgba(255,255,255,0.5);
  --text3:   rgba(255,255,255,0.22);
  --blue:    #2563ff;
  --blue2:   #60a5fa;
  --glow:    rgba(37,99,255,0.35);
  --cyan:    #06b6d4;
  --purple:  #8b5cf6;
  --green:   #10b981;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.bg-aurora {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 20%, rgba(37,99,255,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(139,92,246,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 60% 10%, rgba(6,182,212,0.07) 0%, transparent 50%),
    linear-gradient(160deg, #070916 0%, #09071e 50%, #06080f 100%);
  animation: aurora-shift 18s ease-in-out infinite alternate;
}

@keyframes aurora-shift {
  0%   { filter: hue-rotate(0deg) brightness(1); }
  50%  { filter: hue-rotate(20deg) brightness(1.05); }
  100% { filter: hue-rotate(-15deg) brightness(0.95); }
}

.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
}

.bg-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 40%, rgba(4,5,16,0.7) 100%);
}

.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,9,26,0.6);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-orb {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #1a3bcc, #2563ff, #60a5fa, #818cf8, #2563ff, #1a3bcc);
  box-shadow: 0 0 14px rgba(37,99,255,0.6);
  animation: orb-spin 8s linear infinite;
  position: relative;
}

.brand-orb::after {
  content: '\2736';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #fff;
  background: radial-gradient(circle, #0d1240 0%, #07091a 100%);
  border-radius: 50%;
  margin: 3px;
  animation: orb-spin 8s linear infinite reverse;
}

@keyframes orb-spin {
  to { filter: hue-rotate(360deg); }
}

.brand-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--text);
}

.brand-dot {
  color: var(--text3);
  font-size: 13px;
}

.brand-sub {
  font-size: 12px;
  font-weight: 300;
  color: var(--text3);
  letter-spacing: 0.04em;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 18px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--glass);
  border: 1px solid var(--border);
  font-size: 11px;
  font-weight: 400;
  color: var(--text2);
  letter-spacing: 0.04em;
  transition: border-color 0.3s;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 6px var(--blue);
  animation: dot-idle 3s ease-in-out infinite;
  transition: background 0.3s, box-shadow 0.3s;
}

@keyframes dot-idle {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

@keyframes dot-pulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.5); }
}

.status-pill.listening  { border-color: rgba(6,182,212,0.3); }
.status-pill.listening .status-dot { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: dot-pulse 0.5s ease-in-out infinite; }
.status-pill.thinking   { border-color: rgba(139,92,246,0.3); }
.status-pill.thinking  .status-dot { background: var(--purple); box-shadow: 0 0 8px var(--purple); animation: dot-pulse 0.3s ease-in-out infinite; }
.status-pill.speaking   { border-color: rgba(16,185,129,0.3); }
.status-pill.speaking  .status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); animation: dot-pulse 0.6s ease-in-out infinite; }

#statusLabel { transition: color 0.3s; }
.status-pill.listening #statusLabel { color: var(--cyan); }
.status-pill.thinking  #statusLabel { color: var(--purple); }
.status-pill.speaking  #statusLabel { color: var(--green); }

.topbar-clock {
  font-size: 13px;
  font-weight: 300;
  color: var(--text3);
  letter-spacing: 0.1em;
}

.welcome {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 40px 130px;
  gap: 48px;
  transition: opacity 0.5s, transform 0.5s;
}

.welcome.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-20px);
}

.welcome-greeting {
  text-align: center;
}

.welcome-greeting h1 {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 300;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--text);
  margin-bottom: 12px;
}

.welcome-greeting p {
  font-size: 16px;
  font-weight: 300;
  color: var(--text2);
  letter-spacing: 0.02em;
}

.feature-tiles {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 740px;
}

.tile {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px 24px;
  width: 160px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
  border-radius: 16px;
}

.tile:hover {
  background: var(--glass2);
  border-color: var(--border2);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.06);
}

.tile-icon  { font-size: 22px; margin-bottom: 12px; }
.tile-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.tile-desc  { font-size: 11px; font-weight: 300; color: var(--text3); }

.chat-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 100px;
  z-index: 10;
  display: none;
  overflow: hidden;
}

.chat-area.active { display: block; }

.chat-scroll {
  height: 100%;
  overflow-y: auto;
  padding: 32px 0 20px;
  scroll-behavior: smooth;
  display: flex;
  flex-direction: column;
}

.chat-scroll::-webkit-scrollbar { width: 4px; }
.chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.chat-inner {
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
  padding: 0 32px;
}

.msg {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  animation: msg-in 0.25s ease;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}

.msg.user { flex-direction: row-reverse; }
.msg.nova { flex-direction: row; }

.msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  margin-top: 4px;
}

.msg.user .msg-avatar {
  background: var(--glass2);
  border: 1px solid var(--border);
  color: var(--text2);
}

.msg.nova .msg-avatar {
  background: conic-gradient(from 0deg, #1a3bcc, #2563ff, #60a5fa, #2563ff);
  box-shadow: 0 0 12px rgba(37,99,255,0.5);
  color: #fff;
  font-size: 13px;
  animation: orb-spin 8s linear infinite;
}

.msg-body {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: calc(100% - 50px);
}

.msg-bubble {
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 300;
  line-height: 1.65;
  letter-spacing: 0.01em;
}

.msg.user .msg-bubble {
  background: rgba(37,99,255,0.18);
  border: 1px solid rgba(37,99,255,0.25);
  border-radius: 14px 14px 2px 14px;
  color: var(--text);
}

.msg.nova .msg-bubble {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 2px 14px 14px 14px;
  color: var(--text);
}

.msg-time {
  font-size: 10px;
  color: var(--text3);
  padding: 0 4px;
}

.msg.user .msg-time { text-align: right; }

.typing-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 20px;
}

.typing-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 12px 16px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 2px 14px 14px 14px;
}

.typing-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--blue2);
  animation: dot-bounce 1.2s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%            { transform: translateY(-6px); opacity: 1; }
}

.msg-cards {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card {
  background: rgba(10,12,28,0.7);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  animation: card-in 0.3s ease;
}

@keyframes card-in {
  from { opacity: 0; transform: translateX(12px); }
  to   { opacity: 1; transform: none; }
}

.card-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
}

.card-head-icon { font-size: 14px; }
.card-body { padding: 12px 14px; font-size: 12px; color: var(--text2); line-height: 1.6; }
.card-map iframe { width: 100%; height: 150px; border: none; display: block; }
.card-map-info { padding: 8px 14px; display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); }
.card-map-link { color: var(--blue2); text-decoration: none; }
.card-map-link:hover { text-decoration: underline; }

.event-row { display: flex; gap: 12px; margin-bottom: 10px; }
.event-time-block { width: 36px; flex-shrink: 0; }
.etime { font-size: 11px; font-weight: 500; color: var(--text); }
.edate { font-size: 10px; color: var(--text3); }
.event-title { font-size: 12px; font-weight: 400; color: var(--text); }
.event-meta  { font-size: 10px; color: var(--text3); margin-top: 2px; }

.task-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.task-check { width: 13px; height: 13px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; }
.task-check.done { background: var(--green); border-color: var(--green); }
.task-text { flex: 1; font-size: 12px; color: var(--text2); }
.task-text.done { text-decoration: line-through; color: var(--text3); }
.task-priority { font-size: 9px; padding: 1px 6px; border-radius: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
.prio-urgent { background: rgba(239,68,68,0.15);  color: #f87171; }
.prio-high   { background: rgba(245,158,11,0.15); color: #fbbf24; }
.prio-medium { background: rgba(37,99,255,0.15);  color: var(--blue2); }
.prio-low    { background: rgba(255,255,255,0.05); color: var(--text3); }
.task-due { font-size: 10px; color: var(--text3); }

.contact-item   { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
.contact-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(37,99,255,0.18); border: 1px solid rgba(37,99,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--blue2); flex-shrink: 0; }
.contact-name   { font-size: 12px; color: var(--text); }
.contact-detail { font-size: 10px; color: var(--text3); margin-top: 1px; }

.email-draft-header { display: grid; grid-template-columns: auto 1fr; gap: 3px 10px; margin-bottom: 10px; font-size: 11px; }
.email-draft-label  { color: var(--text3); }
.email-draft-body   { white-space: pre-line; font-size: 11px; color: var(--text2); line-height: 1.6; padding: 8px; background: var(--glass); border-radius: 6px; margin-bottom: 8px; }
.email-draft-actions { display: flex; gap: 6px; }
.card-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--text2); font-size: 10px; font-weight: 400; cursor: pointer; transition: all 0.15s; }
.card-btn:hover { background: var(--glass2); border-color: var(--border2); color: var(--text); }

.note-card-content { font-size: 11px; color: var(--text3); line-height: 1.6; }
.note-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.note-tag  { font-size: 9px; padding: 1px 6px; border-radius: 4px; background: rgba(37,99,255,0.12); color: var(--blue2); }

.reminder-item  { display: flex; gap: 10px; align-items: flex-start; }
.reminder-icon  { font-size: 16px; }
.reminder-title { font-size: 12px; color: var(--text); }
.reminder-time  { font-size: 10px; color: var(--text3); margin-top: 2px; }

.input-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 30;
  padding: 0 0 20px;
  background: linear-gradient(to top, rgba(7,9,26,0.95) 60%, transparent);
}

.input-shell {
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: rgba(12,15,36,0.85);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 10px 12px;
  -webkit-backdrop-filter: blur(24px);
  backdrop-filter: blur(24px);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-shell:focus-within {
  border-color: rgba(37,99,255,0.35);
  box-shadow: 0 0 0 3px rgba(37,99,255,0.07), 0 8px 32px rgba(0,0,0,0.3);
}

#novaTextarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 300;
  line-height: 1.55;
  resize: none;
  min-height: 22px;
  max-height: 120px;
  padding: 1px 4px;
  -webkit-user-select: text;
  user-select: text;
}

#novaTextarea::placeholder { color: var(--text3); }

.ctrl-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text3);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}

.ctrl-btn:hover { color: var(--text2); background: var(--glass2); }

.ctrl-btn.send-btn {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 0 14px rgba(37,99,255,0.4);
}

.ctrl-btn.send-btn:not(:disabled):hover {
  background: #1d4ed8;
  box-shadow: 0 0 20px rgba(37,99,255,0.6);
}

.ctrl-btn.send-btn:disabled {
  background: var(--glass);
  color: var(--text3);
  box-shadow: none;
  cursor: not-allowed;
}

.ctrl-btn.mic-btn.active { color: var(--cyan); background: rgba(6,182,212,0.1); }
.ctrl-btn.mute-btn.muted { color: #f87171; background: rgba(239,68,68,0.08); }
.ctrl-btn.conv-btn.active { color: #a78bfa; background: rgba(167,139,250,0.12); box-shadow: 0 0 0 1px rgba(167,139,250,0.3); }

/* ── Shopping list overlay ── */
.sl-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
.sl-overlay.active { display: flex; }
.sl-panel {
  background: rgba(15,20,35,0.96); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; width: min(480px, 92vw); max-height: 80vh;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}
.sl-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px; border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sl-title { font-size: 16px; font-weight: 600; color: #e2e8f0; }
.sl-close { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 18px; cursor: pointer; padding: 2px 6px; }
.sl-close:hover { color: #fff; }
.sl-items { list-style: none; overflow-y: auto; padding: 12px 0; flex: 1; }
.sl-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; cursor: pointer; transition: background 0.15s;
}
.sl-item:hover { background: rgba(255,255,255,0.04); }
.sl-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--cyan); cursor: pointer; flex-shrink: 0; }
.sl-item label { color: rgba(255,255,255,0.85); font-size: 15px; cursor: pointer; flex: 1; transition: opacity 0.2s, text-decoration 0.2s; }
.sl-item.checked label { text-decoration: line-through; opacity: 0.4; }
.sl-footer {
  padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; gap: 10px;
}
.sl-btn {
  flex: 1; padding: 9px 14px; border-radius: 10px; border: none;
  font-size: 13px; font-family: inherit; cursor: pointer; transition: opacity 0.2s;
}
.sl-btn:hover { opacity: 0.85; }
.sl-btn-email { background: rgba(6,182,212,0.15); color: var(--cyan); border: 1px solid rgba(6,182,212,0.3); }
.sl-btn-clear { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6); }
.sl-btn-send { background: var(--cyan); color: #000; font-weight: 600; flex: 0 0 auto; padding: 9px 18px; }
.sl-email-row { display: flex; gap: 10px; padding: 0 20px 14px; }
.sl-email-row.hidden { display: none; }
.sl-email-input {
  flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 9px 14px; color: #e2e8f0; font-size: 14px; font-family: inherit; outline: none;
}
.sl-email-input:focus { border-color: var(--cyan); }
.standby-open-btn {
  display: flex; align-items: center; gap: 8px;
  margin-top: 28px;
  padding: 10px 22px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  backdrop-filter: blur(8px);
}
.standby-open-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.22); }
.standby-open-btn.hidden { display: none; }

.input-hint {
  text-align: center;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.04em;
  margin-top: 8px;
  max-width: 680px;
  margin-left: auto;
  margin-right: auto;
  padding: 0 28px;
}

.speak-overlay {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  background: rgba(4,5,18,0.75);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}

.speak-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.speak-orb {
  width: 160px;
  height: 160px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.speak-orb-inner {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #047857, #10b981, #6ee7b7, #10b981, #047857);
  box-shadow: 0 0 60px rgba(16,185,129,0.5), 0 0 120px rgba(16,185,129,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: rgba(255,255,255,0.9);
  animation: orb-spin 4s linear infinite, speak-pulse 0.6s ease-in-out infinite;
  z-index: 2;
  position: relative;
}

@keyframes speak-pulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.08); }
}

.speak-rings {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.speak-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(16,185,129,0.4);
}

.speak-ring:nth-child(1) { animation: speak-ring 1.6s ease-out infinite 0s; }
.speak-ring:nth-child(2) { animation: speak-ring 1.6s ease-out infinite 0.4s; }
.speak-ring:nth-child(3) { animation: speak-ring 1.6s ease-out infinite 0.8s; }
.speak-ring:nth-child(4) { animation: speak-ring 1.6s ease-out infinite 1.2s; }

@keyframes speak-ring {
  0%   { transform: scale(0.85); opacity: 0.7; }
  100% { transform: scale(2.2);  opacity: 0; }
}

.speak-waves {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 48px;
}

.sw {
  width: 4px;
  border-radius: 4px;
  background: linear-gradient(to top, rgba(16,185,129,0.4), rgba(110,231,183,0.8));
  height: 6px;
  animation: wave-bar 0.7s ease-in-out infinite;
}

.sw:nth-child(1) { animation-delay: 0.00s; --bar-h: 14px; }
.sw:nth-child(2) { animation-delay: 0.07s; --bar-h: 28px; }
.sw:nth-child(3) { animation-delay: 0.14s; --bar-h: 40px; }
.sw:nth-child(4) { animation-delay: 0.21s; --bar-h: 48px; }
.sw:nth-child(5) { animation-delay: 0.28s; --bar-h: 36px; }
.sw:nth-child(6) { animation-delay: 0.35s; --bar-h: 48px; }
.sw:nth-child(7) { animation-delay: 0.42s; --bar-h: 28px; }
.sw:nth-child(8) { animation-delay: 0.49s; --bar-h: 14px; }

@keyframes wave-bar {
  0%, 100% { height: 6px; }
  50%       { height: var(--bar-h, 24px); }
}

.speak-caption {
  max-width: 640px;
  padding: 0 40px;
  text-align: center;
  font-size: 17px;
  font-weight: 300;
  line-height: 1.6;
  letter-spacing: 0.01em;
  color: rgba(255,255,255,0.9);
  min-height: 2.4em;
}

.speak-caption .word {
  display: inline;
  opacity: 0.25;
  transition: opacity 0.12s ease;
  margin-right: 0.25em;
}

.speak-caption .word.lit {
  opacity: 1;
}

.transcript-bar {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 35;
  background: rgba(6,182,212,0.08);
  border: 1px solid rgba(6,182,212,0.2);
  border-radius: 24px;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 300;
  color: rgba(103,232,249,0.9);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  white-space: nowrap;
  max-width: 80vw;
  overflow: hidden;
  text-overflow: ellipsis;
}

.transcript-bar.active { opacity: 1; }
.transcript-mic { font-size: 14px; }

#toastwrap {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}

.toast {
  padding: 8px 20px;
  border-radius: 24px;
  font-size: 12px;
  font-weight: 400;
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  animation: toast-in 0.2s ease;
  white-space: nowrap;
}

.toast.ok   { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
.toast.warn { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
.toast.bad  { background: rgba(239,68,68,0.12);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}

@media (max-width: 600px) {
  .welcome-greeting h1 { font-size: 26px; }
  .feature-tiles { gap: 10px; }
  .tile { width: 140px; padding: 16px 18px; }
  .input-shell { margin: 0 16px; }
  .topbar { padding: 0 16px; }
  .brand-sub { display: none; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>
</div>

<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-orb" id="brandOrb"></div>
    <span class="brand-name">NOVA</span>
    <span class="brand-dot">&middot;</span>
    <span class="brand-sub">SmartCore AI</span>
  </div>
  <div class="topbar-right">
    <div class="status-pill" id="statusPill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusLabel">Ready</span>
    </div>
    <div class="topbar-clock" id="clock">00:00</div>
  </div>
</header>

<main class="welcome" id="welcome">
  <div class="welcome-greeting" id="welcomeGreeting">
    <h1 id="greetingText">Good morning.</h1>
    <p id="greetingSubtitle">What can I help you with today?</p>
  </div>
  <button class="standby-open-btn hidden" id="standbyOpenBtn" onclick="window._openChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Continue Chat
  </button>

  <div class="feature-tiles" id="featureTiles">
    <div class="tile" onclick="window._prompt('What\'s on my calendar today?')">
      <div class="tile-icon">&#128197;</div>
      <div class="tile-label">Calendar</div>
      <div class="tile-desc">Events &amp; schedule</div>
    </div>
    <div class="tile" onclick="window._prompt('Show my tasks and to-dos')">
      <div class="tile-icon">&#9989;</div>
      <div class="tile-label">Tasks</div>
      <div class="tile-desc">To-dos &amp; priorities</div>
    </div>
    <div class="tile" onclick="window._prompt('Give me my daily briefing')">
      <div class="tile-icon">&#10022;</div>
      <div class="tile-label">Briefing</div>
      <div class="tile-desc">Daily overview</div>
    </div>
    <div class="tile" onclick="window._prompt('Draft an email for me')">
      <div class="tile-icon">&#9993;</div>
      <div class="tile-label">Email</div>
      <div class="tile-desc">Draft &amp; compose</div>
    </div>
  </div>
</main>

<div class="chat-area" id="chatArea">
  <div class="chat-scroll" id="chatScroll"></div>
</div>

<aside class="cards-panel" id="cardsPanel"></aside>

<div class="transcript-bar" id="transcriptBar">
  <span class="transcript-mic">&#127897;</span>
  <span id="transcriptText">Listening&hellip;</span>
</div>

<div class="input-wrap">
  <div class="input-shell" id="inputShell">
    <button class="ctrl-btn conv-btn" id="convBtn" title="Conversation mode">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <button class="ctrl-btn mic-btn" id="micBtn" title="Voice input">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <textarea id="novaTextarea" placeholder="Ask Nova anything&hellip;" rows="1" autocomplete="off" spellcheck="true"></textarea>
    <button class="ctrl-btn mute-btn" id="muteBtn" title="Mute">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </button>
    <button class="ctrl-btn send-btn" id="sendBtn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
  <p class="input-hint">Press Enter to send &nbsp;&middot;&nbsp; Shift+Enter for new line</p>
</div>

<div class="speak-overlay" id="speakOverlay">
  <div class="speak-orb" id="speakOrb">
    <div class="speak-orb-inner">&#10022;</div>
    <div class="speak-rings">
      <div class="speak-ring"></div>
      <div class="speak-ring"></div>
      <div class="speak-ring"></div>
      <div class="speak-ring"></div>
    </div>
  </div>
  <div class="speak-waves">
    <div class="sw"></div><div class="sw"></div><div class="sw"></div>
    <div class="sw"></div><div class="sw"></div><div class="sw"></div>
    <div class="sw"></div><div class="sw"></div>
  </div>
  <div class="speak-caption" id="speakCaption"></div>
</div>

<!-- Shopping list overlay -->
<div class="sl-overlay" id="slOverlay">
  <div class="sl-panel">
    <div class="sl-header">
      <span class="sl-title">&#128722; Shopping List</span>
      <button class="sl-close" onclick="window._closeShoppingList()">&#10005;</button>
    </div>
    <ul class="sl-items" id="slItems"></ul>
    <div class="sl-footer">
      <button class="sl-btn sl-btn-email" id="slEmailBtn" onclick="window._emailShoppingList()">
        &#9993; Email me this list
      </button>
      <button class="sl-btn sl-btn-clear" onclick="window._clearChecked()">
        Remove ticked
      </button>
    </div>
    <div class="sl-email-row hidden" id="slEmailRow">
      <input class="sl-email-input" id="slEmailInput" type="email" placeholder="Enter your email address…" />
      <button class="sl-btn sl-btn-send" onclick="window._sendShoppingEmail()">Send</button>
    </div>
  </div>
</div>

<div id="toastwrap"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/systems/nova/nova.js?v=66"></script>
</body>
</html>
