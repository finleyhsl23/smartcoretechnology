<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Nova — SmartCore AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/systems/nova/nova.css"/>
</head>
<body>

<div class="nova-shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <nav class="nova-sidebar" id="novaSidebar">

    <!-- Header / Orb -->
    <div class="nova-header">
      <div class="nova-orb-wrap">
        <div class="nova-orb" id="novaOrb"></div>
        <div class="nova-orb-rings" id="orbRings"></div>
      </div>
      <div class="nova-brand">
        <h1>NOVA</h1>
        <p>SmartCore AI Assistant</p>
      </div>
      <div class="nova-status-dot" id="statusDot"></div>
    </div>

    <!-- New chat -->
    <div class="sidebar-actions">
      <button class="btn-new-chat" id="newChatBtn">
        <span>✦</span> New Conversation
      </button>
    </div>

    <!-- History -->
    <div class="sidebar-history">
      <div class="history-label">Recent</div>
      <div id="historyList"></div>
    </div>

    <!-- Quick actions -->
    <div class="sidebar-quick">
      <div class="quick-label">Quick Actions</div>
      <div class="quick-grid" id="quickGrid"></div>
    </div>

    <!-- User footer -->
    <div class="sidebar-footer">
      <div class="sidebar-user-avatar" id="sidebarUserAvatar">U</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebarUserName">Loading…</div>
        <div class="sidebar-user-role" id="sidebarUserRole">Member</div>
      </div>
      <div class="sidebar-footer-btns">
        <button class="icon-btn" id="ttsBtn"    title="Toggle voice responses">🔊</button>
        <button class="icon-btn" id="themeBtn"  title="Toggle theme">☀️</button>
        <button class="icon-btn" id="logoutBtn" title="Sign out">⎋</button>
      </div>
    </div>

  </nav>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <div class="nova-main">

    <!-- Topbar -->
    <div class="nova-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-conv-title" id="topbarTitle">Nova</div>
      <div class="topbar-status" id="topbarStatus">
        <div class="nova-status-dot" id="statusDotTop"></div>
        <span id="statusLabel">Ready</span>
      </div>
      <div class="topbar-actions">
        <span class="topbar-badge">AI Assistant</span>
      </div>
    </div>

    <!-- Chat area -->
    <div class="nova-chat" id="novaChat"></div>

    <!-- Voice transcript -->
    <div class="voice-transcript" id="voiceTranscript">
      <div class="voice-transcript-inner">
        <span class="transcript-mic">🎙️</span>
        <span id="transcriptText">Listening…</span>
      </div>
    </div>

    <!-- Input area -->
    <div class="nova-input-wrap">
      <div class="nova-input-inner">
        <div class="nova-input-row">
          <button class="input-btn mic-btn"  id="micBtn"  title="Voice input (click to speak)">🎙️</button>
          <button class="input-btn mute-btn" id="muteBtn" title="Mute voice responses">🔊</button>
          <textarea
            class="nova-textarea"
            id="novaTextarea"
            placeholder="Ask Nova anything… or press 🎙️ to speak"
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button class="input-btn send-btn" id="sendBtn" title="Send" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="input-hint">Nova can make mistakes — always verify important details &nbsp;·&nbsp; Press Enter to send, Shift+Enter for new line</div>
      </div>
    </div>

  </div>
</div>

<!-- Toast wrapper -->
<div id="toastwrap"></div>

<script type="module" src="/systems/nova/nova.js"></script>
</body>
</html>
