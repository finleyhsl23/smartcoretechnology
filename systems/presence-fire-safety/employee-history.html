<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Employee History — SmartCore Presence &amp; Fire Safety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/systems/presence-fire-safety/shared/presence-fire-safety.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="pfs-shell">
  <nav class="pfs-sidebar" id="pfsNav" aria-label="Main navigation"></nav>
  <div id="sidebarOverlay"></div>

  <div class="pfs-main">
    <div class="pfs-topbar">
      <button class="hamburger icon-btn" id="hamburger" aria-label="Open menu"><i data-lucide="menu"></i></button>
      <h1>Employee History</h1>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme"><i data-lucide="moon"></i></button>
      <button class="icon-btn" id="logoutBtn" aria-label="Sign out" title="Sign out"><i data-lucide="log-out"></i></button>
    </div>

    <div class="pfs-content" id="content">
      <div id="offlineArea"></div>
      <div id="pageBody"></div>
    </div>
  </div>
</div>
<div id="toastwrap" aria-live="polite"></div>

<style>
  .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
  .hist-picker { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom: 20px; }
  .hist-search-combo { position:relative; min-width: 280px; flex:1; }
  .hist-search-results { position:absolute; top:100%; left:0; right:0; background: var(--bg2); border: 1px solid var(--line); border-radius: 10px; margin-top: 4px; max-height: 240px; overflow-y:auto; z-index: 10; }
  .hist-search-result { padding: 10px 14px; font-size: 13.5px; cursor: pointer; }
  .hist-search-result:hover { background: var(--card2); }
  .hist-field { display:flex; flex-direction:column; gap:6px; }
</style>

<script type="module">
  import { requirePresenceModuleAccess, hasPermission } from "/systems/presence-fire-safety/shared/auth.js";
  import { employees, presence } from "/systems/presence-fire-safety/shared/api.js";
  import { renderNav, initMobileNav, initTopbar } from "/systems/presence-fire-safety/shared/nav.js";
  import { initTheme } from "/systems/presence-fire-safety/shared/theme.js";
  import { enforceKioskGuard, initKioskToggle } from "/systems/presence-fire-safety/shared/kiosk.js";
  import {
    esc, toast, fmtDateTime,
    loadingState, emptyState, errorState, permissionDeniedState, moduleDisabledState,
    offlineBanner, setInner, refreshIcons,
  } from "/systems/presence-fire-safety/shared/ui.js";

  initTheme();

  let _profile = null, _companyId = null, _selectedEmployee = null, _searchTimer = null;

  try {
    const { profile } = await requirePresenceModuleAccess();
    if (enforceKioskGuard("reports")) throw new Error("__kiosk_redirect__");
    _profile = profile;
    _companyId = profile.company_id;

    renderNav("reports", profile);
    initMobileNav();
    initTopbar();
    initKioskToggle({ companyId: _companyId, currentPage: "reports" });
    wireOfflineBanner();

    if (!hasPermission("presence.view_live_register")) {
      setInner("pageBody", permissionDeniedState("You don't have permission to view other employees' presence history."));
    } else {
      renderShell();
    }
  } catch (e) {
    if (e.message !== "__kiosk_redirect__") renderAccessBlocked(e);
  }

  function renderShell() {
    setInner("pageBody", `
      <div class="card" style="margin-bottom:20px">
        <div class="hist-picker">
          <div class="hist-search-combo">
            <label class="form-label" for="empSearch">Employee</label>
            <input type="text" id="empSearch" class="form-input" placeholder="Search by name or employee ID…" autocomplete="off"/>
            <div class="hist-search-results" id="empResults" hidden></div>
          </div>
          <label class="hist-field">
            <span class="form-label">Rows</span>
            <select id="limitSelect" class="form-input">
              <option value="50">Last 50</option>
              <option value="100">Last 100</option>
              <option value="250">Last 250</option>
            </select>
          </label>
        </div>
      </div>
      <div id="historyResults"></div>
    `);

    const searchInput = document.getElementById("empSearch");
    const resultsBox = document.getElementById("empResults");
    searchInput.addEventListener("input", () => {
      clearTimeout(_searchTimer);
      const q = searchInput.value.trim();
      if (!q) { resultsBox.hidden = true; return; }
      _searchTimer = setTimeout(async () => {
        try {
          const results = await employees.search(_companyId, q, { limit: 8 });
          resultsBox.innerHTML = results.length
            ? results.map(r => `<div class="hist-search-result" data-emp-id="${esc(r.id)}" data-emp-name="${esc(r.full_name)}">${esc(r.full_name)}${r.employee_id ? ` <span class="text-muted">(${esc(r.employee_id)})</span>` : ""}</div>`).join("")
            : `<div class="hist-search-result text-muted">No employees found</div>`;
          resultsBox.hidden = false;
          resultsBox.querySelectorAll("[data-emp-id]").forEach(el => {
            el.addEventListener("click", () => {
              _selectedEmployee = { id: el.dataset.empId, name: el.dataset.empName };
              searchInput.value = el.dataset.empName;
              resultsBox.hidden = true;
              loadHistory();
            });
          });
        } catch (e) {
          resultsBox.innerHTML = `<div class="hist-search-result text-muted">${esc(e.message)}</div>`;
          resultsBox.hidden = false;
        }
      }, 250);
    });
    document.addEventListener("click", e => {
      if (!e.target.closest(".hist-search-combo")) resultsBox.hidden = true;
    });
    document.getElementById("limitSelect").addEventListener("change", () => { if (_selectedEmployee) loadHistory(); });

    setInner("historyResults", emptyState({ icon: "search", title: "Pick an employee", message: "Search for an employee above to see their sign-in/out history." }));
  }

  async function loadHistory() {
    if (!_selectedEmployee) return;
    setInner("historyResults", loadingState("Loading history…"));
    const limit = parseInt(document.getElementById("limitSelect").value, 10);
    try {
      const rows = await presence.myHistory(_selectedEmployee.id, { limit });
      renderHistory(rows);
    } catch (e) {
      setInner("historyResults", errorState({ title: "Couldn't load history", message: e.message, retryId: "histRetry" }));
      document.getElementById("histRetry")?.addEventListener("click", loadHistory);
    }
  }

  function renderHistory(rows) {
    setInner("historyResults", `
      <div class="card" style="margin-bottom:12px">
        <strong>${esc(_selectedEmployee.name)}</strong>
        <p class="text-muted" style="margin:4px 0 0">${rows.length} event${rows.length === 1 ? "" : "s"}</p>
      </div>
      ${rows.length === 0 ? emptyState({ icon: "clock", title: "No history yet", message: "No sign-in/out events recorded for this employee." }) : `
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Direction</th><th>Method</th><th>Site</th><th>Occurred At</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td><span class="badge ${r.direction === "in" ? "badge-green" : "badge-red"}">${r.direction === "in" ? "Signed in" : "Signed out"}</span></td>
                <td>${esc(r.method)}</td>
                <td>${esc(r.sites?.name || "—")}</td>
                <td>${esc(fmtDateTime(r.occurred_at))}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`}
    `);
  }

  function renderAccessBlocked(e) {
    const msg = e?.message || "";
    document.body.innerHTML = `
      <div class="pfs-shell">
        <div class="pfs-main" style="width:100%">
          <div class="pfs-topbar">
            <h1>Employee History</h1>
            <button class="icon-btn" id="themeToggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
            <button class="icon-btn" id="logoutBtn" aria-label="Sign out"><i data-lucide="log-out"></i></button>
          </div>
          <div class="pfs-content" id="content"></div>
        </div>
      </div>
      <div id="toastwrap" aria-live="polite"></div>`;
    initTheme();
    initTopbar();

    let html;
    if (msg.includes("not enabled")) html = moduleDisabledState();
    else if (msg.includes("permission") || msg.includes("No access")) html = permissionDeniedState(msg);
    else if (msg.includes("profile") || msg.includes("session")) html = permissionDeniedState(msg || "Your account isn't set up for this module yet.");
    else html = errorState({ title: "Couldn't load Employee History", message: msg, retryId: "blockedRetry" });

    setInner("content", html);
    document.getElementById("blockedRetry")?.addEventListener("click", () => window.location.reload());
  }

  function wireOfflineBanner() {
    const render = () => setInner("offlineArea", navigator.onLine ? "" : offlineBanner());
    render();
    window.addEventListener("online", render);
    window.addEventListener("offline", render);
  }
</script>
</body>
</html>
