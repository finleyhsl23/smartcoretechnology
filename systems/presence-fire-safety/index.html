<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard — SmartCore Presence &amp; Fire Safety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/systems/presence-fire-safety/shared/presence-fire-safety.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="pfs-shell">
  <nav class="pfs-sidebar" id="pfsNav" aria-label="Main navigation"></nav>
  <div id="sidebarOverlay"></div>

  <div class="pfs-main">
    <div class="pfs-topbar">
      <button class="hamburger icon-btn" id="hamburger" aria-label="Open menu"><i data-lucide="menu"></i></button>
      <h1>Dashboard</h1>
      <label class="sr-only" for="siteSwitcher">Site</label>
      <select id="siteSwitcher" aria-label="Select site"></select>
      <button class="icon-btn" id="refreshBtn" aria-label="Refresh dashboard" title="Refresh"><i data-lucide="refresh-cw"></i></button>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme"><i data-lucide="moon"></i></button>
      <button class="icon-btn" id="logoutBtn" aria-label="Sign out" title="Sign out"><i data-lucide="log-out"></i></button>
    </div>

    <div class="pfs-content" id="content">
      <div id="offlineArea"></div>
      <div id="dashboardBody"></div>
    </div>
  </div>
</div>
<div id="toastwrap" aria-live="polite"></div>

<style>
  .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
  .pfs-page-head { margin-bottom: 18px; }
  .pfs-page-head h2 { margin: 0 0 4px; font-size: 22px; }
  .pfs-page-head p { margin: 0; color: var(--text2); font-size: 13.5px; }
  .pfs-evac-banner { display:flex; align-items:center; gap:12px; background: rgba(239,68,68,.14); border: 1px solid rgba(239,68,68,.35); color: var(--bad); padding: 14px 18px; border-radius: 14px; margin-bottom: 18px; font-weight: 700; }
  .pfs-evac-banner a { color: var(--bad); text-decoration: underline; margin-left: auto; white-space: nowrap; }
  .pfs-emergency-card { display:flex; align-items:center; gap:16px; background: linear-gradient(135deg, rgba(239,68,68,.14), rgba(239,68,68,.04)); border: 1px solid rgba(239,68,68,.3); border-radius: 16px; padding: 20px 22px; margin-bottom: 20px; text-decoration:none; color: var(--text); }
  .pfs-emergency-card:hover { border-color: var(--bad); }
  .pfs-emergency-card .pfs-emergency-icon { width: 52px; height: 52px; border-radius: 14px; background: rgba(239,68,68,.18); color: var(--bad); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .pfs-emergency-icon i { width: 26px; height: 26px; }
  .pfs-emergency-card h3 { margin: 0 0 4px; font-size: 16px; color: var(--bad); }
  .pfs-emergency-card p { margin: 0; color: var(--text2); font-size: 13px; }
  .pfs-emergency-card .btn { margin-left: auto; flex-shrink: 0; }
  .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .quick-action { display:flex; flex-direction:column; align-items:flex-start; gap:10px; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; text-decoration:none; color: var(--text); font-weight: 700; font-size: 13.5px; }
  .quick-action:hover { border-color: var(--accent); }
  .quick-action i { width: 22px; height: 22px; color: var(--accent2); }
  .card-header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; gap: 10px; }
  .card-header-row h2 { margin:0; font-size: 15px; }
  .activity-list { display:flex; flex-direction:column; }
  .activity-row { display:flex; align-items:center; gap:12px; padding: 11px 0; border-bottom: 1px solid var(--line2); }
  .activity-row:last-child { border-bottom: none; }
  .activity-name { font-weight: 700; font-size: 13.5px; }
  .activity-meta { font-size: 12px; color: var(--text3); }
  .activity-time { margin-left: auto; font-size: 12px; color: var(--text3); white-space: nowrap; }
</style>

<script type="module">
  import { requirePresenceModuleAccess, hasPermission, getSelectedSiteId, setSelectedSiteId, ensureSiteSelected } from "/systems/presence-fire-safety/shared/auth.js";
  import { sites, presence, evacuation } from "/systems/presence-fire-safety/shared/api.js";
  import { renderNav, initMobileNav, initTopbar, renderSiteSwitcher } from "/systems/presence-fire-safety/shared/nav.js";
  import { initTheme } from "/systems/presence-fire-safety/shared/theme.js";
  import { enforceKioskGuard, initKioskToggle } from "/systems/presence-fire-safety/shared/kiosk.js";
  import {
    esc, timeAgo, initials,
    loadingState, emptyState, errorState, permissionDeniedState, moduleDisabledState,
    offlineBanner, staleBadge, setInner,
  } from "/systems/presence-fire-safety/shared/ui.js";

  initTheme();

  let _profile = null;
  let _companyId = null;
  let _loadToken = 0;
  let _lastRefreshed = null;

  try {
    const { profile } = await requirePresenceModuleAccess();
    if (enforceKioskGuard("dashboard")) throw new Error("__kiosk_redirect__");
    _profile = profile;
    _companyId = profile.company_id;

    renderNav("dashboard", profile);
    initMobileNav();
    initTopbar();
    initKioskToggle({ companyId: _companyId, currentPage: "dashboard" });
    wireOfflineBanner();

    const siteList = await sites.list(_companyId);
    const selectedSiteId = await ensureSiteSelected(_companyId);
    renderSiteSwitcher(document.getElementById("siteSwitcher"), siteList, selectedSiteId, async (newSiteId) => {
      setSelectedSiteId(newSiteId);
      await loadDashboard(newSiteId);
    });

    document.getElementById("refreshBtn").addEventListener("click", () => loadDashboard(getSelectedSiteId()));

    await loadDashboard(selectedSiteId);
  } catch (e) {
    if (e.message !== "__kiosk_redirect__") renderAccessBlocked(e);
  }

  async function loadDashboard(siteId) {
    const token = ++_loadToken;
    setInner("dashboardBody", loadingState("Loading dashboard…"));

    try {
      const [liveRows, recent, activeEvac] = await Promise.all([
        siteId ? presence.liveRegister(_companyId, siteId) : Promise.resolve([]),
        siteId ? presence.recentEvents(_companyId, siteId, 10) : Promise.resolve([]),
        hasPermission("presence.view_live_register") && siteId
          ? evacuation.activeSession(_companyId, siteId).catch(() => null)
          : Promise.resolve(null),
      ]);
      if (token !== _loadToken) return; // a newer site switch superseded this load

      _lastRefreshed = new Date();
      renderDashboard({ liveRows, recent, activeEvac, siteId });
    } catch (e) {
      if (token !== _loadToken) return;
      setInner("dashboardBody", errorState({
        title: "Couldn't load the dashboard",
        message: e.message || "Something went wrong fetching live data.",
        retryId: "dashRetry",
      }));
      document.getElementById("dashRetry")?.addEventListener("click", () => loadDashboard(siteId));
    }
  }

  function renderDashboard({ liveRows, recent, activeEvac, siteId }) {
    const counts = { employee: 0, visitor: 0, contractor: 0 };
    for (const r of liveRows) counts[r.subject_type] = (counts[r.subject_type] || 0) + 1;
    const total = liveRows.length;

    const firstName = (_profile.full_name || "").split(" ")[0] || "there";

    const quickActions = [
      { permission: "presence.sign_self_in_out", href: "employee-signin.html", icon: "id-card", label: "Employee Sign In/Out" },
      { permission: "presence.manage_visitors", href: "visitors.html", icon: "user-round", label: "Visitors" },
      { permission: "presence.manage_contractors", href: "contractors.html", icon: "hard-hat", label: "Contractors" },
      { permission: "presence.view_live_register", href: "live-register.html", icon: "users", label: "Live Register" },
    ].filter(a => hasPermission(a.permission));

    const html = `
      ${!siteId ? emptyState({ icon: "map-pin", title: "No site configured", message: "Ask an administrator to set up a site for your company before using this module." }) : `
      <div class="pfs-page-head">
        <h2>Welcome back, ${esc(firstName)}</h2>
        <p>Here's what's happening onsite right now. ${staleBadge(_lastRefreshed)}</p>
      </div>

      ${activeEvac ? `
        <div class="pfs-evac-banner" role="alert">
          <i data-lucide="flame"></i>
          <span>An evacuation is currently in progress at this site.</span>
          <a href="evacuation.html">Go to roll call →</a>
        </div>` : ""}

      <a class="pfs-emergency-card" href="evacuation.html">
        <div class="pfs-emergency-icon"><i data-lucide="flame"></i></div>
        <div>
          <h3>Emergency Evacuation</h3>
          <p>Start an evacuation, unlock doors, and run the roll call.</p>
        </div>
        <span class="btn btn-danger">Open →</span>
      </a>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-value">${total}</div>
          <div class="stat-label">Total Onsite</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${counts.employee}</div>
          <div class="stat-label">Employees Onsite</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${counts.visitor}</div>
          <div class="stat-label">Visitors Onsite</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${counts.contractor}</div>
          <div class="stat-label">Contractors Onsite</div>
        </div>
      </div>

      ${quickActions.length ? `
      <div class="quick-actions">
        ${quickActions.map(a => `
          <a class="quick-action" href="${esc(a.href)}">
            <i data-lucide="${esc(a.icon)}"></i>
            <span>${esc(a.label)}</span>
          </a>`).join("")}
      </div>` : ""}

      <div class="card">
        <div class="card-header-row">
          <h2>Recent Activity</h2>
        </div>
        ${recent.length === 0
          ? emptyState({ icon: "activity", title: "No activity yet", message: "Sign-in and sign-out events will appear here." })
          : `<div class="activity-list">${recent.map(activityRow).join("")}</div>`}
      </div>`}
    `;

    setInner("dashboardBody", html);
  }

  function activityRow(ev) {
    const label = eventSubjectLabel(ev);
    const typeBadge = { employee: "badge-blue", visitor: "badge-yellow", contractor: "badge-grey" }[ev.subject_type] || "badge-grey";
    const dirBadge = ev.direction === "in" ? "badge-green" : "badge-red";
    return `
      <div class="activity-row">
        <div class="avatar avatar-sm">${esc(initials(label))}</div>
        <div>
          <div class="activity-name">${esc(label)}</div>
          <div class="activity-meta">
            <span class="badge ${typeBadge}">${esc(ev.subject_type)}</span>
            <span class="badge ${dirBadge}">${ev.direction === "in" ? "Signed in" : "Signed out"}</span>
            <span>${esc(ev.method)}</span>
          </div>
        </div>
        <div class="activity-time">${esc(timeAgo(ev.occurred_at))}</div>
      </div>`;
  }

  function eventSubjectLabel(ev) {
    if (ev.subject_type === "employee") return ev.core_employees?.full_name || "Employee";
    if (ev.subject_type === "visitor") {
      const v = ev.presence_fire_safety_visitor_visits?.presence_fire_safety_visitors;
      return v ? `${v.first_name} ${v.last_name}` : "Visitor";
    }
    if (ev.subject_type === "contractor") {
      const c = ev.presence_fire_safety_contractor_visits?.presence_fire_safety_contractors;
      return c ? c.business_name : "Contractor";
    }
    return "Unknown";
  }

  // ── Access-blocked rendering ────────────────────────────────────────────
  // requirePresenceModuleAccess() already swaps in a minimal, working
  // full-screen fallback (with a functioning Sign Out button) the moment it
  // detects a problem, then re-throws so the caller can react. We rebuild our
  // own themed shell here so the block state matches the rest of the module
  // (Lucide icons, light/dark tokens) rather than the generic hard-coded
  // fallback — the user is never left without a way to sign out either way.
  function renderAccessBlocked(e) {
    const msg = e?.message || "";
    document.body.innerHTML = `
      <div class="pfs-shell">
        <div class="pfs-main" style="width:100%">
          <div class="pfs-topbar">
            <h1>Presence &amp; Fire Safety</h1>
            <button class="icon-btn" id="themeToggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
            <button class="icon-btn" id="logoutBtn" aria-label="Sign out"><i data-lucide="log-out"></i></button>
          </div>
          <div class="pfs-content" id="content"></div>
        </div>
      </div>
      <div id="toastwrap" aria-live="polite"></div>`;
    initTheme();
    initTopbar();

    let html;
    if (msg.includes("not enabled")) html = moduleDisabledState();
    else if (msg.includes("permission") || msg.includes("No access")) html = permissionDeniedState(msg);
    else if (msg.includes("profile") || msg.includes("session")) html = permissionDeniedState(msg || "Your account isn't set up for this module yet.");
    else html = errorState({ title: "Couldn't load Presence & Fire Safety", message: msg, retryId: "blockedRetry" });

    setInner("content", html);
    document.getElementById("blockedRetry")?.addEventListener("click", () => window.location.reload());
  }

  function wireOfflineBanner() {
    const render = () => setInner("offlineArea", navigator.onLine ? "" : offlineBanner());
    render();
    window.addEventListener("online", render);
    window.addEventListener("offline", render);
  }
</script>
</body>
</html>
