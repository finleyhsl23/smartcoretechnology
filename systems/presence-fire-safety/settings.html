<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Settings — SmartCore Presence &amp; Fire Safety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/systems/presence-fire-safety/shared/presence-fire-safety.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="pfs-shell">
  <nav class="pfs-sidebar" id="pfsNav" aria-label="Main navigation"></nav>
  <div id="sidebarOverlay"></div>

  <div class="pfs-main">
    <div class="pfs-topbar">
      <button class="hamburger icon-btn" id="hamburger" aria-label="Open menu"><i data-lucide="menu"></i></button>
      <h1>Settings</h1>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme"><i data-lucide="moon"></i></button>
      <button class="icon-btn" id="logoutBtn" aria-label="Sign out" title="Sign out"><i data-lucide="log-out"></i></button>
    </div>

    <div class="pfs-content" id="content">
      <div id="offlineArea"></div>
      <div id="settingsBody"></div>
    </div>
  </div>
</div>
<div id="toastwrap" aria-live="polite"></div>

<style>
  .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
  .set-tabs { display:flex; gap:6px; border-bottom: 1px solid var(--line); margin-bottom: 20px; flex-wrap: wrap; }
  .set-tab { background:none; border:none; padding: 10px 16px; font-size: 13.5px; font-weight: 700; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .set-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
  .set-tabpanel { display:none; }
  .set-tabpanel.active { display:block; }
  .set-field-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin-bottom: 20px; }
  .set-field { display:flex; flex-direction:column; }
  .set-checkbox-field { display:flex; align-items:center; gap: 10px; padding: 10px 0; }
  .set-checkbox-field input { width: 18px; height: 18px; }
  .set-section-title { font-size: 15px; margin: 0 0 4px; }
  .set-section-desc { color: var(--text2); font-size: 13px; margin: 0 0 16px; }
  .set-pin-row { display:flex; align-items:center; gap: 14px; padding: 14px; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 20px; }
  .set-pin-row i { color: var(--warn); width: 22px; height: 22px; }
  .set-pin-row > div { flex:1; }
  .set-actions-bar { display:flex; justify-content:flex-end; gap:10px; margin-top: 8px; }
  .set-search-combo { position:relative; }
  .set-search-results { position:absolute; top:100%; left:0; right:0; background: var(--bg2); border: 1px solid var(--line); border-radius: 10px; margin-top: 4px; max-height: 240px; overflow-y:auto; z-index: 10; }
  .set-search-result { padding: 10px 14px; font-size: 13.5px; cursor: pointer; }
  .set-search-result:hover, .set-search-result.active { background: var(--card2); }
  .set-selected-chip { display:inline-flex; align-items:center; gap:8px; background: var(--card2); border: 1px solid var(--line); border-radius: 99px; padding: 6px 12px; font-size: 13px; margin-top: 8px; }
  .set-selected-chip button { background:none; border:none; color: var(--text3); }
  .set-token { font-family: ui-monospace, monospace; font-size: 12px; }
  .set-card-header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom: 16px; gap: 10px; flex-wrap: wrap; }
  .set-reveal-secret { font-family: ui-monospace, monospace; font-size: 14px; background: var(--card2); border: 1px solid var(--line); border-radius: 10px; padding: 12px; word-break: break-all; margin: 12px 0; }

  .idc-layout { display:grid; grid-template-columns: 1fr 320px; gap: 24px; align-items:start; }
  .idc-steps { display:flex; flex-wrap:wrap; gap:6px; }
  .idc-step { background: var(--card2); border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:12.5px; font-weight:700; color:var(--text2); }
  .idc-step.active { background: var(--accent); color:#fff; border-color:var(--accent); }
  .idc-preview { position: sticky; top: 20px; }
  .idc-preview-label { font-size:12px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
  .idc-preview-card { width:100%; }
  .idc-toggle-group { display:flex; gap:8px; }
  .idc-toggle-btn { flex:1; padding:9px 12px; border-radius:10px; border:1px solid var(--line); background:var(--card2); color:var(--text2); font-weight:700; font-size:13px; }
  .idc-toggle-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .idc-color-input { width:100%; height:40px; border-radius:8px; border:1px solid var(--line); background:var(--card2); padding:4px; cursor:pointer; }
  .idc-subhead { font-size:13px; margin: 18px 0 10px; color:var(--text2); }
  .idc-logo-row { display:flex; gap:16px; align-items:flex-start; }
  .idc-logo-preview { width:72px; height:72px; border-radius:10px; border:1px solid var(--line); object-fit:contain; background:var(--card2); }
  .idc-logo-placeholder { display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text3); text-align:center; }
  .idc-field-row { display:grid; grid-template-columns: 1fr 44px 100px; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); }
  @media (max-width: 900px) { .idc-layout { grid-template-columns: 1fr; } .idc-preview { position:static; } }
</style>

<script type="module">
  import { requirePresenceModuleAccess, hasPermission } from "/systems/presence-fire-safety/shared/auth.js";
  import { sites, settings, devices } from "/systems/presence-fire-safety/shared/api.js";
  import { renderNav, initMobileNav, initTopbar } from "/systems/presence-fire-safety/shared/nav.js";
  import { initTheme } from "/systems/presence-fire-safety/shared/theme.js";
  import { enforceKioskGuard, initKioskToggle } from "/systems/presence-fire-safety/shared/kiosk.js";
  import { initSoundFromSettings, setSoundEnabled } from "/systems/presence-fire-safety/shared/sound.js";
  import { enhanceSelect } from "/systems/presence-fire-safety/shared/combobox.js";
  import { renderIdCardFront, renderIdCardBack, generateQrDataUrl } from "/systems/presence-fire-safety/shared/id-card-render.js";
  import {
    esc, toast, fmtDateTime, timeAgo, confirmDialog, modal,
    loadingState, emptyState, errorState, permissionDeniedState, moduleDisabledState,
    offlineBanner, setInner, refreshIcons,
  } from "/systems/presence-fire-safety/shared/ui.js";

  initTheme();

  let _profile = null, _companyId = null, _siteList = [];
  let _activeTab = "module";
  // Unsaved-changes tracking — Module Settings tab only (Site/Badge/Device
  // panels each save immediately per-action via their own modals).
  let _settingsDirty = false;

  // ── Shell / tabs ─────────────────────────────────────────────────────────
  function renderShell() {
    setInner("settingsBody", `
      <div class="set-tabs" role="tablist" aria-label="Settings sections">
        <button class="set-tab" role="tab" data-tab="module" type="button">Module Settings</button>
        <button class="set-tab" role="tab" data-tab="sites" type="button">Site Settings</button>
        ${hasPermission("presence.manage_badges") ? `<button class="set-tab" role="tab" data-tab="badges" type="button">ID Cards</button>` : ""}
        <button class="set-tab" role="tab" data-tab="devices" type="button">Devices</button>
      </div>
      <div class="set-tabpanel" id="panel-module" role="tabpanel"></div>
      <div class="set-tabpanel" id="panel-sites" role="tabpanel"></div>
      <div class="set-tabpanel" id="panel-badges" role="tabpanel"></div>
      <div class="set-tabpanel" id="panel-devices" role="tabpanel"></div>
    `);
    document.querySelectorAll(".set-tab").forEach(btn => btn.addEventListener("click", () => {
      const target = btn.dataset.tab;
      if (_activeTab === "module" && _settingsDirty && target !== "module") {
        confirmUnsavedChanges(() => switchTab(target));
      } else {
        switchTab(target);
      }
    }));
    switchTab("module");
  }

  function switchTab(tab) {
    _activeTab = tab;
    document.querySelectorAll(".set-tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    document.querySelectorAll(".set-tabpanel").forEach(p => p.classList.toggle("active", p.id === `panel-${tab}`));
    if (tab === "module") loadModuleSettings();
    else if (tab === "sites") loadSiteSettings();
    else if (tab === "badges") loadIdCardTemplate();
    else if (tab === "devices") loadDevices();
  }

  // ── Module settings ──────────────────────────────────────────────────────
  const DEFAULT_SETTINGS = {
    default_sign_in_method: "manual",
    allow_manual_employee_lookup: true,
    allow_employee_code_lookup: true,
    visitor_photo_enabled: false,
    contractor_management_enabled: true,
    auto_sign_out_enabled: false,
    auto_sign_out_time: null,
    evacuation_unlock_duration_minutes: 20,
    failed_pin_limit: 5,
    failed_pin_lockout_minutes: 10,
    data_retention_days: 730,
    sound_effects_enabled: true,
  };

  async function loadModuleSettings() {
    setInner("panel-module", loadingState("Loading settings…"));
    try {
      const row = await settings.get(_companyId);
      renderModuleSettings({ ...DEFAULT_SETTINGS, ...(row || {}) }, !!row?.evacuation_pin_hash, !!row?.kiosk_exit_pin_hash);
    } catch (e) {
      setInner("panel-module", errorState({ title: "Couldn't load settings", message: e.message, retryId: "moduleRetry" }));
      document.getElementById("moduleRetry")?.addEventListener("click", loadModuleSettings);
    }
  }

  function renderModuleSettings(s, pinConfigured, kioskPinConfigured) {
    setInner("panel-module", `
      <div class="card" style="margin-bottom:20px">
        <div class="set-pin-row">
          <i data-lucide="${pinConfigured ? "shield-check" : "shield-alert"}"></i>
          <div>
            <strong>Evacuation PIN</strong>
            <p class="set-section-desc" style="margin:2px 0 0">${pinConfigured ? "A PIN is configured for this company." : "No evacuation PIN has been set yet — evacuations can't be unlocked until one is set."}</p>
          </div>
          <button class="btn btn-primary" id="setPinBtn" type="button">${pinConfigured ? "Change PIN" : "Set PIN"}</button>
        </div>

        <div class="set-pin-row" style="margin-top:12px">
          <i data-lucide="${kioskPinConfigured ? "monitor-check" : "monitor"}"></i>
          <div>
            <strong>Kiosk Exit PIN</strong>
            <p class="set-section-desc" style="margin:2px 0 0">${kioskPinConfigured ? "A PIN is configured to exit Kiosk Mode back to admin mode." : "No kiosk exit PIN has been set yet — a wrong-PIN attempt will always fall back to a full SmartCore sign-in."}</p>
          </div>
          <button class="btn btn-primary" id="setKioskPinBtn" type="button">${kioskPinConfigured ? "Change PIN" : "Set PIN"}</button>
        </div>

        <h2 class="set-section-title">Sign-in &amp; visitor/contractor behaviour</h2>
        <p class="set-section-desc">Defaults applied across every site unless overridden per-site.</p>
        <div class="set-field-grid">
          <label class="set-field">
            <span class="form-label">Default sign-in method</span>
            <select id="f_default_sign_in_method" class="form-input">
              <option value="manual" ${s.default_sign_in_method === "manual" ? "selected" : ""}>Manual</option>
              <option value="qr" ${s.default_sign_in_method === "qr" ? "selected" : ""}>QR badge</option>
              <option value="kiosk" ${s.default_sign_in_method === "kiosk" ? "selected" : ""}>Kiosk</option>
            </select>
          </label>
          <label class="set-field">
            <span class="form-label">Data retention (days)</span>
            <input type="number" id="f_data_retention_days" class="form-input" min="30" max="3650" value="${esc(s.data_retention_days)}"/>
          </label>
        </div>
        <label class="set-checkbox-field"><input type="checkbox" id="f_allow_manual_employee_lookup" ${s.allow_manual_employee_lookup ? "checked" : ""}/> Allow manual employee name lookup at sign-in</label>
        <label class="set-checkbox-field"><input type="checkbox" id="f_allow_employee_code_lookup" ${s.allow_employee_code_lookup ? "checked" : ""}/> Allow employee code lookup at sign-in</label>
        <label class="set-checkbox-field"><input type="checkbox" id="f_visitor_photo_enabled" ${s.visitor_photo_enabled ? "checked" : ""}/> Capture a photo when signing in visitors</label>
        <label class="set-checkbox-field"><input type="checkbox" id="f_contractor_management_enabled" ${s.contractor_management_enabled ? "checked" : ""}/> Enable contractor management</label>
        <label class="set-checkbox-field"><input type="checkbox" id="f_sound_effects_enabled" ${s.sound_effects_enabled !== false ? "checked" : ""}/> Enable sound effects (confirmations, errors, kiosk taps — everywhere in this module)</label>
        <label class="set-checkbox-field">
          <input type="checkbox" id="f_auto_sign_out_enabled" ${s.auto_sign_out_enabled ? "checked" : ""}/> Automatically sign everyone out at a fixed time
        </label>
        <div class="set-field-grid" id="autoSignOutTimeGrid" style="${s.auto_sign_out_enabled ? "" : "display:none"}">
          <label class="set-field">
            <span class="form-label">Auto sign-out time</span>
            <input type="time" id="f_auto_sign_out_time" class="form-input" value="${esc((s.auto_sign_out_time || "").slice(0, 5))}"/>
          </label>
        </div>

        <h2 class="set-section-title" style="margin-top:8px">Evacuation</h2>
        <p class="set-section-desc">Controls the PIN unlock window and lockout behaviour used by the Evacuation page.</p>
        <div class="set-field-grid">
          <label class="set-field">
            <span class="form-label">Unlock duration (minutes)</span>
            <input type="number" id="f_evacuation_unlock_duration_minutes" class="form-input" min="1" max="180" value="${esc(s.evacuation_unlock_duration_minutes)}"/>
          </label>
          <label class="set-field">
            <span class="form-label">Failed PIN attempts before lockout</span>
            <input type="number" id="f_failed_pin_limit" class="form-input" min="1" max="20" value="${esc(s.failed_pin_limit)}"/>
          </label>
          <label class="set-field">
            <span class="form-label">Lockout duration (minutes)</span>
            <input type="number" id="f_failed_pin_lockout_minutes" class="form-input" min="1" max="180" value="${esc(s.failed_pin_lockout_minutes)}"/>
          </label>
        </div>

        <div class="set-actions-bar">
          <button class="btn btn-primary" id="saveModuleSettingsBtn" type="button">Save Settings</button>
        </div>
      </div>
    `);
    refreshIcons();

    document.getElementById("f_auto_sign_out_enabled").addEventListener("change", e => {
      document.getElementById("autoSignOutTimeGrid").style.display = e.target.checked ? "" : "none";
    });
    document.getElementById("setPinBtn").addEventListener("click", openSetPinModal);
    document.getElementById("setKioskPinBtn").addEventListener("click", openSetKioskPinModal);
    document.getElementById("saveModuleSettingsBtn").addEventListener("click", saveModuleSettings);

    // Unsaved-changes tracking: any edit to a module-settings field marks the
    // form dirty; loading/saving resets it back to clean. The combobox search
    // boxes are excluded — they're a display-only proxy over the real hidden
    // <select>, which already reports its own "change" event when a value is
    // actually picked; without this, just typing to search would false-flag
    // the form dirty before anything was ever selected.
    _settingsDirty = false;
    document.querySelectorAll("#panel-module input:not(.pfs-combo-input), #panel-module select").forEach(el => {
      el.addEventListener("input", () => { _settingsDirty = true; });
      el.addEventListener("change", () => { _settingsDirty = true; });
    });
    enhanceSelect(document.getElementById("f_default_sign_in_method"));
  }

  async function saveModuleSettings() {
    const btn = document.getElementById("saveModuleSettingsBtn");
    const autoSignOutEnabled = document.getElementById("f_auto_sign_out_enabled").checked;
    // Explicit field list — evacuation_pin_hash is never read from the form
    // or included here; it is only ever changed via setEvacuationPin().
    const fields = {
      default_sign_in_method: document.getElementById("f_default_sign_in_method").value,
      allow_manual_employee_lookup: document.getElementById("f_allow_manual_employee_lookup").checked,
      allow_employee_code_lookup: document.getElementById("f_allow_employee_code_lookup").checked,
      visitor_photo_enabled: document.getElementById("f_visitor_photo_enabled").checked,
      contractor_management_enabled: document.getElementById("f_contractor_management_enabled").checked,
      sound_effects_enabled: document.getElementById("f_sound_effects_enabled").checked,
      auto_sign_out_enabled: autoSignOutEnabled,
      auto_sign_out_time: autoSignOutEnabled ? (document.getElementById("f_auto_sign_out_time").value || null) : null,
      evacuation_unlock_duration_minutes: parseInt(document.getElementById("f_evacuation_unlock_duration_minutes").value, 10),
      failed_pin_limit: parseInt(document.getElementById("f_failed_pin_limit").value, 10),
      failed_pin_lockout_minutes: parseInt(document.getElementById("f_failed_pin_lockout_minutes").value, 10),
      data_retention_days: parseInt(document.getElementById("f_data_retention_days").value, 10),
    };
    btn.disabled = true;
    btn.textContent = "Saving…";
    try {
      await settings.upsert(_companyId, fields);
      setSoundEnabled(fields.sound_effects_enabled);
      _settingsDirty = false;
      toast("success", "Settings saved");
      return true;
    } catch (e) {
      toast("error", "Couldn't save settings", e.message || "Please try again.");
      return false;
    } finally {
      btn.disabled = false;
      btn.textContent = "Save Settings";
    }
  }

  function openSetPinModal() {
    const overlay = modal(`
      <div class="modal-header"><h3>Set Evacuation PIN</h3></div>
      <div class="modal-body">
        <p class="text-muted" style="margin-top:0">4–12 digits. This PIN unlocks the emergency evacuation start screen — share it only with designated fire marshals.</p>
        <label class="form-label" for="newPin">New PIN</label>
        <input type="password" id="newPin" class="form-input" inputmode="numeric" pattern="[0-9]*" autocomplete="off" maxlength="12" style="margin-bottom:14px"/>
        <label class="form-label" for="confirmPin">Confirm PIN</label>
        <input type="password" id="confirmPin" class="form-input" inputmode="numeric" pattern="[0-9]*" autocomplete="off" maxlength="12"/>
        <div class="form-error" id="pinModalError" role="alert" style="margin-top:10px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn modal-close" type="button">Cancel</button>
        <button class="btn btn-primary" id="savePinBtn" type="button">Save PIN</button>
      </div>`);

    overlay.querySelector("#savePinBtn").addEventListener("click", async () => {
      const pin = overlay.querySelector("#newPin").value;
      const confirmPin = overlay.querySelector("#confirmPin").value;
      const errEl = overlay.querySelector("#pinModalError");
      errEl.textContent = "";
      if (!/^[0-9]{4,12}$/.test(pin)) { errEl.textContent = "PIN must be 4–12 digits."; return; }
      if (pin !== confirmPin) { errEl.textContent = "PINs don't match."; return; }
      const btn = overlay.querySelector("#savePinBtn");
      btn.disabled = true;
      btn.textContent = "Saving…";
      try {
        await settings.setEvacuationPin(_companyId, pin);
        overlay.remove();
        toast("success", "Evacuation PIN updated");
        loadModuleSettings();
      } catch (e) {
        errEl.textContent = e.message || "Couldn't set PIN.";
        btn.disabled = false;
        btn.textContent = "Save PIN";
      }
    });
  }

  function openSetKioskPinModal() {
    const overlay = modal(`
      <div class="modal-header"><h3>Set Kiosk Exit PIN</h3></div>
      <div class="modal-body">
        <p class="text-muted" style="margin-top:0">4–12 digits. This PIN is used to exit Kiosk Mode back to admin mode on a device — it is deliberately separate from the Evacuation PIN. If it's entered incorrectly, the device falls back to a full SmartCore sign-in instead.</p>
        <label class="form-label" for="newKioskPin">New PIN</label>
        <input type="password" id="newKioskPin" class="form-input" inputmode="numeric" pattern="[0-9]*" autocomplete="off" maxlength="12" style="margin-bottom:14px"/>
        <label class="form-label" for="confirmKioskPin">Confirm PIN</label>
        <input type="password" id="confirmKioskPin" class="form-input" inputmode="numeric" pattern="[0-9]*" autocomplete="off" maxlength="12"/>
        <div class="form-error" id="kioskPinModalError" role="alert" style="margin-top:10px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn modal-close" type="button">Cancel</button>
        <button class="btn btn-primary" id="saveKioskPinBtn" type="button">Save PIN</button>
      </div>`);

    overlay.querySelector("#saveKioskPinBtn").addEventListener("click", async () => {
      const pin = overlay.querySelector("#newKioskPin").value;
      const confirmPin = overlay.querySelector("#confirmKioskPin").value;
      const errEl = overlay.querySelector("#kioskPinModalError");
      errEl.textContent = "";
      if (!/^[0-9]{4,12}$/.test(pin)) { errEl.textContent = "PIN must be 4–12 digits."; return; }
      if (pin !== confirmPin) { errEl.textContent = "PINs don't match."; return; }
      const btn = overlay.querySelector("#saveKioskPinBtn");
      btn.disabled = true;
      btn.textContent = "Saving…";
      try {
        await settings.setKioskExitPin(_companyId, pin);
        overlay.remove();
        toast("success", "Kiosk exit PIN updated");
        loadModuleSettings();
      } catch (e) {
        errEl.textContent = e.message || "Couldn't set PIN.";
        btn.disabled = false;
        btn.textContent = "Save PIN";
      }
    });
  }

  // ── Site settings ────────────────────────────────────────────────────────
  async function loadSiteSettings() {
    setInner("panel-sites", loadingState("Loading sites…"));
    try {
      _siteList = await sites.list(_companyId);
      renderSiteSettings();
    } catch (e) {
      setInner("panel-sites", errorState({ title: "Couldn't load sites", message: e.message, retryId: "sitesRetry" }));
      document.getElementById("sitesRetry")?.addEventListener("click", loadSiteSettings);
    }
  }

  function renderSiteSettings() {
    setInner("panel-sites", `
      <div class="set-card-header-row">
        <h2 class="set-section-title" style="margin:0">Sites</h2>
        <button class="btn btn-primary" id="addSiteBtn" type="button"><i data-lucide="plus"></i> Add Site</button>
      </div>
      ${_siteList.length === 0 ? emptyState({ icon: "map-pin", title: "No sites yet", message: "Add your first site to start using Presence & Fire Safety." }) : `
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Name</th><th>Timezone</th><th>Assembly point</th><th>Default</th><th>Active</th><th></th></tr></thead>
          <tbody>
            ${_siteList.map(s => `
              <tr>
                <td>${esc(s.name)}</td>
                <td>${esc(s.timezone)}</td>
                <td>${esc(s.assembly_point || "—")}</td>
                <td>${s.is_default ? '<span class="badge badge-blue">Default</span>' : "—"}</td>
                <td><span class="badge ${s.is_active ? "badge-green" : "badge-grey"}">${s.is_active ? "Active" : "Inactive"}</span></td>
                <td><button class="btn" data-edit-site="${esc(s.id)}" type="button">Edit</button></td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`}
    `);
    refreshIcons();
    document.getElementById("addSiteBtn").addEventListener("click", () => openSiteModal(null));
    document.querySelectorAll("[data-edit-site]").forEach(btn => {
      btn.addEventListener("click", () => openSiteModal(_siteList.find(s => s.id === btn.dataset.editSite)));
    });
  }

  function openSiteModal(site) {
    const isNew = !site;
    const s = site || { name: "", address_line_1: "", address_line_2: "", city: "", county: "", postcode: "", country: "United Kingdom", timezone: "Europe/London", assembly_point: "", evacuation_notes: "", is_default: false, is_active: true };
    const overlay = modal(`
      <div class="modal-header"><h3>${isNew ? "Add Site" : "Edit Site"}</h3></div>
      <div class="modal-body">
        <div class="set-field-grid">
          <label class="set-field"><span class="form-label">Name</span><input class="form-input" id="s_name" value="${esc(s.name)}"/></label>
          <label class="set-field"><span class="form-label">Timezone</span><input class="form-input" id="s_timezone" value="${esc(s.timezone)}"/></label>
        </div>
        <div class="set-field-grid">
          <label class="set-field"><span class="form-label">Address line 1</span><input class="form-input" id="s_address1" value="${esc(s.address_line_1 || "")}"/></label>
          <label class="set-field"><span class="form-label">Address line 2</span><input class="form-input" id="s_address2" value="${esc(s.address_line_2 || "")}"/></label>
        </div>
        <div class="set-field-grid">
          <label class="set-field"><span class="form-label">City</span><input class="form-input" id="s_city" value="${esc(s.city || "")}"/></label>
          <label class="set-field"><span class="form-label">County</span><input class="form-input" id="s_county" value="${esc(s.county || "")}"/></label>
          <label class="set-field"><span class="form-label">Postcode</span><input class="form-input" id="s_postcode" value="${esc(s.postcode || "")}"/></label>
        </div>
        <label class="set-field" style="margin-bottom:14px"><span class="form-label">Assembly point</span><input class="form-input" id="s_assembly" value="${esc(s.assembly_point || "")}" placeholder="e.g. Car park, north gate"/></label>
        <label class="set-field" style="margin-bottom:14px"><span class="form-label">Evacuation notes</span><textarea class="form-input" id="s_notes" rows="2">${esc(s.evacuation_notes || "")}</textarea></label>
        <label class="set-checkbox-field"><input type="checkbox" id="s_is_default" ${s.is_default ? "checked" : ""}/> Default site for this company</label>
        <label class="set-checkbox-field"><input type="checkbox" id="s_is_active" ${s.is_active ? "checked" : ""}/> Active</label>
        <div class="form-error" id="siteModalError" role="alert"></div>
      </div>
      <div class="modal-footer">
        <button class="btn modal-close" type="button">Cancel</button>
        <button class="btn btn-primary" id="saveSiteBtn" type="button">${isNew ? "Add Site" : "Save Changes"}</button>
      </div>`);

    overlay.querySelector("#saveSiteBtn").addEventListener("click", async () => {
      const errEl = overlay.querySelector("#siteModalError");
      errEl.textContent = "";
      const name = overlay.querySelector("#s_name").value.trim();
      if (!name) { errEl.textContent = "Site name is required."; return; }
      const fields = {
        name,
        timezone: overlay.querySelector("#s_timezone").value.trim() || "Europe/London",
        address_line_1: overlay.querySelector("#s_address1").value.trim() || null,
        address_line_2: overlay.querySelector("#s_address2").value.trim() || null,
        city: overlay.querySelector("#s_city").value.trim() || null,
        county: overlay.querySelector("#s_county").value.trim() || null,
        postcode: overlay.querySelector("#s_postcode").value.trim() || null,
        assembly_point: overlay.querySelector("#s_assembly").value.trim() || null,
        evacuation_notes: overlay.querySelector("#s_notes").value.trim() || null,
        is_default: overlay.querySelector("#s_is_default").checked,
        is_active: overlay.querySelector("#s_is_active").checked,
      };
      const btn = overlay.querySelector("#saveSiteBtn");
      btn.disabled = true;
      btn.textContent = "Saving…";
      try {
        if (isNew) await sites.create(_companyId, fields);
        else await sites.update(site.id, fields);
        overlay.remove();
        toast("success", isNew ? "Site added" : "Site updated");
        loadSiteSettings();
      } catch (e) {
        // Only one default site per company is allowed (DB unique index) —
        // surface that constraint clearly instead of a raw Postgres error.
        const raw = e.message || "";
        errEl.textContent = /duplicate key|one_default/i.test(raw)
          ? "Only one site can be marked as default. Unmark the current default site first."
          : raw || "Couldn't save this site.";
        btn.disabled = false;
        btn.textContent = isNew ? "Add Site" : "Save Changes";
      }
    });
  }

  // ── ID Card template designer ────────────────────────────────────────────
  // QR badge issue/revoke moved to the dedicated id-cards.html page — the
  // badge token now prints on the back of the card, so managing it belongs
  // next to the card preview/print flow rather than here.
  const DEFAULT_ID_CARD_TEMPLATE = {
    orientation: "landscape",
    background: { color: "#101828" },
    shapes: [
      { type: "circle", color: "#1e5cff", corner: "top-right", size: "lg", opacity: 0.25, enabled: true },
      { type: "rect", color: "#5b8dff", corner: "bottom-left", size: "md", opacity: 0.18, enabled: true },
    ],
    border: { enabled: true, color: "#1e5cff", width: 3 },
    cornerRadius: 16,
    photo: { shape: "circle", size: "md", position: "left", borderColor: "#ffffff", borderWidth: 3 },
    logo: { position: "top-left", size: "sm" },
    fields: {
      name: { show: true, fontSize: 16, color: "#ffffff", bold: true },
      jobTitle: { show: true, fontSize: 12, color: "#c7d2e0" },
      employeeCode: { show: true, fontSize: 11, color: "#8fa0bd" },
    },
    back: { background: { color: "#ffffff" }, qr: { show: true, size: "md" }, text: "If found, please return to reception." },
  };
  const IDC_STEPS = ["Background", "Border", "Photo", "Fields & Logo", "Back of Card"];
  const SHAPE_CORNERS = [["top-left", "Top left"], ["top-right", "Top right"], ["bottom-left", "Bottom left"], ["bottom-right", "Bottom right"]];
  const SIZE_OPTIONS = [["sm", "Small"], ["md", "Medium"], ["lg", "Large"]];

  let _idCardTemplate = null;
  let _idCardLogoUrl = null;
  let _idCardStep = 1;

  async function loadIdCardTemplate() {
    if (!hasPermission("presence.manage_badges")) {
      setInner("panel-badges", permissionDeniedState("You don't have permission to manage ID cards."));
      return;
    }
    setInner("panel-badges", loadingState("Loading ID card template…"));
    try {
      const row = await settings.get(_companyId);
      _idCardTemplate = mergeIdCardTemplate(row?.id_card_template);
      _idCardLogoUrl = row?.id_card_logo_url || null;
      _idCardStep = 1;
      renderIdCardWizard();
    } catch (e) {
      setInner("panel-badges", errorState({ title: "Couldn't load ID card template", message: e.message, retryId: "idCardRetry" }));
      document.getElementById("idCardRetry")?.addEventListener("click", loadIdCardTemplate);
    }
  }

  // Deep-merges a saved template over the defaults so a fresh company (or an
  // older/partial saved template) always has every field the renderer and
  // wizard controls expect.
  function mergeIdCardTemplate(saved) {
    const base = JSON.parse(JSON.stringify(DEFAULT_ID_CARD_TEMPLATE));
    if (!saved) return base;
    return {
      ...base, ...saved,
      background: { ...base.background, ...saved.background },
      shapes: Array.isArray(saved.shapes) && saved.shapes.length ? saved.shapes : base.shapes,
      border: { ...base.border, ...saved.border },
      photo: { ...base.photo, ...saved.photo },
      logo: { ...base.logo, ...saved.logo },
      fields: {
        name: { ...base.fields.name, ...saved.fields?.name },
        jobTitle: { ...base.fields.jobTitle, ...saved.fields?.jobTitle },
        employeeCode: { ...base.fields.employeeCode, ...saved.fields?.employeeCode },
      },
      back: {
        ...base.back, ...saved.back,
        background: { ...base.back.background, ...saved.back?.background },
        qr: { ...base.back.qr, ...saved.back?.qr },
      },
    };
  }

  function renderIdCardWizard() {
    setInner("panel-badges", `
      <div class="idc-layout">
        <div class="idc-form">
          <div class="idc-steps" role="tablist" aria-label="ID card design steps">
            ${IDC_STEPS.map((label, i) => `<button type="button" class="idc-step ${_idCardStep === i + 1 ? "active" : ""}" data-step="${i + 1}">${i + 1}. ${label}</button>`).join("")}
          </div>
          <div class="card" id="idcStepBody" style="margin-top:14px"></div>
          <div class="set-actions-bar">
            <button class="btn" id="idcBackBtn" type="button" ${_idCardStep === 1 ? "disabled" : ""}>← Back</button>
            ${_idCardStep < IDC_STEPS.length
              ? `<button class="btn btn-primary" id="idcNextBtn" type="button">Next →</button>`
              : `<button class="btn btn-primary" id="idcSaveBtn" type="button">Save Template</button>`}
          </div>
        </div>
        <div class="idc-preview">
          <div class="idc-preview-label">Front</div>
          <div class="idc-preview-card" id="idcPreviewFront"></div>
          <div class="idc-preview-label" style="margin-top:16px">Back</div>
          <div class="idc-preview-card" id="idcPreviewBack"></div>
        </div>
      </div>
    `);
    renderIdCardStepBody();
    renderIdCardPreview();
    document.querySelectorAll(".idc-step").forEach(el => el.addEventListener("click", () => {
      _idCardStep = parseInt(el.dataset.step, 10);
      renderIdCardWizard();
    }));
    document.getElementById("idcBackBtn").addEventListener("click", () => { _idCardStep = Math.max(1, _idCardStep - 1); renderIdCardWizard(); });
    document.getElementById("idcNextBtn")?.addEventListener("click", () => { _idCardStep = Math.min(IDC_STEPS.length, _idCardStep + 1); renderIdCardWizard(); });
    document.getElementById("idcSaveBtn")?.addEventListener("click", saveIdCardTemplate);
  }

  function renderIdCardPreview() {
    const sample = {
      full_name: _profile?.full_name || "Jane Doe",
      job_title: _profile?.job_title || "Job Title",
      employee_id: _profile?.employee_id || "EMP0000001",
      profile_picture_url: null,
    };
    document.getElementById("idcPreviewFront").innerHTML = renderIdCardFront(_idCardTemplate, sample, _idCardLogoUrl);
    document.getElementById("idcPreviewBack").innerHTML = renderIdCardBack(_idCardTemplate, generateQrDataUrl("PFS-SAMPLE-TOKEN"));
  }

  async function saveIdCardTemplate() {
    const btn = document.getElementById("idcSaveBtn");
    btn.disabled = true; btn.textContent = "Saving…";
    try {
      await settings.upsert(_companyId, { id_card_template: _idCardTemplate });
      toast("success", "ID card template saved", "Employees' ID cards will now use this design.");
    } catch (e) {
      toast("error", "Couldn't save template", e.message || "Please try again.");
    } finally {
      btn.disabled = false; btn.textContent = "Save Template";
    }
  }

  function renderIdCardStepBody() {
    const t = _idCardTemplate;
    const body = document.getElementById("idcStepBody");
    if (_idCardStep === 1) {
      body.innerHTML = `
        <h2 class="set-section-title">Orientation & Background</h2>
        <p class="set-section-desc">Choose the card shape, background colour, and up to two decorative accent shapes.</p>
        <div class="set-field-grid">
          <label class="set-field"><span class="form-label">Orientation</span>
            <div class="idc-toggle-group">
              <button type="button" class="idc-toggle-btn ${t.orientation !== "portrait" ? "active" : ""}" data-orientation="landscape">Landscape</button>
              <button type="button" class="idc-toggle-btn ${t.orientation === "portrait" ? "active" : ""}" data-orientation="portrait">Portrait</button>
            </div>
          </label>
          <label class="set-field"><span class="form-label">Background colour</span><input type="color" class="idc-color-input" id="idc_bg" value="${t.background.color}"/></label>
        </div>
        ${shapeEditorHtml(0)}
        ${shapeEditorHtml(1)}
      `;
      body.querySelectorAll("[data-orientation]").forEach(b => b.addEventListener("click", () => {
        t.orientation = b.dataset.orientation;
        renderIdCardStepBody(); renderIdCardPreview();
      }));
      document.getElementById("idc_bg").addEventListener("input", e => { t.background.color = e.target.value; renderIdCardPreview(); });
      wireShapeEditor(0); wireShapeEditor(1);
    } else if (_idCardStep === 2) {
      body.innerHTML = `
        <h2 class="set-section-title">Border</h2>
        <p class="set-section-desc">Add a border around the card and round its corners.</p>
        <label class="set-checkbox-field"><input type="checkbox" id="idc_border_enabled" ${t.border.enabled !== false ? "checked" : ""}/> Show border</label>
        <div class="set-field-grid">
          <label class="set-field"><span class="form-label">Border colour</span><input type="color" class="idc-color-input" id="idc_border_color" value="${t.border.color}"/></label>
          <label class="set-field"><span class="form-label">Border width (px)</span><input type="range" min="1" max="8" id="idc_border_width" value="${t.border.width}"/></label>
          <label class="set-field"><span class="form-label">Corner roundness (px)</span><input type="range" min="0" max="32" id="idc_corner_radius" value="${t.cornerRadius}"/></label>
        </div>
      `;
      document.getElementById("idc_border_enabled").addEventListener("change", e => { t.border.enabled = e.target.checked; renderIdCardPreview(); });
      document.getElementById("idc_border_color").addEventListener("input", e => { t.border.color = e.target.value; renderIdCardPreview(); });
      document.getElementById("idc_border_width").addEventListener("input", e => { t.border.width = parseInt(e.target.value, 10); renderIdCardPreview(); });
      document.getElementById("idc_corner_radius").addEventListener("input", e => { t.cornerRadius = parseInt(e.target.value, 10); renderIdCardPreview(); });
    } else if (_idCardStep === 3) {
      body.innerHTML = `
        <h2 class="set-section-title">Photo style</h2>
        <p class="set-section-desc">How each employee's photo appears on their card.</p>
        <div class="set-field-grid">
          <label class="set-field"><span class="form-label">Shape</span>
            <div class="idc-toggle-group">
              <button type="button" class="idc-toggle-btn ${t.photo.shape !== "square" ? "active" : ""}" data-photo-shape="circle">Circle</button>
              <button type="button" class="idc-toggle-btn ${t.photo.shape === "square" ? "active" : ""}" data-photo-shape="square">Square</button>
            </div>
          </label>
          <label class="set-field"><span class="form-label">Position</span>
            <select id="idc_photo_position" class="form-input">
              <option value="left" ${t.photo.position === "left" ? "selected" : ""}>Left</option>
              <option value="right" ${t.photo.position === "right" ? "selected" : ""}>Right</option>
              <option value="top-center" ${t.photo.position === "top-center" ? "selected" : ""}>Top centre</option>
            </select>
          </label>
          <label class="set-field"><span class="form-label">Size</span>
            <select id="idc_photo_size" class="form-input">
              ${SIZE_OPTIONS.map(([v, l]) => `<option value="${v}" ${t.photo.size === v ? "selected" : ""}>${l}</option>`).join("")}
            </select>
          </label>
          <label class="set-field"><span class="form-label">Border colour</span><input type="color" class="idc-color-input" id="idc_photo_border_color" value="${t.photo.borderColor}"/></label>
          <label class="set-field"><span class="form-label">Border width (px)</span><input type="range" min="0" max="8" id="idc_photo_border_width" value="${t.photo.borderWidth}"/></label>
        </div>
      `;
      body.querySelectorAll("[data-photo-shape]").forEach(b => b.addEventListener("click", () => { t.photo.shape = b.dataset.photoShape; renderIdCardStepBody(); renderIdCardPreview(); }));
      document.getElementById("idc_photo_position").addEventListener("change", e => { t.photo.position = e.target.value; renderIdCardPreview(); });
      document.getElementById("idc_photo_size").addEventListener("change", e => { t.photo.size = e.target.value; renderIdCardPreview(); });
      document.getElementById("idc_photo_border_color").addEventListener("input", e => { t.photo.borderColor = e.target.value; renderIdCardPreview(); });
      document.getElementById("idc_photo_border_width").addEventListener("input", e => { t.photo.borderWidth = parseInt(e.target.value, 10); renderIdCardPreview(); });
      enhanceSelect(document.getElementById("idc_photo_position"));
      enhanceSelect(document.getElementById("idc_photo_size"));
    } else if (_idCardStep === 4) {
      const f = t.fields;
      body.innerHTML = `
        <h2 class="set-section-title">Fields & Logo</h2>
        <p class="set-section-desc">Choose which details show on the card, and upload your company logo.</p>
        ${fieldEditorHtml("name", "Employee name", f.name)}
        ${fieldEditorHtml("jobTitle", "Job title", f.jobTitle)}
        ${fieldEditorHtml("employeeCode", "Employee code", f.employeeCode)}
        <h3 class="idc-subhead">Company logo</h3>
        <div class="idc-logo-row">
          ${_idCardLogoUrl ? `<img src="${esc(_idCardLogoUrl)}" alt="Company logo" class="idc-logo-preview"/>` : `<div class="idc-logo-preview idc-logo-placeholder">No logo</div>`}
          <div>
            <button type="button" class="btn" id="idcLogoUploadBtn">Upload logo</button>
            <input type="file" id="idcLogoInput" accept="image/jpeg,image/png,image/webp,image/svg+xml" style="display:none"/>
            <div class="set-field-grid" style="margin-top:12px">
              <label class="set-field"><span class="form-label">Position</span>
                <select id="idc_logo_position" class="form-input">
                  ${SHAPE_CORNERS.map(([v, l]) => `<option value="${v}" ${t.logo.position === v ? "selected" : ""}>${l}</option>`).join("")}

              </label>
              <label class="set-field"><span class="form-label">Size</span>
                <select id="idc_logo_size" class="form-input">
                  ${SIZE_OPTIONS.map(([v, l]) => `<option value="${v}" ${t.logo.size === v ? "selected" : ""}>${l}</option>`).join("")}

              </label>
            </div>
          </div>
        </div>

      document.getElementById("idc_logo_size").addEventListener("change", e => { t.logo.size = e.target.value; renderIdCardPreview(); });

      enhanceSelect(document.getElementById("idc_logo_position"));
      enhanceSelect(document.getElementById("idc_logo_size"));
    } else if (_idCardStep === 5) {
      const b = t.back;
      body.innerHTML = `
        <h2 class="set-section-title">Back of card</h2>

        <div class="set-field-grid">
          <label class="set-field"><span class="form-label">Background colour</span><input type="color" class="idc-color-input" id="idc_back_bg" value="${b.background.color}"/></label>
          <label class="set-field"><span class="form-label">QR code size</span>
            <select id="idc_qr_size" class="form-input">
              ${SIZE_OPTIONS.map(([v, l]) => `<option value="${v}" ${b.qr.size === v ? "selected" : ""}>${l}</option>`).join("")}
            </select>
          </label>
        </div>
        <label class="set-checkbox-field"><input type="checkbox" id="idc_qr_show" ${b.qr.show !== false ? "checked" : ""}/> Show QR sign-in code</label>
        <label class="set-field" style="margin-top:10px"><span class="form-label">Footer text (optional)</span>
          <textarea class="form-input" id="idc_back_text" rows="2" maxlength="140">${esc(b.text || "")}</textarea>
        </label>
      `;
      document.getElementById("idc_back_bg").addEventListener("input", e => { b.background.color = e.target.value; renderIdCardPreview(); });
      document.getElementById("idc_qr_size").addEventListener("change", e => { b.qr.size = e.target.value; renderIdCardPreview(); });
      document.getElementById("idc_qr_show").addEventListener("change", e => { b.qr.show = e.target.checked; renderIdCardPreview(); });
      document.getElementById("idc_back_text").addEventListener("input", e => { b.text = e.target.value; renderIdCardPreview(); });
      enhanceSelect(document.getElementById("idc_qr_size"));
    }
  }

  function shapeEditorHtml(i) {
    const s = _idCardTemplate.shapes[i] || { type: "circle", color: "#1e5cff", corner: "top-right", size: "md", opacity: 0.2, enabled: false };
    _idCardTemplate.shapes[i] = s;
    return `
      <h3 class="idc-subhead">Accent shape ${i + 1}</h3>
      <label class="set-checkbox-field"><input type="checkbox" class="idc-shape-enabled" data-shape="${i}" ${s.enabled !== false ? "checked" : ""}/> Show this shape</label>
      <div class="set-field-grid">
        <label class="set-field"><span class="form-label">Type</span>
          <select class="form-input idc-shape-type" data-shape="${i}">
            <option value="circle" ${s.type !== "rect" ? "selected" : ""}>Circle</option>
            <option value="rect" ${s.type === "rect" ? "selected" : ""}>Bar</option>
          </select>
        </label>
        <label class="set-field"><span class="form-label">Colour</span><input type="color" class="idc-color-input idc-shape-color" data-shape="${i}" value="${s.color}"/></label>
        <label class="set-field"><span class="form-label">Corner</span>
          <select class="form-input idc-shape-corner" data-shape="${i}">
            ${SHAPE_CORNERS.map(([v, l]) => `<option value="${v}" ${s.corner === v ? "selected" : ""}>${l}</option>`).join("")}
          </select>
        </label>
        <label class="set-field"><span class="form-label">Size</span>
          <select class="form-input idc-shape-size" data-shape="${i}">
            ${SIZE_OPTIONS.map(([v, l]) => `<option value="${v}" ${s.size === v ? "selected" : ""}>${l}</option>`).join("")}
          </select>
        </label>
        <label class="set-field"><span class="form-label">Opacity</span><input type="range" min="0.05" max="1" step="0.05" class="idc-shape-opacity" data-shape="${i}" value="${s.opacity}"/></label>
      </div>
    `;
  }

  function wireShapeEditor(i) {
    const t = _idCardTemplate;
    document.querySelector(`.idc-shape-enabled[data-shape="${i}"]`).addEventListener("change", e => { t.shapes[i].enabled = e.target.checked; renderIdCardPreview(); });
    document.querySelector(`.idc-shape-type[data-shape="${i}"]`).addEventListener("change", e => { t.shapes[i].type = e.target.value; renderIdCardPreview(); });
    document.querySelector(`.idc-shape-color[data-shape="${i}"]`).addEventListener("input", e => { t.shapes[i].color = e.target.value; renderIdCardPreview(); });
    document.querySelector(`.idc-shape-corner[data-shape="${i}"]`).addEventListener("change", e => { t.shapes[i].corner = e.target.value; renderIdCardPreview(); });
    document.querySelector(`.idc-shape-size[data-shape="${i}"]`).addEventListener("change", e => { t.shapes[i].size = e.target.value; renderIdCardPreview(); });
    document.querySelector(`.idc-shape-opacity[data-shape="${i}"]`).addEventListener("input", e => { t.shapes[i].opacity = parseFloat(e.target.value); renderIdCardPreview(); });
    enhanceSelect(document.querySelector(`.idc-shape-type[data-shape="${i}"]`));
    enhanceSelect(document.querySelector(`.idc-shape-corner[data-shape="${i}"]`));
    enhanceSelect(document.querySelector(`.idc-shape-size[data-shape="${i}"]`));
  }

  function fieldEditorHtml(key, label, f) {
    return `
      <div class="idc-field-row">
        <label class="set-checkbox-field" style="padding:0"><input type="checkbox" class="idc-field-show" data-field="${key}" ${f.show !== false ? "checked" : ""}/> ${esc(label)}</label>
        <input type="color" class="idc-color-input idc-field-color" data-field="${key}" value="${f.color}"/>
        <input type="range" min="9" max="24" class="idc-field-size" data-field="${key}" value="${f.fontSize}" title="Font size"/>
      </div>
    `;
  }

  function wireFieldEditor(key) {
    const t = _idCardTemplate;
    document.querySelector(`.idc-field-show[data-field="${key}"]`).addEventListener("change", e => { t.fields[key].show = e.target.checked; renderIdCardPreview(); });
    document.querySelector(`.idc-field-color[data-field="${key}"]`).addEventListener("input", e => { t.fields[key].color = e.target.value; renderIdCardPreview(); });
    document.querySelector(`.idc-field-size[data-field="${key}"]`).addEventListener("input", e => { t.fields[key].fontSize = parseInt(e.target.value, 10); renderIdCardPreview(); });
  }

  // ── Devices ──────────────────────────────────────────────────────────────
  async function loadDevices() {
    setInner("panel-devices", loadingState("Loading devices…"));
    try {
      const list = await devices.list(_companyId);
      renderDevices(list);
    } catch (e) {
      setInner("panel-devices", errorState({ title: "Couldn't load devices", message: e.message, retryId: "devicesRetry" }));
      document.getElementById("devicesRetry")?.addEventListener("click", loadDevices);
    }
  }

  function renderDevices(list) {
    const siteName = (id) => _siteList.find(s => s.id === id)?.name || "—";
    setInner("panel-devices", `
      <div class="set-card-header-row">
        <h2 class="set-section-title" style="margin:0">Devices</h2>
        <button class="btn btn-primary" id="registerDeviceBtn" type="button"><i data-lucide="plus"></i> Register Device</button>
      </div>
      ${list.length === 0 ? emptyState({ icon: "tablet", title: "No devices registered" }) : `
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Name</th><th>Type</th><th>Site</th><th>Status</th><th>Last seen</th><th></th></tr></thead>
          <tbody>
            ${list.map(d => `
              <tr>
                <td>${esc(d.device_name)}</td>
                <td>${esc(d.device_type)}</td>
                <td>${esc(siteName(d.site_id))}</td>
                <td><span class="badge ${d.active ? "badge-green" : "badge-grey"}">${d.active ? "Active" : "Deactivated"}</span></td>
                <td>${esc(timeAgo(d.last_seen_at))}</td>
                <td>${d.active ? `<button class="btn btn-danger" data-deactivate-device="${esc(d.id)}" type="button">Deactivate</button>` : "—"}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`}
    `);
    refreshIcons();

    document.getElementById("registerDeviceBtn").addEventListener("click", () => {
      // No backend endpoint exists yet for one-time-reveal device secret
      // issuance (checked /api/presence-fire-safety/devices-register — not
      // present). We deliberately do not invent a client-side token scheme
      // for an authorised-device credential; this is a clear placeholder
      // until that endpoint ships.
      modal(`
        <div class="modal-header"><h3>Register Device</h3></div>
        <div class="modal-body">${emptyState({ icon: "server-off", title: "Coming soon", message: "Device registration requires the backend endpoint — coming soon." })}</div>
        <div class="modal-footer"><button class="btn modal-close" type="button">Close</button></div>`);
      refreshIcons();
    });

    document.querySelectorAll("[data-deactivate-device]").forEach(btn => {
      btn.addEventListener("click", () => {
        confirmDialog("Deactivate this device?", "It will no longer be able to authenticate sign-in/out events. This cannot be undone from here.", async () => {
          try {
            await devices.deactivate(btn.dataset.deactivateDevice);
            toast("success", "Device deactivated");
            loadDevices();
          } catch (e) {
            toast("error", "Couldn't deactivate device", e.message || "Please try again.");
          }
        }, { confirmLabel: "Deactivate" });
      });
    });
  }

  // ── Access-blocked / offline ─────────────────────────────────────────────
  function renderAccessBlocked(e) {
    const msg = e?.message || "";
    document.body.innerHTML = `
      <div class="pfs-shell">
        <div class="pfs-main" style="width:100%">
          <div class="pfs-topbar">
            <h1>Settings</h1>
            <button class="icon-btn" id="themeToggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
            <button class="icon-btn" id="logoutBtn" aria-label="Sign out"><i data-lucide="log-out"></i></button>
          </div>
          <div class="pfs-content" id="content"></div>
        </div>
      </div>
      <div id="toastwrap" aria-live="polite"></div>`;
    initTheme();
    initTopbar();

    let html;
    if (msg.includes("not enabled")) html = moduleDisabledState();
    else if (msg.includes("permission") || msg.includes("No access")) html = permissionDeniedState(msg);
    else if (msg.includes("profile") || msg.includes("session")) html = permissionDeniedState(msg || "Your account isn't set up for this module yet.");
    else html = errorState({ title: "Couldn't load Settings", message: msg, retryId: "blockedRetry" });

    setInner("content", html);
    document.getElementById("blockedRetry")?.addEventListener("click", () => window.location.reload());
  }

  function wireOfflineBanner() {
    const render = () => setInner("offlineArea", navigator.onLine ? "" : offlineBanner());
    render();
    window.addEventListener("online", render);
    window.addEventListener("offline", render);
  }

  // ── Unsaved-changes guard ────────────────────────────────────────────────
  // Shows a Save / Discard / Stay dialog before any in-app navigation away
  // from a dirty Module Settings form. Browser-level navigation we can't
  // intercept (back button, typing a URL, closing the tab) still falls back
  // to the native beforeunload confirmation below.
  function confirmUnsavedChanges(onProceed) {
    const overlay = modal(`
      <div class="modal-header"><h3>Unsaved changes</h3></div>
      <div class="modal-body"><p class="text-muted" style="margin:0">You have unsaved changes in Module Settings. Save them before leaving, or discard them?</p></div>
      <div class="modal-footer">
        <button class="btn" id="unsavedStayBtn" type="button">Stay on this page</button>
        <button class="btn" id="unsavedDiscardBtn" type="button">Discard</button>
        <button class="btn btn-primary" id="unsavedSaveBtn" type="button">Save &amp; Continue</button>
      </div>`);
    overlay.querySelector("#unsavedStayBtn").addEventListener("click", () => overlay.remove());
    overlay.querySelector("#unsavedDiscardBtn").addEventListener("click", () => {
      _settingsDirty = false;
      overlay.remove();
      onProceed();
    });
    overlay.querySelector("#unsavedSaveBtn").addEventListener("click", async () => {
      const btn = overlay.querySelector("#unsavedSaveBtn");
      btn.disabled = true;
      btn.textContent = "Saving…";
      const ok = await saveModuleSettings();
      if (ok) {
        overlay.remove();
        onProceed();
      } else {
        btn.disabled = false;
        btn.textContent = "Save & Continue";
      }
    });
  }

  function wireUnsavedChangesGuard() {
    document.querySelectorAll('#pfsNav a[href], .pfs-emergency-btn[href]').forEach(a => {
      a.addEventListener("click", (e) => {
        if (!_settingsDirty) return;
        e.preventDefault();
        confirmUnsavedChanges(() => { window.location.href = a.href; });
      });
    });
    window.addEventListener("beforeunload", (e) => {
      if (!_settingsDirty) return;
      e.preventDefault();
      e.returnValue = "";
    });
  }

  // ── Bootstrap — runs last, after every const/function above is defined ──
  try {
    const { profile } = await requirePresenceModuleAccess();
    if (enforceKioskGuard("settings")) throw new Error("__kiosk_redirect__");
    _profile = profile;
    _companyId = profile.company_id;

    renderNav("settings", profile);
    initMobileNav();
    initTopbar();
    initKioskToggle({ companyId: _companyId, currentPage: "settings" });
    wireOfflineBanner();
    initSoundFromSettings(_companyId);
    wireUnsavedChangesGuard();

    if (!hasPermission("presence.manage_settings")) {
      setInner("settingsBody", permissionDeniedState("You don't have permission to manage Presence & Fire Safety settings."));
    } else {
      _siteList = await sites.list(_companyId);
      renderShell();
    }
  } catch (e) {
    if (e.message !== "__kiosk_redirect__") renderAccessBlocked(e);
  }
</script>
</body>
</html>
