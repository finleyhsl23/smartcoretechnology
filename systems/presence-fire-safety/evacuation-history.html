<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Evacuation History — SmartCore Presence &amp; Fire Safety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/systems/presence-fire-safety/shared/presence-fire-safety.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="pfs-shell">
  <nav class="pfs-sidebar" id="pfsNav" aria-label="Main navigation"></nav>
  <div id="sidebarOverlay"></div>

  <div class="pfs-main">
    <div class="pfs-topbar">
      <button class="hamburger icon-btn" id="hamburger" aria-label="Open menu"><i data-lucide="menu"></i></button>
      <h1>Evacuation History</h1>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme"><i data-lucide="moon"></i></button>
      <button class="icon-btn" id="logoutBtn" aria-label="Sign out" title="Sign out"><i data-lucide="log-out"></i></button>
    </div>

    <div class="pfs-content" id="content">
      <div id="offlineArea"></div>
      <div id="pageBody"></div>
    </div>
  </div>
</div>
<div id="toastwrap" aria-live="polite"></div>

<style>
  .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
</style>

<script type="module">
  import { requirePresenceModuleAccess, hasPermission } from "/systems/presence-fire-safety/shared/auth.js";
  import { evacuation } from "/systems/presence-fire-safety/shared/api.js";
  import { renderNav, initMobileNav, initTopbar } from "/systems/presence-fire-safety/shared/nav.js";
  import { initTheme } from "/systems/presence-fire-safety/shared/theme.js";
  import {
    esc, toast, fmtDateTime, modal,
    loadingState, emptyState, errorState, permissionDeniedState, moduleDisabledState,
    offlineBanner, setInner, refreshIcons,
  } from "/systems/presence-fire-safety/shared/ui.js";

  initTheme();

  let _profile = null, _companyId = null;

  try {
    const { profile } = await requirePresenceModuleAccess();
    _profile = profile;
    _companyId = profile.company_id;

    renderNav("reports", profile);
    initMobileNav();
    initTopbar();
    wireOfflineBanner();

    if (!hasPermission("presence.view_live_register")) {
      setInner("pageBody", permissionDeniedState("You don't have permission to view evacuation history."));
    } else {
      loadHistory();
    }
  } catch (e) {
    renderAccessBlocked(e);
  }

  async function loadHistory() {
    setInner("pageBody", loadingState("Loading evacuation history…"));
    try {
      const rows = await evacuation.history(_companyId, { limit: 100 });
      renderHistory(rows);
    } catch (e) {
      setInner("pageBody", errorState({ title: "Couldn't load evacuation history", message: e.message, retryId: "histRetry" }));
      document.getElementById("histRetry")?.addEventListener("click", loadHistory);
    }
  }

  function renderHistory(rows) {
    setInner("pageBody", rows.length === 0 ? emptyState({ icon: "flame", title: "No evacuations recorded", message: "Past evacuation sessions will appear here." }) : `
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th>Site</th><th>Started</th><th>Completed</th><th>Status</th>
            <th>Snapshotted</th><th>Safe</th><th>Missing</th><th>Unaccounted</th><th></th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${esc(r.sites?.name || "—")}</td>
                <td>${esc(fmtDateTime(r.started_at))}</td>
                <td>${esc(fmtDateTime(r.completed_at))}</td>
                <td><span class="badge ${r.status === "active" ? "badge-red" : r.status === "completed" ? "badge-green" : "badge-grey"}">${esc(r.status)}</span></td>
                <td>${r.snapshot_count}</td>
                <td>${r.safe_count}</td>
                <td>${r.missing_count}</td>
                <td>${r.unaccounted_count}</td>
                <td><button class="btn" data-view-session="${esc(r.id)}" type="button">View roll call</button></td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`);

    document.querySelectorAll("[data-view-session]").forEach(btn => {
      btn.addEventListener("click", () => viewSession(btn.dataset.viewSession));
    });
  }

  async function viewSession(sessionId) {
    const overlay = modal(`
      <div class="modal-header"><h3>Roll Call</h3></div>
      <div class="modal-body" id="sessionModalBody">${loadingState("Loading roll call…")}</div>
      <div class="modal-footer"><button class="btn modal-close" type="button">Close</button></div>`);
    try {
      const people = await evacuation.rollCall(sessionId);
      const body = overlay.querySelector("#sessionModalBody");
      body.innerHTML = people.length === 0 ? emptyState({ icon: "users", title: "No one was recorded in this session" }) : `
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th>Name</th><th>Type</th><th>Department</th><th>Status</th><th>Notes</th></tr></thead>
            <tbody>
              ${people.map(p => `
                <tr>
                  <td>${esc(p.display_name_snapshot)}</td>
                  <td><span class="badge ${{ employee: "badge-blue", visitor: "badge-yellow", contractor: "badge-grey" }[p.subject_type] || "badge-grey"}">${esc(p.subject_type)}</span></td>
                  <td>${esc(p.department_snapshot || "—")}</td>
                  <td>${esc(p.roll_call_status)}</td>
                  <td>${esc(p.notes || "—")}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`;
      refreshIcons();
    } catch (e) {
      overlay.querySelector("#sessionModalBody").innerHTML = errorState({ title: "Couldn't load roll call", message: e.message });
    }
  }

  function renderAccessBlocked(e) {
    const msg = e?.message || "";
    document.body.innerHTML = `
      <div class="pfs-shell">
        <div class="pfs-main" style="width:100%">
          <div class="pfs-topbar">
            <h1>Evacuation History</h1>
            <button class="icon-btn" id="themeToggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
            <button class="icon-btn" id="logoutBtn" aria-label="Sign out"><i data-lucide="log-out"></i></button>
          </div>
          <div class="pfs-content" id="content"></div>
        </div>
      </div>
      <div id="toastwrap" aria-live="polite"></div>`;
    initTheme();
    initTopbar();

    let html;
    if (msg.includes("not enabled")) html = moduleDisabledState();
    else if (msg.includes("permission") || msg.includes("No access")) html = permissionDeniedState(msg);
    else if (msg.includes("profile") || msg.includes("session")) html = permissionDeniedState(msg || "Your account isn't set up for this module yet.");
    else html = errorState({ title: "Couldn't load Evacuation History", message: msg, retryId: "blockedRetry" });

    setInner("content", html);
    document.getElementById("blockedRetry")?.addEventListener("click", () => window.location.reload());
  }

  function wireOfflineBanner() {
    const render = () => setInner("offlineArea", navigator.onLine ? "" : offlineBanner());
    render();
    window.addEventListener("online", render);
    window.addEventListener("offline", render);
  }
</script>
</body>
</html>
