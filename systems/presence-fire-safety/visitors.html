<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Visitors — SmartCore Presence &amp; Fire Safety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/systems/presence-fire-safety/shared/presence-fire-safety.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="pfs-shell">
  <nav class="pfs-sidebar" id="pfsNav" aria-label="Main navigation"></nav>
  <div id="sidebarOverlay"></div>

  <div class="pfs-main">
    <div class="pfs-topbar">
      <button class="hamburger icon-btn" id="hamburger" aria-label="Open menu"><i data-lucide="menu"></i></button>
      <h1>Visitors</h1>
      <label class="sr-only" for="siteSwitcher">Site</label>
      <select id="siteSwitcher" aria-label="Select site"></select>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme"><i data-lucide="moon"></i></button>
      <button class="icon-btn" id="logoutBtn" aria-label="Sign out" title="Sign out"><i data-lucide="log-out"></i></button>
    </div>

    <div class="pfs-content" id="content">
      <div id="offlineArea"></div>
      <div id="pageBody"></div>
    </div>
  </div>
</div>
<div id="toastwrap" aria-live="polite"></div>

<style>
  .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }
  .pfs-tabs2 { display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:20px; }
  .pfs-tab2 { background:transparent; border:none; border-bottom:2px solid transparent; color: var(--text2); padding: 12px 6px; margin-right: 22px; font-weight:700; font-size:14px; min-height:44px; }
  .pfs-tab2[aria-selected="true"] { color: var(--accent2); border-bottom-color: var(--accent); }
  .form-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
  .combobox { position:relative; }
  .combobox-results { position:absolute; z-index:10; top:100%; left:0; right:0; background: var(--card); border:1px solid var(--line); border-radius:10px; margin-top:4px; max-height:220px; overflow-y:auto; box-shadow:0 12px 32px rgba(0,0,0,.3); }
  .combobox-result { display:block; width:100%; text-align:left; background:transparent; border:none; padding:9px 12px; color: var(--text); font-size:13.5px; }
  .combobox-result:hover, .combobox-result:focus-visible { background: var(--card2); }
  .checkbox-row { display:flex; align-items:flex-start; gap:10px; }
  .checkbox-row input { width:18px; height:18px; margin-top:2px; flex-shrink:0; }
  .checkbox-row label { font-size:13px; color: var(--text2); }
  .form-actions { display:flex; gap:10px; margin-top:6px; }
  .visitor-photo-preview { width:64px; height:64px; border-radius:12px; object-fit:cover; border:1px solid var(--line); }
</style>

<script type="module">
  import { requirePresenceModuleAccess, hasPermission, listSites, setSelectedSiteId, ensureSiteSelected } from "/systems/presence-fire-safety/shared/auth.js";
  import { visitors, employees, settings } from "/systems/presence-fire-safety/shared/api.js";
  import { renderNav, initMobileNav, initTopbar, renderSiteSwitcher } from "/systems/presence-fire-safety/shared/nav.js";
  import { initTheme } from "/systems/presence-fire-safety/shared/theme.js";
  import { enforceKioskGuard, initKioskToggle } from "/systems/presence-fire-safety/shared/kiosk.js";
  import {
    esc, toast, confirmDialog, fmtDateTime,
    loadingState, emptyState, errorState, permissionDeniedState, moduleDisabledState,
    offlineBanner, staleBadge, setInner,
  } from "/systems/presence-fire-safety/shared/ui.js";

  initTheme();

  let _companyId = null;
  let _siteId = null;
  let _hasView = false;
  let _hasManage = false;
  let _photoEnabled = false;
  let _activeTab = "onsite";
  let _selectedHost = null; // { id, full_name }
  let _hostSearchDebounce = null;
  let _lastRefreshed = null;

  try {
    const { profile } = await requirePresenceModuleAccess();
    if (enforceKioskGuard("visitors")) throw new Error("__kiosk_redirect__");
    renderNav("visitors", profile);
    initMobileNav();
    initTopbar();
    initKioskToggle({ companyId: _companyId, currentPage: "visitors" });
    wireOfflineBanner();

    _companyId = profile.company_id;
    _hasView = hasPermission("presence.view_live_register");
    _hasManage = hasPermission("presence.manage_visitors");

    if (!_hasView) {
      setInner("pageBody", permissionDeniedState("You don't have permission to view visitors. Ask an owner or administrator to grant you presence.view_live_register."));
    } else {
      const siteList = await listSites(_companyId);
      _siteId = await ensureSiteSelected(_companyId);
      renderSiteSwitcher(document.getElementById("siteSwitcher"), siteList, _siteId, async (newSiteId) => {
        setSelectedSiteId(newSiteId);
        _siteId = newSiteId;
        await renderActiveTab();
      });

      const s = await settings.get(_companyId).catch(() => null);
      _photoEnabled = !!s?.visitor_photo_enabled;

      _activeTab = _hasManage ? "signin" : "onsite";
      await renderActiveTab();
    }
  } catch (e) {
    if (e.message !== "__kiosk_redirect__") renderAccessBlocked(e);
  }

  function renderShell() {
    const tabs = [
      _hasManage ? { id: "signin", label: "Sign In Visitor" } : null,
      { id: "onsite", label: "Currently Onsite" },
      { id: "history", label: "History" },
    ].filter(Boolean);

    setInner("pageBody", `
      <div class="pfs-tabs2" role="tablist" aria-label="Visitor views">
        ${tabs.map(t => `<button class="pfs-tab2" role="tab" data-tab="${t.id}" aria-selected="${_activeTab === t.id}">${esc(t.label)}</button>`).join("")}
      </div>
      <div id="tabBody"></div>`);

    document.querySelectorAll(".pfs-tab2").forEach(btn => {
      btn.addEventListener("click", () => { _activeTab = btn.dataset.tab; renderActiveTab(); });
    });
  }

  async function renderActiveTab() {
    renderShell();
    if (!_siteId) { setInner("tabBody", emptyState({ icon: "map-pin", title: "No site configured", message: "Ask an administrator to set up a site first." })); return; }
    if (_activeTab === "signin" && _hasManage) renderSignInForm();
    else if (_activeTab === "history") await loadHistory();
    else await loadOnsite();
  }

  // ── Sign-in form ──────────────────────────────────────────────────────
  function renderSignInForm() {
    setInner("tabBody", `
      <div class="card" style="max-width:720px">
        <form id="visitForm" novalidate>
          <div class="form-grid">
            <div>
              <label class="form-label" for="vFirst">First name *</label>
              <input class="form-input" id="vFirst" required/>
            </div>
            <div>
              <label class="form-label" for="vLast">Last name *</label>
              <input class="form-input" id="vLast" required/>
            </div>
            <div>
              <label class="form-label" for="vOrg">Organisation</label>
              <input class="form-input" id="vOrg"/>
            </div>
            <div>
              <label class="form-label" for="vEmail">Email</label>
              <input class="form-input" id="vEmail" type="email"/>
            </div>
            <div>
              <label class="form-label" for="vPhone">Phone</label>
              <input class="form-input" id="vPhone" type="tel"/>
            </div>
            <div>
              <label class="form-label" for="vVehicle">Vehicle registration</label>
              <input class="form-input" id="vVehicle"/>
            </div>
            <div class="full combobox">
              <label class="form-label" for="vHost">Host employee</label>
              <input class="form-input" id="vHost" autocomplete="off" placeholder="Search employees…"/>
              <div class="combobox-results" id="vHostResults" hidden></div>
            </div>
            <div class="full">
              <label class="form-label" for="vReason">Visit reason</label>
              <input class="form-input" id="vReason"/>
            </div>
            ${_photoEnabled ? `
            <div class="full">
              <label class="form-label" for="vPhoto">Visitor photo (optional)</label>
              <input type="file" id="vPhoto" accept="image/*" capture="environment"/>
            </div>` : ""}
            <div class="full checkbox-row">
              <input type="checkbox" id="vTerms" required/>
              <label for="vTerms">Visitor confirms they have read and accept the site terms and safety briefing *</label>
            </div>
          </div>
          <div id="vFormError"></div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="vSubmitBtn">Sign In Visitor</button>
          </div>
        </form>
      </div>`);

    _selectedHost = null;
    const hostInput = document.getElementById("vHost");
    const hostResults = document.getElementById("vHostResults");
    hostInput.addEventListener("input", () => {
      _selectedHost = null;
      clearTimeout(_hostSearchDebounce);
      const q = hostInput.value.trim();
      if (!q) { hostResults.hidden = true; return; }
      _hostSearchDebounce = setTimeout(async () => {
        try {
          const rows = await employees.search(_companyId, q, { limit: 8 });
          hostResults.hidden = rows.length === 0;
          hostResults.innerHTML = rows.map(r => `<button type="button" class="combobox-result" data-id="${esc(r.id)}" data-name="${esc(r.full_name)}">${esc(r.full_name)}${r.job_title ? " — " + esc(r.job_title) : ""}</button>`).join("");
          hostResults.querySelectorAll(".combobox-result").forEach(btn => {
            btn.addEventListener("click", () => {
              _selectedHost = { id: btn.dataset.id, full_name: btn.dataset.name };
              hostInput.value = btn.dataset.name;
              hostResults.hidden = true;
            });
          });
        } catch { /* non-fatal: host is optional */ }
      }, 300);
    });
    document.addEventListener("click", (e) => { if (!e.target.closest(".combobox")) hostResults.hidden = true; }, { once: false });

    document.getElementById("visitForm").addEventListener("submit", onSubmitVisit);
  }

  async function onSubmitVisit(e) {
    e.preventDefault();
    const firstName = document.getElementById("vFirst").value.trim();
    const lastName = document.getElementById("vLast").value.trim();
    const acceptTerms = document.getElementById("vTerms").checked;
    const errBox = document.getElementById("vFormError");
    errBox.innerHTML = "";

    if (!firstName || !lastName) { errBox.innerHTML = `<p class="form-error">First and last name are required.</p>`; return; }
    if (!acceptTerms) { errBox.innerHTML = `<p class="form-error">The visitor must accept the site terms before signing in.</p>`; return; }

    const submitBtn = document.getElementById("vSubmitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = "Signing in…";

    const photoFile = document.getElementById("vPhoto")?.files?.[0] || null;

    try {
      const visit = await visitors.createVisit({
        siteId: _siteId,
        firstName, lastName,
        organisation: document.getElementById("vOrg").value.trim(),
        email: document.getElementById("vEmail").value.trim(),
        phone: document.getElementById("vPhone").value.trim(),
        vehicleRegistration: document.getElementById("vVehicle").value.trim(),
        hostEmployeeId: _selectedHost?.id || null,
        visitReason: document.getElementById("vReason").value.trim(),
        acceptTerms,
        signInNow: true,
      });

      // The visitor row must exist before a photo can be uploaded to
      // `${companyId}/${visitorId}/...` — so we upload and attach the photo
      // as a follow-up step after the visit (and sign-in event) succeed,
      // rather than blocking the sign-in on the upload. See
      // shared/api.js visitors.setPhoto for the rationale.
      if (photoFile && visit?.visitor_id) {
        try {
          const path = await visitors.uploadPhoto(_companyId, visit.visitor_id, photoFile);
          await visitors.setPhoto(visit.visitor_id, path);
        } catch (photoErr) {
          toast("error", "Visitor signed in, but photo failed to upload", photoErr.message || "You can try again later.");
        }
      }

      toast("success", "Visitor signed in", `${firstName} ${lastName}`);
      _activeTab = "onsite";
      await renderActiveTab();
    } catch (err) {
      errBox.innerHTML = `<p class="form-error">${esc(err.message || "Could not sign in visitor.")}</p>`;
      submitBtn.disabled = false;
      submitBtn.textContent = "Sign In Visitor";
    }
  }

  // ── Currently onsite ──────────────────────────────────────────────────
  async function loadOnsite() {
    setInner("tabBody", loadingState("Loading visitors onsite…"));
    try {
      const rows = await visitors.currentVisits(_companyId, _siteId);
      _lastRefreshed = new Date();
      if (rows.length === 0) {
        setInner("tabBody", emptyState({ icon: "user-round", title: "No visitors onsite", message: "Visitors who sign in will appear here." }));
        return;
      }
      setInner("tabBody", `
        <p style="margin:0 0 10px">${staleBadge(_lastRefreshed)}</p>
        <div class="tbl-wrap"><table class="tbl">
          <thead><tr><th>Name</th><th>Organisation</th><th>Host</th><th>Signed In</th><th>Phone</th>${_hasManage ? "<th></th>" : ""}</tr></thead>
          <tbody>
            ${rows.map(v => {
              const visitor = v.presence_fire_safety_visitors || {};
              return `<tr>
                <td>${esc(visitor.first_name || "")} ${esc(visitor.last_name || "")}</td>
                <td>${esc(visitor.organisation || "—")}</td>
                <td>${esc(v.core_employees?.full_name || "—")}</td>
                <td>${esc(fmtDateTime(v.signed_in_at))}</td>
                <td>${esc(visitor.phone || "—")}</td>
                ${_hasManage ? `<td><button class="btn btn-danger" data-signout="${esc(v.id)}" data-name="${esc((visitor.first_name||"")+" "+(visitor.last_name||""))}">Sign Out</button></td>` : ""}
              </tr>`;
            }).join("")}
          </tbody>
        </table></div>`);

      document.querySelectorAll("[data-signout]").forEach(btn => {
        btn.addEventListener("click", () => {
          const visitId = btn.dataset.signout;
          const name = btn.dataset.name;
          confirmDialog("Sign out visitor?", `Sign ${name} out of the site now?`, async () => {
            btn.disabled = true;
            try {
              await visitors.signOut(_companyId, visitId);
              toast("success", "Visitor signed out", name);
              await loadOnsite();
            } catch (err) {
              toast("error", "Could not sign out", err.message || "Please try again.");
              btn.disabled = false;
            }
          }, { danger: true, confirmLabel: "Sign Out" });
        });
      });
    } catch (e) {
      setInner("tabBody", errorState({ title: "Couldn't load onsite visitors", message: e.message || "", retryId: "onsiteRetry" }));
      document.getElementById("onsiteRetry")?.addEventListener("click", loadOnsite);
    }
  }

  // ── History ───────────────────────────────────────────────────────────
  async function loadHistory() {
    setInner("tabBody", loadingState("Loading visitor history…"));
    try {
      const rows = await visitors.history(_companyId, { siteId: _siteId, limit: 200 });
      if (rows.length === 0) {
        setInner("tabBody", emptyState({ icon: "history", title: "No visitor history yet", message: "Past visits for this site will appear here." }));
        return;
      }
      setInner("tabBody", `
        <div class="tbl-wrap"><table class="tbl">
          <thead><tr><th>Name</th><th>Organisation</th><th>Status</th><th>Signed In</th><th>Signed Out</th></tr></thead>
          <tbody>
            ${rows.map(v => {
              const visitor = v.presence_fire_safety_visitors || {};
              const statusBadge = { signed_in: "badge-green", signed_out: "badge-grey", expected: "badge-yellow", cancelled: "badge-red" }[v.status] || "badge-grey";
              return `<tr>
                <td>${esc(visitor.first_name || "")} ${esc(visitor.last_name || "")}</td>
                <td>${esc(visitor.organisation || "—")}</td>
                <td><span class="badge ${statusBadge}">${esc(v.status)}</span></td>
                <td>${esc(fmtDateTime(v.signed_in_at))}</td>
                <td>${esc(fmtDateTime(v.signed_out_at))}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table></div>`);
    } catch (e) {
      setInner("tabBody", errorState({ title: "Couldn't load visitor history", message: e.message || "", retryId: "histRetry" }));
      document.getElementById("histRetry")?.addEventListener("click", loadHistory);
    }
  }

  // ── Access-blocked rendering (see index.html for rationale) ────────────
  function renderAccessBlocked(e) {
    const msg = e?.message || "";
    document.body.innerHTML = `
      <div class="pfs-shell">
        <div class="pfs-main" style="width:100%">
          <div class="pfs-topbar">
            <h1>Presence &amp; Fire Safety</h1>
            <button class="icon-btn" id="themeToggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
            <button class="icon-btn" id="logoutBtn" aria-label="Sign out"><i data-lucide="log-out"></i></button>
          </div>
          <div class="pfs-content" id="content"></div>
        </div>
      </div>
      <div id="toastwrap" aria-live="polite"></div>`;
    initTheme();
    initTopbar();

    let html;
    if (msg.includes("not enabled")) html = moduleDisabledState();
    else if (msg.includes("permission") || msg.includes("No access")) html = permissionDeniedState(msg);
    else if (msg.includes("profile") || msg.includes("session")) html = permissionDeniedState(msg || "Your account isn't set up for this module yet.");
    else html = errorState({ title: "Couldn't load Presence & Fire Safety", message: msg, retryId: "blockedRetry" });

    setInner("content", html);
    document.getElementById("blockedRetry")?.addEventListener("click", () => window.location.reload());
  }

  function wireOfflineBanner() {
    const render = () => setInner("offlineArea", navigator.onLine ? "" : offlineBanner());
    render();
    window.addEventListener("online", render);
    window.addEventListener("offline", render);
  }
</script>
</body>
</html>
