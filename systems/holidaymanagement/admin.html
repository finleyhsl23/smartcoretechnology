<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Requests — SmartCore Holiday Management</title>
  <link rel="stylesheet" href="./assets/css/holidaymanagement.css" />
</head>
<body class="app-page">
  <div id="appLoader" class="page-loader">Loading requests...</div>

  <div class="app-layout hidden" id="appLayout">
    <aside class="sidebar glass-card">
      <div class="brand-wrap">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        </div>
        <div>
          <div class="brand-title">Holiday Management</div>
          <div class="brand-sub">SmartCore Technology</div>
        </div>
      </div>
      <a href="./select-company.html" class="company-pill" id="companyPill">
        <div class="company-pill-avatar" id="companyAvatar">?</div>
        <div>
          <div class="company-pill-name" id="companyName">Loading...</div>
          <div class="company-pill-role" id="companyRole"></div>
        </div>
        <span class="company-pill-arrow">⇄</span>
      </a>
      <nav class="sidebar-nav">
        <a href="./home.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>Dashboard</a>
        <a href="./my-leave.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>My Leave</a>
        <a href="./request.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>Request Leave</a>
        <a href="./calendar.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>Calendar</a>
        <a href="./employee-management.html" class="nav-link admin-only-link"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg>Employees</a>
        <a href="./admin.html" class="nav-link active admin-only-link"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>Leave Requests</a>
        <a href="./company-holidays.html" class="nav-link admin-only-link"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>Company Holidays</a>
      </nav>
      <button class="btn btn-secondary btn-block" id="logoutBtn" style="margin-top:auto">Sign Out</button>
    </aside>

    <main class="main-content">
      <header class="topbar glass-card">
        <div><h1>Leave Requests</h1><p class="muted">Review and manage team requests</p></div>
      </header>

      <div class="glass-card panel">
        <div class="panel-header" style="margin-bottom:16px">
          <div class="filters-inline">
            <div class="custom-select" id="statusFilter">
              <button class="custom-select-trigger" type="button">Status: <b>Pending</b> ▾</button>
              <div class="custom-select-menu">
                <button data-val="pending">Pending</button>
                <button data-val="">All</button>
                <button data-val="approved">Approved</button>
                <button data-val="rejected">Rejected</button>
                <button data-val="cancelled">Cancelled</button>
                <button data-val="cancel_requested">Cancel Requests</button>
              </div>
            </div>
            <select id="typeFilter" style="max-width:160px">
              <option value="">All Types</option>
              <option value="annual">Annual</option>
              <option value="sick">Sick</option>
              <option value="other">Other</option>
            </select>
          </div>
          <p class="muted small" id="reqCount"></p>
        </div>
        <div class="card-list" id="requestList">
          <p class="empty-state muted">Loading...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Decision modal -->
  <div class="modal-backdrop hidden" id="decisionModal">
    <div class="modal-card glass-card">
      <div class="modal-header">
        <div><h2 id="decisionTitle">Review Request</h2><p class="muted" id="decisionSub"></p></div>
        <button class="btn btn-secondary icon-btn" id="closeDecisionModal">✕</button>
      </div>
      <div class="modal-grid" id="decisionDetails" style="margin-bottom:18px"></div>
      <div class="field">
        <label for="decisionNote">Note (optional)</label>
        <textarea id="decisionNote" placeholder="Add a note for the employee..."></textarea>
      </div>
      <div class="toggle-row" id="deductToggleRow">
        <input type="checkbox" id="deductAllowance" checked />
        <label for="deductAllowance">Deduct from annual leave allowance</label>
      </div>
      <p class="form-message" id="decisionMsg"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="closeDecisionModal2">Close</button>
        <button class="btn btn-danger" id="rejectBtn">Reject</button>
        <button class="btn btn-success" id="approveBtn">Approve</button>
      </div>
    </div>
  </div>

  <script type="module" src="./assets/js/admin.js"></script>
</body>
</html>
