<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCore Admin — Holiday Management</title>
  <link rel="stylesheet" href="./assets/css/holidaymanagement.css" />
</head>
<body class="app-page">
  <div id="appLoader" class="page-loader">Loading admin portal...</div>

  <div class="hidden" id="appLayout">
    <header class="sc-admin-header glass-card">
      <div class="brand-icon" style="width:32px;height:32px;border-radius:8px">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
      </div>
      <span style="font-weight:700;font-size:15px">SmartCore Holiday Management</span>
      <span class="sc-admin-badge">Internal Admin</span>
      <div style="margin-left:auto;display:flex;gap:10px;align-items:center">
        <span class="muted small" id="adminUserEmail"></span>
        <button class="btn btn-secondary" id="logoutBtn">Sign Out</button>
      </div>
    </header>

    <div class="sc-admin-wrap">
      <div class="stats-grid" style="margin-bottom:20px">
        <div class="glass-card stat-card">
          <div class="stat-label">Total Companies</div>
          <div class="stat-value" id="statCompanies">—</div>
        </div>
        <div class="glass-card stat-card">
          <div class="stat-label">Total Employees</div>
          <div class="stat-value" id="statEmployees">—</div>
        </div>
        <div class="glass-card stat-card">
          <div class="stat-label">Active Companies</div>
          <div class="stat-value" id="statActive">—</div>
        </div>
        <div class="glass-card stat-card">
          <div class="stat-label">Pending Invites</div>
          <div class="stat-value" id="statInvites">—</div>
        </div>
      </div>

      <div class="glass-card panel">
        <div class="panel-header" style="margin-bottom:16px">
          <h2 style="margin:0">Companies</h2>
          <button class="btn btn-primary" id="createCompanyBtn">+ New Company</button>
        </div>
        <div class="filters-inline" style="margin-bottom:16px">
          <input type="text" id="companySearch" placeholder="Search companies..." style="max-width:280px" />
        </div>
        <div class="card-list" id="companyList">
          <p class="empty-state muted">Loading...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Create company modal -->
  <div class="modal-backdrop hidden" id="createCompanyModal">
    <div class="modal-card glass-card narrow">
      <div class="modal-header">
        <div><h2>New Company</h2><p class="muted">This will also send an owner invite.</p></div>
        <button class="btn btn-secondary icon-btn" id="closeCreateCompany">✕</button>
      </div>
      <div class="form-stack">
        <div class="field"><label>Company Name</label><input type="text" id="newCompanyName" placeholder="Acme Ltd" /></div>
        <div class="field"><label>Owner Name</label><input type="text" id="newOwnerName" placeholder="Jane Smith" /></div>
        <div class="field"><label>Owner Email</label><input type="email" id="newOwnerEmail" placeholder="jane@acme.co.uk" /></div>
        <div class="field"><label>Default Leave Allowance (days)</label><input type="number" id="newAllowance" value="28" min="0" max="365" /></div>
        <p class="form-message" id="createCompanyMsg"></p>
        <div class="modal-actions" style="margin-top:0">
          <button class="btn btn-secondary" id="closeCreateCompany2">Cancel</button>
          <button class="btn btn-primary" id="saveCreateCompany">Create &amp; Invite Owner</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Company detail modal -->
  <div class="modal-backdrop hidden" id="companyDetailModal">
    <div class="modal-card glass-card">
      <div class="modal-header">
        <div><h2 id="detailCompanyName">—</h2><p class="muted" id="detailCompanySub">—</p></div>
        <button class="btn btn-secondary icon-btn" id="closeCompanyDetail">✕</button>
      </div>
      <div id="companyDetailBody"></div>
    </div>
  </div>

  <script type="module" src="./assets/js/smartcore-admin.js"></script>
</body>
</html>
