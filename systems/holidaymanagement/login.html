<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SmartCore Holiday Management</title>
  <link rel="stylesheet" href="./assets/css/holidaymanagement.css" />
</head>
<body class="page-shell">
  <div class="auth-shell">
    <div class="auth-card glass-card">
      <div class="auth-logo-wrap">
        <div class="auth-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
        <div class="auth-logo-text">
          <div class="auth-logo-title">SmartCore Technology</div>
          <div class="auth-logo-sub">Holiday Management</div>
        </div>
      </div>

      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-subheading muted">Sign in to your account to continue</p>

      <form class="form-stack" id="loginForm">
        <div class="field">
          <label for="emailInput">Email address</label>
          <input type="email" id="emailInput" placeholder="you@company.com" required />
        </div>
        <div class="field">
          <label for="passwordInput">Password</label>
          <input type="password" id="passwordInput" placeholder="••••••••" required />
        </div>
        <p class="form-message" id="loginMsg"></p>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
      </form>

      <p class="muted small" style="margin-top:20px">
        New employee? Check your email for an invitation link.
      </p>
    </div>
  </div>

  <script type="module" src="./assets/js/login.js"></script>
</body>
</html>
