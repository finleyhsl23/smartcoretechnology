<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SmartCore Holiday Management</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <a class="auth-logo" href="#">
        <div class="auth-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
          </svg>
        </div>
        <div class="auth-logo-text">
          <div class="auth-logo-title">SmartCore</div>
          <div class="auth-logo-sub">Technology</div>
        </div>
      </a>
      <h1 class="auth-heading">Sign In</h1>
      <p class="auth-subheading">Holiday Management System</p>
    </div>
    <div class="auth-body">
      <div id="error-box" class="warning-box mb-3 hidden">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.7" stroke="currentColor" style="width:15px;height:15px;flex-shrink:0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/>
        </svg>
        <span id="error-msg"></span>
      </div>

      <form id="login-form">
        <div class="form-group mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="submit-btn">
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" class="spinner spinner-sm hidden" style="border-top-color:#fff"></span>
        </button>
      </form>

      <p class="text-center text-sm text-muted mt-4">
        <a href="#" id="forgot-link">Forgot your password?</a>
      </p>

      <div id="reset-box" class="hidden" style="margin-top:16px">
        <div class="info-box mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.7" stroke="currentColor" style="width:15px;height:15px;flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"/></svg>
          Enter your email above and click Send Reset Email.
        </div>
        <button class="btn btn-secondary w-full" id="reset-btn">Send Reset Email</button>
      </div>
    </div>
    <div style="padding:14px 32px;border-top:1px solid var(--border);background:var(--bg-surface-2);text-align:center">
      <p class="text-sm text-muted">Powered by <strong style="color:var(--text-secondary)">SmartCore Technology</strong></p>
      <p style="font-size:10px;color:var(--text-muted);margin-top:2px">Practical Technology. Built to Last.</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
(async () => {
  initTheme();

  // If already logged in, redirect
  const user = await getUser();
  if (user) {
    const mems = await getUserMemberships(user.id);
    if (mems.length === 1) {
      setSelectedCompany({ ...mems[0].companies, role: mems[0].role, membershipId: mems[0].id });
      window.location.href = APP_BASE + '/app/dashboard.html';
    } else {
      window.location.href = APP_BASE + '/select-company.html';
    }
    return;
  }

  const form    = document.getElementById('login-form');
  const errorBox = document.getElementById('error-box');
  const errorMsg = document.getElementById('error-msg');
  const btnText  = document.getElementById('btn-text');
  const btnSpin  = document.getElementById('btn-spinner');
  const submitBtn= document.getElementById('submit-btn');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorBox.classList.remove('hidden');
  }
  function clearError() { errorBox.classList.add('hidden'); }

  function setLoading(on) {
    submitBtn.disabled = on;
    btnText.classList.toggle('hidden', on);
    btnSpin.classList.toggle('hidden', !on);
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    clearError();
    setLoading(true);

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const sb = getSupabase();
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      setLoading(false);
      showError(error.message === 'Invalid login credentials'
        ? 'Incorrect email or password. Please try again.'
        : error.message);
      return;
    }

    const user = data.user;
    const mems = await getUserMemberships(user.id);

    if (mems.length === 0) {
      window.location.href = APP_BASE + '/select-company.html';
    } else if (mems.length === 1) {
      setSelectedCompany({ ...mems[0].companies, role: mems[0].role, membershipId: mems[0].id });
      window.location.href = APP_BASE + '/app/dashboard.html';
    } else {
      window.location.href = APP_BASE + '/select-company.html';
    }
  });

  document.getElementById('forgot-link').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('reset-box').classList.toggle('hidden');
  });

  document.getElementById('reset-btn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Please enter your email address first.'); return; }
    const sb = getSupabase();
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + APP_BASE + '/login.html',
    });
    if (error) { showError(error.message); return; }
    toast('Password reset email sent. Check your inbox.', 'success');
    document.getElementById('reset-box').classList.add('hidden');
  });
})();
</script>
</body>
</html>
