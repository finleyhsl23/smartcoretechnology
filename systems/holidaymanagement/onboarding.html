<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Onboarding | SmartCore</title><link rel="stylesheet" href="./assets/css/holidaymanagement.css"></head><body><div class="setup-shell"><div class="glass-card panel"><div class="smartcore-wordmark">SC</div><h1>SmartCore Onboarding</h1><p class="muted" id="intro">Loading invite...</p><p id="loadingState" class="muted"></p><section id="companySetup" class="hidden"><form id="companyOnboardingForm" class="form-grid"><h2 class="full-width">Company Setup</h2><div class="field"><label>Display Name</label><input id="companyDisplayName" required></div><div class="field"><label>Address</label><input id="companyAddress"></div><div class="field"><label>Postcode</label><input id="companyPostcode"></div><div class="field"><label>Country</label><input id="companyCountry" value="United Kingdom"></div><div class="field"><label>Main Email</label><input id="mainEmail" type="email"></div><div class="field"><label>Main Phone</label><input id="mainPhone"></div><div class="field"><label>Holiday Year Start Month</label><input id="holidayYearStartMonth" type="number" value="1"></div><div class="field"><label>Holiday Year Start Day</label><input id="holidayYearStartDay" type="number" value="1"></div><div class="field"><label>Bank Holiday Region</label><select id="bankHolidayRegion"><option value="england-and-wales">England and Wales</option><option value="scotland">Scotland</option><option value="northern-ireland">Northern Ireland</option></select></div><div class="field"><label>Default Allowance</label><input id="defaultAllowance" type="number" step="0.5" value="28"></div><div class="field"><label>Bank Holidays Included?</label><select id="bankHolidaysIncluded"><option value="true">Yes</option><option value="false">No</option></select></div><h2 class="full-width">Owner Profile</h2><div class="field"><label>Full Name</label><input id="ownerFullName" required></div><div class="field"><label>Job Title</label><input id="ownerJobTitle"></div><div class="field"><label>Phone</label><input id="ownerPhone"></div><div class="field"><label>Create Password</label><input id="ownerPassword" type="password" minlength="8"></div><button class="btn btn-primary full-width">Complete Company Setup</button></form><div id="companyOnboardingMessage" class="form-message"></div></section><section id="employeeSetup" class="hidden"><form id="employeeOnboardingForm" class="form-grid"><h2 class="full-width">Employee Onboarding</h2><div class="field"><label>Password</label><input id="password" type="password" minlength="8"></div><div class="field"><label>Full Name</label><input id="fullName" required></div><div class="field"><label>Personal Email</label><input id="personalEmail"></div><div class="field"><label>Personal Phone</label><input id="personalPhone"></div><div class="field"><label>Title</label><input id="title"></div><div class="field"><label>Pronouns</label><input id="pronouns"></div><div class="field"><label>Date of Birth</label><input id="dob" type="date"></div><div class="field"><label>NI Number</label><input id="niNumber"></div><div class="field"><label>Address Line 1</label><input id="addressLine1"></div><div class="field"><label>Address Line 2</label><input id="addressLine2"></div><div class="field"><label>City</label><input id="addressCity"></div><div class="field"><label>County</label><input id="addressCounty"></div><div class="field"><label>Postcode</label><input id="addressPostcode"></div><div class="field"><label>Country</label><input id="addressCountry" value="United Kingdom"></div><div class="field"><label>Emergency Contact 1 Name</label><input id="emergencyContactName1" required></div><div class="field"><label>Relationship</label><input id="emergencyContactRelationship1" required></div><div class="field"><label>Email</label><input id="emergencyContactEmail1"></div><div class="field"><label>Phone</label><input id="emergencyContactPhone1" required></div><div class="field"><label>Emergency Contact 2 Name</label><input id="emergencyContactName2"></div><div class="field"><label>Relationship</label><input id="emergencyContactRelationship2"></div><div class="field"><label>Email</label><input id="emergencyContactEmail2"></div><div class="field"><label>Phone</label><input id="emergencyContactPhone2"></div><button class="btn btn-primary full-width">Complete Onboarding</button></form><div id="employeeOnboardingMessage" class="form-message"></div></section><section id="completeState" class="hidden"><h2>Setup complete</h2><p class="muted">You can now sign in.</p><a class="btn btn-primary" href="./login.html">Go to login</a></section></div></div><script type="module" src="./assets/js/onboarding.js"></script></body></html>
