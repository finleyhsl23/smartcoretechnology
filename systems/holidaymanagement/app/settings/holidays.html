<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holidays — SmartCore</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">Settings</div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" id="sync-bh-btn">Sync Bank Holidays</button>
        <button class="btn btn-primary btn-sm" id="add-holiday-btn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:14px;height:14px"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          Add Holiday
        </button>
      </div>
    </div>
    <div class="page-content">
      <div class="grid" style="grid-template-columns:200px 1fr;gap:20px;align-items:start">
        <!-- Settings nav -->
        <div class="card">
          <div class="card-body" style="padding:8px 0">
            <a href="/systems/holidaymanagement/app/settings/departments.html" class="nav-link">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.7" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"/></svg>
              Departments
            </a>
            <a href="/systems/holidaymanagement/app/settings/shift-patterns.html" class="nav-link">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.7" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
              Shift Patterns
            </a>
            <a href="/systems/holidaymanagement/app/settings/holidays.html" class="nav-link active">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.7" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>
              Holidays
            </a>
            <a href="/systems/holidaymanagement/app/settings/company.html" class="nav-link">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.7" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
              Company
            </a>
          </div>
        </div>

        <!-- Holidays panel -->
        <div>
          <div class="section-header mb-4">
            <div>
              <div class="section-title">Company Holidays</div>
              <div class="section-sub">Manage public holidays and company-specific closures.</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <select class="form-control" id="year-filter" style="width:110px"></select>
            </div>
          </div>

          <div class="info-box mb-4" id="bh-info">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.7" stroke="currentColor" style="width:15px;height:15px;flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"/></svg>
            <span>Loading bank holiday region…</span>
          </div>

          <div class="card">
            <div id="hols-loading" class="page-loading" style="min-height:200px"><div class="spinner spinner-lg"></div></div>
            <div class="table-wrap hidden" id="hols-table">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="hols-tbody"></tbody>
              </table>
            </div>
            <div class="empty-state hidden" id="hols-empty">
              <div class="empty-state-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>
              </div>
              <h3>No holidays for this year</h3>
              <p>Sync bank holidays from the UK Government API or add custom holidays.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add holiday modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <div><div class="modal-title">Add Company Holiday</div></div>
      <button class="modal-close" onclick="document.getElementById('add-modal').classList.remove('open')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group mb-3">
        <label class="form-label">Date <span class="required">*</span></label>
        <input type="date" class="form-control" id="h-date">
      </div>
      <div class="form-group mb-3">
        <label class="form-label">Name <span class="required">*</span></label>
        <input type="text" class="form-control" id="h-name" placeholder="e.g. Company Away Day">
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-control" id="h-type">
          <option value="company">Company Holiday</option>
          <option value="bank">Bank Holiday</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('add-modal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" id="save-holiday-btn">Add Holiday</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components.js"></script>
<script>
let _company     = null;
let _user        = null;
let _selectedYear= new Date().getFullYear();

async function init() {
  const ctx = await requireCompany();
  if (!ctx) return;
  if (!isAdmin()) { window.location.href = APP_BASE + '/app/dashboard.html'; return; }
  _company = ctx.company;
  _user    = ctx.user;
  await renderSidebar('settings');

  // Year selector
  const ySel = document.getElementById('year-filter');
  const curY = new Date().getFullYear();
  for (let y = curY - 1; y <= curY + 2; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === curY) o.selected = true;
    ySel.appendChild(o);
  }
  ySel.addEventListener('change', () => { _selectedYear = parseInt(ySel.value); loadHolidays(); });

  // BH info
  const region = _company.default_bank_holiday_region;
  const regionLabel = BH_REGIONS.find(r => r.value === region)?.label || region || 'Not set';
  document.getElementById('bh-info').querySelector('span').textContent =
    `Bank holiday region: ${regionLabel}. Click "Sync Bank Holidays" to import from the UK Government API.`;

  document.getElementById('sync-bh-btn').addEventListener('click', syncBankHolidays);
  document.getElementById('add-holiday-btn').addEventListener('click', () => {
    document.getElementById('h-date').value = '';
    document.getElementById('h-name').value = '';
    document.getElementById('add-modal').classList.add('open');
  });
  document.getElementById('save-holiday-btn').addEventListener('click', saveHoliday);

  await loadHolidays();
}

async function loadHolidays() {
  document.getElementById('hols-loading').classList.remove('hidden');
  document.getElementById('hols-table').classList.add('hidden');
  document.getElementById('hols-empty').classList.add('hidden');

  const holidays = await Holidays.getCompanyHolidays(_company.id, _selectedYear);
  document.getElementById('hols-loading').classList.add('hidden');

  if (!holidays.length) {
    document.getElementById('hols-empty').classList.remove('hidden');
    return;
  }

  document.getElementById('hols-table').classList.remove('hidden');
  document.getElementById('hols-tbody').innerHTML = holidays.map(h => {
    const typeClass = h.type === 'bank' ? 'badge-info' : 'badge-accent';
    const typeLabel = h.type === 'bank' ? 'Bank Holiday' : 'Company';
    return `<tr>
      <td>${formatDate(h.holiday_date)}</td>
      <td><strong>${h.name}</strong></td>
      <td><span class="badge ${typeClass}">${typeLabel}</span></td>
      <td>
        <button class="btn btn-ghost btn-sm text-danger" onclick="deleteHoliday('${h.id}','${h.name}')">Remove</button>
      </td>
    </tr>`;
  }).join('');
}

async function syncBankHolidays() {
  const btn = document.getElementById('sync-bh-btn');
  btn.disabled = true;
  btn.textContent = 'Syncing…';
  try {
    const result = await callAPI('/api/bank-holidays', {
      company_id: _company.id,
      region:     _company.default_bank_holiday_region || 'england-and-wales',
      year:       _selectedYear,
    });
    toast(`Synced ${result.imported || 0} bank holidays for ${_selectedYear}.`, 'success');
    await loadHolidays();
  } catch(e) {
    toast('Sync failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sync Bank Holidays';
  }
}

async function saveHoliday() {
  const date = document.getElementById('h-date').value;
  const name = document.getElementById('h-name').value.trim();
  const type = document.getElementById('h-type').value;
  if (!date || !name) { toast('Date and name are required.', 'warning'); return; }
  try {
    await Holidays.addCompanyHoliday({ company_id: _company.id, holiday_date: date, name, type });
    toast('Holiday added.', 'success');
    document.getElementById('add-modal').classList.remove('open');
    await loadHolidays();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteHoliday(id, name) {
  const ok = await confirm('Remove Holiday', `Remove "${name}" from the holiday list?`, { danger: true, confirmLabel: 'Remove' });
  if (!ok) return;
  try {
    await Holidays.deleteCompanyHoliday(id);
    toast('Holiday removed.', 'success');
    await loadHolidays();
  } catch(e) { toast(e.message, 'error'); }
}

init();
</script>
</body>
</html>
