<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — SmartCore</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .calendar-cell { min-height: 100px; padding: 6px; }
    .cal-popup {
      position: fixed; z-index: 500;
      background: var(--bg-surface);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 14px;
      min-width: 220px;
      max-width: 280px;
    }
    .cal-popup-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); }
    .cal-popup-person { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
    .cal-popup-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
    .cal-popup-job  { font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">Calendar</div>
    </div>
    <div class="page-content">

      <!-- Controls -->
      <div class="card mb-4">
        <div class="card-body" style="padding:14px 18px">
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
            <!-- Month navigation -->
            <div class="calendar-nav">
              <button class="btn btn-secondary btn-sm btn-icon" id="prev-month">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
              </button>
              <h2 id="month-label" style="min-width:160px;text-align:center;font-size:15px;font-weight:700"></h2>
              <button class="btn btn-secondary btn-sm btn-icon" id="next-month">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
              </button>
              <button class="btn btn-secondary btn-sm" id="today-btn">Today</button>
            </div>

            <!-- Department filters -->
            <div style="flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="text-sm text-muted font-semibold">Departments:</span>
              <div id="dept-filters" class="dept-filter"></div>
              <button class="btn btn-ghost btn-sm" id="toggle-all-depts">Hide All</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Calendar grid -->
      <div class="card">
        <div class="card-body" style="padding:0;overflow:hidden">
          <div class="calendar-grid" id="calendar-grid">
            <!-- Day headers -->
            <div class="calendar-header-cell">Mon</div>
            <div class="calendar-header-cell">Tue</div>
            <div class="calendar-header-cell">Wed</div>
            <div class="calendar-header-cell">Thu</div>
            <div class="calendar-header-cell">Fri</div>
            <div class="calendar-header-cell">Sat</div>
            <div class="calendar-header-cell">Sun</div>
          </div>
          <div id="cal-loading" class="page-loading" style="min-height:400px"><div class="spinner spinner-lg"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Day popup -->
<div id="cal-popup" class="cal-popup hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components.js"></script>
<script>
let _company = null;
let _viewYear  = new Date().getFullYear();
let _viewMonth = new Date().getMonth() + 1; // 1-based
let _leaveData = [];
let _depts     = [];
let _hiddenDepts = new Set();
let _allDepts  = [];
let _toggleAll = false;

async function init() {
  const ctx = await requireCompany();
  if (!ctx) return;
  _company = ctx.company;
  await renderSidebar('calendar');
  await loadCalendar();
}

async function loadCalendar() {
  document.getElementById('cal-loading').classList.remove('hidden');
  document.getElementById('month-label').textContent =
    MONTHS[_viewMonth - 1] + ' ' + _viewYear;

  // Load leave for this month
  _leaveData = await LeaveRequests.getForMonth(_company.id, _viewYear, _viewMonth);

  // Collect departments
  const deptSet = new Set();
  _leaveData.forEach(r => { if (r.employees?.department) deptSet.add(r.employees.department); });
  _allDepts = [...deptSet].sort();

  // Render dept filter chips
  renderDeptFilters();
  renderGrid();
  document.getElementById('cal-loading').classList.add('hidden');
}

function renderDeptFilters() {
  const container = document.getElementById('dept-filters');
  container.innerHTML = _allDepts.map(dept => {
    const colour = getDeptColour(dept);
    const hidden = _hiddenDepts.has(dept);
    return `<div class="dept-chip${hidden ? ' off' : ''}"
      style="background:${colour};border-color:${colour}"
      data-dept="${dept}"
      onclick="toggleDept('${dept}')">${dept}</div>`;
  }).join('');
}

function toggleDept(dept) {
  if (_hiddenDepts.has(dept)) _hiddenDepts.delete(dept);
  else _hiddenDepts.add(dept);
  renderDeptFilters();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('calendar-grid');
  // Remove all cells (keep headers - first 7 divs)
  const cells = grid.querySelectorAll('.calendar-cell');
  cells.forEach(c => c.remove());

  const firstDay = new Date(_viewYear, _viewMonth - 1, 1);
  const lastDay  = new Date(_viewYear, _viewMonth, 0);
  const today    = new Date(); today.setHours(0,0,0,0);

  // Monday = 0, so offset: Mon=1,Tue=2...Sun=0 → convert
  let startOffset = firstDay.getDay(); // 0=Sun,1=Mon...
  startOffset = startOffset === 0 ? 6 : startOffset - 1; // Mon-based

  // Build a map: date-string → [leave requests]
  const leaveByDate = {};
  _leaveData.forEach(r => {
    const s = new Date(r.start_date);
    const e = new Date(r.end_date);
    for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
      const key = d.toISOString().split('T')[0];
      if (!leaveByDate[key]) leaveByDate[key] = [];
      leaveByDate[key].push(r);
    }
  });

  // Blank cells before first day
  for (let i = 0; i < startOffset; i++) {
    const cell = document.createElement('div');
    cell.className = 'calendar-cell other-month';
    grid.appendChild(cell);
  }

  // Day cells
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const date    = new Date(_viewYear, _viewMonth - 1, day);
    const dateStr = date.toISOString().split('T')[0];
    const isToday = date.getTime() === today.getTime();

    const cell = document.createElement('div');
    cell.className = 'calendar-cell' + (isToday ? ' today' : '');

    const dayLeave = (leaveByDate[dateStr] || []).filter(r => {
      const dept = r.employees?.department;
      return !dept || !_hiddenDepts.has(dept);
    });

    // Max 3 visible events
    const visible  = dayLeave.slice(0, 3);
    const overflow = dayLeave.length - visible.length;

    cell.innerHTML = `
      <div class="cell-date">${day}</div>
      <div class="cell-events">
        ${visible.map(r => {
          const dept   = r.employees?.department;
          const colour = getDeptColour(dept);
          return `<div class="cell-event" style="background:${colour}" title="${r.employees?.full_name || ''}">${r.employees?.full_name?.split(' ')[0] || '?'}</div>`;
        }).join('')}
        ${overflow > 0 ? `<div class="cell-event" style="background:var(--bg-surface-3);color:var(--text-muted)">+${overflow} more</div>` : ''}
      </div>
    `;

    if (dayLeave.length > 0) {
      cell.addEventListener('click', e => showDayPopup(e, dateStr, dayLeave));
    }

    grid.appendChild(cell);
  }

  // Trailing blanks to complete the last row
  const total = startOffset + lastDay.getDate();
  const trail = (7 - (total % 7)) % 7;
  for (let i = 0; i < trail; i++) {
    const cell = document.createElement('div');
    cell.className = 'calendar-cell other-month';
    grid.appendChild(cell);
  }
}

function showDayPopup(e, dateStr, leaves) {
  const popup = document.getElementById('cal-popup');
  const d = new Date(dateStr);
  const label = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long' });

  popup.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="cal-popup-title" style="margin:0">${label}</div>
      <button onclick="document.getElementById('cal-popup').classList.add('hidden')" style="background:none;border:none;cursor:pointer;color:var(--text-muted)">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:14px;height:14px"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
      </button>
    </div>
    ${leaves.map(r => {
      const emp    = r.employees;
      const dept   = emp?.department;
      const colour = getDeptColour(dept);
      return `<div class="cal-popup-person">
        <div class="avatar avatar-sm" style="background:${colour};color:#fff;flex-shrink:0">${initials(emp?.full_name)}</div>
        <div>
          <div class="cal-popup-name">${emp?.full_name || 'Unknown'}</div>
          <div class="cal-popup-job">${emp?.job_title || ''}${dept ? ' · ' + dept : ''}</div>
        </div>
      </div>`;
    }).join('')}
  `;

  // Position popup near click
  const rect = e.currentTarget.getBoundingClientRect();
  let top  = rect.bottom + window.scrollY + 4;
  let left = rect.left + window.scrollX;
  popup.classList.remove('hidden');
  // Adjust if off-screen
  const pw = popup.offsetWidth;
  if (left + pw > window.innerWidth - 16) left = window.innerWidth - pw - 16;
  popup.style.top  = top + 'px';
  popup.style.left = left + 'px';
}

// Close popup when clicking elsewhere
document.addEventListener('click', e => {
  const popup = document.getElementById('cal-popup');
  if (!popup.classList.contains('hidden') && !popup.contains(e.target) && !e.target.closest('.calendar-cell')) {
    popup.classList.add('hidden');
  }
});

document.getElementById('prev-month').addEventListener('click', () => {
  _viewMonth--;
  if (_viewMonth < 1) { _viewMonth = 12; _viewYear--; }
  loadCalendar();
});
document.getElementById('next-month').addEventListener('click', () => {
  _viewMonth++;
  if (_viewMonth > 12) { _viewMonth = 1; _viewYear++; }
  loadCalendar();
});
document.getElementById('today-btn').addEventListener('click', () => {
  _viewYear  = new Date().getFullYear();
  _viewMonth = new Date().getMonth() + 1;
  loadCalendar();
});
document.getElementById('toggle-all-depts').addEventListener('click', function() {
  if (_toggleAll) {
    _hiddenDepts.clear();
    this.textContent = 'Hide All';
  } else {
    _allDepts.forEach(d => _hiddenDepts.add(d));
    this.textContent = 'Show All';
  }
  _toggleAll = !_toggleAll;
  renderDeptFilters();
  renderGrid();
});

init();
</script>
</body>
</html>
