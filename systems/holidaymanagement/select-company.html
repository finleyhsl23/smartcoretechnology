<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Company — SmartCore Holiday Management</title>
  <link rel="stylesheet" href="./assets/css/holidaymanagement.css" />
</head>
<body class="page-shell">
  <div id="appLoader" class="page-loader">Loading your companies...</div>

  <div class="auth-shell hidden" id="appLayout">
    <div class="auth-card glass-card" style="max-width:820px;width:100%">
      <div class="auth-logo-wrap">
        <div class="auth-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
        <div class="auth-logo-text">
          <div class="auth-logo-title">SmartCore Technology</div>
          <div class="auth-logo-sub">Holiday Management</div>
        </div>
      </div>

      <h1 class="auth-heading">Select a company</h1>
      <p class="auth-subheading muted">Choose which company you'd like to manage</p>

      <div class="company-selector-grid" id="companyList"></div>

      <p class="form-message" id="companyMsg"></p>

      <div style="margin-top:24px;border-top:1px solid rgba(255,255,255,0.08);padding-top:18px">
        <button class="btn btn-secondary" id="logoutBtn">Sign out</button>
      </div>
    </div>
  </div>

  <script type="module" src="./assets/js/select-company.js"></script>
</body>
</html>
