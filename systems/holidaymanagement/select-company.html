<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Company — SmartCore</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
<div class="auth-wrap" style="align-items:flex-start;padding-top:60px">
  <div style="width:100%;max-width:860px">
    <!-- Header -->
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:32px">
      <div class="auth-logo-icon" style="width:42px;height:42px;border-radius:10px">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:22px;height:22px;color:#fff">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
        </svg>
      </div>
      <div>
        <div style="font-size:22px;font-weight:800;color:var(--text-primary)">Select a Company</div>
        <div style="font-size:13px;color:var(--text-muted)">Choose which company to access</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">
          <span id="theme-toggle-icon"></span>
        </button>
        <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
      </div>
    </div>

    <!-- Loading state -->
    <div id="loading" class="page-loading"><div class="spinner spinner-lg"></div></div>

    <!-- No companies -->
    <div id="no-companies" class="hidden">
      <div class="card">
        <div class="card-body">
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
            </div>
            <h3>No companies linked</h3>
            <p>Your account is not linked to any company yet. Please contact your administrator or check your invite email.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Company grid -->
    <div id="company-grid" class="company-selector-grid hidden"></div>

    <!-- SmartCore admin link -->
    <div id="admin-link" class="hidden" style="margin-top:20px;text-align:center">
      <a href="/systems/holidaymanagement/admin/index.html" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.7" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>
        SmartCore Admin Portal
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/components.js"></script>
<script>
(async () => {
  initTheme();
  updateThemeIcon();
  document.getElementById('theme-btn').addEventListener('click', () => { toggleTheme(); updateThemeIcon(); });

  const user = await requireAuth();
  if (!user) return;

  // Check if SmartCore admin
  const scAdmin = await isSmartcoreAdmin();
  if (scAdmin) document.getElementById('admin-link').classList.remove('hidden');

  let memberships;
  try {
    memberships = await getUserMemberships(user.id);
  } catch(e) {
    toast('Failed to load companies: ' + e.message, 'error');
    memberships = [];
  }

  document.getElementById('loading').classList.add('hidden');

  if (!memberships.length) {
    document.getElementById('no-companies').classList.remove('hidden');
    return;
  }

  // Single company — auto-enter
  if (memberships.length === 1) {
    const m = memberships[0];
    if (m.companies?.status === 'active') {
      setSelectedCompany({ ...m.companies, role: m.role, membershipId: m.id });
      window.location.href = APP_BASE + '/app/dashboard.html';
      return;
    }
  }

  // Render grid
  const grid = document.getElementById('company-grid');
  grid.classList.remove('hidden');

  memberships.forEach(m => {
    const c = m.companies;
    if (!c) return;
    const letter = (c.display_name || c.company_name || '?')[0];
    const suspended = c.status !== 'active';

    const card = document.createElement('div');
    card.className = 'company-card';
    if (suspended) card.style.opacity = '0.5';
    card.innerHTML = `
      <div class="company-card-logo">
        ${c.logo_url ? `<img src="${c.logo_url}" alt="">` : letter}
      </div>
      <div>
        <div class="company-card-name">${c.display_name || c.company_name}</div>
        <div class="company-card-role">${m.role}${suspended ? ' · Suspended' : ''}</div>
      </div>
      <div style="margin-top:auto">
        <button class="btn btn-primary w-full${suspended ? ' hidden' : ''}">Enter →</button>
        ${suspended ? '<div class="badge badge-danger">Account Suspended</div>' : ''}
      </div>
    `;

    if (!suspended) {
      card.addEventListener('click', () => {
        setSelectedCompany({ ...c, role: m.role, membershipId: m.id });
        window.location.href = APP_BASE + '/app/dashboard.html';
      });
    }

    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
