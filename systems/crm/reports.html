<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reports — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=2"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Reports & Analytics</div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess, tierHasFeature } from "/systems/crm/shared/auth.js";
import { sb } from "/systems/crm/shared/supabase.js";
import { getProfile } from "/systems/crm/shared/auth.js";
import { renderNav, initMobileNav, initTopbar } from "/systems/crm/shared/nav.js?v=7";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, fmt, fmtDate, toast, tierGate, loading } from "/systems/crm/shared/ui.js";

initTheme();

let profile, tier;

try {
  ({ profile, tier } = await requireCRMAccess());
  renderNav("reports", profile, tier);
  initMobileNav();
  initTopbar(profile);

  if (!tierHasFeature(tier, "reports")) {
    document.getElementById("content").innerHTML = tierGate("reports");
  } else {
    await loadReports();
  }
} catch(e) { if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) toast("bad","Error",e.message); }

async function loadReports() {
  const tenantId = profile.company_id;
  const [leadsData, companiesData, tasksData, quotesData] = await Promise.all([
    sb().from("crm_leads").select("status,estimated_value,probability,source,created_at,pipeline_stage").eq("tenant_id", tenantId),
    sb().from("crm_companies").select("status,industry,created_at,company_value").eq("tenant_id", tenantId),
    sb().from("crm_tasks").select("status,priority,created_at").eq("tenant_id", tenantId),
    sb().from("crm_quotes").select("status,total,created_at").eq("tenant_id", tenantId),
  ]);

  const leads_ = leadsData.data || [];
  const comps  = companiesData.data || [];
  const tasks_ = tasksData.data || [];
  const quots  = quotesData.data || [];

  // Conversion rate
  const total = leads_.length;
  const won = leads_.filter(l => l.status === "won").length;
  const convRate = total > 0 ? ((won/total)*100).toFixed(1) : 0;

  // Pipeline by stage
  const stages = ["new","contacted","qualified","proposal_sent","negotiation"];
  const stageCounts = stages.map(s => leads_.filter(l => l.pipeline_stage === s || l.status === s).length);
  const stageValues = stages.map(s => leads_.filter(l => l.pipeline_stage === s || l.status === s).reduce((acc,l) => acc+(Number(l.estimated_value)||0),0));

  // Sources
  const sources = {};
  leads_.forEach(l => { if (l.source) sources[l.source] = (sources[l.source]||0)+1; });

  // Company industries
  const industries = {};
  comps.forEach(c => { if (c.industry) industries[c.industry] = (industries[c.industry]||0)+1; });

  // Monthly leads (last 6 months)
  const monthlyLeads = getLast6Months().map(m => leads_.filter(l => l.created_at?.startsWith(m)).length);
  const monthLabels = getLast6MonthLabels();

  const totalPipeline = leads_.filter(l => !["won","lost"].includes(l.status)).reduce((s,l) => s + (Number(l.estimated_value)||0), 0);
  const forecast = leads_.filter(l => !["won","lost"].includes(l.status)).reduce((s,l) => s + (Number(l.estimated_value)||0) * ((l.probability||0)/100), 0);
  const totalQuoteValue = quots.filter(q => q.status === "accepted").reduce((s,q) => s + (Number(q.total)||0), 0);

  document.getElementById("content").innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Reports & Analytics</h1>
        <p>Business performance overview</p>
      </div>
    </div>

    <!-- KPI Summary -->
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card" style="--stat-color:var(--blue);--stat-dim:var(--blue-dim)">
        <div class="stat-icon">🎯</div>
        <div class="stat-value">${total}</div>
        <div class="stat-label">Total Leads</div>
        <div class="stat-change">${won} won · ${leads_.filter(l=>l.status==="lost").length} lost</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--good);--stat-dim:var(--good-dim)">
        <div class="stat-icon">📈</div>
        <div class="stat-value">${convRate}%</div>
        <div class="stat-label">Conversion Rate</div>
        <div class="stat-change up">Lead to won</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--purple);--stat-dim:var(--purple-dim)">
        <div class="stat-icon">💰</div>
        <div class="stat-value">${fmt(totalPipeline)}</div>
        <div class="stat-label">Pipeline Value</div>
        <div class="stat-change">Forecast: ${fmt(forecast)}</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--good);--stat-dim:var(--good-dim)">
        <div class="stat-icon">✅</div>
        <div class="stat-value">${fmt(totalQuoteValue)}</div>
        <div class="stat-label">Accepted Quote Value</div>
        <div class="stat-change">${quots.filter(q=>q.status==="accepted").length} quotes accepted</div>
      </div>
    </div>

    <div class="grid-2" style="gap:16px;margin-bottom:16px">
      <!-- Monthly leads chart -->
      <div class="card">
        <div class="card-header"><h2>Leads Created (Last 6 Months)</h2></div>
        <div class="card-body">
          <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
        </div>
      </div>
      <!-- Stage funnel -->
      <div class="card">
        <div class="card-header"><h2>Pipeline Funnel</h2></div>
        <div class="card-body">
          <div class="chart-wrap"><canvas id="funnelChart"></canvas></div>
        </div>
      </div>
    </div>

    <div class="grid-2" style="gap:16px;margin-bottom:16px">
      <!-- Lead sources -->
      <div class="card">
        <div class="card-header"><h2>Lead Sources</h2></div>
        <div class="card-body">
          ${Object.entries(sources).length === 0
            ? `<div class="empty-state" style="padding:20px"><p>No source data yet</p></div>`
            : Object.entries(sources).sort((a,b)=>b[1]-a[1]).map(([source, count]) => `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line2)">
                <span style="text-transform:capitalize">${source.replace("_"," ")}</span>
                <div style="display:flex;align-items:center;gap:10px">
                  <div class="progress-bar" style="width:80px">
                    <div class="progress-fill" style="width:${total>0?(count/total*100):0}%"></div>
                  </div>
                  <span class="font-bold">${count}</span>
                </div>
              </div>`).join("")}
        </div>
      </div>
      <!-- Company industries -->
      <div class="card">
        <div class="card-header"><h2>Company Industries</h2></div>
        <div class="card-body">
          ${Object.entries(industries).length === 0
            ? `<div class="empty-state" style="padding:20px"><p>No industry data yet</p></div>`
            : Object.entries(industries).sort((a,b)=>b[1]-a[1]).map(([ind, count]) => `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line2)">
                <span>${esc(ind)}</span>
                <span class="badge badge-blue">${count}</span>
              </div>`).join("")}
        </div>
      </div>
    </div>

    <!-- Quote conversion -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><h2>Quote Performance</h2></div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px;text-align:center">
          ${[["Draft","draft","badge-grey"],["Sent","sent","badge-blue"],["Accepted","accepted","badge-green"],["Rejected","rejected","badge-red"],["Expired","expired","badge-yellow"]].map(([label,st,cls]) => `
            <div>
              <div style="font-size:28px;font-weight:800">${quots.filter(q=>q.status===st).length}</div>
              <span class="badge ${cls}">${label}</span>
            </div>`).join("")}
        </div>
      </div>
    </div>`;

  // Charts — stored so they can be destroyed/recreated on theme change
  const _rChartData = { monthLabels, monthlyLeads, stageCounts };
  let _rCharts = [];

  function cssVar(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

  function buildReportCharts(data) {
    _rCharts.forEach(c => c.destroy());
    _rCharts = [];
    const textColor = cssVar("--text3");
    const gridColor = cssVar("--line");

    _rCharts.push(new Chart(document.getElementById("monthlyChart").getContext("2d"), {
      type: "bar",
      data: { labels: data.monthLabels, datasets: [{ label: "Leads", data: data.monthlyLeads, backgroundColor: "rgba(30,92,255,.6)", borderRadius: 6 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{color:gridColor},ticks:{color:textColor}},y:{grid:{color:gridColor},ticks:{color:textColor,stepSize:1}}} }
    }));

    _rCharts.push(new Chart(document.getElementById("funnelChart").getContext("2d"), {
      type: "bar",
      data: { labels: ["New","Contacted","Qualified","Proposal","Negotiation"], datasets: [{ label:"Leads", data:data.stageCounts, backgroundColor:["#6366f1","#f59e0b","#3b82f6","#8b5cf6","#ec4899"], borderRadius:6, borderSkipped:false }] },
      options: { indexAxis:"y", responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{color:gridColor},ticks:{color:textColor}},y:{grid:{color:gridColor},ticks:{color:textColor}}} }
    }));
  }

  buildReportCharts(_rChartData);
  document.addEventListener("themechange", () => buildReportCharts(_rChartData));
}

function getLast6Months() {
  return Array.from({length:6},(_,i) => { const d=new Date(); d.setMonth(d.getMonth()-5+i); return d.toISOString().slice(0,7); });
}
function getLast6MonthLabels() {
  return Array.from({length:6},(_,i) => { const d=new Date(); d.setMonth(d.getMonth()-5+i); return d.toLocaleString("en",{month:"short"}); });
}
</script>
</body>
</html>
