<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Customer Portal — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css"/>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Customer Portal</div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess, tierHasFeature } from "/systems/crm/shared/auth.js";
import { portalUsers, companies } from "/systems/crm/shared/api.js?v=2";
import { renderNav, initMobileNav, initTopbar } from "/systems/crm/shared/nav.js?v=2";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, fmtDate, toast, tierGate, modal, confirm, loading, setInner } from "/systems/crm/shared/ui.js";
import { sb } from "/systems/crm/shared/supabase.js";

initTheme();

let profile, tier, portalUsersList = [], companiesList = [];

try {
  ({ profile, tier } = await requireCRMAccess());
  renderNav("portal", profile, tier);
  initMobileNav();
  initTopbar(profile);
  if (!tierHasFeature(tier, "portal")) {
    document.getElementById("content").innerHTML = tierGate("portal");
  } else {
    await loadPortal();
  }
} catch(e) { if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) toast("bad","Error",e.message); }

async function loadPortal() {
  setInner("content", loading());
  try {
    [portalUsersList, { data: companiesList }] = await Promise.all([
      portalUsers.list(),
      companies.list({ limit: 500 }),
    ]);
    render();
  } catch(e) { toast("bad","Load error",e.message); }
}

function render() {
  if (!companiesList.length) {
    setInner("content", `
      <div class="page-header"><div class="page-header-left"><h1>Customer Portal</h1><p>Manage portal user accounts</p></div></div>
      <div class="card"><div class="empty-state">
        <div class="empty-icon">🏢</div>
        <h3>No companies yet</h3>
        <p>Add a company first before inviting portal users.</p>
        <a href="/systems/crm/companies.html" class="btn btn-primary" style="margin-top:12px">Go to Companies →</a>
      </div></div>`);
    return;
  }
  setInner("content", `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Customer Portal</h1>
        <p>Manage portal user accounts</p>
      </div>
      <button class="btn btn-primary" onclick="addUser()">+ Add User</button>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Status</th><th>Last Login</th><th></th></tr></thead>
          <tbody id="portalUsersTbody">
            ${portalUsersList.length === 0
              ? `<tr><td colspan="6"><div class="empty-state" style="padding:20px"><p>No portal users yet. Add one to get started.</p></div></td></tr>`
              : portalUsersList.map(u => userRow(u)).join("")}
          </tbody>
        </table>
      </div>
    </div>`);
}

function userRow(u) {
  const statusBadge = { active:"badge-green", invited:"badge-yellow", suspended:"badge-grey" }[u.status] || "badge-grey";
  const coName = u.crm_companies?.name || companiesList.find(c => c.id === u.crm_company_id)?.name || "—";
  return `<tr id="pur-${u.id}">
    <td><strong>${esc(u.name||"—")}</strong></td>
    <td><span class="text-sm">${esc(u.email)}</span></td>
    <td><span class="text-sm">${esc(coName)}</span></td>
    <td><span class="badge ${statusBadge}">${u.status}</span></td>
    <td><span class="text-sm text-muted">${u.last_login_at ? fmtDate(u.last_login_at) : "Never"}</span></td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">Edit</button>
        <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteUser('${u.id}','${esc(u.email)}')">Delete</button>
      </div>
    </td>
  </tr>`;
}

function userModal(title, u = {}) {
  const coOpts = companiesList.map(c =>
    `<option value="${c.id}" ${u.crm_company_id===c.id?"selected":""}>${esc(c.name)}</option>`
  ).join("");
  return `
    <h2 style="margin-bottom:16px">${title}</h2>
    <div style="margin-bottom:12px">
      <label class="form-label">Company *</label>
      <select id="puCompany" class="form-control">
        <option value="">— select company —</option>${coOpts}
      </select>
    </div>
    <div style="margin-bottom:12px">
      <label class="form-label">Name</label>
      <input id="puName" class="form-control" placeholder="Full name" value="${esc(u.name||"")}"/>
    </div>
    <div style="margin-bottom:12px">
      <label class="form-label">Email *</label>
      <input id="puEmail" class="form-control" type="email" placeholder="customer@example.com" value="${esc(u.email||"")}"/>
    </div>
    <div style="margin-bottom:20px">
      <label class="form-label">${u.id ? "New Password (leave blank to keep current)" : "Password *"}</label>
      <input id="puPassword" class="form-control" type="password" placeholder="Min. 6 characters"/>
    </div>`;
}

window.addUser = function() {
  modal(`
    ${userModal("Add Portal User")}
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="document.getElementById('crm-modal').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="doAddUser()">Create Account</button>
    </div>
  `);
  document.getElementById("puEmail").focus();
};

window.doAddUser = async function() {
  const email      = document.getElementById("puEmail").value.trim();
  const name       = document.getElementById("puName").value.trim();
  const password   = document.getElementById("puPassword").value;
  const companyId  = document.getElementById("puCompany").value;
  if (!companyId) { toast("bad","Error","Please select a company"); return; }
  if (!email || !email.includes("@")) { toast("bad","Error","Valid email required"); return; }
  if (!password || password.length < 6) { toast("bad","Error","Password must be at least 6 characters"); return; }
  try {
    const res = await fetch("/api/crm/portal-invite", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, name, password, crm_company_id: companyId, tenant_id: profile.company_id }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    document.getElementById("crm-modal")?.remove();
    toast("good","Account created",`${email} can now sign in`);
    await loadPortal();
  } catch(e) { toast("bad","Error",e.message); }
};

window.editUser = function(id) {
  const u = portalUsersList.find(x => x.id === id);
  if (!u) return;
  modal(`
    ${userModal("Edit Portal User", u)}
    <div style="display:flex;gap:10px;justify-content:space-between">
      <div style="display:flex;gap:8px;align-items:center">
        <label class="form-label" style="margin:0">Status</label>
        <select id="puStatus" class="form-control" style="width:auto">
          <option value="active" ${u.status==="active"?"selected":""}>Active</option>
          <option value="suspended" ${u.status==="suspended"?"selected":""}>Suspended</option>
        </select>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="document.getElementById('crm-modal').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="doEditUser('${id}')">Save</button>
      </div>
    </div>
  `);
};

window.doEditUser = async function(id) {
  const email     = document.getElementById("puEmail").value.trim();
  const name      = document.getElementById("puName").value.trim();
  const password  = document.getElementById("puPassword").value;
  const status    = document.getElementById("puStatus").value;
  const companyId = document.getElementById("puCompany").value;
  if (!companyId) { toast("bad","Error","Please select a company"); return; }
  if (!email || !email.includes("@")) { toast("bad","Error","Valid email required"); return; }
  if (password && password.length < 6) { toast("bad","Error","Password must be at least 6 characters"); return; }
  try {
    const { error } = await sb().from("crm_portal_users")
      .update({ email: email.toLowerCase(), name: name || null, status, crm_company_id: companyId || null })
      .eq("id", id);
    if (error) throw error;

    // If new password provided, re-hash via Worker
    if (password) {
      const res = await fetch("/api/crm/portal-invite", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email.toLowerCase(), password, tenant_id: profile.company_id }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
    }

    document.getElementById("crm-modal")?.remove();
    toast("good","Saved","Portal user updated");
    await loadPortal();
  } catch(e) { toast("bad","Error",e.message); }
};

window.deleteUser = function(id, email) {
  confirm("Delete portal user", `Remove "${email}"? They will no longer be able to sign in.`, async () => {
    try {
      const { error } = await sb().from("crm_portal_users").delete().eq("id", id);
      if (error) throw error;
      portalUsersList = portalUsersList.filter(u => u.id !== id);
      document.getElementById(`pur-${id}`)?.remove();
      toast("good","Deleted","Portal user removed");
    } catch(e) { toast("bad","Error",e.message); }
  });
};
</script>
</body>
</html>
