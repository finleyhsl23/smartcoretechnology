<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Calendar — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=2"/>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Calendar</div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess, tierHasFeature } from "/systems/crm/shared/auth.js?v=3";
import { events, companies, tasks } from "/systems/crm/shared/api.js";
import { sb } from "/systems/crm/shared/supabase.js";
import { renderNav, initMobileNav, initTopbar } from "/systems/crm/shared/nav.js?v=10";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, fmtDateTime, toast, confirm, tierGate, loading } from "/systems/crm/shared/ui.js";

initTheme();

let profile, tier, allEvents = [], allTasks = [], companiesList = [];
let currentDate = new Date();
let viewMode = "month";

try {
  ({ profile, tier } = await requireCRMAccess());
  renderNav("calendar", profile, tier);
  initMobileNav();
  initTopbar(profile);

  if (!tierHasFeature(tier, "calendar")) {
    document.getElementById("content").innerHTML = tierGate("calendar");
  } else {
    companiesList = await companies.list({ limit: 500 }).then(r => r.data);
    await loadAndRender();
  }
} catch(e) { if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) toast("bad","Error",e.message); }

async function loadAndRender() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const start = new Date(year, month, 1).toISOString();
  const end   = new Date(year, month + 1, 0, 23, 59, 59).toISOString();
  const monthStart = `${year}-${String(month+1).padStart(2,"0")}-01`;
  const monthEnd   = `${year}-${String(month+1).padStart(2,"0")}-${String(new Date(year, month+1, 0).getDate()).padStart(2,"0")}`;

  const [evRes, { data: { session } }] = await Promise.all([
    events.list({ from: start, to: end, limit: 300 }),
    sb().auth.getSession(),
  ]);
  allEvents = evRes;

  // Fetch tasks with a due_date in this month that aren't completed
  const { data: emp } = await sb().from("core_employees").select("company_id").eq("auth_user_id", session.user.id).single();
  const tenantId = emp?.company_id;
  const { data: taskData } = await sb().from("crm_tasks")
    .select("id, title, due_date, status, priority")
    .eq("tenant_id", tenantId)
    .neq("status", "completed")
    .gte("due_date", monthStart)
    .lte("due_date", monthEnd)
    .order("due_date");
  allTasks = taskData || [];

  renderCalendar();
}

function renderCalendar() {
  const monthName = currentDate.toLocaleString("en-GB", { month: "long", year: "numeric" });
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  let days = "";
  // Blanks for offset (Sunday = 0, Monday = 1…)
  const offset = (firstDay + 6) % 7;
  for (let i = 0; i < offset; i++) {
    const prevDate = new Date(year, month, -offset + i + 1).getDate();
    days += `<div class="cal-day other-month"><div class="cal-date">${prevDate}</div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dayEvents = allEvents.filter(e => e.start_time?.startsWith(dateStr));
    const dayTasks  = allTasks.filter(t => t.due_date === dateStr);

    const evHtml = dayEvents.slice(0,2).map(e => {
      const col = e.type==="meeting"?"":"green";
      return `<div class="cal-event ${col}" title="${esc(e.title)}">${esc(e.title)}</div>`;
    }).join("");
    const taskHtml = dayTasks.slice(0, 2).map(t =>
      `<div class="cal-event" style="background:color-mix(in srgb,#f59e0b 18%,transparent);color:#f59e0b;border-left:2px solid #f59e0b" title="Task: ${esc(t.title)}">✅ ${esc(t.title)}</div>`
    ).join("");

    const total = dayEvents.length + dayTasks.length;
    const shown = Math.min(dayEvents.length, 2) + Math.min(dayTasks.length, 2);
    const more = total > shown ? `<div class="cal-event" style="opacity:.5">+${total-shown} more</div>` : "";

    days += `<div class="cal-day ${isToday?"today":""}" data-date="${dateStr}">
      <div class="cal-date">${d}</div>
      <div class="cal-events">${evHtml}${taskHtml}${more}</div>
    </div>`;
  }

  document.getElementById("content").innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Calendar</h1>
        <p>Manage meetings, follow-ups and site visits</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" id="addEventBtn">+ New Event</button>
      </div>
    </div>

    <div class="cal-header">
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" id="prevBtn">◀</button>
        <button class="btn btn-sm" id="todayBtn">Today</button>
        <button class="btn btn-sm" id="nextBtn">▶</button>
      </div>
      <h2 style="font-size:18px;font-weight:700">${monthName}</h2>
      <div style="display:flex;gap:4px">
        <button class="btn btn-sm">Month</button>
      </div>
    </div>

    <div class="cal-grid">
      <div class="cal-day-label">Mon</div>
      <div class="cal-day-label">Tue</div>
      <div class="cal-day-label">Wed</div>
      <div class="cal-day-label">Thu</div>
      <div class="cal-day-label">Fri</div>
      <div class="cal-day-label">Sat</div>
      <div class="cal-day-label">Sun</div>
      ${days}
    </div>

    <!-- Upcoming list -->
    <div class="card" style="margin-top:16px">
      <div class="card-header"><h2>Upcoming Events &amp; Tasks</h2></div>
      <div class="card-body" style="padding:0">
        ${(() => {
          const now = new Date();
          const upcomingEvents = allEvents
            .filter(e => new Date(e.start_time) >= now)
            .map(e => ({ _type:"event", _sort: e.start_time, ...e }));
          const upcomingTasks = allTasks
            .map(t => ({ _type:"task", _sort: t.due_date + "T00:00:00", ...t }));
          const combined = [...upcomingEvents, ...upcomingTasks]
            .sort((a,b) => a._sort.localeCompare(b._sort))
            .slice(0, 10);
          if (!combined.length) return `<div class="empty-state" style="padding:24px"><p>No upcoming events or tasks</p></div>`;
          return combined.map(item => {
            if (item._type === "event") {
              return `<div style="padding:12px 18px;border-bottom:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center">
                <div style="display:flex;gap:10px;align-items:center">
                  <span style="font-size:18px">📅</span>
                  <div>
                    <div style="font-weight:600">${esc(item.title)}</div>
                    <div class="text-muted text-sm">${fmtDateTime(item.start_time)} ${item.crm_companies?.name ? "· "+esc(item.crm_companies.name) : ""}</div>
                  </div>
                </div>
                <div style="display:flex;gap:6px">
                  <span class="badge badge-blue">${esc(item.type)}</span>
                  <button class="btn btn-sm btn-danger" onclick="delEvent('${item.id}')">Del</button>
                </div>
              </div>`;
            } else {
              const overdue = item.due_date < now.toISOString().slice(0,10);
              return `<div style="padding:12px 18px;border-bottom:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center">
                <div style="display:flex;gap:10px;align-items:center">
                  <span style="font-size:18px">✅</span>
                  <div>
                    <div style="font-weight:600">${esc(item.title)}</div>
                    <div class="text-muted text-sm" style="${overdue?"color:var(--bad)":""}">Due ${item.due_date}${overdue?" · Overdue":""}</div>
                  </div>
                </div>
                <div>
                  <a href="/systems/crm/tasks.html" class="badge badge-yellow" style="text-decoration:none">${item.priority||"task"}</a>
                </div>
              </div>`;
            }
          }).join("");
        })()}
      </div>
    </div>`;

  document.getElementById("prevBtn").onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); loadAndRender(); };
  document.getElementById("nextBtn").onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); loadAndRender(); };
  document.getElementById("todayBtn").onclick = () => { currentDate = new Date(); loadAndRender(); };
  document.getElementById("addEventBtn").onclick = () => openModal();
  document.querySelectorAll(".cal-day:not(.other-month)").forEach(day => {
    day.addEventListener("click", e => {
      if (!e.target.classList.contains("cal-event")) openModal(null, day.dataset.date);
    });
  });
  window.delEvent = async (id) => {
    confirm("Delete Event", "Delete this event?", async () => {
      try { await events.delete(id); toast("ok","Deleted"); await loadAndRender(); }
      catch(err) { toast("bad","Error",err.message); }
    });
  };
}

function openModal(id, prefillDate) {
  const ev = id ? allEvents.find(x => x.id === id) : null;
  const compOpts = companiesList.map(c => `<option value="${c.id}" ${ev?.crm_company_id===c.id?"selected":""}>${esc(c.name)}</option>`).join("");
  const defStart = prefillDate ? prefillDate + "T09:00" : (ev?.start_time ? new Date(ev.start_time).toISOString().slice(0,16) : "");
  const defEnd = prefillDate ? prefillDate + "T10:00" : (ev?.end_time ? new Date(ev.end_time).toISOString().slice(0,16) : "");

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>${ev ? "Edit Event" : "New Event"}</h3>
        <button class="btn btn-ghost btn-sm modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input class="form-control" id="mTitle" value="${esc(ev?.title||"")}" placeholder="Meeting with client"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-control" id="mType">
              <option value="meeting" ${ev?.type==="meeting"||!ev?"selected":""}>Meeting</option>
              <option value="follow_up" ${ev?.type==="follow_up"?"selected":""}>Follow Up</option>
              <option value="site_visit" ${ev?.type==="site_visit"?"selected":""}>Site Visit</option>
              <option value="call" ${ev?.type==="call"?"selected":""}>Call</option>
              <option value="other" ${ev?.type==="other"?"selected":""}>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Company</label>
            <select class="form-control" id="mCompany"><option value="">None</option>${compOpts}</select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Start Time *</label>
            <input class="form-control" id="mStart" type="datetime-local" value="${defStart}"/>
          </div>
          <div class="form-group">
            <label class="form-label">End Time</label>
            <input class="form-control" id="mEnd" type="datetime-local" value="${defEnd}"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="form-control" id="mLocation" value="${esc(ev?.location||"")}" placeholder="Office / Video call / Address"/>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-control" id="mDesc" rows="3">${esc(ev?.description||"")}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn modal-close">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">${ev ? "Save Changes" : "Create Event"}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll(".modal-close").forEach(b => b.onclick = () => overlay.remove());
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector("#saveBtn").onclick = async () => {
    const title = document.getElementById("mTitle").value.trim();
    const start = document.getElementById("mStart").value;
    if (!title || !start) return toast("warn","Validation","Title and start time are required.");
    const btn = overlay.querySelector("#saveBtn");
    btn.disabled = true;
    try {
      const fields = {
        title, type: document.getElementById("mType").value,
        crm_company_id: document.getElementById("mCompany").value || null,
        start_time: new Date(start).toISOString(),
        end_time: document.getElementById("mEnd").value ? new Date(document.getElementById("mEnd").value).toISOString() : null,
        location: document.getElementById("mLocation").value.trim() || null,
        description: document.getElementById("mDesc").value.trim() || null,
      };
      if (ev) await events.update(ev.id, fields);
      else await events.create(fields);
      overlay.remove();
      toast("ok", ev ? "Event updated" : "Event created");
      await loadAndRender();
    } catch(e) { toast("bad","Error",e.message); btn.disabled = false; }
  };
}
</script>
</body>
</html>
