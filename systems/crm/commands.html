<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Commands — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=3"/>
  <style>
    /* ── Custom Select ── */
    .csel { position: relative; user-select: none; }
    .csel-trigger {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      background: var(--bg); border: 1px solid var(--line2); border-radius: 10px;
      padding: 10px 13px; cursor: pointer; transition: border-color .2s;
      font-size: 14px; color: var(--text); min-height: 42px;
    }
    .csel-trigger:hover, .csel.open .csel-trigger { border-color: var(--blue); }
    .csel-arrow { font-size: 10px; color: var(--text-dim); transition: transform .2s; flex-shrink: 0; }
    .csel.open .csel-arrow { transform: rotate(180deg); }
    .csel-val { flex: 1; display: flex; align-items: center; gap: 8px; }
    .csel-val .icon { font-size: 15px; }
    .csel-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 200;
      background: var(--card); border: 1px solid var(--line2); border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,.5); overflow: hidden;
      animation: dropIn .12s ease;
    }
    @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .csel-option {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 11px 14px; cursor: pointer; transition: background .1s;
    }
    .csel-option:hover { background: var(--sel-bg-hover); }
    .csel-option.selected { background: rgba(30,92,255,.08); }
    .csel-option .icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
    .csel-option .opt-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .csel-option .opt-desc { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
    .csel-group-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); padding: 10px 14px 4px; }

    /* ── Layout ── */
    .cmd-grid { display: grid; grid-template-columns: 420px 1fr; gap: 28px; }
    @media (max-width: 960px) { .cmd-grid { grid-template-columns: 1fr; } }

    .cmd-form-card { background: var(--card); border: 1px solid var(--line2); border-radius: 18px; padding: 28px; position: sticky; top: 24px; height: fit-content; }
    .cmd-form-card h2 { font-size: 15px; font-weight: 700; margin-bottom: 20px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-dim); margin-bottom: 7px; }
    .field input, .field textarea { width: 100%; background: var(--bg); border: 1px solid var(--line2); border-radius: 10px; padding: 10px 13px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s; }
    .field input:focus, .field textarea:focus { border-color: var(--blue); }
    .field textarea { resize: vertical; min-height: 90px; }
    .field .hint { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

    .step-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--blue); margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
    .step-label::after { content:""; flex:1; height:1px; background:rgba(30,92,255,.2); }

    .action-section { background: var(--card2, #1a1a2e); border: 1px solid var(--line2); border-radius: 12px; padding: 16px; margin-top: 4px; }

    .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg,#1e5cff,#1a7aff); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s; margin-top: 8px; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Command list ── */
    .cmd-list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .cmd-list-header h2 { font-size: 16px; font-weight: 700; }

    .cmd-card { background: var(--card); border: 1px solid var(--line2); border-radius: 14px; padding: 18px 20px; margin-bottom: 10px; transition: border-color .2s; }
    .cmd-card:hover { border-color: rgba(30,92,255,.3); }
    .cmd-card.inactive { opacity: .55; }

    .cmd-top { display: flex; align-items: flex-start; gap: 14px; }
    .cmd-icon { width: 40px; height: 40px; border-radius: 11px; background: rgba(30,92,255,.1); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .cmd-info { flex: 1; min-width: 0; }
    .cmd-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .cmd-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
    .cmd-meta { font-size: 11px; color: var(--text-dim); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line2); display: flex; gap: 16px; }
    .cmd-meta span { display: flex; align-items: center; gap: 4px; }

    .cmd-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .toggle-btn { background: var(--card2); border: 1px solid var(--line2); border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-dim); transition: all .15s; }
    .toggle-btn:hover { border-color: var(--blue); color: var(--blue); }
    .toggle-btn.on { background: rgba(52,199,89,.1); border-color: rgba(52,199,89,.3); color: #34c759; }
    .del-btn { background: rgba(255,69,58,.08); border: 1px solid rgba(255,69,58,.18); color: #ff453a; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .del-btn:hover { background: rgba(255,69,58,.18); }

    .pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
    .pill-blue { background: rgba(30,92,255,.12); color: #5b8fff; border: 1px solid rgba(30,92,255,.2); }
    .pill-green { background: rgba(52,199,89,.1); color: #34c759; border: 1px solid rgba(52,199,89,.2); }
    .pill-amber { background: rgba(255,159,10,.1); color: #ff9f0a; border: 1px solid rgba(255,159,10,.2); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty-state .emoji { font-size: 40px; display: block; margin-bottom: 12px; opacity: .4; }
    .empty-state p { font-size: 13px; }

    /* ── Company filter list ── */
    .company-list { display: flex; flex-direction: column; }
    .company-list label { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text); transition: background .12s; }
    .company-list label:hover { background: var(--sb-hover); }
    .company-list input[type=checkbox] { accent-color: var(--blue); flex-shrink: 0; width: 15px; height: 15px; }
    .company-search { width: 100%; background: var(--bg); border: 1px solid var(--line2); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box; margin-bottom: 4px; }
    .company-search:focus { border-color: var(--blue); }

    /* ── Insert pills ── */
    .insert-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .insert-pill { background: rgba(30,92,255,.1); border: 1px solid rgba(30,92,255,.25); color: #5b8fff; border-radius: 99px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer; transition: background .12s; user-select: none; }
    .insert-pill:hover { background: rgba(30,92,255,.2); }
  </style>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Commands</div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess } from "/systems/crm/shared/auth.js?v=3";
import { renderNav, initMobileNav, initTopbar, initSupport } from "/systems/crm/shared/nav.js?v=11";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, toast } from "/systems/crm/shared/ui.js?v=2";
import { sb } from "/systems/crm/shared/supabase.js";
import { loadStatusLabels, getCompanyStatuses, getLeadStatuses } from "/systems/crm/shared/statusLabels.js?v=2";
import { getStages } from "/systems/crm/shared/api.js?v=2";

initTheme();

let profile, tier, commands = [], _editingId = null;

// ── Option definitions ──────────────────────────────────────────────────────
const TRIGGERS = [
  { group: "Company" },
  { value:"company_status_changed", icon:"🏢", label:"Company status changed",       desc:"Fires when a company's status is updated" },
  { value:"company_created",        icon:"➕", label:"Company created",              desc:"Fires when a new company is added" },
  { group: "Contact" },
  { value:"contact_created",        icon:"👤", label:"Contact created",              desc:"Fires when a new contact is added" },
  { value:"contact_status_changed", icon:"👥", label:"Contact status changed",       desc:"Fires when a contact's status is updated" },
  { group: "Lead / Pipeline" },
  { value:"lead_status_changed",    icon:"🎯", label:"Lead status changed",          desc:"Fires when a lead moves to a new status" },
  { value:"lead_created",           icon:"✨", label:"New lead created",             desc:"Fires when a new lead is added" },
  { value:"deal_stage_changed",     icon:"📋", label:"Pipeline deal stage changed",  desc:"Fires when a deal moves to a new pipeline stage" },
  { group: "Tasks & Projects" },
  { value:"task_completed",         icon:"✅", label:"Task completed",               desc:"Fires when a task is marked complete" },
  { value:"task_overdue",           icon:"⏰", label:"Task becomes overdue",         desc:"Fires when a task passes its due date" },
  { value:"project_status_changed", icon:"📁", label:"Project status changed",       desc:"Fires when a project's status changes" },
  { group: "Messages" },
  { value:"new_customer_message",   icon:"💬", label:"New customer message received",desc:"Fires when a portal customer sends a message" },
  { group: "Quotes" },
  { value:"quote_sent",             icon:"💰", label:"Quote sent",                   desc:"Fires when a quote is emailed to a customer" },
  { value:"quote_accepted",         icon:"🎉", label:"Quote accepted",               desc:"Fires when a customer accepts a quote" },
];

const ACTIONS = [
  { value:"send_email",      icon:"📧", label:"Send an email",       desc:"Send a branded email to a customer, contact, or your team" },
  { value:"notify_team",     icon:"🔔", label:"Notify your team",    desc:"Send an internal email notification to all staff members" },
  { value:"create_task",     icon:"✅", label:"Create a task",       desc:"Automatically create a follow-up task linked to the record" },
  { value:"add_note",        icon:"📝", label:"Add a note",          desc:"Add an internal note to the company or lead record" },
  { value:"set_lead_status", icon:"🎯", label:"Set lead status",     desc:"Move the lead to a specific pipeline stage automatically" },
];


// ── Custom select builder ───────────────────────────────────────────────────
function buildSelect(id, options, placeholder = "Choose…") {
  const sel = { value: null, label: placeholder, icon: null };

  const html = `<div class="csel" id="csel-${id}" data-value="">
    <div class="csel-trigger" onclick="toggleCsel('${id}')">
      <div class="csel-val">
        <span class="icon" id="csel-icon-${id}" style="display:none"></span>
        <span id="csel-label-${id}" style="color:var(--text-dim)">${esc(placeholder)}</span>
      </div>
      <span class="csel-arrow">▼</span>
    </div>
    <div class="csel-dropdown" id="csel-drop-${id}" style="display:none">
      ${options.map(o => o.group
        ? `<div class="csel-group-label">${esc(o.group)}</div>`
        : `<div class="csel-option" onclick="setCsel('${id}','${o.value}','${esc(o.label)}','${o.icon||''}')">
            <span class="icon">${o.icon||''}</span>
            <div><div class="opt-label">${esc(o.label)}</div><div class="opt-desc">${esc(o.desc||'')}</div></div>
           </div>`
      ).join('')}
    </div>
  </div>`;
  return html;
}

window.toggleCsel = (id) => {
  const el = document.getElementById(`csel-${id}`);
  const drop = document.getElementById(`csel-drop-${id}`);
  const isOpen = el.classList.contains("open");
  // Close all others
  document.querySelectorAll(".csel.open").forEach(c => { c.classList.remove("open"); c.querySelector(".csel-dropdown").style.display = "none"; });
  if (!isOpen) { el.classList.add("open"); drop.style.display = "block"; }
};

window.setCsel = (id, value, label, icon) => {
  const el = document.getElementById(`csel-${id}`);
  el.dataset.value = value;
  el.classList.remove("open");
  const drop = document.getElementById(`csel-drop-${id}`);
  drop.style.display = "none";
  document.getElementById(`csel-label-${id}`).textContent = label;
  document.getElementById(`csel-label-${id}`).style.color = "";
  const iconEl = document.getElementById(`csel-icon-${id}`);
  if (icon) { iconEl.textContent = icon; iconEl.style.display = ""; }
  else { iconEl.style.display = "none"; }
  // Highlight selected
  drop.querySelectorAll(".csel-option").forEach(o => o.classList.remove("selected"));
  drop.querySelector(`[onclick*="'${value}'"]`)?.classList.add("selected");
  // Show/hide dynamic sections
  if (id === "action") updateActionFields(value);
};

// Close dropdowns when clicking outside
document.addEventListener("click", e => {
  if (!e.target.closest(".csel")) {
    document.querySelectorAll(".csel.open").forEach(c => { c.classList.remove("open"); c.querySelector(".csel-dropdown").style.display = "none"; });
  }
});

function updateActionFields(action) {
  document.getElementById("emailFields").style.display        = (action === "send_email" || action === "notify_team") ? "" : "none";
  document.getElementById("taskFields").style.display         = action === "create_task"     ? "" : "none";
  document.getElementById("noteFields").style.display         = action === "add_note"        ? "" : "none";
  document.getElementById("setLeadStatusFields").style.display = action === "set_lead_status" ? "" : "none";
  if (action === "set_lead_status") populateLeadStatusPicker();
}

// ── Main load/render ─────────────────────────────────────────────────────────
try {
  ({ profile, tier } = await requireCRMAccess());
  renderNav("commands", profile, tier);
  initMobileNav();
  initSupport(tier);
  initTopbar(profile);
  await loadStatusLabels(profile.company_id);
  await loadCommands();
} catch(e) { if (!e.message?.includes("CRM not enabled")) toast("bad","Error",e.message); }

async function loadCommands() {
  const { data, error } = await sb().from("crm_commands").select("*")
    .eq("tenant_id", profile.company_id)
    .order("created_at", { ascending: false });
  if (error) { toast("bad","Load error", error.message); return; }
  commands = data || [];
  render();
}

function render() {
  document.getElementById("content").innerHTML = `
    <div class="cmd-grid">
      <div>
        <div class="cmd-form-card">
          <h2 id="formTitle">⚡ New Command</h2>

          <div class="field">
            <label>Command name</label>
            <input type="text" id="cmdName" placeholder="e.g. Email team on new lead"/>
          </div>

          <div class="step-label">1 · When this happens (trigger)</div>
          <div class="field">
            <label>Trigger event</label>
            ${buildSelect("trigger", TRIGGERS, "Choose a trigger…")}
          </div>
          <div class="field" id="triggerValueWrap" style="display:none">
            <label>Only when value equals (optional)</label>
            <div id="triggerValueField"></div>
            <div class="hint" id="triggerValueHint">Leave blank to fire on any value.</div>
          </div>
          <div class="field">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <button type="button" id="companyFilterBtn" style="background:var(--card2);border:1px solid var(--line2);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer">Use Company Filter?</button>
              <span id="companyFilterBadge" style="display:none;background:rgba(91,143,255,.15);color:#5b8fff;border:1px solid rgba(91,143,255,.3);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600"></span>
              <button type="button" id="companyFilterInfo" title="What is company filter?" style="background:none;border:1px solid var(--line2);border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;color:var(--text-dim);cursor:pointer;flex-shrink:0;line-height:1">i</button>
            </div>
            <input type="hidden" id="companyScope" value="all"/>
            <div id="companyFilterWrap" style="display:none;margin-top:8px;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:10px">
              <input type="text" id="companySearch" class="company-search" placeholder="Search companies…" oninput="filterCompanyList(this.value)"/>
              <div id="companyCheckboxes" class="company-list" style="max-height:180px;overflow-y:auto">
                <div style="font-size:12px;color:var(--text-dim);padding:8px 12px">Loading companies…</div>
              </div>
            </div>
          </div>

          <!-- Company filter modal -->
          <div id="companyFilterModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center">
            <div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px;max-width:380px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,.5)">
              <h3 style="font-size:16px;font-weight:700;margin-bottom:10px">Company Filter</h3>
              <p style="font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:20px">Should this command run for <strong style="color:var(--text)">all companies</strong>, or only for <strong style="color:var(--text)">specific ones</strong> you choose?</p>
              <div style="display:flex;gap:10px">
                <button id="cfmAll" style="flex:1;padding:11px;border-radius:10px;border:1px solid var(--line2);background:var(--card2);font-size:13px;font-weight:600;color:var(--text);cursor:pointer">All companies</button>
                <button id="cfmSpecific" style="flex:1;padding:11px;border-radius:10px;border:1px solid var(--line2);background:var(--card2);font-size:13px;font-weight:600;color:var(--text);cursor:pointer">Specific companies</button>
              </div>
            </div>
          </div>

          <!-- Company filter info tooltip modal -->
          <div id="companyInfoModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center">
            <div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px;max-width:360px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,.5)">
              <h3 style="font-size:15px;font-weight:700;margin-bottom:10px">About Company Filter</h3>
              <p style="font-size:13px;color:var(--text-dim);line-height:1.7;margin-bottom:20px">By default, this command fires whenever the trigger happens for <em>any</em> company. If you only want it to run for certain companies — for example, only VIP clients or a specific account — you can select specific companies and it will be ignored for everyone else.</p>
              <button id="companyInfoClose" style="width:100%;padding:10px;border-radius:10px;background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer">Got it</button>
            </div>
          </div>

          <div class="step-label">2 · Do this (action)</div>
          <div class="field">
            <label>Action type</label>
            ${buildSelect("action", ACTIONS, "Choose an action…")}
          </div>

          <!-- Email fields -->
          <div id="emailFields" style="display:none">
            <div class="action-section">
              <div class="field">
                <label>Send to</label>
                <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">
                  <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);text-transform:none;letter-spacing:0">
                    <input type="checkbox" id="sendToCustom" style="width:auto;accent-color:var(--blue)"/> Specific email addresses
                  </label>
                  <div id="customEmailWrap" style="display:none;padding-left:24px">
                    <input type="text" id="emailToCustom" placeholder="e.g. team@company.com, boss@company.com"/>
                    <div class="hint" style="margin-top:5px">Separate multiple addresses with commas</div>
                  </div>
                  <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);text-transform:none;letter-spacing:0">
                    <input type="checkbox" id="sendToTeam" style="width:auto;accent-color:var(--blue)"/> Your team (all staff members)
                  </label>
                  <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);text-transform:none;letter-spacing:0">
                    <input type="checkbox" id="sendToCustomer" style="width:auto;accent-color:var(--blue)"/> The customer (company / contact email)
                  </label>
                </div>
              </div>
              <div class="field">
                <label>Reply-to (optional)</label>
                <input type="email" id="emailReplyTo" placeholder="your@email.com"/>
              </div>
              <div class="field">
                <label>Subject line</label>
                <input type="text" id="emailSubject" placeholder="e.g. New lead from Acme Corp"/>
                <div class="insert-pills">
                  <span class="insert-pill" onclick="insertInto('emailSubject','{{company_name}}')">+ Company Name</span>
                  <span class="insert-pill" onclick="insertInto('emailSubject','{{contact_name}}')">+ Contact Name</span>
                  <span class="insert-pill" onclick="insertInto('emailSubject','{{status}}')">+ Status</span>
                  <span class="insert-pill" onclick="insertInto('emailSubject','{{company_email}}')">+ Company Email</span>
                </div>
              </div>
              <div class="field">
                <label>Email body</label>
                <textarea id="emailBody" placeholder="Hi,&#10;&#10;Just letting you know — a lead has moved. You can log in to view the details."></textarea>
                <div class="insert-pills">
                  <span class="insert-pill" onclick="insertInto('emailBody','{{company_name}}')">+ Company Name</span>
                  <span class="insert-pill" onclick="insertInto('emailBody','{{contact_name}}')">+ Contact Name</span>
                  <span class="insert-pill" onclick="insertInto('emailBody','{{status}}')">+ Status</span>
                  <span class="insert-pill" onclick="insertInto('emailBody','{{company_email}}')">+ Company Email</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Create task fields -->
          <div id="taskFields" style="display:none">
            <div class="action-section">
              <div class="field">
                <label>Task title</label>
                <input type="text" id="taskTitle" placeholder="e.g. Follow up with Acme Corp"/>
                <div class="insert-pills">
                  <span class="insert-pill" onclick="insertInto('taskTitle','{{company_name}}')">+ Company Name</span>
                  <span class="insert-pill" onclick="insertInto('taskTitle','{{contact_name}}')">+ Contact Name</span>
                  <span class="insert-pill" onclick="insertInto('taskTitle','{{status}}')">+ Status</span>
                </div>
              </div>
              <div class="field">
                <label>Due in (days)</label>
                <input type="number" id="taskDueDays" placeholder="e.g. 3" min="1" max="365" style="width:120px"/>
                <div class="hint">Days from when the trigger fires. Leave blank for no due date.</div>
              </div>
              <div class="field">
                <label>Notes (optional)</label>
                <textarea id="taskNotes" placeholder="Any extra context for whoever picks this up…"></textarea>
                <div class="insert-pills">
                  <span class="insert-pill" onclick="insertInto('taskNotes','{{company_name}}')">+ Company Name</span>
                  <span class="insert-pill" onclick="insertInto('taskNotes','{{contact_name}}')">+ Contact Name</span>
                  <span class="insert-pill" onclick="insertInto('taskNotes','{{status}}')">+ Status</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Add note fields -->
          <div id="noteFields" style="display:none">
            <div class="action-section">
              <div class="field">
                <label>Note content</label>
                <textarea id="noteContent" placeholder="e.g. Lead moved to Qualified — follow up within 48 hours."></textarea>
                <div class="insert-pills">
                  <span class="insert-pill" onclick="insertInto('noteContent','{{company_name}}')">+ Company Name</span>
                  <span class="insert-pill" onclick="insertInto('noteContent','{{contact_name}}')">+ Contact Name</span>
                  <span class="insert-pill" onclick="insertInto('noteContent','{{status}}')">+ Status</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Set lead status fields -->
          <div id="setLeadStatusFields" style="display:none">
            <div class="action-section">
              <div class="field">
                <label>Set lead to this stage</label>
                <select id="leadStatusTarget" style="width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:10px 13px;color:var(--text);font-size:14px;font-family:inherit;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none">
                  <option value="">Loading stages…</option>
                </select>
                <div class="hint">The lead linked to the trigger will be moved to this stage.</div>
              </div>
            </div>
          </div>

          <div style="display:flex;gap:10px;align-items:center">
            <button class="btn-primary" id="saveCmd" onclick="saveCommand()">Create Command</button>
            <button id="cancelEditBtn" onclick="cancelEdit()" style="display:none;background:none;border:1px solid var(--line2);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--text-dim);cursor:pointer">Cancel</button>
          </div>
        </div>
      </div>

      <div>
        <div class="cmd-list-header">
          <h2>Your Commands <span style="color:var(--text-dim);font-weight:400;font-size:13px">(${commands.length})</span></h2>
        </div>

        ${commands.length === 0 ? `<div class="empty-state"><span class="emoji">⚡</span><p>No commands yet. Create your first automation above.</p></div>` :
          commands.map(c => {
            const trig = TRIGGERS.find(t => t.value === c.trigger_type) || {};
            const act  = ACTIONS.find(a => a.value === c.action_type)   || {};
            const cfg  = c.action_config || {};
            return `<div class="cmd-card${c.is_active?"":" inactive"}">
              <div class="cmd-top">
                <div class="cmd-icon">${trig.icon||"⚡"}</div>
                <div class="cmd-info">
                  <div class="cmd-name">${esc(c.name)}</div>
                  <div class="cmd-desc">
                    <span class="pill pill-blue">${trig.label||c.trigger_type}</span>
                    ${c.trigger_value ? `<span class="pill pill-amber" style="margin-left:4px">= ${esc(c.trigger_value)}</span>` : ""}
                    <span style="color:var(--text-dim);margin:0 6px">→</span>
                    <span class="pill pill-green">${act.icon||""} ${act.label||c.action_type}</span>
                    ${cfg.email_subject ? `<div style="margin-top:5px;font-size:11px;color:var(--text-dim)">Subject: ${esc(cfg.email_subject)}</div>` : ""}
                  </div>
                </div>
                <div class="cmd-actions">
                  <button class="toggle-btn" onclick="runNow('${c.id}')" title="Run this command now manually" style="background:rgba(30,92,255,.1);border-color:rgba(30,92,255,.3);color:var(--blue)">▶ Run</button>
                  <button class="toggle-btn${c.is_active?" on":""}" onclick="toggleCommand('${c.id}',${!c.is_active})">${c.is_active?"On":"Off"}</button>
                  <button class="toggle-btn" onclick="editCommand('${c.id}')" style="background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.3);color:#ffc107">Edit</button>
                  <button class="del-btn" onclick="deleteCommand('${c.id}')">Delete</button>
                </div>
              </div>
              <div class="cmd-meta">
                <span>🔄 Ran ${c.run_count||0} time${c.run_count===1?'':'s'}</span>
                ${c.last_run_at ? `<span>⏱ Last run ${new Date(c.last_run_at).toLocaleDateString("en-GB")}</span>` : ""}
                <span>📅 Created ${new Date(c.created_at).toLocaleDateString("en-GB")}</span>
              </div>
            </div>`;
          }).join("")
        }
      </div>
    </div>`;

  // Init all dropdowns hidden
  document.getElementById("triggerValueWrap").style.display = "none";
  document.getElementById("emailFields").style.display = "none";
  document.getElementById("taskFields").style.display  = "none";
  document.getElementById("noteFields").style.display  = "none";

  // Checkbox toggle for specific email addresses
  document.getElementById("sendToCustom")?.addEventListener("change", e => {
    document.getElementById("customEmailWrap").style.display = e.target.checked ? "" : "none";
  });

  // Company filter button
  document.getElementById("companyFilterBtn").addEventListener("click", () => {
    const modal = document.getElementById("companyFilterModal");
    modal.style.display = "flex";
  });

  document.getElementById("cfmAll").addEventListener("click", () => {
    document.getElementById("companyScope").value = "all";
    document.getElementById("companyFilterWrap").style.display = "none";
    document.getElementById("companyFilterBadge").style.display = "none";
    document.getElementById("companyFilterBtn").textContent = "Use Company Filter?";
    document.getElementById("companyFilterModal").style.display = "none";
  });

  document.getElementById("cfmSpecific").addEventListener("click", () => {
    document.getElementById("companyScope").value = "specific";
    document.getElementById("companyFilterWrap").style.display = "";
    document.getElementById("companyFilterBadge").style.display = "";
    document.getElementById("companyFilterBadge").textContent = "Specific companies";
    document.getElementById("companyFilterBtn").textContent = "Change Filter";
    document.getElementById("companyFilterModal").style.display = "none";
    loadCompanyCheckboxes();
  });

  document.getElementById("companyFilterModal").addEventListener("click", e => {
    if (e.target === document.getElementById("companyFilterModal")) document.getElementById("companyFilterModal").style.display = "none";
  });

  document.getElementById("companyFilterInfo").addEventListener("click", () => {
    document.getElementById("companyInfoModal").style.display = "flex";
  });

  document.getElementById("companyInfoClose").addEventListener("click", () => {
    document.getElementById("companyInfoModal").style.display = "none";
  });

  document.getElementById("companyInfoModal").addEventListener("click", e => {
    if (e.target === document.getElementById("companyInfoModal")) document.getElementById("companyInfoModal").style.display = "none";
  });
}

let _allCompanies = [];

async function loadCompanyCheckboxes() {
  const box = document.getElementById("companyCheckboxes");
  if (!box) return;
  if (!_allCompanies.length) {
    const { data } = await sb().from("crm_companies").select("id,name").eq("tenant_id", profile.company_id).order("name");
    _allCompanies = data || [];
  }
  renderCompanyGrid(_allCompanies, box);
}

function renderCompanyGrid(companies, box) {
  if (!companies.length) {
    box.innerHTML = `<div style="font-size:12px;color:var(--text-dim);padding:8px 12px">No companies found</div>`;
    return;
  }
  box.innerHTML = companies.map(c => `
    <label>
      <input type="checkbox" value="${c.id}"/>
      ${esc(c.name)}
    </label>`).join("");
}

window.insertInto = (id, text) => {
  const el = document.getElementById(id);
  if (!el) return;
  const start = el.selectionStart ?? el.value.length;
  const end   = el.selectionEnd   ?? el.value.length;
  el.value = el.value.slice(0, start) + text + el.value.slice(end);
  const pos = start + text.length;
  el.focus();
  el.setSelectionRange(pos, pos);
};

window.filterCompanyList = (query) => {
  const box = document.getElementById("companyCheckboxes");
  if (!box) return;
  const q = query.toLowerCase().trim();
  const checked = new Set([...document.querySelectorAll('#companyCheckboxes input:checked')].map(i => i.value));
  const filtered = q ? _allCompanies.filter(c => c.name.toLowerCase().includes(q)) : _allCompanies;
  renderCompanyGrid(filtered, box);
  // Restore checked state
  box.querySelectorAll("input[type=checkbox]").forEach(i => { if (checked.has(i.value)) i.checked = true; });
};

// Trigger value field
const STATUS_TRIGGERS = new Set(["company_status_changed","contact_status_changed","lead_status_changed","deal_stage_changed","project_status_changed"]);

const CONTACT_STATUSES = [
  { value: "new",      label: "New" },
  { value: "active",   label: "Active" },
  { value: "inactive", label: "Inactive" },
];
const PROJECT_STATUSES = [
  { value: "planning",  label: "Planning" },
  { value: "active",    label: "Active" },
  { value: "on_hold",   label: "On Hold" },
  { value: "completed", label: "Completed" },
  { value: "cancelled", label: "Cancelled" },
];

async function updateTriggerValueField(trigger, selectedValue) {
  const wrap  = document.getElementById("triggerValueWrap");
  const field = document.getElementById("triggerValueField");
  const hint  = document.getElementById("triggerValueHint");
  if (!wrap || !field) return;

  const show = STATUS_TRIGGERS.has(trigger);
  wrap.style.display = show ? "" : "none";
  if (!show) return;

  let statuses = null;
  if (trigger === "company_status_changed") {
    statuses = getCompanyStatuses().map(s => ({ value: s.value, label: s.label }));
  } else if (trigger === "lead_status_changed" || trigger === "deal_stage_changed") {
    const stages = await getStages();
    statuses = stages.map(s => ({ value: s.key, label: s.parent ? `↳ ${s.name}` : s.name }));
  } else if (trigger === "contact_status_changed") {
    statuses = CONTACT_STATUSES;
  } else if (trigger === "project_status_changed") {
    statuses = PROJECT_STATUSES;
  }

  hint.textContent = "Leave blank to fire on any status change.";
  field.innerHTML = `<select id="triggerValue" style="width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:10px 13px;color:var(--text);font-size:14px;font-family:inherit;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none">
    <option value="">— Any value (fire on all) —</option>
    ${(statuses||[]).map(s => `<option value="${esc(s.value)}"${selectedValue === s.value ? " selected" : ""}>${esc(s.label)}</option>`).join("")}
  </select>`;
}

const _origSetCsel = window.setCsel.bind(window);
window.setCsel = (id, value, label, icon) => {
  _origSetCsel(id, value, label, icon);
  if (id === "trigger") updateTriggerValueField(value);
};

window.updateTriggerValueField = updateTriggerValueField;

async function populateLeadStatusPicker(selectedValue = "") {
  const sel = document.getElementById("leadStatusTarget");
  if (!sel) return;
  const stages = await getStages();
  sel.innerHTML = `<option value="">— Choose a stage —</option>`
    + stages.map(s => `<option value="${esc(s.key)}"${selectedValue === s.key ? " selected" : ""}>${s.parent ? "↳ " : ""}${esc(s.name)}</option>`).join("");
}

window.editCommand = async (id) => {
  const cmd = commands.find(c => c.id === id);
  if (!cmd) return;
  _editingId = id;

  // Scroll form into view
  document.querySelector(".cmd-form-card").scrollIntoView({ behavior: "smooth", block: "start" });

  document.getElementById("formTitle").textContent = "✏️ Edit Command";
  document.getElementById("saveCmd").textContent = "Save Changes";
  document.getElementById("cancelEditBtn").style.display = "";

  // Name
  document.getElementById("cmdName").value = cmd.name || "";

  // Trigger
  const trig = TRIGGERS.find(t => t.value === cmd.trigger_type);
  if (trig) setCsel("trigger", trig.value, trig.label, trig.icon || "");

  // Trigger value — populate after stages load
  await updateTriggerValueField(cmd.trigger_type, cmd.trigger_value || "");

  // Company filter
  const cfg = cmd.action_config || {};
  const scope = cmd.company_ids?.length ? "specific" : "all";
  document.getElementById("companyScope").value = scope;
  if (scope === "specific") {
    document.getElementById("companyFilterWrap").style.display = "";
    document.getElementById("companyFilterBadge").style.display = "";
    document.getElementById("companyFilterBadge").textContent = "Specific companies";
    document.getElementById("companyFilterBtn").textContent = "Change Filter";
    await loadCompanyCheckboxes();
    if (cmd.company_ids) {
      document.querySelectorAll('#companyCheckboxes input[type="checkbox"]').forEach(cb => {
        cb.checked = cmd.company_ids.includes(cb.value);
      });
    }
  }

  // Action
  const act = ACTIONS.find(a => a.value === cmd.action_type);
  if (act) setCsel("action", act.value, act.label, act.icon || "");
  updateActionFields(cmd.action_type);

  // Email fields
  if (cmd.action_type === "send_email" || cmd.action_type === "notify_team") {
    document.getElementById("sendToCustom").checked    = !!cfg.send_to_custom;
    document.getElementById("sendToTeam").checked      = !!cfg.send_to_team;
    document.getElementById("sendToCustomer").checked  = !!cfg.send_to_customer;
    document.getElementById("customEmailWrap").style.display = cfg.send_to_custom ? "" : "none";
    document.getElementById("emailToCustom").value     = cfg.email_to_custom || "";
    document.getElementById("emailReplyTo").value      = cfg.email_reply_to  || "";
    document.getElementById("emailSubject").value      = cfg.email_subject   || "";
    document.getElementById("emailBody").value         = cfg.email_body      || "";
  }

  // Task fields
  if (cmd.action_type === "create_task") {
    document.getElementById("taskTitle").value    = cfg.task_title    || "";
    document.getElementById("taskDueDays").value  = cfg.task_due_days || "";
    document.getElementById("taskNotes").value    = cfg.task_notes    || "";
  }

  // Note fields
  if (cmd.action_type === "add_note") {
    document.getElementById("noteContent").value = cfg.note_content || "";
  }

  // Set lead status fields
  if (cmd.action_type === "set_lead_status") {
    await populateLeadStatusPicker(cfg.lead_status || "");
  }
};

window.cancelEdit = () => {
  _editingId = null;
  document.getElementById("formTitle").textContent = "⚡ New Command";
  document.getElementById("saveCmd").textContent = "Create Command";
  document.getElementById("cancelEditBtn").style.display = "none";
  document.getElementById("cmdName").value = "";
  // Reset selects
  ["trigger","action"].forEach(id => {
    const el = document.getElementById(`csel-${id}`);
    el.dataset.value = "";
    document.getElementById(`csel-label-${id}`).textContent = id === "trigger" ? "Choose a trigger…" : "Choose an action…";
    document.getElementById(`csel-label-${id}`).style.color = "var(--text-dim)";
    document.getElementById(`csel-icon-${id}`).style.display = "none";
  });
  document.getElementById("triggerValueWrap").style.display = "none";
  document.getElementById("emailFields").style.display = "none";
  document.getElementById("taskFields").style.display  = "none";
  document.getElementById("noteFields").style.display  = "none";
  document.getElementById("setLeadStatusFields").style.display = "none";
  document.getElementById("companyScope").value = "all";
  document.getElementById("companyFilterWrap").style.display = "none";
  document.getElementById("companyFilterBadge").style.display = "none";
  document.getElementById("companyFilterBtn").textContent = "Use Company Filter?";
};

window.saveCommand = async () => {
  const name         = document.getElementById("cmdName")?.value.trim();
  const triggerType  = document.getElementById("csel-trigger")?.dataset.value;
  const triggerValue = document.getElementById("triggerValue")?.value.trim();
  const actionType   = document.getElementById("csel-action")?.dataset.value;

  if (!name)        { toast("bad","Missing","Please give this command a name."); return; }
  if (!triggerType) { toast("bad","Missing","Please choose a trigger event."); return; }
  if (!actionType)  { toast("bad","Missing","Please choose an action."); return; }

  const actionConfig = {};

  if (actionType === "send_email" || actionType === "notify_team") {
    const sendToCustom   = document.getElementById("sendToCustom")?.checked;
    const sendToTeam     = document.getElementById("sendToTeam")?.checked;
    const sendToCustomer = document.getElementById("sendToCustomer")?.checked;
    const emailSubject   = document.getElementById("emailSubject")?.value.trim();
    if (!sendToCustom && !sendToTeam && !sendToCustomer) { toast("bad","Missing","Please select at least one recipient."); return; }
    if (!emailSubject) { toast("bad","Missing","Please enter an email subject."); return; }
    actionConfig.send_to_custom   = sendToCustom;
    actionConfig.send_to_team     = sendToTeam;
    actionConfig.send_to_customer = sendToCustomer;
    actionConfig.email_to_custom  = sendToCustom ? (document.getElementById("emailToCustom")?.value.trim() || null) : null;
    actionConfig.email_reply_to   = document.getElementById("emailReplyTo")?.value.trim() || null;
    actionConfig.email_subject    = emailSubject;
    actionConfig.email_body       = document.getElementById("emailBody")?.value.trim() || null;
  }

  if (actionType === "create_task") {
    const taskTitle = document.getElementById("taskTitle")?.value.trim();
    if (!taskTitle) { toast("bad","Missing","Please enter a task title."); return; }
    actionConfig.task_title    = taskTitle;
    actionConfig.task_due_days = parseInt(document.getElementById("taskDueDays")?.value) || null;
    actionConfig.task_notes    = document.getElementById("taskNotes")?.value.trim() || null;
  }

  if (actionType === "add_note") {
    const noteContent = document.getElementById("noteContent")?.value.trim();
    if (!noteContent) { toast("bad","Missing","Please enter the note content."); return; }
    actionConfig.note_content = noteContent;
  }

  if (actionType === "set_lead_status") {
    const leadStatusTarget = document.getElementById("leadStatusTarget")?.value;
    if (!leadStatusTarget) { toast("bad","Missing","Please choose a lead stage to set."); return; }
    actionConfig.lead_status = leadStatusTarget;
  }

  const btn = document.getElementById("saveCmd");
  btn.disabled = true; btn.textContent = "Saving…";

  const companyScope = document.getElementById("companyScope")?.value || "all";
  let companyIds = null;
  if (companyScope === "specific") {
    companyIds = [...document.querySelectorAll('#companyCheckboxes input[type="checkbox"]:checked')].map(c => c.value);
    if (!companyIds.length) { toast("bad","Missing","Select at least one company or choose 'All companies'."); return; }
  }

  const payload = {
    name,
    trigger_type:  triggerType,
    trigger_value: triggerValue || null,
    action_type:   actionType,
    action_config: actionConfig,
    company_ids:   companyIds,
  };

  let error;
  if (_editingId) {
    ({ error } = await sb().from("crm_commands").update(payload).eq("id", _editingId));
    btn.disabled = false; btn.textContent = "Save Changes";
    if (error) { toast("bad","Error", error.message); return; }
    toast("ok","Command updated","Your changes have been saved.");
    cancelEdit();
  } else {
    const { data: { user } } = await sb().auth.getUser();
    ({ error } = await sb().from("crm_commands").insert({ ...payload, tenant_id: profile.company_id, created_by: user.id, is_active: true }));
    btn.disabled = false; btn.textContent = "Create Command";
    if (error) { toast("bad","Error", error.message); return; }
    toast("ok","Command created","Your automation is now active.");
  }
  await loadCommands();
};

window.toggleCommand = async (id, active) => {
  const { error } = await sb().from("crm_commands").update({ is_active: active }).eq("id", id);
  if (error) { toast("bad","Error", error.message); return; }
  toast("ok", active ? "Command enabled" : "Command disabled");
  await loadCommands();
};

window.runNow = async (id) => {
  const cmd = commands.find(c => c.id === id);
  if (!cmd) return;
  if (!confirm(`Run "${cmd.name}" manually now?\n\nThis will fire the command immediately with no context (useful for testing).`)) return;
  try {
    const { data: { session } } = await sb().auth.getSession();
    if (!session?.access_token) { toast("bad","Error","Not logged in."); return; }
    const res = await fetch('/api/crm/commands-run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
      body: JSON.stringify({ tenant_id: profile.company_id, trigger_type: cmd.trigger_type, trigger_value: cmd.trigger_value || null, ctx: {}, manual: true }),
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) { toast("bad","Run failed", json.error || res.statusText); return; }
    toast("ok","Command ran", `Executed ${json.ran ?? 1} action${(json.ran ?? 1) === 1 ? '' : 's'}.`);
    await loadCommands();
  } catch(e) { toast("bad","Error", e.message); }
};

window.deleteCommand = async (id) => {
  if (!confirm("Delete this command? It cannot be undone.")) return;
  const { error } = await sb().from("crm_commands").delete().eq("id", id);
  if (error) { toast("bad","Error", error.message); return; }
  toast("ok","Deleted","Command removed.");
  await loadCommands();
};
</script>
