<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=2"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)">
  <div style="text-align:center">
    <div class="spinner" style="margin:0 auto 16px"></div>
    <p class="text-muted">Loading SmartCore CRM…</p>
  </div>
  <script type="module">
    import { requireCRMAccess } from "/systems/crm/shared/auth.js?v=2";
    import { initTheme } from "/systems/crm/shared/theme.js";
    initTheme();
    try {
      await requireCRMAccess();
      window.location.href = "/systems/crm/dashboard.html";
    } catch(e) { /* redirected by requireCRMAccess */ }
  </script>
</body>
</html>
