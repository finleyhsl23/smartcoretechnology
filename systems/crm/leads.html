<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Leads — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=3"/>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Leads</div>
      <div class="topbar-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search leads…"/>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<!-- Bulk action bar -->
<div id="bulkBar" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card,#1a1a2e);border:1px solid var(--line,rgba(255,255,255,.15));border-radius:14px;padding:12px 20px;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:1000;min-width:380px">
  <span id="bulkCount" style="font-size:13px;font-weight:600;color:var(--text-dim)">0 selected</span>
  <div style="width:1px;height:20px;background:var(--line)"></div>
  <select id="bulkStatusSel" class="filter-select" style="font-size:12px;padding:6px 10px">
    <option value="">Change status…</option>
  </select>
  <button class="btn btn-sm" id="bulkStatusBtn">Apply</button>
  <button class="btn btn-sm btn-danger" id="bulkDeleteBtn">Delete</button>
  <button class="btn btn-sm btn-ghost" id="bulkCancelBtn">✕</button>
</div>

<script type="module">
import { requireCRMAccess, tierHasFeature } from "/systems/crm/shared/auth.js?v=3";
import { leads, companies, contacts, getStaff, getStages } from "/systems/crm/shared/api.js";
import { triggerCommand } from "/systems/crm/shared/commands.js";
import { renderNav, initMobileNav, initTopbar } from "/systems/crm/shared/nav.js?v=11";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, fmt, fmtDate, toast, confirm, leadBadge, loading, setInner, makeCombo } from "/systems/crm/shared/ui.js";

initTheme();

let profile, tier, allLeads = [], companiesList = [], contactsList = [], staffList = [], allStages = [];
const selectedIds = new Set();
const hasBulk = () => ["business","enterprise"].includes(tier);

try {
  ({ profile, tier } = await requireCRMAccess());
  renderNav("leads", profile, tier);
  initMobileNav();
  initTopbar(profile);
  [companiesList, contactsList, staffList, allStages] = await Promise.all([
    companies.list({ limit: 500 }).then(r => r.data),
    contacts.list({ limit: 500 }).then(r => r.data),
    getStaff(),
    getStages(),
  ]);
  // Populate bulk status dropdown now that stages are loaded
  const bulkSel = document.getElementById("bulkStatusSel");
  if (bulkSel) bulkSel.innerHTML = `<option value="">Change status…</option>${buildStageOptions()}`;
  await loadAndRender();
} catch(e) { if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) toast("bad","Error",e.message); }

// Hide bulk bar entirely for non-business tiers
if (!hasBulk()) document.getElementById("bulkBar").remove();

// ── Bulk bar ──────────────────────────────────────────────────
function updateBulkBar() {
  const bar = document.getElementById("bulkBar");
  if (!bar) return;
  const ids = [...selectedIds];
  bar.style.display = ids.length ? "flex" : "none";
  const countEl = document.getElementById("bulkCount");
  if (countEl) countEl.textContent = `${ids.length} selected`;
}

document.getElementById("bulkCancelBtn")?.addEventListener("click", () => {
  selectedIds.clear();
  document.querySelectorAll(".lead-cb").forEach(cb => cb.checked = false);
  const sa = document.getElementById("selectAll");
  if (sa) sa.checked = false;
  updateBulkBar();
});

document.getElementById("bulkStatusBtn")?.addEventListener("click", async () => {
  const status = document.getElementById("bulkStatusSel").value;
  if (!status || !selectedIds.size) return;
  const ids = [...selectedIds];
  try {
    await Promise.all(ids.map(id => leads.update(id, { status, pipeline_stage: status })));
    toast("ok", "Updated", `${ids.length} lead${ids.length > 1 ? "s" : ""} updated.`);
    selectedIds.clear();
    updateBulkBar();
    await loadAndRender();
  } catch(e) { toast("bad","Error",e.message); }
});

document.getElementById("bulkDeleteBtn")?.addEventListener("click", () => {
  const ids = [...selectedIds];
  if (!ids.length) return;
  confirm("Delete Leads", `Delete ${ids.length} lead${ids.length > 1 ? "s" : ""}? This cannot be undone.`, async () => {
    try {
      await Promise.all(ids.map(id => leads.delete(id)));
      toast("ok","Deleted",`${ids.length} lead${ids.length > 1 ? "s" : ""} deleted.`);
      selectedIds.clear();
      updateBulkBar();
      await loadAndRender();
    } catch(e) { toast("bad","Error",e.message); }
  });
});

// Build <option> list from loaded stages, grouping sub-stages under parents
function buildStageOptions(selectedKey = "") {
  const tops = allStages.filter(s => !s.parent).sort((a,b) => a.order - b.order);
  return tops.map(top => {
    const subs = allStages.filter(s => s.parent === top.key).sort((a,b) => a.order - b.order);
    if (!subs.length) {
      return `<option value="${esc(top.key)}" ${selectedKey===top.key?"selected":""}>${esc(top.name)}</option>`;
    }
    // Has sub-stages: show parent as optgroup header + sub-stages
    return `<optgroup label="${esc(top.name)}">
      ${subs.map(s => `<option value="${esc(s.key)}" ${selectedKey===s.key?"selected":""}>${esc(s.name)}</option>`).join("")}
    </optgroup>`;
  }).join("");
}

// ── Load & render ─────────────────────────────────────────────
async function loadAndRender(search="", status="") {
  setInner("content", loading());
  try {
    const res = await leads.list({ search, status, limit: 200 });
    allLeads = res.data;
    renderTable(allLeads);
    // Restore filter state after re-render (renderTable rebuilds the whole content div)
    const sf = document.getElementById("statusFilter");
    const si = document.getElementById("searchInput");
    if (sf) sf.value = status;
    if (si) si.value = search;
  } catch(e) { toast("bad","Load error",e.message); }
}

function renderTable(rows) {
  const totalValue = rows.filter(l => !["won","lost"].includes(l.status)).reduce((s,l) => s + (Number(l.estimated_value)||0), 0);
  const forecast = rows.filter(l => !["won","lost"].includes(l.status)).reduce((s,l) => s + (Number(l.estimated_value)||0)*((l.probability||0)/100), 0);

  document.getElementById("content").innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Leads</h1>
        <p>${rows.length} lead${rows.length !== 1 ? "s" : ""} · Pipeline: ${fmt(totalValue)} · Forecast: ${fmt(forecast)}</p>
      </div>
      <div class="page-header-actions">
        <button class="btn" onclick="window.location.href='/systems/crm/pipeline.html'">📋 Pipeline View</button>
        <button class="btn btn-primary" id="addBtn">+ New Lead</button>
      </div>
    </div>

    <div class="filter-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search leads…" id="searchInput"/>
      </div>
      <select class="filter-select" id="statusFilter">
        <option value="">All Statuses</option>
        ${buildStageOptions()}
      </select>
    </div>

    <div class="card">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              ${hasBulk() ? `<th style="width:36px"><input type="checkbox" id="selectAll" title="Select all"/></th>` : ""}
              <th>Lead</th>
              <th>Company</th>
              <th>Status</th>
              <th>Value</th>
              <th>Probability</th>
              <th>Source</th>
              <th>Assigned</th>
              <th>Close Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows.length === 0
              ? `<tr><td colspan="${hasBulk()?10:9}"><div class="empty-state"><div class="empty-icon">🎯</div><h3>No leads yet</h3><p>Create your first lead to start tracking opportunities.</p></div></td></tr>`
              : rows.map(l => leadRow(l)).join("")}
          </tbody>
        </table>
      </div>
    </div>`;

  document.getElementById("addBtn").onclick = () => openModal();
  document.getElementById("searchInput").addEventListener("input", debounce(e => loadAndRender(e.target.value, document.getElementById("statusFilter").value), 300));
  document.getElementById("statusFilter").addEventListener("change", e => loadAndRender(document.getElementById("searchInput").value, e.target.value));
  document.querySelectorAll(".edit-btn").forEach(b => b.addEventListener("click", () => openModal(b.dataset.id)));
  document.querySelectorAll(".del-btn").forEach(b => b.addEventListener("click", () => deleteLead(b.dataset.id)));

  // Checkbox logic (business+ only)
  document.getElementById("selectAll")?.addEventListener("change", e => {
    document.querySelectorAll(".lead-cb").forEach(cb => {
      cb.checked = e.target.checked;
      if (e.target.checked) selectedIds.add(cb.dataset.id);
      else selectedIds.delete(cb.dataset.id);
    });
    updateBulkBar();
  });

  document.querySelectorAll(".lead-cb").forEach(cb => {
    if (selectedIds.has(cb.dataset.id)) cb.checked = true;
    cb.addEventListener("change", e => {
      if (e.target.checked) selectedIds.add(cb.dataset.id);
      else selectedIds.delete(cb.dataset.id);
      const all = document.querySelectorAll(".lead-cb");
      const sa = document.getElementById("selectAll");
      if (sa) sa.checked = all.length > 0 && [...all].every(c => c.checked);
      updateBulkBar();
    });
  });
}

function leadRow(l) {
  const co = l.crm_companies?.name;
  const staff = staffList.find(s => s.id === l.assigned_to);
  const probColor = l.probability >= 70 ? "var(--good)" : l.probability >= 40 ? "var(--warn)" : "var(--bad)";
  return `<tr>
    ${hasBulk() ? `<td><input type="checkbox" class="lead-cb" data-id="${l.id}"/></td>` : ""}
    <td>
      <div style="font-weight:600">${esc(l.title)}</div>
      ${tierHasFeature(tier, "lead_scoring") && l.lead_score ? `<div class="tbl-muted">Score: ${l.lead_score}</div>` : ""}
    </td>
    <td>${co ? esc(co) : '<span class="text-dim">—</span>'}</td>
    <td>${leadBadge(l.status, allStages)}</td>
    <td>${l.estimated_value ? `<strong>${fmt(l.estimated_value)}</strong>` : '<span class="text-dim">—</span>'}</td>
    <td>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="progress-bar" style="width:60px">
          <div class="progress-fill" style="width:${l.probability||0}%;background:${probColor}"></div>
        </div>
        <span style="font-size:12px;color:${probColor}">${l.probability||0}%</span>
      </div>
    </td>
    <td>${l.source ? esc(l.source.replace("_"," ")) : '<span class="text-dim">—</span>'}</td>
    <td>${staff ? esc(staff.full_name) : '<span class="text-dim">—</span>'}</td>
    <td>${l.expected_close_date ? fmtDate(l.expected_close_date) : '<span class="text-dim">—</span>'}</td>
    <td>
      <div class="tbl-actions">
        <button class="btn btn-sm edit-btn" data-id="${l.id}">Edit</button>
        <button class="btn btn-sm btn-danger del-btn" data-id="${l.id}">Del</button>
      </div>
    </td>
  </tr>`;
}

function openModal(id) {
  const l = id ? allLeads.find(x => x.id === id) : null;

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>${l ? "Edit Lead" : "New Lead"}</h3>
        <button class="btn btn-ghost btn-sm modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Lead Title *</label>
          <input class="form-control" id="mTitle" value="${esc(l?.title||"")}" placeholder="New website project for Acme Ltd"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Company</label>
            <input class="form-control" id="mCompany" placeholder="Search companies…"/>
          </div>
          <div class="form-group">
            <label class="form-label">Contact</label>
            <input class="form-control" id="mContact" placeholder="Search contacts…"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-control" id="mStatus">
              ${buildStageOptions((() => { const keys = allStages.map(s => s.key); return [l?.pipeline_stage, l?.status].find(k => k && keys.includes(k)) || l?.pipeline_stage || l?.status || "new"; })())}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Source</label>
            <select class="form-control" id="mSource">
              <option value="">Unknown</option>
              <option value="website" ${l?.source==="website"?"selected":""}>Website</option>
              <option value="referral" ${l?.source==="referral"?"selected":""}>Referral</option>
              <option value="cold_call" ${l?.source==="cold_call"?"selected":""}>Cold Call</option>
              <option value="email" ${l?.source==="email"?"selected":""}>Email Campaign</option>
              <option value="social_media" ${l?.source==="social_media"?"selected":""}>Social Media</option>
              <option value="event" ${l?.source==="event"?"selected":""}>Event</option>
              <option value="other" ${l?.source==="other"?"selected":""}>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Estimated Value (£)</label>
            <input class="form-control" id="mValue" type="number" value="${l?.estimated_value||""}" placeholder="5000"/>
          </div>
          <div class="form-group">
            <label class="form-label">Probability (%)</label>
            <input class="form-control" id="mProb" type="number" min="0" max="100" value="${l?.probability||20}" placeholder="50" oninput="this.value=Math.min(100,Math.max(0,parseInt(this.value)||0))"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Assigned To</label>
            <input class="form-control" id="mAssigned" placeholder="Search staff…"/>
          </div>
          <div class="form-group">
            <label class="form-label">Expected Close Date</label>
            <input class="form-control" id="mClose" type="date" value="${l?.expected_close_date||""}"/>
          </div>
        </div>
        ${l?.status === "lost" ? `<div class="form-group">
          <label class="form-label">Lost Reason</label>
          <input class="form-control" id="mLostReason" value="${esc(l?.lost_reason||"")}" placeholder="Why was this lead lost?"/>
        </div>` : ""}
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-control" id="mNotes" rows="3">${esc(l?.notes||"")}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn modal-close">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">${l ? "Save Changes" : "Create Lead"}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll(".modal-close").forEach(b => b.onclick = () => overlay.remove());
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });

  const compCombo = makeCombo(overlay.querySelector("#mCompany"),
    companiesList.map(c => ({ id: c.id, label: c.name })),
    { initialId: l?.crm_company_id });
  const contCombo = makeCombo(overlay.querySelector("#mContact"),
    contactsList.map(c => ({ id: c.id, label: c.first_name + " " + c.last_name, sublabel: c.job_title || "" })),
    { initialId: l?.crm_contact_id });
  const staffCombo = makeCombo(overlay.querySelector("#mAssigned"),
    staffList.map(s => ({ id: s.id, label: s.full_name })),
    { initialId: l?.assigned_to });

  overlay.querySelector("#saveBtn").onclick = async () => {
    const title = document.getElementById("mTitle").value.trim();
    if (!title) return toast("warn","Validation","Lead title is required.");
    const btn = overlay.querySelector("#saveBtn");
    btn.disabled = true;
    try {
      const pipelineStage = document.getElementById("mStatus").value;
      const fields = {
        title,
        crm_company_id: compCombo.getValue() || null,
        crm_contact_id: contCombo.getValue() || null,
        status: pipelineStage,
        pipeline_stage: pipelineStage,
        source: document.getElementById("mSource").value || null,
        estimated_value: parseFloat(document.getElementById("mValue").value) || null,
        probability: Math.min(100, Math.max(0, parseInt(document.getElementById("mProb").value) || 0)),
        assigned_to: staffCombo.getValue() || null,
        expected_close_date: document.getElementById("mClose").value || null,
        notes: document.getElementById("mNotes").value.trim() || null,
        lost_reason: document.getElementById("mLostReason")?.value.trim() || null,
      };
      if (l) {
        await leads.update(l.id, fields);
        if (fields.status && fields.status !== l.status) {
          const coName = companiesList.find(c => c.id === compCombo.getValue())?.name || '';
          triggerCommand(profile.company_id, 'lead_status_changed', {
            triggerValue: fields.status,
            ctx: { lead_title: fields.title, company_name: coName, trigger_value: fields.status, lead_id: l.id, company_id: compCombo.getValue() || '' },
          });
        }
      } else {
        const newLead = await leads.create(fields);
        const coName = companiesList.find(c => c.id === compCombo.getValue())?.name || '';
        triggerCommand(profile.company_id, 'lead_created', {
          ctx: { lead_title: fields.title, company_name: coName, lead_id: newLead?.id || '', company_id: compCombo.getValue() || '' },
        });
      }
      overlay.remove();
      toast("ok", l ? "Lead updated" : "Lead created");
      await loadAndRender();
    } catch(e) { toast("bad","Error",e.message); btn.disabled = false; }
  };
}

async function deleteLead(id) {
  confirm("Delete Lead", "Delete this lead? This cannot be undone.", async () => {
    try { await leads.delete(id); toast("ok","Deleted"); await loadAndRender(); }
    catch(e) { toast("bad","Error",e.message); }
  });
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
</script>
</body>
</html>
