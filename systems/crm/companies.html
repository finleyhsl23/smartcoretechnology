<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Companies — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css"/>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Companies</div>
      <div class="topbar-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search companies…" id="globalSearch"/>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess } from "/systems/crm/shared/auth.js";
import { companies, getStaff } from "/systems/crm/shared/api.js?v=2";
import { renderNav, initMobileNav, initTopbar, initSupport } from "/systems/crm/shared/nav.js?v=5";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, fmt, fmtDate, timeAgo, toast, confirm, companyStatusBadge, loading, setInner } from "/systems/crm/shared/ui.js";
import { triggerCommand } from "/systems/crm/shared/commands.js";

initTheme();

let profile, tier, allCompanies = [], staffList = [], currentCompany = null;
let _statusFilter = "", _search = "", _dropOutsideHandler = null;

try {
  ({ profile, tier } = await requireCRMAccess());
  renderNav("companies", profile, tier);
  initMobileNav();
  initSupport();
  initTopbar(profile);
  [staffList] = await Promise.all([getStaff()]);
  await loadAndRender();
} catch(e) { if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) toast("bad","Error",e.message); }

async function loadAndRender(search=_search, status=_statusFilter) {
  _search = search; _statusFilter = status;
  setInner("content", loading());
  try {
    const res = await companies.list({ search, status, limit: 200 });
    allCompanies = res.data;
    renderTable(allCompanies);
  } catch(e) { toast("bad","Load error", e.message); }
}

function renderTable(rows) {
  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Companies</h1>
        <p>${rows.length} company record${rows.length !== 1 ? "s" : ""}</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" id="addBtn">+ Add Company</button>
      </div>
    </div>

    <div class="filter-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search companies…" id="searchInput" value="${esc(_search)}"/>
      </div>
      <div style="position:relative;display:inline-block" id="statusDropdown">
        <button id="statusDropdownBtn" type="button" style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:#0d1535;border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#e9f0ff;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;min-width:140px;justify-content:space-between;white-space:nowrap">
          <span id="statusDropdownLabel">${_statusFilter ? _statusFilter.charAt(0).toUpperCase()+_statusFilter.slice(1) : 'All Statuses'}</span>
          <svg id="statusChevron" width="14" height="14" viewBox="0 0 24 24" fill="none" style="transition:transform 0.2s;flex-shrink:0;opacity:0.6"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div id="statusDropdownMenu" style="display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:160px;background:#0d1535;border:1px solid rgba(30,92,255,0.35);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,0.6);z-index:9999;overflow:hidden">
          ${[['','All Statuses'],['prospect','Prospect'],['active','Active'],['inactive','Inactive'],['churned','Churned']].map(([val,label])=>`
            <div data-value="${val}" style="padding:10px 16px;font-size:13px;cursor:pointer;color:${_statusFilter===val?'#1e5cff':'rgba(233,240,255,0.7)'};font-weight:${_statusFilter===val?'600':'400'};background:${_statusFilter===val?'rgba(30,92,255,0.1)':'transparent'};transition:background 0.1s,color 0.1s" class="sd-opt">${label}</div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th style="width:36px"><input type="checkbox" id="selectAll" title="Select all"/></th>
              <th>Company</th>
              <th>Industry</th>
              <th>Status</th>
              <th>Value</th>
              <th>Assigned To</th>
              <th>Since</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tblBody">
            ${rows.length === 0
              ? `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🏢</div><h3>No companies yet</h3><p>Add your first company to get started.</p></div></td></tr>`
              : rows.map(c => companyRow(c)).join("")}
          </tbody>
        </table>
      </div>
    </div>
    <div id="bulkBar" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card,#1a1a2e);border:1px solid var(--line,rgba(255,255,255,.15));border-radius:14px;padding:12px 20px;display:none;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:1000;min-width:420px">
      <span id="bulkCount" style="font-size:13px;font-weight:600;color:var(--text-dim)">0 selected</span>
      <div style="flex:1"></div>
      <span style="font-size:12px;color:var(--text-dim)">Change Status:</span>
      <select id="bulkStatusSel" class="filter-select" style="font-size:12px;padding:6px 10px">
        <option value="prospect">Prospect</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
        <option value="churned">Churned</option>
      </select>
      <button class="btn btn-sm" id="bulkStatusBtn">Apply</button>
      <button class="btn btn-sm btn-danger" id="bulkDeleteBtn">Delete</button>
      <button class="btn btn-sm btn-ghost" id="bulkCancelBtn">✕</button>
    </div>`;

  document.getElementById("addBtn").onclick = () => openModal();
  document.getElementById("searchInput").addEventListener("input", debounce(e => loadAndRender(e.target.value, _statusFilter), 300));

  initStatusDropdown();

  document.querySelectorAll(".view-btn").forEach(btn => btn.addEventListener("click", () => viewCompany(btn.dataset.id)));
  document.querySelectorAll(".edit-btn").forEach(btn => btn.addEventListener("click", () => openModal(btn.dataset.id)));
  document.querySelectorAll(".del-btn").forEach(btn => btn.addEventListener("click", () => deleteCompany(btn.dataset.id, btn.dataset.name)));
  initBulkActions();
}

function initStatusDropdown() {
  const wrap    = document.getElementById("statusDropdown");
  const btn     = document.getElementById("statusDropdownBtn");
  const menu    = document.getElementById("statusDropdownMenu");
  const label   = document.getElementById("statusDropdownLabel");
  const chevron = document.getElementById("statusChevron");
  if (!btn || !menu) return;

  if (_dropOutsideHandler) document.removeEventListener("click", _dropOutsideHandler);

  btn.addEventListener("click", e => {
    e.stopPropagation();
    const open = menu.style.display !== "none";
    menu.style.display = open ? "none" : "block";
    chevron.style.transform = open ? "" : "rotate(180deg)";
    btn.style.borderColor = open ? "rgba(255,255,255,0.12)" : "#1e5cff";
  });

  menu.querySelectorAll(".sd-opt").forEach(opt => {
    opt.addEventListener("mouseenter", () => { opt.style.background = "rgba(255,255,255,0.06)"; opt.style.color = "#e9f0ff"; });
    opt.addEventListener("mouseleave", () => {
      const sel = opt.dataset.value === _statusFilter;
      opt.style.background = sel ? "rgba(30,92,255,0.1)" : "transparent";
      opt.style.color = sel ? "#1e5cff" : "rgba(233,240,255,0.7)";
    });
    opt.addEventListener("click", e => {
      e.stopPropagation();
      label.textContent = opt.textContent.trim();
      menu.style.display = "none";
      chevron.style.transform = "";
      btn.style.borderColor = "rgba(255,255,255,0.12)";
      loadAndRender(_search, opt.dataset.value);
    });
  });

  _dropOutsideHandler = e => {
    if (wrap && !wrap.contains(e.target)) {
      menu.style.display = "none";
      chevron.style.transform = "";
      btn.style.borderColor = "rgba(255,255,255,0.12)";
    }
  };
  document.addEventListener("click", _dropOutsideHandler);
}

function getSelectedIds() {
  return [...document.querySelectorAll(".row-cb:checked")].map(cb => cb.dataset.id);
}

function updateBulkBar() {
  const ids = getSelectedIds();
  const bar = document.getElementById("bulkBar");
  if (!bar) return;
  if (ids.length > 0) {
    bar.style.display = "flex";
    document.getElementById("bulkCount").textContent = `${ids.length} selected`;
  } else {
    bar.style.display = "none";
  }
}

function initBulkActions() {
  document.getElementById("selectAll")?.addEventListener("change", e => {
    document.querySelectorAll(".row-cb").forEach(cb => cb.checked = e.target.checked);
    updateBulkBar();
  });
  document.querySelectorAll(".row-cb").forEach(cb => cb.addEventListener("change", updateBulkBar));

  document.getElementById("bulkCancelBtn")?.addEventListener("click", () => {
    document.querySelectorAll(".row-cb").forEach(cb => cb.checked = false);
    const sa = document.getElementById("selectAll"); if (sa) sa.checked = false;
    updateBulkBar();
  });

  document.getElementById("bulkStatusBtn")?.addEventListener("click", async () => {
    const ids = getSelectedIds();
    if (!ids.length) return;
    const status = document.getElementById("bulkStatusSel").value;
    try {
      const { sb } = await import("/systems/crm/shared/supabase.js");
      await sb().from("crm_companies").update({ status }).in("id", ids);
      toast("ok", `${ids.length} companies updated`);
      await loadAndRender();
    } catch(e) { toast("bad","Error",e.message); }
  });

  document.getElementById("bulkDeleteBtn")?.addEventListener("click", () => {
    const ids = getSelectedIds();
    if (!ids.length) return;
    confirm("Delete Companies", `Delete ${ids.length} company records? This cannot be undone.`, async () => {
      try {
        const { sb } = await import("/systems/crm/shared/supabase.js");
        await sb().from("crm_companies").delete().in("id", ids);
        toast("ok", `${ids.length} companies deleted`);
        await loadAndRender();
      } catch(e) { toast("bad","Error",e.message); }
    });
  });
}

function companyRow(c) {
  const staff = staffList.find(s => s.id === c.assigned_to);
  return `<tr data-id="${c.id}">
    <td><input type="checkbox" class="row-cb" data-id="${c.id}"/></td>
    <td>
      <div style="font-weight:600;cursor:pointer" class="tbl-link view-btn" data-id="${c.id}">${esc(c.name)}</div>
      ${c.email ? `<div class="tbl-muted">${esc(c.email)}</div>` : ""}
    </td>
    <td>${c.industry ? esc(c.industry) : '<span class="text-dim">—</span>'}</td>
    <td>${companyStatusBadge(c.status)}</td>
    <td>${c.company_value ? fmt(c.company_value) : '<span class="text-dim">—</span>'}</td>
    <td>${staff ? esc(staff.full_name) : '<span class="text-dim">Unassigned</span>'}</td>
    <td>${c.customer_since ? fmtDate(c.customer_since) : '<span class="text-dim">—</span>'}</td>
    <td>
      <div class="tbl-actions">
        <button class="btn btn-sm btn-ghost view-btn" data-id="${c.id}">View</button>
        <button class="btn btn-sm edit-btn" data-id="${c.id}">Edit</button>
        <button class="btn btn-sm btn-danger del-btn" data-id="${c.id}" data-name="${esc(c.name)}">Del</button>
      </div>
    </td>
  </tr>`;
}

function openModal(id) {
  const c = id ? allCompanies.find(x => x.id === id) : null;
  currentCompany = c;
  const staffOptions = staffList.map(s => `<option value="${s.id}" ${c?.assigned_to === s.id ? "selected" : ""}>${esc(s.full_name)}</option>`).join("");

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>${c ? "Edit Company" : "Add Company"}</h3>
        <button class="btn btn-ghost btn-sm modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Company Name *</label>
            <input class="form-control" id="mName" value="${esc(c?.name||"")}" placeholder="Acme Ltd"/>
          </div>
          <div class="form-group">
            <label class="form-label">Industry</label>
            <select class="form-control" id="mIndustry">
              <option value="">Select…</option>
              ${["Construction","Technology","Healthcare","Finance","Retail","Manufacturing","Education","Property","Legal","Hospitality","Transport","Other"].map(i => `<option value="${i}" ${c?.industry===i?"selected":""}>${i}</option>`).join("")}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" id="mEmail" type="email" value="${esc(c?.email||"")}" placeholder="info@company.com"/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-control" id="mPhone" value="${esc(c?.phone||"")}" placeholder="+44…"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Website</label>
            <input class="form-control" id="mWebsite" value="${esc(c?.website||"")}" placeholder="https://…"/>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-control" id="mStatus">
              <option value="prospect" ${c?.status==="prospect"||!c?"selected":""}>Prospect</option>
              <option value="active" ${c?.status==="active"?"selected":""}>Active</option>
              <option value="inactive" ${c?.status==="inactive"?"selected":""}>Inactive</option>
              <option value="churned" ${c?.status==="churned"?"selected":""}>Churned</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Company Value (£)</label>
            <input class="form-control" id="mValue" type="number" value="${c?.company_value||""}" placeholder="0.00"/>
          </div>
          <div class="form-group">
            <label class="form-label">Assigned To</label>
            <select class="form-control" id="mAssigned"><option value="">Unassigned</option>${staffOptions}</select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Address</label>
            <input class="form-control" id="mAddress1" value="${esc(c?.address_line1||"")}" placeholder="Address line 1"/>
          </div>
          <div class="form-group">
            <label class="form-label">City</label>
            <input class="form-control" id="mCity" value="${esc(c?.city||"")}" placeholder="City"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Postcode</label>
            <input class="form-control" id="mPostcode" value="${esc(c?.postcode||"")}" placeholder="SW1A 1AA"/>
          </div>
          <div class="form-group">
            <label class="form-label">Customer Since</label>
            <input class="form-control" id="mSince" type="date" value="${c?.customer_since||""}"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-control" id="mNotes" rows="3" placeholder="Internal notes…">${esc(c?.notes||"")}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn modal-close">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">${c ? "Save Changes" : "Add Company"}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll(".modal-close").forEach(b => b.onclick = () => overlay.remove());
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector("#saveBtn").onclick = async () => {
    const name = document.getElementById("mName").value.trim();
    if (!name) return toast("warn","Validation","Company name is required.");
    const btn = overlay.querySelector("#saveBtn");
    btn.disabled = true; btn.textContent = "Saving…";
    try {
      const fields = {
        name,
        industry: document.getElementById("mIndustry").value || null,
        email: document.getElementById("mEmail").value.trim() || null,
        phone: document.getElementById("mPhone").value.trim() || null,
        website: document.getElementById("mWebsite").value.trim() || null,
        status: document.getElementById("mStatus").value,
        company_value: parseFloat(document.getElementById("mValue").value) || null,
        assigned_to: document.getElementById("mAssigned").value || null,
        address_line1: document.getElementById("mAddress1").value.trim() || null,
        city: document.getElementById("mCity").value.trim() || null,
        postcode: document.getElementById("mPostcode").value.trim() || null,
        customer_since: document.getElementById("mSince").value || null,
        notes: document.getElementById("mNotes").value.trim() || null,
      };
      console.log('[companies] saving, c=', c?.id, 'old status=', c?.status, 'new status=', fields.status);
      if (c) {
        await companies.update(c.id, fields);
        console.log('[companies] calling triggerCommand, tenantId=', profile.company_id);
        await triggerCommand(profile.company_id, 'company_status_changed', {
          triggerValue: fields.status,
          ctx: { company_name: fields.name, company_email: fields.email || '', trigger_value: fields.status },
        });
      } else {
        await companies.create(fields);
        triggerCommand(profile.company_id, 'company_created', {
          ctx: { company_name: fields.name, company_email: fields.email || '' },
        });
      }
      overlay.remove();
      toast("ok", c ? "Company updated" : "Company added");
      await loadAndRender();
    } catch(e) { toast("bad","Error",e.message); btn.disabled = false; btn.textContent = c ? "Save Changes" : "Add Company"; }
  };
}

async function viewCompany(id) {
  window.location.href = `/systems/crm/company-detail.html?id=${id}`;
}

async function deleteCompany(id, name) {
  confirm("Delete Company", `Delete "${name}"? This cannot be undone.`, async () => {
    try { await companies.delete(id); toast("ok","Deleted"); await loadAndRender(); }
    catch(e) { toast("bad","Error",e.message); }
  });
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
</script>
</body>
</html>
