<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=3"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="crm-shell">
  <!-- Sidebar -->
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main -->
  <div class="crm-main">
    <!-- Topbar -->
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Dashboard <span>/ Overview</span></div>
      <div class="topbar-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search…" id="globalSearch"/>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle" title="Toggle theme">☀️</button>
        <button class="topbar-btn" id="logoutBtn" title="Sign out">🚪</button>
      </div>
    </div>

    <!-- Content -->
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess, getCRMSettings } from "/systems/crm/shared/auth.js?v=3";
import { dashboardStats, getStages } from "/systems/crm/shared/api.js?v=2";
import { renderNav, initMobileNav, initTopbar, initSupport } from "/systems/crm/shared/nav.js?v=11";
import { initTheme } from "/systems/crm/shared/theme.js";
import { fmt, fmtDate, fmtDateTime, timeAgo, esc, toast } from "/systems/crm/shared/ui.js?v=2";
import { sb } from "/systems/crm/shared/supabase.js";

initTheme();

let _profile, _stats, _chartInstances = [];

try {
  const { profile, tier } = await requireCRMAccess();
  _profile = profile;
  _profile._tier = tier;
  const crmSettings = await getCRMSettings();
  renderNav("dashboard", profile, tier, crmSettings);
  initMobileNav();
  initSupport(tier);
  initTopbar(profile);

  const [stats, stages] = await Promise.all([dashboardStats(), getStages()]);
  _stats = stats;
  render(stats, tier, profile, stages);
  subscribeActivityFeed(profile.company_id);
} catch(e) {
  if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) {
    document.getElementById("content").innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Error loading dashboard</h3><p>${esc(e.message)}</p></div>`;
  }
}

function render(s, tier, profile, stages) {
  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Welcome back, ${esc((profile.full_name || "").split(" ")[0] || "there")} 👋</h1>
        <p>Here's what's happening with your business today.</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="window.location.href='/systems/crm/leads.html'">+ New Lead</button>
        <button class="btn" onclick="window.location.href='/systems/crm/companies.html'">+ Company</button>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="stats-grid">
      <div class="stat-card" style="--stat-color:var(--blue);--stat-dim:var(--blue-dim)">
        <div class="stat-icon">🏢</div>
        <div class="stat-value">${s.totalCompanies}</div>
        <div class="stat-label">Total Companies</div>
        <div class="stat-change up">▲ ${s.activeCompanies} active</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--purple);--stat-dim:var(--purple-dim)">
        <div class="stat-icon">🎯</div>
        <div class="stat-value">${s.activeLeads}</div>
        <div class="stat-label">Active Leads</div>
        <div class="stat-change">${s.wonLeads} won · ${s.lostLeads} lost</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--good);--stat-dim:var(--good-dim)">
        <div class="stat-icon">💰</div>
        <div class="stat-value">${fmt(s.pipelineValue)}</div>
        <div class="stat-label">Pipeline Value</div>
        <div class="stat-change up text-good">Active opportunities</div>
      </div>
      ${(["professional","business","enterprise"].includes(tier)) ? `
      <div class="stat-card" style="--stat-color:var(--blue2);--stat-dim:rgba(14,165,255,.12)">
        <div class="stat-icon">📈</div>
        <div class="stat-value">${fmt(s.forecast)}</div>
        <div class="stat-label">Revenue Forecast</div>
        <div class="stat-change">Probability-weighted</div>
      </div>` : `
      <div class="stat-card" style="--stat-color:var(--blue2);--stat-dim:rgba(14,165,255,.12);opacity:.45">
        <div class="stat-icon">📈</div>
        <div class="stat-value">—</div>
        <div class="stat-label">Revenue Forecast</div>
        <div class="stat-change"><a href="/shop/index.html" style="color:inherit;text-decoration:underline">Professional+ ↑</a></div>
      </div>`}
      <div class="stat-card" style="--stat-color:var(--warn);--stat-dim:var(--warn-dim)">
        <div class="stat-icon">✅</div>
        <div class="stat-value">${s.todayTasks}</div>
        <div class="stat-label">Tasks Due Today</div>
        <div class="stat-change ${s.overdueTasks > 0 ? "down text-bad" : ""}">${s.overdueTasks > 0 ? `▼ ${s.overdueTasks} overdue` : "All on track"}</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--good);--stat-dim:var(--good-dim)">
        <div class="stat-icon">🏆</div>
        <div class="stat-value">${s.wonLeads}</div>
        <div class="stat-label">Deals Won</div>
        <div class="stat-change ${s.lostLeads > 0 ? "down" : "up"}">${s.lostLeads} lost this period</div>
      </div>
    </div>

    <!-- Charts + Activity -->
    <div class="grid-3-1" style="gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-header">
          <h2>Pipeline Overview</h2>
          <a href="/systems/crm/pipeline.html" class="btn btn-ghost btn-sm">View board →</a>
        </div>
        <div class="card-body">
          <div class="chart-wrap"><canvas id="pipelineChart"></canvas></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Lead Status</h2></div>
        <div class="card-body">
          <div style="height:220px;display:flex;align-items:center;justify-content:center">
            <canvas id="leadPieChart" style="max-height:200px"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent activity -->
    <div class="card">
      <div class="card-header"><h2>Recent Activity</h2></div>
      <div class="card-body">
        ${s.recentActivity.length === 0
          ? `<div class="empty-state" style="padding:24px"><p>No recent activity</p></div>`
          : `<div class="timeline">${s.recentActivity.map(a => activityItem(a)).join("")}</div>`}
      </div>
    </div>`;

  initCharts(s, stages);
}

function activityItem(a) {
  const icons = { note:"📝", call:"📞", email:"📧", meeting:"🤝", task_completed:"✅", quote_created:"💰", deal_won:"🏆", deal_lost:"😔", company_created:"🏢", contact_added:"👤", lead_created:"🎯", document_uploaded:"📁" };
  const icon = icons[a.type] || "•";
  return `<div class="timeline-item">
    <div class="timeline-dot"></div>
    <div class="timeline-header">
      <span class="timeline-title">${icon} ${esc(a.title)}</span>
      <span class="timeline-time">${timeAgo(a.created_at)}</span>
    </div>
    ${a.crm_companies?.name ? `<div class="timeline-body">${esc(a.crm_companies.name)}</div>` : ""}
  </div>`;
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function initCharts(s, stages) {
  _chartInstances.forEach(c => c.destroy());
  _chartInstances = [];

  // Pipeline bar chart — real per-stage values, excluding won/lost
  const pCtx = document.getElementById("pipelineChart")?.getContext("2d");
  if (pCtx) {
    const activeStages = (stages || []).filter(st => !["won","lost"].includes(st.key) && !st.parent);
    const labels  = activeStages.map(st => st.name);
    const colors  = activeStages.map(st => st.color || "#6366f1");
    const byStage = s.pipelineByStage || {};
    // Each stage value = sum of leads whose pipeline_stage matches this stage OR any of its sub-stage keys
    const allStages = stages || [];
    const values = activeStages.map(st => {
      const childKeys = allStages.filter(c => c.parent === st.key).map(c => c.key);
      const keys = [st.key, ...childKeys];
      return keys.reduce((sum, k) => sum + (byStage[k] || 0), 0);
    });
    _chartInstances.push(new Chart(pCtx, {
      type: "bar",
      data: {
        labels,
        datasets: [{ label: "Value (£)", data: values, backgroundColor: colors, borderRadius: 6, borderSkipped: false }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: cssVar("--line") }, ticks: { color: cssVar("--text3"), font: { size: 11 } } },
          y: { grid: { color: cssVar("--line") }, ticks: { color: cssVar("--text3"), font: { size: 11 }, callback: v => "£"+v.toLocaleString() } }
        }
      }
    }));
  }

  // Lead pie chart
  const lCtx = document.getElementById("leadPieChart")?.getContext("2d");
  if (lCtx) {
    _chartInstances.push(new Chart(lCtx, {
      type: "doughnut",
      data: {
        labels: ["Active","Won","Lost"],
        datasets: [{ data: [s.activeLeads || 1, s.wonLeads || 0, s.lostLeads || 0], backgroundColor: ["#1e5cff","#10b981","#ef4444"], borderWidth: 0, hoverOffset: 4 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: "70%",
        plugins: { legend: { position: "bottom", labels: { color: cssVar("--text2"), font: { size: 12 }, boxWidth: 10 } } }
      }
    }));
  }
}

new MutationObserver(() => {
  if (!_chartInstances.length) return;
  const text2 = cssVar("--text2");
  const text3 = cssVar("--text3");
  const line  = cssVar("--line");
  _chartInstances.forEach(c => {
    if (c.config.type === "bar") {
      c.options.scales.x.grid.color  = line;
      c.options.scales.x.ticks.color = text3;
      c.options.scales.y.grid.color  = line;
      c.options.scales.y.ticks.color = text3;
    } else if (c.config.type === "doughnut") {
      c.options.plugins.legend.labels.color = text2;
    }
    c.update();
  });
}).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

// Realtime: push new activities into the feed as they happen
function subscribeActivityFeed(tenantId) {
  sb().channel("dashboard_activity")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "crm_activities", filter: `tenant_id=eq.${tenantId}` }, async payload => {
      const row = payload.new;
      // Fetch company name if present
      let companyName = null;
      if (row.crm_company_id) {
        const { data } = await sb().from("crm_companies").select("name").eq("id", row.crm_company_id).single();
        companyName = data?.name || null;
      }
      let timeline = document.querySelector(".timeline");
      if (!timeline) {
        // Replace empty state with a timeline
        const body = document.querySelector(".card:last-of-type .card-body");
        if (body) { body.innerHTML = '<div class="timeline"></div>'; timeline = body.querySelector(".timeline"); }
      }
      if (!timeline) return;
      const div = document.createElement("div");
      div.className = "timeline-item";
      div.style.animation = "fadeIn .3s ease";
      div.innerHTML = activityItem({ ...row, crm_companies: companyName ? { name: companyName } : null });
      timeline.prepend(div);
      // Trim to 10 items
      const items = timeline.querySelectorAll(".timeline-item");
      if (items.length > 10) items[items.length - 1].remove();
    })
    .subscribe();
}

// Also refresh on page becoming visible (navigating back from another tab/page)
document.addEventListener("visibilitychange", async () => {
  if (document.visibilityState === "visible" && _profile) {
    try {
      const stats = await dashboardStats();
      _stats = stats;
      render(stats, _profile._tier, _profile);
    } catch(_) {}
  }
});


</script>
</body>
</html>
