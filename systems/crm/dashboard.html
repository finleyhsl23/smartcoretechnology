<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=2"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="crm-shell">
  <!-- Sidebar -->
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main -->
  <div class="crm-main">
    <!-- Topbar -->
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Dashboard <span>/ Overview</span></div>
      <div class="topbar-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search…" id="globalSearch"/>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle" title="Toggle theme">☀️</button>
        <button class="topbar-btn" id="logoutBtn" title="Sign out">🚪</button>
      </div>
    </div>

    <!-- Content -->
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess, getCRMSettings } from "/systems/crm/shared/auth.js";
import { dashboardStats } from "/systems/crm/shared/api.js?v=2";
import { renderNav, initMobileNav, initTopbar, initSupport } from "/systems/crm/shared/nav.js?v=6";
import { initTheme } from "/systems/crm/shared/theme.js";
import { fmt, fmtDate, fmtDateTime, timeAgo, esc, toast } from "/systems/crm/shared/ui.js?v=2";
import { sb } from "/systems/crm/shared/supabase.js";

initTheme();

let _profile, _stats, _chartInstances = [];

try {
  const { profile, tier } = await requireCRMAccess();
  _profile = profile;
  renderNav("dashboard", profile, tier);
  initMobileNav();
  initSupport(tier);
  initTopbar(profile);

  const stats = await dashboardStats();
  _stats = stats;
  render(stats, tier, profile);
  if (["professional","business","enterprise"].includes(tier)) await renderGoals(stats);
  else renderLockedGoals();
} catch(e) {
  if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) {
    document.getElementById("content").innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Error loading dashboard</h3><p>${esc(e.message)}</p></div>`;
  }
}

function render(s, tier, profile) {
  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Welcome back, ${esc((profile.full_name || "").split(" ")[0] || "there")} 👋</h1>
        <p>Here's what's happening with your business today.</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="window.location.href='/systems/crm/leads.html'">+ New Lead</button>
        <button class="btn" onclick="window.location.href='/systems/crm/companies.html'">+ Company</button>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="stats-grid">
      <div class="stat-card" style="--stat-color:var(--blue);--stat-dim:var(--blue-dim)">
        <div class="stat-icon">🏢</div>
        <div class="stat-value">${s.totalCompanies}</div>
        <div class="stat-label">Total Companies</div>
        <div class="stat-change up">▲ ${s.activeCompanies} active</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--purple);--stat-dim:var(--purple-dim)">
        <div class="stat-icon">🎯</div>
        <div class="stat-value">${s.activeLeads}</div>
        <div class="stat-label">Active Leads</div>
        <div class="stat-change">${s.wonLeads} won · ${s.lostLeads} lost</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--good);--stat-dim:var(--good-dim)">
        <div class="stat-icon">💰</div>
        <div class="stat-value">${fmt(s.pipelineValue)}</div>
        <div class="stat-label">Pipeline Value</div>
        <div class="stat-change up text-good">Active opportunities</div>
      </div>
      ${(["professional","business","enterprise"].includes(tier)) ? `
      <div class="stat-card" style="--stat-color:var(--blue2);--stat-dim:rgba(14,165,255,.12)">
        <div class="stat-icon">📈</div>
        <div class="stat-value">${fmt(s.forecast)}</div>
        <div class="stat-label">Revenue Forecast</div>
        <div class="stat-change">Probability-weighted</div>
      </div>` : `
      <div class="stat-card" style="--stat-color:var(--blue2);--stat-dim:rgba(14,165,255,.12);opacity:.45">
        <div class="stat-icon">📈</div>
        <div class="stat-value">—</div>
        <div class="stat-label">Revenue Forecast</div>
        <div class="stat-change"><a href="/shop/index.html" style="color:inherit;text-decoration:underline">Professional+ ↑</a></div>
      </div>`}
      <div class="stat-card" style="--stat-color:var(--warn);--stat-dim:var(--warn-dim)">
        <div class="stat-icon">✅</div>
        <div class="stat-value">${s.todayTasks}</div>
        <div class="stat-label">Tasks Due Today</div>
        <div class="stat-change ${s.overdueTasks > 0 ? "down text-bad" : ""}">${s.overdueTasks > 0 ? `▼ ${s.overdueTasks} overdue` : "All on track"}</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--good);--stat-dim:var(--good-dim)">
        <div class="stat-icon">🏆</div>
        <div class="stat-value">${s.wonLeads}</div>
        <div class="stat-label">Deals Won</div>
        <div class="stat-change ${s.lostLeads > 0 ? "down" : "up"}">${s.lostLeads} lost this period</div>
      </div>
    </div>

    <!-- Charts + Activity -->
    <div class="grid-3-1" style="gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-header">
          <h2>Pipeline Overview</h2>
          <a href="/systems/crm/pipeline.html" class="btn btn-ghost btn-sm">View board →</a>
        </div>
        <div class="card-body">
          <div class="chart-wrap"><canvas id="pipelineChart"></canvas></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Lead Status</h2></div>
        <div class="card-body">
          <div style="height:220px;display:flex;align-items:center;justify-content:center">
            <canvas id="leadPieChart" style="max-height:200px"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="grid-2" style="gap:16px">
      <!-- Upcoming events -->
      <div class="card">
        <div class="card-header">
          <h2>Upcoming Events</h2>
          <a href="/systems/crm/calendar.html" class="btn btn-ghost btn-sm">Calendar →</a>
        </div>
        <div class="card-body" style="padding:0">
          ${s.upcomingEvents.length === 0
            ? `<div class="empty-state" style="padding:24px"><p>No upcoming events</p></div>`
            : s.upcomingEvents.map(ev => `
              <div style="padding:12px 18px;border-bottom:1px solid var(--line2);display:flex;gap:12px;align-items:center">
                <div style="width:40px;height:40px;border-radius:10px;background:var(--blue-dim);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
                  <span style="font-size:14px;font-weight:800;color:var(--blue2)">${new Date(ev.start_time).getDate()}</span>
                  <span style="font-size:9px;color:var(--text3)">${new Date(ev.start_time).toLocaleString("en",{month:"short"}).toUpperCase()}</span>
                </div>
                <div style="min-width:0">
                  <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ev.title)}</div>
                  <div style="font-size:11px;color:var(--text3)">${fmtDateTime(ev.start_time)}${ev.crm_companies?.name ? ` · ${esc(ev.crm_companies.name)}` : ""}</div>
                </div>
              </div>`).join("")}
        </div>
      </div>

      <!-- Recent activity -->
      <div class="card">
        <div class="card-header"><h2>Recent Activity</h2></div>
        <div class="card-body">
          ${s.recentActivity.length === 0
            ? `<div class="empty-state" style="padding:24px"><p>No recent activity</p></div>`
            : `<div class="timeline">${s.recentActivity.map(a => activityItem(a)).join("")}</div>`}
        </div>
      </div>
    </div>`;

  initCharts(s);
}

function activityItem(a) {
  const icons = { note:"📝", call:"📞", email:"📧", meeting:"🤝", task_completed:"✅", quote_created:"💰", deal_won:"🏆", deal_lost:"😔", company_created:"🏢", contact_added:"👤", lead_created:"🎯", document_uploaded:"📁" };
  const icon = icons[a.type] || "•";
  return `<div class="timeline-item">
    <div class="timeline-dot"></div>
    <div class="timeline-header">
      <span class="timeline-title">${icon} ${esc(a.title)}</span>
      <span class="timeline-time">${timeAgo(a.created_at)}</span>
    </div>
    ${a.crm_companies?.name ? `<div class="timeline-body">${esc(a.crm_companies.name)}</div>` : ""}
  </div>`;
}

async function renderGoals(stats) {
  const { data: goals, error } = await sb().from("crm_goals").select("*").order("created_at");
  if (error) return;

  // Auto-populate current values based on label
  const updatedGoals = goals.map(g => {
    const label = g.label.toLowerCase();
    let current = g.current_value;
    if (label.includes("revenue") || label.includes("pipeline")) current = stats.pipelineValue || 0;
    else if (label.includes("leads")) current = stats.activeLeads || 0;
    else if (label.includes("deals") || label.includes("won")) current = stats.wonLeads || 0;
    return { ...g, current_value: current };
  });

  const goalsCard = document.createElement("div");
  goalsCard.id = "goalsCard";
  goalsCard.className = "card";
  goalsCard.style.marginBottom = "16px";
  goalsCard.innerHTML = `
    <div class="card-header">
      <h2>Goals &amp; Targets</h2>
      <button class="btn btn-sm btn-primary" id="addGoalBtn">+ Set Goal</button>
    </div>
    <div class="card-body" id="goalsList">
      ${updatedGoals.length === 0
        ? `<p style="color:var(--text-dim);font-size:13px">No goals set. Click "+ Set Goal" to add your first target.</p>`
        : updatedGoals.map(g => goalItem(g)).join("")}
    </div>`;

  const content = document.getElementById("content");
  // Insert after stats grid (first child)
  const statsGrid = content.querySelector(".stats-grid");
  if (statsGrid) statsGrid.insertAdjacentElement("afterend", goalsCard);
  else content.appendChild(goalsCard);

  document.getElementById("addGoalBtn").onclick = () => openGoalModal();
  goalsCard.querySelectorAll(".goal-edit-btn").forEach(b => b.addEventListener("click", () => openGoalModal(b.dataset.id, updatedGoals)));
  goalsCard.querySelectorAll(".goal-del-btn").forEach(b => b.addEventListener("click", () => deleteGoal(b.dataset.id)));
}

function goalItem(g) {
  const pct = Math.min(100, g.target_value > 0 ? Math.round((g.current_value / g.target_value) * 100) : 0);
  const color = pct >= 100 ? "#10b981" : pct >= 60 ? "#3b82f6" : "#f59e0b";
  const valStr = g.unit === "currency" ? fmt(g.current_value) + " / " + fmt(g.target_value) : `${g.current_value} / ${g.target_value}`;
  return `<div style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:13px;font-weight:600">${esc(g.label)}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--text-dim)">${esc(valStr)} · ${pct}%</span>
        <span style="font-size:11px;color:var(--text3);background:var(--card2);padding:2px 6px;border-radius:6px">${esc(g.period)}</span>
        <button class="btn btn-icon btn-ghost btn-sm goal-edit-btn" data-id="${g.id}" title="Edit">✏️</button>
        <button class="btn btn-icon btn-ghost btn-sm goal-del-btn" data-id="${g.id}" title="Delete">🗑️</button>
      </div>
    </div>
    <div class="progress-bar" style="height:8px;border-radius:6px">
      <div class="progress-fill" style="width:${pct}%;background:${color};border-radius:6px;height:8px;transition:width .4s"></div>
    </div>
  </div>`;
}

async function deleteGoal(id) {
  try {
    await sb().from("crm_goals").delete().eq("id", id);
    toast("ok","Goal deleted");
    await renderGoals(_stats);
  } catch(e) { toast("bad","Error",e.message); }
}

function openGoalModal(id, goals) {
  const g = id && goals ? goals.find(x => x.id === id) : null;
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal" style="max-width:440px">
      <div class="modal-header">
        <h3>${g ? "Edit Goal" : "Set New Goal"}</h3>
        <button class="btn btn-ghost btn-sm modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Label *</label>
          <input class="form-control" id="gLabel" value="${esc(g?.label||"")}" placeholder="e.g. Monthly Revenue, New Leads"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Target Value *</label>
            <input class="form-control" id="gTarget" type="number" value="${g?.target_value||""}" placeholder="10000"/>
          </div>
          <div class="form-group">
            <label class="form-label">Current Value</label>
            <input class="form-control" id="gCurrent" type="number" value="${g?.current_value||0}"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Unit</label>
            <select class="form-control" id="gUnit">
              <option value="currency" ${g?.unit==="currency"||!g?"selected":""}>Currency (£)</option>
              <option value="number" ${g?.unit==="number"?"selected":""}>Number</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Period</label>
            <select class="form-control" id="gPeriod">
              <option value="monthly" ${g?.period==="monthly"||!g?"selected":""}>Monthly</option>
              <option value="quarterly" ${g?.period==="quarterly"?"selected":""}>Quarterly</option>
              <option value="yearly" ${g?.period==="yearly"?"selected":""}>Yearly</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn modal-close">Cancel</button>
        <button class="btn btn-primary" id="gSaveBtn">${g ? "Save" : "Create Goal"}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll(".modal-close").forEach(b => b.onclick = () => overlay.remove());
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector("#gSaveBtn").onclick = async () => {
    const label = overlay.querySelector("#gLabel").value.trim();
    const target = parseFloat(overlay.querySelector("#gTarget").value);
    if (!label || isNaN(target)) return toast("warn","Validation","Label and target value are required.");
    const btn = overlay.querySelector("#gSaveBtn");
    btn.disabled = true;
    try {
      const fields = {
        label,
        target_value: target,
        current_value: parseFloat(overlay.querySelector("#gCurrent").value) || 0,
        unit: overlay.querySelector("#gUnit").value,
        period: overlay.querySelector("#gPeriod").value,
        tenant_id: _profile.company_id,
      };
      if (g) await sb().from("crm_goals").update(fields).eq("id", g.id);
      else await sb().from("crm_goals").insert(fields);
      overlay.remove();
      toast("ok", g ? "Goal updated" : "Goal created");
      await renderGoals(_stats);
    } catch(e) { toast("bad","Error",e.message); btn.disabled = false; }
  };
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function initCharts(s) {
  _chartInstances.forEach(c => c.destroy());
  _chartInstances = [];

  // Pipeline bar chart
  const pCtx = document.getElementById("pipelineChart")?.getContext("2d");
  if (pCtx) {
    const stages = ["New","Contacted","Qualified","Proposal Sent","Negotiation"];
    const values = stages.map((_, i) => Math.max(0, s.pipelineValue * [.3,.25,.2,.15,.1][i]));
    _chartInstances.push(new Chart(pCtx, {
      type: "bar",
      data: {
        labels: stages,
        datasets: [{ label: "Value (£)", data: values, backgroundColor: ["#6366f1","#f59e0b","#3b82f6","#8b5cf6","#ec4899"], borderRadius: 6, borderSkipped: false }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: cssVar("--line") }, ticks: { color: cssVar("--text3"), font: { size: 11 } } },
          y: { grid: { color: cssVar("--line") }, ticks: { color: cssVar("--text3"), font: { size: 11 }, callback: v => "£"+v.toLocaleString() } }
        }
      }
    }));
  }

  // Lead pie chart
  const lCtx = document.getElementById("leadPieChart")?.getContext("2d");
  if (lCtx) {
    _chartInstances.push(new Chart(lCtx, {
      type: "doughnut",
      data: {
        labels: ["Active","Won","Lost"],
        datasets: [{ data: [s.activeLeads || 1, s.wonLeads || 0, s.lostLeads || 0], backgroundColor: ["#1e5cff","#10b981","#ef4444"], borderWidth: 0, hoverOffset: 4 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: "70%",
        plugins: { legend: { position: "bottom", labels: { color: cssVar("--text2"), font: { size: 12 }, boxWidth: 10 } } }
      }
    }));
  }
}

document.addEventListener("themechange", () => { if (_stats) initCharts(_stats); });

function renderLockedGoals() {
  const goalsCard = document.createElement("div");
  goalsCard.className = "card";
  goalsCard.style.cssText = "margin-bottom:16px;opacity:.55";
  goalsCard.innerHTML = `
    <div class="card-header">
      <h2>Goals &amp; Targets</h2>
      <span style="font-size:12px;color:var(--text-dim);background:var(--card2);padding:3px 10px;border-radius:99px">Professional+ ↑</span>
    </div>
    <div class="card-body">
      <p style="color:var(--text-dim);font-size:13px">Upgrade to Professional to set revenue goals, track lead targets, and monitor your team's performance over time.</p>
      <a href="/shop/index.html" class="btn btn-sm btn-primary" style="margin-top:10px;display:inline-block">View Plans →</a>
    </div>`;
  const content = document.getElementById("content");
  const statsGrid = content.querySelector(".stats-grid");
  if (statsGrid) statsGrid.insertAdjacentElement("afterend", goalsCard);
  else content.appendChild(goalsCard);
}
</script>
</body>
</html>
