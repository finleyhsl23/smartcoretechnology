<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Quote Acceptance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f3f4f6; color: #1a1a2e; min-height: 100vh; }

    .page-wrap { max-width: 760px; margin: 0 auto; padding: 32px 16px 64px; }

    .brand-bar { text-align: center; margin-bottom: 24px; }
    .brand-bar img { max-height: 52px; max-width: 200px; object-fit: contain; }
    .brand-name { font-size: 22px; font-weight: 800; color: #1a1a2e; }

    .status-banner { border-radius: 12px; padding: 24px 28px; margin-bottom: 24px; text-align: center; }
    .status-banner.accepted { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
    .status-banner.expired  { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
    .status-banner.rejected { background: linear-gradient(135deg, #6b7280, #4b5563); color: #fff; }
    .status-banner h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .status-banner p  { font-size: 14px; opacity: .85; }

    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 20px; overflow: hidden; }
    .card-body { padding: 28px 32px; }

    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    @media (max-width: 480px) { .meta-grid { grid-template-columns: 1fr; } }
    .meta-box { background: #f8f9fc; border-radius: 8px; padding: 14px; }
    .meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #9ca3af; font-weight: 700; margin-bottom: 4px; }
    .meta-value { font-size: 15px; font-weight: 700; color: #1a1a2e; }
    .meta-box.warn { background: #fff7ed; border: 1px solid #fed7aa; }
    .meta-box.warn .meta-label { color: #9a3412; }
    .meta-box.warn .meta-value { color: #9a3412; }

    table.items { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
    table.items thead tr { color: #fff; }
    table.items thead th { padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; font-weight: 700; }
    table.items thead th:first-child { text-align: left; border-radius: 6px 0 0 6px; }
    table.items thead th:last-child { border-radius: 0 6px 6px 0; }
    table.items tbody td { padding: 10px 14px; border-bottom: 1px solid #f3f4f6; }
    table.items tbody td:not(:first-child) { text-align: right; }
    table.items tbody td:nth-child(2) { text-align: center; }
    table.items tbody tr:last-child td { border-bottom: none; }

    .totals-wrap { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .totals-box { min-width: 260px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
    .totals-row { display: flex; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
    .totals-row.grand { color: #fff; font-weight: 800; font-size: 16px; border-bottom: none; }

    .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #6b7280; margin-bottom: 6px; }
    .notes-box { background: #f8f9fc; border-radius: 8px; padding: 14px; font-size: 13px; color: #374151; line-height: 1.6; white-space: pre-wrap; margin-bottom: 14px; }

    .sign-section { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); padding: 28px 32px; margin-bottom: 20px; }
    .sign-section h3 { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    .sign-section p  { font-size: 13px; color: #6b7280; margin-bottom: 20px; line-height: 1.6; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; color: #1a1a2e; background: #fff; outline: none; transition: border-color .15s, box-shadow .15s; font-family: inherit; }
    .form-control:focus { border-color: var(--primary, #1e5cff); box-shadow: 0 0 0 3px rgba(30,92,255,.12); }

    .legal-notice { background: #f8f9fc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; font-size: 12px; color: #6b7280; line-height: 1.6; margin-bottom: 20px; }
    .legal-notice strong { color: #374151; }

    .btn-accept { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; transition: opacity .15s, transform .1s; letter-spacing: .3px; }
    .btn-accept:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-accept:active:not(:disabled) { transform: translateY(0); }
    .btn-accept:disabled { opacity: .5; cursor: not-allowed; }

    .accepted-state { text-align: center; padding: 32px; }
    .accepted-state .big-check { font-size: 56px; margin-bottom: 12px; }
    .accepted-state h2 { font-size: 22px; font-weight: 800; color: #059669; margin-bottom: 8px; }
    .accepted-state p { font-size: 14px; color: #6b7280; line-height: 1.6; }

    .spinner-wrap { text-align: center; padding: 64px 0; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #1e5cff; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state { text-align: center; padding: 64px 32px; }
    .error-state h2 { font-size: 20px; font-weight: 700; color: #ef4444; margin-bottom: 8px; }
    .error-state p { font-size: 14px; color: #6b7280; }

    .footer { text-align: center; font-size: 11px; color: #9ca3af; padding-top: 8px; }
  </style>
</head>
<body>
<div class="page-wrap" id="pageWrap">
  <div class="spinner-wrap"><div class="spinner"></div><p style="color:#9ca3af;font-size:13px">Loading quote…</p></div>
</div>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  const wrap   = document.getElementById('pageWrap');

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  if (!token) {
    wrap.innerHTML = `<div class="error-state"><h2>Invalid Link</h2><p>No quote token was found in this URL.</p></div>`;
    return;
  }

  // Load quote
  let quote, branding;
  try {
    const res = await fetch(`/api/crm/accept-quote?token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load quote');
    quote    = data.quote;
    branding = data.branding || {};
  } catch(e) {
    wrap.innerHTML = `<div class="error-state"><h2>Link Not Found</h2><p>${esc(e.message)}</p></div>`;
    return;
  }

  const primary   = branding.primary_color   || '#1e5cff';
  const secondary = branding.secondary_color || '#0a0f1e';
  const prefer    = branding.prefer_icon === true;
  const logoUrl   = prefer ? (branding.icon_url || branding.logo_url) : (branding.logo_url || branding.icon_url);
  const issuerName = branding.company_name || 'SmartCore Technology';

  document.documentElement.style.setProperty('--primary', primary);
  document.title = `Quote ${quote.quote_number || ''} — ${issuerName}`;

  const isAccepted = !!quote.accepted_at;
  const isExpired  = quote.status === 'expired' || (quote.expiry_date && new Date(quote.expiry_date) < new Date() && !isAccepted);
  const isRejected = quote.status === 'rejected';
  const canAccept  = !isAccepted && !isExpired && !isRejected;

  // Line items table
  const lines = quote.line_items || [];
  const linesHtml = lines.map(li => `
    <tr>
      <td>${esc(li.description||'')}</td>
      <td>${li.qty||1}</td>
      <td>£${Number(li.unit_price||0).toFixed(2)}</td>
      <td><strong>£${Number(li.total||((li.qty||1)*(li.unit_price||0))).toFixed(2)}</strong></td>
    </tr>`).join('');

  const sub   = Number(quote.subtotal || 0);
  const disc  = Number(quote.discount_amount || 0);
  const total = sub > 0 ? Math.max(0, sub - disc) : Number(quote.total || 0);

  // Status banner (only for non-pending states)
  let statusBanner = '';
  if (isAccepted) {
    const when = new Date(quote.accepted_at).toLocaleString('en-GB',{dateStyle:'long',timeStyle:'short'});
    statusBanner = `<div class="status-banner accepted"><h2>✅ Quote Accepted</h2><p>This quote was accepted${quote.accepted_by_name ? ` by ${esc(quote.accepted_by_name)}` : ''} on ${when}</p></div>`;
  } else if (isExpired) {
    statusBanner = `<div class="status-banner expired"><h2>⏰ Quote Expired</h2><p>This quote expired on ${fmtDate(quote.expiry_date)}. Please contact us for an updated quote.</p></div>`;
  } else if (isRejected) {
    statusBanner = `<div class="status-banner rejected"><h2>Quote Declined</h2><p>This quote has been marked as declined.</p></div>`;
  }

  // Expiry warning
  const expiryMeta = quote.expiry_date
    ? `<div class="meta-box ${!isAccepted && isExpired ? 'warn' : ''}">
        <div class="meta-label">Valid Until</div>
        <div class="meta-value">${fmtDate(quote.expiry_date)}</div>
      </div>`
    : '';

  // Sign section
  const signSection = canAccept ? `
    <div class="sign-section">
      <h3>Accept this Quote</h3>
      <p>By submitting below, you confirm that you have read and agree to the terms of this quote. Your acceptance is legally binding and will notify the ${esc(issuerName)} team immediately.</p>
      <div class="form-group">
        <label class="form-label" for="signerName">Your Full Name *</label>
        <input class="form-control" id="signerName" type="text" placeholder="e.g. Jane Smith" autocomplete="name"/>
      </div>
      <div class="legal-notice">
        <strong>Electronic Signature Notice:</strong> By entering your name and clicking "Accept &amp; Sign Quote", you are providing your electronic signature and agreeing to the terms stated in this quote. This acceptance is legally binding under the Electronic Communications Act 2000.
      </div>
      <button class="btn-accept" id="acceptBtn" style="background:${primary}">
        Accept &amp; Sign Quote →
      </button>
    </div>` : '';

  wrap.innerHTML = `
    <div class="brand-bar">
      ${logoUrl ? `<img src="${esc(logoUrl)}" alt="${esc(issuerName)}"/>` : `<div class="brand-name">${esc(issuerName)}</div>`}
    </div>

    ${statusBanner}

    <div class="card">
      <div style="background:${secondary};padding:24px 32px;display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.6);margin-bottom:4px">Quote</div>
          <div style="font-size:28px;font-weight:900;color:#fff">${esc(quote.quote_number||'')}</div>
          ${quote.title ? `<div style="font-size:14px;color:rgba(255,255,255,.75);margin-top:4px">${esc(quote.title)}</div>` : ''}
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.6);margin-bottom:4px">Total</div>
          <div style="font-size:24px;font-weight:900;color:#fff">£${total.toFixed(2)}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="meta-grid">
          <div class="meta-box">
            <div class="meta-label">Prepared for</div>
            <div class="meta-value">${esc(quote.company_name||'—')}</div>
          </div>
          <div class="meta-box">
            <div class="meta-label">Date Issued</div>
            <div class="meta-value">${fmtDate(quote.date_issued)}</div>
          </div>
          ${expiryMeta}
          <div class="meta-box">
            <div class="meta-label">Issued By</div>
            <div class="meta-value">${esc(issuerName)}</div>
          </div>
        </div>

        <table class="items">
          <thead>
            <tr style="background:${primary}">
              <th>Description</th>
              <th style="text-align:center">Qty</th>
              <th style="text-align:right">Unit Price</th>
              <th style="text-align:right">Total</th>
            </tr>
          </thead>
          <tbody>
            ${linesHtml || `<tr><td colspan="4" style="text-align:center;color:#9ca3af;padding:16px">No line items</td></tr>`}
          </tbody>
        </table>

        <div class="totals-wrap">
          <div class="totals-box">
            <div class="totals-row"><span>Subtotal</span><span>£${(sub||total).toFixed(2)}</span></div>
            ${disc > 0 ? `<div class="totals-row"><span>Discount</span><span>-£${disc.toFixed(2)}</span></div>` : ''}
            <div class="totals-row grand" style="background:${primary}"><span>TOTAL</span><span>£${total.toFixed(2)}</span></div>
          </div>
        </div>

        ${quote.notes ? `<div class="section-label">Notes</div><div class="notes-box">${esc(quote.notes)}</div>` : ''}
        <div class="section-label">Terms &amp; Conditions</div>
        <div class="notes-box">${esc(quote.terms||'Payment due within 30 days.')}</div>
      </div>
    </div>

    ${signSection}

    <div class="footer">Quote ${esc(quote.quote_number||'')} · ${esc(issuerName)}</div>
  `;

  if (!canAccept) return;

  document.getElementById('acceptBtn').addEventListener('click', async () => {
    const name = document.getElementById('signerName').value.trim();
    if (!name) {
      document.getElementById('signerName').focus();
      document.getElementById('signerName').style.borderColor = '#ef4444';
      return;
    }

    const btn = document.getElementById('acceptBtn');
    btn.disabled = true;
    btn.textContent = 'Processing…';

    try {
      const res = await fetch('/api/crm/accept-quote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, signer_name: name }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      // Show confirmed state
      document.querySelector('.sign-section').innerHTML = `
        <div class="accepted-state">
          <div class="big-check">✅</div>
          <h2>Quote Accepted!</h2>
          <p>Thank you, <strong>${esc(name)}</strong>. Your acceptance has been recorded and the ${esc(issuerName)} team has been notified. You'll receive a confirmation email shortly.</p>
        </div>`;

      // Update status banner
      const existing = document.querySelector('.status-banner');
      const banner = document.createElement('div');
      banner.className = 'status-banner accepted';
      banner.innerHTML = `<h2>✅ Quote Accepted</h2><p>Accepted by ${esc(name)} — ${new Date().toLocaleString('en-GB',{dateStyle:'long',timeStyle:'short'})}</p>`;
      if (existing) existing.replaceWith(banner);
      else wrap.insertBefore(banner, wrap.querySelector('.card'));

    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Accept & Sign Quote →';
      btn.style.background = '#ef4444';
      setTimeout(() => { btn.style.background = primary; }, 2000);
      alert('Something went wrong: ' + e.message);
    }
  });
})();
</script>
</body>
</html>
