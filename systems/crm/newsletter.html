<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Newsletter — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=3"/>
  <style>
    .var-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 99px; cursor: pointer;
      border: 1px solid rgba(91,143,255,.3); background: rgba(91,143,255,.08);
      color: #5b8fff; font-size: 12px; font-weight: 600; font-family: monospace;
      transition: background .12s, border-color .12s; white-space: nowrap; user-select: none;
    }
    .var-pill:hover { background: rgba(91,143,255,.18); border-color: rgba(91,143,255,.5); }
    .var-pills { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px 12px; border-top: 1px solid var(--line2); }

    .preview-wrap {
      background: #f0f4ff; border-radius: 12px; padding: 24px;
      font-family: 'Segoe UI', Arial, sans-serif; overflow: auto;
    }
    .preview-inner {
      background: #fff; border-radius: 14px; max-width: 540px; margin: 0 auto;
      box-shadow: 0 4px 24px rgba(0,0,0,.1); overflow: hidden;
    }
    .preview-header { padding: 26px 36px; text-align: center; }
    .preview-body   { padding: 32px 36px 24px; color: #1a1a2e; }
    .preview-footer { padding: 16px 36px; text-align: center; font-size: 12px; color: #9ca3af; background: #f8f9fc; border-top: 1px solid #e5e7eb; }

    .recipient-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(30,92,255,.1); border: 1px solid rgba(30,92,255,.2);
      border-radius: 99px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: var(--blue2);
    }
    .progress-bar-wrap { height: 6px; background: var(--line2); border-radius: 99px; overflow: hidden; margin-top: 6px; }
    .progress-bar-fill { height: 100%; background: #1e5cff; border-radius: 99px; transition: width .3s; }

    .quota-bar-wrap { height: 5px; background: var(--line2); border-radius: 99px; overflow: hidden; margin-top: 5px; }
    .quota-bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }
    .quota-ok   { background: #22c55e; }
    .quota-warn { background: #f59e0b; }
    .quota-full { background: #ef4444; }

    .mode-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--line2); font-size: 13px; font-weight: 600;
      transition: all .15s; white-space: nowrap; background: none; color: var(--text1);
    }
    .mode-pill.active { background: rgba(30,92,255,.1); border-color: rgba(30,92,255,.4); color: var(--blue2); }
    .mode-pill:hover:not(.active) { border-color: var(--line3); }

    .picker-search {
      width: 100%; box-sizing: border-box;
      padding: 8px 12px; border-radius: 8px; border: 1px solid var(--line2);
      background: var(--bg2); color: var(--text1); font-size: 13px;
      outline: none; transition: border-color .15s;
    }
    .picker-search:focus { border-color: rgba(30,92,255,.5); }

    .picker-list {
      max-height: 200px; overflow-y: auto; display: flex; flex-direction: column;
      gap: 2px; margin-top: 8px;
    }
    .picker-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      border-radius: 8px; cursor: pointer; transition: background .1s;
      font-size: 13px; user-select: none;
    }
    .picker-item:hover { background: var(--bg3); }
    .picker-item input[type="checkbox"] { accent-color: #1e5cff; width: 15px; height: 15px; flex-shrink: 0; }
    .picker-item-main { flex: 1; min-width: 0; }
    .picker-item-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .picker-item-sub { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .picker-empty { text-align: center; padding: 20px; font-size: 13px; color: var(--text3); }

    .select-all-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid var(--line2); margin-bottom: 4px;
      font-size: 12px; color: var(--text3);
    }
    .select-all-row button {
      background: none; border: none; color: var(--blue2); font-size: 12px;
      font-weight: 600; cursor: pointer; padding: 2px 6px; border-radius: 4px;
    }
    .select-all-row button:hover { background: rgba(30,92,255,.1); }
  </style>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Newsletter</div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess, tierHasFeature, getCRMSettings } from "/systems/crm/shared/auth.js?v=3";
import { sb } from "/systems/crm/shared/supabase.js";
import { renderNav, initMobileNav, initTopbar } from "/systems/crm/shared/nav.js?v=11";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, toast, tierGate, confirm } from "/systems/crm/shared/ui.js";

initTheme();

let profile, tier, crmSettings;
let _mode = "all_contacts"; // "all_contacts" | "portal_users" | "both" | "by_company" | "select_contacts"
let _recipientCount = 0;
let _selectedCompanyIds = new Set();
let _selectedContactIds = new Set();
let _allCompanies = null;  // loaded lazily
let _allContacts  = null;  // loaded lazily
let _contactSearch = "";
let _companySearch = "";

const VARIABLES = [
  { tag: "{{name}}",         label: "Their Name" },
  { tag: "{{first_name}}",   label: "Their First Name" },
  { tag: "{{company}}",      label: "Their Company Name" },
  { tag: "{{your_company}}", label: "Your Company Name" },
];

// ── Functions defined before try block so they're available when renderPage runs ──

window.insertVar = (fieldId, tag) => {
  const el = document.getElementById(fieldId);
  if (!el) return;
  const start = el.selectionStart ?? el.value.length;
  const end   = el.selectionEnd   ?? el.value.length;
  el.value = el.value.slice(0, start) + tag + el.value.slice(end);
  el.selectionStart = el.selectionEnd = start + tag.length;
  el.focus();
  window.updatePreview();
};

window.updatePreview = () => {
  const branding = crmSettings?.branding || {};
  const companyName = branding.company_name || "SmartCore Technology";
  const subject = document.getElementById("nlSubject")?.value || "";
  const body    = document.getElementById("nlBody")?.value || "";

  const sample = { name: "Jane Smith", first_name: "Jane", company: "Acme Ltd", your_company: companyName };
  const filled = (s) => s
    .replace(/\{\{name\}\}/g, sample.name)
    .replace(/\{\{first_name\}\}/g, sample.first_name)
    .replace(/\{\{company\}\}/g, sample.company)
    .replace(/\{\{your_company\}\}/g, sample.your_company);

  const bodyEl = document.getElementById("previewBody");
  if (!bodyEl) return;
  if (!body.trim()) {
    bodyEl.innerHTML = `<p style="color:#9ca3af;font-size:14px">Start typing to preview your email…</p>`;
    return;
  }
  const htmlBody = filled(esc(body)).replace(/\n{2,}/g, '</p><p style="margin:0 0 16px">').replace(/\n/g, "<br>");
  bodyEl.innerHTML = subject ? `<h2 style="margin:0 0 16px;font-size:20px;font-weight:800;color:#0a0f2e">${esc(filled(subject))}</h2>` : "";
  bodyEl.innerHTML += `<p style="margin:0 0 16px;font-size:15px;color:#374151;line-height:1.7">${htmlBody}</p>`;
};

window.sendNewsletter = async () => {
  const subject = document.getElementById("nlSubject")?.value.trim();
  const body    = document.getElementById("nlBody")?.value.trim();
  if (!subject) return toast("warn","Missing","Please enter a subject.");
  if (!body)    return toast("warn","Missing","Please enter a body.");
  if (!_recipientCount) return toast("warn","No recipients","No recipients found for the selected group.");

  const payload = { subject, body, recipient_type: _mode };
  if (_mode === "by_company")       payload.company_ids      = [..._selectedCompanyIds];
  if (_mode === "select_contacts")  payload.contact_ids      = [..._selectedContactIds];

  confirm(
    "Send Newsletter",
    `Send to ${_recipientCount} recipient${_recipientCount===1?"":"s"}? This cannot be undone.`,
    async () => {
      const btn = document.getElementById("sendBtn");
      const prog = document.getElementById("sendProgress");
      btn.disabled = true; btn.textContent = "Sending…";
      prog.style.display = "block";

      const { data: { session } } = await sb().auth.getSession();
      try {
        const res = await fetch("/api/crm/send-newsletter", {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify(payload),
        });
        const json = await res.json();
        document.getElementById("progressFill").style.width = "100%";
        document.getElementById("progressLabel").textContent = `Done — ${json.sent} sent${json.failed ? ", "+json.failed+" failed" : ""}`;
        if (json.error) {
          toast("bad","Error",json.error);
          btn.disabled = false; btn.textContent = "📧 Send Newsletter";
        } else {
          const cappedMsg = json.capped ? ` (${json.capped} skipped — quota)` : "";
          toast("ok","Newsletter sent",`${json.sent} emails delivered${cappedMsg}`);
          btn.textContent = "✅ Sent";
          loadQuota();
        }
      } catch(e) {
        toast("bad","Error",e.message);
        btn.disabled = false; btn.textContent = "📧 Send Newsletter";
        prog.style.display = "none";
      }
    }
  );
};

// ── Bootstrap ──

try {
  ({ profile, tier } = await requireCRMAccess());
  crmSettings = await getCRMSettings();
  renderNav("newsletter", profile, tier, crmSettings);
  initMobileNav();
  initTopbar(profile);

  if (!tierHasFeature(tier, "newsletter")) {
    document.getElementById("content").innerHTML = tierGate("newsletter");
  } else {
    await renderPage();
  }
} catch(e) { if (!e.message?.includes("CRM not enabled") && !e.message?.includes("session")) toast("bad","Error",e.message); }

// ── Page render ──

async function renderPage() {
  const branding = crmSettings?.branding || {};
  const companyName = branding.company_name || "SmartCore Technology";
  const primaryColor = branding.primary_color || "#1e5cff";
  const logoUrl = branding.prefer_icon ? (branding.icon_url || branding.logo_url) : (branding.logo_url || branding.icon_url);

  document.getElementById("content").innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Newsletter</h1>
        <p>Compose and send branded emails to your contacts or portal users</p>
      </div>
      <div id="quotaBadge" style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:180px"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

      <!-- Composer -->
      <div style="display:flex;flex-direction:column;gap:16px">

        <!-- Recipients -->
        <div class="card">
          <div class="card-header"><h2>Recipients</h2></div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:12px">

            <!-- Mode selector -->
            <div style="display:flex;gap:6px;flex-wrap:wrap" id="modePills">
              ${[
                ["all_contacts",    "📋 All Contacts"],
                ["portal_users",    "🌐 Portal Users"],
                ["both",            "👥 Both"],
                ["by_company",      "🏢 By Company"],
                ["select_contacts", "👤 Select Contacts"],
              ].map(([v,l]) => `<button class="mode-pill${_mode===v?" active":""}" data-mode="${v}">${l}</button>`).join("")}
            </div>

            <!-- Picker panel (hidden unless by_company or select_contacts) -->
            <div id="pickerPanel" style="display:none"></div>

            <!-- Count display -->
            <div id="recipientCount" style="font-size:13px;color:var(--text3)">Loading…</div>
          </div>
        </div>

        <!-- Subject -->
        <div class="card">
          <div class="card-header"><h2>Subject</h2></div>
          <div class="card-body" style="padding-bottom:0">
            <input class="form-control" id="nlSubject" placeholder="e.g. Important update for {{company}}" oninput="window.updatePreview()"/>
          </div>
          <div class="var-pills">
            ${VARIABLES.map(v => `<button type="button" class="var-pill" onclick="window.insertVar('nlSubject','${v.tag}')">${v.label}</button>`).join("")}
          </div>
        </div>

        <!-- Body -->
        <div class="card">
          <div class="card-header"><h2>Body</h2></div>
          <div class="card-body" style="padding-bottom:0">
            <textarea class="form-control" id="nlBody" rows="10" placeholder="Hi {{first_name}},&#10;&#10;We wanted to share some exciting news with you…" oninput="window.updatePreview()" style="resize:vertical;font-size:14px;line-height:1.6"></textarea>
          </div>
          <div class="var-pills">
            ${VARIABLES.map(v => `<button type="button" class="var-pill" onclick="window.insertVar('nlBody','${v.tag}')">${v.label}</button>`).join("")}
          </div>
          <div style="padding:0 16px 12px;font-size:12px;color:var(--text3)">Click a variable to insert it at the cursor. Line breaks become paragraphs.</div>
        </div>

        <!-- Send button -->
        <button class="btn btn-primary" id="sendBtn" style="padding:14px;font-size:15px;font-weight:700" onclick="window.sendNewsletter()">
          📧 Send Newsletter
        </button>
        <div id="sendProgress" style="display:none">
          <div style="font-size:13px;color:var(--text3);margin-bottom:4px" id="progressLabel">Sending…</div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
        </div>
      </div>

      <!-- Preview -->
      <div class="card" style="position:sticky;top:20px">
        <div class="card-header"><h2>Preview</h2><span style="font-size:12px;color:var(--text3)">Sample recipient</span></div>
        <div class="card-body" style="padding:0">
          <div class="preview-wrap" id="emailPreview">
            <div class="preview-inner">
              <div class="preview-header" style="background:${primaryColor}">
                ${logoUrl
                  ? `<img src="${logoUrl}" alt="${esc(companyName)}" style="max-height:48px;max-width:180px;object-fit:contain;display:block;margin:0 auto"/>`
                  : `<div style="font-size:20px;font-weight:800;color:#fff">${esc(companyName)}</div>`}
              </div>
              <div class="preview-body" id="previewBody">
                <p style="color:#9ca3af;font-size:14px">Start typing to preview your email…</p>
              </div>
              <div class="preview-footer">${esc(companyName)} · Sent via SmartCore CRM</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  // Mode pill clicks
  document.getElementById("modePills").addEventListener("click", async e => {
    const btn = e.target.closest(".mode-pill");
    if (!btn) return;
    const newMode = btn.dataset.mode;
    if (newMode === _mode) return;
    _mode = newMode;
    document.querySelectorAll(".mode-pill").forEach(p => p.classList.toggle("active", p.dataset.mode === _mode));
    await switchMode();
  });

  await switchMode(); // initial load — count + picker
  window.updatePreview();
  loadQuota();
}

// ── Mode switching ──

async function switchMode() {
  const panel = document.getElementById("pickerPanel");
  if (_mode === "by_company") {
    panel.style.display = "block";
    await renderCompanyPicker();
  } else if (_mode === "select_contacts") {
    panel.style.display = "block";
    await renderContactPicker();
  } else {
    panel.style.display = "none";
    await refreshSimpleCount();
  }
}

// ── Simple count (all_contacts / portal_users / both) ──

async function refreshSimpleCount() {
  setCountEl("Loading…", false);
  try {
    let count = 0;
    if (_mode === "all_contacts" || _mode === "both") {
      const { count: c } = await sb().from("crm_contacts").select("id", { count: "exact", head: true })
        .eq("tenant_id", profile.company_id).not("email", "is", null).neq("email", "");
      count += c || 0;
    }
    if (_mode === "portal_users" || _mode === "both") {
      const { count: c } = await sb().from("crm_portal_users").select("id", { count: "exact", head: true })
        .eq("tenant_id", profile.company_id).eq("status", "active");
      count += c || 0;
    }
    _recipientCount = count;
    setCountEl(count, true);
  } catch { setCountEl("Could not load count", false); }
}

function setCountEl(val, isCount) {
  const el = document.getElementById("recipientCount");
  if (!el) return;
  if (isCount) {
    _recipientCount = val;
    el.innerHTML = `<span class="recipient-chip">📬 ${val} recipient${val===1?"":"s"}</span>`;
  } else {
    el.textContent = val;
  }
}

// ── Company picker ──

async function renderCompanyPicker() {
  const panel = document.getElementById("pickerPanel");
  panel.innerHTML = `<div style="font-size:13px;color:var(--text3);padding:8px 0">Loading companies…</div>`;
  setCountEl("Select companies below", false);

  if (!_allCompanies) {
    const { data } = await sb().from("crm_companies").select("id,name")
      .eq("tenant_id", profile.company_id).order("name");
    _allCompanies = data || [];
  }
  renderCompanyList();
}

function renderCompanyList() {
  const panel = document.getElementById("pickerPanel");
  const q = _companySearch.toLowerCase();
  const filtered = _allCompanies.filter(c => c.name.toLowerCase().includes(q));
  const selCount = _selectedCompanyIds.size;

  panel.innerHTML = `
    <input class="picker-search" id="companySearch" placeholder="Search companies…" value="${esc(_companySearch)}"/>
    <div class="select-all-row">
      <span>${selCount} selected</span>
      <div style="display:flex;gap:4px">
        <button onclick="window._companySelectAll()">Select all</button>
        <button onclick="window._companyClearAll()">Clear</button>
      </div>
    </div>
    <div class="picker-list" id="companyPickerList">
      ${filtered.length ? filtered.map(c => `
        <label class="picker-item">
          <input type="checkbox" value="${c.id}" ${_selectedCompanyIds.has(c.id)?"checked":""} onchange="window._companyToggle('${c.id}')"/>
          <div class="picker-item-main">
            <div class="picker-item-name">${esc(c.name)}</div>
          </div>
        </label>`).join("") : `<div class="picker-empty">No companies found</div>`}
    </div>`;

  document.getElementById("companySearch").addEventListener("input", e => {
    _companySearch = e.target.value;
    renderCompanyList();
  });

  updateCompanyCount();
}

window._companyToggle = async (id) => {
  if (_selectedCompanyIds.has(id)) _selectedCompanyIds.delete(id);
  else _selectedCompanyIds.add(id);
  renderCompanyList();
};
window._companySelectAll = () => {
  _allCompanies.forEach(c => _selectedCompanyIds.add(c.id));
  renderCompanyList();
};
window._companyClearAll = () => {
  _selectedCompanyIds.clear();
  renderCompanyList();
};

async function updateCompanyCount() {
  if (!_selectedCompanyIds.size) {
    _recipientCount = 0;
    setCountEl("Select companies above to see recipient count", false);
    return;
  }
  setCountEl("Counting…", false);
  try {
    const { count } = await sb().from("crm_contacts").select("id", { count: "exact", head: true })
      .eq("tenant_id", profile.company_id)
      .in("crm_company_id", [..._selectedCompanyIds])
      .not("email", "is", null).neq("email", "");
    _recipientCount = count || 0;
    setCountEl(_recipientCount, true);
  } catch { setCountEl("Could not count", false); }
}

// ── Contact picker ──

async function renderContactPicker() {
  const panel = document.getElementById("pickerPanel");
  panel.innerHTML = `<div style="font-size:13px;color:var(--text3);padding:8px 0">Loading contacts…</div>`;
  setCountEl("Select contacts below", false);

  if (!_allContacts) {
    // Load contacts + companies for display
    const [cRes, compRes] = await Promise.all([
      sb().from("crm_contacts").select("id,first_name,last_name,email,crm_company_id")
        .eq("tenant_id", profile.company_id).not("email","is",null).neq("email","").order("first_name").limit(2000),
      sb().from("crm_companies").select("id,name").eq("tenant_id", profile.company_id),
    ]);
    const compMap = Object.fromEntries((compRes.data || []).map(c => [c.id, c.name]));
    _allContacts = (cRes.data || []).map(c => ({
      id: c.id,
      name: [c.first_name, c.last_name].filter(Boolean).join(" ") || c.email,
      email: c.email,
      company: c.crm_company_id ? (compMap[c.crm_company_id] || "") : "",
    }));
  }
  renderContactList();
}

function renderContactList() {
  const panel = document.getElementById("pickerPanel");
  const q = _contactSearch.toLowerCase();
  const filtered = _allContacts.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.email.toLowerCase().includes(q) ||
    c.company.toLowerCase().includes(q)
  );
  const selCount = _selectedContactIds.size;

  panel.innerHTML = `
    <input class="picker-search" id="contactSearch" placeholder="Search by name, email or company…" value="${esc(_contactSearch)}"/>
    <div class="select-all-row">
      <span>${selCount} selected</span>
      <div style="display:flex;gap:4px">
        <button onclick="window._contactSelectAll()">Select all visible</button>
        <button onclick="window._contactClearAll()">Clear</button>
      </div>
    </div>
    <div class="picker-list" id="contactPickerList">
      ${filtered.length ? filtered.map(c => `
        <label class="picker-item">
          <input type="checkbox" value="${c.id}" ${_selectedContactIds.has(c.id)?"checked":""} onchange="window._contactToggle('${c.id}')"/>
          <div class="picker-item-main">
            <div class="picker-item-name">${esc(c.name)}</div>
            <div class="picker-item-sub">${esc(c.email)}${c.company ? " · "+esc(c.company) : ""}</div>
          </div>
        </label>`).join("") : `<div class="picker-empty">No contacts found</div>`}
    </div>`;

  document.getElementById("contactSearch").addEventListener("input", e => {
    _contactSearch = e.target.value;
    renderContactList();
  });

  updateContactCount();
}

window._contactToggle = (id) => {
  if (_selectedContactIds.has(id)) _selectedContactIds.delete(id);
  else _selectedContactIds.add(id);
  // update checkbox without full re-render
  const cb = document.querySelector(`#contactPickerList input[value="${id}"]`);
  if (cb) cb.checked = _selectedContactIds.has(id);
  updateContactCount();
  // update selected count label
  const row = document.querySelector(".select-all-row span");
  if (row) row.textContent = `${_selectedContactIds.size} selected`;
};
window._contactSelectAll = () => {
  const q = _contactSearch.toLowerCase();
  _allContacts.filter(c =>
    c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q) || c.company.toLowerCase().includes(q)
  ).forEach(c => _selectedContactIds.add(c.id));
  renderContactList();
};
window._contactClearAll = () => {
  _selectedContactIds.clear();
  renderContactList();
};

function updateContactCount() {
  _recipientCount = _selectedContactIds.size;
  if (!_recipientCount) {
    setCountEl("Select contacts above to see recipient count", false);
  } else {
    setCountEl(_recipientCount, true);
  }
}

// ── Monthly quota ──

async function loadQuota() {
  const el = document.getElementById("quotaBadge");
  if (!el) return;
  try {
    const { data: { session } } = await sb().auth.getSession();
    const res = await fetch("/api/crm/newsletter-usage", {
      headers: { Authorization: `Bearer ${session.access_token}` },
    });
    const q = await res.json();
    if (!res.ok || !q.limit) return;

    const pct = Math.min(100, Math.round((q.used / q.limit) * 100));
    const cls = pct >= 100 ? "quota-full" : pct >= 80 ? "quota-warn" : "quota-ok";
    const remaining = Math.max(0, q.limit - q.used);

    el.innerHTML = `
      <div style="font-size:12px;color:var(--text3);text-align:right">
        <span style="font-weight:700;color:var(--text1)">${remaining}</span> of ${q.limit} emails remaining this month
      </div>
      <div style="width:180px">
        <div class="quota-bar-wrap">
          <div class="quota-bar-fill ${cls}" style="width:${pct}%"></div>
        </div>
      </div>`;

    // Disable send if quota exhausted
    if (remaining === 0) {
      const btn = document.getElementById("sendBtn");
      if (btn) { btn.disabled = true; btn.textContent = "Monthly limit reached"; }
    }
  } catch (_) {}
}

</script>
