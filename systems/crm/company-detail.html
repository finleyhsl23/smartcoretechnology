<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Company — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=2"/>
  <style>
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .detail-field { display: flex; flex-direction: column; gap: 4px; }
    .detail-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); }
    .detail-value { font-size: 14px; color: var(--text1); font-weight: 500; }
    .detail-value a { color: var(--blue2); text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }

    .conv-item { padding: 14px 16px; border-bottom: 1px solid var(--line2); }
    .conv-item:last-child { border-bottom: none; }
    .conv-method-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700;
      background: rgba(30,92,255,.1); color: var(--blue2); border: 1px solid rgba(30,92,255,.2);
    }
    .conv-attendees { display: flex; gap: 16px; font-size: 12px; color: var(--text3); margin-top: 6px; }
    .conv-attendees span { display: flex; align-items: center; gap: 4px; }
    .conv-summary { font-size: 13px; color: var(--text1); margin-top: 8px; line-height: 1.55; white-space: pre-wrap; }
    .conv-followup { margin-top: 8px; font-size: 12px; color: var(--amber, #f59e0b); display: flex; align-items: center; gap: 5px; }

    .contact-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px; background: var(--bg2);
      border: 1px solid var(--line2);
    }
    .contact-chip-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--blue2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    /* Searchable / multi-select */
    .ss-wrap { position: relative; }
    .ss-chips {
      display: flex; flex-wrap: wrap; gap: 5px; min-height: 0;
    }
    .ss-chips:not(:empty) { margin-bottom: 6px; }
    .ss-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 99px; font-size: 12px; font-weight: 600;
      background: rgba(30,92,255,.15); color: var(--blue2);
      border: 1px solid rgba(30,92,255,.25);
    }
    .ss-chip button {
      background: none; border: none; cursor: pointer; color: inherit;
      padding: 0; font-size: 13px; line-height: 1; opacity: .7;
    }
    .ss-chip button:hover { opacity: 1; }
    .ss-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 300;
      background: var(--bg2); border: 1px solid var(--line1); border-radius: 8px;
      max-height: 180px; overflow-y: auto; margin-top: 3px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    .ss-option {
      padding: 9px 12px; cursor: pointer; font-size: 13px;
      border-bottom: 1px solid var(--line2);
    }
    .ss-option:last-child { border-bottom: none; }
    .ss-option:hover { background: rgba(30,92,255,.1); color: var(--blue2); }
    .ss-option[data-empty] { color: var(--text3); cursor: default; font-style: italic; }
    .ss-option.selected { opacity: .4; cursor: default; }
  </style>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title" id="topbarTitle">Company</div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess } from "/systems/crm/shared/auth.js?v=3";
import { sb } from "/systems/crm/shared/supabase.js";
import { renderNav, initMobileNav, initTopbar } from "/systems/crm/shared/nav.js?v=11";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, fmt, fmtDate, fmtDateTime, timeAgo, toast, confirm, modal, companyStatusBadge, initials } from "/systems/crm/shared/ui.js";
import { loadStatusLabels, getCompanyStatuses } from "/systems/crm/shared/statusLabels.js?v=2";

initTheme();

const params = new URLSearchParams(location.search);
const companyId = params.get("id");
if (!companyId) { location.href = "/systems/crm/companies.html"; throw new Error("No ID"); }

let profile, tier, company, contacts = [], conversations = [], staff = [];
let convSearch = "";

try {
  ({ profile, tier } = await requireCRMAccess());
  renderNav("companies", profile, tier);
  initMobileNav();
  initTopbar(profile);
  await loadStatusLabels(profile.company_id);
  await loadAll();
} catch(e) { if (!e.message?.includes("CRM not enabled") && !e.message?.includes("session")) toast("bad","Error",e.message); }

async function loadAll() {
  const client = sb();
  const [compRes, contactRes, convRes, staffRes] = await Promise.all([
    client.from("crm_companies").select("*").eq("id", companyId).eq("tenant_id", profile.company_id).single(),
    client.from("crm_contacts").select("*").eq("crm_company_id", companyId).eq("tenant_id", profile.company_id).order("first_name"),
    client.from("crm_company_conversations").select("*").eq("company_id", companyId).eq("tenant_id", profile.company_id).order("occurred_at", { ascending: false }),
    client.from("core_employees").select("id,full_name").eq("company_id", profile.company_id).order("full_name"),
  ]);
  if (compRes.error || !compRes.data) { toast("bad","Not found","Company not found."); location.href = "/systems/crm/companies.html"; return; }
  company = compRes.data;
  contacts = contactRes.data || [];
  conversations = convRes.data || [];
  staff = staffRes.data || [];
  document.getElementById("topbarTitle").textContent = company.name;
  renderPage();
}

function renderPage() {
  const assignedStaff = staff.find(s => s.id === company.assigned_to);
  document.getElementById("content").innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <a href="/systems/crm/companies.html" style="font-size:13px;color:var(--text3);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:6px">← Back to Companies</a>
        <h1 style="display:flex;align-items:center;gap:10px">${esc(company.name)} ${companyStatusBadge(company.status)}</h1>
        ${company.industry ? `<p>${esc(company.industry)}</p>` : ""}
      </div>
      <div class="page-header-actions">
        <button class="btn" id="editBtn">✏️ Edit Details</button>
        <button class="btn btn-danger" id="deleteBtn">Delete</button>
      </div>
    </div>

    <div class="detail-grid">
      <!-- Left column -->
      <div style="display:flex;flex-direction:column;gap:16px">

        <!-- Details card -->
        <div class="card">
          <div class="card-header"><h2>Details</h2></div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              <div class="detail-field">
                <div class="detail-label">Email</div>
                <div class="detail-value">${company.email ? `<a href="mailto:${esc(company.email)}">${esc(company.email)}</a>` : "—"}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">Phone</div>
                <div class="detail-value">${company.phone ? `<a href="tel:${esc(company.phone)}">${esc(company.phone)}</a>` : "—"}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">Website</div>
                <div class="detail-value">${company.website ? `<a href="${esc(company.website)}" target="_blank" rel="noopener">${esc(company.website)}</a>` : "—"}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">Value</div>
                <div class="detail-value">${company.company_value ? fmt(company.company_value) : "—"}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">Assigned To</div>
                <div class="detail-value">${assignedStaff ? esc(assignedStaff.full_name) : "Unassigned"}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">Customer Since</div>
                <div class="detail-value">${company.customer_since ? fmtDate(company.customer_since) : "—"}</div>
              </div>
              ${company.address_line1 || company.city || company.postcode ? `
              <div class="detail-field" style="grid-column:span 2">
                <div class="detail-label">Address</div>
                <div class="detail-value">${[company.address_line1, company.city, company.postcode].filter(Boolean).map(esc).join(", ")}</div>
              </div>` : ""}
              ${company.notes ? `
              <div class="detail-field" style="grid-column:span 2">
                <div class="detail-label">Notes</div>
                <div class="detail-value" style="white-space:pre-wrap;font-size:13px;color:var(--text2)">${esc(company.notes)}</div>
              </div>` : ""}
            </div>
          </div>
        </div>

        <!-- Contacts card -->
        <div class="card">
          <div class="card-header">
            <h2>Contacts <span style="font-size:13px;font-weight:500;color:var(--text3)">${contacts.length}</span></h2>
            <button class="btn btn-sm btn-primary" id="addContactBtn">+ Add Contact</button>
          </div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:8px" id="contactsList">
            ${contacts.length === 0
              ? `<div class="empty-state" style="padding:20px 0"><div class="empty-icon">👤</div><p>No contacts yet</p></div>`
              : contacts.map(c => `
                <div class="contact-chip">
                  <div class="contact-chip-avatar">${esc(initials(`${c.first_name} ${c.last_name}`))}</div>
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:600;font-size:13px">${esc(c.first_name)} ${esc(c.last_name)}</div>
                    ${c.job_title ? `<div style="font-size:11px;color:var(--text3)">${esc(c.job_title)}</div>` : ""}
                    ${c.email ? `<div style="font-size:11px;color:var(--text3)">${esc(c.email)}</div>` : ""}
                  </div>
                  ${c.phone ? `<a href="tel:${esc(c.phone)}" style="font-size:12px;color:var(--blue2);text-decoration:none">${esc(c.phone)}</a>` : ""}
                  <button class="btn btn-sm btn-danger" onclick="window._deleteContact('${c.id}','${esc(c.first_name)} ${esc(c.last_name)}')">Del</button>
                </div>`).join("")}
          </div>
        </div>
      </div>

      <!-- Right column -->
      <div style="display:flex;flex-direction:column;gap:16px">

        <!-- Conversation log -->
        <div class="card">
          <div class="card-header" style="flex-wrap:wrap;gap:8px">
            <h2>Conversation Log <span style="font-size:13px;font-weight:500;color:var(--text3)">${conversations.length}</span></h2>
            <div style="display:flex;gap:8px;align-items:center;flex:1;justify-content:flex-end">
              <input type="text" class="form-control" id="convSearchInput" placeholder="Search conversations…" style="max-width:220px;height:32px;font-size:13px" value="${esc(convSearch)}"/>
              <button class="btn btn-sm btn-primary" id="logConvBtn">+ Log</button>
            </div>
          </div>
          <div id="convList" style="min-height:60px">
            ${renderConvList()}
          </div>
        </div>

      </div>
    </div>`;

  document.getElementById("editBtn").onclick = () => openEditModal();
  document.getElementById("deleteBtn").onclick = () => deleteCompany();
  document.getElementById("logConvBtn").onclick = () => openConvModal();
  document.getElementById("addContactBtn").onclick = () => openContactModal();
  document.getElementById("convSearchInput").addEventListener("input", e => {
    convSearch = e.target.value;
    document.getElementById("convList").innerHTML = renderConvList();
  });

  window._deleteContact = (id, name) => {
    confirm("Remove Contact", `Remove ${name} from this company?`, async () => {
      try {
        await sb().from("crm_contacts").delete().eq("id", id).eq("tenant_id", profile.company_id);
        toast("ok","Contact removed");
        await loadAll();
      } catch(e) { toast("bad","Error",e.message); }
    });
  };
}

function renderConvList() {
  const q = convSearch.toLowerCase();
  const filtered = q ? conversations.filter(c =>
    c.summary?.toLowerCase().includes(q) ||
    c.our_attendees?.toLowerCase().includes(q) ||
    c.their_attendees?.toLowerCase().includes(q) ||
    c.method?.toLowerCase().includes(q) ||
    c.occurred_at?.includes(q) ||
    c.follow_up_note?.toLowerCase().includes(q) ||
    (staff.find(s => s.id === c.logged_by)?.full_name || "").toLowerCase().includes(q)
  ) : conversations;

  if (!filtered.length) {
    return q
      ? `<div class="empty-state" style="padding:24px"><div class="empty-icon">🔍</div><p>No conversations match "${esc(q)}"</p></div>`
      : `<div class="empty-state" style="padding:24px"><div class="empty-icon">💬</div><p>No conversations logged yet</p></div>`;
  }
  return filtered.map(convItem).join("");
}

function convItem(c) {
  const methodIcons = { call:"📞", email:"📧", meeting:"🤝", video_call:"📹", in_person:"🏢", other:"💬" };
  const methodLabels = { call:"Phone Call", email:"Email", meeting:"Meeting", video_call:"Video Call", in_person:"In Person", other:"Other" };
  const loggedBy = staff.find(s => s.id === c.logged_by);
  return `
    <div class="conv-item">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="conv-method-pill">${methodIcons[c.method] || "💬"} ${methodLabels[c.method] || c.method}</span>
        <span style="font-size:12px;color:var(--text3)">${fmtDateTime(c.occurred_at)}</span>
        ${loggedBy ? `<span style="font-size:11px;color:var(--text3)">· logged by ${esc(loggedBy.full_name)}</span>` : ""}
        <div style="margin-left:auto;display:flex;gap:5px">
          <button class="btn btn-sm" style="padding:2px 8px;font-size:11px" onclick="window._viewConv('${c.id}')">View</button>
          <button class="btn btn-sm btn-danger" style="padding:2px 8px;font-size:11px" onclick="window._deleteConv('${c.id}')">Delete</button>
        </div>
      </div>
      ${(c.our_attendees || c.their_attendees) ? `
      <div class="conv-attendees">
        ${c.our_attendees ? `<span>🏢 Us: ${esc(c.our_attendees)}</span>` : ""}
        ${c.their_attendees ? `<span>👤 Them: ${esc(c.their_attendees)}</span>` : ""}
      </div>` : ""}
      <div class="conv-summary" style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${esc(c.summary)}</div>
      ${c.follow_up_date ? `<div class="conv-followup">🔔 Follow up: ${fmtDate(c.follow_up_date)}${c.follow_up_note ? " — "+esc(c.follow_up_note) : ""}</div>` : ""}
    </div>`;
}

// ── Edit company modal ──

function openEditModal() {
  const staffOpts = staff.map(s => `<option value="${s.id}" ${company.assigned_to === s.id ? "selected" : ""}>${esc(s.full_name)}</option>`).join("");
  const o = modal(`
    <div class="modal-header"><h3>Edit Company</h3><button class="btn btn-ghost btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Company Name *</label><input class="form-control" id="eName" value="${esc(company.name)}"/></div>
        <div class="form-group"><label class="form-label">Industry</label>
          <select class="form-control" id="eIndustry">
            <option value="">Select…</option>
            ${["Construction","Technology","Healthcare","Finance","Retail","Manufacturing","Education","Property","Legal","Hospitality","Transport","Other"].map(i=>`<option value="${i}" ${company.industry===i?"selected":""}>${i}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="eEmail" type="email" value="${esc(company.email||"")}"/></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-control" id="ePhone" value="${esc(company.phone||"")}"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Website</label><input class="form-control" id="eWebsite" value="${esc(company.website||"")}"/></div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-control" id="eStatus">
            ${getCompanyStatuses().map(s=>`<option value="${s.value}" ${company.status===s.value?"selected":""}>${esc(s.label)}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Company Value (£)</label><input class="form-control" id="eValue" type="number" value="${company.company_value||""}"/></div>
        <div class="form-group"><label class="form-label">Assigned To</label><select class="form-control" id="eAssigned"><option value="">Unassigned</option>${staffOpts}</select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Address</label><input class="form-control" id="eAddr" value="${esc(company.address_line1||"")}"/></div>
        <div class="form-group"><label class="form-label">City</label><input class="form-control" id="eCity" value="${esc(company.city||"")}"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Postcode</label><input class="form-control" id="ePostcode" value="${esc(company.postcode||"")}"/></div>
        <div class="form-group"><label class="form-label">Customer Since</label><input class="form-control" id="eSince" type="date" value="${company.customer_since||""}"/></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="eNotes" rows="3">${esc(company.notes||"")}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn modal-close">Cancel</button>
      <button class="btn btn-primary" id="eSaveBtn">Save Changes</button>
    </div>`, { size: "modal-lg" });

  o.querySelector("#eSaveBtn").onclick = async () => {
    const name = document.getElementById("eName").value.trim();
    if (!name) return toast("warn","Required","Company name is required.");
    const btn = o.querySelector("#eSaveBtn");
    btn.disabled = true; btn.textContent = "Saving…";
    try {
      await sb().from("crm_companies").update({
        name,
        industry: document.getElementById("eIndustry").value || null,
        email: document.getElementById("eEmail").value.trim() || null,
        phone: document.getElementById("ePhone").value.trim() || null,
        website: document.getElementById("eWebsite").value.trim() || null,
        status: document.getElementById("eStatus").value,
        company_value: parseFloat(document.getElementById("eValue").value) || null,
        assigned_to: document.getElementById("eAssigned").value || null,
        address_line1: document.getElementById("eAddr").value.trim() || null,
        city: document.getElementById("eCity").value.trim() || null,
        postcode: document.getElementById("ePostcode").value.trim() || null,
        customer_since: document.getElementById("eSince").value || null,
        notes: document.getElementById("eNotes").value.trim() || null,
        updated_at: new Date().toISOString(),
      }).eq("id", companyId).eq("tenant_id", profile.company_id);
      o.remove();
      toast("ok","Saved");
      await loadAll();
    } catch(e) { toast("bad","Error",e.message); btn.disabled=false; btn.textContent="Save Changes"; }
  };
}

// ── Log conversation modal ──

function openConvModal(prefill = {}) {
  const now = new Date();
  const localNow = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0,16);

  const o = modal(`
    <div class="modal-header"><h3>Log Conversation</h3><button class="btn btn-ghost btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date & Time *</label>
          <input class="form-control" id="cDate" type="datetime-local" value="${prefill.occurred_at || localNow}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Method *</label>
          <select class="form-control" id="cMethod">
            <option value="call">📞 Phone Call</option>
            <option value="email">📧 Email</option>
            <option value="meeting">🤝 Meeting</option>
            <option value="video_call">📹 Video Call</option>
            <option value="in_person">🏢 In Person</option>
            <option value="other">💬 Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Our Attendees</label>
          <div class="ss-wrap" id="oursWrap">
            <div class="ss-chips" id="oursChips"></div>
            <input type="text" class="form-control" id="oursSearch" placeholder="Search staff…" autocomplete="off"/>
            <div class="ss-dropdown" id="oursDropdown" style="display:none"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Their Attendees</label>
          <div class="ss-wrap" id="theirsWrap">
            <div class="ss-chips" id="theirsChips"></div>
            <input type="text" class="form-control" id="theirsSearch" placeholder="Search contacts…" autocomplete="off"/>
            <div class="ss-dropdown" id="theirsDropdown" style="display:none"></div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Summary / Notes *</label>
        <textarea class="form-control" id="cSummary" rows="4" placeholder="What was discussed, agreed, or decided…">${esc(prefill.summary||"")}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Logged By</label>
        <div class="ss-wrap" id="cLoggedByWrap">
          <input type="text" class="form-control" id="cLoggedBySearch" placeholder="Search staff…" autocomplete="off"/>
          <input type="hidden" id="cLoggedBy"/>
          <div class="ss-dropdown" id="cLoggedByDropdown" style="display:none"></div>
        </div>
      </div>
      <div style="border-top:1px solid var(--line2);padding-top:14px;margin-top:8px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600">
          <input type="checkbox" id="cSetReminder" style="accent-color:#1e5cff;width:15px;height:15px"/>
          Set a follow-up reminder
        </label>
        <div id="cReminderFields" style="display:none;margin-top:12px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label">Follow-up Date & Time *</label>
              <input class="form-control" id="cFollowDate" type="datetime-local"/>
            </div>
            <div class="form-group">
              <label class="form-label">Reminder Note</label>
              <input class="form-control" id="cFollowNote" placeholder="e.g. Chase quote decision"/>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn modal-close">Cancel</button>
      <button class="btn btn-primary" id="cSaveBtn">Save Conversation</button>
    </div>`, { size: "modal-lg" });

  // ── Multi-select builder ──
  function makeMultiSelect({ searchEl, chipsEl, dropdownEl, options, placeholder }) {
    const selected = new Set(); // Set of names (stored as plain text)

    function refresh() {
      // Chips
      chipsEl.innerHTML = [...selected].map(name =>
        `<span class="ss-chip">${esc(name)}<button data-name="${esc(name)}" title="Remove">×</button></span>`
      ).join("");
      chipsEl.querySelectorAll("button").forEach(b => {
        b.addEventListener("mousedown", e => { e.preventDefault(); selected.delete(b.dataset.name); refresh(); });
      });
    }

    function renderDropdown(query) {
      const q = query.toLowerCase();
      const filtered = q ? options.filter(o => o.toLowerCase().includes(q)) : options;
      if (!filtered.length) {
        dropdownEl.innerHTML = `<div class="ss-option" data-empty>No results</div>`;
      } else {
        dropdownEl.innerHTML = filtered.map(name => {
          const isSel = selected.has(name);
          return `<div class="ss-option${isSel?" selected":""}" data-name="${esc(name)}">${esc(name)}${isSel?" ✓":""}</div>`;
        }).join("");
        dropdownEl.querySelectorAll(".ss-option[data-name]:not(.selected)").forEach(el => {
          el.addEventListener("mousedown", e => {
            e.preventDefault();
            selected.add(el.dataset.name);
            searchEl.value = "";
            refresh();
            renderDropdown("");
          });
        });
      }
      dropdownEl.style.display = "block";
    }

    searchEl.addEventListener("focus", () => renderDropdown(searchEl.value));
    searchEl.addEventListener("input", () => renderDropdown(searchEl.value));
    searchEl.addEventListener("blur", () => setTimeout(() => { dropdownEl.style.display = "none"; }, 150));

    return { getValue: () => [...selected].join(", ") };
  }

  // Our attendees — staff names
  const oursSelect = makeMultiSelect({
    searchEl: o.querySelector("#oursSearch"),
    chipsEl: o.querySelector("#oursChips"),
    dropdownEl: o.querySelector("#oursDropdown"),
    options: staff.map(s => s.full_name),
  });

  // Their attendees — contact names for this company
  const contactNames = contacts.map(c => `${c.first_name} ${c.last_name}${c.job_title ? " ("+c.job_title+")" : ""}`);
  const theirsSelect = makeMultiSelect({
    searchEl: o.querySelector("#theirsSearch"),
    chipsEl: o.querySelector("#theirsChips"),
    dropdownEl: o.querySelector("#theirsDropdown"),
    options: contactNames,
  });

  // ── Single-select: Logged By ──
  const lbSearch = o.querySelector("#cLoggedBySearch");
  const lbHidden = o.querySelector("#cLoggedBy");
  const lbDropdown = o.querySelector("#cLoggedByDropdown");

  const currentStaff = staff.find(s => s.id === profile.id);
  if (currentStaff) { lbSearch.value = currentStaff.full_name; lbHidden.value = currentStaff.id; }

  function renderLbDropdown(query) {
    const q = query.toLowerCase();
    const filtered = q ? staff.filter(s => s.full_name.toLowerCase().includes(q)) : staff;
    if (!filtered.length) {
      lbDropdown.innerHTML = `<div class="ss-option" data-empty>No staff found</div>`;
    } else {
      lbDropdown.innerHTML = filtered.map(s =>
        `<div class="ss-option" data-id="${s.id}" data-name="${esc(s.full_name)}">${esc(s.full_name)}</div>`
      ).join("");
      lbDropdown.querySelectorAll(".ss-option[data-id]").forEach(el => {
        el.addEventListener("mousedown", e => {
          e.preventDefault();
          lbSearch.value = el.dataset.name;
          lbHidden.value = el.dataset.id;
          lbDropdown.style.display = "none";
        });
      });
    }
    lbDropdown.style.display = "block";
  }
  lbSearch.addEventListener("focus", () => renderLbDropdown(lbSearch.value));
  lbSearch.addEventListener("input", () => { lbHidden.value = ""; renderLbDropdown(lbSearch.value); });
  lbSearch.addEventListener("blur", () => setTimeout(() => { lbDropdown.style.display = "none"; }, 150));

  // ── Toggle reminder fields ──
  const reminderCb = o.querySelector("#cSetReminder");
  const reminderFields = o.querySelector("#cReminderFields");
  reminderCb.addEventListener("change", () => {
    reminderFields.style.display = reminderCb.checked ? "block" : "none";
    if (reminderCb.checked && !document.getElementById("cFollowDate").value) {
      const d = new Date();
      d.setDate(d.getDate() + 1);
      d.setHours(8, 0, 0, 0);
      document.getElementById("cFollowDate").value = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    }
  });

  o.querySelector("#cSaveBtn").onclick = async () => {
    const occurred_at = document.getElementById("cDate").value;
    const summary = document.getElementById("cSummary").value.trim();
    if (!occurred_at) return toast("warn","Required","Please enter a date and time.");
    if (!summary) return toast("warn","Required","Please enter a summary.");

    const follow_up_date = reminderCb.checked ? document.getElementById("cFollowDate").value || null : null;
    const follow_up_note = reminderCb.checked ? document.getElementById("cFollowNote").value.trim() || null : null;
    if (reminderCb.checked && !follow_up_date) return toast("warn","Required","Please enter a follow-up date and time.");

    const btn = o.querySelector("#cSaveBtn");
    btn.disabled = true; btn.textContent = "Saving…";

    try {
      await sb().from("crm_company_conversations").insert({
        tenant_id: profile.company_id,
        company_id: companyId,
        occurred_at: new Date(occurred_at).toISOString(),
        method: document.getElementById("cMethod").value,
        our_attendees: oursSelect.getValue() || null,
        their_attendees: theirsSelect.getValue() || null,
        summary,
        logged_by: lbHidden.value || null,
        follow_up_date,
        follow_up_note,
      });

      if (follow_up_date) {
        const followUpIso = new Date(follow_up_date).toISOString(); // follow_up_date is datetime-local string
        const reminderTitle = `Follow up with ${company.name}`;
        const reminderBody = follow_up_note || `Follow up on conversation with ${company.name}`;

        const { data: { user } } = await sb().auth.getUser();
        await sb().from("crm_reminders").insert({
          tenant_id:    profile.company_id,
          auth_user_id: user.id,
          user_email:   user.email,
          user_name:    profile.full_name || user.email,
          subject:      reminderTitle,
          notes:        reminderBody,
          remind_at:    followUpIso,
          repeat_interval: "none",
          sent_at:      null,
        }).then(() => {}).catch(() => {});

        await sb().from("crm_events").insert({
          tenant_id: profile.company_id,
          title: reminderTitle,
          description: reminderBody,
          start_time: followUpIso,
          end_time: new Date(new Date(follow_up_date).getTime() + 60 * 60 * 1000).toISOString(),
          type: "follow_up",
          crm_company_id: companyId,
          created_by: profile.id,
        }).then(() => {}).catch(() => {});
      }

      o.remove();
      toast("ok","Conversation logged");
      await loadAll();
    } catch(e) { toast("bad","Error",e.message); btn.disabled=false; btn.textContent="Save Conversation"; }
  };
}

// ── Add contact modal ──

function openContactModal() {
  const o = modal(`
    <div class="modal-header"><h3>Add Contact</h3><button class="btn btn-ghost btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">First Name *</label><input class="form-control" id="ctFirst" placeholder="Jane"/></div>
        <div class="form-group"><label class="form-label">Last Name *</label><input class="form-control" id="ctLast" placeholder="Smith"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="ctEmail" type="email" placeholder="jane@company.com"/></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-control" id="ctPhone" placeholder="+44…"/></div>
      </div>
      <div class="form-group"><label class="form-label">Job Title</label><input class="form-control" id="ctTitle" placeholder="e.g. Operations Manager"/></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="ctNotes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn modal-close">Cancel</button>
      <button class="btn btn-primary" id="ctSaveBtn">Add Contact</button>
    </div>`);

  o.querySelector("#ctSaveBtn").onclick = async () => {
    const first = document.getElementById("ctFirst").value.trim();
    const last  = document.getElementById("ctLast").value.trim();
    if (!first || !last) return toast("warn","Required","First and last name required.");
    const btn = o.querySelector("#ctSaveBtn");
    btn.disabled=true; btn.textContent="Saving…";
    try {
      await sb().from("crm_contacts").insert({
        tenant_id: profile.company_id,
        crm_company_id: companyId,
        first_name: first,
        last_name: last,
        email: document.getElementById("ctEmail").value.trim() || null,
        phone: document.getElementById("ctPhone").value.trim() || null,
        job_title: document.getElementById("ctTitle").value.trim() || null,
        notes: document.getElementById("ctNotes").value.trim() || null,
      });
      o.remove();
      toast("ok","Contact added");
      await loadAll();
    } catch(e) { toast("bad","Error",e.message); btn.disabled=false; btn.textContent="Add Contact"; }
  };
}

// ── View conversation ──

window._viewConv = (id) => {
  const c = conversations.find(x => x.id === id);
  if (!c) return;
  const methodIcons = { call:"📞", email:"📧", meeting:"🤝", video_call:"📹", in_person:"🏢", other:"💬" };
  const methodLabels = { call:"Phone Call", email:"Email", meeting:"Meeting", video_call:"Video Call", in_person:"In Person", other:"Other" };
  const loggedBy = staff.find(s => s.id === c.logged_by);
  modal(`
    <div class="modal-header">
      <h3>${methodIcons[c.method] || "💬"} ${methodLabels[c.method] || c.method}</h3>
      <button class="btn btn-ghost btn-sm modal-close">✕</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px">Date & Time</div>
          <div style="font-size:14px;font-weight:600">${fmtDateTime(c.occurred_at)}</div>
        </div>
        ${loggedBy ? `<div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px">Logged By</div>
          <div style="font-size:14px;font-weight:600">${esc(loggedBy.full_name)}</div>
        </div>` : ""}
      </div>
      ${(c.our_attendees || c.their_attendees) ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${c.our_attendees ? `<div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px">🏢 Our Attendees</div>
          <div style="font-size:13px">${esc(c.our_attendees)}</div>
        </div>` : ""}
        ${c.their_attendees ? `<div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px">👤 Their Attendees</div>
          <div style="font-size:13px">${esc(c.their_attendees)}</div>
        </div>` : ""}
      </div>` : ""}
      <div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px">Summary / Notes</div>
        <div style="font-size:14px;line-height:1.6;white-space:pre-wrap;background:var(--bg2);border-radius:10px;padding:12px 14px">${esc(c.summary)}</div>
      </div>
      ${c.follow_up_date ? `<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:12px 14px">
        <div style="font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:4px">🔔 Follow-up Reminder</div>
        <div style="font-size:13px;font-weight:600">${fmtDate(c.follow_up_date)}</div>
        ${c.follow_up_note ? `<div style="font-size:12px;color:var(--text2);margin-top:3px">${esc(c.follow_up_note)}</div>` : ""}
      </div>` : ""}
    </div>
    <div class="modal-footer">
      <button class="btn modal-close">Close</button>
      <button class="btn btn-danger" onclick="window._deleteConv('${c.id}');document.querySelector('.modal-overlay')?.remove()">Delete</button>
    </div>`);
};

// ── Delete conversation ──

window._deleteConv = (id) => {
  confirm("Delete Conversation", "Remove this conversation log entry? This cannot be undone.", async () => {
    try {
      await sb().from("crm_company_conversations").delete().eq("id", id).eq("tenant_id", profile.company_id);
      toast("ok","Deleted");
      await loadAll();
    } catch(e) { toast("bad","Error",e.message); }
  });
};

// ── Delete company ──

function deleteCompany() {
  confirm("Delete Company", `Delete "${company.name}"? This will also remove all associated conversations. This cannot be undone.`, async () => {
    try {
      await sb().from("crm_company_conversations").delete().eq("company_id", companyId).eq("tenant_id", profile.company_id);
      await sb().from("crm_companies").delete().eq("id", companyId).eq("tenant_id", profile.company_id);
      toast("ok","Company deleted");
      location.href = "/systems/crm/companies.html";
    } catch(e) { toast("bad","Error",e.message); }
  });
}
</script>
