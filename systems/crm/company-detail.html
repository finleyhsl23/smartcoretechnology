<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Company Detail — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css"/>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Company Detail</div>
      <div class="topbar-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search…" id="globalSearch"/>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess } from "/systems/crm/shared/auth.js";
import { renderNav, initMobileNav, initTopbar, initSupport } from "/systems/crm/shared/nav.js?v=5";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, fmt, fmtDate, fmtDateTime, timeAgo, toast, companyStatusBadge, leadBadge, loading, setInner } from "/systems/crm/shared/ui.js";
import { sb } from "/systems/crm/shared/supabase.js";

initTheme();

const params = new URLSearchParams(location.search);
const companyId = params.get("id");

let profile, company, authorName;

try {
  ({ profile } = await requireCRMAccess());
  authorName = profile.full_name || profile.email || "Unknown";
  renderNav("companies", profile, null);
  initMobileNav();
  initSupport();
  initTopbar(profile);

  if (!companyId) throw new Error("No company ID specified.");
  await loadCompany();
} catch(e) {
  if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) toast("bad","Error",e.message);
}

async function loadCompany() {
  setInner("content", loading());
  const [compRes, notesRes, activitiesRes, contactsRes, leadsRes] = await Promise.all([
    sb().from("crm_companies").select("*").eq("id", companyId).single(),
    sb().from("crm_company_notes").select("*").eq("company_id", companyId).order("created_at", { ascending: false }),
    sb().from("crm_activities").select("*,crm_companies(name)").eq("crm_company_id", companyId).order("created_at", { ascending: false }).limit(20),
    sb().from("crm_contacts").select("*").eq("crm_company_id", companyId).order("first_name"),
    sb().from("crm_leads").select("*").eq("crm_company_id", companyId).not("status", "in", '("won","lost")').order("created_at", { ascending: false }),
  ]);

  if (compRes.error) throw new Error(compRes.error.message);
  company = compRes.data;

  renderPage(company, notesRes.data || [], activitiesRes.data || [], contactsRes.data || [], leadsRes.data || []);
}

function renderPage(c, teamNotes, activities, contacts, openLeads) {
  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <a href="/systems/crm/companies.html" style="color:var(--text-dim);text-decoration:none;font-size:13px">← Back to Companies</a>
        <h1 style="margin-top:6px">${esc(c.name)}</h1>
        <p>${companyStatusBadge(c.status)}${c.industry ? ` · ${esc(c.industry)}` : ""}</p>
      </div>
    </div>

    <!-- Company info -->
    <div class="grid-2" style="gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-header"><h2>Company Info</h2></div>
        <div class="card-body">
          <dl style="display:grid;grid-template-columns:120px 1fr;gap:8px 12px;font-size:13px">
            <dt style="color:var(--text-dim)">Email</dt><dd>${c.email ? `<a href="mailto:${esc(c.email)}" style="color:var(--blue2)">${esc(c.email)}</a>` : "—"}</dd>
            <dt style="color:var(--text-dim)">Phone</dt><dd>${c.phone ? esc(c.phone) : "—"}</dd>
            <dt style="color:var(--text-dim)">Website</dt><dd>${c.website ? `<a href="${esc(c.website)}" target="_blank" style="color:var(--blue2)">${esc(c.website)}</a>` : "—"}</dd>
            <dt style="color:var(--text-dim)">Value</dt><dd>${c.company_value ? fmt(c.company_value) : "—"}</dd>
            <dt style="color:var(--text-dim)">Customer Since</dt><dd>${c.customer_since ? fmtDate(c.customer_since) : "—"}</dd>
            <dt style="color:var(--text-dim)">Address</dt><dd>${[c.address_line1, c.city, c.postcode].filter(Boolean).join(", ") || "—"}</dd>
          </dl>
        </div>
      </div>

      <!-- Quick Notes -->
      <div class="card">
        <div class="card-header"><h2>Quick Notes</h2></div>
        <div class="card-body">
          <textarea id="quickNotes" class="form-control" rows="5" placeholder="Internal notes about this company…">${esc(c.notes||"")}</textarea>
          <button class="btn btn-primary btn-sm" id="saveNotesBtn" style="margin-top:10px">Save Notes</button>
        </div>
      </div>
    </div>

    <!-- Team Notes -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><h2>Team Notes</h2></div>
      <div class="card-body">
        <div id="teamNotesFeed" style="margin-bottom:16px">
          ${teamNotes.length === 0
            ? `<p style="color:var(--text-dim);font-size:13px">No team notes yet.</p>`
            : teamNotes.map(n => teamNoteItem(n)).join("")}
        </div>
        <div style="display:flex;gap:10px">
          <input class="form-control" id="newNoteInput" placeholder="Add a team note…" style="flex:1"/>
          <button class="btn btn-primary" id="addNoteBtn">Post</button>
        </div>
      </div>
    </div>

    <!-- Linked contacts and open leads -->
    <div class="grid-2" style="gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-header">
          <h2>Contacts</h2>
          <span class="badge badge-blue">${contacts.length}</span>
        </div>
        <div class="card-body" style="padding:0">
          ${contacts.length === 0
            ? `<div class="empty-state" style="padding:20px"><p>No contacts linked.</p></div>`
            : contacts.map(ct => `
              <div style="padding:10px 18px;border-bottom:1px solid var(--line2);display:flex;gap:10px;align-items:center">
                <div class="avatar avatar-sm" style="flex-shrink:0">${esc((ct.first_name||"?")[0].toUpperCase())}</div>
                <div>
                  <div style="font-weight:600;font-size:13px">${esc(ct.first_name+" "+ct.last_name)}</div>
                  ${ct.email ? `<div style="font-size:11px;color:var(--text-dim)">${esc(ct.email)}</div>` : ""}
                </div>
              </div>`).join("")}
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Open Leads</h2>
          <span class="badge badge-purple">${openLeads.length}</span>
        </div>
        <div class="card-body" style="padding:0">
          ${openLeads.length === 0
            ? `<div class="empty-state" style="padding:20px"><p>No open leads.</p></div>`
            : openLeads.map(l => `
              <div style="padding:10px 18px;border-bottom:1px solid var(--line2)">
                <div style="font-weight:600;font-size:13px">${esc(l.title)}</div>
                <div style="font-size:11px;margin-top:3px">${leadBadge(l.status)}${l.estimated_value ? ` · ${fmt(l.estimated_value)}` : ""}</div>
              </div>`).join("")}
        </div>
      </div>
    </div>

    <!-- Activity feed -->
    <div class="card">
      <div class="card-header"><h2>Recent Activity</h2></div>
      <div class="card-body">
        ${activities.length === 0
          ? `<div class="empty-state" style="padding:20px"><p>No activity yet.</p></div>`
          : `<div class="timeline">${activities.map(a => activityItem(a)).join("")}</div>`}
      </div>
    </div>`;

  // Quick Notes save
  const qn = document.getElementById("quickNotes");
  document.getElementById("saveNotesBtn").onclick = () => saveQuickNotes(qn.value);
  qn.addEventListener("blur", () => saveQuickNotes(qn.value));

  // Team Notes
  document.getElementById("addNoteBtn").onclick = () => addTeamNote();
  document.getElementById("newNoteInput").addEventListener("keydown", e => { if (e.key === "Enter") addTeamNote(); });
}

async function saveQuickNotes(notes) {
  try {
    const { error } = await sb().from("crm_companies").update({ notes }).eq("id", companyId);
    if (error) throw error;
    toast("ok","Notes saved");
  } catch(e) { toast("bad","Error",e.message); }
}

async function addTeamNote() {
  const input = document.getElementById("newNoteInput");
  const content = input.value.trim();
  if (!content) return;
  input.value = "";
  try {
    const { data: { session } } = await sb().auth.getSession();
    const tenant_id = profile.company_id;
    const { data, error } = await sb().from("crm_company_notes").insert({
      company_id: companyId,
      tenant_id,
      author_name: authorName,
      content,
    }).select().single();
    if (error) throw error;
    const feed = document.getElementById("teamNotesFeed");
    if (feed) {
      if (feed.querySelector("p")) feed.innerHTML = "";
      feed.insertAdjacentHTML("afterbegin", teamNoteItem(data));
    }
    toast("ok","Note posted");
  } catch(e) { toast("bad","Error",e.message); }
}

function teamNoteItem(n) {
  return `<div style="padding:12px 0;border-bottom:1px solid var(--line2)">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:12px;font-weight:700;color:var(--text)">${esc(n.author_name)}</span>
      <span style="font-size:11px;color:var(--text-dim)">${timeAgo(n.created_at)}</span>
    </div>
    <p style="font-size:13px;color:var(--text);margin:0;white-space:pre-wrap">${esc(n.content)}</p>
  </div>`;
}

function activityItem(a) {
  const icons = { note:"📝", call:"📞", email:"📧", meeting:"🤝", task_completed:"✅", quote_created:"💰", deal_won:"🏆", deal_lost:"😔", company_created:"🏢", contact_added:"👤", lead_created:"🎯", document_uploaded:"📁" };
  const icon = icons[a.type] || "•";
  return `<div class="timeline-item">
    <div class="timeline-dot"></div>
    <div class="timeline-header">
      <span class="timeline-title">${icon} ${esc(a.title)}</span>
      <span class="timeline-time">${timeAgo(a.created_at)}</span>
    </div>
  </div>`;
}
</script>
</body>
</html>
