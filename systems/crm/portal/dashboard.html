<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Portal — SmartCore</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#05081a;--card:#0d1328;--card2:#111827;--line:rgba(255,255,255,.08);--blue:#1e5cff;--blue2:#0ea5ff;--blue-dim:rgba(30,92,255,.12);--text:#e9f0ff;--muted:rgba(233,240,255,.5);--good:#22c55e;--good-dim:rgba(34,197,94,.1);--warn:#f59e0b;--r:14px;--r2:10px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    nav{background:#080d20;border-bottom:1px solid var(--line);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:50}
    .brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800}
    .brand-dot{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
    .nav-right{display:flex;align-items:center;gap:12px}
    .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
    .btn-signout{background:transparent;border:1px solid var(--line);border-radius:8px;padding:6px 14px;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s}
    .btn-signout:hover{border-color:#ef4444;color:#ef4444}
    main{max-width:1000px;margin:0 auto;padding:40px 24px 80px}
    .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px}
    .tab{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
    .tab.active{color:var(--text);border-bottom-color:var(--blue2)}
    .tab:hover{color:var(--text)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px;margin-bottom:16px}
    .card h2{font-size:16px;font-weight:700;margin-bottom:16px}
    .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
    .row:last-child{border-bottom:none}
    .label{font-size:13px;color:var(--muted)}
    .value{font-size:13px;font-weight:600}
    .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase}
    .badge-green{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
    .badge-yellow{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
    .badge-blue{background:var(--blue-dim);color:var(--blue2);border:1px solid rgba(30,92,255,.25)}
    .badge-grey{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--line)}
    /* Messaging */
    .msg-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:360px;overflow-y:auto}
    .bubble-wrap{display:flex;flex-direction:column}
    .bubble-wrap.staff{align-items:flex-start}
    .bubble-wrap.customer{align-items:flex-end}
    .bubble{max-width:72%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5}
    .bubble.staff{background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:4px}
    .bubble.customer{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
    .bubble-meta{font-size:11px;color:var(--muted);margin-top:3px}
    .msg-input-row{display:flex;gap:8px}
    .msg-input-row textarea{flex:1;resize:none;height:56px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none}
    .msg-input-row textarea:focus{border-color:var(--blue)}
    .btn-send{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:0 18px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
    .btn-send:hover{opacity:.9}
    /* Milestones */
    .ms-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
    .ms-row:last-child{border-bottom:none}
    .ms-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px}
    .ms-dot.completed{background:var(--good-dim);border-color:var(--good);color:var(--good)}
    .ms-dot.in_progress{background:rgba(245,158,11,.15);border-color:var(--warn)}
    .progress-bar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin:8px 0}
    .progress-fill{height:100%;border-radius:3px;background:var(--blue)}
    /* Documents */
    .doc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
    .doc-row:last-child{border-bottom:none}
    a.dl-link{color:var(--blue2);font-size:12px;font-weight:600;text-decoration:none}
    a.dl-link:hover{text-decoration:underline}
    /* Signature */
    canvas{border:1px solid var(--line);border-radius:10px;background:#fff;cursor:crosshair;width:100%;height:180px}
    .sig-btns{display:flex;gap:8px;margin-top:10px}
    .btn-sm{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--card2);color:var(--text)}
    .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
    .spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--blue2);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;color:var(--muted);font-size:14px;padding:32px 0}
  </style>
</head>
<body>
<nav>
  <div class="brand"><div class="brand-dot">SC</div>SmartCore Portal</div>
  <div class="nav-right">
    <div class="avatar" id="navAvatar">?</div>
    <span id="navName" style="font-size:13px;font-weight:600"></span>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</nav>
<main>
  <div id="content"><div class="spinner"></div></div>
</main>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
const SUPABASE_URL = "https://hjdpcfhozhoyeqevnupm.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqZHBjZmhvemhveWVxZXZudXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5MTk3MzYsImV4cCI6MjA4MjQ5NTczNn0.BXosJO4NmEZOe73GXSGPa3z-i_4ZzF9zBAMBIf6Mkts";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let portalUser = null, session = null;

function fmtDate(d) { return d ? new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "—"; }
function fmtDT(d)   { return d ? new Date(d).toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}) : "—"; }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// Auth check
const { data: { session: sess } } = await sb.auth.getSession();
if (!sess?.user) { window.location.href = "/systems/crm/portal/index.html"; }
session = sess;

// Load portal user record
const { data: pu, error: puErr } = await sb.from("crm_portal_users")
  .select("*, crm_contacts(id, first_name, last_name, email, phone, job_title, crm_companies(name))")
  .eq("auth_user_id", sess.user.id)
  .limit(1)
  .maybeSingle();

if (puErr || !pu) {
  // Not a portal user — check if new (just registered via magic link) and update
  const { data: puByEmail } = await sb.from("crm_portal_users")
    .select("*").eq("email", sess.user.email).limit(1).maybeSingle();
  if (puByEmail) {
    await sb.from("crm_portal_users").update({ auth_user_id: sess.user.id, status: "active", activated_at: new Date().toISOString(), last_login_at: new Date().toISOString() }).eq("id", puByEmail.id);
    window.location.reload();
  } else {
    document.getElementById("content").innerHTML = `<div class="card"><div class="empty">Your account hasn't been set up yet. Contact your account manager.</div></div>`;
  }
  throw new Error("no portal user");
}

portalUser = pu;
// Update last login
sb.from("crm_portal_users").update({ last_login_at: new Date().toISOString(), auth_user_id: sess.user.id, status: "active" }).eq("id", pu.id);

const name = pu.name || pu.email;
document.getElementById("navName").textContent = name;
document.getElementById("navAvatar").textContent = name[0].toUpperCase();

// Render tabs
document.getElementById("content").innerHTML = `
  <div style="margin-bottom:24px">
    <h1 style="font-size:26px;font-weight:900">Welcome back, ${esc(pu.name || pu.email.split("@")[0])} 👋</h1>
    <p style="color:var(--muted);margin-top:4px">${pu.crm_contacts?.crm_companies?.name ? `${esc(pu.crm_contacts.crm_companies.name)} · ` : ""}Your customer portal</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('account',this)">Account</button>
    <button class="tab" onclick="switchTab('messages',this)">💬 Messages</button>
    <button class="tab" onclick="switchTab('projects',this)">📋 Projects</button>
    <button class="tab" onclick="switchTab('documents',this)">📁 Documents</button>
    <button class="tab" onclick="switchTab('signatures',this)">🤝 Signatures</button>
  </div>
  <div id="tabContent"></div>`;

window.switchTab = function(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  loadTab(tab);
};

await loadTab("account");

window.loadTab = async function(tab) {
  const el = document.getElementById("tabContent");
  el.innerHTML = `<div class="spinner"></div>`;
  if (tab === "account")    await renderAccount(el);
  if (tab === "messages")   await renderMessages(el);
  if (tab === "projects")   await renderProjects(el);
  if (tab === "documents")  await renderDocuments(el);
  if (tab === "signatures") await renderSignatures(el);
};

async function renderAccount(el) {
  const c = pu.crm_contacts;
  el.innerHTML = `
    <div class="card">
      <h2>Your Account</h2>
      <div class="row"><span class="label">Name</span><span class="value">${esc(pu.name||"—")}</span></div>
      <div class="row"><span class="label">Email</span><span class="value">${esc(pu.email)}</span></div>
      <div class="row"><span class="label">Portal Status</span><span class="badge badge-green">Active</span></div>
      ${c ? `
        <div class="row"><span class="label">Job Title</span><span class="value">${esc(c.job_title||"—")}</span></div>
        <div class="row"><span class="label">Phone</span><span class="value">${esc(c.phone||"—")}</span></div>
        <div class="row"><span class="label">Company</span><span class="value">${esc(c.crm_companies?.name||"—")}</span></div>
      ` : ""}
    </div>`;
}

async function renderMessages(el) {
  if (!pu.crm_contact_id) {
    el.innerHTML = `<div class="card"><div class="empty">Messaging will be available once your account is fully linked. Contact your account manager.</div></div>`;
    return;
  }
  const { data: msgs } = await sb.from("crm_messages")
    .select("*").eq("crm_contact_id", pu.crm_contact_id).order("created_at");

  el.innerHTML = `
    <div class="card">
      <h2>Messages</h2>
      <div class="msg-list" id="msgList">
        ${!msgs?.length
          ? `<div class="empty">No messages yet. Send a message to your account manager below.</div>`
          : msgs.map(m => `
            <div class="bubble-wrap ${m.sender_type}">
              <div class="bubble ${m.sender_type}">${esc(m.body)}</div>
              <div class="bubble-meta">${esc(m.sender_name||"Account Manager")} · ${fmtDT(m.created_at)}</div>
            </div>`).join("")}
      </div>
      <div class="msg-input-row">
        <textarea id="msgBody" placeholder="Type a message…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button class="btn-send" onclick="sendMsg()">Send</button>
      </div>
    </div>`;

  const list = document.getElementById("msgList");
  if (list) list.scrollTop = list.scrollHeight;

  // Realtime
  sb.channel("portal-msgs")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"crm_messages",filter:`crm_contact_id=eq.${pu.crm_contact_id}`}, payload => {
      const m = payload.new;
      list?.insertAdjacentHTML("beforeend",`
        <div class="bubble-wrap ${m.sender_type}">
          <div class="bubble ${m.sender_type}">${esc(m.body)}</div>
          <div class="bubble-meta">${esc(m.sender_name||"Account Manager")} · ${fmtDT(m.created_at)}</div>
        </div>`);
      list.scrollTop = list.scrollHeight;
    }).subscribe();
}

window.sendMsg = async function() {
  const ta = document.getElementById("msgBody");
  const body = ta?.value.trim();
  if (!body || !pu.crm_contact_id) return;
  ta.value = "";
  const { error } = await sb.from("crm_messages").insert({
    tenant_id: pu.tenant_id,
    crm_contact_id: pu.crm_contact_id,
    sender_type: "customer",
    sender_id: session.user.id,
    sender_name: pu.name || pu.email,
    body,
  });
  if (error) alert("Could not send: " + error.message);
};

async function renderProjects(el) {
  const { data: pjs } = await sb.from("crm_projects")
    .select("*, crm_project_milestones(*)")
    .eq("tenant_id", pu.tenant_id)
    .eq("visible_to_portal", true)
    .order("created_at", { ascending: false });

  if (!pjs?.length) {
    el.innerHTML = `<div class="card"><div class="empty">No projects to show yet.</div></div>`;
    return;
  }
  el.innerHTML = pjs.map(p => {
    const ms = (p.crm_project_milestones||[]).sort((a,b) => a.sort_order-b.sort_order);
    const done = ms.filter(m => m.status==="completed").length;
    const pct = ms.length ? Math.round(done/ms.length*100) : 0;
    const statusBadge = {active:"badge-blue",completed:"badge-green",paused:"badge-yellow"}[p.status]||"badge-grey";
    return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div><h2 style="margin-bottom:4px">${esc(p.name)}</h2>${p.description?`<p style="font-size:13px;color:var(--muted)">${esc(p.description)}</p>`:""}</div>
          <span class="badge ${statusBadge}">${p.status}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px">
          <span>${ms.length} milestones</span><span>${pct}% complete</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        ${ms.length ? `<div style="margin-top:12px">${ms.map(m=>`
          <div class="ms-row">
            <div class="ms-dot ${m.status}">${m.status==="completed"?"✓":""}</div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600">${esc(m.name)}</div>
              ${m.due_date?`<div style="font-size:11px;color:var(--muted)">Due ${fmtDate(m.due_date)}</div>`:""}
            </div>
            <span class="badge ${m.status==="completed"?"badge-green":m.status==="in_progress"?"badge-yellow":"badge-grey"}" style="font-size:10px">${m.status.replace("_"," ")}</span>
          </div>`).join("")}</div>` : ""}
      </div>`;
  }).join("");
}

async function renderDocuments(el) {
  const { data: docs } = await sb.from("crm_documents")
    .select("*").eq("tenant_id", pu.tenant_id).eq("is_portal_visible", true).order("created_at",{ascending:false});

  if (!docs?.length) {
    el.innerHTML = `<div class="card"><div class="empty">No documents shared with you yet.</div></div>`;
    return;
  }
  el.innerHTML = `
    <div class="card">
      <h2>Documents (${docs.length})</h2>
      ${docs.map(d => `
        <div class="doc-row">
          <div>
            <div style="font-weight:600;font-size:14px">📄 ${esc(d.name)}</div>
            <div style="font-size:12px;color:var(--muted)">${esc(d.category||"")} · ${fmtDate(d.created_at)}</div>
          </div>
          ${d.file_url ? `<a href="${esc(d.file_url)}" target="_blank" class="dl-link">Download →</a>` : ""}
        </div>`).join("")}
    </div>`;
}

async function renderSignatures(el) {
  const { data: sigs } = await sb.from("crm_signature_requests")
    .select("*").eq("tenant_id", pu.tenant_id).eq("signer_email", pu.email).order("created_at",{ascending:false});

  if (!sigs?.length) {
    el.innerHTML = `<div class="card"><div class="empty">No signature requests yet.</div></div>`;
    return;
  }

  el.innerHTML = `
    <div class="card">
      <h2>Signature Requests</h2>
      ${sigs.map(s => {
        const statusBadge = {pending:"badge-yellow",signed:"badge-green",declined:"badge-grey"}[s.status]||"badge-grey";
        return `
          <div class="row" style="align-items:flex-start">
            <div>
              <div style="font-weight:600;font-size:14px">🤝 ${esc(s.document_name)}</div>
              <div style="font-size:12px;color:var(--muted)">Requested ${fmtDate(s.created_at)}${s.signed_at?" · Signed "+fmtDate(s.signed_at):""}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="badge ${statusBadge}">${s.status}</span>
              ${s.status==="pending" ? `<a href="/systems/crm/portal/sign.html?token=${s.token}" class="dl-link">Sign →</a>` : ""}
            </div>
          </div>`;
      }).join("")}
    </div>`;
}

window.signOut = async function() {
  await sb.auth.signOut();
  window.location.href = "/systems/crm/portal/index.html";
};
</script>
</body>
</html>
