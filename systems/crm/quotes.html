<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Quotes — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css?v=2"/>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Quotes</div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="crm-content" id="content">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>

<script type="module">
import { requireCRMAccess, tierHasFeature, getCRMSettings } from "/systems/crm/shared/auth.js?v=3";
import { quotes, companies, leads } from "/systems/crm/shared/api.js";
import { sb } from "/systems/crm/shared/supabase.js";
import { renderNav, initMobileNav, initTopbar } from "/systems/crm/shared/nav.js?v=11";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, fmt, fmtDate, toast, confirm, quoteBadge, tierGate, loading, setInner, makeCombo } from "/systems/crm/shared/ui.js";

initTheme();

let profile, tier, crmSettings, allQuotes = [], companiesList = [], leadsList = [], productsList = [];

try {
  ({ profile, tier } = await requireCRMAccess());
  crmSettings = await getCRMSettings();
  renderNav("quotes", profile, tier, crmSettings);
  initMobileNav();
  initTopbar(profile);

  if (!tierHasFeature(tier, "quotes")) {
    document.getElementById("content").innerHTML = tierGate("quotes");
  } else {
    [companiesList, leadsList] = await Promise.all([
      companies.list({ limit: 500 }).then(r => r.data),
      leads.list({ limit: 500 }).then(r => r.data),
    ]);
    const { data: prods } = await sb().from("crm_products").select("id,name,price,description,sku").eq("active", true).order("name");
    productsList = prods || [];
    await loadAndRender();
  }
} catch(e) { if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) toast("bad","Error",e.message); }

async function loadAndRender(status="") {
  setInner("content", loading());
  try {
    const res = await quotes.list({ status, limit: 200 });
    allQuotes = res.data;
    renderPage(allQuotes, status);
  } catch(e) { toast("bad","Load error",e.message); }
}

function renderPage(rows, selStatus) {
  const totalValue = rows.reduce((s,q) => s + (Number(q.total)||0), 0);
  const accepted = rows.filter(q => q.status === "accepted").length;

  document.getElementById("content").innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Quotes</h1>
        <p>${rows.length} quote${rows.length!==1?"s":""} · Total value: ${fmt(totalValue)} · ${accepted} accepted</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" id="addBtn">+ New Quote</button>
      </div>
    </div>

    <div class="filter-bar">
      <select class="filter-select" id="statusFilter">
        <option value="" ${!selStatus?"selected":""}>All Statuses</option>
        <option value="draft" ${selStatus==="draft"?"selected":""}>Draft</option>
        <option value="sent" ${selStatus==="sent"?"selected":""}>Sent</option>
        <option value="accepted" ${selStatus==="accepted"?"selected":""}>Accepted</option>
        <option value="rejected" ${selStatus==="rejected"?"selected":""}>Rejected</option>
        <option value="expired" ${selStatus==="expired"?"selected":""}>Expired</option>
      </select>
    </div>

    <div class="card">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th>Quote #</th>
              <th>Company</th>
              <th>Title</th>
              <th>Status</th>
              <th>Total</th>
              <th>Date Issued</th>
              <th>Expiry</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows.length === 0
              ? `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">💰</div><h3>No quotes yet</h3><p>Create a quote to send to a prospect.</p></div></td></tr>`
              : rows.map(q => quoteRow(q)).join("")}
          </tbody>
        </table>
      </div>
    </div>`;

  document.getElementById("addBtn").onclick = () => openModal();
  document.getElementById("statusFilter").addEventListener("change", e => loadAndRender(e.target.value));
  document.querySelectorAll(".edit-btn").forEach(b => b.addEventListener("click", () => openModal(b.dataset.id)));
  document.querySelectorAll(".del-btn").forEach(b => b.addEventListener("click", () => deleteQuote(b.dataset.id)));
  document.querySelectorAll(".pdf-btn").forEach(b => b.addEventListener("click", () => exportPDF(b.dataset.id)));
  document.querySelectorAll(".inline-status").forEach(sel => {
    sel.addEventListener("change", async e => {
      await updateStatus(sel.dataset.id, sel.value);
    });
  });
}

function quoteRow(q) {
  const co = q.crm_companies?.name;
  const isExpired = q.status === "sent" && q.expiry_date && new Date(q.expiry_date) < new Date();
  const effectiveStatus = isExpired ? "expired" : q.status;
  const statuses = ["draft","sent","accepted","rejected","expired"];
  return `<tr>
    <td><span class="font-bold text-blue">${esc(q.quote_number)}</span></td>
    <td>${co ? esc(co) : '<span class="text-dim">—</span>'}</td>
    <td>${q.title ? esc(q.title) : '<span class="text-dim">—</span>'}</td>
    <td>
      <select class="inline-status" data-id="${q.id}" style="background:var(--card2);border:1px solid var(--line2);border-radius:6px;padding:3px 6px;font-size:12px;color:var(--text1);cursor:pointer">
        ${statuses.map(s => `<option value="${s}" ${effectiveStatus===s?"selected":""}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join("")}
      </select>
    </td>
    <td><strong>${fmt(q.total)}</strong></td>
    <td>${fmtDate(q.date_issued)}</td>
    <td>${q.expiry_date ? `<span style="${isExpired?"color:var(--bad)":""}">${fmtDate(q.expiry_date)}</span>` : '<span class="text-dim">—</span>'}</td>
    <td>
      <div class="tbl-actions">
        <button class="btn btn-sm edit-btn" data-id="${q.id}">Edit</button>
        <button class="btn btn-sm pdf-btn" data-id="${q.id}" title="Export as PDF">📄 PDF</button>
        <button class="btn btn-sm btn-danger del-btn" data-id="${q.id}">Del</button>
      </div>
    </td>
  </tr>`;
}

function openModal(id) {
  const q = id ? allQuotes.find(x => x.id === id) : null;
  const lineItems = q?.line_items || [{ description: "", qty: 1, unit_price: 0 }];

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal modal-xl">
      <div class="modal-header">
        <h3>${q ? `Edit Quote ${q.quote_number}` : "New Quote"}</h3>
        <button class="btn btn-ghost btn-sm modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Title</label>
            <input class="form-control" id="mTitle" value="${esc(q?.title||"")}" placeholder="Service quote for…"/>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-control" id="mStatus">
              <option value="draft" ${q?.status==="draft"||!q?"selected":""}>Draft</option>
              <option value="sent" ${q?.status==="sent"?"selected":""}>Sent</option>
              <option value="accepted" ${q?.status==="accepted"?"selected":""}>Accepted</option>
              <option value="rejected" ${q?.status==="rejected"?"selected":""}>Rejected</option>
              <option value="expired" ${q?.status==="expired"?"selected":""}>Expired</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Company</label>
            <input class="form-control" id="mCompany" placeholder="Search companies…"/>
          </div>
          <div class="form-group">
            <label class="form-label">Related Lead</label>
            <input class="form-control" id="mLead" placeholder="Search leads…"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date Issued</label>
            <input class="form-control" id="mIssued" type="date" value="${q?.date_issued||new Date().toISOString().slice(0,10)}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Expiry Date</label>
            <input class="form-control" id="mExpiry" type="date" value="${q?.expiry_date||""}"/>
          </div>
        </div>

        <datalist id="prodList">${productsList.map(p => `<option value="${esc(p.name)}"/>`).join("")}</datalist>

        <div class="section-title" style="margin-top:16px">Line Items</div>
        <div id="lineItems">
          ${lineItems.map((li, i) => lineItemRow(li, i)).join("")}
        </div>
        <button class="btn btn-sm" id="addLine" style="margin-top:8px">+ Add Line</button>

        <div style="margin-top:16px;display:flex;justify-content:flex-end">
          <div style="min-width:240px">
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)">
              <span>Subtotal</span><span id="subtotalDisp">£0.00</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:6px 0;align-items:center">
              <span>Discount (£)</span>
              <input type="number" id="mDiscount" value="${q?.discount_amount||0}" style="width:80px" class="form-control" min="0"/>
            </div>
            <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:16px;font-weight:700;border-top:2px solid var(--line);margin-top:4px">
              <span>Total</span><span id="totalDisp">£0.00</span>
            </div>
          </div>
        </div>

        <div class="form-group" style="margin-top:12px">
          <label class="form-label">Notes</label>
          <textarea class="form-control" id="mNotes" rows="2">${esc(q?.notes||"")}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Terms</label>
          <textarea class="form-control" id="mTerms" rows="2">${esc(q?.terms || crmSettings?.default_quote_terms || "Payment due within 30 days.")}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn modal-close">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">${q ? "Save Changes" : "Create Quote"}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll(".modal-close").forEach(b => b.onclick = () => overlay.remove());
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });

  const compCombo = makeCombo(overlay.querySelector("#mCompany"),
    companiesList.map(c => ({ id: c.id, label: c.name })),
    { initialId: q?.crm_company_id });
  const leadCombo = makeCombo(overlay.querySelector("#mLead"),
    leadsList.map(l => ({ id: l.id, label: l.title })),
    { initialId: q?.crm_lead_id });

  let lineCount = lineItems.length;
  function recalc() {
    let sub = 0;
    overlay.querySelectorAll(".line-row").forEach(row => {
      const qty = parseFloat(row.querySelector(".li-qty").value)||0;
      const price = parseFloat(row.querySelector(".li-price").value)||0;
      sub += qty * price;
    });
    const disc = parseFloat(overlay.querySelector("#mDiscount").value)||0;
    overlay.querySelector("#subtotalDisp").textContent = "£"+sub.toFixed(2);
    overlay.querySelector("#totalDisp").textContent = "£"+(Math.max(0,sub-disc)).toFixed(2);
  }
  overlay.addEventListener("input", recalc);

  // Auto-fill cost when a product name is selected from the datalist
  overlay.querySelector("#lineItems").addEventListener("change", e => {
    if (!e.target.classList.contains("li-desc")) return;
    const match = productsList.find(p => p.name.toLowerCase() === e.target.value.toLowerCase());
    if (match && match.price != null) {
      const row = e.target.closest(".line-row");
      row.querySelector(".li-price").value = Number(match.price).toFixed(2);
      recalc();
    }
  });

  recalc();

  overlay.querySelector("#addLine").onclick = () => {
    overlay.querySelector("#lineItems").insertAdjacentHTML("beforeend", lineItemRow({description:"",qty:1,unit_price:0}, lineCount++));
    overlay.querySelectorAll(".li-remove").forEach(b => b.onclick = e => { e.target.closest(".line-row").remove(); recalc(); });
    recalc();
  };
  overlay.querySelectorAll(".li-remove").forEach(b => b.onclick = e => { e.target.closest(".line-row").remove(); recalc(); });

  overlay.querySelector("#saveBtn").onclick = async () => {
    const btn = overlay.querySelector("#saveBtn");
    btn.disabled = true;
    try {
      const lineRows = [...overlay.querySelectorAll(".line-row")].map(row => ({
        description: row.querySelector(".li-desc").value,
        qty: parseFloat(row.querySelector(".li-qty").value)||0,
        unit_price: parseFloat(row.querySelector(".li-price").value)||0,
        total: (parseFloat(row.querySelector(".li-qty").value)||0) * (parseFloat(row.querySelector(".li-price").value)||0),
      }));
      const subtotal = lineRows.reduce((s,l) => s + l.total, 0);
      const discount = parseFloat(overlay.querySelector("#mDiscount").value)||0;
      const total = Math.max(0, subtotal - discount);
      const fields = {
        title: overlay.querySelector("#mTitle").value.trim() || null,
        status: overlay.querySelector("#mStatus").value,
        crm_company_id: compCombo.getValue() || null,
        crm_lead_id: leadCombo.getValue() || null,
        date_issued: overlay.querySelector("#mIssued").value || null,
        expiry_date: overlay.querySelector("#mExpiry").value || null,
        line_items: lineRows,
        subtotal, discount_amount: discount, total,
        notes: overlay.querySelector("#mNotes").value.trim() || null,
        terms: overlay.querySelector("#mTerms").value.trim() || null,
      };
      if (q) await quotes.update(q.id, fields);
      else await quotes.create(fields);
      overlay.remove();
      toast("ok", q ? "Quote updated" : "Quote created");
      await loadAndRender();
    } catch(e) { toast("bad","Error",e.message); btn.disabled = false; }
  };
}

function lineItemRow(li, i) {
  return `<div class="line-row" style="display:grid;grid-template-columns:1fr 80px 100px 32px;gap:8px;margin-bottom:6px;align-items:center">
    <input class="form-control li-desc" list="prodList" placeholder="Description or pick a product…" value="${esc(li.description||"")}"/>
    <input class="form-control li-qty" type="number" min="0" placeholder="Qty" value="${li.qty||1}" style="text-align:center"/>
    <input class="form-control li-price" type="number" min="0" step="0.01" placeholder="Cost (£)" value="${li.unit_price||0}"/>
    <button class="btn btn-icon btn-danger li-remove" title="Remove">✕</button>
  </div>`;
}

async function updateStatus(id, status) {
  try { await quotes.update(id, { status }); toast("ok","Status updated"); await loadAndRender(); }
  catch(e) { toast("bad","Error",e.message); }
}

function exportPDF(id) {
  const q = allQuotes.find(x => x.id === id);
  if (!q) return;
  const co = q.crm_companies?.name || "";
  const br = crmSettings?.branding || {};
  const primary = br.primary_color || "#1e5cff";
  const secondary = br.secondary_color || "#0a0f1e";
  const prefer = br.prefer_icon === true;
  const logoUrl = prefer ? (br.icon_url || br.logo_url) : (br.logo_url || br.icon_url);
  const issuerName = br.company_name || "SmartCore Technology";

  const lineItems = q.line_items || [];
  const linesHtml = lineItems.map(li => `
    <tr>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb">${li.description||""}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:center">${li.qty||1}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:right">£${Number(li.cost||li.unit_price||0).toFixed(2)}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:right">£${Number(li.total||((li.qty||1)*(li.unit_price||0))).toFixed(2)}</td>
    </tr>`).join("");

  const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Quote ${esc(q.quote_number||"")}</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; color:#1a1a2e; background:#fff; }
  .header { background:${secondary}; color:#fff; padding:36px 40px; display:flex; justify-content:space-between; align-items:flex-start; }
  .header-left img { max-height:60px; max-width:200px; object-fit:contain; }
  .header-left .company-name { font-size:22px; font-weight:800; color:#fff; margin-top:4px; }
  .quote-badge { background:${primary}; color:#fff; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:2px; padding:6px 16px; border-radius:4px; display:inline-block; margin-bottom:8px; }
  .quote-number { font-size:26px; font-weight:900; color:#fff; }
  .quote-status { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:4px; padding:3px 12px; font-size:12px; font-weight:700; text-transform:uppercase; display:inline-block; margin-top:6px; }
  .body { padding:32px 40px; }
  .meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:28px; }
  .meta-box { background:#f8f9fc; border-radius:8px; padding:16px; }
  .meta-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#6b7280; margin-bottom:6px; font-weight:600; }
  .meta-value { font-size:14px; font-weight:600; color:#1a1a2e; }
  table.items { width:100%; border-collapse:collapse; margin-bottom:20px; }
  table.items thead tr { background:${primary}; color:#fff; }
  table.items thead th { padding:10px 12px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
  table.items thead th:last-child { text-align:right; }
  table.items thead th:nth-child(2), table.items thead th:nth-child(3) { text-align:center; }
  .totals { display:flex; justify-content:flex-end; margin-bottom:24px; }
  .totals-box { min-width:260px; border:1px solid #e5e7eb; border-radius:8px; overflow:hidden; }
  .totals-row { display:flex; justify-content:space-between; padding:10px 14px; border-bottom:1px solid #e5e7eb; font-size:13px; }
  .totals-row.grand { background:${primary}; color:#fff; font-weight:800; font-size:15px; border-bottom:none; }
  .notes-section { background:#f8f9fc; border-radius:8px; padding:16px; margin-bottom:16px; }
  .notes-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#6b7280; margin-bottom:6px; }
  .notes-text { font-size:13px; color:#374151; line-height:1.6; }
  .footer { border-top:1px solid #e5e7eb; padding:20px 40px; text-align:center; font-size:11px; color:#9ca3af; }
  @media print { body { -webkit-print-color-adjust:exact; print-color-adjust:exact; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    ${logoUrl ? `<img src="${logoUrl}" alt="logo"/>` : `<div class="company-name">${esc(issuerName)}</div>`}
  </div>
  <div style="text-align:right">
    <div class="quote-badge">⚠ QUOTE — NOT AN INVOICE</div>
    <div class="quote-number">${esc(q.quote_number||"QT-000")}</div>
    <div class="quote-status">${(q.status||"draft").toUpperCase()}</div>
  </div>
</div>

<div class="body">
  <div class="meta-grid">
    <div class="meta-box">
      <div class="meta-label">Prepared for</div>
      <div class="meta-value">${esc(co||"—")}</div>
    </div>
    <div class="meta-box">
      <div class="meta-label">Quote Title</div>
      <div class="meta-value">${esc(q.title||"—")}</div>
    </div>
    <div class="meta-box">
      <div class="meta-label">Date Issued</div>
      <div class="meta-value">${q.date_issued ? new Date(q.date_issued).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) : "—"}</div>
    </div>
    <div class="meta-box">
      <div class="meta-label">Valid Until</div>
      <div class="meta-value">${q.expiry_date ? new Date(q.expiry_date).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) : "—"}</div>
    </div>
  </div>

  <table class="items">
    <thead>
      <tr>
        <th style="text-align:left">Description</th>
        <th style="text-align:center">Qty</th>
        <th style="text-align:right">Cost</th>
        <th style="text-align:right">Total</th>
      </tr>
    </thead>
    <tbody>
      ${linesHtml || `<tr><td colspan="4" style="padding:16px;text-align:center;color:#9ca3af">No line items</td></tr>`}
    </tbody>
  </table>

  <div class="totals">
    <div class="totals-box">
      ${(() => {
        const sub = Number(q.subtotal || 0);
        const disc = Number(q.discount_amount || 0);
        const total = sub > 0 ? Math.max(0, sub - disc) : Number(q.total || 0);
        return `
          <div class="totals-row"><span>Subtotal</span><span>£${sub > 0 ? sub.toFixed(2) : Number(q.total||0).toFixed(2)}</span></div>
          ${disc > 0 ? `<div class="totals-row"><span>Discount</span><span>-£${disc.toFixed(2)}</span></div>` : ""}
          <div class="totals-row grand"><span>TOTAL</span><span>£${total.toFixed(2)}</span></div>`;
      })()}
    </div>
  </div>

  ${q.notes ? `<div class="notes-section"><div class="notes-label">Notes</div><div class="notes-text">${esc(q.notes).replace(/\n/g,'<br>')}</div></div>` : ""}
  <div class="notes-section"><div class="notes-label">Terms &amp; Conditions</div><div class="notes-text">${esc(q.terms || crmSettings?.default_quote_terms || "Payment due within 30 days.").replace(/\n/g,'<br>')}</div></div>
</div>

<div class="footer">
  This document is a QUOTE only and does not constitute an invoice or demand for payment. Quote reference: ${esc(q.quote_number||"")} · Generated ${new Date().toLocaleDateString("en-GB")}
</div>
</body>
</html>`;

  const win = window.open("", "_blank");
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 600);
}

async function deleteQuote(id) {
  confirm("Delete Quote","Delete this quote?", async () => {
    try { await quotes.delete(id); toast("ok","Deleted"); await loadAndRender(); }
    catch(e) { toast("bad","Error",e.message); }
  });
}
</script>
</body>
</html>
