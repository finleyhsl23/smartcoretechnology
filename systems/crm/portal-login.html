<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>Customer Portal — SmartCore</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#05081a; --card:#0d1535; --line:rgba(255,255,255,.08);
      --text:#e9f0ff; --text2:rgba(233,240,255,.7); --text3:rgba(233,240,255,.4);
      --blue:#1e5cff; --r:12px;
    }
    [data-theme="light"] {
      --bg:#f0f2f8; --card:#ffffff; --line:rgba(0,0,0,.08);
      --text:#0d1535; --text2:rgba(13,21,53,.7); --text3:rgba(13,21,53,.4);
    }
    body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:40px; width:100%; max-width:420px; }
    .logo { text-align:center; margin-bottom:32px; }
    .logo-dot { width:48px; height:48px; background:var(--blue); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:16px; color:#fff; margin:0 auto 12px; }
    h1 { font-size:22px; font-weight:800; margin-bottom:6px; }
    p { font-size:14px; color:var(--text3); margin-bottom:24px; }
    label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:6px; }
    input { width:100%; padding:11px 14px; background:var(--bg); border:1px solid var(--line); border-radius:var(--r); color:var(--text); font-size:14px; outline:none; margin-bottom:14px; transition:border-color .15s; font-family:inherit; }
    input:focus { border-color:var(--blue); }
    input::placeholder { color:var(--text3); }
    button { width:100%; padding:12px; background:var(--blue); color:#fff; border:none; border-radius:var(--r); font-size:14px; font-weight:700; cursor:pointer; transition:opacity .15s; }
    button:hover { opacity:.9; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .error { color:#ef4444; font-size:13px; margin-top:8px; display:none; }
    .footer-link { text-align:center; margin-top:20px; font-size:13px; color:var(--text3); }
    .footer-link a { color:var(--blue); text-decoration:none; }
    .account-btn { display:flex; align-items:center; gap:14px; width:100%; padding:14px 16px; background:var(--bg); border:1px solid var(--line); border-radius:var(--r); color:var(--text); font-size:14px; font-weight:600; cursor:pointer; margin-bottom:10px; text-align:left; transition:border-color .15s,background .15s; }
    .account-btn:hover { border-color:var(--blue); background:rgba(30,92,255,.06); }
    .account-av { width:38px; height:38px; border-radius:50%; background:rgba(30,92,255,.15); border:2px solid rgba(30,92,255,.3); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:var(--blue); flex-shrink:0; }
    .account-info { min-width:0; }
    .account-company { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .account-name { font-size:12px; color:var(--text3); margin-top:1px; }
    .back-link { display:inline-block; margin-bottom:16px; font-size:13px; color:var(--blue); cursor:pointer; background:none; border:none; padding:0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-dot">SC</div>
    <h1>Customer Portal</h1>
    <p>Sign in to manage your support tickets and account</p>
  </div>

  <form id="loginForm">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
    <div class="error" id="errMsg"></div>
    <button type="submit" id="loginBtn" style="margin-top:8px">Sign In</button>
  </form>

  <div class="footer-link">
    Need help? <a href="mailto:support@smartcoretechnology.co.uk">Contact us</a>
  </div>
</div>

<script>
// If already logged in, redirect
const stored = localStorage.getItem("portal_session");
if (stored) {
  try {
    const { token, expires_at } = JSON.parse(stored);
    if (token && (!expires_at || new Date(expires_at) > new Date())) {
      window.location.href = "/systems/crm/portal-customer.html";
    }
  } catch(_) {}
}

let _pendingEmail = null, _pendingPassword = null;

async function doLogin(email, password, user_id) {
  const res = await fetch("/api/crm/portal-login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password, user_id }),
  });
  const data = await res.json();
  return { ok: res.ok, data };
}

function showSelectionScreen(accounts) {
  const card = document.querySelector(".card");
  card.innerHTML = `
    <button class="back-link" id="backBtn">← Back</button>
    <div class="logo">
      <div class="logo-dot">SC</div>
      <h1>Choose an account</h1>
      <p>Your email is linked to multiple companies. Select one to continue.</p>
    </div>
    <div id="accountList">
      ${accounts.map(a => `
        <button class="account-btn" data-uid="${a.id}">
          <div class="account-av">${(a.company_name||"?")[0].toUpperCase()}</div>
          <div class="account-info">
            <div class="account-company">${esc(a.company_name)}</div>
            <div class="account-name">${esc(a.name)}</div>
          </div>
        </button>`).join("")}
    </div>
    <div class="error" id="selErr" style="display:none"></div>
  `;

  document.getElementById("backBtn").onclick = () => window.location.reload();

  document.querySelectorAll(".account-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      document.querySelectorAll(".account-btn").forEach(b => b.disabled = true);
      const selErr = document.getElementById("selErr");
      selErr.style.display = "none";
      try {
        const { ok, data } = await doLogin(_pendingEmail, _pendingPassword, btn.dataset.uid);
        if (!ok || !data.session_token) {
          selErr.textContent = data.error || "Something went wrong. Please try again.";
          selErr.style.display = "block";
          document.querySelectorAll(".account-btn").forEach(b => b.disabled = false);
          return;
        }
        localStorage.setItem("portal_session", JSON.stringify({
          token: data.session_token,
          user: data.user,
          expires_at: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
        }));
        window.location.href = "/systems/crm/portal-customer.html";
      } catch(_) {
        selErr.textContent = "Connection error. Please try again.";
        selErr.style.display = "block";
        document.querySelectorAll(".account-btn").forEach(b => b.disabled = false);
      }
    });
  });
}

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("loginBtn");
  const err = document.getElementById("errMsg");
  btn.disabled = true;
  btn.textContent = "Signing in…";
  err.style.display = "none";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    const { ok, data } = await doLogin(email, password);

    if (!ok) {
      err.textContent = data.error || "Invalid email or password.";
      err.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Sign In";
      return;
    }

    if (data.requires_selection) {
      _pendingEmail = email;
      _pendingPassword = password;
      showSelectionScreen(data.accounts);
      return;
    }

    localStorage.setItem("portal_session", JSON.stringify({
      token: data.session_token,
      user: data.user,
      expires_at: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
    }));
    window.location.href = "/systems/crm/portal-customer.html";
  } catch(_) {
    err.textContent = "Connection error. Please try again.";
    err.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Sign In";
  }
});
</script>
</body>
</html>
