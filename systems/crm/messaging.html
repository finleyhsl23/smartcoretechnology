<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Messaging — SmartCore CRM</title>
  <link rel="stylesheet" href="/systems/crm/crm.css"/>
  <style>
    .msg-layout { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 56px); overflow:hidden; }
    .msg-sidebar { border-right:1px solid var(--line2); overflow-y:auto; display:flex; flex-direction:column; }
    .msg-sidebar-header { padding:14px 16px; border-bottom:1px solid var(--line2); flex-shrink:0; }
    .msg-thread  { display:flex; flex-direction:column; }
    .msg-header  { padding:16px 20px; border-bottom:1px solid var(--line2); display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .msg-body    { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px; }
    .msg-input   { padding:16px 20px; border-top:1px solid var(--line2); display:flex; gap:10px; flex-shrink:0; }
    .msg-input textarea { flex:1; resize:none; height:60px; border-radius:10px; border:1px solid var(--line2); background:var(--card2); color:var(--text); padding:10px 14px; font-size:14px; font-family:inherit; outline:none; }
    .msg-input textarea:focus { border-color:var(--blue); }
    .company-item { padding:12px 16px; cursor:pointer; border-bottom:1px solid var(--line2); display:flex; gap:10px; align-items:center; transition:background .15s; }
    .company-item:hover, .company-item.active { background:var(--blue-dim); }
    .company-avatar { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--blue),var(--blue2)); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; flex-shrink:0; }
    .bubble { max-width:72%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.5; }
    .bubble.staff    { background:var(--blue); color:#fff; border-bottom-right-radius:4px; align-self:flex-end; }
    .bubble.customer { background:var(--card2); border:1px solid var(--line2); border-bottom-left-radius:4px; align-self:flex-start; }
    .bubble-wrap { display:flex; flex-direction:column; }
    .bubble-wrap.staff    { align-items:flex-end; }
    .bubble-wrap.customer { align-items:flex-start; }
    .bubble-meta { font-size:11px; color:var(--text-dim); margin-top:3px; }
    .no-thread { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-dim); gap:8px; }
    .no-thread-icon { font-size:40px; opacity:.3; }
    .unread-badge { background:var(--blue2); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; margin-left:auto; flex-shrink:0; }
    .search-input { width:100%; padding:8px 12px; border-radius:8px; border:1px solid var(--line2); background:var(--card2); color:var(--text); font-size:13px; outline:none; }
    .search-input:focus { border-color:var(--blue); }
    .date-divider { text-align:center; font-size:11px; color:var(--text-dim); margin:4px 0; }
  </style>
</head>
<body>
<div class="crm-shell">
  <nav class="crm-sidebar" id="crmNav"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="crm-main">
    <div class="crm-topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title">Messaging</div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle">☀️</button>
        <button class="topbar-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div id="content" style="height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center">
      <div class="spinner"></div>
    </div>
  </div>
</div>
<div id="toastwrap"></div>
<script type="module">
import { requireCRMAccess, tierHasFeature } from "/systems/crm/shared/auth.js";
import { renderNav, initMobileNav, initTopbar } from "/systems/crm/shared/nav.js";
import { initTheme } from "/systems/crm/shared/theme.js";
import { esc, fmtDateTime, toast, tierGate } from "/systems/crm/shared/ui.js";
import { sb } from "/systems/crm/shared/supabase.js";

initTheme();
let profile, tier;

try {
  ({ profile, tier } = await requireCRMAccess());
  renderNav("messaging", profile, tier);
  initMobileNav();
  initTopbar(profile);
  if (!tierHasFeature(tier, "messaging")) {
    document.getElementById("content").innerHTML = tierGate("messaging");
  } else {
    await loadMessaging();
  }
} catch(e) { if (!e.message.includes("CRM not enabled") && !e.message.includes("session")) toast("bad","Error",e.message); }

let allCompanies = [], activeCompanyId = null, realtimeSub = null;
let companyIdsWithPortal = new Set(), unreadCounts = {};

async function loadMessaging() {
  const [{ data: companies }, { data: portalUsers }, { data: unreadRows }] = await Promise.all([
    sb().from("crm_companies").select("id,name").eq("tenant_id", profile.company_id).order("name"),
    sb().from("crm_portal_users").select("crm_company_id").eq("tenant_id", profile.company_id).not("crm_company_id","is",null),
    sb().from("crm_messages").select("crm_company_id").eq("tenant_id", profile.company_id).eq("sender_type","customer").is("read_at",null),
  ]);

  allCompanies = companies || [];
  companyIdsWithPortal = new Set((portalUsers||[]).map(u => u.crm_company_id));
  unreadCounts = {};
  (unreadRows||[]).forEach(m => { unreadCounts[m.crm_company_id] = (unreadCounts[m.crm_company_id]||0)+1; });

  // Sort: portal-active first, then alphabetical
  allCompanies.sort((a,b) => {
    const diff = (companyIdsWithPortal.has(b.id)?1:0) - (companyIdsWithPortal.has(a.id)?1:0);
    return diff || a.name.localeCompare(b.name);
  });

  document.getElementById("content").innerHTML = `
    <div class="msg-layout">
      <div class="msg-sidebar">
        <div class="msg-sidebar-header">
          <input id="companySearch" class="search-input" placeholder="Search companies…" autofocus/>
        </div>
        <div id="companyList" style="overflow-y:auto;flex:1">${renderCompanyList(allCompanies)}</div>
      </div>
      <div class="msg-thread" id="msgThread">
        <div class="no-thread">
          <div class="no-thread-icon">💬</div>
          <span style="font-size:14px">Select a company to view their messages</span>
        </div>
      </div>
    </div>`;

  document.getElementById("companySearch").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    document.getElementById("companyList").innerHTML = renderCompanyList(
      allCompanies.filter(c => c.name.toLowerCase().includes(q))
    );
  });
}

function renderCompanyList(list) {
  if (!list.length) return `<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">No companies found</div>`;
  return list.map(c => {
    const unread = unreadCounts[c.id] || 0;
    const hasPortal = companyIdsWithPortal.has(c.id);
    return `<div class="company-item${activeCompanyId===c.id?" active":""}" onclick="openThread('${c.id}','${esc(c.name).replace(/'/g,"\\'")}')">
      <div class="company-avatar">${(c.name[0]||"?").toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:1px">${hasPortal?"Portal users active":"No portal users"}</div>
      </div>
      ${unread ? `<span class="unread-badge">${unread}</span>` : ""}
    </div>`;
  }).join("");
}

window.openThread = async function(companyId, companyName) {
  activeCompanyId = companyId;
  if (realtimeSub) { sb().removeChannel(realtimeSub); realtimeSub = null; }

  document.getElementById("msgThread").innerHTML = `
    <div class="msg-header">
      <div class="company-avatar">${(companyName[0]||"?").toUpperCase()}</div>
      <div>
        <div style="font-weight:700;font-size:15px">${esc(companyName)}</div>
        <div class="text-xs text-muted">Customer portal messages</div>
      </div>
    </div>
    <div class="msg-body" id="msgBody"><div class="spinner" style="margin:auto"></div></div>
    <div class="msg-input">
      <textarea id="msgText" placeholder="Message ${esc(companyName)}…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button class="btn btn-primary" onclick="sendMsg()">Send</button>
    </div>`;

  // Mark customer messages as read
  sb().from("crm_messages")
    .update({ read_at: new Date().toISOString() })
    .eq("tenant_id", profile.company_id)
    .eq("crm_company_id", companyId)
    .eq("sender_type","customer")
    .is("read_at",null)
    .then(() => {
      unreadCounts[companyId] = 0;
      document.getElementById("companyList").innerHTML = renderCompanyList(allCompanies);
    });

  const { data: msgs, error } = await sb().from("crm_messages")
    .select("*")
    .eq("tenant_id", profile.company_id)
    .eq("crm_company_id", companyId)
    .order("created_at");

  if (error) { toast("bad","Error",error.message); return; }
  renderMessages(msgs || []);

  realtimeSub = sb().channel(`co-msgs-${companyId}`)
    .on("postgres_changes",{ event:"INSERT", schema:"public", table:"crm_messages", filter:`crm_company_id=eq.${companyId}` }, payload => {
      const body = document.getElementById("msgBody");
      if (!body) return;
      body.insertAdjacentHTML("beforeend", bubbleHtml(payload.new));
      body.scrollTop = body.scrollHeight;
    }).subscribe();
};

function renderMessages(msgs) {
  const body = document.getElementById("msgBody");
  if (!body) return;
  if (!msgs.length) {
    body.innerHTML = `<div class="no-thread" style="height:auto;padding:40px 0"><div class="no-thread-icon">💬</div><span style="font-size:14px">No messages yet — send one to start the conversation</span></div>`;
    return;
  }
  let html = "", lastDate = null;
  for (const m of msgs) {
    const d = new Date(m.created_at).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
    if (d !== lastDate) { html += `<div class="date-divider">${d}</div>`; lastDate = d; }
    html += bubbleHtml(m);
  }
  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;
}

function bubbleHtml(m) {
  const side = m.sender_type === "staff" ? "staff" : "customer";
  return `<div class="bubble-wrap ${side}">
    <div class="bubble ${side}">${esc(m.body)}</div>
    <div class="bubble-meta">${esc(m.sender_name||"Unknown")} · ${fmtDateTime(m.created_at)}</div>
  </div>`;
}

window.sendMsg = async function() {
  const ta = document.getElementById("msgText");
  const body = ta?.value.trim();
  if (!body || !activeCompanyId) return;
  ta.value = "";
  const { error } = await sb().from("crm_messages").insert({
    tenant_id: profile.company_id,
    crm_company_id: activeCompanyId,
    sender_type: "staff",
    sender_id: profile.id,
    sender_name: profile.full_name || "Staff",
    body,
  });
  if (error) { toast("bad","Error",error.message); ta.value = body; }
};
</script>
</body>
</html>
