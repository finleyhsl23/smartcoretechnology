<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tasks — SiteLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/systems/sitelens/shared/sitelens.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="sl-shell">
  <nav class="sl-sidebar" id="slNav" aria-label="Main navigation"></nav>
  <div id="sidebarOverlay"></div>
  <div class="sl-main">
    <div class="sl-topbar">
      <button class="hamburger icon-btn" id="hamburger" aria-label="Open menu"><i data-lucide="menu"></i></button>
      <h1>Tasks</h1>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
      <button class="icon-btn" id="logoutBtn" aria-label="Sign out"><i data-lucide="log-out"></i></button>
    </div>
    <div class="sl-content" id="content"><div id="body"></div></div>
  </div>
</div>
<div id="toastwrap" aria-live="polite"></div>

<script type="module">
  import { requireSiteLensAccess } from "/systems/sitelens/shared/auth.js";
  import { tasks } from "/systems/sitelens/shared/api.js";
  import { renderNav, initMobileNav, initTopbar } from "/systems/sitelens/shared/nav.js";
  import { initTheme } from "/systems/sitelens/shared/theme.js";
  import { esc, fmtDate, loadingState, emptyState, errorState, setInner, toast } from "/systems/sitelens/shared/ui.js";

  initTheme();
  let _profile = null, _companyId = null, _scope = "mine", _statusFilter = "open";

  try {
    const { profile } = await requireSiteLensAccess();
    _profile = profile; _companyId = profile.company_id;
    renderNav("tasks", profile);
    initMobileNav();
    initTopbar();
    await load();
  } catch (e) {
    setInner("body", errorState({ title: "Couldn't load Tasks", message: e.message || "" }));
  }

  async function load() {
    setInner("body", loadingState("Loading tasks…"));
    try {
      const opts = _statusFilter === "all" ? {} : { status: _statusFilter };
      if (_scope === "mine") opts.assigneeId = _profile.id;
      const list = await tasks.listForCompany(_companyId, opts);
      render(list);
    } catch (e) {
      setInner("body", errorState({ title: "Couldn't load tasks", message: e.message || "", retryId: "retry" }));
      document.getElementById("retry")?.addEventListener("click", load);
    }
  }

  function render(list) {
    setInner("body", `
      <div class="sl-page-head"><div><h2>Tasks</h2><p>Everything assigned across your SiteLens projects.</p></div></div>
      <div class="sl-toolbar">
        <select class="form-select" id="scopeSelect" style="max-width:160px">
          <option value="mine" ${_scope === "mine" ? "selected" : ""}>My Tasks</option>
          <option value="all" ${_scope === "all" ? "selected" : ""}>All Tasks</option>
        </select>
        <select class="form-select" id="statusSelect" style="max-width:160px">
          <option value="open" ${_statusFilter === "open" ? "selected" : ""}>Open</option>
          <option value="in_progress" ${_statusFilter === "in_progress" ? "selected" : ""}>In Progress</option>
          <option value="done" ${_statusFilter === "done" ? "selected" : ""}>Done</option>
          <option value="all" ${_statusFilter === "all" ? "selected" : ""}>All</option>
        </select>
      </div>
      ${list.length === 0 ? emptyState({ icon: "check-square", title: "No tasks found" }) : list.map(taskRow).join("")}
    `);
    document.getElementById("scopeSelect").addEventListener("change", (e) => { _scope = e.target.value; load(); });
    document.getElementById("statusSelect").addEventListener("change", (e) => { _statusFilter = e.target.value; load(); });
    document.querySelectorAll("[data-task-toggle]").forEach(cb => cb.addEventListener("change", async () => {
      await tasks.update(cb.dataset.taskToggle, { status: cb.checked ? "done" : "open" });
      toast("success", "Task updated");
      load();
    }));
  }

  function taskRow(t) {
    const badge = { low: "badge-grey", normal: "badge-blue", high: "badge-red" }[t.priority] || "badge-grey";
    return `
      <a href="project-detail.html?id=${esc(t.project_id)}" class="sl-task-row ${t.status === "done" ? "done" : ""}" style="text-decoration:none;color:inherit">
        <input type="checkbox" data-task-toggle="${t.id}" onclick="event.stopPropagation()" ${t.status === "done" ? "checked" : ""} style="width:20px;height:20px;accent-color:var(--accent)"/>
        <div style="flex:1">
          <div class="sl-task-title">${esc(t.title)}</div>
          <div class="sl-task-meta">
            <span class="badge ${badge}">${esc(t.priority)}</span>
            <span><i data-lucide="folder-kanban" style="width:11px;height:11px;vertical-align:-1px"></i> ${esc(t.sitelens_projects?.name || "")}</span>
            ${t.due_date ? `<span><i data-lucide="calendar" style="width:11px;height:11px;vertical-align:-1px"></i> ${esc(fmtDate(t.due_date))}</span>` : ""}
            ${t.core_employees ? `<span>${esc(t.core_employees.full_name)}</span>` : ""}
          </div>
        </div>
      </a>`;
  }
</script>
</body>
</html>
