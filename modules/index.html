<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartCore — My Modules</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #05081a;
      --surface:  #080d20;
      --card:     #0d1328;
      --card2:    #111827;
      --line:     rgba(255,255,255,.07);
      --blue:     #1e5cff;
      --blue2:    #0ea5ff;
      --blue-dim: rgba(30,92,255,.12);
      --text:     #e9f0ff;
      --muted:    rgba(233,240,255,.45);
      --good:     #22c55e;
      --bad:      #ef4444;
      --r:        14px;
      --r2:       10px;
    }
    [data-theme="light"] {
      --bg:       #f0f4f8;
      --surface:  #ffffff;
      --card:     #ffffff;
      --card2:    #f8fafc;
      --line:     rgba(0,0,0,.08);
      --text:     #0f172a;
      --muted:    rgba(15,23,42,.5);
      --blue-dim: rgba(30,92,255,.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      min-height: 100vh;
      transition: background .25s, color .25s;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
    }
    .brand {
      display: flex; align-items: center; gap: 12px;
    }
    .brand-dot {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: #fff; letter-spacing: -.02em;
    }
    .brand-name {
      font-size: 15px; font-weight: 800; letter-spacing: -.01em;
    }
    .brand-name span { color: var(--blue2); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .theme-btn {
      background: var(--card2); border: 1px solid var(--line);
      border-radius: 8px; padding: 7px 10px; cursor: pointer;
      font-size: 14px; color: var(--text); transition: background .2s;
    }
    .theme-btn:hover { background: var(--blue-dim); }
    .signout-btn {
      background: transparent; border: 1px solid var(--line);
      border-radius: 8px; padding: 7px 14px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--muted);
      transition: all .2s;
    }
    .signout-btn:hover { border-color: var(--bad); color: var(--bad); }
    .user-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--card2); border: 1px solid var(--line);
      border-radius: 20px; padding: 5px 14px 5px 6px;
      font-size: 13px;
    }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
    }

    /* ── Main layout ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── Sign-in panel ── */
    #loginView {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 60px);
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 40px 40px 36px;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
    }
    .login-logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      margin-bottom: 22px;
    }
    .login-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .form-label  { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .form-control {
      width: 100%; background: var(--card2); border: 1px solid var(--line);
      border-radius: 9px; padding: 11px 14px; color: var(--text);
      font-size: 14px; transition: border .2s; outline: none;
      margin-bottom: 16px;
    }
    .form-control:focus { border-color: var(--blue); }
    .form-control::placeholder { color: var(--muted); }
    .btn-login {
      width: 100%; background: var(--blue); color: #fff;
      border: none; border-radius: 10px; padding: 13px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
    }
    .btn-login:hover  { opacity: .9; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .login-error {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: #fca5a5; margin-bottom: 16px; display: none;
    }
    .login-divider {
      text-align: center; font-size: 12px; color: var(--muted);
      margin-top: 20px;
    }

    /* ── Modules view ── */
    #modulesView { display: none; }
    .page-hero { margin-bottom: 40px; }
    .page-hero h1 { font-size: 30px; font-weight: 900; letter-spacing: -.02em; }
    .page-hero p  { color: var(--muted); font-size: 15px; margin-top: 6px; }
    .company-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--blue-dim); border: 1px solid rgba(30,92,255,.3);
      border-radius: 20px; padding: 4px 12px; font-size: 12px;
      font-weight: 600; color: var(--blue2); margin-top: 12px;
    }

    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }
    .module-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 24px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color .2s, transform .15s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .module-card::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--mod-color, var(--blue)) 0%, transparent 60%);
      opacity: 0; transition: opacity .2s;
      border-radius: var(--r);
    }
    .module-card:hover { border-color: var(--mod-color, var(--blue)); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.25); }
    .module-card:hover::before { opacity: .06; }
    .module-card.locked { cursor: default; opacity: .55; }
    .module-card.locked:hover { transform: none; box-shadow: none; border-color: var(--line); }
    .module-card.locked::before { display: none; }

    .mod-icon {
      width: 48px; height: 48px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 16px;
      background: rgba(255,255,255,.05);
    }
    .mod-name   { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .mod-desc   { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
    .mod-footer { display: flex; align-items: center; justify-content: space-between; }
    .mod-badge {
      font-size: 11px; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-active  { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.25); }
    .badge-locked  { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--line); }
    .badge-tier    { background: var(--blue-dim); color: var(--blue2); border: 1px solid rgba(30,92,255,.25); }
    .mod-arrow { color: var(--muted); font-size: 18px; transition: transform .15s; }
    .module-card:not(.locked):hover .mod-arrow { transform: translateX(4px); color: var(--text); }

    .mod-gear {
      position: absolute; top: 12px; right: 12px;
      background: var(--card2); border: 1px solid var(--line);
      border-radius: 7px; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer; z-index: 2;
      opacity: 0; transition: opacity .15s;
      text-decoration: none; color: inherit;
    }
    .module-card:hover .mod-gear { opacity: 1; }
    .mod-gear:hover { background: var(--blue-dim); border-color: rgba(30,92,255,.4); }

    /* ── Access modal ── */
    #accessModal {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    #accessModal.open { display: flex; }
    .access-modal-box {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 18px; padding: 32px; width: 100%; max-width: 440px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .access-modal-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .access-modal-sub   { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .role-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: var(--card2); border-radius: 10px;
      margin-bottom: 10px; border: 1px solid var(--line);
    }
    .role-row-label { font-size: 14px; font-weight: 600; }
    .role-row-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .toggle-switch {
      position: relative; width: 40px; height: 22px; flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 99px;
      background: var(--line); cursor: pointer; transition: background .2s;
    }
    .toggle-track::after {
      content: ""; position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--muted); transition: transform .2s, background .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--blue); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(18px); background: #fff; }
    .access-modal-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-modal-save {
      flex: 1; background: var(--blue); color: #fff; border: none;
      border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-modal-save:hover { opacity: .9; }
    .btn-modal-cancel {
      background: var(--card2); color: var(--text); border: 1px solid var(--line);
      border-radius: 10px; padding: 11px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-modal-cancel:hover { background: var(--blue-dim); }

    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted); margin-bottom: 14px;
    }
    .empty-modules {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--r); padding: 48px 32px; text-align: center;
    }
    .empty-modules h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty-modules p  { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .btn-shop {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 10px; padding: 11px 22px;
      font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
      transition: opacity .2s;
    }
    .btn-shop:hover { opacity: .9; }

    /* ── Toast ── */
    #toastwrap {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 10px; z-index: 9999;
    }
    .toast {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; padding: 12px 18px;
      font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,.4);
      animation: slideIn .2s ease; display: flex; align-items: center; gap: 10px;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .main { padding: 32px 16px 60px; }
      .login-card { padding: 28px 20px; }
      .modules-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <div class="brand">
    <div class="brand-dot">S</div>
    <div class="brand-name">Smart<span>Core</span></div>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" id="themeBtn" title="Toggle theme">☀️</button>
    <div class="user-pill" id="userPill" style="display:none">
      <div class="user-avatar" id="userAvatar">?</div>
      <span id="userNameDisplay">—</span>
    </div>
    <button class="signout-btn" id="signOutBtn" style="display:none">Sign out</button>
  </div>
</nav>

<!-- Sign-in view -->
<div id="loginView">
  <div class="login-card">
    <div class="login-logo">S</div>
    <div class="login-title">Sign in to SmartCore</div>
    <div class="login-sub">Access your modules and company tools</div>
    <div class="login-error" id="loginError"></div>
    <label class="form-label" for="emailInput">Email address</label>
    <input class="form-control" id="emailInput" type="email" placeholder="you@company.com" autocomplete="email"/>
    <label class="form-label" for="passInput">Password</label>
    <input class="form-control" id="passInput" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn-login" id="loginBtn">Sign in</button>
    <div class="login-divider">Need an account? <a href="/shop/index.html" style="color:var(--blue2);text-decoration:none;font-weight:600">Visit the shop →</a></div>
  </div>
</div>

<!-- Modules view -->
<div id="modulesView">
  <div class="main">
    <div class="page-hero">
      <h1>Your Modules</h1>
      <p>Click any active module to open it.</p>
      <div class="company-tag" id="companyTag">🏢 Loading…</div>
    </div>
    <div id="modulesContent"></div>
  </div>
</div>

<div id="toastwrap"></div>

<!-- Access control modal -->
<div id="accessModal">
  <div class="access-modal-box">
    <div class="access-modal-title" id="accessModalTitle">Module Access</div>
    <div class="access-modal-sub">Choose which roles can access this module</div>
    <div id="accessRoleRows"></div>
    <div class="access-modal-btns">
      <button class="btn-modal-cancel" onclick="closeAccessModal()">Cancel</button>
      <button class="btn-modal-save" onclick="saveAccess()">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL     = "https://hjdpcfhozhoyeqevnupm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqZHBjZmhvemhveWVxZXZudXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5MTk3MzYsImV4cCI6MjA4MjQ5NTczNn0.BXosJO4NmEZOe73GXSGPa3z-i_4ZzF9zBAMBIf6Mkts";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Module registry ───────────────────────────────────────────────────────
// Add new modules here as they are built. url is where the module lives.
// slugs must match the module_slug values in smartcore_core_purchased_modules.
const MODULE_REGISTRY = [
  {
    slugs: ["holiday-management"],
    name:  "Holiday Management",
    desc:  "Employee holiday requests, leave allowances, approvals and company-wide calendar.",
    icon:  "🌴",
    color: "#22c55e",
    url:   "/systems/holidaymanagement/home.html",
  },
  {
    slugs: ["presence-and-fire-safety"],
    name:  "Presence & Fire Safety",
    desc:  "Staff presence tracking, fire roll calls, visitor management and compliance reporting.",
    icon:  "🔥",
    color: "#f97316",
    url:   "/app/modules/presence-and-fire-safety.html",
  },
  {
    slugs: ["smartcore-crm", "smartcore-crm-lite", "smartcore-crm-professional", "smartcore-crm-business", "smartcore-crm-enterprise"],
    name:  "SmartCore CRM",
    desc:  "Full-featured CRM — companies, contacts, leads, pipeline, quotes, documents and reports.",
    icon:  "🎯",
    color: "#1e5cff",
    url:   "/systems/crm/dashboard.html",
    tierLabel: true,
  },
  {
    slugs: ["accident-and-injury-book"],
    name:  "Accident & Injury Book",
    desc:  "Digital accident reporting, injury logs and RIDDOR-compliant record keeping.",
    icon:  "🩹",
    color: "#ef4444",
    url:   "/app/modules/accident-and-injury-book.html",
  },
  {
    slugs: ["training-and-compliance"],
    name:  "Training & Compliance",
    desc:  "Track staff training, certifications, expiry dates and compliance status.",
    icon:  "📚",
    color: "#8b5cf6",
    url:   "/app/modules/training-and-compliance.html",
  },
  {
    slugs: ["policies-and-staff-handbook"],
    name:  "Policies & Staff Handbook",
    desc:  "Publish and manage company policies, staff handbook and document sign-offs.",
    icon:  "📋",
    color: "#0ea5ff",
    url:   "/app/modules/policies-and-staff-handbook.html",
  },
  {
    slugs: ["expenses-upload"],
    name:  "Expenses",
    desc:  "Staff expense submissions, receipt uploads and approval workflows.",
    icon:  "💳",
    color: "#f59e0b",
    url:   "/app/modules/expenses-upload.html",
  },
  {
    slugs: ["onboarding-and-offboarding"],
    name:  "Onboarding & Offboarding",
    desc:  "Structured checklists and workflows for joining and leaving employees.",
    icon:  "🚪",
    color: "#06b6d4",
    url:   "/app/modules/onboarding-and-offboarding.html",
  },
  {
    slugs: ["wellbeing-check"],
    name:  "Wellbeing Check",
    desc:  "Regular wellbeing surveys and mood tracking to support your team.",
    icon:  "💚",
    color: "#10b981",
    url:   "/app/modules/wellbeing-check.html",
  },
];

// ── Theme ─────────────────────────────────────────────────────────────────
const root = document.documentElement;
const saved = localStorage.getItem("sc-modules-theme") || "dark";
root.setAttribute("data-theme", saved);
document.getElementById("themeBtn").textContent = saved === "dark" ? "☀️" : "🌙";

document.getElementById("themeBtn").addEventListener("click", () => {
  const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
  root.setAttribute("data-theme", next);
  localStorage.setItem("sc-modules-theme", next);
  document.getElementById("themeBtn").textContent = next === "dark" ? "☀️" : "🌙";
});

// ── Init ──────────────────────────────────────────────────────────────────
const { data: { session } } = await sb.auth.getSession();
if (session) {
  await showModules(session);
} else {
  showLogin();
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === "SIGNED_IN"  && session) await showModules(session);
  if (event === "SIGNED_OUT")            showLogin();
});

// ── Sign-in ───────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById("loginView").style.display   = "flex";
  document.getElementById("modulesView").style.display = "none";
  document.getElementById("userPill").style.display    = "none";
  document.getElementById("signOutBtn").style.display  = "none";
}

const loginBtn   = document.getElementById("loginBtn");
const loginError = document.getElementById("loginError");

function showError(msg) {
  loginError.textContent = msg;
  loginError.style.display = "block";
}

loginBtn.addEventListener("click", async () => {
  const email = document.getElementById("emailInput").value.trim();
  const pass  = document.getElementById("passInput").value;
  if (!email || !pass) { showError("Please enter your email and password."); return; }
  loginError.style.display = "none";
  loginBtn.disabled = true;
  loginBtn.textContent = "Signing in…";
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    showError(error.message || "Sign-in failed. Please check your credentials.");
    loginBtn.disabled = false;
    loginBtn.textContent = "Sign in";
  }
});

document.getElementById("passInput").addEventListener("keydown", e => {
  if (e.key === "Enter") loginBtn.click();
});

// ── Modules view ──────────────────────────────────────────────────────────
async function showModules(session) {
  document.getElementById("loginView").style.display   = "none";
  document.getElementById("modulesView").style.display = "block";
  document.getElementById("signOutBtn").style.display  = "flex";

  // Load profile — user may have multiple rows, pick the most complete one
  const { data: profiles } = await sb
    .from("core_employees")
    .select("company_id, full_name, role")
    .eq("auth_user_id", session.user.id);

  const profile = profiles?.find(p => p.full_name && p.full_name !== session.user.email)
    || profiles?.[0];

  if (!profile) {
    document.getElementById("modulesContent").innerHTML = `
      <div class="empty-modules">
        <h3>No profile found</h3>
        <p>Your account doesn't have a company profile linked. Contact your administrator.</p>
      </div>`;
    return;
  }

  // Show user info
  const displayName = (profile.full_name && profile.full_name !== session.user.email)
    ? profile.full_name : session.user.email;
  const initials = displayName.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  document.getElementById("userAvatar").textContent      = initials;
  document.getElementById("userNameDisplay").textContent = displayName;
  document.getElementById("userPill").style.display      = "flex";

  // Load company name from smartcore_core_companies
  const { data: company } = await sb
    .from("smartcore_core_companies")
    .select("company_name")
    .eq("id", profile.company_id)
    .maybeSingle();
  document.getElementById("companyTag").textContent = "🏢 " + (company?.company_name || "Your Company");

  // Load purchased modules and marketplace catalogue in parallel
  const [{ data: purchased }, { data: catalogue }] = await Promise.all([
    sb.from("smartcore_core_purchased_modules").select("module_slug, status").eq("company_id", profile.company_id).eq("status", "active"),
    sb.from("marketplace_modules").select("slug"),
  ]);

  const ownedSlugs    = new Set((purchased  || []).map(m => m.module_slug));
  const catalogueSlugs = new Set((catalogue || []).map(m => m.slug));

  const isAdmin = ["owner","admin"].includes(profile.role);

  // Active = owned; Available = in the store but not yet owned (skip smartcore-core)
  const active  = MODULE_REGISTRY.filter(m => m.slugs.some(s => ownedSlugs.has(s)));
  const locked  = MODULE_REGISTRY.filter(m =>
    !m.slugs.some(s => ownedSlugs.has(s)) &&
    m.slugs.some(s => catalogueSlugs.has(s) && s !== "smartcore-core")
  );

  // Load access rules for this company
  const { data: accessRows } = await sb
    .from("module_access")
    .select("module_slug, allowed_roles")
    .eq("company_id", profile.company_id);
  const accessMap = {};
  (accessRows || []).forEach(r => { accessMap[r.module_slug] = r.allowed_roles; });

  // Filter active modules by role (admins/owners always see all)
  const visibleActive = isAdmin
    ? active
    : active.filter(m => {
        const rules = accessMap[m.slugs[0]];
        return !rules || rules.includes(profile.role);
      });

  let html = "";

  if (visibleActive.length === 0 && locked.length === 0) {
    html = `
      <div class="empty-modules">
        <h3>No modules yet</h3>
        <p>Your company hasn't purchased any SmartCore modules. Visit the shop to get started.</p>
        <a class="btn-shop" href="/shop/index.html">Browse modules →</a>
      </div>`;
  } else {
    if (visibleActive.length > 0) {
      html += `<div class="section-label">Active modules (${visibleActive.length})</div>
        <div class="modules-grid" style="margin-bottom:40px">
          ${visibleActive.map(m => moduleCard(m, true, isAdmin, accessMap)).join("")}
        </div>`;
    }
    if (locked.length > 0 && isAdmin) {
      html += `<div class="section-label">Available to add</div>
        <div class="modules-grid">
          ${locked.map(m => moduleCard(m, false, false, {})).join("")}
        </div>`;
    }
  }

  document.getElementById("modulesContent").innerHTML = html;

  // Make openAccessModal available globally (called from inline onclick)
  window._moduleAccessMap = accessMap;
  window._companyId = profile.company_id;
}

function moduleCard(m, isActive, isAdmin, accessMap) {
  const slug = m.slugs[0];
  const allowedRoles = (accessMap || {})[slug] || ["owner","admin","manager","employee"];
  const restrictedLabel = allowedRoles.length < 4
    ? `<span class="mod-badge badge-tier" style="font-size:10px">${allowedRoles.join(", ")}</span>` : "";
  const gearBtn = isAdmin
    ? `<button class="mod-gear" title="Access settings" onclick="event.preventDefault();event.stopPropagation();openAccessModal('${slug}','${m.name.replace(/'/g,"\\'")}')">⚙️</button>`
    : "";

  if (isActive) {
    return `
      <a class="module-card" href="${m.url}" style="--mod-color:${m.color}">
        ${gearBtn}
        <div class="mod-icon" style="background:${m.color}22;font-size:24px">${m.icon}</div>
        <div class="mod-name">${m.name}</div>
        <div class="mod-desc">${m.desc}</div>
        <div class="mod-footer">
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span class="mod-badge badge-active">● Active</span>
            ${restrictedLabel}
          </div>
          <span class="mod-arrow">→</span>
        </div>
      </a>`;
  } else {
    return `
      <div class="module-card locked">
        <div class="mod-icon" style="font-size:24px">${m.icon}</div>
        <div class="mod-name">${m.name}</div>
        <div class="mod-desc">${m.desc}</div>
        <div class="mod-footer">
          <span class="mod-badge badge-locked">🔒 Not active</span>
          <a href="/shop/index.html" style="font-size:12px;color:var(--blue2);text-decoration:none;font-weight:600">Add →</a>
        </div>
      </div>`;
  }
}

// ── Module access modal ───────────────────────────────────────────────────
const ALL_ROLES = [
  { id: "owner",    label: "Owner",    sub: "Company owner" },
  { id: "admin",    label: "Admin",    sub: "Administrators" },
  { id: "manager",  label: "Manager",  sub: "Team managers" },
  { id: "employee", label: "Employee", sub: "All staff members" },
];

let _accessModalSlug = null;

window.openAccessModal = function(slug, name) {
  _accessModalSlug = slug;
  document.getElementById("accessModalTitle").textContent = name + " — Access";
  const current = (window._moduleAccessMap || {})[slug] || ALL_ROLES.map(r => r.id);
  document.getElementById("accessRoleRows").innerHTML = ALL_ROLES.map(r => `
    <div class="role-row">
      <div>
        <div class="role-row-label">${r.label}</div>
        <div class="role-row-sub">${r.sub}</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="role-${r.id}" ${current.includes(r.id) || r.id === "owner" ? "checked" : ""} ${r.id === "owner" ? "disabled" : ""}>
        <span class="toggle-track"></span>
      </label>
    </div>`).join("");
  document.getElementById("accessModal").classList.add("open");
};

window.closeAccessModal = function() {
  document.getElementById("accessModal").classList.remove("open");
  _accessModalSlug = null;
};

window.saveAccess = async function() {
  if (!_accessModalSlug) return;
  const allowed = ALL_ROLES.filter(r => document.getElementById("role-" + r.id)?.checked).map(r => r.id);
  const { error } = await sb.from("module_access").upsert({
    company_id:    window._companyId,
    module_slug:   _accessModalSlug,
    allowed_roles: allowed,
    updated_at:    new Date().toISOString(),
  }, { onConflict: "company_id,module_slug" });
  if (error) { toast("Could not save: " + error.message); return; }
  window._moduleAccessMap[_accessModalSlug] = allowed;
  closeAccessModal();
};

document.getElementById("accessModal").addEventListener("click", e => {
  if (e.target === document.getElementById("accessModal")) closeAccessModal();
});

function toast(msg) {
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.getElementById("toastwrap").appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Sign out ──────────────────────────────────────────────────────────────
document.getElementById("signOutBtn").addEventListener("click", async () => {
  await sb.auth.signOut();
});
</script>
</body>
