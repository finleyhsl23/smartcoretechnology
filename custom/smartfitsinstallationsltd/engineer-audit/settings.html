<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Settings — SmartCore Engineer Install Audit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/custom/smartfitsinstallationsltd/engineer-audit/shared/audit.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="eia-shell">
  <nav class="eia-sidebar" id="eiaNav" aria-label="Main navigation"></nav>
  <div id="sidebarOverlay"></div>

  <div class="eia-main">
    <div class="eia-topbar">
      <button class="hamburger icon-btn" id="hamburger" aria-label="Open menu"><i data-lucide="menu"></i></button>
      <h1>Settings</h1>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
      <button class="icon-btn" id="logoutBtn" aria-label="Sign out"><i data-lucide="log-out"></i></button>
    </div>
    <div class="eia-content" id="content">
      <div id="body"></div>
    </div>
  </div>
</div>
<div id="toastwrap" aria-live="polite"></div>

<script type="module">
  import { requireModuleAccess } from "/custom/smartfitsinstallationsltd/engineer-audit/shared/auth.js";
  import { listDepartments, listSmartfitsEmployees, getAuditSettings, updateAuditSettings } from "/custom/smartfitsinstallationsltd/engineer-audit/shared/api.js";
  import { renderNav, initMobileNav, initTopbar } from "/custom/smartfitsinstallationsltd/engineer-audit/shared/nav.js";
  import { initTheme } from "/custom/smartfitsinstallationsltd/engineer-audit/shared/theme.js";
  import { esc, setInner, loadingState, errorState, toast, permissionDeniedState, initTagInput } from "/custom/smartfitsinstallationsltd/engineer-audit/shared/ui.js";

  initTheme();
  let _profile, _departments = [], _employees = [], _selected = new Set(), _managerTag, _managerIds = [], _failThreshold = 60, _leaderboardEnabled = true;

  try {
    const { profile, tier, settings: navSettings } = await requireModuleAccess();
    _profile = profile;
    renderNav("settings", profile, tier, navSettings);
    initMobileNav();
    initTopbar();

    if (tier !== "owner_admin") {
      setInner("body", permissionDeniedState("Only Owners and Admins can change module settings."));
    } else {
      await render();
    }
  } catch (e) {
    setInner("body", errorState({ title: "Couldn't load settings", message: e.message }));
  }

  async function render() {
    setInner("body", loadingState("Loading settings…"));
    try {
      const [departments, employees, settings] = await Promise.all([listDepartments(), listSmartfitsEmployees(), getAuditSettings()]);
      _departments = departments;
      _employees = employees;
      _selected = new Set(settings.visible_department_ids || []);
      _managerIds = settings.manager_employee_ids || [];
      _failThreshold = settings.fail_threshold_percent ?? 60;
      _leaderboardEnabled = settings.leaderboard_enabled ?? true;
      draw();
    } catch (e) {
      setInner("body", errorState({ title: "Couldn't load settings", message: e.message }));
    }
  }

  function draw() {
    const html = `
      <div class="page-head">
        <h2>Module Settings</h2>
        <p>Control which parts of Smartfits show up when auditing.</p>
      </div>

      <div class="card" style="max-width:520px">
        <div class="form-row" style="margin-bottom:10px">
          <label class="form-label">Departments visible in the engineer picker</label>
          <p class="text-muted" style="font-size:12.5px;margin:0 0 10px">Leave nothing selected to show every Smartfits employee. Otherwise, only employees in the selected departments appear in "Which engineer would you like to audit today?".</p>
          <div class="cbdd" id="deptDropdown">
            <button type="button" class="cbdd-trigger" id="cbddTrigger">
              <span id="cbddLabel">All departments</span>
              <i data-lucide="chevron-down"></i>
            </button>
            <div class="cbdd-panel" id="cbddPanel">
              <div class="cbdd-actions">
                <button type="button" id="selectAll">Select all</button>
                <button type="button" id="clearAll">Clear</button>
              </div>
              ${_departments.map(d => `
                <label class="cbdd-option">
                  <input type="checkbox" value="${esc(d.id)}" ${_selected.has(d.id) ? "checked" : ""}/>
                  <span>${esc(d.name)}</span>
                </label>`).join("")}
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="max-width:520px;margin-top:18px">
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">Senior Regional Engineering Managers</label>
          <p class="text-muted" style="font-size:12.5px;margin:0 0 10px">Type a name to add someone to the roster. Only people on this roster can be picked as a manager when assigning engineers, and they're removed from the "needs a manager" list on the Manage Assignments page.</p>
          <div id="managerTagInput"></div>
        </div>
      </div>

      <div class="card" style="max-width:520px;margin-top:18px">
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label" for="failThreshold">Fail threshold</label>
          <p class="text-muted" style="font-size:12.5px;margin:0 0 10px">Audits scoring below this percentage are highlighted red on the engineer's profile.</p>
          <div style="display:flex;align-items:center;gap:10px;max-width:160px">
            <input type="number" id="failThreshold" class="form-input" min="0" max="100" step="1" value="${esc(_failThreshold)}"/>
            <span class="text-muted" style="font-weight:700">%</span>
          </div>
        </div>
      </div>

      <div class="card" style="max-width:520px;margin-top:18px">
        <label class="form-row" style="margin-bottom:0;display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="leaderboardEnabled" style="width:16px;height:16px;accent-color:var(--accent)" ${_leaderboardEnabled ? "checked" : ""}/>
          <span>
            <span class="form-label" style="margin-bottom:2px;display:block">Enable Leaderboard</span>
            <span class="text-muted" style="font-size:12.5px">When off, the Leaderboard disappears from the sidebar and the page itself shows as disabled.</span>
          </span>
        </label>
      </div>

      <button class="btn btn-primary" id="saveBtn" style="margin-top:18px"><i data-lucide="save"></i> Save Settings</button>
    `;
    setInner("body", html);
    wireDropdown();
    updateTriggerLabel();

    _managerTag = initTagInput(document.getElementById("managerTagInput"), {
      options: _employees.filter(e => e.id !== _profile.id),
      selected: _managerIds,
      placeholder: "Search employees by name…",
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const thresholdValue = Number(document.getElementById("failThreshold").value);
      if (!Number.isInteger(thresholdValue) || thresholdValue < 0 || thresholdValue > 100) {
        toast("error", "Invalid fail threshold", "Enter a whole number between 0 and 100.");
        return;
      }
      try {
        await updateAuditSettings({
          visible_department_ids: [..._selected],
          manager_employee_ids: _managerTag.getSelected(),
          fail_threshold_percent: thresholdValue,
          leaderboard_enabled: document.getElementById("leaderboardEnabled").checked,
        }, _profile.id);
        toast("success", "Settings saved");
      } catch (e) {
        toast("error", "Couldn't save settings", e.message);
      }
    });
  }

  function updateTriggerLabel() {
    const label = document.getElementById("cbddLabel");
    if (!label) return;
    if (_selected.size === 0) label.textContent = "All departments";
    else if (_selected.size === 1) label.textContent = _departments.find(d => _selected.has(d.id))?.name || "1 selected";
    else label.textContent = `${_selected.size} departments selected`;
  }

  function wireDropdown() {
    const dd = document.getElementById("deptDropdown");
    const trigger = document.getElementById("cbddTrigger");

    trigger.addEventListener("click", (e) => {
      e.stopPropagation();
      dd.classList.toggle("open");
    });
    document.addEventListener("click", (e) => {
      if (!dd.contains(e.target)) dd.classList.remove("open");
    });
    dd.addEventListener("keydown", (e) => {
      if (e.key === "Escape") dd.classList.remove("open");
    });

    dd.querySelectorAll('.cbdd-option input[type="checkbox"]').forEach(cb => {
      cb.addEventListener("change", () => {
        if (cb.checked) _selected.add(cb.value); else _selected.delete(cb.value);
        updateTriggerLabel();
      });
    });

    document.getElementById("selectAll").addEventListener("click", () => {
      _departments.forEach(d => _selected.add(d.id));
      dd.querySelectorAll('.cbdd-option input[type="checkbox"]').forEach(cb => cb.checked = true);
      updateTriggerLabel();
    });
    document.getElementById("clearAll").addEventListener("click", () => {
      _selected.clear();
      dd.querySelectorAll('.cbdd-option input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateTriggerLabel();
    });
  }
</script>
</body>
</html>
