function renderPips() {
  document.getElementById('pipRow').innerHTML = STEPS.map((_, i) => {
    const cls = i + 1 < currentStep ? 'done' : i + 1 === currentStep ? 'active' : '';
    return `<div class="step-pip ${cls}"></div>`;
  }).join('');
}

function renderStep() {
  document.getElementById('pageTitle').textContent = STEPS[currentStep - 1].title;
  document.getElementById('pageSub').textContent   = STEPS[currentStep - 1].sub;
  document.getElementById('stepLabel').textContent = `Step ${currentStep} of ${STEPS.length}`;
  document.getElementById('stepContent').innerHTML = STEP_HTML[currentStep - 1];
  document.getElementById('btnBack').style.display = currentStep > 1 ? '' : 'none';
  document.getElementById('btnNext').textContent   = currentStep === STEPS.length ? 'Submit →' : 'Continue →';
  document.getElementById('errBox').style.display  = 'none';
  renderPips();
  if (currentStep === STEPS.length) buildReview();
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Pre-fill from order on step 1
  if (currentStep === 1 && orderData) {
    const nameEl = document.getElementById('fFullName');
    if (nameEl && orderData.contact_name) nameEl.value = orderData.contact_name;
    const emailEl = document.getElementById('fEmail');
    if (!emailEl) return;
    if (orderData.email) {
      const s2Email = document.getElementById('fEmail');
      if (s2Email) s2Email.value = orderData.email;
    }
  }
  if (currentStep === 2 && orderData?.email) {
    const el = document.getElementById('fEmail');
    if (el && !el.value) el.value = orderData.email;
    if (orderData.phone) {
      const ph = document.getElementById('fPhone');
      if (ph && !ph.value) ph.value = orderData.phone.replace(/^\+\d+\s?/, '');
    }
  }
}

  const ids = [
    'fTitle','fFullName','fFirstName','fLastName','fPreferred','fEmail','fDob',
    'fGender','fPronouns','fJobTitle','fStartDate',
    'fCountryCode','fPhone','fAddr1','fAddr2','fCity','fCounty','fPostcode','fCountry',
    'fEc1Name','fEc1Rel','fEc1Phone','fEc1Email',
    'fEc2Name','fEc2Rel','fEc2Phone','fEc2Email',
    'fNino','fTaxCode','fStudentLoan','fBankName','fSortCode','fAccountNum',
    'fDietary','fAccessibility',
  ];
  for (const id of ids) {
    const el = document.getElementById(id);
    if (el) savedFields[id] = el.value?.trim() || '';
  }
}

function validate() {
  const err = (msg) => { showErr(msg); return false; };
  if (currentStep === 1) {
    if (!val('fTitle'))    return err('Please select your title.');
    if (!val('fFullName')) return err('Please enter your full legal name.');
    if (!val('fDob'))      return err('Please enter your date of birth.');
  }
  if (currentStep === 2) {
    if (!val('fEmail') || !val('fEmail').includes('@')) return err('Please enter a valid email address.');
    if (!val('fPhone'))   return err('Please enter your phone number.');
    if (!val('fAddr1'))   return err('Please enter your address.');
    if (!val('fCity'))    return err('Please enter your city.');
    if (!val('fPostcode')) return err('Please enter your postcode.');
  }
  if (currentStep === 3) {
    if (!val('fEc1Name'))  return err('Please enter your primary emergency contact name.');
    if (!val('fEc1Rel'))   return err('Please enter their relationship to you.');
    if (!val('fEc1Phone')) return err('Please enter their phone number.');
  }
  return true;
}

function showErr(msg) {
  const box = document.getElementById('errBox');
  box.textContent = msg;
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function goBack() {
  if (currentStep > 1) { saveCurrentFields(); currentStep--; renderStep(); }
}

function goNext() {
  if (!validate()) return;
  if (currentStep === STEPS.length) { submitOwner(); return; }
  saveCurrentFields();
  currentStep++;
  renderStep();
}

function buildReview() {
  const rows = (items) => items.filter(([,v]) => v).map(([lbl,v]) =>
    `<div class="review-row"><span>${lbl}</span><span>${v}</span></div>`).join('');

  document.getElementById('reviewContent').innerHTML = `
    <div class="review-block"><h4>Personal Details</h4>${rows([
      ['Title', val('fTitle')], ['Full Name', val('fFullName')],
      ['Preferred Name', val('fPreferred')], ['Date of Birth', val('fDob')],
      ['Gender', val('fGender')], ['Pronouns', val('fPronouns')],
      ['Job Title', val('fJobTitle')], ['Start Date', val('fStartDate')],
    ])}</div>
    <div class="review-block"><h4>Contact & Address</h4>${rows([
      ['Email', val('fEmail')],
      ['Phone', (val('fCountryCode') || '+44') + ' ' + val('fPhone')],
      ['Address', [val('fAddr1'),val('fAddr2'),val('fCity'),val('fCounty'),val('fPostcode'),val('fCountry')].filter(Boolean).join(', ')],
    ])}</div>
    <div class="review-block"><h4>Emergency Contact 1</h4>${rows([
      ['Name', val('fEc1Name')], ['Relationship', val('fEc1Rel')],
      ['Phone', val('fEc1Phone')], ['Email', val('fEc1Email')],
    ])}</div>
    ${val('fEc2Name') ? `<div class="review-block"><h4>Emergency Contact 2</h4>${rows([
      ['Name', val('fEc2Name')], ['Relationship', val('fEc2Rel')],
      ['Phone', val('fEc2Phone')], ['Email', val('fEc2Email')],
    ])}</div>` : ''}
    ${(val('fNino')||val('fTaxCode')||val('fBankName')) ? `<div class="review-block"><h4>Financial & Payroll</h4>${rows([
      ['NI Number', val('fNino')], ['Tax Code', val('fTaxCode')],
      ['Student Loan', val('fStudentLoan')], ['Bank Name', val('fBankName')],
      ['Sort Code', val('fSortCode')], ['Account Number', val('fAccountNum') ? '••••' + val('fAccountNum').slice(-2) : ''],
    ])}</div>` : ''}
    ${(val('fDietary')||val('fAccessibility')) ? `<div class="review-block"><h4>Additional Info</h4>${rows([
      ['Dietary', val('fDietary')], ['Accessibility', val('fAccessibility')],
    ])}</div>` : ''}
  `;
}

async function submitOwner() {
  const btn = document.getElementById('btnNext');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    // Re-fetch company if not loaded at init time (webhook may have been slow)
    if (!coreCompanyId && orderId) {
      const { data: co } = await sb.from('smartcore_core_companies')
        .select('id').eq('order_id', orderId).maybeSingle();
      coreCompanyId = co?.id || null;
    }
    // Fallback: look up by email (payment-complete may have matched by email not order_id)
    if (!coreCompanyId && orderData?.email) {
      const { data: co2 } = await sb.from('smartcore_core_companies')
        .select('id').eq('company_email', orderData.email).maybeSingle();
      coreCompanyId = co2?.id || null;
    }
    if (!coreCompanyId) throw new Error('Your order is still being set up — please wait a moment and try again.');

    const fullName = val('fFullName');
    const parts = fullName.split(' ');
    const firstName = parts[0] || fullName;
    const lastName  = parts.slice(1).join(' ') || '';

    // Generate employee ID
    const prefix = (company || 'SCO').replace(/[^A-Za-z]/g,'').toUpperCase().slice(0,3).padEnd(3,'X');
    const empId  = prefix + String(Math.floor(Math.random() * 1e9)).padStart(9,'0');

    const phone = (val('fCountryCode') || '+44') + ' ' + val('fPhone');

    const payload = {
      company_id:                    coreCompanyId,
      user_id:                       userId,
      employee_id:                   empId,
      first_name:                    firstName,
      last_name:                     lastName,
      email:                         val('fEmail') || null,
      personal_email:                val('fEmail') || null,
      mobile_number:                 phone || null,
      job_title:                     val('fJobTitle') || null,
      start_date:                    val('fStartDate') || null,
      role:                          'owner',
      employment_status:             'active',
      is_active:                     true,
      title:                         val('fTitle') || null,
      preferred_name:                val('fPreferred') || null,
      date_of_birth:                 val('fDob') || null,
      gender:                        val('fGender') || null,
      pronouns:                      val('fPronouns') || null,
      address_line_1:                val('fAddr1') || null,
      address_line_2:                val('fAddr2') || null,
      city:                          val('fCity') || null,
      county:                        val('fCounty') || null,
      postcode:                      val('fPostcode') ? val('fPostcode').toUpperCase() : null,
      country:                       val('fCountry') || null,
      emergency_contact:             val('fEc1Name') ? `${val('fEc1Name')} (${val('fEc1Rel')})` : null,
      emergency_contact_number:      val('fEc1Phone') || null,
      emergency_contact_relationship:val('fEc1Rel') || null,
      emergency_contact_email:       val('fEc1Email') || null,
      emergency_contact_2_name:      val('fEc2Name') || null,
      emergency_contact_2_relationship: val('fEc2Rel') || null,
      emergency_contact_2_phone:     val('fEc2Phone') || null,
      emergency_contact_2_email:     val('fEc2Email') || null,
      national_insurance:            val('fNino') || null,
      tax_code:                      val('fTaxCode') || null,
      student_loan_status:           val('fStudentLoan') || null,
      bank_account_name:             val('fBankName') || null,
      bank_sort_code:                val('fSortCode') || null,
      bank_account_number:           val('fAccountNum') || null,
      dietary_requirements:          val('fDietary') || null,
      accessibility_needs:           val('fAccessibility') || null,
    };

    const { error } = await sb.from('smartcore_core_employees').insert(payload);
    if (error) throw new Error(error.message);
  } catch(e) {
    console.error('Owner profile insert:', e.message);
    showErr('Could not save your profile: ' + e.message);
    btn.disabled = false; btn.textContent = 'Submit →';
    return;
  }

  window.location.href = `/shop/order-confirmed.html?ref=${encodeURIComponent(ref)}&company=${encodeURIComponent(company)}&total=${encodeURIComponent(total)}&billing=${encodeURIComponent(billing)}`;
}

function skipToConfirmed() {
  window.location.href = `/shop/order-confirmed.html?ref=${encodeURIComponent(ref)}&company=${encodeURIComponent(company)}&total=${encodeURIComponent(total)}&billing=${encodeURIComponent(billing)}`;
}

function formatSortCode(input) {
  let v = input.value.replace(/\D/g,'').slice(0,6);
  if (v.length > 4) v = v.slice(0,2) + '-' + v.slice(2,4) + '-' + v.slice(4);
  else if (v.length > 2) v = v.slice(0,2) + '-' + v.slice(2);
  input.value = v;
}

function toast(type, title, msg) {
  const wrap = document.getElementById('toastwrap');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<div class="tDot ${type}"></div><div><b>${title}</b><p>${msg}</p></div>`;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transform='translateY(6px)'; }, 3600);
  setTimeout(() => el.remove(), 4300);
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) return skipToConfirmed();
  userId = session.user.id;

  // Fetch order to prefill name
  if (orderId) {
    const { data } = await sb.from('marketplace_orders')
      .select('contact_name, email, phone, company_name')
      .eq('id', orderId).single();
    if (data) orderData = data;

    // Get smartcore_core_companies company_id via order_id
    const { data: coreCo } = await sb.from('smartcore_core_companies')
      .select('id').eq('order_id', orderId).maybeSingle();
    coreCompanyId = coreCo?.id || null;
  }

  renderStep();
}

init();
</script>
