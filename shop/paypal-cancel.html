<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Cancelled | SmartCore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,.08);
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-wrap img { border-radius: 10px; }
    .logo-wrap span { font-size: 18px; font-weight: 800; color: #0f172a; }
    .icon {
      width: 56px; height: 56px;
      background: #f1f5f9;
      border: 2px solid #e2e8f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 24px;
    }
    h1 { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 10px; }
    p { font-size: 14px; color: #64748b; line-height: 1.7; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 13px 28px;
      border-radius: 10px;
      margin: 4px;
    }
    .btn-ghost {
      background: #f1f5f9;
      color: #475569;
    }
    .divider { height: 1px; background: #e2e8f0; margin: 28px 0; }
    .help { font-size: 13px; color: #94a3b8; }
    .help a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="https://smartcoretechnology.co.uk/SmartCore%20Official%20Logos/SC%20Icon%20-%20Black%20Background.png" alt="SmartCore" width="36" height="36" />
      <span>SmartCore</span>
    </div>

    <div class="icon">✕</div>
    <h1>Payment Cancelled</h1>
    <p>Your order has not been placed and no payment has been taken. You can return to the shop and try again whenever you're ready.</p>

    <a href="/shop" class="btn">Back to Shop</a>
    <a href="javascript:history.back()" class="btn btn-ghost">Go Back</a>

    <div class="divider"></div>
    <p class="help">
      If you experienced an issue during checkout or need assistance,<br>
      contact us at <a href="mailto:support@smartcoretechnology.co.uk">support@smartcoretechnology.co.uk</a>
    </p>
  </div>
</body>
</html>
