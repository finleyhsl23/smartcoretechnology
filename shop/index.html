  <style>
    /* ── Reset & tokens ─────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#000;
      --surface:rgba(255,255,255,.055);
      --surface2:rgba(255,255,255,.09);
      --border:rgba(255,255,255,.09);
      --border2:rgba(255,255,255,.06);
      --text:#f5f5f7;
      --muted:#a1a1a6;
      --muted2:rgba(255,255,255,.32);
      --accent:#5b8fff;
      --accent-soft:rgba(91,143,255,.14);
      --accent-border:rgba(91,143,255,.3);
      --green:#30d158;
      --green-soft:rgba(48,209,88,.14);
      --amber:#ff9f0a;
      --radius:18px;
    }
    html{scroll-behavior:smooth}
    html,body{min-height:100%}
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:
        radial-gradient(ellipse 100% 55% at 50% 0%, rgba(91,143,255,.22) 0%, transparent 55%),
        radial-gradient(ellipse 70% 70% at -5% 55%, rgba(91,143,255,.13) 0%, transparent 60%),
        radial-gradient(ellipse 55% 50% at 105% 85%, rgba(48,209,88,.09) 0%, transparent 55%),
        #080810;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    /* ── Background ─────────────────────────────────────── */
    .bg-glow{
      position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 120% 60% at 60% -20%,rgba(91,143,255,.18),transparent 60%),
        radial-gradient(ellipse 80% 40% at -10% 30%,rgba(91,143,255,.10),transparent 50%),
        radial-gradient(ellipse 50% 80% at 100% 100%,rgba(48,209,88,.07),transparent 55%);
    }

    /* ── Nav ────────────────────────────────────────────── */
    nav{
      position:sticky;top:0;z-index:40;
      height:52px;
      padding:0 28px;
      background:rgba(0,0,0,.78);
      backdrop-filter:saturate(180%) blur(20px);
      -webkit-backdrop-filter:saturate(180%) blur(20px);
      border-bottom:1px solid var(--border2);
      display:flex;align-items:center;
    }
    .nav-inner{
      max-width:1160px;width:100%;margin:0 auto;
      display:flex;align-items:center;justify-content:space-between;gap:16px;
    }
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
    .nav-logo{
      width:30px;height:30px;
      background:#111;border:1px solid rgba(255,255,255,.1);
      border-radius:8px;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }
    .nav-logo img{width:22px;height:22px;object-fit:contain}
    .nav-title{font-size:15px;font-weight:600;letter-spacing:-.02em}
    .nav-sub{font-size:12px;color:var(--muted);letter-spacing:-.01em}
    .nav-actions{display:flex;align-items:center;gap:10px}

    /* Billing toggle */
    .toggle-wrap{
      display:flex;
      background:rgba(255,255,255,.07);
      border:1px solid var(--border2);
      border-radius:10px;overflow:hidden;
    }
    .toggle-wrap button{
      padding:7px 14px;font-size:12px;font-weight:600;
      border:none;background:none;color:var(--muted);cursor:pointer;
      transition:color .15s,background .15s;white-space:nowrap;
      font-family:inherit;letter-spacing:-.01em;
    }
    .toggle-wrap button.active{background:var(--accent-soft);color:var(--accent)}
    .toggle-mobile{display:none}


    /* Basket btn */
    .basket-btn{
      display:none;align-items:center;gap:7px;
      background:var(--accent-soft);border:1px solid var(--accent-border);
      color:var(--accent);border-radius:10px;
      padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
      transition:background .15s;white-space:nowrap;font-family:inherit;
    }
    .basket-btn:hover{background:rgba(91,143,255,.22)}
    .basket-btn.visible{display:inline-flex}
    .back-btn{
      color:var(--muted);font-size:13px;font-weight:500;
      text-decoration:none;letter-spacing:-.01em;
      transition:color .15s;
    }
    .back-btn:hover{color:var(--text)}

    /* ── Hero ────────────────────────────────────────────── */
    .hero{
      max-width:1160px;margin:0 auto;
      padding:72px 28px 48px;
      position:relative;z-index:1;
    }
    .hero-eyebrow{
      display:inline-flex;align-items:center;gap:7px;
      background:rgba(91,143,255,.1);border:1px solid rgba(91,143,255,.2);
      border-radius:999px;padding:5px 13px;
      font-size:12px;font-weight:600;color:var(--accent);
      margin-bottom:24px;letter-spacing:-.01em;
    }
    .hero-dot{width:6px;height:6px;background:var(--accent);border-radius:50%}
    h1{
      font-size:clamp(38px,5.5vw,68px);
      font-weight:800;
      letter-spacing:-.04em;
      line-height:1.04;
      color:var(--text);
    }
    h1 em{font-style:normal;color:var(--muted)}
    .hero-sub{
      margin-top:20px;
      font-size:17px;font-weight:400;
      color:var(--muted);
      max-width:480px;
      line-height:1.6;
      letter-spacing:-.01em;
    }

    /* Search */
    .search-wrap{
      margin-top:36px;
      display:flex;flex-wrap:wrap;gap:12px;align-items:center;
    }
    .search-box{
      position:relative;flex:1;min-width:200px;max-width:400px;
    }
    .search-box svg{
      position:absolute;left:14px;top:50%;transform:translateY(-50%);
      color:var(--muted2);pointer-events:none;
    }
    .search-inp{
      width:100%;background:rgba(255,255,255,.055);
      border:1px solid var(--border);border-radius:12px;
      padding:11px 14px 11px 42px;
      color:var(--text);font-size:14px;font-weight:400;outline:none;
      font-family:inherit;letter-spacing:-.01em;
      transition:border-color .15s,background .15s;
    }
    .search-inp::placeholder{color:var(--muted2)}
    .search-inp:focus{border-color:var(--accent-border);background:rgba(255,255,255,.08)}


    /* Category chips */
    .chips-scroll{
      margin-top:16px;
      overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;
      padding-bottom:2px;
    }
    .chips-scroll::-webkit-scrollbar{display:none}
    .chips{display:flex;gap:8px;min-width:max-content}
    .chip{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 14px;border-radius:999px;
      border:1px solid var(--border2);background:rgba(255,255,255,.045);
      font-size:13px;font-weight:500;cursor:pointer;
      transition:background .15s,border-color .15s,color .15s;
      white-space:nowrap;color:var(--muted);font-family:inherit;letter-spacing:-.01em;
    }
    .chip:hover{background:rgba(255,255,255,.08);border-color:var(--border);color:var(--text)}
    .chip.active{background:var(--accent-soft);border-color:var(--accent-border);color:var(--accent)}

    /* ── Module grid ─────────────────────────────────────── */
    .grid-section{
      max-width:1160px;margin:0 auto;
      padding:0 28px 120px;
      position:relative;z-index:1;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:560px){.grid{grid-template-columns:1fr;gap:14px}}

    /* Card */
    .mod-card{
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:var(--radius);
      cursor:pointer;
      overflow:hidden;
      display:flex;flex-direction:column;
      transition:border-color .25s cubic-bezier(.4,0,.2,1),
                 box-shadow .25s cubic-bezier(.4,0,.2,1),
                 transform .25s cubic-bezier(.4,0,.2,1);
      position:relative;
    }
    .mod-card:hover{
      border-color:rgba(91,143,255,.35);
      box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(91,143,255,.1) inset;
      transform:translateY(-3px);
    }
    .mod-card.selected{
      border-color:rgba(48,209,88,.4);
      background:rgba(48,209,88,.05);
    }
    .mod-card.selected:hover{
      border-color:rgba(48,209,88,.6);
      box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(48,209,88,.1) inset;
    }

    /* Card accent bar */
    .card-accent{height:3px;width:100%;flex-shrink:0}

    /* Card thumbnail */
    .card-thumb{
      width:100%;height:140px;object-fit:cover;
      display:block;border-bottom:1px solid var(--border2);
      background:rgba(255,255,255,.04);
    }
    .card-thumb-placeholder{
      width:100%;height:140px;
      background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border-bottom:1px solid var(--border2);
      display:flex;align-items:center;justify-content:center;
      color:var(--muted2);font-size:32px;
      flex-shrink:0;
    }

    /* Selected tick */
    .card-tick{
      position:absolute;top:12px;right:12px;z-index:2;
      width:24px;height:24px;border-radius:50%;
      background:var(--green);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.4);
      opacity:0;transition:opacity .2s;
    }
    .mod-card.selected .card-tick{opacity:1}

    /* Card body */
    .card-body{padding:20px 20px 16px;flex:1;display:flex;flex-direction:column;gap:10px}
    .card-badges{display:flex;flex-wrap:wrap;gap:5px}
    .badge{
      display:inline-flex;align-items:center;
      padding:2px 8px;border-radius:6px;
      font-size:10px;font-weight:700;letter-spacing:.02em;
      text-transform:uppercase;
    }
    .badge-cat{background:rgba(91,143,255,.12);color:rgba(140,185,255,.9);border:1px solid rgba(91,143,255,.2)}
    .badge-green{background:rgba(48,209,88,.12);color:#4ade80;border:1px solid rgba(48,209,88,.2)}
    .badge-amber{background:rgba(255,159,10,.12);color:#fbbf24;border:1px solid rgba(255,159,10,.2)}
    .badge-purple{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
    .badge-teal{background:rgba(45,212,191,.12);color:#5eead4;border:1px solid rgba(45,212,191,.2)}

    .card-name{
      font-size:17px;font-weight:700;letter-spacing:-.025em;
      line-height:1.2;color:var(--text);
    }
    .card-desc{
      font-size:13px;color:var(--muted);line-height:1.6;
      letter-spacing:-.005em;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .card-features{
      display:flex;flex-direction:column;gap:4px;margin-top:2px;
    }
    .card-feature{
      display:flex;align-items:center;gap:6px;
      font-size:12px;color:var(--muted);letter-spacing:-.005em;
    }
    .card-feature-dot{
      width:5px;height:5px;border-radius:50%;
      background:var(--accent);flex-shrink:0;
    }

    /* Card footer */
    .card-footer{
      padding:14px 20px 18px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      border-top:1px solid var(--border2);
    }
    .card-price{
      font-size:18px;font-weight:700;letter-spacing:-.03em;
    }
    .card-price-was{
      font-size:11px;color:var(--muted);text-decoration:line-through;margin-top:1px;
    }
    .card-add{
      padding:8px 16px;border-radius:10px;
      font-size:13px;font-weight:600;
      border:none;cursor:pointer;
      transition:background .15s,color .15s,transform .1s;
      font-family:inherit;letter-spacing:-.01em;white-space:nowrap;
    }
    .card-add.add{background:var(--accent);color:#fff}
    .card-add.add:hover{background:#4a7ef5}
    .card-add.added{background:var(--green-soft);color:var(--green);border:1px solid rgba(48,209,88,.25)}
    .card-add:active{transform:scale(.96)}

    /* Skeleton */
    .skeleton{
      background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.04) 75%);
      background-size:400% 100%;
      animation:shimmer 1.6s ease-in-out infinite;
      border-radius:var(--radius);border:1px solid var(--border2);
    }
    @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

    /* No results */
    .no-results{
      grid-column:1/-1;text-align:center;padding:80px 0;
      color:var(--muted);
    }
    .no-results-icon{font-size:40px;margin-bottom:12px}
    .no-results h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}

    /* ── Basket bar ──────────────────────────────────────── */
    .basket-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:50;
      background:rgba(0,0,0,.88);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-top:1px solid var(--border);
      transform:translateY(100%);
      transition:transform .35s cubic-bezier(.4,0,.2,1);
    }
    .basket-bar.visible{transform:translateY(0)}
    .basket-bar-inner{
      max-width:1160px;margin:0 auto;
      padding:16px 28px;
      display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
    }
    .bar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .bar-count{font-size:15px;font-weight:600;letter-spacing:-.01em}

    .bar-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .bar-total-label{font-size:11px;color:var(--muted);letter-spacing:.02em;text-transform:uppercase}
    .bar-total{font-size:22px;font-weight:800;letter-spacing:-.03em}
    .bar-cta{
      background:var(--accent);color:#fff;
      border:none;border-radius:12px;padding:11px 22px;
      font-size:14px;font-weight:700;cursor:pointer;
      transition:background .15s,transform .1s;
      font-family:inherit;letter-spacing:-.01em;white-space:nowrap;
    }
    .bar-cta:hover{background:#4a7ef5}
    .bar-cta:active{transform:scale(.98)}

    /* ── Basket modal ────────────────────────────────────── */
    .overlay{
      position:fixed;inset:0;z-index:100;
      background:rgba(0,0,0,.7);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:none;align-items:flex-end;justify-content:center;
      padding:0;
    }
    .overlay.visible{display:flex}
    @media(min-width:600px){.overlay{align-items:center;padding:24px}}
    .basket-sheet{
      width:100%;max-width:520px;max-height:88vh;
      background:#111;border:1px solid var(--border);
      border-radius:20px 20px 0 0;overflow:auto;
    }
    @media(min-width:600px){.basket-sheet{border-radius:20px}}
    .sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:14px auto 0}
    .sheet-header{padding:20px 24px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
    .sheet-title{font-size:17px;font-weight:700;letter-spacing:-.02em}
    .sheet-close{
      width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);
      border:none;color:var(--muted);cursor:pointer;font-size:14px;
      display:flex;align-items:center;justify-content:center;transition:background .15s;
    }
    .sheet-close:hover{background:rgba(255,255,255,.14)}
    .sheet-body{padding:16px 24px 24px}
    .basket-item{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 0;border-bottom:1px solid var(--border2);
    }
    .basket-item:last-child{border-bottom:none}
    .basket-item-name{font-size:14px;font-weight:600;letter-spacing:-.01em}
    .basket-item-cat{font-size:12px;color:var(--muted);margin-top:2px}
    .basket-item-price{font-size:14px;font-weight:700;letter-spacing:-.02em;flex-shrink:0}
    .basket-remove{
      background:rgba(255,255,255,.07);border:1px solid var(--border2);
      color:var(--muted);border-radius:7px;padding:4px 10px;
      font-size:12px;font-weight:500;cursor:pointer;
      transition:background .15s,color .15s;font-family:inherit;margin-left:8px;flex-shrink:0;
    }
    .basket-remove:hover{background:rgba(255,69,58,.12);color:#ff453a;border-color:rgba(255,69,58,.25)}
    .totals-box{
      margin-top:16px;background:rgba(255,255,255,.04);
      border:1px solid var(--border2);border-radius:14px;padding:16px;
    }
    .totals-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:4px 0}
    .totals-row.discount{color:var(--green)}
    .totals-row.grand{font-size:17px;font-weight:800;color:var(--text);padding-top:12px;border-top:1px solid var(--border2);margin-top:4px}
    .checkout-btn{
      width:100%;background:var(--accent);color:#fff;
      border:none;border-radius:13px;padding:15px;
      font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;
      font-family:inherit;letter-spacing:-.01em;
      transition:background .15s,transform .1s;
    }
    .checkout-btn:hover{background:#4a7ef5}
    .checkout-btn:active{transform:scale(.99)}
    .basket-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5}

    /* ── Mini basket sidebar ────────────────────────────── */
    #miniBasket{
      position:fixed;top:72px;right:20px;z-index:300;
      width:300px;
      background:#13151f;
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      box-shadow:0 24px 60px rgba(0,0,0,.7);
      padding:16px;
      transform:translateX(calc(100% + 32px));
      opacity:0;
      transition:transform .3s cubic-bezier(.34,1.2,.64,1), opacity .25s ease;
      pointer-events:none;
    }
    #miniBasket.show{
      transform:translateX(0);
      opacity:1;
      pointer-events:auto;
    }
    .mini-basket-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px}
    .mini-basket-items{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto}
    .mini-basket-item{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:10px 12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:11px;
    }
    .mini-basket-item-name{font-size:13px;font-weight:600;letter-spacing:-.01em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mini-basket-item-price{font-size:13px;font-weight:700;flex-shrink:0;color:var(--accent)}
    .mini-basket-item-remove{
      width:20px;height:20px;border-radius:50%;
      background:rgba(255,255,255,.08);border:none;
      color:var(--muted);cursor:pointer;font-size:11px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:background .15s,color .15s;
      font-family:inherit;padding:0;
    }
    .mini-basket-item-remove:hover{background:rgba(255,69,58,.18);color:#ff453a}
    .mini-basket-footer{margin-top:12px;border-top:1px solid rgba(255,255,255,.08);padding-top:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .mini-basket-total{font-size:15px;font-weight:800;letter-spacing:-.02em}
    .mini-basket-total-label{font-size:11px;color:var(--muted);margin-bottom:2px}
    .mini-basket-cta{
      background:var(--accent);color:#fff;border:none;border-radius:10px;
      padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;
      font-family:inherit;letter-spacing:-.01em;transition:background .15s;white-space:nowrap;
    }
    .mini-basket-cta:hover{background:#4a7ef5}
    .mini-basket-empty{font-size:13px;color:var(--muted);text-align:center;padding:12px 0}
    @media(max-width:600px){#miniBasket{width:calc(100vw - 32px);right:16px;top:64px}}

    /* ── Detail (full-screen) ────────────────────────────── */
    #detail{
      position:fixed;inset:0;z-index:200;
      background:

    .detail-content{max-width:1200px;margin:0 auto;padding:48px 32px 100px}

    .feat-tip-icon:hover + .feat-tip-bubble,
    .feat-tip:hover .feat-tip-bubble{opacity:1}
    @media(max-width:600px){.feat-tip-bubble{left:auto;right:calc(100% + 8px)}}
  </style>
</head>

<script>
const sb = window.supabase.createClient(window.__SUPABASE_URL, window.__SUPABASE_ANON);

// ── State ─────────────────────────────────────────────────
const SESSION_ID = (sessionStorage.sc_sid ||= Math.random().toString(36).slice(2));

// Tier picker state: groupKey → selected module id
const groupSelection = {};

// £2.25/person/month model. Micro has a minimum fee (base price).
// All other tiers: representative_employees × £2.25 / £35_base = multiplier
const SIZE_TIERS = [
  { id: 'micro',      label: 'Micro',      range: '1–10',        multiplier: 1.00  },
  { id: 'small',      label: 'Small',      range: '11–15',       multiplier: 0.71  },
  { id: 'growing',    label: 'Growing',    range: '16–50',       multiplier: 1.43  },
  { id: 'medium',     label: 'Medium',     range: '51–100',      multiplier: 2.86  },
  { id: 'large',      label: 'Large',      range: '101–250',     multiplier: 6.72  },
  { id: 'corporate',  label: 'Corporate',  range: '251–500',     multiplier: 14.44 },
  { id: 'enterprise', label: 'Enterprise', range: '501–999',     multiplier: 28.92 },
  { id: 'global',     label: 'Global',     range: '1,000–1,500', multiplier: 38.57 },
  { id: 'custom',     label: 'Custom',     range: '1,500+',      multiplier: null  },
];
const savedTierId = localStorage.getItem('sc_size_tier');
let shopSizeTier = savedTierId ? (SIZE_TIERS.find(t => t.id === savedTierId) || null) : null;

const state = {
  modules:  [],
  filtered: [],
  basket:   JSON.parse(localStorage.getItem('sc_basket') || '[]'),
  billing:  localStorage.getItem('sc_billing') || 'monthly',
  search:   '',
  category: 'All',
  detailId: null,
};

// ── Helpers ───────────────────────────────────────────────
function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// Render a feature object or string with optional ⓘ tooltip
function featLabel(f) {
  const name = typeof f==='object' ? (f.name||'') : String(f||'');
  const desc = typeof f==='object' ? (f.desc||'') : '';
  if (!desc) return esc(name);
  return `<span class="feat-tip">${esc(name)}<i class="feat-tip-icon">i</i><span class="feat-tip-bubble">${esc(desc)}</span></span>`;
}
function fmt(n)   { return '£' + (+n||0).toFixed(2); }
function fmtMo(n) { return fmt(n) + (state.billing === 'yearly' ? '/yr' : '/mo'); }
function $id(id)  { return document.getElementById(id); }

function modulePrice(m) {
  const monthly = +m.monthly_price;
  const base = state.billing === 'yearly' ? +(monthly * 12).toFixed(2) : monthly;
  // Fixed-price modules (e.g. CRM tiers) don't scale with company size
  if (m.size_pricing === false) return +base.toFixed(2);
  if (!shopSizeTier || shopSizeTier.multiplier === null) return null;
  return +(base * shopSizeTier.multiplier).toFixed(2);
}

function renderSizePills() {
  const container = document.getElementById('sizePills');
  const hint = document.getElementById('sizeHint');
  if (!container) return;
  container.innerHTML = SIZE_TIERS.map(t => {
    const active = shopSizeTier?.id === t.id;
    const isCustom = t.id === 'custom';
    return `<button class="size-pill" data-tier="${t.id}" onclick="selectShopSizeTier('${t.id}')"
      style="border:1px solid ${active ? (isCustom ? '#a78bfa' : '#5b8fff') : 'rgba(255,255,255,.12)'};background:${active ? (isCustom ? 'rgba(167,139,250,.2)' : 'rgba(91,143,255,.2)') : 'rgba(255,255,255,.06)'};color:${active ? (isCustom ? '#a78bfa' : '#5b8fff') : 'rgba(255,255,255,.7)'};border-radius:999px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap">
      ${t.label} <span style="opacity:.65;font-weight:500">${t.range}</span>
    </button>`;
  }).join('');
  if (hint) {
    if (shopSizeTier?.id === 'custom') {
      hint.innerHTML = 'Pricing for 1,500+ employees is tailored to your organisation. <strong style="color:#a78bfa">Browse modules below then request a quote at checkout.</strong>';
    } else {
      hint.textContent = shopSizeTier ? '' : 'Prices shown as "from" — select your company size for exact pricing.';
    }
  }
}

function selectShopSizeTier(id) {
  shopSizeTier = SIZE_TIERS.find(t => t.id === id) || null;
  localStorage.setItem('sc_size_tier', id);
  renderSizePills();
  renderGrid();
  updateBasketBar();
}

const PACKAGE_TIERS = [{min:12,pct:.40},{min:6,pct:.25},{min:3,pct:.10}];
function pkgDiscount(n) { return PACKAGE_TIERS.find(t => n >= t.min) || {pct:0}; }

function calcTotals() {
  const billable = state.basket.filter(m => m.slug !== 'smartcore-core');
  const subtotal  = shopSizeTier?.multiplier === null ? null : +billable.reduce((s,m) => s + modulePrice(m), 0).toFixed(2);
  const tier      = pkgDiscount(billable.length);
  const pkgDis    = +(subtotal * tier.pct).toFixed(2);
  const total     = +(subtotal - pkgDis).toFixed(2);
  return { subtotal, pkgDis, total, tier };
}

function saveBasket() {
  localStorage.setItem('sc_basket', JSON.stringify(state.basket));
}

// ── Category accent colour ────────────────────────────────
const CAT_ACCENT = {
  'HR':                  '#5b8fff',
  'Safety':              '#30d158',
  'Compliance':          '#ff9f0a',
  'Operations':          '#ff9f0a',
  'Fleet':               '#bf5af2',
  'Visitor Management':  '#bf5af2',
  'Training':            '#5ac8fa',
  'Finance':             '#32d74b',
  'Booking Systems':     '#5b8fff',
  'Reporting':           '#5ac8fa',
  'Custom Solutions':    '#ff6b6b',
};
function catColor(cat) { return CAT_ACCENT[cat] || '#5b8fff'; }
function catBadgeClass(cat) {
  const map = { HR:'badge-cat', Safety:'badge-green', Compliance:'badge-amber', Operations:'badge-amber', Fleet:'badge-purple', 'Visitor Management':'badge-purple', Training:'badge-teal', Finance:'badge-green', 'Booking Systems':'badge-cat', Reporting:'badge-teal', 'Custom Solutions':'badge-purple' };
  return map[cat] || 'badge-cat';
}

// ── Group processing ──────────────────────────────────────
// Modules that share a group_key are collapsed into one display item.
function buildDisplayItems(modules) {
  const groupMap = {};
  const singles  = [];

  for (const m of modules) {
    if (m.group_key) {
      (groupMap[m.group_key] = groupMap[m.group_key] || []).push(m);
    } else {
      singles.push(m);
    }
  }

  const groups = Object.entries(groupMap).map(([key, versions]) => {
    versions.sort((a, b) => (a.monthly_price || 0) - (b.monthly_price || 0));
    const rep  = versions[0];
    // Strip tier suffix from name for the group card
    const groupName = rep.name.replace(/\s+(Lite|Professional|Business|Enterprise|Basic|Pro|Standard|Starter)$/i, '').trim();
    return {
      ...rep,
      id:         '_group_' + key,
      name:       groupName,
      _isGroup:   true,
      _groupKey:  key,
      _versions:  versions,
    };
  });

  return [...singles, ...groups];
}

// ── Load data ─────────────────────────────────────────────
async function loadModules() {
  const { data } = await sb.from('marketplace_modules')
    .select('*').eq('status','published').order('sort_order',{ascending:true});
  state.modules = (data || []).filter(m => m.slug !== 'smartcore-core');
  state.displayItems = buildDisplayItems(state.modules);
  applyFilters();
  buildChips();
  updateBasketBar();
  trackEvent(null,'view');
}

function applyFilters() {
  const q    = state.search.toLowerCase();
  const cat  = state.category;
  const items = state.displayItems || [];
  state.filtered = items.filter(m =>
    (cat === 'All' || m.category === cat) &&
    (!q || m.name.toLowerCase().includes(q) || (m.short_description||'').toLowerCase().includes(q))
  );
  renderGrid();
}

function buildChips() {
  const cats = ['All', ...new Set((state.displayItems||[]).map(m => m.category).filter(Boolean))];
  $id('categoryChips').innerHTML = cats.map(c => `
    <button class="chip${c === state.category ? ' active' : ''}" onclick="setCategory('${esc(c)}')">${esc(c)}</button>
  `).join('');
}

function setCategory(cat) {
  state.category = cat;
  buildChips();
  applyFilters();
}

// ── Render grid ───────────────────────────────────────────

  return g._versions.some(v => state.basket.some(b => b.id === v.id));
}

// ── Group detail (tier picker) ────────────────────────────
function openGroupDetail(groupKey) {
  const item = (state.displayItems||[]).find(x => x._isGroup && x._groupKey === groupKey);
  if (!item) return;
  state.detailId = '_group_' + groupKey;

  const versions = item._versions;
  const accent   = catColor(item.category);
  const features = Array.isArray(item.features) ? item.features : [];

  // Which version is currently in basket (if any)?
  const basketedVersion = versions.find(v => state.basket.some(b => b.id === v.id));
  // Default selection: basked version or first
  if (!groupSelection[groupKey]) {
    groupSelection[groupKey] = (basketedVersion || versions[0]).id;
  }

  $id('detailNavTitle').textContent = item.name;
  _renderGroupDetail(item);

  $id('detail').classList.add('visible');
  document.body.style.overflow = 'hidden';
  $id('detail').addEventListener('scroll', onDetailScroll, {passive:true});
}

function _renderGroupDetail(item) {
  const groupKey = item._groupKey;
  const versions = item._versions;
  const accent   = catColor(item.category);
  const features = Array.isArray(item.features) ? item.features : [];
  const selId    = groupSelection[groupKey] || versions[0].id;
  const selVer   = versions.find(v => v.id === selId) || versions[0];
  const inBasket  = state.basket.some(b => b.id === selId);
  const selPrice  = modulePrice(selVer);
  const selPriceFmt = selPrice !== null ? fmtMo(selPrice) : 'Custom';

  $id('detailBody').innerHTML = `<div class="detail-layout">

      <!-- Screenshots (per selected tier) -->
      ${Array.isArray(selVer.screenshots) && selVer.screenshots.length ? `
        <div class="detail-section">
          <div class="detail-section-title">Screenshots</div>
          <div class="screenshot-grid">
            ${selVer.screenshots.map(s=>`<div class="screenshot-thumb" onclick="openLightbox('${esc(s)}')"><img src="${esc(s)}" alt="screenshot" loading="lazy" /></div>`).join('')}
          </div>
        </div>` : ''}

      <!-- Videos (per selected tier) -->
      <div class="detail-section">
        <div class="detail-section-title">Videos</div>
        <div style="display:flex;align-items:center;gap:12px;padding:18px 20px;background:rgba(255,255,255,.04);border:1px dashed var(--border2);border-radius:12px;color:var(--text2);font-size:14px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;opacity:.5"><rect x="2" y="4" width="20" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M10 9l5 3-5 3V9z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg><span>Video not available yet — SmartCore will upload it soon.</span></div>
      </div>

      <!-- Tier comparison table (collapsed by default) -->
      <div class="detail-section">
        <button onclick="toggleCompare('${groupKey}')" id="compareBtn-${groupKey}" style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);width:100%;justify-content:space-between">
          <span>Compare plans</span>
          <svg id="compareChevron-${groupKey}" width="16" height="16" viewBox="0 0 24 24" fill="none" style="transition:transform .2s"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

          <table style="width:100%;border-collapse:collapse;font-size:13px">

                  <th style="padding:10px 12px;border-bottom:1px solid var(--border2);text-align:center;cursor:pointer;color:${v.id===selId?accent:'var(--muted)'};font-weight:700" onclick="selectGroupTier('${groupKey}','${v.id}')">
                    ${esc(v.version_label||v.name)}
                    ${v.id===selId?`<div style="width:6px;height:6px;border-radius:50%;background:${accent};margin:4px auto 0"></div>`:''}
                  </th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${(() => {
                // Sort tiers cheapest first so inheritance flows upward
                const sorted = [...versions].sort((a,b) => (a.monthly_price||a.price||0) - (b.monthly_price||b.price||0));
                const isEverything = name => /^everything in/i.test(name||'');
                // Build cumulative feature maps {name -> desc} per tier
                const cumFeats = [];
                for (const v of sorted) {
                  const prev = cumFeats.length ? new Map(cumFeats[cumFeats.length-1]) : new Map();
                  for (const f of (v.features||[])) {
                    const n = typeof f==='object' ? f.name : f;
                    const d = typeof f==='object' ? (f.desc||'') : '';
                    if (n && !isEverything(n)) prev.set(n, d);
                  }
                  cumFeats.push(prev);
                }
                // Collect all unique features in order they first appear (Lite → Enterprise)
                const allFeats = [];
                const featSeen = new Set();
                for (const m of cumFeats) { for (const [n,d] of m) { if (!featSeen.has(n)) { featSeen.add(n); allFeats.push([n,d]); } } }
                // Render rows
                return allFeats.map(([featName, featDesc]) => {
                  const nameCell = featDesc
                    ? `<span class="feat-tip">${esc(featName)}<i class="feat-tip-icon">i</i><span class="feat-tip-bubble">${esc(featDesc)}</span></span>`

                  return `<tr>
                  <td style="padding:9px 12px;color:var(--muted);border-bottom:1px solid var(--border2)">${nameCell}</td>
                  ${sorted.map((v,i) => {
                    const has = cumFeats[i].has(featName);
                    return `<td style="padding:9px 12px;text-align:center;border-bottom:1px solid var(--border2)">
                      ${has ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#30d158" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` : `<span style="color:var(--muted2)">—</span>`}
                    </td>`;
                  }).join('')}
                </tr>`;
                }).join('');
              })()}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="detail-right">
      <div class="detail-badges">
        <span style="background:${accent}22;color:${accent};border:1px solid ${accent}44;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em">${esc(item.category)}</span>
        <span style="background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.2);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;text-transform:uppercase">${versions.length} plans</span>

      <div class="detail-name">${esc(item.name)}</div>
      ${item.short_description ? `<div class="detail-tagline">${esc(item.short_description)}</div>` : ''}

      ${selVer.long_description ? `
        <div class="detail-section">
          <div class="detail-section-title">Overview</div>
          <div class="detail-desc" style="white-space:pre-wrap">${esc(selVer.long_description)}</div>
        </div>` : ''}

      <!-- Tier selector -->
      <div style="margin-bottom:20px">
        <div class="detail-section-title">Choose your plan</div>
        <div style="display:flex;flex-direction:column;gap:8px" id="tierPills">
          ${versions.map(v => {
            const price = modulePrice(v);
            const isSel = v.id === selId;
            return `<div onclick="selectGroupTier('${groupKey}','${v.id}')" style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:12px;border:2px solid ${isSel?accent:'var(--border2)'};background:${isSel?accent+'18':'rgba(255,255,255,.03)'};cursor:pointer;transition:border-color .15s">
              <div>
                <div style="font-weight:700;font-size:14px;color:${isSel?accent:'var(--text)'}">${esc(v.version_label||v.name)}</div>
                ${v.short_description ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(v.short_description)}</div>` : ''}
              </div>
              <div style="text-align:right;flex-shrink:0;margin-left:12px">
                <div style="font-weight:800;font-size:15px">${price !== null ? fmtMo(price) : 'Custom'}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Pricing card -->
      <div class="pricing-card">
        <div class="pricing-amount">${selPriceFmt}</div>
        <div class="pricing-period">${esc(selVer.version_label||'')} plan · ${state.billing === 'yearly' ? 'billed annually' : 'billed monthly'}</div>
        <button class="pricing-cta ${inBasket?'in-basket':''}" onclick="groupToggleBasket('${groupKey}')" id="detailPricingBtn">
          ${inBasket ? '✓ In basket — Remove' : '+ Add to basket'}
        </button>
        <p class="pricing-note">Cancel anytime · No setup fee · SmartCore Core included free</p>
      </div>
    </div>
  </div>`;
}

function toggleCompare(groupKey) {
  const table = $id(`compareTable-${groupKey}`);
  const chevron = $id(`compareChevron-${groupKey}`);
  if (!table) return;
  const open = table.style.display !== 'none';
  table.style.display = open ? 'none' : 'block';
  if (chevron) chevron.style.transform = open ? '' : 'rotate(180deg)';
}

function selectGroupTier(groupKey, moduleId) {
  groupSelection[groupKey] = moduleId;
  const item = (state.displayItems||[]).find(x => x._isGroup && x._groupKey === groupKey);
  if (item) _renderGroupDetail(item);
}

function groupToggleBasket(groupKey) {
  const item  = (state.displayItems||[]).find(x => x._isGroup && x._groupKey === groupKey);
  if (!item) return;
  const selId = groupSelection[groupKey] || item._versions[0].id;
  const selVer = item._versions.find(v => v.id === selId);
  if (!selVer) return;

  // Check if selected version is already in basket BEFORE removing anything
  const wasInBasket = state.basket.some(b => b.id === selId);

  // Remove any version of this group from basket
  item._versions.forEach(v => {
    const idx = state.basket.findIndex(b => b.id === v.id);
    if (idx >= 0) state.basket.splice(idx, 1);
  });

  // Only re-add if it wasn't in basket (i.e. this is an add, not a remove)
  if (!wasInBasket) {
    state.basket.push(selVer);
    trackEvent(selId, 'add_to_basket');
  }

  saveBasket();
  updateBasketBar();
  renderGrid();
  showMiniBasket();
  // Re-render detail panel
  _renderGroupDetail(item);
  updateDetailNavBtn(state.basket.some(b => b.id === selId));
}

function onDetailScroll() {

function updateDetailNavBtn(inBasket) {

function detailToggleBasket() {
  if (!state.detailId) return;
  if (state.detailId.startsWith('_group_')) {
    groupToggleBasket(state.detailId.replace('_group_', ''));
    return;
  }
  toggleBasket(state.detailId);
  const inBasket = state.basket.some(b => b.id === state.detailId);
  updateDetailNavBtn(inBasket);
  // Update pricing CTA
  const cta = $id('detailPricingBtn');
  if (cta) {
    cta.className = `pricing-cta ${inBasket?'in-basket':''}`;
    cta.textContent = inBasket ? '✓ In basket — Remove' : '+ Add to basket';
  }
}

function closeDetail() {
  $id('detail').classList.remove('visible');
  $id('detail').removeEventListener('scroll', onDetailScroll);
  document.body.style.overflow = '';
  state.detailId = null;
}

function renderVideo(url) {
  // YouTube
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  if (ytMatch) {
    return `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`;
  }
  // Vimeo
  const vmMatch = url.match(/vimeo\.com\/(\d+)/);
  if (vmMatch) {
    return `<div class="video-wrap"><iframe src="https://player.vimeo.com/video/${vmMatch[1]}" allow="autoplay;fullscreen;picture-in-picture" allowfullscreen></iframe></div>`;
  }
  // Native video
  return `<div class="video-wrap"><video src="${esc(url)}" controls></video></div>`;
}

// ── Lightbox ──────────────────────────────────────────────
function openLightbox(src) {
  $id('lightboxImg').src = src;
  $id('lightbox').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  $id('lightbox').classList.remove('visible');
  // Restore overflow only if detail is also closed
  if (!$id('detail').classList.contains('visible')) {
    document.body.style.overflow = '';
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if ($id('lightbox').classList.contains('visible')) { closeLightbox(); return; }
    if ($id('detail').classList.contains('visible'))   { closeDetail();   return; }
    if ($id('basketOverlay').classList.contains('visible')) { closeBasket(); return; }
  }
});

// ── Basket ────────────────────────────────────────────────
function toggleBasket(id) {
  const m   = state.modules.find(x => x.id === id);
  if (!m) return;
  const idx = state.basket.findIndex(b => b.id === id);
  if (idx >= 0) {
    state.basket.splice(idx, 1);
    trackEvent(id, 'remove_from_basket');
  } else {
    state.basket.push(m);
    trackEvent(id, 'add_to_basket');
  }
  saveBasket();
  updateBasketBar();
  renderGrid();
  showMiniBasket();
}

// ── Mini basket ───────────────────────────────────────────
let _miniBasketTimer = null;

function showMiniBasket() {
  renderMiniBasket();
  const el = $id('miniBasket');
  el.classList.add('show');
  clearTimeout(_miniBasketTimer);
  _miniBasketTimer = setTimeout(closeMiniBasket, 4000);
}

function closeMiniBasket() {
  clearTimeout(_miniBasketTimer);
  $id('miniBasket').classList.remove('show');
}

function renderMiniBasket() {
  const billable = state.basket.filter(m => m.slug !== 'smartcore-core');
  const t = calcTotals();
  const items = $id('miniBasketItems');

  if (billable.length === 0) {
    items.innerHTML = '<div class="mini-basket-empty">Your basket is empty</div>';
  } else {
    items.innerHTML = billable.map(m => {
      const price = modulePrice(m);
      return `<div class="mini-basket-item">
        <span class="mini-basket-item-name">${esc(m.name)}</span>
        <span class="mini-basket-item-price">${price === null ? 'Custom' : fmtMo(price)}</span>
        <button class="mini-basket-item-remove" onclick="miniRemove('${m.id}')" title="Remove">✕</button>
      </div>`;
    }).join('');
  }

  $id('miniBasketTotal').textContent = t.total === null ? 'Custom' : fmt(t.total) + (state.billing === 'yearly' ? '/yr' : '/mo');
}

function miniRemove(id) {
  const idx = state.basket.findIndex(b => b.id === id);
  if (idx >= 0) state.basket.splice(idx, 1);
  saveBasket();
  updateBasketBar();
  renderGrid();
  renderMiniBasket();
  if (state.basket.filter(m => m.slug !== 'smartcore-core').length === 0) closeMiniBasket();
}

function updateBasketBar() {
  const billable = state.basket.filter(m => m.slug !== 'smartcore-core');
  const count    = billable.length;
  const t        = calcTotals();

  // Nav button
  const btn = $id('basketBtn');
  if (count > 0) {
    btn.classList.add('visible');
    $id('basketCount').textContent = count;
    $id('basketTotal').textContent = t.total === null ? 'Custom' : fmt(t.total);
  } else {
    btn.classList.remove('visible');
  }

  // Bar
  const bar = $id('basketBar');
  if (count > 0) {
    bar.classList.add('visible');
    $id('barCount').textContent  = `${count} module${count!==1?'s':''} selected`;
    $id('barTotal').textContent  = t.total === null ? 'Custom pricing' : fmt(t.total);
    $id('barPeriod').textContent = t.total === null ? '' : (state.billing === 'yearly' ? '/ year' : '/ month');
  } else {
    bar.classList.remove('visible');
  }
}

function openBasket() {
  renderBasketSheet();
  $id('basketOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeBasket() {
  $id('basketOverlay').classList.remove('visible');
  document.body.style.overflow = '';
}

function renderBasketSheet() {
  const billable = state.basket.filter(m => m.slug !== 'smartcore-core');
  const t        = calcTotals();
  const tier     = pkgDiscount(billable.length);

  let html = '';
  if (state.basket.length === 0) {
    html = '<p style="color:var(--muted);text-align:center;padding:32px 0">Your basket is empty.</p>';
  } else {
    state.basket.forEach(m => {
      const isFree = m.slug === 'smartcore-core';
      const price  = modulePrice(m);
      html += `
        <div class="basket-item">
          <div>
            <div class="basket-item-name">${esc(m.name)}</div>
            <div class="basket-item-cat">${esc(m.category)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <div class="basket-item-price">${isFree?'<span style="color:var(--green)">Free</span>':fmtMo(price)}</div>
            ${!isFree?`<button class="basket-remove" onclick="toggleBasket('${m.id}');renderBasketSheet()">Remove</button>`:''}
          </div>
        </div>`;
    });

    if (billable.length) {
      html += `<div class="totals-box">
        <div class="totals-row"><span>Subtotal (${billable.length} module${billable.length!==1?'s':''})</span><span>${fmtMo(t.subtotal)}</span></div>
        ${t.pkgDis > 0 ? `<div class="totals-row discount"><span>${Math.round(tier.pct*100)}% package discount</span><span>−${fmt(t.pkgDis)}</span></div>` : ''}
        <div class="totals-row grand"><span>Total</span><span>${fmtMo(t.total)}</span></div>
      </div>
      <button class="checkout-btn" onclick="closeBasket();goCheckout()">Continue to Checkout →</button>
      <p class="basket-hint">
        SmartCore Core included free.
        ${tier.pct===0&&billable.length<3?`Add ${3-billable.length} more to unlock a 10% discount.`:''}
      </p>`;
    }
  }
  $id('basketBody').innerHTML = html;
}

function goCheckout() {
  const billable = state.basket.filter(m => m.slug !== 'smartcore-core');
  if (!billable.length) { openBasket(); return; }
  trackEvent(null,'checkout_start');
  window.location.href = '/shop/checkout.html';
}

// ── Billing ───────────────────────────────────────────────
function setBilling(type) {
  state.billing = type;
  localStorage.setItem('sc_billing', type);
  ['Monthly','Yearly'].forEach(t => {
    const a = $id('btn'+t), b = $id('btn'+t+'M');
    const on = t.toLowerCase() === type;
    if (a) a.classList.toggle('active', on);
    if (b) b.classList.toggle('active', on);
  });
  updateBasketBar();
  renderGrid();
}
setBilling(state.billing);

// ── Analytics ─────────────────────────────────────────────
async function trackEvent(moduleId, eventType) {
  try {
    await sb.from('marketplace_analytics').insert({
      module_id:  moduleId || null,
      event_type: eventType,
      session_id: SESSION_ID,
    });
  } catch (_) {}
}

// ── Search ────────────────────────────────────────────────
$id('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  applyFilters();
});

// ── Boot ──────────────────────────────────────────────────
renderSizePills();
loadModules().catch(console.error);
</script>
</body>
</html>
