  <style>
    /* ── Reset & tokens ─────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#000;
      --surface:rgba(255,255,255,.055);
      --surface2:rgba(255,255,255,.09);
      --border:rgba(255,255,255,.09);
      --border2:rgba(255,255,255,.06);
      --text:#f5f5f7;
      --muted:#a1a1a6;
      --muted2:rgba(255,255,255,.32);
      --accent:#5b8fff;
      --accent-soft:rgba(91,143,255,.14);
      --accent-border:rgba(91,143,255,.3);
      --green:#30d158;
      --green-soft:rgba(48,209,88,.14);
      --amber:#ff9f0a;
      --radius:18px;
    }
    html{scroll-behavior:smooth}
    html,body{min-height:100%}
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:#000;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    /* ── Background ─────────────────────────────────────── */
    .bg-glow{
      position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 120% 60% at 60% -20%,rgba(91,143,255,.13),transparent 60%),
        radial-gradient(ellipse 80% 40% at -10% 30%,rgba(100,60,255,.07),transparent 50%);
    }

    /* ── Nav ────────────────────────────────────────────── */
    nav{
      position:sticky;top:0;z-index:40;
      height:52px;
      padding:0 28px;
      background:rgba(0,0,0,.78);
      backdrop-filter:saturate(180%) blur(20px);
      -webkit-backdrop-filter:saturate(180%) blur(20px);
      border-bottom:1px solid var(--border2);
      display:flex;align-items:center;
    }
    .nav-inner{
      max-width:1160px;width:100%;margin:0 auto;
      display:flex;align-items:center;justify-content:space-between;gap:16px;
    }
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
    .nav-logo{
      width:30px;height:30px;
      background:#111;border:1px solid rgba(255,255,255,.1);
      border-radius:8px;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }
    .nav-logo img{width:22px;height:22px;object-fit:contain}
    .nav-title{font-size:15px;font-weight:600;letter-spacing:-.02em}
    .nav-sub{font-size:12px;color:var(--muted);letter-spacing:-.01em}
    .nav-actions{display:flex;align-items:center;gap:10px}

    /* Billing toggle */
    .toggle-wrap{
      display:flex;
      background:rgba(255,255,255,.07);
      border:1px solid var(--border2);
      border-radius:10px;overflow:hidden;
    }
    .toggle-wrap button{
      padding:7px 14px;font-size:12px;font-weight:600;
      border:none;background:none;color:var(--muted);cursor:pointer;
      transition:color .15s,background .15s;white-space:nowrap;
      font-family:inherit;letter-spacing:-.01em;
    }
    .toggle-wrap button.active{background:var(--accent-soft);color:var(--accent)}
    .save-pill{
      display:inline-flex;align-items:center;
      background:var(--green-soft);color:var(--green);
      border-radius:6px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;
    }

    /* Basket btn */
    .basket-btn{
      display:none;align-items:center;gap:7px;
      background:var(--accent-soft);border:1px solid var(--accent-border);
      color:var(--accent);border-radius:10px;
      padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
      transition:background .15s;white-space:nowrap;font-family:inherit;
    }
    .basket-btn:hover{background:rgba(91,143,255,.22)}
    .basket-btn.visible{display:inline-flex}
    .back-btn{
      color:var(--muted);font-size:13px;font-weight:500;
      text-decoration:none;letter-spacing:-.01em;
      transition:color .15s;
    }
    .back-btn:hover{color:var(--text)}

    /* ── Hero ────────────────────────────────────────────── */
    .hero{
      max-width:1160px;margin:0 auto;
      padding:72px 28px 48px;
      position:relative;z-index:1;
    }
    .hero-eyebrow{
      display:inline-flex;align-items:center;gap:7px;
      background:rgba(91,143,255,.1);border:1px solid rgba(91,143,255,.2);
      border-radius:999px;padding:5px 13px;
      font-size:12px;font-weight:600;color:var(--accent);
      margin-bottom:24px;letter-spacing:-.01em;
    }
    .hero-dot{width:6px;height:6px;background:var(--accent);border-radius:50%}
    h1{
      font-size:clamp(38px,5.5vw,68px);
      font-weight:800;
      letter-spacing:-.04em;
      line-height:1.04;
      color:var(--text);
    }
    h1 em{font-style:normal;color:var(--muted)}
    .hero-sub{
      margin-top:20px;
      font-size:17px;font-weight:400;
      color:var(--muted);
      max-width:480px;
      line-height:1.6;
      letter-spacing:-.01em;
    }

    /* Search */
    .search-wrap{
      margin-top:36px;
      display:flex;flex-wrap:wrap;gap:12px;align-items:center;
    }
    .search-box{
      position:relative;flex:1;min-width:200px;max-width:400px;
    }
    .search-box svg{
      position:absolute;left:14px;top:50%;transform:translateY(-50%);
      color:var(--muted2);pointer-events:none;
    }
    .search-inp{
      width:100%;background:rgba(255,255,255,.055);
      border:1px solid var(--border);border-radius:12px;
      padding:11px 14px 11px 42px;
      color:var(--text);font-size:14px;font-weight:400;outline:none;
      font-family:inherit;letter-spacing:-.01em;
      transition:border-color .15s,background .15s;
    }
    .search-inp::placeholder{color:var(--muted2)}
    .search-inp:focus{border-color:var(--accent-border);background:rgba(255,255,255,.08)}
    .toggle-mobile{display:none}

    /* Category chips */
    .chips-scroll{
      margin-top:16px;
      overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;
      padding-bottom:2px;
    }
    .chips-scroll::-webkit-scrollbar{display:none}
    .chips{display:flex;gap:8px;min-width:max-content}
    .chip{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 14px;border-radius:999px;
      border:1px solid var(--border2);background:rgba(255,255,255,.045);
      font-size:13px;font-weight:500;cursor:pointer;
      transition:background .15s,border-color .15s,color .15s;
      white-space:nowrap;color:var(--muted);font-family:inherit;letter-spacing:-.01em;
    }
    .chip:hover{background:rgba(255,255,255,.08);border-color:var(--border);color:var(--text)}
    .chip.active{background:var(--accent-soft);border-color:var(--accent-border);color:var(--accent)}

    /* ── Module grid ─────────────────────────────────────── */
    .grid-section{
      max-width:1160px;margin:0 auto;
      padding:0 28px 120px;
      position:relative;z-index:1;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:560px){.grid{grid-template-columns:1fr;gap:14px}}

    /* Card */
    .mod-card{
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:var(--radius);
      cursor:pointer;
      overflow:hidden;
      display:flex;flex-direction:column;
      transition:border-color .25s cubic-bezier(.4,0,.2,1),
                 box-shadow .25s cubic-bezier(.4,0,.2,1),
                 transform .25s cubic-bezier(.4,0,.2,1);
      position:relative;
    }
    .mod-card:hover{
      border-color:rgba(91,143,255,.35);
      box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(91,143,255,.1) inset;
      transform:translateY(-3px);
    }
    .mod-card.selected{
      border-color:rgba(48,209,88,.4);
      background:rgba(48,209,88,.05);
    }
    .mod-card.selected:hover{
      border-color:rgba(48,209,88,.6);
      box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(48,209,88,.1) inset;
    }

    /* Card accent bar */
    .card-accent{height:3px;width:100%;flex-shrink:0}

    /* Card thumbnail */
    .card-thumb{
      width:100%;height:180px;object-fit:cover;
      display:block;border-bottom:1px solid var(--border2);
      background:rgba(255,255,255,.04);
    }
    .card-thumb-placeholder{
      width:100%;height:180px;
      background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border-bottom:1px solid var(--border2);
      display:flex;align-items:center;justify-content:center;
      color:var(--muted2);font-size:32px;
      flex-shrink:0;
    }

    /* Selected tick */
    .card-tick{
      position:absolute;top:12px;right:12px;z-index:2;
      width:24px;height:24px;border-radius:50%;
      background:var(--green);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.4);
      opacity:0;transition:opacity .2s;
    }
    .mod-card.selected .card-tick{opacity:1}

    /* Card body */
    .card-body{padding:20px 20px 16px;flex:1;display:flex;flex-direction:column;gap:10px}
    .card-badges{display:flex;flex-wrap:wrap;gap:5px}
    .badge{
      display:inline-flex;align-items:center;
      padding:2px 8px;border-radius:6px;
      font-size:10px;font-weight:700;letter-spacing:.02em;
      text-transform:uppercase;
    }
    .badge-cat{background:rgba(91,143,255,.12);color:rgba(140,185,255,.9);border:1px solid rgba(91,143,255,.2)}
    .badge-green{background:rgba(48,209,88,.12);color:#4ade80;border:1px solid rgba(48,209,88,.2)}
    .badge-amber{background:rgba(255,159,10,.12);color:#fbbf24;border:1px solid rgba(255,159,10,.2)}
    .badge-purple{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
    .badge-teal{background:rgba(45,212,191,.12);color:#5eead4;border:1px solid rgba(45,212,191,.2)}

    .card-name{
      font-size:17px;font-weight:700;letter-spacing:-.025em;
      line-height:1.2;color:var(--text);
    }
    .card-desc{
      font-size:13px;color:var(--muted);line-height:1.6;
      letter-spacing:-.005em;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .card-features{
      display:flex;flex-direction:column;gap:4px;margin-top:2px;
    }
    .card-feature{
      display:flex;align-items:center;gap:6px;
      font-size:12px;color:var(--muted);letter-spacing:-.005em;
    }
    .card-feature-dot{
      width:5px;height:5px;border-radius:50%;
      background:var(--accent);flex-shrink:0;
    }

    /* Card footer */
    .card-footer{
      padding:14px 20px 18px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      border-top:1px solid var(--border2);
    }
    .card-price{
      font-size:18px;font-weight:700;letter-spacing:-.03em;
    }
    .card-price-was{
      font-size:11px;color:var(--muted);text-decoration:line-through;margin-top:1px;
    }
    .card-add{
      padding:8px 16px;border-radius:10px;
      font-size:13px;font-weight:600;
      border:none;cursor:pointer;
      transition:background .15s,color .15s,transform .1s;
      font-family:inherit;letter-spacing:-.01em;white-space:nowrap;
    }
    .card-add.add{background:var(--accent);color:#fff}
    .card-add.add:hover{background:#4a7ef5}
    .card-add.added{background:var(--green-soft);color:var(--green);border:1px solid rgba(48,209,88,.25)}
    .card-add:active{transform:scale(.96)}

    /* Skeleton */
    .skeleton{
      background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.04) 75%);
      background-size:400% 100%;
      animation:shimmer 1.6s ease-in-out infinite;
      border-radius:var(--radius);border:1px solid var(--border2);
    }
    @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

    /* No results */
    .no-results{
      grid-column:1/-1;text-align:center;padding:80px 0;
      color:var(--muted);
    }
    .no-results-icon{font-size:40px;margin-bottom:12px}
    .no-results h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}

    /* ── Basket bar ──────────────────────────────────────── */
    .basket-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:50;
      background:rgba(0,0,0,.88);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-top:1px solid var(--border);
      transform:translateY(100%);
      transition:transform .35s cubic-bezier(.4,0,.2,1);
    }
    .basket-bar.visible{transform:translateY(0)}
    .basket-bar-inner{
      max-width:1160px;margin:0 auto;
      padding:16px 28px;
      display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
    }
    .bar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .bar-count{font-size:15px;font-weight:600;letter-spacing:-.01em}
    .bar-save{
      background:var(--green-soft);color:var(--green);
      border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;
    }
    .bar-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .bar-total-label{font-size:11px;color:var(--muted);letter-spacing:.02em;text-transform:uppercase}
    .bar-total{font-size:22px;font-weight:800;letter-spacing:-.03em}
    .bar-cta{
      background:var(--accent);color:#fff;
      border:none;border-radius:12px;padding:11px 22px;
      font-size:14px;font-weight:700;cursor:pointer;
      transition:background .15s,transform .1s;
      font-family:inherit;letter-spacing:-.01em;white-space:nowrap;
    }
    .bar-cta:hover{background:#4a7ef5}
    .bar-cta:active{transform:scale(.98)}

    /* ── Basket modal ────────────────────────────────────── */
    .overlay{
      position:fixed;inset:0;z-index:100;
      background:rgba(0,0,0,.7);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:none;align-items:flex-end;justify-content:center;
      padding:0;
    }
    .overlay.visible{display:flex}
    @media(min-width:600px){.overlay{align-items:center;padding:24px}}
    .basket-sheet{
      width:100%;max-width:520px;max-height:88vh;
      background:#111;border:1px solid var(--border);
      border-radius:20px 20px 0 0;overflow:auto;
    }
    @media(min-width:600px){.basket-sheet{border-radius:20px}}
    .sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:14px auto 0}
    .sheet-header{padding:20px 24px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
    .sheet-title{font-size:17px;font-weight:700;letter-spacing:-.02em}
    .sheet-close{
      width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);
      border:none;color:var(--muted);cursor:pointer;font-size:14px;
      display:flex;align-items:center;justify-content:center;transition:background .15s;
    }
    .sheet-close:hover{background:rgba(255,255,255,.14)}
    .sheet-body{padding:16px 24px 24px}
    .basket-item{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 0;border-bottom:1px solid var(--border2);
    }
    .basket-item:last-child{border-bottom:none}
    .basket-item-name{font-size:14px;font-weight:600;letter-spacing:-.01em}
    .basket-item-cat{font-size:12px;color:var(--muted);margin-top:2px}
    .basket-item-price{font-size:14px;font-weight:700;letter-spacing:-.02em;flex-shrink:0}
    .basket-remove{
      background:rgba(255,255,255,.07);border:1px solid var(--border2);
      color:var(--muted);border-radius:7px;padding:4px 10px;
      font-size:12px;font-weight:500;cursor:pointer;
      transition:background .15s,color .15s;font-family:inherit;margin-left:8px;flex-shrink:0;
    }
    .basket-remove:hover{background:rgba(255,69,58,.12);color:#ff453a;border-color:rgba(255,69,58,.25)}
    .totals-box{
      margin-top:16px;background:rgba(255,255,255,.04);
      border:1px solid var(--border2);border-radius:14px;padding:16px;
    }
    .totals-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:4px 0}
    .totals-row.discount{color:var(--green)}
    .totals-row.grand{font-size:17px;font-weight:800;color:var(--text);padding-top:12px;border-top:1px solid var(--border2);margin-top:4px}
    .checkout-btn{
      width:100%;background:var(--accent);color:#fff;
      border:none;border-radius:13px;padding:15px;
      font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;
      font-family:inherit;letter-spacing:-.01em;
      transition:background .15s,transform .1s;
    }
    .checkout-btn:hover{background:#4a7ef5}
    .checkout-btn:active{transform:scale(.99)}
    .basket-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5}

    /* ── Detail (full-screen) ────────────────────────────── */
    #detail{
      position:fixed;inset:0;z-index:200;
      background:#000;overflow-y:auto;
      display:none;
      -webkit-font-smoothing:antialiased;
    }
    #detail.visible{display:block}
    .detail-nav{
      position:sticky;top:0;z-index:10;
      height:52px;padding:0 24px;
      background:rgba(0,0,0,.82);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border2);
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .detail-nav-left{display:flex;align-items:center;gap:10px}
    .detail-back{
      display:flex;align-items:center;gap:6px;
      background:none;border:none;color:var(--muted);
      font-size:14px;font-weight:500;cursor:pointer;
      font-family:inherit;letter-spacing:-.01em;transition:color .15s;
      padding:6px 0;
    }
    .detail-back:hover{color:var(--text)}
    .detail-nav-title{
      font-size:14px;font-weight:600;letter-spacing:-.02em;
      opacity:0;transition:opacity .2s;color:var(--text);
    }
    .detail-nav-title.visible{opacity:1}
    .detail-add-btn{
      padding:8px 18px;border-radius:10px;
      font-size:13px;font-weight:700;border:none;cursor:pointer;
      font-family:inherit;letter-spacing:-.01em;transition:background .15s,color .15s;
    }
    .detail-add-btn.add{background:var(--accent);color:#fff}
    .detail-add-btn.add:hover{background:#4a7ef5}
    .detail-add-btn.added{background:var(--green-soft);color:var(--green);border:1px solid rgba(48,209,88,.3)}

    .detail-content{max-width:800px;margin:0 auto;padding:48px 24px 100px}

    /* Hero image */
    .detail-hero{
      width:100%;
      border-radius:16px;overflow:hidden;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border2);
      margin-bottom:36px;
      aspect-ratio:16/7;
    }
    .detail-hero img{
      width:100%;height:100%;object-fit:cover;display:block;
      cursor:zoom-in;
    }
    .detail-hero-placeholder{
      width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;
      color:var(--muted2);font-size:40px;
    }

    /* Detail text */
    .detail-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
    .detail-name{
      font-size:clamp(28px,4vw,44px);font-weight:800;
      letter-spacing:-.04em;line-height:1.05;margin-bottom:12px;
    }
    .detail-tagline{
      font-size:17px;color:var(--muted);line-height:1.6;
      letter-spacing:-.01em;max-width:600px;margin-bottom:36px;
    }

    /* Sections */
    .detail-section{margin-bottom:36px}
    .detail-section-title{
      font-size:13px;font-weight:700;letter-spacing:.04em;
      color:var(--muted);text-transform:uppercase;margin-bottom:14px;
    }
    .detail-desc{
      font-size:15px;line-height:1.7;color:var(--muted);letter-spacing:-.01em;
    }

    /* Features */
    .features-grid{
      display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
    }
    @media(max-width:520px){.features-grid{grid-template-columns:1fr}}
    .feature-item{
      display:flex;align-items:flex-start;gap:10px;
      background:rgba(255,255,255,.04);border:1px solid var(--border2);
      border-radius:12px;padding:14px 14px;
    }
    .feature-check{
      width:20px;height:20px;border-radius:50%;
      background:var(--green-soft);border:1px solid rgba(48,209,88,.3);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
    }
    .feature-text{font-size:14px;color:var(--muted);letter-spacing:-.01em;line-height:1.4}

    /* Screenshots */
    .screenshots-scroll{
      display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;
      scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent;
    }
    .screenshots-scroll::-webkit-scrollbar{height:4px}
    .screenshots-scroll::-webkit-scrollbar-track{background:transparent}
    .screenshots-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
    .screenshot-thumb{
      flex-shrink:0;
      width:300px;height:190px;
      border-radius:12px;overflow:hidden;
      border:1px solid var(--border2);cursor:zoom-in;
      transition:transform .2s,box-shadow .2s;
    }
    .screenshot-thumb:hover{transform:scale(1.02);box-shadow:0 12px 40px rgba(0,0,0,.5)}
    .screenshot-thumb img{width:100%;height:100%;object-fit:cover;display:block}

    /* Videos */
    .video-grid{display:flex;flex-direction:column;gap:16px}
    .video-wrap{
      border-radius:14px;overflow:hidden;
      border:1px solid var(--border2);
      background:#000;aspect-ratio:16/9;
    }
    .video-wrap iframe,.video-wrap video{width:100%;height:100%;display:block;border:none}

    /* Pricing card */
    .pricing-card{
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      border-radius:16px;padding:28px;
    }
    .pricing-amount{
      font-size:36px;font-weight:800;letter-spacing:-.04em;margin-bottom:4px;
    }
    .pricing-period{font-size:14px;color:var(--muted);letter-spacing:-.01em}
    .pricing-compare{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;
    }
    .pricing-option{
      background:rgba(255,255,255,.04);border:1px solid var(--border2);
      border-radius:12px;padding:14px;
    }
    .pricing-option-label{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
    .pricing-option-price{font-size:20px;font-weight:800;letter-spacing:-.03em}
    .pricing-option-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .pricing-note{
      margin-top:14px;padding:12px 14px;
      background:var(--accent-soft);border-radius:10px;
      font-size:13px;color:var(--accent);line-height:1.5;
    }
    .pricing-cta{
      width:100%;background:var(--accent);color:#fff;
      border:none;border-radius:13px;padding:16px;
      font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;
      font-family:inherit;letter-spacing:-.01em;
      transition:background .15s,transform .1s;
    }
    .pricing-cta:hover{background:#4a7ef5}
    .pricing-cta:active{transform:scale(.99)}
    .pricing-cta.added{background:var(--green-soft);color:var(--green);border:1px solid rgba(48,209,88,.3)}

    /* ── Lightbox ─────────────────────────────────────────── */
    #lightbox{
      position:fixed;inset:0;z-index:400;
      background:rgba(0,0,0,.96);
      display:none;align-items:center;justify-content:center;
      cursor:zoom-out;
    }
    #lightbox.visible{display:flex}
    #lightbox img{
      max-width:92vw;max-height:92vh;
      border-radius:10px;object-fit:contain;
      box-shadow:0 32px 80px rgba(0,0,0,.8);
      pointer-events:none;
    }
    .lightbox-close{
      position:fixed;top:20px;right:20px;
      width:36px;height:36px;border-radius:50%;
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
      color:#fff;font-size:16px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s;z-index:401;
    }
    .lightbox-close:hover{background:rgba(255,255,255,.22)}

    /* ── Responsive ──────────────────────────────────────── */
    @media(max-width:600px){
      .hero{padding:48px 20px 36px}
      .grid-section{padding:0 20px 120px}
      .basket-bar-inner{padding:14px 20px}
      .detail-content{padding:36px 20px 100px}
      .nav-title-sub,.back-btn{display:none}
      .toggle-mobile{display:flex}
      .toggle-desktop{display:none}
    }
  </style>
</head>
<body>

<div class="bg-glow" aria-hidden="true"></div>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <div class="nav-logo">
        <img src="/SmartCore Official Logos/SC Icon - Black Background.png" alt="SC" onerror="this.style.display='none'" />
      </div>
      <div>
        <div class="nav-title">SmartCore</div>
      </div>
    </a>
    <div class="nav-actions">
      <div class="toggle-wrap toggle-desktop" id="billingToggle">
        <button id="btnMonthly" class="active" onclick="setBilling('monthly')">Monthly</button>
        <button id="btnYearly" onclick="setBilling('yearly')">Annual <span class="save-pill">−8%</span></button>
      </div>
      <button class="basket-btn" id="basketBtn" onclick="openBasket()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="1.8"/><path d="M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="1.8"/></svg>
        <span id="basketCount">0</span> · <span id="basketTotal">£0.00</span>
      </button>
      <a href="/" class="back-btn">← Home</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">
    <span class="hero-dot"></span>
    SmartCore Marketplace
  </div>
  <h1>Build your<br><em>perfect platform.</em></h1>
  <p class="hero-sub">
    Choose the modules your business needs. One platform, one subscription, complete control.
  </p>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input class="search-inp" id="searchInput" placeholder="Search modules…" autocomplete="off" />
    </div>
    <div class="toggle-wrap toggle-mobile">
      <button id="btnMonthlyM" class="active" onclick="setBilling('monthly')">Monthly</button>
      <button id="btnYearlyM" onclick="setBilling('yearly')">Annual <span class="save-pill">−8%</span></button>
    </div>
  </div>

  <div class="chips-scroll" style="margin-top:20px">
    <div class="chips" id="categoryChips"></div>
  </div>
</section>

<!-- GRID -->
<section class="grid-section">
  <div class="grid" id="moduleGrid">
    <div class="skeleton" style="height:320px"></div>
    <div class="skeleton" style="height:320px"></div>
    <div class="skeleton" style="height:320px"></div>
    <div class="skeleton" style="height:320px"></div>
    <div class="skeleton" style="height:320px"></div>
    <div class="skeleton" style="height:320px"></div>
  </div>
</section>

<!-- BASKET BAR -->
<div class="basket-bar" id="basketBar">
  <div class="basket-bar-inner">
    <div class="bar-left">
      <span class="bar-count" id="barCount">0 modules</span>
      <span class="bar-save" id="barSave" style="display:none"></span>
    </div>
    <div class="bar-right">
      <div>
        <div class="bar-total-label">Total <span id="barPeriod">/ month</span></div>
        <div class="bar-total" id="barTotal">£0.00</div>
      </div>
      <button class="bar-cta" onclick="goCheckout()">Review Basket →</button>
    </div>
  </div>
</div>

<!-- BASKET SHEET -->
<div class="overlay" id="basketOverlay" onclick="if(event.target===this)closeBasket()">
  <div class="basket-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">Your Basket</span>
      <button class="sheet-close" onclick="closeBasket()">✕</button>
    </div>
    <div class="sheet-body" id="basketBody"></div>
  </div>
</div>

<!-- DETAIL (full-screen) -->
<div id="detail">
  <nav class="detail-nav">
    <div class="detail-nav-left">
      <button class="detail-back" onclick="closeDetail()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Marketplace
      </button>
      <span class="detail-nav-title" id="detailNavTitle"></span>
    </div>
    <button class="detail-add-btn add" id="detailNavBtn" onclick="detailToggleBasket()">+ Add to basket</button>
  </nav>
  <div class="detail-content" id="detailBody"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="" />
</div>

<script>
const sb = window.supabase.createClient(window.__SUPABASE_URL, window.__SUPABASE_ANON);

// ── State ─────────────────────────────────────────────────
const SESSION_ID = (sessionStorage.sc_sid ||= Math.random().toString(36).slice(2));
const state = {
  modules:  [],
  filtered: [],
  basket:   JSON.parse(localStorage.getItem('sc_basket') || '[]'),
  billing:  localStorage.getItem('sc_billing') || 'monthly',
  search:   '',
  category: 'All',
  detailId: null,
};

// ── Helpers ───────────────────────────────────────────────
function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n)   { return '£' + (+n||0).toFixed(2); }
function fmtMo(n) { return fmt(n) + '/mo'; }
function $id(id)  { return document.getElementById(id); }

function modulePrice(m) {
  return state.billing === 'yearly'
    ? (m.yearly_price || +(m.monthly_price * 0.92).toFixed(2))
    : m.monthly_price;
}

const PACKAGE_TIERS = [{min:12,pct:.40},{min:6,pct:.25},{min:3,pct:.10}];
function pkgDiscount(n) { return PACKAGE_TIERS.find(t => n >= t.min) || {pct:0}; }

function calcTotals() {
  const billable = state.basket.filter(m => m.slug !== 'smartcore-core');
  const subtotal  = billable.reduce((s,m) => s + modulePrice(m), 0);
  const tier      = pkgDiscount(billable.length);
  const pkgDis    = +(subtotal * tier.pct).toFixed(2);
  const afterPkg  = subtotal - pkgDis;
  const annDis    = state.billing === 'yearly' ? +(afterPkg * 0.08).toFixed(2) : 0;
  const total     = +(afterPkg - annDis).toFixed(2);
  return { subtotal, pkgDis, annDis, total, tier };
}

function saveBasket() {
  localStorage.setItem('sc_basket', JSON.stringify(state.basket));
}

// ── Category accent colour ────────────────────────────────
const CAT_ACCENT = {
  'HR':                  '#5b8fff',
  'Safety':              '#30d158',
  'Compliance':          '#ff9f0a',
  'Operations':          '#ff9f0a',
  'Fleet':               '#bf5af2',
  'Visitor Management':  '#bf5af2',
  'Training':            '#5ac8fa',
  'Finance':             '#32d74b',
  'Booking Systems':     '#5b8fff',
  'Reporting':           '#5ac8fa',
  'Custom Solutions':    '#ff6b6b',
};
function catColor(cat) { return CAT_ACCENT[cat] || '#5b8fff'; }
function catBadgeClass(cat) {
  const map = { HR:'badge-cat', Safety:'badge-green', Compliance:'badge-amber', Operations:'badge-amber', Fleet:'badge-purple', 'Visitor Management':'badge-purple', Training:'badge-teal', Finance:'badge-green', 'Booking Systems':'badge-cat', Reporting:'badge-teal', 'Custom Solutions':'badge-purple' };
  return map[cat] || 'badge-cat';
}

// ── Load data ─────────────────────────────────────────────
async function loadModules() {
  const { data } = await sb.from('marketplace_modules')
    .select('*').eq('status','published').order('sort_order',{ascending:true});
  state.modules = (data || []).filter(m => m.slug !== 'smartcore-core');
  applyFilters();
  buildChips();
  updateBasketBar();
  trackEvent(null,'view');
}

function applyFilters() {
  const q   = state.search.toLowerCase();
  const cat = state.category;
  state.filtered = state.modules.filter(m =>
    (cat === 'All' || m.category === cat) &&
    (!q || m.name.toLowerCase().includes(q) || (m.short_description||'').toLowerCase().includes(q))
  );
  renderGrid();
}

function buildChips() {
  const cats = ['All', ...new Set(state.modules.map(m => m.category).filter(Boolean))];
  $id('categoryChips').innerHTML = cats.map(c => `
    <button class="chip${c === state.category ? ' active' : ''}" onclick="setCategory('${esc(c)}')">${esc(c)}</button>
  `).join('');
}

function setCategory(cat) {
  state.category = cat;
  buildChips();
  applyFilters();
}

// ── Render grid ───────────────────────────────────────────
function renderGrid() {
  const grid = $id('moduleGrid');
  if (!state.filtered.length) {
    grid.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">🔍</div>
        <h3>No modules found</h3>
        <p>Try a different search or category.</p>
      </div>`;
    return;
  }

  grid.innerHTML = state.filtered.map(m => {
    const inBasket = state.basket.some(b => b.id === m.id);
    const price    = modulePrice(m);
    const features = Array.isArray(m.features) ? m.features.slice(0,3) : [];
    const accent   = catColor(m.category);

    return `
      <div class="mod-card${inBasket?' selected':''}" id="card-${m.id}" onclick="openDetail('${m.id}')">
        <div class="card-tick">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>

        ${m.thumbnail_url
          ? `<img class="card-thumb" src="${esc(m.thumbnail_url)}" alt="${esc(m.name)}" loading="lazy" />`
          : `<div class="card-thumb-placeholder" style="background:linear-gradient(135deg,${accent}18,${accent}06)">
               <svg width="36" height="36" viewBox="0 0 24 24" fill="none" style="opacity:.3"><rect x="3" y="3" width="18" height="18" rx="3" stroke="${accent}" stroke-width="1.5"/><path d="M9 9h6M9 12h6M9 15h4" stroke="${accent}" stroke-width="1.2" stroke-linecap="round"/></svg>
             </div>`
        }
        <div class="card-accent" style="background:linear-gradient(90deg,${accent},${accent}55)"></div>

        <div class="card-body">
          <div class="card-badges">
            <span class="badge ${catBadgeClass(m.category)}">${esc(m.category)}</span>
            ${m.featured    ? '<span class="badge badge-amber">Featured</span>' : ''}
            ${m.popular     ? '<span class="badge badge-green">Popular</span>'  : ''}
            ${m.recommended ? '<span class="badge badge-teal">Recommended</span>' : ''}
          </div>
          <div class="card-name">${esc(m.name)}</div>
          <div class="card-desc">${esc(m.short_description||'')}</div>
          ${features.length ? `
            <div class="card-features">
              ${features.map(f=>`<div class="card-feature"><div class="card-feature-dot" style="background:${accent}"></div><span>${esc(f)}</span></div>`).join('')}
            </div>
          ` : ''}
        </div>

        <div class="card-footer">
          <div>
            <div class="card-price">${fmtMo(price)}</div>
            ${state.billing==='yearly'&&m.monthly_price!==price
              ? `<div class="card-price-was">${fmtMo(m.monthly_price)}</div>` : ''}
          </div>
          <button class="card-add ${inBasket?'added':'add'}"
            onclick="event.stopPropagation();toggleBasket('${m.id}')">
            ${inBasket ? '✓ Added' : '+ Add'}
          </button>
        </div>
      </div>`;
  }).join('');
}

// ── Detail ────────────────────────────────────────────────
function openDetail(id) {
  const m = state.modules.find(x => x.id === id);
  if (!m) return;
  state.detailId = id;
  trackEvent(id, 'detail_view');

  const inBasket  = state.basket.some(b => b.id === id);
  const price     = modulePrice(m);
  const isFree    = !price;
  const features  = Array.isArray(m.features)    ? m.features    : [];
  const shots     = Array.isArray(m.screenshots) ? m.screenshots : [];
  const videos    = Array.isArray(m.videos)       ? m.videos      : [];
  const accent    = catColor(m.category);

  // Update sticky nav
  $id('detailNavTitle').textContent = m.name;
  updateDetailNavBtn(inBasket);

  $id('detailBody').innerHTML = `
    <!-- Hero image -->
    ${m.thumbnail_url ? `
      <div class="detail-hero">
        <img src="${esc(m.thumbnail_url)}" alt="${esc(m.name)}" onclick="openLightbox('${esc(m.thumbnail_url)}')" />
      </div>` : ''}

    <!-- Badges + title -->
    <div class="detail-badges">
      <span class="badge ${catBadgeClass(m.category)}">${esc(m.category)}</span>
      ${m.featured    ? '<span class="badge badge-amber">Featured</span>' : ''}
      ${m.popular     ? '<span class="badge badge-green">Popular</span>'  : ''}
      ${m.recommended ? '<span class="badge badge-teal">Recommended</span>' : ''}
    </div>
    <h2 class="detail-name">${esc(m.name)}</h2>
    <p class="detail-tagline">${esc(m.short_description||'')}</p>

    <!-- About -->
    ${m.long_description ? `
      <div class="detail-section">
        <div class="detail-section-title">About this module</div>
        <div class="detail-desc">${esc(m.long_description)}</div>
      </div>` : ''}

    <!-- Features -->
    ${features.length ? `
      <div class="detail-section">
        <div class="detail-section-title">What's included</div>
        <div class="features-grid">
          ${features.map(f=>`
            <div class="feature-item">
              <div class="feature-check">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="${accent}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <span class="feature-text">${esc(f)}</span>
            </div>`).join('')}
        </div>
      </div>` : ''}

    <!-- Screenshots -->
    ${shots.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Screenshots</div>
        <div class="screenshots-scroll">
          ${shots.map(src=>`
            <div class="screenshot-thumb" onclick="openLightbox('${esc(src)}')">
              <img src="${esc(src)}" alt="Screenshot" loading="lazy" />
            </div>`).join('')}
        </div>
      </div>` : ''}

    <!-- Videos -->
    ${videos.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Videos</div>
        <div class="video-grid">
          ${videos.map(url => renderVideo(url)).join('')}
        </div>
      </div>` : ''}

    <!-- Pricing -->
    <div class="detail-section">
      <div class="detail-section-title">Pricing</div>
      <div class="pricing-card">
        ${isFree ? `
          <div class="pricing-amount" style="color:var(--green)">Included free</div>
          <p class="pricing-period" style="margin-top:8px">SmartCore Core is automatically included with every order at no extra cost.</p>
        ` : `
          <div class="pricing-amount" id="detailPrice">${fmtMo(price)}</div>
          <div class="pricing-period">${state.billing==='yearly'?'Annual billing (billed monthly)':'Monthly billing'}</div>
          <div class="pricing-compare">
            <div class="pricing-option">
              <div class="pricing-option-label">Monthly</div>
              <div class="pricing-option-price">${fmtMo(m.monthly_price)}</div>
              <div class="pricing-option-sub">Billed monthly</div>
            </div>
            <div class="pricing-option" style="${state.billing==='yearly'?`border-color:${accent}55;background:${accent}0a`:''}">
              <div class="pricing-option-label">Annual <span style="background:var(--green-soft);color:var(--green);padding:1px 5px;border-radius:4px;font-size:9px">Save 8%</span></div>
              <div class="pricing-option-price">${fmtMo(m.yearly_price || +(m.monthly_price*0.92).toFixed(2))}</div>
              <div class="pricing-option-sub">Billed annually</div>
            </div>
          </div>
          <div class="pricing-note">Package discounts: 10% off for 3+ modules, 25% for 6+, 40% for 12+.</div>
        `}
        ${!isFree ? `
          <button class="pricing-cta ${inBasket?'added':''}" id="detailCta" onclick="detailToggleBasket()">
            ${inBasket ? '✓ Remove from basket' : '+ Add to basket'}
          </button>
        ` : ''}
      </div>
    </div>
  `;

  $id('detail').classList.add('visible');
  document.body.style.overflow = 'hidden';

  // Show nav title on scroll
  const nav = $id('detail');
  nav.addEventListener('scroll', onDetailScroll, {passive:true});
}

function onDetailScroll() {
  const titleEl = $id('detailNavTitle');
  const detail  = $id('detail');
  if (titleEl) titleEl.classList.toggle('visible', detail.scrollTop > 160);
}

function updateDetailNavBtn(inBasket) {
  const btn = $id('detailNavBtn');
  if (!btn) return;
  btn.className = `detail-add-btn ${inBasket?'added':'add'}`;
  btn.textContent = inBasket ? '✓ Added' : '+ Add';
}

function detailToggleBasket() {
  if (!state.detailId) return;
  toggleBasket(state.detailId);
  const inBasket = state.basket.some(b => b.id === state.detailId);
  updateDetailNavBtn(inBasket);
  // Update pricing CTA
  const cta = $id('detailCta');
  if (cta) {
    cta.className = `pricing-cta ${inBasket?'added':''}`;
    cta.textContent = inBasket ? '✓ Remove from basket' : '+ Add to basket';
  }
}

function closeDetail() {
  $id('detail').classList.remove('visible');
  $id('detail').removeEventListener('scroll', onDetailScroll);
  document.body.style.overflow = '';
  state.detailId = null;
}

function renderVideo(url) {
  // YouTube
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  if (ytMatch) {
    return `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`;
  }
  // Vimeo
  const vmMatch = url.match(/vimeo\.com\/(\d+)/);
  if (vmMatch) {
    return `<div class="video-wrap"><iframe src="https://player.vimeo.com/video/${vmMatch[1]}" allow="autoplay;fullscreen;picture-in-picture" allowfullscreen></iframe></div>`;
  }
  // Native video
  return `<div class="video-wrap"><video src="${esc(url)}" controls></video></div>`;
}

// ── Lightbox ──────────────────────────────────────────────
function openLightbox(src) {
  $id('lightboxImg').src = src;
  $id('lightbox').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  $id('lightbox').classList.remove('visible');
  // Restore overflow only if detail is also closed
  if (!$id('detail').classList.contains('visible')) {
    document.body.style.overflow = '';
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if ($id('lightbox').classList.contains('visible')) { closeLightbox(); return; }
    if ($id('detail').classList.contains('visible'))   { closeDetail();   return; }
    if ($id('basketOverlay').classList.contains('visible')) { closeBasket(); return; }
  }
});

// ── Basket ────────────────────────────────────────────────
function toggleBasket(id) {
  const m   = state.modules.find(x => x.id === id);
  if (!m) return;
  const idx = state.basket.findIndex(b => b.id === id);
  if (idx >= 0) {
    state.basket.splice(idx, 1);
    trackEvent(id, 'remove_from_basket');
  } else {
    state.basket.push(m);
    trackEvent(id, 'add_to_basket');
  }
  saveBasket();
  updateBasketBar();
  renderGrid();
}

function updateBasketBar() {
  const billable = state.basket.filter(m => m.slug !== 'smartcore-core');
  const count    = billable.length;
  const t        = calcTotals();

  // Nav button
  const btn = $id('basketBtn');
  if (count > 0) {
    btn.classList.add('visible');
    $id('basketCount').textContent = count;
    $id('basketTotal').textContent = fmt(t.total);
  } else {
    btn.classList.remove('visible');
  }

  // Bar
  const bar = $id('basketBar');
  if (count > 0) {
    bar.classList.add('visible');
    $id('barCount').textContent  = `${count} module${count!==1?'s':''} selected`;
    $id('barTotal').textContent  = fmt(t.total);
    $id('barPeriod').textContent = state.billing==='yearly' ? '/ month (annual)' : '/ month';
    const saveEl = $id('barSave');
    const saving = t.pkgDis + t.annDis;
    if (saving > 0) {
      saveEl.textContent     = `Saving ${fmt(saving)}`;
      saveEl.style.display   = 'block';
    } else {
      saveEl.style.display   = 'none';
    }
  } else {
    bar.classList.remove('visible');
  }
}

function openBasket() {
  renderBasketSheet();
  $id('basketOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeBasket() {
  $id('basketOverlay').classList.remove('visible');
  document.body.style.overflow = '';
}

function renderBasketSheet() {
  const billable = state.basket.filter(m => m.slug !== 'smartcore-core');
  const t        = calcTotals();
  const tier     = pkgDiscount(billable.length);

  let html = '';
  if (state.basket.length === 0) {
    html = '<p style="color:var(--muted);text-align:center;padding:32px 0">Your basket is empty.</p>';
  } else {
    state.basket.forEach(m => {
      const isFree = m.slug === 'smartcore-core';
      const price  = modulePrice(m);
      html += `
        <div class="basket-item">
          <div>
            <div class="basket-item-name">${esc(m.name)}</div>
            <div class="basket-item-cat">${esc(m.category)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <div class="basket-item-price">${isFree?'<span style="color:var(--green)">Free</span>':fmtMo(price)}</div>
            ${!isFree?`<button class="basket-remove" onclick="toggleBasket('${m.id}');renderBasketSheet()">Remove</button>`:''}
          </div>
        </div>`;
    });

    if (billable.length) {
      html += `<div class="totals-box">
        <div class="totals-row"><span>Subtotal (${billable.length} module${billable.length!==1?'s':''})</span><span>${fmtMo(t.subtotal)}</span></div>
        ${t.pkgDis > 0 ? `<div class="totals-row discount"><span>${Math.round(tier.pct*100)}% package discount</span><span>−${fmt(t.pkgDis)}</span></div>` : ''}
        ${t.annDis > 0 ? `<div class="totals-row discount"><span>Annual billing (8%)</span><span>−${fmt(t.annDis)}</span></div>` : ''}
        <div class="totals-row grand"><span>Total</span><span>${fmtMo(t.total)}</span></div>
      </div>
      <button class="checkout-btn" onclick="closeBasket();goCheckout()">Continue to Checkout →</button>
      <p class="basket-hint">
        SmartCore Core included free.
        ${tier.pct===0&&billable.length<3?`Add ${3-billable.length} more to unlock a 10% discount.`:''}
      </p>`;
    }
  }
  $id('basketBody').innerHTML = html;
}

function goCheckout() {
  const billable = state.basket.filter(m => m.slug !== 'smartcore-core');
  if (!billable.length) { openBasket(); return; }
  trackEvent(null,'checkout_start');
  window.location.href = '/shop/checkout.html';
}

// ── Billing ───────────────────────────────────────────────
function setBilling(type) {
  state.billing = type;
  localStorage.setItem('sc_billing', type);
  ['Monthly','Yearly'].forEach(t => {
    const a = $id('btn'+t), b = $id('btn'+t+'M');
    const on = t.toLowerCase() === type;
    if (a) a.classList.toggle('active', on);
    if (b) b.classList.toggle('active', on);
  });
  updateBasketBar();
  renderGrid();
}
// Init billing toggle state
setBilling(state.billing);

// ── Analytics ─────────────────────────────────────────────
async function trackEvent(moduleId, eventType) {
  try {
    await sb.from('marketplace_analytics').insert({
      module_id:  moduleId || null,
      event_type: eventType,
      session_id: SESSION_ID,
    });
  } catch (_) {}
}

// ── Search ────────────────────────────────────────────────
$id('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  applyFilters();
});

// ── Boot ──────────────────────────────────────────────────
loadModules().catch(console.error);
</script>
</body>
</html>
