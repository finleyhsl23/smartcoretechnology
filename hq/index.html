<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SmartCore HQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    window.__SUPABASE_URL="https://hjdpcfhozhoyeqevnupm.supabase.co";
    window.__SUPABASE_ANON="PASTE_YOUR_SMARTCORE_SUPABASE_ANON_KEY_HERE";
  </script>
  <style>
    :root{--bg:#020617;--bg2:#06153a;--panel:rgba(255,255,255,.06);--line:rgba(255,255,255,.12);--muted:rgba(234,240,255,.7);--text:#eaf0ff;--blue:#3b82f6;--danger:#ef4444;--green:#22c55e}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui;color:var(--text);background:radial-gradient(900px 700px at 50% 0%,rgba(59,130,246,.16),transparent 60%),linear-gradient(180deg,var(--bg),var(--bg2));min-height:100vh}.glass{background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.045));border:1px solid var(--line);border-radius:22px;box-shadow:0 22px 70px rgba(0,0,0,.45)}.card{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:18px}.btn{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);border-radius:13px;padding:10px 13px;font-weight:700;font-size:13px}.btn:hover{background:rgba(255,255,255,.12)}.primary{background:linear-gradient(180deg,#3b82f6,#2563eb);border-color:rgba(255,255,255,.18)}.danger{background:rgba(239,68,68,.75)}.inp,.select{width:100%;background:rgba(2,6,23,.45);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:var(--text);padding:12px;outline:none}.label{font-size:12px;color:var(--muted);font-weight:700}.muted{color:var(--muted)}.tag{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);border-radius:999px;padding:6px 10px;font-size:12px}.dot{width:8px;height:8px;border-radius:999px;background:var(--green)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:80;display:none;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.modalBox{width:min(100%,980px);max-height:88vh;overflow:auto}.navBtn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:14px;border-radius:16px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);text-align:left}.navBtn.active,.navBtn:hover{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.35)}table{border-collapse:collapse;width:100%}th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left}th{font-size:12px;color:var(--muted)}.dropdown{position:relative}.dropdownMenu{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:40;display:none;background:#0b1226;border:1px solid rgba(255,255,255,.12);border-radius:15px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.45)}.dropdownMenu.show{display:block}.option{padding:12px;cursor:pointer}.option:hover{background:rgba(255,255,255,.08)}
  </style>
</head>
<body>
  <header class="border-b border-white/10 bg-black/15 sticky top-0 z-50 backdrop-blur"><div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4"><div><div class="font-extrabold tracking-wide">SMARTCORE HQ</div><div class="text-sm muted">Internal Management System</div></div><div class="flex items-center gap-2"><span id="who" class="tag"><span class="dot"></span>Loading...</span><button id="signOut" class="btn">Sign out</button></div></div></header>
  <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-[280px_1fr] gap-4">
    <aside class="glass p-4 h-fit sticky top-24"><div class="text-xs uppercase tracking-[.18em] muted px-2 mb-3">Modules</div><div class="space-y-2" id="moduleNav"></div></aside>
    <section id="content" class="min-h-[700px]"></section>
  </main>

  <div id="modal" class="modal"><div class="modalBox glass p-5"><div class="flex justify-between gap-3"><div><h2 id="modalTitle" class="text-2xl font-bold"></h2><p id="modalSub" class="text-sm muted mt-1"></p></div><button onclick="closeModal()" class="btn">Close</button></div><div id="modalBody" class="mt-5"></div></div></div>

<script>
const $=id=>document.getElementById(id);const sb=window.supabase.createClient(window.__SUPABASE_URL,window.__SUPABASE_ANON);let state={user:null,staff:null,companies:[],staffList:[],transactions:[],events:[],module:'dashboard'};
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function money(n){return '£'+Number(n||0).toFixed(2)}function isAdmin(){return state.staff&&(state.staff.is_admin||['admin','owner'].includes(state.staff.role))}function isOwner(){return state.staff?.role==='owner'}function msg(m){alert(m)}
async function api(path,payload){const {data:{session}}=await sb.auth.getSession();const headers={'content-type':'application/json'};if(session?.access_token)headers.authorization='Bearer '+session.access_token;const res=await fetch(path,{method:'POST',headers,body:JSON.stringify(payload||{})});const t=await res.text();let d;try{d=JSON.parse(t)}catch{d={raw:t}}if(!res.ok||d.ok===false)throw new Error(d.error||d.raw||'Request failed');return d}
function openModal(title,sub,html){modalTitle.textContent=title;modalSub.textContent=sub||'';modalBody.innerHTML=html;modal.classList.add('show')}function closeModal(){modal.classList.remove('show');modalBody.innerHTML=''}window.closeModal=closeModal;
async function init(){const {data:{user}}=await sb.auth.getUser();if(!user){location.href='/';return}state.user=user;const {data:staff,error}=await sb.from('smartcore_staff').select('*').eq('user_id',user.id).maybeSingle();if(error||!staff||!staff.active||staff.archived){await sb.auth.signOut();location.href='/';return}state.staff=staff;who.innerHTML=`<span class="dot"></span>${esc(user.email)}`;await loadAll();renderNav();renderDashboard();await audit('login','smartcore_staff',staff.id,{page:'hq'});}async function loadAll(){let [c,s,t,e]=await Promise.all([sb.from('companies').select('*').order('created_at',{ascending:false}),sb.from('smartcore_staff').select('*').order('full_name'),isAdmin()?sb.from('payments_transactions').select('*').order('transaction_date',{ascending:false}):{data:[]},sb.from('calendar_events').select('*').order('event_date',{ascending:true})]);state.companies=c.data||[];state.staffList=s.data||[];state.transactions=t.data||[];state.events=e.data||[]}
async function audit(action,target_table,target_id,metadata){try{await api('/api/audit-log',{action,target_table,target_id,metadata})}catch(e){console.warn(e)}}
const modules=[['dashboard','Dashboard','Overview'],['customers','Customer Portal Manager','Companies'],['finance','Payments & Finance','Admin only'],['vault','Credentials Vault','Admin only'],['calendar','Calendar','Shared'],['staff','Employee Management','Admin only'],['audit','Audit Logs','Owner only']];
function renderNav(){moduleNav.innerHTML=modules.filter(m=>m[0]!=='finance'||isAdmin()).filter(m=>m[0]!=='vault'||isAdmin()).filter(m=>m[0]!=='staff'||isAdmin()).filter(m=>m[0]!=='audit'||isOwner()).map(m=>`<button class="navBtn ${state.module===m[0]?'active':''}" data-mod="${m[0]}"><span><b>${m[1]}</b><br><span class="text-xs muted">${m[2]}</span></span><span>›</span></button>`).join('');document.querySelectorAll('[data-mod]').forEach(b=>b.onclick=()=>{state.module=b.dataset.mod;renderNav();({dashboard:renderDashboard,customers:renderCustomers,finance:renderFinance,vault:renderVault,calendar:renderCalendar,staff:renderStaff,audit:renderAudit}[state.module])()})}
function shell(title,sub,actions='',body=''){content.innerHTML=`<div class="glass p-6"><div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3"><div><div class="text-xs uppercase tracking-[.18em] muted">Module</div><h1 class="text-3xl font-extrabold mt-2">${title}</h1><p class="muted mt-1">${sub}</p></div><div class="flex gap-2 flex-wrap">${actions}</div></div><div class="mt-6">${body}</div></div>`}
function renderDashboard(){shell('SmartCore HQ','Manage customers, packages, payments, credentials, calendar, staff and audit logs.','',`<div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4">${modules.filter(m=>m[0]!=='audit'||isOwner()).filter(m=>!['finance','vault','staff'].includes(m[0])||isAdmin()).map(m=>`<button class="card p-5 text-left hover:bg-white/10" onclick="state.module='${m[0]}';renderNav();({dashboard:renderDashboard,customers:renderCustomers,finance:renderFinance,vault:renderVault,calendar:renderCalendar,staff:renderStaff,audit:renderAudit}['${m[0]}'])()"><div class="text-xl font-bold">${m[1]}</div><div class="text-sm muted mt-2">${m[2]}</div></button>`).join('')}</div>`)}
function companyName(id){return state.companies.find(c=>c.id===id)?.company_name||'Global Expense'}
function renderCustomers(){shell('Customer Portal Manager','Full list of customers. Tap View, Edit or Delete.','<button class="btn primary" onclick="openCompanyForm()">+ Add New Company</button>',`<input id="companySearch" class="inp" placeholder="Search customers..."><div class="mt-4 overflow-auto"><table><thead><tr><th>Company</th><th>Contact</th><th>Email</th><th>Phone</th><th>Packages</th><th>Actions</th></tr></thead><tbody id="companyRows"></tbody></table></div>`);companySearch.oninput=drawCompanies;drawCompanies()}
function drawCompanies(){const q=(companySearch?.value||'').toLowerCase();companyRows.innerHTML=state.companies.filter(c=>!q||JSON.stringify(c).toLowerCase().includes(q)).map(c=>`<tr><td><b>${esc(c.company_name)}</b><br><span class="text-xs muted">${esc(c.website||'')}</span></td><td>${esc(c.primary_contact_name)}</td><td>${esc(c.primary_contact_email||'')}</td><td>${esc(c.primary_contact_phone||'')}</td><td>${(c.packages||[]).length}</td><td><div class="flex gap-2 flex-wrap"><button class="btn" onclick="viewCompany('${c.id}')">View</button><button class="btn" onclick="openCompanyForm('${c.id}')">Edit</button><button class="btn danger" onclick="deleteCompany('${c.id}')">Delete</button></div></td></tr>`).join('')}
function packageEditor(packages=[]){return `<div id="packagesBox" class="space-y-3">${packages.map((p,i)=>packageCard(p,i)).join('')}</div><button class="btn primary mt-3" onclick="addPackageCard()">+ Add Package</button>`}
function packageCard(p={},i=0){const devOpts=state.staffList.map(s=>`<option value="${s.id}" ${(p.developer_ids||[]).includes(s.id)?'selected':''}>${esc(s.full_name)}</option>`).join('');return `<div class="card p-4 packageCard" data-i="${i}"><div class="grid md:grid-cols-2 gap-3"><input class="inp pkgName" placeholder="Package name" value="${esc(p.name||'')}"><select class="inp pkgType"><option ${p.package_type==='website'?'selected':''}>website</option><option ${p.package_type==='system'?'selected':''}>system</option><option ${p.package_type==='other'?'selected':''}>other</option></select><select class="inp pkgLead"><option value="">Lead Developer</option>${state.staffList.map(s=>`<option value="${s.id}" ${p.lead_developer_id===s.id?'selected':''}>${esc(s.full_name)}</option>`).join('')}</select><select class="inp pkgDevs" multiple size="4">${devOpts}</select><textarea class="inp pkgCode md:col-span-2" placeholder="Code notes, files, folders, line refs">${esc(JSON.stringify(p.code||{},null,2))}</textarea><label><input type="checkbox" class="payMonthly" ${(p.payment_choices||[]).includes('monthly')?'checked':''}> Monthly</label><input class="inp feeMonthly" placeholder="£ Monthly fee" value="${p.monthly_fee||''}"><label><input type="checkbox" class="payYearly" ${(p.payment_choices||[]).includes('yearly')?'checked':''}> Yearly</label><input class="inp feeYearly" placeholder="£ Yearly fee" value="${p.yearly_fee||''}"><label><input type="checkbox" class="payOne" ${(p.payment_choices||[]).includes('one_time')?'checked':''}> One time</label><input class="inp feeOne" placeholder="£ One time fee" value="${p.one_time_fee||''}"></div><button class="btn danger mt-3" onclick="this.closest('.packageCard').remove()">Remove package</button></div>`}
window.addPackageCard=()=>packagesBox.insertAdjacentHTML('beforeend',packageCard({},Date.now()));function collectPackages(){return [...document.querySelectorAll('.packageCard')].map(card=>{let choices=[];if(card.querySelector('.payMonthly').checked)choices.push('monthly');if(card.querySelector('.payYearly').checked)choices.push('yearly');if(card.querySelector('.payOne').checked)choices.push('one_time');let code={text:card.querySelector('.pkgCode').value};try{code=JSON.parse(card.querySelector('.pkgCode').value||'{}')}catch{}return{name:card.querySelector('.pkgName').value.trim(),package_type:card.querySelector('.pkgType').value,lead_developer_id:card.querySelector('.pkgLead').value||null,developer_ids:[...card.querySelector('.pkgDevs').selectedOptions].map(o=>o.value).slice(0,50),code,payment_choices:choices,monthly_fee:num(card.querySelector('.feeMonthly').value),yearly_fee:num(card.querySelector('.feeYearly').value),one_time_fee:num(card.querySelector('.feeOne').value)}}).filter(p=>p.name)}function num(v){v=String(v||'').replace(/[^0-9.]/g,'');return v?Number(v):null}
window.openCompanyForm=(id=null)=>{const c=id?state.companies.find(x=>x.id===id):{};openModal(id?'Edit Company':'Add New Company','Customer details and SmartCore packages',`<div class="grid md:grid-cols-2 gap-3"><div><label class="label">Company Name *</label><input id="fCompany" class="inp" value="${esc(c.company_name||'')}"></div><div><label class="label">Approx Staff Count</label><input id="fStaff" class="inp" type="number" value="${esc(c.approx_staff_count||'')}"></div><div><label class="label">Website</label><input id="fWebsite" class="inp" value="${esc(c.website||'')}"></div><div><label class="label">Address</label><input id="fAddress" class="inp" value="${esc(c.address||'')}"></div><div class="md:col-span-2"><label class="label">Working Hours JSON</label><textarea id="fHours" class="inp">${esc(JSON.stringify(c.working_hours||{},null,2))}</textarea></div><div class="md:col-span-2"><label class="label">Notes</label><textarea id="fNotes" class="inp">${esc(c.notes||'')}</textarea></div><div><label class="label">Primary Contact Name *</label><input id="fContact" class="inp" value="${esc(c.primary_contact_name||'')}"></div><div><label class="label">Primary Contact Email</label><input id="fContactEmail" class="inp" value="${esc(c.primary_contact_email||'')}"></div><div><label class="label">Primary Contact Phone</label><input id="fContactPhone" class="inp" value="${esc(c.primary_contact_phone||'')}"></div><div><label class="label">Accounts Team Email</label><input id="fAccounts" class="inp" value="${esc(c.accounts_team_email||'')}"></div><div><label class="label">Support Team Email</label><input id="fSupport" class="inp" value="${esc(c.support_team_email||'')}"></div></div><h3 class="text-xl font-bold mt-6">SmartCore Packages</h3>${packageEditor(c.packages||[])}<button class="btn primary mt-5 w-full" onclick="saveCompany('${id||''}')">Save Company</button>`)};
window.saveCompany=async(id)=>{let hours={};try{hours=JSON.parse(fHours.value||'{}')}catch{return msg('Working hours must be valid JSON for now.')}const payload={company_name:fCompany.value.trim(),approx_staff_count:num(fStaff.value),website:fWebsite.value.trim()||null,address:fAddress.value.trim()||null,working_hours:hours,notes:fNotes.value.trim()||null,primary_contact_name:fContact.value.trim(),primary_contact_email:fContactEmail.value.trim()||null,primary_contact_phone:fContactPhone.value.trim()||null,accounts_team_email:fAccounts.value.trim()||null,support_team_email:fSupport.value.trim()||null,packages:collectPackages()};if(!payload.company_name||!payload.primary_contact_name)return msg('Company name and primary contact name are required.');let res=id?await sb.from('companies').update(payload).eq('id',id):await sb.from('companies').insert(payload);if(res.error)return msg(res.error.message);await audit(id?'update_company':'add_company','companies',id||payload.company_name,{});closeModal();await loadAll();renderCustomers()};window.viewCompany=id=>{const c=state.companies.find(x=>x.id===id);openModal(c.company_name,'Company details',`<pre class="card p-4 whitespace-pre-wrap text-sm">${esc(JSON.stringify(c,null,2))}</pre>`)};window.deleteCompany=async id=>{if(!confirm('Delete this company?'))return;const {error}=await sb.from('companies').delete().eq('id',id);if(error)return msg(error.message);await audit('delete_company','companies',id,{});await loadAll();renderCustomers()}
function renderFinance(){if(!isAdmin())return renderDashboard();shell('Payments & Finance','Track incoming and outgoing transactions.','<button class="btn" onclick="exportCSV()">Export CSV</button><button class="btn primary" onclick="openTransactionForm()">+ Add Transaction</button>',`<div class="grid md:grid-cols-3 gap-3"><select id="yearFilter" class="inp"><option value="all">All time</option>${[...new Set(state.transactions.map(t=>new Date(t.transaction_date).getFullYear()))].sort((a,b)=>b-a).map(y=>`<option>${y}</option>`).join('')}</select><select id="typeFilter" class="inp"><option value="all">All</option><option>incoming</option><option>outgoing</option></select><input id="companyFilter" class="inp" placeholder="Search company / global"></div><div class="mt-5 grid lg:grid-cols-2 gap-4"><div class="card p-4"><h3 class="font-bold text-xl">Summary</h3><div id="financeSummary" class="grid sm:grid-cols-3 gap-3 mt-32"></div></div><div class="card p-4"><div class="flex justify-between"><h3 class="font-bold text-xl">Transactions</h3><span id="txCount" class="muted text-sm"></span></div><div id="txRows" class="mt-4 space-y-3"></div></div></div>`);[yearFilter,typeFilter,companyFilter].forEach(x=>x.oninput=drawFinance);drawFinance()}
function filteredTx(){const y=yearFilter?.value||'all',ty=typeFilter?.value||'all',q=(companyFilter?.value||'').toLowerCase();return state.transactions.filter(t=>(y==='all'||String(new Date(t.transaction_date).getFullYear())===y)&&(ty==='all'||t.type===ty)&&(!q||(companyName(t.company_id).toLowerCase().includes(q)||String(t.company_label||'').toLowerCase().includes(q))))}
function drawFinance(){const rows=filteredTx();let inc=rows.filter(t=>t.type==='incoming').reduce((s,t)=>s+Number(t.amount),0),out=rows.filter(t=>t.type==='outgoing').reduce((s,t)=>s+Number(t.amount),0);financeSummary.innerHTML=`<div class="card p-3"><div class="muted text-sm">Income</div><b>${money(inc)}</b></div><div class="card p-3"><div class="muted text-sm">Expenses</div><b>${money(out)}</b></div><div class="card p-3"><div class="muted text-sm">Profit</div><b>${money(inc-out)}</b></div>`;txCount.textContent=`${rows.length} items`;txRows.innerHTML=rows.map(t=>`<div class="card p-3"><div class="flex justify-between gap-3"><div><span class="tag">${esc(t.type)}</span><div class="mt-2 font-bold">${esc(companyName(t.company_id)||t.company_label||'Global Expense')} • ${esc(t.transaction_date)}</div><div class="muted text-sm">${esc(t.description||'')}</div></div><div class="text-xl font-extrabold">${money(t.amount)}</div></div></div>`).join('')}
window.openTransactionForm=()=>openModal('Add Transaction','Incoming or outgoing payment',`<div class="grid md:grid-cols-2 gap-3"><select id="txType" class="inp"><option>incoming</option><option>outgoing</option></select><select id="txCompany" class="inp"><option value="">Global Expense</option>${state.companies.map(c=>`<option value="${c.id}">${esc(c.company_name)}</option>`).join('')}</select><input id="txAmount" class="inp" placeholder="£ Amount" inputmode="decimal"><input id="txDate" class="inp" type="date"><textarea id="txDesc" class="inp md:col-span-2" placeholder="Description"></textarea></div><button class="btn primary mt-4 w-full" onclick="saveTransaction()">Save Transaction</button>`);window.saveTransaction=async()=>{const payload={type:txType.value,company_id:txCompany.value||null,company_label:txCompany.value?null:'Global Expense',amount:num(txAmount.value),transaction_date:txDate.value,description:txDesc.value.trim()};if(!payload.amount||!payload.transaction_date)return msg('Amount and date are required.');const {error}=await sb.from('payments_transactions').insert(payload);if(error)return msg(error.message);await audit('add_transaction','payments_transactions',payload.description,{});closeModal();await loadAll();renderFinance()};window.exportCSV=()=>{const rows=filteredTx();let csv='Type,Company,Amount,Date,Description\n'+rows.map(t=>[t.type,companyName(t.company_id)||t.company_label,t.amount,t.transaction_date,t.description].map(v=>`"${String(v??'').replaceAll('"','""')}"`).join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='smartcore-finance.csv';a.click()}
function renderVault(){if(!isAdmin())return renderDashboard();shell('Credentials Vault','Admin only. Requires unlock code.','<button class="btn" onclick="lockVault()">Lock Vault</button><button class="btn primary" onclick="openCredentialForm()">+ Add Credentials</button>',`<div id="vaultGate" class="card p-5"><h3 class="text-xl font-bold">Unlock Vault</h3><p class="muted mt-1">Enter the 6 digit vault code.</p><input id="vaultCode" class="inp mt-4" maxlength="6" placeholder="000000"><button class="btn primary mt-3" onclick="unlockVault()">Unlock</button></div><div id="vaultList" class="hidden space-y-3"></div>`)}window.unlockVault=async()=>{try{const out=await api('/api/vault-unlock',{code:vaultCode.value});sessionStorage.vaultSession=out.session_id;await audit('unlock_vault','vault',null,{});await loadVault()}catch(e){msg(e.message)}};async function loadVault(){const out=await api('/api/vault-list',{session_id:sessionStorage.vaultSession});vaultGate.classList.add('hidden');vaultList.classList.remove('hidden');vaultList.innerHTML=out.items.map(v=>`<div class="card p-4"><div class="flex justify-between gap-3"><div><b>${esc(v.name)}</b><div class="text-sm muted">${esc(v.email||'')} ${esc(v.username||'')}</div><div class="mt-2 text-sm">Password: <code>${esc(v.password||'')}</code></div><pre class="mt-2 text-xs whitespace-pre-wrap muted">${esc(JSON.stringify(v.details||{},null,2))}</pre></div></div></div>`).join('')||'<p class="muted">No credentials saved.</p>'}window.lockVault=()=>{delete sessionStorage.vaultSession;renderVault();audit('lock_vault','vault',null,{})};window.openCredentialForm=()=>openModal('Add Credentials','Encrypted server-side before saving',`<div class="grid md:grid-cols-2 gap-3"><input id="crName" class="inp" placeholder="Main name"><input id="crUsername" class="inp" placeholder="Username"><input id="crEmail" class="inp" placeholder="Email"><input id="crPassword" class="inp" placeholder="Password"><textarea id="crDetails" class="inp md:col-span-2" placeholder='Extra details JSON e.g. {"api key":"..."}'></textarea></div><button class="btn primary mt-4 w-full" onclick="saveCredential()">Save Encrypted Credential</button>`);window.saveCredential=async()=>{let details={text:crDetails.value};try{details=JSON.parse(crDetails.value||'{}')}catch{}try{await api('/api/vault-add',{session_id:sessionStorage.vaultSession,name:crName.value,username:crUsername.value,email:crEmail.value,password:crPassword.value,details});closeModal();await loadVault()}catch(e){msg(e.message)}}
function renderCalendar(){shell('Calendar','Company public calendar for SmartCore staff.','<button class="btn primary" onclick="openEventForm()">+ Add Event</button>',`<div class="grid md:grid-cols-7 gap-2" id="calendarGrid"></div><div class="mt-5 space-y-3" id="eventList"></div>`);let today=new Date();let year=today.getFullYear(),month=today.getMonth();let first=new Date(year,month,1),last=new Date(year,month+1,0);let html='';for(let d=1;d<=last.getDate();d++){let date=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, count=state.events.filter(e=>e.event_date===date).length;html+=`<button class="card p-3 min-h-[80px] text-left" onclick="openEventForm('${date}')"><b>${d}</b><div class="text-xs muted">${count} events</div></button>`}calendarGrid.innerHTML=html;eventList.innerHTML=state.events.map(e=>`<div class="card p-4"><b>${esc(e.title)}</b><div class="text-sm muted">${esc(e.event_date)} ${e.all_day?'All day':`${e.start_time||''} - ${e.end_time||''}`}</div><p class="text-sm mt-1">${esc(e.description||'')}</p></div>`).join('')}
window.openEventForm=(date='')=>openModal('Add Calendar Event','Everyone in SmartCore can see this',`<div class="grid md:grid-cols-2 gap-3"><input id="evTitle" class="inp" placeholder="Event title"><input id="evDate" class="inp" type="date" value="${date}"><label><input id="evAll" type="checkbox"> All day</label><input id="evStart" class="inp" type="time"><input id="evEnd" class="inp" type="time"><textarea id="evDesc" class="inp md:col-span-2" placeholder="Description"></textarea></div><button class="btn primary mt-4 w-full" onclick="saveEvent()">Save Event</button>`);window.saveEvent=async()=>{const payload={title:evTitle.value.trim(),event_date:evDate.value,all_day:evAll.checked,start_time:evAll.checked?null:evStart.value||null,end_time:evAll.checked?null:evEnd.value||null,description:evDesc.value.trim()||null,created_by:state.user.id};if(!payload.title||!payload.event_date)return msg('Title and date required.');const {error}=await sb.from('calendar_events').insert(payload);if(error)return msg(error.message);await audit('add_calendar_event','calendar_events',payload.title,{});closeModal();await loadAll();renderCalendar()}
function renderStaff(){if(!isAdmin())return renderDashboard();shell('Employee Management','Manage SmartCore employees and onboarding.','<button class="btn primary" onclick="openStaffForm()">+ Add Employee</button>',`<div class="overflow-auto"><table><thead><tr><th>Name</th><th>Work Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody>${state.staffList.map(s=>`<tr><td><b>${esc(s.full_name)}</b><br><span class="text-xs muted">${esc(s.job_title||'')}</span></td><td>${esc(s.work_email)}</td><td>${esc(s.role)} ${s.is_admin?'• admin':''}</td><td>${s.archived?'archived':s.active?'active':'disabled'}</td><td><div class="flex gap-2 flex-wrap"><button class="btn" onclick="openStaffForm('${s.id}')">Edit</button><button class="btn" onclick="inviteStaff('${s.id}')">Send Invite</button><button class="btn danger" onclick="archiveStaff('${s.id}')">Archive</button></div></td></tr>`).join('')}</tbody></table></div>`)}
window.openStaffForm=(id='')=>{const s=id?state.staffList.find(x=>x.id===id):{};openModal(id?'Edit Staff':'Add SmartCore Employee','Work details and permissions',`<div class="grid md:grid-cols-2 gap-3"><input id="stName" class="inp" placeholder="Full Name" value="${esc(s.full_name||'')}"><input id="stJob" class="inp" placeholder="Job Title" value="${esc(s.job_title||'')}"><input id="stWork" class="inp" placeholder="Work Email" value="${esc(s.work_email||'')}"><input id="stPersonal" class="inp" placeholder="Personal Email" value="${esc(s.personal_email||'')}"><input id="stPhone" class="inp" placeholder="Personal Phone" value="${esc(s.personal_phone||'')}"><select id="stEmployment" class="inp"><option value="full_time">Full Time</option><option value="part_time">Part Time</option><option value="other">Other</option></select><input id="stNotice" class="inp" placeholder="Notice Period" value="${esc(s.notice_period||'')}"><select id="stRole" class="inp"><option>employee</option><option>admin</option>${isOwner()?'<option>owner</option>':''}</select><select id="stAdmin" class="inp"><option value="false">Is Admin: No</option><option value="true">Is Admin: Yes</option></select><input id="stStart" class="inp" type="date" value="${esc(s.start_date||'')}"></div><button class="btn primary mt-4 w-full" onclick="saveStaff('${id}')">Save Employee</button>`);stEmployment.value=s.employment_type||'full_time';stRole.value=s.role||'employee';stAdmin.value=String(!!s.is_admin)};window.saveStaff=async(id)=>{let role=stRole.value;if(role==='owner'&&!isOwner())return msg('Only owners can add owners.');const payload={full_name:stName.value.trim(),job_title:stJob.value.trim(),work_email:stWork.value.trim().toLowerCase(),personal_email:stPersonal.value.trim().toLowerCase()||null,personal_phone:stPhone.value.trim()||null,employment_type:stEmployment.value,notice_period:stNotice.value.trim()||null,role,is_admin:stAdmin.value==='true'||role==='admin'||role==='owner',start_date:stStart.value||null,active:true};if(!payload.full_name||!payload.work_email)return msg('Full name and work email required.');let res=id?await sb.from('smartcore_staff').update(payload).eq('id',id):await sb.from('smartcore_staff').insert(payload);if(res.error)return msg(res.error.message);await audit(id?'update_staff':'add_staff','smartcore_staff',id||payload.work_email,{});closeModal();await loadAll();renderStaff()};window.inviteStaff=async(id)=>{const s=state.staffList.find(x=>x.id===id);const to=confirm('Send to work email? Press Cancel for personal email.')?s.work_email:s.personal_email;if(!to)return msg('No email found.');try{await api('/api/staff-invite',{staff_id:id,email_to:to});msg('Invite sent.');await audit('send_staff_invite','smartcore_staff',id,{to})}catch(e){msg(e.message)}};window.archiveStaff=async(id)=>{if(!confirm('Archive employee and disable login?'))return;const {error}=await sb.from('smartcore_staff').update({archived:true,active:false}).eq('id',id);if(error)return msg(error.message);await audit('archive_staff','smartcore_staff',id,{});await loadAll();renderStaff()}
async function renderAudit(){if(!isOwner())return renderDashboard();shell('Audit Logs','Owner only. Everything important is logged.','',`<div id="auditRows" class="space-y-2">Loading...</div>`);const {data,error}=await sb.from('audit_logs').select('*').order('created_at',{ascending:false}).limit(200);if(error)return auditRows.textContent=error.message;auditRows.innerHTML=(data||[]).map(a=>`<div class="card p-3"><b>${esc(a.action)}</b> <span class="muted text-sm">${esc(a.created_at)} • ${esc(a.actor_email||'')}</span><pre class="text-xs muted mt-2 whitespace-pre-wrap">${esc(JSON.stringify(a.metadata||{},null,2))}</pre></div>`).join('')}
signOut.onclick=async()=>{await audit('logout','smartcore_staff',state.staff?.id,{});await sb.auth.signOut();location.href='/'};init();
</script>
