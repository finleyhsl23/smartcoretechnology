  <style>
    :root {
      --bg0: #020617;
      --bg1: #06153a;
      --panel: rgba(255, 255, 255, 0.065);
      --panel2: rgba(255, 255, 255, 0.045);
      --line: rgba(255, 255, 255, 0.12);
      --line2: rgba(255, 255, 255, 0.08);
      --text: #eaf0ff;
      --muted: rgba(234, 240, 255, 0.72);
      --blue: #3b82f6;
      --red: #ef4444;
      --green: #22c55e;
      --amber: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        radial-gradient(900px 650px at 50% 0%, rgba(59, 130, 246, 0.18), transparent 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      background-size: 42px 42px, 42px 42px, auto, auto;
      overflow-x: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.045));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card {
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 18px;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .btn.primary {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .btn.danger {
      background: rgba(239, 68, 68, 0.78);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .inp {
      width: 100%;
      background: rgba(2, 6, 23, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 15px;
      color: var(--text);
      padding: 12px 13px;
      outline: none;
    }

    .inp::placeholder {
      color: rgba(234, 240, 255, 0.42);
    }

    .inp:focus {
      border-color: rgba(59, 130, 246, 0.42);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    textarea.inp {
      min-height: 110px;
      resize: vertical;
    }

    .label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .muted {
      color: var(--muted);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(255, 255, 255, 0.07);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 800;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
    }

    .module-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.09);
      text-align: left;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .module-button:hover,
    .module-button.active {
      background: rgba(59, 130, 246, 0.18);
      border-color: rgba(59, 130, 246, 0.36);
      transform: translateY(-1px);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.66);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-box {
      width: min(100%, 1060px);
      max-height: 88vh;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .code-box {
      background: rgba(2, 6, 23, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      overflow: hidden;
    }

    .code-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(255, 255, 255, 0.04);
    }

    .code-textarea {
      width: 100%;
      min-height: 280px;
      border: 0;
      outline: 0;
      color: #dbeafe;
      background: transparent;
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
    }

    .calendar-day {
      min-height: 115px;
      text-align: left;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.045);
      cursor: pointer;
    }

    .calendar-day:hover {
      background: rgba(59, 130, 246, 0.14);
      border-color: rgba(59, 130, 246, 0.25);
    }

    @media (max-width: 640px) {
      .calendar-day {
        min-height: 78px;
        padding: 9px;
        border-radius: 14px;
      }
    }

    .calendar-day.outside {
      opacity: 0.42;
    }

    .fatal {
      padding: 28px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.045));
    }
  </style>

<body>
  <header class="sticky top-0 z-50 border-b border-white/10 bg-black/20 backdrop-blur-xl">
    <div class="max-w-[1500px] mx-auto px-5 py-4 flex items-center justify-between gap-4">

        <div class="min-w-0">

      <div class="flex items-center gap-2">

  <main class="max-w-[1500px] mx-auto p-5 grid grid-cols-1 xl:grid-cols-[320px_1fr] gap-5">

      <div class="text-xs uppercase tracking-[0.2em] muted px-3 mb-3">Modules</div>

    <section id="content" class="min-h-[760px]"></section>
  </main>

  <div id="modal" class="modal-backdrop">
    <div class="modal-box glass p-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 id="modalTitle" class="text-2xl sm:text-3xl font-extrabold tracking-tight"></h2>
          <p id="modalSub" class="mt-1 text-sm muted"></p>
        </div>
        <button id="modalClose" class="btn">Close</button>
      </div>
      <div id="modalBody" class="mt-6"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const sb = window.supabase.createClient(
      window.__SUPABASE_URL,
      window.__SUPABASE_ANON
    );

    const state = {
      user: null,
      staff: null,
      companies: [],
      staffList: [],
      transactions: [],
      invoices: [],
      events: [],
      auditRows: [],
      module: "dashboard",
      calendarCursor: new Date(),
      vaultUnlocked: false,
      vaultTimer: null,
      vaultItems: []
    };

    const modules = [
      ["dashboard", "Dashboard", "Your profile and overview"],
      ["customers", "Customer Portal Manager", "Companies and packages"],
      ["finance", "Payments & Finance", "Admin only"],
      ["vault", "Credentials Vault", "Admin only"],
      ["calendar", "Calendar", "Shared calendar"],
      ["staff", "Employee Management", "Admin only"],
      ["audit", "Audit Logs", "Owner only"]
    ];

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function money(value) {
      return "£" + Number(value || 0).toFixed(2);
    }

    function num(value) {
      const clean = String(value || "").replace(/[^0-9.]/g, "");
      return clean ? Number(clean) : null;
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function dateToLocalIso(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }

    function todayIso() {
      return dateToLocalIso(new Date());
    }

    function parseDateOnly(value) {
      if (!value) return null;
      if (value instanceof Date) return value;

      const str = String(value);
      const match = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (match) {
        return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
      }

      const d = new Date(str);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatDate(value) {
      if (!value) return "";
      const d = parseDateOnly(value);
      if (!d) return String(value);
      return `${pad2(d.getDate())}/${pad2(d.getMonth() + 1)}/${d.getFullYear()}`;
    }

    function formatDateTime(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);

      const date = `${pad2(d.getDate())}/${pad2(d.getMonth() + 1)}/${d.getFullYear()}`;
      const time = d.toLocaleTimeString("en-GB", {
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      }).replace(" ", "").toLowerCase();

      return `${date} at ${time} BST`;
    }

    function addWorkingDays(date, days) {
      const d = new Date(date);
      let added = 0;

      while (added < days) {
        d.setDate(d.getDate() + 1);
        const day = d.getDay();
        if (day !== 0 && day !== 6) added++;
      }

      return d;
    }

    function employmentLabel(value) {
      const v = String(value || "").toLowerCase();
      if (v === "full_time" || v === "full time") return "Full Time";
      if (v === "part_time" || v === "part time") return "Part Time";
      if (v === "other") return "Other";
      return value || "Not set";
    }

    function monthAddIso(startIso, offset) {
      const d = parseDateOnly(startIso);
      if (!d) return null;
      const day = d.getDate();
      const next = new Date(d.getFullYear(), d.getMonth() + offset, 1);
      const maxDay = new Date(next.getFullYear(), next.getMonth() + 1, 0).getDate();
      next.setDate(Math.min(day, maxDay));
      return dateToLocalIso(next);
    }

    function yearAddIso(startIso, offset) {
      const d = parseDateOnly(startIso);
      if (!d) return null;
      const next = new Date(d.getFullYear() + offset, d.getMonth(), d.getDate());
      return dateToLocalIso(next);
    }

    function isAdmin() {
      return !!state.staff && (
        state.staff.is_admin === true ||
        ["admin", "owner"].includes(String(state.staff.role || "").toLowerCase())
      );
    }

    function isOwner() {
      return String(state.staff?.role || "").toLowerCase() === "owner";
    }

    function showFatal(title, message) {
      $("content").innerHTML = `
        <div class="fatal">
          <h1 class="text-3xl font-extrabold">${esc(title)}</h1>
          <p class="mt-2 text-lg muted">${esc(message)}</p>
          <div class="mt-6 flex gap-3 flex-wrap">
            <button class="btn primary" onclick="location.reload()">Retry</button>
            <button class="btn" onclick="location.href='/'">Back to website</button>
          </div>
        </div>
      `;
    }

    function openModal(title, subtitle, bodyHtml) {
      $("modalTitle").textContent = title;
      $("modalSub").textContent = subtitle || "";
      $("modalBody").innerHTML = bodyHtml || "";
      $("modal").classList.add("show");
    }

    function closeModal() {
      $("modal").classList.remove("show");
      $("modalBody").innerHTML = "";
    }

    window.closeModal = closeModal;

    async function api(path, payload) {
      const { data: { session } } = await sb.auth.getSession();
      const headers = { "content-type": "application/json" };

      if (session?.access_token) {
        headers.authorization = "Bearer " + session.access_token;
      }

      const res = await fetch(path, {
        method: "POST",
        headers,
        body: JSON.stringify(payload || {})
      });

      const text = await res.text();
      let data = null;

      try {
        data = JSON.parse(text);
      } catch (_) {
        data = { raw: text };
      }

      if (!res.ok || data.ok === false) {
        throw new Error(data.error || data.message || data.raw || "Request failed");
      }

      return data;
    }

    async function audit(action, targetTable, targetId, metadata) {
      try {
        await api("/api/audit-log", {
          action,
          target_table: targetTable,
          target_id: targetId,
          metadata: metadata || {}
        });
      } catch (error) {
        console.warn("Audit failed", error);
      }
    }

    async function init() {
      $("moduleNav").innerHTML = "";
      $("content").innerHTML = `
        <div class="glass p-8">
          <div class="tag"><span class="dot"></span>Loading SmartCore HQ...</div>
        </div>
      `;

      const { data: { session } } = await sb.auth.getSession();

      if (!session?.user) {
        showFatal("Not signed in", "Please sign in from the main SmartCore website first.");
        return;
      }

      state.user = session.user;

      const { data: staffData, error: staffError } = await sb.rpc("get_my_smartcore_staff");
      const staff = Array.isArray(staffData) ? staffData[0] : staffData;

      if (staffError) {
        showFatal("Staff check failed", staffError.message);
        return;
      }

      if (!staff) {
        showFatal("Staff check failed", "No SmartCore staff record found for this login.");
        return;
      }

      if (staff.active === false || staff.archived === true) {
        await sb.auth.signOut();
        showFatal("Account disabled", "Your SmartCore staff account is not active.");
        return;
      }

      state.staff = staff;

      $("who").innerHTML = `<span class="dot"></span>${esc(staff.full_name || session.user.email)}`;

      await loadAll();
      renderNav();
      renderDashboard();
      await audit("login", "smartcore_staff", staff.id, { page: "hq" });
    }

    async function loadAll() {
      const requests = [
        sb.from("companies").select("*").order("created_at", { ascending: false }),
        sb.from("smartcore_staff").select("*").order("full_name", { ascending: true }),
        sb.from("calendar_events").select("*").order("event_date", { ascending: true })
      ];

      if (isAdmin()) {
        requests.push(
          sb.from("payments_transactions").select("*").order("transaction_date", { ascending: false }),
          sb.from("smartcore_invoices").select("*").order("created_at", { ascending: false })
        );
      }

      const results = await Promise.allSettled(requests);

      state.companies = results[0].status === "fulfilled" ? (results[0].value.data || []) : [];
      state.staffList = results[1].status === "fulfilled" ? (results[1].value.data || []) : [];
      state.events = results[2].status === "fulfilled" ? (results[2].value.data || []) : [];
      state.transactions = isAdmin() && results[3]?.status === "fulfilled" ? (results[3].value.data || []) : [];
      state.invoices = isAdmin() && results[4]?.status === "fulfilled" ? (results[4].value.data || []) : [];
    }

    function allowedModules() {
      return modules.filter((module) => {
        if (["finance", "vault", "staff"].includes(module[0]) && !isAdmin()) return false;
        if (module[0] === "audit" && !isOwner()) return false;
        return true;
      });
    }

    function renderNav() {
      $("moduleNav").innerHTML = allowedModules().map((module) => `
        <button class="module-button ${state.module === module[0] ? "active" : ""}" data-module="${module[0]}">
          <span>
            <span class="block font-extrabold">${esc(module[1])}</span>
            <span class="block mt-1 text-xs muted">${esc(module[2])}</span>
          </span>
          <span class="muted">›</span>
        </button>
      `).join("");

      document.querySelectorAll("[data-module]").forEach((button) => {
        button.addEventListener("click", () => {
          state.module = button.dataset.module;
          renderNav();
          renderCurrentModule();
        });
      });
    }

    function renderCurrentModule() {
      const renderers = {
        dashboard: renderDashboard,
        customers: renderCustomers,
        finance: renderFinance,
        vault: renderVault,
        calendar: renderCalendar,
        staff: renderStaff,
        audit: renderAudit
      };

      (renderers[state.module] || renderDashboard)();
    }

    function shell(title, subtitle, actionsHtml, bodyHtml) {
      $("content").innerHTML = `
        <div class="glass p-6 sm:p-8">
          <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-5">
            <div>
              <div class="text-xs uppercase tracking-[0.2em] muted">Module</div>
              <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight mt-2">${esc(title)}</h1>
              <p class="mt-2 text-base muted">${esc(subtitle)}</p>
            </div>
            <div class="flex gap-2 flex-wrap">
              ${actionsHtml || ""}
            </div>
          </div>
          <div class="mt-7">
            ${bodyHtml || ""}
          </div>
        </div>
      `;
    }

    function renderDashboard() {
      const staff = state.staff || {};
      const joined = staff.created_at ? formatDate(staff.created_at) : "Not set";
      const expenses = state.transactions
        .filter((tx) => tx.type === "outgoing")
        .reduce((sum, tx) => sum + Number(tx.amount || 0), 0);
      const income = state.transactions
        .filter((tx) => tx.type === "incoming")
        .reduce((sum, tx) => sum + Number(tx.amount || 0), 0);
      const profit = income - expenses;

      shell(
        "SmartCore HQ",
        "Your profile, quick stats and management overview.",
        `<button class="btn primary" onclick="openMyProfile()">Edit My Profile</button>`,
        `
          <div class="grid grid-cols-1 xl:grid-cols-[1.2fr_0.8fr] gap-5">
            <div class="card p-7">
              <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
                <div>
                  <div class="tag"><span class="dot"></span>${esc(staff.role || "employee")}</div>
                  <h2 class="mt-5 text-4xl font-extrabold tracking-tight">${esc(staff.full_name || state.user.email)}</h2>
                  <p class="mt-2 text-lg muted">${esc(staff.job_title || "Job title not set")}</p>
                </div>
                <div class="text-sm muted sm:text-right">
                  <div>Started: <b class="text-white">${esc(formatDate(staff.start_date) || "Not set")}</b></div>
                  <div class="mt-1">Joined HQ: <b class="text-white">${esc(joined)}</b></div>
                </div>
              </div>

              <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-3">
                <div class="card p-4">
                  <div class="text-sm muted">Job Title</div>
                  <div class="mt-1 font-bold">${esc(staff.job_title || "Not set")}</div>
                </div>
                <div class="card p-4">
                  <div class="text-sm muted">Employment Type</div>
                  <div class="mt-1 font-bold">${esc(employmentLabel(staff.employment_type))}</div>
                </div>
                <div class="card p-4">
                  <div class="text-sm muted">Personal Email</div>
                  <div class="mt-1 font-bold">${esc(staff.personal_email || "Not set")}</div>
                </div>
                <div class="card p-4">
                  <div class="text-sm muted">Personal Phone</div>
                  <div class="mt-1 font-bold">${esc(staff.personal_phone || "Not set")}</div>
                </div>
              </div>
            </div>

    window.saveCompany = async function saveCompany(id) {
      const payload = {
        company_name: $("fCompany").value.trim(),
        approx_staff_count: num($("fStaff").value),
        website: $("fWebsite").value.trim() || null,
        address: $("fAddress").value.trim() || null,
        working_hours: collectWorkingHours(),
        notes: $("fNotes").value.trim() || null,
        primary_contact_name: $("fContact").value.trim(),
        primary_contact_email: $("fContactEmail").value.trim() || null,
        primary_contact_phone: $("fContactPhone").value.trim() || null,
        accounts_team_email: $("fAccounts").value.trim() || null,
        support_team_email: $("fSupport").value.trim() || null,
        packages: collectPackages()
      };

      if (!payload.company_name || !payload.primary_contact_name) {
        alert("Company name and primary contact name are required.");
        return;
      }

      const result = id
        ? await sb.from("companies").update(payload).eq("id", id).select("id").maybeSingle()
        : await sb.from("companies").insert(payload).select("id").single();

      if (result.error) {
        alert(result.error.message);
        return;
      }

      const savedCompanyId = id || result.data?.id;
      if (savedCompanyId) {
        await syncPackagePaymentEvents(savedCompanyId, payload.company_name, payload.packages);
      }

      await audit(id ? "update_company" : "add_company", "companies", savedCompanyId || payload.company_name, {});
      closeModal();
      await loadAll();
      renderCustomers();
    };

    async function syncPackagePaymentEvents(companyId, companyNameValue, packages) {
      if (!Array.isArray(packages) || !packages.length) return;

      const inserts = [];
      const makePayload = (pkg, date, label, amount) => ({
        title: `${companyNameValue} - ${pkg.name} ${label}`,
        event_date: date,
        all_day: true,
        start_time: null,
        end_time: null,
        description: `Payment reminder for ${pkg.name}. Amount: ${money(amount)}.`,
        created_by: state.user.id,
        company_id: companyId
      });

      packages.forEach((pkg) => {
        if (pkg.one_time_payment_date && pkg.one_time_fee) {
          inserts.push(makePayload(pkg, pkg.one_time_payment_date, "one time payment", pkg.one_time_fee));
        }

        if (pkg.monthly_first_payment_date && pkg.monthly_fee) {
          for (let i = 0; i < 24; i++) {
            const date = monthAddIso(pkg.monthly_first_payment_date, i);
            if (date) inserts.push(makePayload(pkg, date, "monthly payment", pkg.monthly_fee));
          }
        }

        if (pkg.yearly_first_payment_date && pkg.yearly_fee) {
          for (let i = 0; i < 5; i++) {
            const date = yearAddIso(pkg.yearly_first_payment_date, i);
            if (date) inserts.push(makePayload(pkg, date, "yearly payment", pkg.yearly_fee));
          }
        }
      });

      if (inserts.length) {
        await sb.from("calendar_events").insert(inserts);
      }
    }

    function filteredTransactions() {
      const year = $("yearFilter")?.value || "all";
      const type = $("typeFilter")?.value || "all";
      const q = ($("companyFilter")?.value || "").toLowerCase();

      return state.transactions.filter((tx) => {
        const txDate = parseDateOnly(tx.transaction_date);
        const txYear = txDate ? String(txDate.getFullYear()) : "";
        const name = (companyName(tx.company_id) || tx.company_label || "Global Expense").toLowerCase();

        return (year === "all" || txYear === year)
          && (type === "all" || tx.type === type)
          && (!q || name.includes(q));
      });
    }

    function drawFinance() {
      const rows = filteredTransactions();
      const income = rows.filter((tx) => tx.type === "incoming").reduce((sum, tx) => sum + Number(tx.amount || 0), 0);
      const expenses = rows.filter((tx) => tx.type === "outgoing").reduce((sum, tx) => sum + Number(tx.amount || 0), 0);

      $("financeSummary").innerHTML = `
        <div class="card p-4"><div class="muted text-sm">Income</div><div class="text-2xl font-extrabold mt-1">${money(income)}</div></div>
        <div class="card p-4"><div class="muted text-sm">Expenses</div><div class="text-2xl font-extrabold mt-1">${money(expenses)}</div></div>
        <div class="card p-4"><div class="muted text-sm">Profit</div><div class="text-2xl font-extrabold mt-1">${money(income - expenses)}</div></div>
      `;

      $("txCount").textContent = `${rows.length} items`;
      $("txRows").innerHTML = rows.map((tx) => `
        <div class="card p-4">
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
            <div>
              <span class="tag">${esc(tx.type)}</span>
              <div class="mt-3 font-extrabold">${esc(companyName(tx.company_id) || tx.company_label || "Global Expense")} • ${esc(formatDate(tx.transaction_date))}</div>
              <div class="mt-1 text-sm muted">${esc(tx.description || "")}</div>
            </div>
            <div class="text-left sm:text-right">
              <div class="text-2xl font-extrabold">${money(tx.amount)}</div>
              <div class="mt-3 flex gap-2 flex-wrap sm:justify-end">

                <button class="btn danger" onclick="deleteTransaction('${tx.id}')">Delete</button>
              </div>
            </div>
          </div>
        </div>
      `).join("");

      drawInvoices();

    window.saveTransaction = async function saveTransaction(id) {
      const companyId = $("txCompany").value || null;

      const payload = {
        type: $("txType").value,
        company_id: companyId,
        company_label: companyId ? companyName(companyId) : "Global Expense",
        amount: num($("txAmount").value),
        transaction_date: $("txDate").value,
        description: $("txDesc").value.trim() || null
      };

      if (!payload.amount || !payload.transaction_date) {
        alert("Amount and date are required.");
        return;
      }

      const result = id
        ? await sb.from("payments_transactions").update(payload).eq("id", id)
        : await sb.from("payments_transactions").insert(payload);

      if (result.error) {
        alert(result.error.message);
        return;
      }

      await audit(id ? "update_transaction" : "add_transaction", "payments_transactions", id || payload.description, payload);
      closeModal();
      await loadAll();
      renderFinance();
    };

    window.deleteTransaction = async function deleteTransaction(id) {
      if (!confirm("Delete this transaction?")) return;

      const { error } = await sb
        .from("payments_transactions")
        .delete()
        .eq("id", id);

      if (error) {
        alert(error.message);
        return;
      }

      await audit("delete_transaction", "payments_transactions", id, {});
      await loadAll();
      renderFinance();
    };

    window.invoicePackageChanged = function invoicePackageChanged(select) {
      const company = state.companies.find((item) => item.id === $("invCompany").value);
      const pkg = company?.packages?.[Number(select.value)];
      const row = select.closest(".invoice-line");

      row.querySelector(".inv-price").value = price;

    function collectInvoiceData() {
      const company = state.companies.find((item) => item.id === $("invCompany").value);
      if (!company) throw new Error("Select a company first.");

      const lines = Array.from(document.querySelectorAll(".invoice-line")).map((row) => {
        const pkg = company.packages?.[Number(row.querySelector(".inv-package").value)] || {};
        const qty = Number(row.querySelector(".inv-qty").value || 1);
        const price = num(row.querySelector(".inv-price").value) || 0;
        return {
          description: pkg.name || "Package",
          qty,
          price,
          total: qty * price
        };
      });

      if (!lines.length) throw new Error("Add at least one package.");

      const subtotal = lines.reduce((sum, line) => sum + line.total, 0);
      const taxPercent = Number($("invTax").value || 0);
      const tax = subtotal * (taxPercent / 100);
      const total = subtotal + tax;
      const invoiceNo = `SC-${new Date().getFullYear()}-${String(Date.now()).slice(-6)}`;
      const invoiceDate = new Date();
      const dueDate = addWorkingDays(invoiceDate, 3);

      return {
        company,
        lines,
        subtotal,
        taxPercent,
        tax,
        total,
        invoiceNo,
        invoiceDate,
        dueDate,
        billingAddress: $("invAddress").value || company.address || ""
      };
    }

    window.saveInvoiceRecord = async function saveInvoiceRecord() {

    window.unlockVault = async function unlockVault() {
      try {
        const out = await api("/api/vault-unlock", { code: $("vaultCode").value });
        sessionStorage.vaultSession = out.session_id || "unlocked";
        state.vaultUnlocked = true;
        resetVaultTimer();
        await audit("unlock_vault", "vault", null, {});
        await loadVaultItems();
        renderVault();
      } catch (error) {
        alert(error.message);
      }
    };

    async function loadVaultItems() {
      const out = await api("/api/vault-list", { session_id: sessionStorage.vaultSession });
      state.vaultItems = out.items || [];
    }

    function resetVaultTimer() {
      clearTimeout(state.vaultTimer);
      state.vaultTimer = setTimeout(() => {
        lockVault();
      }, 5 * 60 * 1000);
    }

    ["click", "keydown", "mousemove"].forEach((eventName) => {
      window.addEventListener(eventName, () => {
        if (state.vaultUnlocked) resetVaultTimer();
      }, { passive: true });
    });

    function drawVault() {
      const showArchived = localStorage.showArchivedVault === "true";
      const items = state.vaultItems.filter((item) => !!item.archived === showArchived);

      if ($("vaultArchiveToggle")) {
        $("vaultArchiveToggle").textContent = showArchived ? "Show Active" : "Show Archived";
      }

      $("vaultList").innerHTML = items.map((item) => `
        <div class="card p-5">
          <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4">
            <div>
              <h3 class="text-xl font-extrabold">${esc(item.name)}</h3>
              <div class="mt-2 text-sm muted">Username: ${esc(item.username || "")}</div>
              <div class="text-sm muted">Email: ${esc(item.email || "")}</div>
              <div class="mt-3">Password: <code>${esc(item.password || "")}</code></div>
              <pre class="mt-4 whitespace-pre-wrap text-sm muted">${esc(formatVaultDetails(item.details))}</pre>
            </div>
            <div class="flex gap-2 flex-wrap">
              <button class="btn" onclick="openCredentialForm('${item.id}')">Edit</button>
              <button class="btn danger" onclick="archiveCredential('${item.id}', ${!item.archived})">${item.archived ? "Unarchive" : "Archive"}</button>
            </div>
          </div>
        </div>
      `).join("") || `<p class="muted">No credentials found.</p>`;
    }

    function formatVaultDetails(details) {
      if (!details) return "";
      if (typeof details === "string") return details.replaceAll("\\n", "\n");
      if (details.text) return String(details.text).replaceAll("\\n", "\n");
      return JSON.stringify(details, null, 2).replaceAll("\\n", "\n");
    }

    window.toggleVaultArchived = function toggleVaultArchived() {
      localStorage.showArchivedVault = localStorage.showArchivedVault === "true" ? "false" : "true";
      drawVault();
    };

    window.lockVault = function lockVault() {
      delete sessionStorage.vaultSession;
      state.vaultUnlocked = false;
      state.vaultItems = [];
      clearTimeout(state.vaultTimer);
      audit("lock_vault", "vault", null, {});
      renderVault();
    };

        "Encrypted server-side before saving.",
        `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="label">Name</label>
              <input id="crName" class="inp" value="${esc(item?.name || "")}" />
            </div>
            <div>
              <label class="label">Username</label>
              <input id="crUsername" class="inp" value="${esc(item?.username || "")}" />
            </div>
            <div>
              <label class="label">Email</label>
              <input id="crEmail" class="inp" value="${esc(item?.email || "")}" />
            </div>
            <div>
              <label class="label">Password</label>
              <input id="crPassword" class="inp" value="${esc(item?.password || "")}" />
            </div>
            <div class="md:col-span-2">
              <label class="label">Extra Details</label>
              <textarea id="crDetails" class="inp">${esc(formatVaultDetails(item?.details))}</textarea>
            </div>
          </div>
          <button class="btn primary mt-5 w-full" onclick="saveCredential('${id || ""}')">Save Credential</button>
        `
      );
    };

    window.saveCredential = async function saveCredential(id) {
      try {
        await api(id ? "/api/vault-update" : "/api/vault-add", {
          session_id: sessionStorage.vaultSession,
          credential_id: id || null,
          name: $("crName").value.trim(),
          username: $("crUsername").value.trim(),
          email: $("crEmail").value.trim(),
          password: $("crPassword").value,
          details: { text: $("crDetails").value }
        });

        closeModal();
        await loadVaultItems();
        renderVault();
      } catch (error) {
        alert(error.message);
      }
    };

    window.archiveCredential = async function archiveCredential(id, archived) {
      try {
        try {
          await api("/api/vault-update", {
            session_id: sessionStorage.vaultSession,
            credential_id: id,
            archived
          });
        } catch (firstError) {
          await api("/api/vault-archive", {
            session_id: sessionStorage.vaultSession,
            credential_id: id,
            archived
          });
        }

        await loadVaultItems();
        drawVault();
      } catch (error) {
        alert(error.message);
      }
    };

    function renderCalendar() {
      const cursor = state.calendarCursor;
      const year = cursor.getFullYear();
      const month = cursor.getMonth();
      const monthName = cursor.toLocaleDateString("en-GB", { month: "long", year: "numeric" });

      const first = new Date(year, month, 1);
      const start = new Date(first);
      const day = (first.getDay() + 6) % 7;
      start.setDate(first.getDate() - day);

      const cells = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
        cells.push(d);
      }

      shell(
        "Calendar",
        "SmartCore shared company calendar.",
        `
          <button class="btn" onclick="moveCalendar(-1)">Previous</button>
          <button class="btn" onclick="moveCalendar(1)">Next</button>
          <button class="btn primary" onclick="openEventForm('${todayIso()}')">+ Add Event</button>
        `,
        `
          <div class="flex items-center justify-between gap-3 mb-5">
            <h2 class="text-2xl font-extrabold">${esc(monthName)}</h2>
          </div>
          <div class="grid grid-cols-7 gap-2 mb-2 text-center text-xs sm:text-sm font-extrabold muted">
            <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
          </div>
          <div class="grid grid-cols-7 gap-2">
            ${cells.map((d) => {
              const iso = dateToLocalIso(d);
              const events = state.events.filter((event) => event.event_date === iso);
              const outside = d.getMonth() !== month;
              const dayShort = d.toLocaleDateString("en-GB", { weekday: "short" });

              return `
                <button class="calendar-day ${outside ? "outside" : ""}" onclick="openDay('${iso}')">
                  <div class="flex items-center justify-between gap-2">
                    <div class="font-extrabold">${d.getDate()}</div>
                    <div class="text-[10px] muted sm:hidden">${esc(dayShort)}</div>
                  </div>
                  <div class="mt-3 space-y-1 hidden sm:block">
                    ${events.slice(0, 2).map((event) => `<div class="text-xs tag">${esc(event.title)}</div>`).join("")}
                    ${events.length > 2 ? `<div class="text-xs muted">+${events.length - 2} more</div>` : ""}
                  </div>
                  <div class="mt-2 text-[10px] muted sm:hidden">${events.length ? `${events.length} event(s)` : ""}</div>
                </button>
              `;
            }).join("")}
          </div>
        `
      );
    }

    window.moveCalendar = function moveCalendar(offset) {
      state.calendarCursor = new Date(
        state.calendarCursor.getFullYear(),
        state.calendarCursor.getMonth() + offset,
        1
      );
      renderCalendar();
    };

    window.openDay = function openDay(date) {
      const events = state.events.filter((event) => event.event_date === date);

      openModal(
        `Calendar - ${formatDate(date)}`,
        events.length ? `${events.length} event(s)` : "Nothing is on for this day.",
        `
          <div class="space-y-3">
            ${events.map((event) => `
              <div class="card p-4">
                <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
                  <div>
                    <h3 class="font-extrabold text-lg">${esc(event.title)}</h3>
                    <div class="text-sm muted mt-1">${event.all_day ? "All day" : `${esc(event.start_time || "")} - ${esc(event.end_time || "")}`}</div>
                    <p class="mt-2 text-sm">${esc(event.description || "")}</p>
                  </div>
                  <div class="flex gap-2 flex-wrap">
                    <button class="btn" onclick="openEventForm('${date}', '${event.id}')">Edit</button>
                    <button class="btn danger" onclick="deleteEvent('${event.id}', '${date}')">Delete</button>
                  </div>
                </div>
              </div>
            `).join("") || `<p class="muted">Nothing is on.</p>`}
          </div>
          <div class="mt-5 flex justify-end">
            <button class="btn primary" onclick="openEventForm('${date}')">Add Event</button>
          </div>
        `
      );
    };

    window.openEventForm = function openEventForm(date, id) {
      const event = id ? state.events.find((item) => String(item.id) === String(id)) : {};
      const selectedDate = event?.event_date || date || todayIso();

      openModal(
        id ? "Edit Calendar Event" : "Add Calendar Event",
        "Everyone in SmartCore can see this.",
        `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="label">Title</label>
              <input id="evTitle" class="inp" value="${esc(event?.title || "")}" />
            </div>
            <div>
              <label class="label">Date</label>
              <input id="evDate" class="inp" type="date" value="${esc(selectedDate)}" />
            </div>
            <label class="flex items-center gap-2 muted"><input id="evAll" type="checkbox" ${event?.all_day ? "checked" : ""} /> All day</label>
            <div></div>
            <div>
              <label class="label">Start</label>
              <input id="evStart" class="inp" type="time" value="${esc(event?.start_time || "")}" />
            </div>
            <div>
              <label class="label">End</label>
              <input id="evEnd" class="inp" type="time" value="${esc(event?.end_time || "")}" />
            </div>
            <div class="md:col-span-2">
              <label class="label">Description</label>
              <textarea id="evDesc" class="inp">${esc(event?.description || "")}</textarea>
            </div>
          </div>
          <button class="btn primary mt-5 w-full" onclick="saveEvent('${id || ""}')">Save Event</button>
        `
      );
    };

    window.saveEvent = async function saveEvent(id) {
      const payload = {
        title: $("evTitle").value.trim(),
        event_date: $("evDate").value,
        all_day: $("evAll").checked,
        start_time: $("evAll").checked ? null : ($("evStart").value || null),
        end_time: $("evAll").checked ? null : ($("evEnd").value || null),
        description: $("evDesc").value.trim() || null,
        created_by: state.user.id
      };

      if (!payload.title || !payload.event_date) {
        alert("Title and date are required.");
        return;
      }

      const result = id
        ? await sb.from("calendar_events").update(payload).eq("id", id)
        : await sb.from("calendar_events").insert(payload);

      if (result.error) {
        alert(result.error.message);
        return;
      }

      await audit(id ? "update_calendar_event" : "add_calendar_event", "calendar_events", id || payload.title, payload);
      closeModal();
      await loadAll();
      renderCalendar();
    };

    window.deleteEvent = async function deleteEvent(id, date) {
      if (!confirm("Delete this calendar event?")) return;

      const { error } = await sb
        .from("calendar_events")
        .delete()
        .eq("id", id);

      if (error) {
        alert(error.message);
        return;
      }

      await audit("delete_calendar_event", "calendar_events", id, {});
      await loadAll();
      closeModal();
      openDay(date);
    };

    function renderStaff() {
      if (!isAdmin()) {
        renderDashboard();
        return;
      }

      shell(
        "Employee Management",
        "Manage SmartCore employees and onboarding.",
        `<button class="btn primary" onclick="openStaffForm()">+ Add Employee</button>`,
        `
          <div class="overflow-auto">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Work Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${state.staffList.map((staff) => `
                  <tr>
                    <td>
                      <b>${esc(staff.full_name)}</b>
                      <div class="text-xs muted mt-1">${esc(staff.job_title || "")}</div>
                    </td>
                    <td>${esc(staff.work_email || staff.email || "")}</td>
                    <td>${esc(staff.role || "employee")} ${staff.is_admin ? "• admin" : ""}</td>
                    <td>${staff.archived ? "archived" : staff.active ? "active" : "disabled"}</td>
                    <td>
                      <div class="flex gap-2 flex-wrap">
                        <button class="btn" onclick="openStaffForm('${staff.id}')">Edit</button>
                        <button class="btn" onclick="openStaffInvite('${staff.id}')">Send Invite</button>
                        <button class="btn danger" onclick="archiveStaff('${staff.id}')">Archive</button>
                      </div>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `
      );
    }

    window.openStaffForm = function openStaffForm(id) {
      const staff = id ? state.staffList.find((item) => item.id === id) : {};

      openModal(
        id ? "Edit SmartCore Employee" : "Add SmartCore Employee",
        "Full employee details.",
        `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="label">Full Name</label><input id="stName" class="inp" value="${esc(staff?.full_name || "")}" /></div>
            <div><label class="label">Job Title</label><input id="stJob" class="inp" value="${esc(staff?.job_title || "")}" /></div>
            <div><label class="label">Work Email</label><input id="stWork" class="inp" value="${esc(staff?.work_email || staff?.email || "")}" /></div>
            <div><label class="label">Personal Email</label><input id="stPersonal" class="inp" value="${esc(staff?.personal_email || "")}" /></div>
            <div><label class="label">Personal Phone</label><input id="stPhone" class="inp" value="${esc(staff?.personal_phone || "")}" /></div>
            <div><label class="label">Employment Type</label><select id="stEmployment" class="inp"><option value="full_time">Full Time</option><option value="part_time">Part Time</option><option value="other">Other</option></select></div>
            <div><label class="label">Notice Period</label><input id="stNotice" class="inp" value="${esc(staff?.notice_period || "")}" /></div>
            <div><label class="label">Role</label><select id="stRole" class="inp"><option value="employee">Employee</option><option value="admin">Admin</option>${isOwner() ? `<option value="owner">Owner</option>` : ""}</select></div>
            <div><label class="label">Is Admin</label><select id="stAdmin" class="inp"><option value="false">No</option><option value="true">Yes</option></select></div>
            <div><label class="label">Start Date</label><input id="stStart" class="inp" type="date" value="${esc(staff?.start_date || "")}" /></div>
            <div><label class="label">Title</label><input id="stTitle" class="inp" value="${esc(staff?.title || "")}" /></div>
            <div><label class="label">Pronouns</label><input id="stPronouns" class="inp" value="${esc(staff?.pronouns || "")}" /></div>
            <div><label class="label">Gender</label><input id="stGender" class="inp" value="${esc(staff?.gender || "")}" /></div>
            <div><label class="label">Date of Birth</label><input id="stDob" class="inp" type="date" value="${esc(staff?.dob || "")}" /></div>
            <div><label class="label">Nationality</label><input id="stNationality" class="inp" value="${esc(staff?.nationality || "")}" /></div>
            <div><label class="label">House Number / Name</label><input id="stHouse" class="inp" value="${esc(staff?.house_number_name || "")}" /></div>
            <div><label class="label">Street Name</label><input id="stStreet" class="inp" value="${esc(staff?.street_name || "")}" /></div>
            <div><label class="label">Town</label><input id="stTown" class="inp" value="${esc(staff?.town || "")}" /></div>
            <div><label class="label">Postcode</label><input id="stPostcode" class="inp" value="${esc(staff?.postcode || "")}" /></div>
            <div><label class="label">Country</label><input id="stCountry" class="inp" value="${esc(staff?.country || "United Kingdom")}" /></div>
            <div><label class="label">Emergency Contact 1 Name</label><input id="stEc1Name" class="inp" value="${esc(staff?.emergency_contact_1_name || "")}" /></div>
            <div><label class="label">Emergency Contact 1 Relationship</label><input id="stEc1Rel" class="inp" value="${esc(staff?.emergency_contact_1_relationship || "")}" /></div>
            <div><label class="label">Emergency Contact 1 Phone</label><input id="stEc1Phone" class="inp" value="${esc(staff?.emergency_contact_1_phone || "")}" /></div>
            <div><label class="label">Emergency Contact 1 Email</label><input id="stEc1Email" class="inp" value="${esc(staff?.emergency_contact_1_email || "")}" /></div>
            <div><label class="label">Emergency Contact 2 Name</label><input id="stEc2Name" class="inp" value="${esc(staff?.emergency_contact_2_name || "")}" /></div>
            <div><label class="label">Emergency Contact 2 Relationship</label><input id="stEc2Rel" class="inp" value="${esc(staff?.emergency_contact_2_relationship || "")}" /></div>
            <div><label class="label">Emergency Contact 2 Phone</label><input id="stEc2Phone" class="inp" value="${esc(staff?.emergency_contact_2_phone || "")}" /></div>
            <div><label class="label">Emergency Contact 2 Email</label><input id="stEc2Email" class="inp" value="${esc(staff?.emergency_contact_2_email || "")}" /></div>
          </div>
          <button class="btn primary mt-5 w-full" onclick="saveStaff('${id || ""}')">Save Employee</button>
        `
      );

      $("stEmployment").value = staff?.employment_type || "full_time";
      $("stRole").value = staff?.role || "employee";
      $("stAdmin").value = String(!!staff?.is_admin);
    };

    window.saveStaff = async function saveStaff(id) {
      const role = $("stRole").value;

      if (role === "owner" && !isOwner()) {
        alert("Only owners can add owners.");
        return;
      }

      const payload = {
        full_name: $("stName").value.trim(),
        job_title: $("stJob").value.trim() || null,
        work_email: $("stWork").value.trim().toLowerCase(),
        email: $("stWork").value.trim().toLowerCase(),
        personal_email: $("stPersonal").value.trim().toLowerCase() || null,
        personal_phone: $("stPhone").value.trim() || null,
        employment_type: $("stEmployment").value,
        notice_period: $("stNotice").value.trim() || null,
        role,
        is_admin: $("stAdmin").value === "true" || role === "admin" || role === "owner",
        start_date: $("stStart").value || null,
        title: $("stTitle").value.trim() || null,
        pronouns: $("stPronouns").value.trim() || null,
        gender: $("stGender").value.trim() || null,
        dob: $("stDob").value || null,
        nationality: $("stNationality").value.trim() || null,
        house_number_name: $("stHouse").value.trim() || null,
        street_name: $("stStreet").value.trim() || null,
        town: $("stTown").value.trim() || null,
        postcode: $("stPostcode").value.trim() || null,
        country: $("stCountry").value.trim() || "United Kingdom",
        emergency_contact_1_name: $("stEc1Name").value.trim() || null,
        emergency_contact_1_relationship: $("stEc1Rel").value.trim() || null,
        emergency_contact_1_phone: $("stEc1Phone").value.trim() || null,
        emergency_contact_1_email: $("stEc1Email").value.trim() || null,
        emergency_contact_2_name: $("stEc2Name").value.trim() || null,
        emergency_contact_2_relationship: $("stEc2Rel").value.trim() || null,
        emergency_contact_2_phone: $("stEc2Phone").value.trim() || null,
        emergency_contact_2_email: $("stEc2Email").value.trim() || null,
        active: true,
        archived: false
      };

      if (!payload.full_name || !payload.work_email) {
        alert("Full name and work email are required.");
        return;
      }

      const result = id
        ? await sb.from("smartcore_staff").update(payload).eq("id", id)
        : await sb.from("smartcore_staff").insert(payload);

      if (result.error) {
        alert(result.error.message);
        return;
      }

      await audit(id ? "update_staff" : "add_staff", "smartcore_staff", id || payload.work_email, {});
      closeModal();
      await loadAll();
      renderStaff();
    };

    window.openStaffInvite = function openStaffInvite(id) {
      const staff = state.staffList.find((item) => item.id === id);

      openModal(
        "Send Onboarding Invite",
        "Choose where to send the invite.",
        `
          <div class="card p-5">
            <h3 class="text-xl font-extrabold">${esc(staff?.full_name || "Employee")}</h3>
            <p class="muted mt-2">Send the onboarding link to:</p>
            <div class="mt-5 flex flex-wrap gap-3">
              <button class="btn primary" onclick="sendStaffInvite('${id}', 'work')">Work Email</button>
              <button class="btn" onclick="sendStaffInvite('${id}', 'personal')">Personal Email</button>
            </div>
          </div>
        `
      );
    };

    window.sendStaffInvite = async function sendStaffInvite(id, target) {
      const staff = state.staffList.find((item) => item.id === id);
      const emailTo = target === "personal"
        ? staff?.personal_email
        : (staff?.work_email || staff?.email);

      if (!id || !emailTo) {
        alert("Missing staff_id or email_to. Please check the staff record has the selected email address.");
        return;
      }

      try {
        await api("/api/staff-invite", {
          staff_id: id,
          email_to: emailTo,
          target
        });

        alert("Invite sent.");
        await audit("send_staff_invite", "smartcore_staff", id, { target, email_to: emailTo });
        closeModal();
      } catch (error) {
        alert(error.message);
      }
    };

    window.archiveStaff = async function archiveStaff(id) {
      if (!confirm("Archive employee and disable login?")) return;

      const { error } = await sb
        .from("smartcore_staff")
        .update({ archived: true, active: false })
        .eq("id", id);

      if (error) {
        alert(error.message);
        return;
      }

      await audit("archive_staff", "smartcore_staff", id, {});
      await loadAll();
      renderStaff();
    };

    async function renderAudit() {
      if (!isOwner()) {
        renderDashboard();
        return;
      }

      shell(
        "Audit Logs",
        "Owner only. Easier to read activity records.",
        "",
        `<div id="auditRows" class="space-y-3">Loading...</div>`
      );

      const { data, error } = await sb
        .from("audit_logs")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(250);

      if (error) {
        $("auditRows").textContent = error.message;
        return;
      }

      $("auditRows").innerHTML = (data || []).map((row) => {
        const action = String(row.action || "")
          .replaceAll("_", " ")
          .replace(/\b\w/g, (letter) => letter.toUpperCase());

        const actor = row.actor_name
          ? `${row.actor_name} (${row.actor_email || ""})`
          : (row.actor_email || "Unknown");

        return `
          <div class="card p-4">
            <div class="font-extrabold text-lg">${esc(action)} - ${esc(formatDateTime(row.created_at))} • ${esc(actor)}</div>
            <div class="mt-2 text-xs muted">${esc(row.target_table || "")} ${row.target_id ? "• " + esc(row.target_id) : ""}</div>
            <pre class="mt-3 text-xs muted whitespace-pre-wrap">${esc(JSON.stringify(row.metadata || {}, null, 2))}</pre>
          </div>
        `;
      }).join("");
    }

    $("modalClose").addEventListener("click", closeModal);

    $("modal").addEventListener("click", (event) => {
      if (event.target === $("modal")) {
        closeModal();
      }
    });

    $("signOut").addEventListener("click", async () => {
      await audit("logout", "smartcore_staff", state.staff?.id, {});
      await sb.auth.signOut();
      location.href = "/";
    });

    init().catch((error) => {
      console.error(error);
      showFatal("HQ failed to load", error.message || String(error));
    });
  </script>
</body>
</html>
