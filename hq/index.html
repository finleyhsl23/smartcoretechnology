<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SmartCore HQ</title>

  <link rel="icon" type="image/png" href="/SmartCore Official Logos/SC Icon - Black Background.png" />
  <link rel="apple-touch-icon" href="/SmartCore Official Logos/SC Icon - Black Background.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    window.__SUPABASE_URL = "https://hjdpcfhozhoyeqevnupm.supabase.co";
    window.__SUPABASE_ANON = "PASTE_YOUR_SMARTCORE_SUPABASE_ANON_KEY_HERE";
  </script>

  <style>
    :root {
      --bg0: #020617;
      --bg1: #06153a;
      --panel: rgba(255, 255, 255, 0.065);
      --panel2: rgba(255, 255, 255, 0.045);
      --line: rgba(255, 255, 255, 0.12);
      --line2: rgba(255, 255, 255, 0.08);
      --text: #eaf0ff;
      --muted: rgba(234, 240, 255, 0.72);
      --blue: #3b82f6;
      --red: #ef4444;
      --green: #22c55e;
      --amber: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        radial-gradient(900px 650px at 50% 0%, rgba(59, 130, 246, 0.18), transparent 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      background-size: 42px 42px, 42px 42px, auto, auto;
      overflow-x: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.045));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card {
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 18px;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .btn.primary {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .btn.danger {
      background: rgba(239, 68, 68, 0.78);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .inp {
      width: 100%;
      background: rgba(2, 6, 23, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 15px;
      color: var(--text);
      padding: 12px 13px;
      outline: none;
    }

    .inp::placeholder {
      color: rgba(234, 240, 255, 0.42);
    }

    .inp:focus {
      border-color: rgba(59, 130, 246, 0.42);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    textarea.inp {
      min-height: 110px;
      resize: vertical;
    }

    .label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .muted {
      color: var(--muted);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(255, 255, 255, 0.07);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 800;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
    }

    .module-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.09);
      text-align: left;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .module-button:hover,
    .module-button.active {
      background: rgba(59, 130, 246, 0.18);
      border-color: rgba(59, 130, 246, 0.36);
      transform: translateY(-1px);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.66);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-box {
      width: min(100%, 1060px);
      max-height: 88vh;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .code-box {
      background: rgba(2, 6, 23, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      overflow: hidden;
    }

    .code-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(255, 255, 255, 0.04);
    }

    .code-textarea {
      width: 100%;
      min-height: 280px;
      border: 0;
      outline: 0;
      color: #dbeafe;
      background: transparent;
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
    }

    .calendar-day {
      min-height: 115px;
      text-align: left;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.045);
      cursor: pointer;
    }

    .calendar-day:hover {
      background: rgba(59, 130, 246, 0.14);
      border-color: rgba(59, 130, 246, 0.25);
    }

    .calendar-day.outside {
      opacity: 0.42;
    }

    .fatal {
      padding: 28px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.045));
    }
  </style>
</head>

<body>
  <header class="sticky top-0 z-50 border-b border-white/10 bg-black/20 backdrop-blur-xl">
    <div class="max-w-[1500px] mx-auto px-5 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-11 h-11 rounded-2xl overflow-hidden bg-black/30 border border-white/10 flex items-center justify-center shrink-0">
          <img
            src="/SmartCore Official Logos/SC Icon - Black Background.png"
            alt="SmartCore"
            class="w-8 h-8 object-contain"
            onerror="this.style.display='none'"
          />
        </div>
        <div class="min-w-0">
          <div class="font-extrabold tracking-wide leading-tight">SMARTCORE HQ</div>
          <div class="text-sm muted leading-tight">Internal Management System</div>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <span id="who" class="tag"><span class="dot"></span>Loading...</span>
        <button id="signOut" class="btn">Sign out</button>
      </div>
    </div>
  </header>

  <main class="max-w-[1500px] mx-auto p-5 grid grid-cols-1 xl:grid-cols-[320px_1fr] gap-5">
    <aside class="glass p-4 h-fit xl:sticky xl:top-24">
      <div class="text-xs uppercase tracking-[0.2em] muted px-3 mb-3">Modules</div>
      <div id="moduleNav" class="space-y-2"></div>
    </aside>

    <section id="content" class="min-h-[760px]"></section>
  </main>

  <div id="modal" class="modal-backdrop">
    <div class="modal-box glass p-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 id="modalTitle" class="text-2xl sm:text-3xl font-extrabold tracking-tight"></h2>
          <p id="modalSub" class="mt-1 text-sm muted"></p>
        </div>
        <button id="modalClose" class="btn">Close</button>
      </div>
      <div id="modalBody" class="mt-6"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const sb = window.supabase.createClient(
      window.__SUPABASE_URL,
      window.__SUPABASE_ANON
    );

    const state = {
      user: null,
      staff: null,
      companies: [],
      staffList: [],
      transactions: [],
      events: [],
      auditRows: [],
      module: "dashboard",
      calendarCursor: new Date(),
      vaultUnlocked: false,
      vaultTimer: null,
      vaultItems: []
    };

    const modules = [
      ["dashboard", "Dashboard", "Your profile and overview"],
      ["customers", "Customer Portal Manager", "Companies and packages"],
      ["finance", "Payments & Finance", "Admin only"],
      ["vault", "Credentials Vault", "Admin only"],
      ["calendar", "Calendar", "Shared calendar"],
      ["staff", "Employee Management", "Admin only"],
      ["audit", "Audit Logs", "Owner only"]
    ];

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function money(value) {
      return "£" + Number(value || 0).toFixed(2);
    }

    function num(value) {
      const clean = String(value || "").replace(/[^0-9.]/g, "");
      return clean ? Number(clean) : null;
    }

    function todayIso() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleDateString("en-GB");
    }

    function formatDateTime(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString("en-GB", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        hour12: true,
        timeZoneName: "short"
      });
    }

    function isAdmin() {
      return !!state.staff && (
        state.staff.is_admin === true ||
        ["admin", "owner"].includes(String(state.staff.role || "").toLowerCase())
      );
    }

    function isOwner() {
      return String(state.staff?.role || "").toLowerCase() === "owner";
    }

    function showFatal(title, message) {
      $("content").innerHTML = `
        <div class="fatal">
          <h1 class="text-3xl font-extrabold">${esc(title)}</h1>
          <p class="mt-2 text-lg muted">${esc(message)}</p>
          <div class="mt-6 flex gap-3 flex-wrap">
            <button class="btn primary" onclick="location.reload()">Retry</button>
            <button class="btn" onclick="location.href='/'">Back to website</button>
          </div>
        </div>
      `;
    }

    function openModal(title, subtitle, bodyHtml) {
      $("modalTitle").textContent = title;
      $("modalSub").textContent = subtitle || "";
      $("modalBody").innerHTML = bodyHtml || "";
      $("modal").classList.add("show");
    }

    function closeModal() {
      $("modal").classList.remove("show");
      $("modalBody").innerHTML = "";
    }

    window.closeModal = closeModal;

    async function api(path, payload) {
      const { data: { session } } = await sb.auth.getSession();
      const headers = { "content-type": "application/json" };

      if (session?.access_token) {
        headers.authorization = "Bearer " + session.access_token;
      }

      const res = await fetch(path, {
        method: "POST",
        headers,
        body: JSON.stringify(payload || {})
      });

      const text = await res.text();
      let data = null;

      try {
        data = JSON.parse(text);
      } catch (_) {
        data = { raw: text };
      }

      if (!res.ok || data.ok === false) {
        throw new Error(data.error || data.message || data.raw || "Request failed");
      }

      return data;
    }

    async function audit(action, targetTable, targetId, metadata) {
      try {
        await api("/api/audit-log", {
          action,
          target_table: targetTable,
          target_id: targetId,
          metadata: metadata || {}
        });
      } catch (error) {
        console.warn("Audit failed", error);
      }
    }

    async function init() {
      $("moduleNav").innerHTML = "";
      $("content").innerHTML = `
        <div class="glass p-8">
          <div class="tag"><span class="dot"></span>Loading SmartCore HQ...</div>
        </div>
      `;

      const { data: { session } } = await sb.auth.getSession();

      if (!session?.user) {
        showFatal("Not signed in", "Please sign in from the main SmartCore website first.");
        return;
      }

      state.user = session.user;

      const { data: staffRows, error: staffError } = await sb.rpc("get_my_smartcore_staff");

      const staff = Array.isArray(staffRows)
        ? staffRows[0]
        : null;

      if (staffError) {
        showFatal("Staff check failed", staffError.message);
        return;
      }

      if (!staff) {
        showFatal("Staff check failed", "No SmartCore staff record found for this login.");
        return;
      }

      if (staff.active === false || staff.archived === true) {
        await sb.auth.signOut();
        showFatal("Account disabled", "Your SmartCore staff account is not active.");
        return;
      }

      state.staff = staff;

      $("who").innerHTML = `<span class="dot"></span>${esc(staff.full_name || session.user.email)}`;

      await loadAll();
      renderNav();
      renderDashboard();
      await audit("login", "smartcore_staff", staff.id, { page: "hq" });
    }

    async function loadAll() {
      const requests = [
        sb.from("companies").select("*").order("created_at", { ascending: false }),
        sb.from("smartcore_staff").select("*").order("full_name", { ascending: true }),
        sb.from("calendar_events").select("*").order("event_date", { ascending: true })
      ];

      if (isAdmin()) {
        requests.push(
          sb.from("payments_transactions").select("*").order("transaction_date", { ascending: false })
        );
      }

      const results = await Promise.allSettled(requests);

      state.companies = results[0].status === "fulfilled" ? (results[0].value.data || []) : [];
      state.staffList = results[1].status === "fulfilled" ? (results[1].value.data || []) : [];
      state.events = results[2].status === "fulfilled" ? (results[2].value.data || []) : [];
      state.transactions = isAdmin() && results[3]?.status === "fulfilled" ? (results[3].value.data || []) : [];
    }

    function allowedModules() {
      return modules.filter((module) => {
        if (["finance", "vault", "staff"].includes(module[0]) && !isAdmin()) return false;
        if (module[0] === "audit" && !isOwner()) return false;
        return true;
      });
    }

    function renderNav() {
      $("moduleNav").innerHTML = allowedModules().map((module) => `
        <button class="module-button ${state.module === module[0] ? "active" : ""}" data-module="${module[0]}">
          <span>
            <span class="block font-extrabold">${esc(module[1])}</span>
            <span class="block mt-1 text-xs muted">${esc(module[2])}</span>
          </span>
          <span class="muted">›</span>
        </button>
      `).join("");

      document.querySelectorAll("[data-module]").forEach((button) => {
        button.addEventListener("click", () => {
          state.module = button.dataset.module;
          renderNav();
          renderCurrentModule();
        });
      });
    }

    function renderCurrentModule() {
      const renderers = {
        dashboard: renderDashboard,
        customers: renderCustomers,
        finance: renderFinance,
        vault: renderVault,
        calendar: renderCalendar,
        staff: renderStaff,
        audit: renderAudit
      };

      (renderers[state.module] || renderDashboard)();
    }

    function shell(title, subtitle, actionsHtml, bodyHtml) {
      $("content").innerHTML = `
        <div class="glass p-6 sm:p-8">
          <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-5">
            <div>
              <div class="text-xs uppercase tracking-[0.2em] muted">Module</div>
              <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight mt-2">${esc(title)}</h1>
              <p class="mt-2 text-base muted">${esc(subtitle)}</p>
            </div>
            <div class="flex gap-2 flex-wrap">
              ${actionsHtml || ""}
            </div>
          </div>
          <div class="mt-7">
            ${bodyHtml || ""}
          </div>
        </div>
      `;
    }

    function renderDashboard() {
      const staff = state.staff || {};
      const joined = staff.created_at ? formatDate(staff.created_at) : "Not set";
      const packageCount = state.companies.reduce((sum, company) => {
        return sum + (Array.isArray(company.packages) ? company.packages.length : 0);
      }, 0);

      shell(
        "SmartCore HQ",
        "Your profile, quick stats and management overview.",
        `<button class="btn primary" onclick="openMyProfile()">Edit My Profile</button>`,
        `
          <div class="grid grid-cols-1 xl:grid-cols-[1.15fr_0.85fr] gap-5">
            <div class="card p-6">
              <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
                <div>
                  <div class="tag"><span class="dot"></span>${esc(staff.role || "employee")}</div>
                  <h2 class="mt-5 text-3xl font-extrabold">${esc(staff.full_name || state.user.email)}</h2>
                  <p class="mt-1 muted">${esc(staff.job_title || "Job title not set")}</p>
                </div>
                <div class="text-sm muted sm:text-right">
                  <div>Started: <b class="text-white">${esc(formatDate(staff.start_date) || "Not set")}</b></div>
                  <div class="mt-1">Joined HQ: <b class="text-white">${esc(joined)}</b></div>
                </div>
              </div>

              <div class="mt-7 grid grid-cols-1 md:grid-cols-2 gap-3">
                <div class="card p-4">
                  <div class="text-sm muted">Work Email</div>
                  <div class="mt-1 font-bold">${esc(staff.work_email || staff.email || state.user.email)}</div>
                </div>
                <div class="card p-4">
                  <div class="text-sm muted">Personal Email</div>
                  <div class="mt-1 font-bold">${esc(staff.personal_email || "Not set")}</div>
                </div>
                <div class="card p-4">
                  <div class="text-sm muted">Personal Phone</div>
                  <div class="mt-1 font-bold">${esc(staff.personal_phone || "Not set")}</div>
                </div>
                <div class="card p-4">
                  <div class="text-sm muted">Employment Type</div>
                  <div class="mt-1 font-bold">${esc(staff.employment_type || "Not set")}</div>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-1 gap-4">
              <div class="card p-5">
                <div class="text-sm muted">Customers</div>
                <div class="text-4xl font-extrabold mt-2">${state.companies.length}</div>
              </div>
              <div class="card p-5">
                <div class="text-sm muted">Packages</div>
                <div class="text-4xl font-extrabold mt-2">${packageCount}</div>
              </div>
              <div class="card p-5">
                <div class="text-sm muted">Calendar Events</div>
                <div class="text-4xl font-extrabold mt-2">${state.events.length}</div>
              </div>
            </div>
          </div>
        `
      );
    }

    window.openMyProfile = function openMyProfile() {
      const s = state.staff || {};

      openModal(
        "My SmartCore Profile",
        "Update your own profile details.",
        `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="label">Full Name</label>
              <input id="meFullName" class="inp" value="${esc(s.full_name || "")}" />
            </div>
            <div>
              <label class="label">Job Title</label>
              <input id="meJobTitle" class="inp" value="${esc(s.job_title || "")}" />
            </div>
            <div>
              <label class="label">Personal Email</label>
              <input id="mePersonalEmail" class="inp" value="${esc(s.personal_email || "")}" />
            </div>
            <div>
              <label class="label">Personal Phone</label>
              <input id="mePersonalPhone" class="inp" value="${esc(s.personal_phone || "")}" />
            </div>
          </div>
          <button class="btn primary mt-5" onclick="saveMyProfile()">Save Profile</button>
        `
      );
    };

    window.saveMyProfile = async function saveMyProfile() {
      const payload = {
        full_name: $("meFullName").value.trim() || null,
        job_title: $("meJobTitle").value.trim() || null,
        personal_email: $("mePersonalEmail").value.trim().toLowerCase() || null,
        personal_phone: $("mePersonalPhone").value.trim() || null
      };

      const { error } = await sb
        .from("smartcore_staff")
        .update(payload)
        .eq("id", state.staff.id);

      if (error) {
        alert(error.message);
        return;
      }

      await audit("update_profile", "smartcore_staff", state.staff.id, {});
      closeModal();
      await init();
    };

    function companyName(id) {
      return state.companies.find((company) => company.id === id)?.company_name || "Global Expense";
    }

    function renderCustomers() {
      shell(
        "Customer Portal Manager",
        "Manage companies, contacts, notes and SmartCore packages.",
        `<button class="btn primary" onclick="openCompanyForm()">+ Add New Company</button>`,
        `
          <input id="companySearch" class="inp" placeholder="Search customers..." />
          <div class="mt-5 overflow-auto">
            <table>
              <thead>
                <tr>
                  <th>Company</th>
                  <th>Primary Contact</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Packages</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="companyRows"></tbody>
            </table>
          </div>
        `
      );

    function defaultHours() {
      return {
        monday: { open: true, start: "09:00", end: "17:00" },
        tuesday: { open: true, start: "09:00", end: "17:00" },
        wednesday: { open: true, start: "09:00", end: "17:00" },
        thursday: { open: true, start: "09:00", end: "17:00" },
        friday: { open: true, start: "09:00", end: "17:00" },
        saturday: { open: false, start: "", end: "" },
        sunday: { open: false, start: "", end: "" }
      };
    }

    function workingHoursEditor(hours) {
      const data = hours || defaultHours();
      const days = ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"];

      return `
        <div class="card p-4 md:col-span-2">
          <div class="font-extrabold mb-3">Working Hours</div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${days.map((day) => `
              <div class="card p-3" data-hour-day="${day}">
                <div class="flex items-center justify-between gap-3">
                  <label class="font-bold capitalize">${day}</label>
                  <label class="text-sm muted flex items-center gap-2">
                    <input class="hoursOpen" type="checkbox" ${data[day]?.open ? "checked" : ""} /> Open
                  </label>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-3">
                  <input class="inp hoursStart" type="time" value="${esc(data[day]?.start || "")}" />
                  <input class="inp hoursEnd" type="time" value="${esc(data[day]?.end || "")}" />
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function collectWorkingHours() {
      const output = {};

      document.querySelectorAll("[data-hour-day]").forEach((row) => {
        const day = row.dataset.hourDay;
        output[day] = {
          open: row.querySelector(".hoursOpen").checked,
          start: row.querySelector(".hoursStart").value,
          end: row.querySelector(".hoursEnd").value
        };
      });

      return output;
    }

    window.addPackageCard = function addPackageCard() {
      $("packagesBox").insertAdjacentHTML("beforeend", packageCard({}, Date.now()));
    };

    function collectPackages() {
      return Array.from(document.querySelectorAll(".package-card")).map((card) => {
        let codeStorage = { folders: [] };

        try {
          codeStorage = JSON.parse(card.querySelector(".pkg-code-storage").value || "{}");
        } catch (_) {}

        return {
          name: card.querySelector(".pkg-name").value.trim(),
          package_type: card.querySelector(".pkg-type").value,
          lead_developer: card.querySelector(".pkg-lead").value.trim() || null,
          developers: card.querySelector(".pkg-developers").value
            .split(",")
            .map((name) => name.trim())
            .filter(Boolean)
            .slice(0, 50),
          code_storage: codeStorage,
          monthly_fee: num(card.querySelector(".pkg-monthly").value),
          monthly_first_payment_date: card.querySelector(".pkg-monthly-date").value || null,
          yearly_fee: num(card.querySelector(".pkg-yearly").value),
          yearly_first_payment_date: card.querySelector(".pkg-yearly-date").value || null,
          one_time_fee: num(card.querySelector(".pkg-one-time").value),
          one_time_payment_date: card.querySelector(".pkg-one-time-date").value || null
        };
      }).filter((pkg) => pkg.name);
    }

    window.saveCompany = async function saveCompany(id) {
      const payload = {
        company_name: $("fCompany").value.trim(),
        approx_staff_count: num($("fStaff").value),
        website: $("fWebsite").value.trim() || null,
        address: $("fAddress").value.trim() || null,
        working_hours: collectWorkingHours(),
        notes: $("fNotes").value.trim() || null,
        primary_contact_name: $("fContact").value.trim(),
        primary_contact_email: $("fContactEmail").value.trim() || null,
        primary_contact_phone: $("fContactPhone").value.trim() || null,
        accounts_team_email: $("fAccounts").value.trim() || null,
        support_team_email: $("fSupport").value.trim() || null,
        packages: collectPackages()
      };

      if (!payload.company_name || !payload.primary_contact_name) {
        alert("Company name and primary contact name are required.");
        return;
      }

      const result = id
        ? await sb.from("companies").update(payload).eq("id", id)
        : await sb.from("companies").insert(payload);

      if (result.error) {
        alert(result.error.message);
        return;
      }

      await audit(id ? "update_company" : "add_company", "companies", id || payload.company_name, {});
      closeModal();
      await loadAll();
      renderCustomers();
    };

    window.deleteCompany = async function deleteCompany(id) {
      if (!confirm("Delete this company?")) return;

      const { error } = await sb
        .from("companies")
        .delete()
        .eq("id", id);

      if (error) {
        alert(error.message);
        return;
      }

      await audit("delete_company", "companies", id, {});
      await loadAll();
      renderCustomers();
    };

    function renderFinance() {
      if (!isAdmin()) {
        renderDashboard();
        return;
      }

      const years = Array.from(new Set(
        state.transactions
          .map((tx) => new Date(tx.transaction_date).getFullYear())
          .filter(Boolean)
      )).sort((a, b) => b - a);

      shell(
        "Payments & Finance",
        "Track incoming and outgoing transactions and generate invoices.",
        `
          <button class="btn" onclick="exportCSV()">Export CSV</button>
          <button class="btn primary" onclick="openTransactionForm()">+ Add Transaction</button>
          <button class="btn primary" onclick="openInvoiceForm()">Generate Invoice</button>
        `,
        `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <select id="yearFilter" class="inp">
              <option value="all">All time</option>
              ${years.map((year) => `<option value="${year}">${year}</option>`).join("")}
            </select>
            <select id="typeFilter" class="inp">
              <option value="all">All</option>
              <option value="incoming">Incoming</option>
              <option value="outgoing">Outgoing</option>
            </select>
            <input id="companyFilter" class="inp" placeholder="Search company or global" />
          </div>
          <div class="mt-5 grid grid-cols-1 xl:grid-cols-[0.85fr_1.15fr] gap-5">
            <div class="card p-5">
              <h3 class="text-xl font-extrabold">Summary</h3>
              <div id="financeSummary" class="grid grid-cols-1 sm:grid-cols-3 xl:grid-cols-1 gap-3 mt-6"></div>
            </div>
            <div class="card p-5">
              <div class="flex justify-between gap-3">
                <h3 class="text-xl font-extrabold">Transactions</h3>
                <span id="txCount" class="muted text-sm"></span>
              </div>
              <div id="txRows" class="mt-4 space-y-3"></div>
            </div>
          </div>
        `
      );

      ["yearFilter", "typeFilter", "companyFilter"].forEach((id) => {
        $(id).addEventListener("input", drawFinance);
      });

      drawFinance();
    }

    function filteredTransactions() {
      const year = $("yearFilter")?.value || "all";
      const type = $("typeFilter")?.value || "all";
      const q = ($("companyFilter")?.value || "").toLowerCase();

      return state.transactions.filter((tx) => {
        const txYear = String(new Date(tx.transaction_date).getFullYear());
        const name = (companyName(tx.company_id) || tx.company_label || "Global Expense").toLowerCase();

        return (year === "all" || txYear === year)
          && (type === "all" || tx.type === type)
          && (!q || name.includes(q));
      });
    }

    function drawFinance() {
      const rows = filteredTransactions();
      const income = rows.filter((tx) => tx.type === "incoming").reduce((sum, tx) => sum + Number(tx.amount || 0), 0);
      const expenses = rows.filter((tx) => tx.type === "outgoing").reduce((sum, tx) => sum + Number(tx.amount || 0), 0);

      $("financeSummary").innerHTML = `
        <div class="card p-4"><div class="muted text-sm">Income</div><div class="text-2xl font-extrabold mt-1">${money(income)}</div></div>
        <div class="card p-4"><div class="muted text-sm">Expenses</div><div class="text-2xl font-extrabold mt-1">${money(expenses)}</div></div>
        <div class="card p-4"><div class="muted text-sm">Profit</div><div class="text-2xl font-extrabold mt-1">${money(income - expenses)}</div></div>
      `;

      $("txCount").textContent = `${rows.length} items`;
      $("txRows").innerHTML = rows.map((tx) => `
        <div class="card p-4">
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
            <div>
              <span class="tag">${esc(tx.type)}</span>
              <div class="mt-3 font-extrabold">${esc(companyName(tx.company_id) || tx.company_label || "Global Expense")} • ${esc(formatDate(tx.transaction_date))}</div>
              <div class="mt-1 text-sm muted">${esc(tx.description || "")}</div>
            </div>
            <div class="text-2xl font-extrabold">${money(tx.amount)}</div>
          </div>
        </div>
      `).join("");
    }

    window.saveTransaction = async function saveTransaction() {
      const companyId = $("txCompany").value || null;

      const payload = {
        type: $("txType").value,
        company_id: companyId,
        company_label: companyId ? companyName(companyId) : "Global Expense",

        transaction_date: $("txDate").value,

        alert("Amount and date are required.");

      const { error } = await sb
        .from("payments_transactions")
        .insert(payload);

      if (error) {
        alert(error.message);
        return;
      }

      await audit("add_transaction", "payments_transactions", payload.description, payload);
      closeModal();
      await loadAll();
      renderFinance();

    window.exportCSV = function exportCSV() {
      const rows = filteredTransactions();
      const csv = "Type,Company,Amount,Date,Description\n" + rows.map((tx) => {
        return [
          tx.type,
          companyName(tx.company_id) || tx.company_label,
          tx.amount,
          formatDate(tx.transaction_date),
          tx.description
        ].map((value) => `"${String(value ?? "").replaceAll('"', '""')}"`).join(",");
      }).join("\n");

      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
      a.download = "smartcore-finance.csv";
      a.click();
    };

    window.invoicePackageChanged = function invoicePackageChanged(select) {
      const company = state.companies.find((item) => item.id === $("invCompany").value);
      const pkg = company?.packages?.[Number(select.value)];
      const row = select.closest(".invoice-line");

      row.querySelector(".inv-price").value = price;

    window.generateInvoiceHtml = function generateInvoiceHtml() {
      const company = state.companies.find((item) => item.id === $("invCompany").value);
      if (!company) {
        alert("Select a company first.");
        return;
      }

      const lines = Array.from(document.querySelectorAll(".invoice-line")).map((row) => {
        const pkg = company.packages?.[Number(row.querySelector(".inv-package").value)] || {};
        const qty = Number(row.querySelector(".inv-qty").value || 1);
        const price = num(row.querySelector(".inv-price").value) || 0;
        return {
          description: pkg.name || "Package",
          qty,
          price,
          total: qty * price
        };
      });

      if (!lines.length) {
        alert("Add at least one package.");
        return;
      }

      const subtotal = lines.reduce((sum, line) => sum + line.total, 0);
      const taxPercent = Number($("invTax").value || 0);
      const tax = subtotal * (taxPercent / 100);
      const total = subtotal + tax;
      const invoiceNo = String(Math.floor(100000 + Math.random() * 900000));
      const invoiceDate = new Date();
      const dueDate = new Date(invoiceDate);
      dueDate.setDate(dueDate.getDate() + 3);

      const invoiceHtml = `
        <div style="background:white;color:#0b1020;font-family:Inter,Arial,sans-serif;padding:0;max-width:1000px;margin:auto;">
          <div style="display:flex;min-height:210px;">

    window.unlockVault = async function unlockVault() {
      try {

        sessionStorage.vaultSession = out.session_id || "unlocked";
        state.vaultUnlocked = true;
        resetVaultTimer();

        await loadVaultItems();
        renderVault();
      } catch (error) {
        alert(error.message);
      }

    async function loadVaultItems() {
      const out = await api("/api/vault-list", { session_id: sessionStorage.vaultSession });
      state.vaultItems = out.items || [];
    }

    function resetVaultTimer() {
      clearTimeout(state.vaultTimer);
      state.vaultTimer = setTimeout(() => {
        lockVault();
      }, 5 * 60 * 1000);
    }

    ["click", "keydown", "mousemove"].forEach((eventName) => {
      window.addEventListener(eventName, () => {

    function drawVault() {
      const showArchived = localStorage.showArchivedVault === "true";
      const items = state.vaultItems.filter((item) => !!item.archived === showArchived);

      if ($("vaultArchiveToggle")) {
        $("vaultArchiveToggle").textContent = showArchived ? "Show Active" : "Show Archived";

    function formatVaultDetails(details) {
      if (!details) return "";
      if (typeof details === "string") return details.replaceAll("\\n", "\n");
      if (details.text) return String(details.text).replaceAll("\\n", "\n");
      return JSON.stringify(details, null, 2).replaceAll("\\n", "\n");
    }

    function renderCalendar() {
      const cursor = state.calendarCursor;
      const year = cursor.getFullYear();
      const month = cursor.getMonth();
      const monthName = cursor.toLocaleDateString("en-GB", { month: "long", year: "numeric" });

      const first = new Date(year, month, 1);
      const start = new Date(first);
      const day = (first.getDay() + 6) % 7;
      start.setDate(first.getDate() - day);

      const cells = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        cells.push(d);
      }

      shell(
        "Calendar",
        "SmartCore shared company calendar.",
        `
          <button class="btn" onclick="moveCalendar(-1)">Previous</button>
          <button class="btn" onclick="moveCalendar(1)">Next</button>
          <button class="btn primary" onclick="openEventForm('${todayIso()}')">+ Add Event</button>
        `,
        `
          <div class="flex items-center justify-between gap-3 mb-5">
            <h2 class="text-2xl font-extrabold">${esc(monthName)}</h2>
          </div>
          <div class="grid grid-cols-7 gap-2 mb-2 text-center text-sm font-extrabold muted">
            <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-7 gap-2">
            ${cells.map((d) => {
              const iso = d.toISOString().slice(0, 10);
              const events = state.events.filter((event) => event.event_date === iso);
              const outside = d.getMonth() !== month;

              return `
                <button class="calendar-day ${outside ? "outside" : ""}" onclick="openDay('${iso}')">
                  <div class="font-extrabold">${d.getDate()}</div>
                  <div class="mt-3 space-y-1">
                    ${events.slice(0, 2).map((event) => `<div class="text-xs tag">${esc(event.title)}</div>`).join("")}
                    ${events.length > 2 ? `<div class="text-xs muted">+${events.length - 2} more</div>` : ""}
                  </div>
                </button>
              `;
            }).join("")}
          </div>
        `
      );
    }

        emergency_contact_1_name: $("stEc1Name").value.trim() || null,
        emergency_contact_1_relationship: $("stEc1Rel").value.trim() || null,
        emergency_contact_1_phone: $("stEc1Phone").value.trim() || null,
        emergency_contact_1_email: $("stEc1Email").value.trim() || null,
        emergency_contact_2_name: $("stEc2Name").value.trim() || null,
        emergency_contact_2_relationship: $("stEc2Rel").value.trim() || null,
        emergency_contact_2_phone: $("stEc2Phone").value.trim() || null,
        emergency_contact_2_email: $("stEc2Email").value.trim() || null,
        active: true,
        archived: false
      };

      if (!payload.full_name || !payload.work_email) {
        alert("Full name and work email are required.");
        return;
      }

      const result = id
        ? await sb.from("smartcore_staff").update(payload).eq("id", id)
        : await sb.from("smartcore_staff").insert(payload);

      if (result.error) {
        alert(result.error.message);
        return;
      }

      await audit(id ? "update_staff" : "add_staff", "smartcore_staff", id || payload.work_email, {});
      closeModal();
      await loadAll();
      renderStaff();
    };

    window.openStaffInvite = function openStaffInvite(id) {
      const staff = state.staffList.find((item) => item.id === id);

      openModal(
        "Send Onboarding Invite",
        "Choose where to send the invite.",
        `
          <div class="card p-5">
            <h3 class="text-xl font-extrabold">${esc(staff?.full_name || "Employee")}</h3>
            <p class="muted mt-2">Send the onboarding link to:</p>
            <div class="mt-5 flex flex-wrap gap-3">
              <button class="btn primary" onclick="sendStaffInvite('${id}', 'work')">Work Email</button>
              <button class="btn" onclick="sendStaffInvite('${id}', 'personal')">Personal Email</button>
            </div>
          </div>
        `
      );
    };

    window.sendStaffInvite = async function sendStaffInvite(id, target) {
      try {
        await api("/api/staff-invite", {
          staff_id: id,
          target
        });

        alert("Invite sent.");
        await audit("send_staff_invite", "smartcore_staff", id, { target });
        closeModal();
      } catch (error) {
        alert(error.message);
      }
    };

    window.archiveStaff = async function archiveStaff(id) {
      if (!confirm("Archive employee and disable login?")) return;

      const { error } = await sb
        .from("smartcore_staff")
        .update({ archived: true, active: false })
        .eq("id", id);

      if (error) {
        alert(error.message);
        return;
      }

      await audit("archive_staff", "smartcore_staff", id, {});
      await loadAll();
      renderStaff();
    };

    async function renderAudit() {
      if (!isOwner()) {
        renderDashboard();
        return;
      }

      shell(
        "Audit Logs",
        "Owner only. Easier to read activity records.",
        "",
        `<div id="auditRows" class="space-y-3">Loading...</div>`
      );

      const { data, error } = await sb
        .from("audit_logs")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(250);

      if (error) {
        $("auditRows").textContent = error.message;
        return;
      }

      $("auditRows").innerHTML = (data || []).map((row) => {
        const action = String(row.action || "")
          .replaceAll("_", " ")
          .replace(/\b\w/g, (letter) => letter.toUpperCase());

        const actor = row.actor_name
          ? `${row.actor_name} (${row.actor_email || ""})`
          : (row.actor_email || "Unknown");

        return `
          <div class="card p-4">
            <div class="font-extrabold text-lg">${esc(action)} - ${esc(formatDateTime(row.created_at))} • ${esc(actor)}</div>
            <pre class="mt-3 text-xs muted whitespace-pre-wrap">${esc(JSON.stringify(row.metadata || {}, null, 2))}</pre>
          </div>
        `;
      }).join("");
    }

    $("modalClose").addEventListener("click", closeModal);

    $("modal").addEventListener("click", (event) => {
      if (event.target === $("modal")) {
        closeModal();
      }
    });

    $("signOut").addEventListener("click", async () => {
      await audit("logout", "smartcore_staff", state.staff?.id, {});
      await sb.auth.signOut();
      location.href = "/";
    });

    init().catch((error) => {
      console.error(error);
      showFatal("HQ failed to load", error.message || String(error));
    });
  </script>
</body>
</html>
