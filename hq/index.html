<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="icon" type="image/png" href="/SmartCore Official Logos/SC Icon - Black Background.png" />
  <link rel="apple-touch-icon" href="/SmartCore Official Logos/SC Icon - Black Background.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    window.__SUPABASE_URL = "https://hjdpcfhozhoyeqevnupm.supabase.co";
    window.__SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmN1IiwicmVmIjoiaGpkcGNmaG96aG95ZXFldm51cG0iLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc2NjkxOTczNiwiZXhwIjoyMDgyNDk1NzM2fQ.BXosJO4NmEZOe73GXSGPa3z-i_4ZzF9zBAMBIf6Mkts";
  </script>

  <style>
    :root{
      --bg0:#020617;
      --bg1:#06153a;
      --panel:rgba(255,255,255,.065);
      --panel2:rgba(255,255,255,.045);
      --line:rgba(255,255,255,.12);
      --line2:rgba(255,255,255,.08);
      --text:#eaf0ff;
      --muted:rgba(234,240,255,.70);
      --muted2:rgba(234,240,255,.52);
      --blue:#3b82f6;
      --blue2:#2563eb;
      --green:#22c55e;
      --amber:#f59e0b;
      --red:#ef4444;
      --radius:22px;
      --shadow:0 26px 80px rgba(0,0,0,.46);
    }

    *{box-sizing:border-box}
    html{min-height:100%;scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        radial-gradient(900px 600px at 50% -10%, rgba(59,130,246,.20), transparent 62%),
        radial-gradient(1000px 800px at 80% 10%, rgba(45,100,255,.12), transparent 60%),
        linear-gradient(180deg,var(--bg0),var(--bg1));
      background-size:56px 56px,56px 56px,auto,auto,auto;
      overflow-x:hidden;
    }

    button,input,select,textarea{font:inherit}
    button{cursor:pointer;color:inherit}
    button:disabled{opacity:.55;cursor:not-allowed}

    .glass{
      background:linear-gradient(180deg, rgba(255,255,255,.085), rgba(255,255,255,.04));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .card{
      background:rgba(255,255,255,.055);
      border:1px solid var(--line2);
      border-radius:18px;
    }

    .muted{color:var(--muted)}
    .muted2{color:var(--muted2)}

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:.45rem;
      min-height:40px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.075);
      font-size:13px;
      font-weight:800;
      transition:background .12s ease, transform .12s ease, border-color .12s ease;
    }
    .btn:hover{background:rgba(255,255,255,.11);transform:translateY(-1px)}
    .btn.primary{background:linear-gradient(180deg,var(--blue),var(--blue2));border-color:rgba(255,255,255,.18)}
    .btn.danger{background:rgba(239,68,68,.78);border-color:rgba(255,255,255,.14)}
    .btn.ghost{background:transparent}

    .inp{
      width:100%;
      min-height:44px;
      padding:12px 13px;
      border-radius:15px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(2,6,23,.42);
      color:var(--text);
      outline:none;
    }
    .inp::placeholder{color:rgba(234,240,255,.38)}
    .inp:focus{border-color:rgba(59,130,246,.55);box-shadow:0 0 0 4px rgba(59,130,246,.13)}
    textarea.inp{min-height:120px;resize:vertical}
    label.small{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px}

    .tag{
      display:inline-flex;
      align-items:center;
      gap:7px;
      width:max-content;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.07);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
    }
    .dot{width:8px;height:8px;border-radius:999px;background:var(--green);box-shadow:0 0 0 4px rgba(34,197,94,.12)}
    .dot.amber{background:var(--amber);box-shadow:0 0 0 4px rgba(245,158,11,.12)}
    .dot.red{background:var(--red);box-shadow:0 0 0 4px rgba(239,68,68,.12)}

    .layout{max-width:1500px;margin:0 auto;padding:24px;display:grid;grid-template-columns:310px 1fr;gap:22px}
    @media(max-width:1000px){.layout{grid-template-columns:1fr}.side{position:static!important}}

    .side{position:sticky;top:92px;height:fit-content}
    .navBtn{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      text-align:left;
      gap:12px;
      padding:16px;
      border-radius:17px;
      border:1px solid rgba(255,255,255,.085);
      background:rgba(255,255,255,.052);
      transition:background .12s ease,border-color .12s ease,transform .12s ease;
    }
    .navBtn:hover,.navBtn.active{background:rgba(59,130,246,.16);border-color:rgba(59,130,246,.35);transform:translateY(-1px)}

    table{width:100%;border-collapse:collapse}
    th,td{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.075);text-align:left;vertical-align:top}
    th{font-size:12px;color:var(--muted);font-weight:900;letter-spacing:.04em;text-transform:uppercase}

    .modalBackdrop{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.68);padding:18px}
    .modalBackdrop.show{display:flex}
    .modalBox{width:min(1120px,100%);max-height:90vh;overflow:auto}

    .suggestBox{position:relative}
    .suggestResults{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:30;background:#071126;border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.45);display:none;overflow:hidden}
    .suggestResults.show{display:block}
    .suggestItem{padding:12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06)}
    .suggestItem:hover{background:rgba(255,255,255,.08)}

    .calendarGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
    .dayHead{text-align:center;font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .dayCell{min-height:125px;padding:12px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);text-align:left}
    .dayCell.out{opacity:.38}
    .dayCell.today{border-color:rgba(59,130,246,.55);box-shadow:0 0 0 4px rgba(59,130,246,.10)}
    .eventPill{display:block;margin-top:6px;padding:5px 7px;border-radius:9px;background:rgba(59,130,246,.16);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .codePane{display:grid;grid-template-columns:260px 1fr;gap:14px}
    @media(max-width:800px){.codePane{grid-template-columns:1fr}}
    .codeArea{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.55;white-space:pre;tab-size:2}
    .lineNums{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.55;text-align:right;color:rgba(234,240,255,.35);user-select:none;padding:12px;background:rgba(0,0,0,.18);border-radius:15px 0 0 15px;min-width:50px}
    .codeWrap{display:grid;grid-template-columns:auto 1fr;border:1px solid rgba(255,255,255,.10);border-radius:16px;overflow:hidden;background:rgba(2,6,23,.42)}
    .hidden{display:none!important}
  </style>
</head>
<body>
  <header class="sticky top-0 z-50 border-b border-white/10 bg-black/20 backdrop-blur-xl">
    <div class="max-w-[1500px] mx-auto px-6 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-10 h-10 rounded-2xl bg-black/30 border border-white/10 flex items-center justify-center overflow-hidden shrink-0">
          <img src="/SmartCore Official Logos/SC Icon - Black Background.png" class="w-8 h-8 object-contain" alt="SmartCore" onerror="this.style.display='none'" />
        </div>
        <div class="min-w-0">
          <div class="font-black tracking-wide leading-tight">SMARTCORE HQ</div>
          <div class="text-sm muted leading-tight">Internal Management System</div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span id="who" class="tag"><span class="dot amber"></span>Checking session...</span>
        <button id="signOut" class="btn">Sign out</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside class="side glass p-4">
      <div class="text-xs uppercase tracking-[.20em] muted px-2 mb-3 font-black">Modules</div>
      <div id="moduleNav" class="space-y-2"></div>
    </aside>
    <section id="content" class="min-h-[760px]"></section>
  </main>

  <div id="modal" class="modalBackdrop">
    <div class="modalBox glass p-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 id="modalTitle" class="text-3xl font-black tracking-tight"></h2>
          <p id="modalSub" class="muted mt-1"></p>
        </div>
        <button id="modalClose" class="btn">Close</button>
      </div>
      <div id="modalBody" class="mt-6"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const sb = window.supabase.createClient(window.__SUPABASE_URL, window.__SUPABASE_ANON);

    const state = {
      user: null,
      staff: null,
      module: 'dashboard',
      companies: [],
      staffList: [],
      transactions: [],
      events: [],
      vaultUnlocked: false,
      vaultItems: [],
      vaultTimer: null,
      calendarDate: new Date(),
      codeStoreCompanyId: null,
      codeStorePackageIndex: null,
      codeStore: { folders: [] }
    };

    const modules = [
      ['dashboard', 'Dashboard', 'Your profile and overview'],
      ['customers', 'Customer Portal Manager', 'Companies and packages'],
      ['finance', 'Payments & Finance', 'Admin only'],
      ['vault', 'Credentials Vault', 'Admin only'],
      ['calendar', 'Calendar', 'Shared calendar'],
      ['staff', 'Employee Management', 'Admin only'],
      ['audit', 'Audit Logs', 'Owner only']
    ];

    function esc(value){
      return String(value ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }

    function money(value){
      return '£' + Number(value || 0).toFixed(2);
    }

    function num(value){
      const cleaned = String(value || '').replace(/[^0-9.]/g, '');
      return cleaned ? Number(cleaned) : null;
    }

    function formatDate(value, withTime = false){
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      const date = d.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric' });
      if (!withTime) return date;
      const time = d.toLocaleTimeString('en-GB', { hour:'numeric', minute:'2-digit', hour12:true, timeZoneName:'short' });
      return `${date} at ${time}`;
    }

    function isAdmin(){
      return !!state.staff && (state.staff.is_admin === true || ['admin','owner'].includes(String(state.staff.role || '').toLowerCase()));
    }

    function isOwner(){
      return String(state.staff?.role || '').toLowerCase() === 'owner';
    }

    function showMessage(message){
      alert(message);
    }

    function openModal(title, subtitle, html){
      $('modalTitle').textContent = title;
      $('modalSub').textContent = subtitle || '';
      $('modalBody').innerHTML = html || '';
      $('modal').classList.add('show');
    }

    function closeModal(){
      $('modal').classList.remove('show');
      $('modalBody').innerHTML = '';
    }

    $('modalClose').onclick = closeModal;
    $('modal').addEventListener('click', (e) => {
      if (e.target === $('modal')) closeModal();
    });

    async function api(path, payload){
      const { data: { session } } = await sb.auth.getSession();
      const headers = { 'content-type': 'application/json' };
      if (session?.access_token) headers.authorization = 'Bearer ' + session.access_token;
      const res = await fetch(path, { method:'POST', headers, body: JSON.stringify(payload || {}) });
      const text = await res.text();
      let data = null;
      try { data = JSON.parse(text); } catch { data = { raw: text }; }
      if (!res.ok || data?.ok === false) throw new Error(data?.error || data?.raw || 'Request failed');
      return data || {};
    }

    async function init(){
      const { data: { user }, error: userError } = await sb.auth.getUser();
      if (userError || !user){
        window.location.href = '/';
        return;
      }

      state.user = user;

      let staffRes = await sb
        .from('smartcore_staff')
        .select('*')
        .eq('user_id', user.id)
        .maybeSingle();

      if ((!staffRes.data || staffRes.error) && user.email){
        staffRes = await sb
          .from('smartcore_staff')
          .select('*')
          .or(`email.eq.${user.email},work_email.eq.${user.email}`)
          .maybeSingle();
      }

      if (staffRes.error || !staffRes.data){
        console.error(staffRes.error);
        await sb.auth.signOut();
        window.location.href = '/';
        return;
      }

      const staff = staffRes.data;
      if (staff.active === false || staff.is_active === false || staff.archived === true){
        await sb.auth.signOut();
        window.location.href = '/';
        return;
      }

      state.staff = staff;
      $('who').innerHTML = `<span class="dot"></span>${esc(staff.full_name || user.email)}`;

      await loadAll();
      renderNav();
      renderDashboard();
      await audit('Login', 'smartcore_staff', staff.id, { page: 'hq' });
    }

    async function loadAll(){
      const companyQuery = sb.from('companies').select('*').order('created_at', { ascending:false });
      const staffQuery = sb.from('smartcore_staff').select('*').order('full_name', { ascending:true });
      const eventQuery = sb.from('calendar_events').select('*').order('event_date', { ascending:true });
      const txQuery = isAdmin()
        ? sb.from('payments_transactions').select('*').order('transaction_date', { ascending:false })
        : Promise.resolve({ data: [], error: null });

      const [companies, staffList, events, transactions] = await Promise.all([companyQuery, staffQuery, eventQuery, txQuery]);

      state.companies = companies.data || [];
      state.staffList = staffList.data || [];
      state.events = events.data || [];
      state.transactions = transactions.data || [];
    }

    async function audit(action, targetTable, targetId, metadata){
      try {
        await api('/api/audit-log', {
          action,
          target_table: targetTable,
          target_id: targetId,
          metadata: metadata || {}
        });
      } catch (e) {
        console.warn('Audit failed:', e.message);
      }
    }

    function availableModules(){
      return modules
        .filter(m => m[0] !== 'finance' || isAdmin())
        .filter(m => m[0] !== 'vault' || isAdmin())
        .filter(m => m[0] !== 'staff' || isAdmin())
        .filter(m => m[0] !== 'audit' || isOwner());
    }

    function renderNav(){
      $('moduleNav').innerHTML = availableModules().map(m => `
        <button class="navBtn ${state.module === m[0] ? 'active' : ''}" data-module="${m[0]}">
          <span>
            <span class="block font-black">${esc(m[1])}</span>
            <span class="block text-xs muted mt-1">${esc(m[2])}</span>
          </span>
          <span class="muted">›</span>
        </button>
      `).join('');

      document.querySelectorAll('[data-module]').forEach(btn => {
        btn.onclick = () => {
          state.module = btn.dataset.module;
          renderNav();
          renderCurrentModule();
        };
      });
    }

    function renderCurrentModule(){
      const map = {
        dashboard: renderDashboard,
        customers: renderCustomers,
        finance: renderFinance,
        vault: renderVault,
        calendar: renderCalendar,
        staff: renderStaff,
        audit: renderAudit
      };
      (map[state.module] || renderDashboard)();
    }

    function shell(title, subtitle, actions, body){
      $('content').innerHTML = `
        <div class="glass p-7 lg:p-9">
          <div class="flex flex-col xl:flex-row xl:items-start xl:justify-between gap-5">
            <div>
              <div class="text-xs uppercase tracking-[.20em] muted font-black">Module</div>
              <h1 class="mt-2 text-4xl lg:text-5xl font-black tracking-tight">${esc(title)}</h1>
              <p class="muted mt-3 text-base lg:text-lg max-w-4xl">${esc(subtitle)}</p>
            </div>
            <div class="flex flex-wrap gap-2">${actions || ''}</div>
          </div>
          <div class="mt-8">${body || ''}</div>
        </div>
      `;
    }

    function renderDashboard(){
      const s = state.staff || {};
      const stats = [
        ['Customers', state.companies.length],
        ['Staff', state.staffList.filter(x => !x.archived).length],
        ['Calendar Events', state.events.length],
        ['Transactions', state.transactions.length]
      ];

      shell(
        'SmartCore HQ',
        'Your profile, permissions and SmartCore management overview.',
        `<button class="btn primary" onclick="openMyProfileForm()">Edit My Profile</button>`,
        `
          <div class="grid xl:grid-cols-[1.15fr_.85fr] gap-6">
            <div class="card p-6 lg:p-7">
              <div class="flex items-start justify-between gap-4">
                <div>
                  <h2 class="text-3xl font-black tracking-tight">${esc(s.full_name || 'Your Profile')}</h2>
                  <p class="muted mt-1">${esc(s.job_title || 'SmartCore Team')}</p>
                </div>
                <span class="tag"><span class="dot"></span>${esc(s.role || 'employee')}</span>
              </div>

              <div class="grid md:grid-cols-2 gap-4 mt-7">
                ${profileTile('Work Email', s.work_email || s.email || state.user?.email)}
                ${profileTile('Personal Email', s.personal_email)}
                ${profileTile('Personal Phone', s.personal_phone)}
                ${profileTile('Employment Type', s.employment_type)}
                ${profileTile('Notice Period', s.notice_period)}
                ${profileTile('Start Date', formatDate(s.start_date))}
                ${profileTile('Permission', isOwner() ? 'Owner' : isAdmin() ? 'Admin' : 'Employee')}
                ${profileTile('Status', s.archived ? 'Archived' : 'Active')}
              </div>
            </div>

            <div class="grid sm:grid-cols-2 gap-4">
              ${stats.map(([label,value]) => `
                <div class="card p-6">
                  <div class="muted text-sm font-bold">${esc(label)}</div>
                  <div class="mt-2 text-4xl font-black">${esc(value)}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="mt-6 grid md:grid-cols-2 xl:grid-cols-3 gap-4">
            ${availableModules().filter(m => m[0] !== 'dashboard').map(m => `
              <button class="card p-6 text-left hover:bg-white/10 transition" onclick="goModule('${m[0]}')">
                <div class="text-2xl font-black leading-tight">${esc(m[1])}</div>
                <div class="muted mt-2">${esc(m[2])}</div>
              </button>
            `).join('')}
          </div>
        `
      );
    }

    function profileTile(label, value){
      return `
        <div class="card p-4">
          <div class="muted text-xs font-black uppercase tracking-wide">${esc(label)}</div>
          <div class="mt-1 font-bold break-words">${esc(value || 'Not set')}</div>
        </div>
      `;
    }

    window.goModule = (module) => {
      state.module = module;
      renderNav();
      renderCurrentModule();
    };

    window.openMyProfileForm = () => {
      const s = state.staff || {};
      openModal('Edit My Profile', 'Update your own SmartCore profile details.', `
        <div class="grid md:grid-cols-2 gap-4">
          <div><label class="small">Full Name</label><input id="meName" class="inp" value="${esc(s.full_name || '')}"></div>
          <div><label class="small">Job Title</label><input id="meJob" class="inp" value="${esc(s.job_title || '')}"></div>
          <div><label class="small">Personal Email</label><input id="mePersonal" class="inp" value="${esc(s.personal_email || '')}"></div>
          <div><label class="small">Personal Phone</label><input id="mePhone" class="inp" value="${esc(s.personal_phone || '')}"></div>
        </div>
        <button class="btn primary mt-5 w-full" onclick="saveMyProfile()">Save Profile</button>
      `);
    };

    window.saveMyProfile = async () => {
      const payload = {
        full_name: $('meName').value.trim(),
        job_title: $('meJob').value.trim() || null,
        personal_email: $('mePersonal').value.trim().toLowerCase() || null,
        personal_phone: $('mePhone').value.trim() || null
      };
      const { error } = await sb.from('smartcore_staff').update(payload).eq('id', state.staff.id);
      if (error) return showMessage(error.message);
      await audit('Update Profile', 'smartcore_staff', state.staff.id, {});
      closeModal();
      await loadAll();
      state.staff = { ...state.staff, ...payload };
      $('who').innerHTML = `<span class="dot"></span>${esc(state.staff.full_name || state.user.email)}`;
      renderDashboard();
    };

    function companyName(id){
      return state.companies.find(c => String(c.id) === String(id))?.company_name || 'Global Expense';
    }

    function defaultWorkingHours(){
      return {
        monday: { open: true, start: '09:00', end: '17:00' },
        Tuesday: { open: true, start: '09:00', end: '17:00' },
        wednesday: { open: true, start: '09:00', end: '17:00' },
        thursday: { open: true, start: '09:00', end: '17:00' },
        friday: { open: true, start: '09:00', end: '17:00' },
        saturday: { open: false, start: '', end: '' },
        sunday: { open: false, start: '', end: '' }
      };
    }

    function renderCustomers(){
      shell(
        'Customer Portal Manager',
        'Manage customer company details, support details and SmartCore packages.',
        `<button class="btn primary" onclick="openCompanyForm()">+ Add New Company</button>`,
        `
          <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
            <input id="companySearch" class="inp max-w-xl" placeholder="Search customers...">
            <span class="tag"><span class="dot"></span>${state.companies.length} customers</span>
          </div>
          <div class="mt-5 overflow-auto card">
            <table>
              <thead><tr><th>Company</th><th>Primary Contact</th><th>Email</th><th>Phone</th><th>Packages</th><th>Actions</th></tr></thead>

            </table>
          </div>

      );
      $('companySearch').oninput = drawCompanies;
      drawCompanies();
    }

    function drawCompanies(){
      const q = ($('companySearch')?.value || '').toLowerCase();
      const rows = state.companies.filter(c => !q || JSON.stringify(c).toLowerCase().includes(q));
      $('companyRows').innerHTML = rows.map(c => `
        <tr>
          <td><b>${esc(c.company_name)}</b><br><span class="text-xs muted">${esc(c.website || '')}</span></td>
          <td>${esc(c.primary_contact_name || '')}</td>
          <td>${esc(c.primary_contact_email || '')}</td>
          <td>${esc(c.primary_contact_phone || '')}</td>

    window.openCompanyForm = (id = '') => {
      const c = id ? state.companies.find(x => String(x.id) === String(id)) : {};
      const hours = c?.working_hours || defaultWorkingHours();

      openModal(id ? 'Edit Company' : 'Add New Company', 'Customer details, support details and SmartCore packages.', `

          <div><label class="small">Company Name *</label><input id="fCompany" class="inp" value="${esc(c?.company_name || '')}"></div>
          <div><label class="small">Approx Staff Count</label><input id="fStaff" class="inp" type="number" value="${esc(c?.approx_staff_count || '')}"></div>
          <div><label class="small">Website</label><input id="fWebsite" class="inp" value="${esc(c?.website || '')}"></div>
          <div><label class="small">Address</label><input id="fAddress" class="inp" value="${esc(c?.address || '')}"></div>
          <div class="lg:col-span-2"><label class="small">Notes</label><textarea id="fNotes" class="inp">${esc(c?.notes || '')}</textarea></div>
        </div>

        <h3 class="mt-7 text-2xl font-black">Working Hours</h3>
        <div class="grid md:grid-cols-2 xl:grid-cols-4 gap-3 mt-3" id="hoursGrid">

        <div class="grid lg:grid-cols-2 gap-4 mt-3">

          <div><label class="small">Primary Contact Email</label><input id="fContactEmail" class="inp" value="${esc(c?.primary_contact_email || '')}"></div>
          <div><label class="small">Primary Contact Phone</label><input id="fContactPhone" class="inp" value="${esc(c?.primary_contact_phone || '')}"></div>
          <div><label class="small">Accounts Team Email</label><input id="fAccounts" class="inp" value="${esc(c?.accounts_team_email || '')}"></div>
          <div><label class="small">Support Team Email</label><input id="fSupport" class="inp" value="${esc(c?.support_team_email || '')}"></div>
        </div>

        <h3 class="mt-7 text-2xl font-black">SmartCore Packages</h3>
        <div id="packagesBox" class="space-y-4 mt-3">
          ${(c?.packages || []).map((p, i) => packageCard(p, i)).join('')}
        </div>
        <button class="btn primary mt-4" onclick="addPackageCard()">+ Add Package</button>
        <button class="btn primary mt-7 w-full" onclick="saveCompany('${id}')">Save Company</button>
      `);
    };

    function renderHoursInputs(hours){
      const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
      return days.map(day => {
        const val = hours?.[day] || (day === 'saturday' || day === 'sunday'
          ? { open:false, start:'', end:'' }
          : { open:true, start:'09:00', end:'17:00' });
        return `
          <div class="card p-4" data-day="${day}">
            <label class="flex items-center gap-2 font-black capitalize">
              <input type="checkbox" class="hOpen" ${val.open ? 'checked' : ''}> ${day}
            </label>
            <div class="grid grid-cols-2 gap-2 mt-3">
              <input class="inp hStart" type="time" value="${esc(val.start || '')}">
              <input class="inp hEnd" type="time" value="${esc(val.end || '')}">
            </div>
          </div>
        `;
      }).join('');
    }

    function collectHours(){
      const out = {};
      document.querySelectorAll('[data-day]').forEach(card => {
        const day = card.dataset.day;
        out[day] = {
          open: card.querySelector('.hOpen').checked,
          start: card.querySelector('.hStart').value || '',
          end: card.querySelector('.hEnd').value || ''
        };
      });
      return out;
    }

    function packageCard(p = {}, index = Date.now()){
      return `
        <div class="card p-5 packageCard" data-index="${index}">
          <div class="grid lg:grid-cols-2 gap-4">
            <div><label class="small">Package Name</label><input class="inp pkgName" value="${esc(p.name || '')}"></div>
            <div><label class="small">Package Type</label><select class="inp pkgType"><option value="website">Website</option><option value="system">System</option><option value="other">Other</option></select></div>
            <div><label class="small">Lead Developer</label>${staffSuggest('pkgLead', p.lead_developer_id || '')}</div>
            <div><label class="small">Developers</label>${developerMulti(p.developer_ids || [])}</div>
          </div>
          <div class="mt-4 flex flex-wrap gap-2">
            <button class="btn" onclick="openCodeStorage(this)">Open Code Storage</button>
            <button class="btn danger" onclick="this.closest('.packageCard').remove()">Remove Package</button>
          </div>
          <div class="grid md:grid-cols-3 gap-4 mt-4">
            ${paymentBlock('monthly', p)}
            ${paymentBlock('yearly', p)}
            ${paymentBlock('one_time', p)}
          </div>
        </div>
      `;
    }

    function paymentBlock(type, p){
      const label = type === 'one_time' ? 'One Time' : type.charAt(0).toUpperCase() + type.slice(1);
      const choices = p.payment_choices || [];
      const checked = choices.includes(type);
      const feeKey = type === 'one_time' ? 'one_time_fee' : `${type}_fee`;
      const dateKey = type === 'one_time' ? 'one_time_first_date' : `${type}_first_date`;
      return `
        <div class="card p-4">
          <label class="font-black flex items-center gap-2"><input type="checkbox" class="payChoice" data-type="${type}" ${checked ? 'checked' : ''}> ${label}</label>
          <input class="inp mt-3 payFee" data-type="${type}" placeholder="£ Fee" value="${esc(p[feeKey] || '')}">
          <input class="inp mt-3 payDate" data-type="${type}" type="date" value="${esc(p[dateKey] || '')}">
        </div>
      `;
    }

    function staffSuggest(className, selectedId){
      const selected = state.staffList.find(s => s.id === selectedId);
      return `
        <div class="suggestBox">
          <input class="inp staffSuggest ${className}" data-selected-id="${esc(selectedId)}" value="${esc(selected?.full_name || '')}" placeholder="Start typing a name...">
          <div class="suggestResults"></div>
        </div>
      `;
    }

    function developerMulti(selectedIds){
      const chips = selectedIds.map(id => {
        const s = state.staffList.find(x => x.id === id);
        return s ? `<span class="tag devChip" data-id="${s.id}">${esc(s.full_name)} <button onclick="this.closest('.devChip').remove()">×</button></span>` : '';
      }).join('');
      return `
        <div class="developerBox">
          <div class="flex flex-wrap gap-2 mb-2 devChips">${chips}</div>
          <div class="suggestBox">
            <input class="inp developerSuggest" placeholder="Start typing developer name...">
            <div class="suggestResults"></div>
          </div>
        </div>
      `;
    }

    document.addEventListener('input', (e) => {
      if (e.target.classList.contains('staffSuggest')) handleStaffSuggest(e.target, false);
      if (e.target.classList.contains('developerSuggest')) handleStaffSuggest(e.target, true);
      if (e.target.id === 'vaultSearch') renderVaultList();
    });

    function handleStaffSuggest(input, multi){
      const box = input.closest('.suggestBox');
      const results = box.querySelector('.suggestResults');
      const q = input.value.trim().toLowerCase();
      if (!q){ results.classList.remove('show'); return; }
      const matches = state.staffList.filter(s => String(s.full_name || '').toLowerCase().includes(q) || String(s.work_email || s.email || '').toLowerCase().includes(q)).slice(0, 8);
      results.innerHTML = matches.map(s => `<div class="suggestItem" data-id="${s.id}" data-name="${esc(s.full_name)}">${esc(s.full_name)}<br><span class="text-xs muted">${esc(s.work_email || s.email || '')}</span></div>`).join('');
      results.classList.add('show');
      results.querySelectorAll('.suggestItem').forEach(item => {
        item.onclick = () => {
          if (multi){
            const devBox = input.closest('.developerBox');
            const chips = devBox.querySelector('.devChips');
            if ([...chips.querySelectorAll('.devChip')].some(c => c.dataset.id === item.dataset.id)) return;
            if (chips.querySelectorAll('.devChip').length >= 50) return showMessage('You can only add up to 50 developers.');
            chips.insertAdjacentHTML('beforeend', `<span class="tag devChip" data-id="${item.dataset.id}">${esc(item.dataset.name)} <button onclick="this.closest('.devChip').remove()">×</button></span>`);
            input.value = '';
          } else {
            input.value = item.dataset.name;
            input.dataset.selectedId = item.dataset.id;
          }
          results.classList.remove('show');
        };
      });
    }

    window.addPackageCard = () => {
      $('packagesBox').insertAdjacentHTML('beforeend', packageCard({}, Date.now()));
    };

    function collectPackages(){
      return [...document.querySelectorAll('.packageCard')].map(card => {
        const payment_choices = [...card.querySelectorAll('.payChoice')].filter(x => x.checked).map(x => x.dataset.type);
        const lead = card.querySelector('.pkgLead');
        const packageData = {
          name: card.querySelector('.pkgName').value.trim(),
          package_type: card.querySelector('.pkgType').value,
          lead_developer_id: lead?.dataset.selectedId || null,
          developer_ids: [...card.querySelectorAll('.devChip')].map(c => c.dataset.id),
          code_store: card._codeStore || { folders: [] },
          payment_choices,
          monthly_fee: null,
          yearly_fee: null,
          one_time_fee: null,
          monthly_first_date: null,
          yearly_first_date: null,
          one_time_first_date: null
        };
        card.querySelectorAll('.payFee').forEach(i => {
          const key = i.dataset.type === 'one_time' ? 'one_time_fee' : `${i.dataset.type}_fee`;
          packageData[key] = num(i.value);
        });
        card.querySelectorAll('.payDate').forEach(i => {
          const key = i.dataset.type === 'one_time' ? 'one_time_first_date' : `${i.dataset.type}_first_date`;
          packageData[key] = i.value || null;
        });
        return packageData;
      }).filter(p => p.name);
    }

    window.openCodeStorage = (button) => {
      const card = button.closest('.packageCard');
      if (!card._codeStore) card._codeStore = { folders: [] };
      state.codeStore = card._codeStore;
      openModal('Code Storage', 'Store folders, files and full code with line numbers.', `
        <div class="codePane">
          <div class="card p-4">
            <div class="flex gap-2"><button class="btn primary" onclick="addCodeFolder()">+ Folder</button><button class="btn" onclick="addCodeFile()">+ File</button></div>
            <div id="codeTree" class="mt-4 space-y-2"></div>
          </div>
          <div class="card p-4">
            <label class="small">File Name</label>
            <input id="codeFileName" class="inp" placeholder="example.js">
            <label class="small mt-4">File Contents</label>
            <div class="codeWrap mt-2">
              <div id="lineNumbers" class="lineNums">1</div>
              <textarea id="codeText" class="inp codeArea" style="border:0;border-radius:0;min-height:420px" spellcheck="false"></textarea>
            </div>
            <button class="btn primary mt-4" onclick="saveCodeFile()">Save File</button>
          </div>
        </div>
      `);
      renderCodeTree();
      bindLineNumbers();
    };

    function bindLineNumbers(){
      const txt = $('codeText');
      const nums = $('lineNumbers');
      if (!txt || !nums) return;
      txt.oninput = () => {
        const count = txt.value.split('\n').length || 1;
        nums.textContent = Array.from({ length: count }, (_, i) => i + 1).join('\n');
      };
    }

    window.addCodeFolder = () => {
      const name = prompt('Folder name');
      if (!name) return;
      state.codeStore.folders.push({ name, files: [] });
      renderCodeTree();
    };

    window.addCodeFile = () => {
      if (!state.codeStore.folders.length) state.codeStore.folders.push({ name: 'root', files: [] });
      const folder = state.codeStore.folders[0];
      folder.files.push({ name: 'new-file.js', contents: '' });
      renderCodeTree();
    };

    function renderCodeTree(){
      $('codeTree').innerHTML = state.codeStore.folders.map((f, fi) => `
        <div class="card p-3">
          <b>/${esc(f.name)}</b>
          <div class="mt-2 space-y-1">
            ${(f.files || []).map((file, idx) => `<button class="btn w-full justify-start" onclick="loadCodeFile(${fi},${idx})">${esc(file.name)}</button>`).join('') || '<div class="text-sm muted">No files yet.</div>'}
          </div>
        </div>
      `).join('') || '<p class="muted">No folders yet.</p>';
    }

    window.loadCodeFile = (fi, idx) => {
      const file = state.codeStore.folders[fi].files[idx];
      $('codeFileName').value = file.name;
      $('codeText').value = file.contents || '';
      $('codeText').dataset.fi = fi;
      $('codeText').dataset.idx = idx;
      $('codeText').dispatchEvent(new Event('input'));
    };

    window.saveCodeFile = () => {
      let fi = Number($('codeText').dataset.fi || 0);
      let idx = $('codeText').dataset.idx;
      if (!state.codeStore.folders.length) state.codeStore.folders.push({ name:'root', files:[] });
      if (idx === undefined || idx === ''){
        state.codeStore.folders[fi].files.push({ name:$('codeFileName').value || 'new-file.js', contents:$('codeText').value || '' });
      } else {
        state.codeStore.folders[fi].files[Number(idx)] = { name:$('codeFileName').value || 'new-file.js', contents:$('codeText').value || '' };
      }
      renderCodeTree();
      showMessage('Code file saved. Remember to save the company as well.');
    };

    window.saveCompany = async (id) => {
      const payload = {
        company_name: $('fCompany').value.trim(),
        approx_staff_count: num($('fStaff').value),
        website: $('fWebsite').value.trim() || null,
        address: $('fAddress').value.trim() || null,
        notes: $('fNotes').value.trim() || null,
        working_hours: collectHours(),
        primary_contact_name: $('fContact').value.trim(),
        primary_contact_email: $('fContactEmail').value.trim() || null,
        primary_contact_phone: $('fContactPhone').value.trim() || null,
        accounts_team_email: $('fAccounts').value.trim() || null,
        support_team_email: $('fSupport').value.trim() || null,
        packages: collectPackages()
      };

      if (!payload.company_name || !payload.primary_contact_name) return showMessage('Company name and primary contact name are required.');

      const res = id
        ? await sb.from('companies').update(payload).eq('id', id)
        : await sb.from('companies').insert(payload).select('id').single();

      if (res.error) return showMessage(res.error.message);

      await addPackagePaymentEvents(res.data?.id || id, payload.company_name, payload.packages);
      await audit(id ? 'Update Company' : 'Add Company', 'companies', id || res.data?.id, {});
      closeModal();
      await loadAll();
      renderCustomers();
    };

    async function addPackagePaymentEvents(companyId, companyNameValue, packages){
      const rows = [];
      packages.forEach(pkg => {
        ['monthly','yearly','one_time'].forEach(type => {
          if (!pkg.payment_choices.includes(type)) return;
          const dateKey = type === 'one_time' ? 'one_time_first_date' : `${type}_first_date`;
          const first = pkg[dateKey];
          if (!first) return;
          const start = new Date(first + 'T12:00:00');
          const loops = type === 'one_time' ? 1 : type === 'monthly' ? 24 : 5;
          for (let i = 0; i < loops; i++){
            const d = new Date(start);
            if (type === 'monthly') d.setMonth(d.getMonth() + i);
            if (type === 'yearly') d.setFullYear(d.getFullYear() + i);
            rows.push({
              title: `${companyNameValue} - ${pkg.name} ${type.replace('_',' ')} payment`,
              event_date: d.toISOString().slice(0,10),
              all_day: true,
              description: `Scheduled ${type} payment for ${pkg.name}`,
              company_id: companyId,
              created_by: state.user.id
            });
          }
        });
      });
      if (rows.length) await sb.from('calendar_events').insert(rows);
    }

    window.deleteCompany = async (id) => {
      if (!confirm('Delete this company?')) return;
      const { error } = await sb.from('companies').delete().eq('id', id);
      if (error) return showMessage(error.message);
      await audit('Delete Company', 'companies', id, {});
      await loadAll();
      renderCustomers();
    };

    function renderFinance(){
      if (!isAdmin()) return renderDashboard();
      shell(
        'Payments & Finance',
        'Track income, expenses, profit and invoices.',
        `<button class="btn" onclick="exportCSV()">Export CSV</button><button class="btn primary" onclick="openTransactionForm()">+ Add Transaction</button><button class="btn primary" onclick="openInvoiceForm()">Generate Invoice</button>`,
        `
          <div class="grid md:grid-cols-3 gap-3">
            <select id="yearFilter" class="inp"><option value="all">All time</option>${[...new Set(state.transactions.map(t => new Date(t.transaction_date).getFullYear()).filter(Boolean))].sort((a,b) => b - a).map(y => `<option>${y}</option>`).join('')}</select>
            <select id="typeFilter" class="inp"><option value="all">All</option><option value="incoming">Incoming</option><option value="outgoing">Outgoing</option></select>
            <input id="financeCompanySearch" class="inp" placeholder="Search company or global...">
          </div>
          <div class="grid xl:grid-cols-[.9fr_1.1fr] gap-5 mt-6">
            <div class="card p-6"><h3 class="text-2xl font-black">Summary</h3><div id="financeSummary" class="grid sm:grid-cols-3 xl:grid-cols-1 gap-3 mt-6"></div></div>
            <div class="card p-6"><div class="flex justify-between gap-3"><h3 class="text-2xl font-black">Transactions</h3><span id="txCount" class="tag"></span></div><div id="txRows" class="mt-4 space-y-3"></div></div>
          </div>
        `
      );
      ['yearFilter','typeFilter','financeCompanySearch'].forEach(id => $(id).oninput = drawFinance);
      drawFinance();
    }

    function filteredTx(){
      const year = $('yearFilter')?.value || 'all';
      const type = $('typeFilter')?.value || 'all';
      const q = ($('financeCompanySearch')?.value || '').toLowerCase();
      return state.transactions.filter(t => {
        const yOk = year === 'all' || String(new Date(t.transaction_date).getFullYear()) === String(year);
        const tOk = type === 'all' || t.type === type;
        const name = companyName(t.company_id) || t.company_label || '';
        const qOk = !q || name.toLowerCase().includes(q) || String(t.description || '').toLowerCase().includes(q);
        return yOk && tOk && qOk;
      });
    }

    function drawFinance(){
      const rows = filteredTx();
      const income = rows.filter(t => t.type === 'incoming').reduce((s,t) => s + Number(t.amount || 0), 0);
      const expenses = rows.filter(t => t.type === 'outgoing').reduce((s,t) => s + Number(t.amount || 0), 0);
      $('financeSummary').innerHTML = `
        ${profileTile('Income', money(income))}
        ${profileTile('Expenses', money(expenses))}
        ${profileTile('Profit', money(income - expenses))}
      `;
      $('txCount').textContent = `${rows.length} items`;
      $('txRows').innerHTML = rows.map(t => `
        <div class="card p-4">
          <div class="flex items-start justify-between gap-4">
            <div>
              <span class="tag"><span class="dot ${t.type === 'outgoing' ? 'red' : ''}"></span>${esc(t.type)}</span>
              <div class="mt-3 font-black">${esc(companyName(t.company_id) || t.company_label || 'Global Expense')} • ${esc(formatDate(t.transaction_date))}</div>
              <div class="muted text-sm mt-1">${esc(t.description || '')}</div>
            </div>
            <div class="text-2xl font-black">${money(t.amount)}</div>
          </div>
        </div>
      `).join('') || '<p class="muted">No transactions found.</p>';
    }

    window.openTransactionForm = () => {
      openModal('Add Transaction', 'Add incoming income or outgoing expense.', `
        <div class="grid md:grid-cols-2 gap-4">
          <div><label class="small">Type</label><select id="txType" class="inp"><option value="incoming">Incoming</option><option value="outgoing">Outgoing</option></select></div>
          <div><label class="small">Company</label><select id="txCompany" class="inp"><option value="">Global Expense</option>${state.companies.map(c => `<option value="${c.id}">${esc(c.company_name)}</option>`).join('')}</select></div>
          <div><label class="small">Amount GBP</label><input id="txAmount" class="inp" inputmode="decimal" placeholder="£0.00"></div>
          <div><label class="small">Date of Transaction</label><input id="txDate" class="inp" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="md:col-span-2"><label class="small">Description</label><textarea id="txDesc" class="inp"></textarea></div>
        </div>
        <button class="btn primary mt-5 w-full" onclick="saveTransaction()">Save Transaction</button>
      `);
    };

    window.saveTransaction = async () => {
      const companyId = $('txCompany').value || null;
      const payload = {
        type: $('txType').value,
        company_id: companyId,
        company_label: companyId ? companyName(companyId) : 'Global Expense',
        amount: num($('txAmount').value),
        transaction_date: $('txDate').value,
        description: $('txDesc').value.trim() || null
      };
      if (!payload.amount || !payload.transaction_date) return showMessage('Amount and date are required.');
      const { error } = await sb.from('payments_transactions').insert(payload);
      if (error) return showMessage(error.message);
      await audit('Add Transaction', 'payments_transactions', payload.description, payload);
      closeModal();
      await loadAll();
      renderFinance();
    };

    window.exportCSV = () => {
      const rows = filteredTx();
      const csv = 'Type,Company,Amount,Date,Description\n' + rows.map(t => [t.type, companyName(t.company_id) || t.company_label, t.amount, formatDate(t.transaction_date), t.description].map(v => `"${String(v ?? '').replaceAll('"','""')}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv' }));
      a.download = 'smartcore-finance.csv';
      a.click();

    window.openInvoiceForm = () => {
      openModal('Generate Invoice', 'Create a print-ready SmartCore invoice.', `
        <div class="grid md:grid-cols-2 gap-4">
          <div><label class="small">Company</label><select id="invCompany" class="inp" onchange="renderInvoicePackageOptions()"><option value="">Select company...</option>${state.companies.map(c => `<option value="${c.id}">${esc(c.company_name)}</option>`).join('')}</select></div>
          <div><label class="small">Billing Address</label><input id="invAddress" class="inp" placeholder="Company billing address"></div>

      const price = p.one_time_fee || p.yearly_fee || p.monthly_fee || 0;

    function nextInvoiceNo(){
      return String(Math.floor(100000 + Math.random() * 900000));
    }

    function addWorkingDays(date, days){
      const d = new Date(date);
      let added = 0;
      while (added < days){
        d.setDate(d.getDate() + 1);
        if (d.getDay() !== 0 && d.getDay() !== 6) added++;
      }
      return d;
    }

    window.generateInvoice = () => {
      const company = state.companies.find(x => x.id === $('invCompany').value);
      if (!company) return showMessage('Select a company first.');
      const invoiceDate = new Date();
      const dueDate = addWorkingDays(invoiceDate, 3);
      const taxRate = Number($('invTax').value || 0);
      const items = [...document.querySelectorAll('.invoiceItem')].map(row => {
        const pkg = company.packages?.[Number(row.querySelector('.invoicePackage').value)];
        return {
          description: pkg?.name || 'Package',
          qty: Number(row.querySelector('.invoiceQty').value || 1),
          price: num(row.querySelector('.invoicePrice').value) || 0
        };
      }).filter(i => i.description && i.price);
      const subtotal = items.reduce((s,i) => s + (i.qty * i.price), 0);
      const tax = subtotal * (taxRate / 100);
      const total = subtotal + tax;
      const html = invoiceHtml(company, $('invAddress').value || company.address || '', nextInvoiceNo(), invoiceDate, dueDate, items, subtotal, tax, total, taxRate);
      const w = window.open('', '_blank');
      w.document.write(html);
      w.document.close();

rtcoretechnology.co.uk</p></div></div></div><div class="invoiceTitle">Invoice</div><div class="details"><div class="billed"><div>Billed To:</div><h2>${esc(company.company_name)}</h2><div>${esc(address).replaceAll('\n','<br>')}</div></div><div class="meta"><div>Invoice No: <b style="float:right">${no}</b></div><div>Invoice Date: <b style="float:right">${formatDate(invoiceDate)}</b></div><div>Due Date: <b style="float:right">${formatDate(dueDate)}</b></div></div></div><div class="dueBar">Total Due:<b>${money(total)}</b></div><div class="items"><table><thead><tr><th>Description</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>${items.map(i => `<tr><td><b>${esc(i.description)}</b></td><td>${i.qty}</td><td>${money(i.price)}</td><td>${money(i.qty*i.price)}</td></tr>`).join('')}</tbody></table></div><div class="bottomLine"></div><div class="footer"><div><h2>Payment Method:</h2><div class="pay">Account No: 12635966<br>Sort Code: 11-00-46<br>Account Name: Finley Hassall<br>(SmartCore)</div><div class="contact">☎ +44 7407 494423<br>🌐 www.smartcoretechnology.co.uk</div></div><div><div class="meta"><div>Subtotal: <b style="float:right">${money(subtotal)}</b></div><div>Tax (${taxRate}%): <b style="float:right">${money(tax)}</b></div></div><div class="totalBox"><span>Total Amount:</span><span>${money(total)}</span></div><h2 style="margin-top:70px">Term and Conditions:</h2><div class="terms">Payment is due within 3 working calendar days of the invoice date unless otherwise agreed in writing. Failure to make payment within this period may result in suspension or removal of access to any associated systems, websites, hosting, or services provided by SmartCore Technology until the outstanding balance has been paid in full.<br><br>SmartCore Technology reserves the right to pause support, maintenance, and online services for overdue accounts.</div></div></div></div></body></html>`;

    function drawCalendarGrid(){
      const grid = $('calendarGrid');
      const todayKey = new Date().toISOString().slice(0,10);
      const y = state.calendarDate.getFullYear();
      const m = state.calendarDate.getMonth();
      const first = new Date(y, m, 1);
      const start = new Date(first);
      start.setDate(start.getDate() - ((first.getDay() + 6) % 7));
      const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      let html = days.map(x => `<div class="dayHead">${x}</div>`).join('');
      for (let i = 0; i < 42; i++){
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const key = d.toISOString().slice(0,10);
        const events = state.events.filter(e => e.event_date === key);
        html += `
          <button class="dayCell ${d.getMonth() !== m ? 'out' : ''} ${key === todayKey ? 'today' : ''}" onclick="openDay('${key}')">
            <div class="font-black">${d.getDate()}</div>
            ${events.slice(0,3).map(e => `<span class="eventPill">${esc(e.title)}</span>`).join('')}
            ${events.length > 3 ? `<span class="eventPill">+${events.length - 3} more</span>` : ''}
          </button>
        `;
      }
      grid.innerHTML = html;
    }

        emergency_contact_1_email: $('stEc1Email').value.trim() || null,
        emergency_contact_2_name: $('stEc2Name').value.trim() || null,
        emergency_contact_2_relationship: $('stEc2Rel').value.trim() || null,
        emergency_contact_2_phone: $('stEc2Phone').value.trim() || null,
        emergency_contact_2_email: $('stEc2Email').value.trim() || null
      };
      if (!payload.full_name || !payload.work_email) return showMessage('Full name and work email are required.');
      const res = id ? await sb.from('smartcore_staff').update(payload).eq('id', id) : await sb.from('smartcore_staff').insert(payload);
      if (res.error) return showMessage(res.error.message);
      await audit(id ? 'Update Staff' : 'Add Staff', 'smartcore_staff', id || payload.work_email, {});
      closeModal();
      await loadAll();
      renderStaff();
    };

    window.openInviteStaff = (id) => {
      const s = state.staffList.find(x => String(x.id) === String(id));
      openModal('Send Onboarding Invite', 'Choose where to send the staff onboarding email.', `
        <div class="space-y-3">
          <button class="btn primary w-full" onclick="sendStaffInvite('${id}','work')">Send to Work Email<br><span class="font-normal">${esc(s.work_email || s.email || '')}</span></button>
          <button class="btn w-full" onclick="sendStaffInvite('${id}','personal')">Send to Personal Email<br><span class="font-normal">${esc(s.personal_email || 'Not set')}</span></button>
        </div>
      `);
    };

    window.sendStaffInvite = async (id, target) => {
      try {
        await api('/api/staff-invite', { staff_id: id, target });
        await audit('Send Staff Invite', 'smartcore_staff', id, { target });
        closeModal();
        showMessage('Invite sent.');
      } catch (e) {
        showMessage(e.message);
      }
    };

    window.archiveStaff = async (id) => {
      if (!confirm('Archive employee and disable login?')) return;
      const { error } = await sb.from('smartcore_staff').update({ archived:true, active:false, is_active:false }).eq('id', id);
      if (error) return showMessage(error.message);
      await audit('Archive Staff', 'smartcore_staff', id, {});
      await loadAll();
      renderStaff();
    };

    async function renderAudit(){
      if (!isOwner()) return renderDashboard();
      shell('Audit Logs', 'Owner only. Easy-to-read record of important actions.', '', `<div id="auditRows" class="space-y-3">Loading...</div>`);
      const { data, error } = await sb.from('audit_logs').select('*').order('created_at', { ascending:false }).limit(250);
      if (error){ $('auditRows').textContent = error.message; return; }
      $('auditRows').innerHTML = (data || []).map(a => {
        const label = String(a.action || '').replaceAll('_',' ').replace(/\b\w/g, c => c.toUpperCase());
        const actor = a.actor_name || a.actor_email || 'Unknown user';
        const email = a.actor_email ? ` (${a.actor_email})` : '';
        return `<div class="card p-4"><b>${esc(label)}</b> - <span class="muted">${esc(formatDate(a.created_at, true))} • ${esc(actor)}${esc(email)}</span><pre class="mt-3 text-xs muted whitespace-pre-wrap">${esc(JSON.stringify(a.metadata || {}, null, 2))}</pre></div>`;
      }).join('') || '<p class="muted">No audit logs yet.</p>';
    }

    $('signOut').onclick = async () => {
      await audit('Logout', 'smartcore_staff', state.staff?.id, {});
      await sb.auth.signOut();
      window.location.href = '/';
    };

    init().catch(err => {
      console.error(err);
      $('content').innerHTML = `<div class="glass p-7"><h1 class="text-3xl font-black">HQ failed to load</h1><p class="muted mt-2">${esc(err.message || err)}</p></div>`;
    });
  </script>
</body>
</html>
