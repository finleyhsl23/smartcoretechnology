  <style>
    :root {
      --bg0: #020617;
      --bg1: #06153a;
      --panel: rgba(255, 255, 255, .06);
      --panel2: rgba(255, 255, 255, .09);
      --line: rgba(255, 255, 255, .12);
      --line2: rgba(255, 255, 255, .08);
      --text: #eaf0ff;
      --muted: rgba(234, 240, 255, .68);
      --blue: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 700px at 50% 0%, rgba(59, 130, 246, .18), transparent 62%),
        radial-gradient(900px 700px at 80% 20%, rgba(22, 163, 255, .10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x: hidden;
    }

    .page-grid {
      background-image:
        linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
      background-size: 46px 46px;
      min-height: 100vh;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255, 255, 255, .085), rgba(255, 255, 255, .045));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .46);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .card {
      background: rgba(255, 255, 255, .055);
      border: 1px solid var(--line2);
      border-radius: 18px;
    }

    .card-soft {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 16px;
    }

    .muted {
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .08);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, .12);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .btn.primary {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      border-color: rgba(255, 255, 255, .18);
      box-shadow: 0 14px 35px rgba(37, 99, 235, .25);
    }

    .btn.danger {
      background: rgba(239, 68, 68, .72);
      border-color: rgba(255, 255, 255, .14);
    }

    .btn.green {
      background: rgba(34, 197, 94, .18);
      border-color: rgba(34, 197, 94, .35);
    }

    .input,
    .select,
    textarea {
      width: 100%;
      background: rgba(2, 6, 23, .45);
      border: 1px solid rgba(255, 255, 255, .11);
      border-radius: 14px;
      color: var(--text);
      padding: 12px;
      outline: none;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .input:focus,
    .select:focus,
    textarea:focus {
      border-color: rgba(59, 130, 246, .55);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, .12);
    }

    .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .07);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, .12);
    }

    .nav-btn {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .055);
      border: 1px solid rgba(255, 255, 255, .08);
      text-align: left;
      transition: background .12s ease, border-color .12s ease, transform .12s ease;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: rgba(59, 130, 246, .18);
      border-color: rgba(59, 130, 246, .35);
      transform: translateY(-1px);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, .68);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-box {
      width: min(100%, 1040px);
      max-height: 88vh;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      text-align: left;
      vertical-align: top;
    }

    th {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .02em;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .calendar-day {
      min-height: 110px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .09);
      background: rgba(255, 255, 255, .045);
      cursor: pointer;
      text-align: left;
    }

    .calendar-day:hover {
      background: rgba(59, 130, 246, .14);
      border-color: rgba(59, 130, 246, .30);
    }

    .calendar-day.dim {
      opacity: .35;
    }

    .code-box {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      background: rgba(2, 6, 23, .55);
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: 14px;
      padding: 14px;
      font-size: 12px;
      line-height: 1.55;
    }
  </style>
</head>

<body>
  <div class="page-grid">
    <header class="sticky top-0 z-50 border-b border-white/10 bg-black/20 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4">
        <div class="flex items-center gap-3">
          <div class="flex h-11 w-11 items-center justify-center overflow-hidden rounded-2xl border border-white/10 bg-black/30">
            <img
              src="/SmartCore Official Logos/SC Icon - Black Background.png"
              alt="SmartCore"
              class="h-8 w-8 object-contain"
              onerror="this.style.display='none'"
            />
          </div>
          <div>
            <div class="font-extrabold tracking-wide">SMARTCORE HQ</div>
            <div class="text-sm muted">Internal Management System</div>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <span id="who" class="tag"><span class="dot"></span>Loading...</span>
          <button id="signOut" class="btn">Sign out</button>
        </div>
      </div>
    </header>

    <main class="mx-auto grid max-w-7xl grid-cols-1 gap-5 p-4 lg:grid-cols-[300px_1fr]">
      <aside class="glass h-fit p-4 lg:sticky lg:top-24">
        <div class="mb-4 px-2 text-xs uppercase tracking-[.18em] muted">Modules</div>
        <div id="moduleNav" class="space-y-2"></div>
      </aside>

      <section id="content" class="min-h-[720px]"></section>
    </main>
  </div>

  <div id="modal" class="modal-backdrop">
    <div class="modal-box glass p-5 sm:p-6">
      <div class="flex items-start justify-between gap-3">
        <div>
          <h2 id="modalTitle" class="text-2xl font-extrabold"></h2>
          <p id="modalSub" class="mt-1 text-sm muted"></p>
        </div>
        <button id="modalClose" class="btn">Close</button>
      </div>
      <div id="modalBody" class="mt-5"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const sb = window.supabase.createClient(
      window.__SUPABASE_URL,
      window.__SUPABASE_ANON,
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      }
    );

    const state = {
      user: null,
      staff: null,
      companies: [],
      staffList: [],
      transactions: [],
      events: [],
      module: "dashboard",
      calendarDate: new Date(),
      vaultUnlocked: false,
      vaultTimer: null
    };

    const modules = [
      ["dashboard", "Dashboard", "Your profile and overview"],
      ["customers", "Customer Portal Manager", "Companies and packages"],
      ["finance", "Payments & Finance", "Admin only"],
      ["vault", "Credentials Vault", "Admin only"],
      ["calendar", "Calendar", "Shared company calendar"],
      ["staff", "Employee Management", "Admin only"],
      ["audit", "Audit Logs", "Owner only"]
    ];

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function money(value) {
      return "£" + Number(value || 0).toFixed(2);
    }

    function num(value) {
      const cleaned = String(value || "").replace(/[^0-9.]/g, "");
      return cleaned ? Number(cleaned) : null;
    }

    function isAdmin() {
      return !!state.staff && (
        state.staff.is_admin === true ||
        state.staff.role === "admin" ||
        state.staff.role === "owner"
      );
    }

    function isOwner() {
      return state.staff?.role === "owner";
    }

    function staffEmail(row) {
      return row?.work_email || row?.email || "";
    }

    function staffActive(row) {
      if (!row) return false;
      if (row.archived === true) return false;
      if (row.is_active === false) return false;
      if (row.active === false) return false;
      return true;
    }

    function formatDate(dateInput) {
      if (!dateInput) return "";
      const d = new Date(dateInput);
      if (Number.isNaN(d.getTime())) return String(dateInput);
      return d.toLocaleDateString("en-GB");
    }

    function formatDateTime(dateInput) {
      if (!dateInput) return "";
      const d = new Date(dateInput);
      if (Number.isNaN(d.getTime())) return String(dateInput);
      return d.toLocaleString("en-GB", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        hour12: true,
        timeZoneName: "short"
      });
    }

    function openModal(title, sub, html) {
      $("modalTitle").textContent = title;
      $("modalSub").textContent = sub || "";
      $("modalBody").innerHTML = html;
      $("modal").classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      $("modal").classList.remove("show");
      $("modalBody").innerHTML = "";
      document.body.style.overflow = "";
    }

    function alertMsg(message) {
      alert(message);
    }

    async function api(path, payload) {
      const { data: { session } } = await sb.auth.getSession();
      const headers = {
        "content-type": "application/json"
      };

      if (session?.access_token) {
        headers.authorization = "Bearer " + session.access_token;
      }

      const res = await fetch(path, {
        method: "POST",
        headers,
        body: JSON.stringify(payload || {})
      });

      const text = await res.text();
      let data = null;

      try {
        data = JSON.parse(text);
      } catch (_) {
        data = { raw: text };
      }

      if (!res.ok || data?.ok === false) {
        throw new Error(data?.error || data?.raw || "Request failed");
      }

      return data || {};
    }

    async function audit(action, targetTable, targetId, metadata) {
      try {
        await api("/api/audit-log", {
          action,
          target_table: targetTable,
          target_id: targetId,
          metadata: metadata || {}
        });
      } catch (err) {
        console.warn("Audit failed:", err);
      }
    }

    async function init() {
      $("content").innerHTML = loadingScreen("Preparing SmartCore HQ...");

      const { data: { session }, error: sessionError } = await sb.auth.getSession();

      if (sessionError) {
        $("content").innerHTML = errorScreen("Session error", sessionError.message);
        return;
      }

      if (!session?.user) {
        window.location.href = "/";
        return;
      }

      state.user = session.user;

      let staffRes = await sb
        .from("smartcore_staff")
        .select("*")
        .eq("user_id", session.user.id)
        .maybeSingle();

      if (!staffRes.data && session.user.email) {
        staffRes = await sb
          .from("smartcore_staff")
          .select("*")
          .or(`work_email.eq.${session.user.email},email.eq.${session.user.email}`)
          .maybeSingle();
      }

      if (staffRes.error) {
        $("content").innerHTML = errorScreen("Staff check failed", staffRes.error.message);
        return;
      }

      if (!staffRes.data) {
        await sb.auth.signOut();
        window.location.href = "/";
        return;
      }

      if (!staffActive(staffRes.data)) {
        await sb.auth.signOut();
        window.location.href = "/";
        return;
      }

      state.staff = staffRes.data;

      if (!state.staff.user_id) {
        await sb
          .from("smartcore_staff")
          .update({ user_id: session.user.id })
          .eq("id", state.staff.id);
      }

      $("who").innerHTML = `<span class="dot"></span>${esc(state.staff.full_name || session.user.email)}`;

      await loadAll();
      renderNav();
      renderDashboard();
      await audit("login", "smartcore_staff", state.staff.id, { page: "hq" });
    }

    function loadingScreen(text) {
      return `
        <div class="glass p-8">
          <div class="tag"><span class="dot"></span>${esc(text)}</div>
        </div>
      `;
    }

    function errorScreen(title, text) {
      return `
        <div class="glass p-8">
          <h1 class="text-3xl font-extrabold">${esc(title)}</h1>
          <p class="mt-2 muted">${esc(text)}</p>
          <div class="mt-5 flex gap-2">
            <button class="btn primary" onclick="location.reload()">Retry</button>
            <button class="btn" onclick="location.href='/'">Back to website</button>
          </div>
        </div>
      `;
    }

    async function loadAll() {
      const companyPromise = sb
        .from("companies")
        .select("*")
        .order("created_at", { ascending: false });

      const staffPromise = sb
        .from("smartcore_staff")
        .select("*")
        .order("full_name", { ascending: true });

      const eventsPromise = sb
        .from("calendar_events")
        .select("*")
        .order("event_date", { ascending: true });

      const txPromise = isAdmin()
        ? sb
          .from("payments_transactions")
          .select("*")
          .order("transaction_date", { ascending: false })
        : Promise.resolve({ data: [] });

      const [companies, staff, events, transactions] = await Promise.all([
        companyPromise,
        staffPromise,
        eventsPromise,
        txPromise
      ]);

      state.companies = companies.data || [];
      state.staffList = staff.data || [];
      state.events = events.data || [];
      state.transactions = transactions.data || [];
    }

    function visibleModules() {
      return modules
        .filter((mod) => mod[0] !== "finance" || isAdmin())
        .filter((mod) => mod[0] !== "vault" || isAdmin())
        .filter((mod) => mod[0] !== "staff" || isAdmin())
        .filter((mod) => mod[0] !== "audit" || isOwner());
    }

    function renderNav() {
      $("moduleNav").innerHTML = visibleModules().map((mod) => `
        <button class="nav-btn ${state.module === mod[0] ? "active" : ""}" data-module="${mod[0]}">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="font-extrabold">${esc(mod[1])}</div>
              <div class="mt-1 text-xs muted">${esc(mod[2])}</div>
            </div>
            <div class="muted">›</div>
          </div>
        </button>
      `).join("");

      document.querySelectorAll("[data-module]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.module = btn.dataset.module;
          renderNav();
          renderCurrentModule();
        });
      });
    }

    function renderCurrentModule() {
      const views = {
        dashboard: renderDashboard,
        customers: renderCustomers,
        finance: renderFinance,
        vault: renderVault,
        calendar: renderCalendar,
        staff: renderStaff,
        audit: renderAudit
      };

      (views[state.module] || renderDashboard)();
    }

    function shell(title, sub, actions, body) {
      $("content").innerHTML = `
        <div class="glass p-6 sm:p-8">
          <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
            <div>
              <div class="text-xs uppercase tracking-[.18em] muted">Module</div>
              <h1 class="mt-2 text-3xl font-extrabold tracking-tight sm:text-4xl">${esc(title)}</h1>
              <p class="mt-2 max-w-3xl muted">${esc(sub || "")}</p>
            </div>
            <div class="flex flex-wrap gap-2">${actions || ""}</div>
          </div>
          <div class="mt-7">${body || ""}</div>
        </div>
      `;
    }

    function renderDashboard() {
      const activeEmployees = state.staffList.filter(staffActive).length;
      const companyCount = state.companies.length;
      const upcoming = state.events
        .filter((event) => new Date(event.event_date) >= new Date(new Date().toDateString()))
        .slice(0, 5);

      shell(
        "SmartCore HQ",
        "Your profile, permissions and key SmartCore information.",
        `<button class="btn primary" onclick="openMyProfile()">Edit My Profile</button>`,
        `
          <div class="grid gap-5 xl:grid-cols-[1.2fr_.8fr]">
            <div class="card p-6">
              <div class="flex flex-col gap-5 md:flex-row md:items-start md:justify-between">
                <div>
                  <div class="tag"><span class="dot"></span>${esc(state.staff.role || "employee")}</div>
                  <h2 class="mt-4 text-3xl font-extrabold">${esc(state.staff.full_name || "SmartCore Staff")}</h2>
                  <p class="mt-1 muted">${esc(state.staff.job_title || "No job title set")}</p>
                </div>
                <div class="text-sm muted md:text-right">
                  <div>${esc(staffEmail(state.staff) || state.user.email)}</div>
                  <div>${esc(state.staff.personal_email || "No personal email set")}</div>
                  <div>${esc(state.staff.personal_phone || "No phone set")}</div>
                </div>
              </div>

              <div class="mt-6 grid gap-3 md:grid-cols-3">
                <div class="card-soft p-4">
                  <div class="text-sm muted">Customers</div>
                  <div class="mt-1 text-3xl font-extrabold">${companyCount}</div>
                </div>
                <div class="card-soft p-4">
                  <div class="text-sm muted">SmartCore Staff</div>
                  <div class="mt-1 text-3xl font-extrabold">${activeEmployees}</div>
                </div>
                <div class="card-soft p-4">
                  <div class="text-sm muted">Access Level</div>
                  <div class="mt-1 text-3xl font-extrabold">${esc(state.staff.role || "employee")}</div>
                </div>
              </div>
            </div>

            <div class="card p-6">
              <h3 class="text-xl font-extrabold">Upcoming Calendar</h3>
              <div class="mt-4 space-y-3">
                ${upcoming.length ? upcoming.map((event) => `
                  <div class="card-soft p-3">
                    <div class="font-bold">${esc(event.title)}</div>
                    <div class="mt-1 text-sm muted">${formatDate(event.event_date)} ${event.all_day ? "All day" : `${event.start_time || ""} - ${event.end_time || ""}`}</div>
                  </div>
                `).join("") : `<div class="muted">No upcoming events.</div>`}
              </div>
            </div>
          </div>
        `
      );
    }

    window.openMyProfile = function openMyProfile() {
      const s = state.staff;

      openModal(
        "My Profile",
        "Update your SmartCore staff details.",
        `
          <div class="grid gap-3 md:grid-cols-2">
            <div>
              <label class="label">Full Name</label>
              <input id="myFullName" class="input" value="${esc(s.full_name || "")}" />
            </div>
            <div>
              <label class="label">Job Title</label>
              <input id="myJobTitle" class="input" value="${esc(s.job_title || "")}" />
            </div>
            <div>
              <label class="label">Work Email</label>
              <input id="myWorkEmail" class="input" value="${esc(staffEmail(s))}" />
            </div>
            <div>
              <label class="label">Personal Email</label>
              <input id="myPersonalEmail" class="input" value="${esc(s.personal_email || "")}" />
            </div>
            <div>
              <label class="label">Personal Phone</label>
              <input id="myPersonalPhone" class="input" value="${esc(s.personal_phone || "")}" />
            </div>
            <div>
              <label class="label">Pronouns</label>
              <input id="myPronouns" class="input" value="${esc(s.pronouns || "")}" />
            </div>
          </div>
          <button class="btn primary mt-5 w-full" onclick="saveMyProfile()">Save Profile</button>
        `
      );
    };

    window.saveMyProfile = async function saveMyProfile() {
      const payload = {
        full_name: $("myFullName").value.trim() || null,
        job_title: $("myJobTitle").value.trim() || null,
        work_email: $("myWorkEmail").value.trim().toLowerCase() || null,
        email: $("myWorkEmail").value.trim().toLowerCase() || null,

        name: "new-file.txt",

      window.__activeCodeStore.files.push(file);
      window.__activeCodeStore.selected = file.id;

    function drawCodeFiles() {
      const store = window.__activeCodeStore;
      const list = $("codeFileList");

      list.innerHTML = store.files.map((file) => `
        <button class="btn w-full justify-start ${store.selected === file.id ? "primary" : ""}" onclick="loadCodeFile('${file.id}')">

    window.loadCodeFile = function loadCodeFile(id) {
      const store = window.__activeCodeStore;
      const file = store.files.find((item) => item.id === id);
      if (!file) return;

      store.selected = id;
      $("codeFolder").value = file.folder || "/";
      $("codeFileName").value = file.name || "";
      $("codeContents").value = file.contents || "";
      drawCodeFiles();
      updateLinePreview();
    };

    function updateLinePreview() {
      const lines = String($("codeContents")?.value || "").split("\n");
      const html = lines
        .map((line, index) => `${String(index + 1).padStart(3, "0")}  ${line}`)
        .join("\n");

      if ($("linePreview")) {
        $("linePreview").textContent = html || "001";
      }
    }

    window.saveCodeStorage = function saveCodeStorage() {
      const store = window.__activeCodeStore;

      if (store.selected) {
        const file = store.files.find((item) => item.id === store.selected);
        if (file) {
          file.folder = $("codeFolder").value.trim() || "/";
          file.name = $("codeFileName").value.trim() || "untitled.txt";
          file.contents = $("codeContents").value;

      store.storeEl.value = JSON.stringify(store.files, null, 2);
      closeModal();
    };

    window.saveCompany = async function saveCompany(id) {
      const packages = collectPackages();

      const payload = {
        company_name: $("fCompany").value.trim(),
        approx_staff_count: num($("fStaff").value),
        website: $("fWebsite").value.trim() || null,
        address: $("fAddress").value.trim() || null,
        working_hours: collectWorkingHours(),
        notes: $("fNotes").value.trim() || null,
        primary_contact_name: $("fContact").value.trim(),
        primary_contact_email: $("fContactEmail").value.trim() || null,
        primary_contact_phone: $("fContactPhone").value.trim() || null,
        accounts_team_email: $("fAccounts").value.trim() || null,
        support_team_email: $("fSupport").value.trim() || null,
        packages
      };

      if (!payload.company_name || !payload.primary_contact_name) {
        alertMsg("Company name and primary contact name are required.");
        return;
      }

      const result = id
        ? await sb.from("companies").update(payload).eq("id", id)
        : await sb.from("companies").insert(payload).select("id").single();

      if (result.error) {
        alertMsg(result.error.message);
        return;
      }

      const companyId = id || result.data?.id;
      await createPaymentCalendarEvents(companyId, payload.company_name, packages);
      await audit(id ? "update_company" : "add_company", "companies", companyId || payload.company_name, {});

      closeModal();
      await loadAll();
      renderCustomers();
    };

    async function createPaymentCalendarEvents(companyId, companyNameText, packages) {
      const events = [];
      const yearLimit = new Date().getFullYear() + 3;

      packages.forEach((pkg) => {
        if (pkg.payment_choices?.includes("one_time") && pkg.one_time_date) {
          events.push(paymentEvent(companyId, companyNameText, pkg, pkg.one_time_date, "One time payment"));
        }

        if (pkg.payment_choices?.includes("monthly") && pkg.monthly_start_date) {
          let d = new Date(pkg.monthly_start_date + "T00:00:00");
          while (d.getFullYear() <= yearLimit) {
            events.push(paymentEvent(companyId, companyNameText, pkg, toIsoDate(d), "Monthly payment"));
            d.setMonth(d.getMonth() + 1);
          }
        }

        if (pkg.payment_choices?.includes("yearly") && pkg.yearly_start_date) {
          let d = new Date(pkg.yearly_start_date + "T00:00:00");
          while (d.getFullYear() <= yearLimit) {
            events.push(paymentEvent(companyId, companyNameText, pkg, toIsoDate(d), "Yearly payment"));
            d.setFullYear(d.getFullYear() + 1);
          }
        }
      });

      if (!events.length) return;

      await sb.from("calendar_events").insert(events);
    }

    function paymentEvent(companyId, companyNameText, pkg, date, label) {
      return {
        title: `${label}: ${companyNameText} - ${pkg.name}`,
        event_date: date,
        all_day: true,
        start_time: null,
        end_time: null,
        description: `Auto-created payment reminder for ${pkg.name}`,
        company_id: companyId,
        created_by: state.user.id
      };
    }

    function toIsoDate(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

      const year = $("yearFilter")?.value || "all";
      const type = $("typeFilter")?.value || "all";
      const query = ($("companyFilter")?.value || "").toLowerCase();

      return state.transactions.filter((tx) => {
        const txYear = String(new Date(tx.transaction_date).getFullYear());
        const companyText = companyName(tx.company_id) || tx.company_label || "Global Expense";

        return (year === "all" || txYear === year)
          && (type === "all" || tx.type === type)
          && (!query || companyText.toLowerCase().includes(query));
      });
    }

    window.generateInvoiceHtml = function generateInvoiceHtml() {
      const company = state.companies.find((c) => c.id === $("invCompany").value);
      if (!company) {
        alertMsg("Select a company first.");
        return;
      }

      const invoiceNo = Math.floor(100000 + Math.random() * 900000);
      const invoiceDate = new Date();
      const dueDate = addWorkingDays(invoiceDate, 3);
      const taxRate = num($("invTax").value) || 0;

      const lines = [...document.querySelectorAll(".invoice-line")].map((line) => {
        const pkg = company.packages?.[Number(line.querySelector(".invPackage").value)];
        const qty = num(line.querySelector(".invQty").value) || 1;
        const price = num(line.querySelector(".invPrice").value) || 0;

        return {
          description: pkg?.name || "Package",
          qty,
          price,
          total: qty * price
        };
      });

      const subtotal = lines.reduce((sum, line) => sum + line.total, 0);
      const tax = subtotal * (taxRate / 100);
      const total = subtotal + tax;

      const invoiceHtml = buildInvoiceHtml({
        company,
        billingAddress: $("invAddress").value,
        invoiceNo,
        invoiceDate,
        dueDate,
        lines,
        subtotal,
        taxRate,
        tax,
        total
      });

      const win = window.open("", "_blank");
      win.document.write(invoiceHtml);
      win.document.close();
    };

    function addWorkingDays(date, days) {
      const d = new Date(date);
      let added = 0;

      while (added < days) {
        d.setDate(d.getDate() + 1);
        if (d.getDay() !== 0 && d.getDay() !== 6) added++;
      }

      return d;
    }

      drawCalendar(year, month);

    function drawCalendar(year, month) {
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const firstDay = (first.getDay() + 6) % 7;
      const totalCells = Math.ceil((firstDay + last.getDate()) / 7) * 7;
      const start = new Date(year, month, 1 - firstDay);
      const cells = [];

      for (let i = 0; i < totalCells; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const iso = toIsoDate(d);
        const dayEvents = state.events.filter((event) => event.event_date === iso);
        const isCurrentMonth = d.getMonth() === month;

        cells.push(`
          <button class="calendar-day ${isCurrentMonth ? "" : "dim"}" onclick="openDateEvents('${iso}')">
            <div class="flex items-center justify-between">
              <b>${d.getDate()}</b>
              ${dayEvents.length ? `<span class="tag">${dayEvents.length}</span>` : ""}
            </div>
            <div class="mt-2 space-y-1">
              ${dayEvents.slice(0, 2).map((event) => `<div class="truncate rounded-lg bg-white/10 px-2 py-1 text-xs">${esc(event.title)}</div>`).join("")}
            </div>
          </button>
        `);
      }

      $("calendarGrid").innerHTML = cells.join("");
    }

      state.calendarDate.setMonth(state.calendarDate.getMonth() + change);
      renderCalendar();
    };

        `
      );
    };

    window.openEventForm = function openEventForm(date = "") {
      openModal(
        "Add Calendar Event",
        "Everyone in SmartCore can see this.",
        `
          <div class="grid gap-3 md:grid-cols-2">
            <div>
              <label class="label">Event Title</label>
              <input id="evTitle" class="input" />
            </div>
            <div>
              <label class="label">Date</label>
              <input id="evDate" class="input" type="date" value="${esc(date)}" />
            </div>
            <label class="card-soft p-3 text-sm">
              <input id="evAll" type="checkbox" /> All day
            </label>
            <div></div>
            <div>
              <label class="label">Start Time</label>
              <input id="evStart" class="input" type="time" />
            </div>
            <div>
              <label class="label">End Time</label>
              <input id="evEnd" class="input" type="time" />
            </div>
            <div class="md:col-span-2">
              <label class="label">Description</label>
              <textarea id="evDesc"></textarea>
            </div>
          </div>
          <button class="btn primary mt-4 w-full" onclick="saveEvent()">Save Event</button>
        `
      );
    };

    window.saveEvent = async function saveEvent() {
      const payload = {
        title: $("evTitle").value.trim(),
        event_date: $("evDate").value,
        all_day: $("evAll").checked,
        start_time: $("evAll").checked ? null : $("evStart").value || null,
        end_time: $("evAll").checked ? null : $("evEnd").value || null,
        description: $("evDesc").value.trim() || null,
        created_by: state.user.id
      };

      if (!payload.title || !payload.event_date) {
        alertMsg("Title and date are required.");
        return;
      }

      const { error } = await sb
        .from("calendar_events")
        .insert(payload);

      if (error) {
        alertMsg(error.message);
        return;
      }

      await audit("add_calendar_event", "calendar_events", payload.title, payload);
      closeModal();
      await loadAll();
      renderCalendar();
    };

    function renderStaff() {
      if (!isAdmin()) {
        renderDashboard();
        return;
      }

      shell(
        "Employee Management",
        "Manage SmartCore employees, onboarding and full staff details.",
        `<button class="btn primary" onclick="openStaffForm()">+ Add Employee</button>`,
        `
          <div class="overflow-auto card-soft">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Work Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${state.staffList.map((staff) => `
                  <tr>
                    <td>
                      <b>${esc(staff.full_name || "")}</b>
                      <div class="text-xs muted">${esc(staff.job_title || "")}</div>
                    </td>
                    <td>${esc(staffEmail(staff))}</td>
                    <td>${esc(staff.role || "employee")} ${staff.is_admin ? "• admin" : ""}</td>
                    <td>${staffActive(staff) ? "active" : "disabled"}</td>
                    <td>
                      <div class="flex flex-wrap gap-2">
                        <button class="btn" onclick="openStaffForm('${staff.id}')">Edit</button>
                        <button class="btn primary" onclick="openStaffInviteModal('${staff.id}')">Send Invite</button>
                        <button class="btn danger" onclick="archiveStaff('${staff.id}')">Archive</button>
                      </div>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `
      );
    }

    window.openStaffForm = function openStaffForm(id = "") {
      const staff = id ? state.staffList.find((item) => item.id === id) : {};

      openModal(
        id ? "Edit Staff" : "Add SmartCore Employee",
        "Full staff details and permissions.",
        `
          <div class="grid gap-3 md:grid-cols-2">
            <div>
              <label class="label">Full Name</label>
              <input id="stName" class="input" value="${esc(staff.full_name || "")}" />
            </div>
            <div>
              <label class="label">Job Title</label>
              <input id="stJob" class="input" value="${esc(staff.job_title || "")}" />
            </div>
            <div>
              <label class="label">Work Email</label>
              <input id="stWork" class="input" value="${esc(staff.work_email || staff.email || "")}" />
            </div>
            <div>
              <label class="label">Personal Email</label>
              <input id="stPersonal" class="input" value="${esc(staff.personal_email || "")}" />
            </div>
            <div>
              <label class="label">Personal Phone</label>
              <input id="stPhone" class="input" value="${esc(staff.personal_phone || "")}" />
            </div>
            <div>
              <label class="label">Employment Type</label>
              <select id="stEmployment" class="select">
                <option value="full_time">Full Time</option>
                <option value="part_time">Part Time</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div>
              <label class="label">Notice Period</label>
              <input id="stNotice" class="input" value="${esc(staff.notice_period || "")}" />
            </div>
            <div>
              <label class="label">Role</label>
              <select id="stRole" class="select">
                <option value="employee">Employee</option>
                <option value="admin">Admin</option>
                ${isOwner() ? `<option value="owner">Owner</option>` : ""}
              </select>
            </div>
            <div>
              <label class="label">Is Admin</label>
              <select id="stAdmin" class="select">
                <option value="false">No</option>
                <option value="true">Yes</option>
              </select>
            </div>
            <div>
              <label class="label">Start Date</label>
              <input id="stStart" class="input" type="date" value="${esc(staff.start_date || "")}" />
            </div>
            <div>
              <label class="label">Title</label>
              <input id="stTitle" class="input" value="${esc(staff.title || "")}" />
            </div>
            <div>
              <label class="label">Pronouns</label>
              <input id="stPronouns" class="input" value="${esc(staff.pronouns || "")}" />
            </div>
            <div>
              <label class="label">Gender</label>
              <input id="stGender" class="input" value="${esc(staff.gender || "")}" />
            </div>
            <div>
              <label class="label">Date of Birth</label>
              <input id="stDob" class="input" type="date" value="${esc(staff.date_of_birth || staff.dob || "")}" />
            </div>
            <div>
              <label class="label">Nationality</label>
              <input id="stNationality" class="input" value="${esc(staff.nationality || "")}" />
            </div>
            <div>
              <label class="label">House Number / Name</label>
              <input id="stHouse" class="input" value="${esc(staff.house_name_number || "")}" />
            </div>
            <div>
              <label class="label">Street Name</label>
              <input id="stStreet" class="input" value="${esc(staff.street_name || "")}" />
            </div>
            <div>
              <label class="label">Town</label>
              <input id="stTown" class="input" value="${esc(staff.town || "")}" />
            </div>
            <div>
              <label class="label">Postcode</label>
              <input id="stPostcode" class="input" value="${esc(staff.postcode || "")}" />
            </div>
            <div>
              <label class="label">Country</label>
              <input id="stCountry" class="input" value="${esc(staff.country || "United Kingdom")}" />
            </div>
          </div>

          <h3 class="mt-6 text-xl font-extrabold">Emergency Contact 1</h3>
          <div class="mt-3 grid gap-3 md:grid-cols-2">
            <input id="ec1Name" class="input" placeholder="Name" value="${esc(staff.emergency_contact_1_name || "")}" />
            <input id="ec1Rel" class="input" placeholder="Relationship" value="${esc(staff.emergency_contact_1_relationship || "")}" />
            <input id="ec1Phone" class="input" placeholder="Phone" value="${esc(staff.emergency_contact_1_phone || "")}" />
            <input id="ec1Email" class="input" placeholder="Email" value="${esc(staff.emergency_contact_1_email || "")}" />
          </div>

          <h3 class="mt-6 text-xl font-extrabold">Emergency Contact 2</h3>
          <div class="mt-3 grid gap-3 md:grid-cols-2">
            <input id="ec2Name" class="input" placeholder="Name" value="${esc(staff.emergency_contact_2_name || "")}" />
            <input id="ec2Rel" class="input" placeholder="Relationship" value="${esc(staff.emergency_contact_2_relationship || "")}" />
            <input id="ec2Phone" class="input" placeholder="Phone" value="${esc(staff.emergency_contact_2_phone || "")}" />
            <input id="ec2Email" class="input" placeholder="Email" value="${esc(staff.emergency_contact_2_email || "")}" />
          </div>

          <button class="btn primary mt-5 w-full" onclick="saveStaff('${id}')">Save Employee</button>
        `
      );

      $("stEmployment").value = staff.employment_type || "full_time";
      $("stRole").value = staff.role || "employee";
      $("stAdmin").value = String(!!staff.is_admin);
    };

    window.saveStaff = async function saveStaff(id) {
      const role = $("stRole").value;

      if (role === "owner" && !isOwner()) {
        alertMsg("Only owners can add owners.");
        return;
      }

      const workEmail = $("stWork").value.trim().toLowerCase();

      const payload = {
        full_name: $("stName").value.trim(),
        job_title: $("stJob").value.trim() || null,
        work_email: workEmail,
        email: workEmail,
        personal_email: $("stPersonal").value.trim().toLowerCase() || null,
        personal_phone: $("stPhone").value.trim() || null,
        employment_type: $("stEmployment").value,
        notice_period: $("stNotice").value.trim() || null,
        role,
        is_admin: $("stAdmin").value === "true" || role === "admin" || role === "owner",
        start_date: $("stStart").value || null,
        title: $("stTitle").value.trim() || null,
        pronouns: $("stPronouns").value.trim() || null,
        gender: $("stGender").value.trim() || null,
        date_of_birth: $("stDob").value || null,
        dob: $("stDob").value || null,
        nationality: $("stNationality").value.trim() || null,
        house_name_number: $("stHouse").value.trim() || null,
        street_name: $("stStreet").value.trim() || null,
        town: $("stTown").value.trim() || null,
        postcode: $("stPostcode").value.trim() || null,
        country: $("stCountry").value.trim() || "United Kingdom",
        emergency_contact_1_name: $("ec1Name").value.trim() || null,
        emergency_contact_1_relationship: $("ec1Rel").value.trim() || null,
        emergency_contact_1_phone: $("ec1Phone").value.trim() || null,
        emergency_contact_1_email: $("ec1Email").value.trim() || null,
        emergency_contact_2_name: $("ec2Name").value.trim() || null,
        emergency_contact_2_relationship: $("ec2Rel").value.trim() || null,
        emergency_contact_2_phone: $("ec2Phone").value.trim() || null,
        emergency_contact_2_email: $("ec2Email").value.trim() || null,
        active: true,
        is_active: true,
        archived: false
      };

      if (!payload.full_name || !payload.work_email) {
        alertMsg("Full name and work email are required.");
        return;
      }

      const result = id
        ? await sb.from("smartcore_staff").update(payload).eq("id", id)
        : await sb.from("smartcore_staff").insert(payload);

      if (result.error) {
        alertMsg(result.error.message);
        return;
      }

      await audit(id ? "update_staff" : "add_staff", "smartcore_staff", id || payload.work_email, {});
      closeModal();
      await loadAll();
      renderStaff();
    };

    window.openStaffInviteModal = function openStaffInviteModal(id) {
      const staff = state.staffList.find((item) => item.id === id);
      if (!staff) return;

      openModal(
        "Send Onboarding Invite",
        "Choose where to send the invite email.",
        `
          <div class="space-y-3">
            <button class="btn primary w-full" onclick="sendStaffInvite('${id}', 'work')">
              Send to work email: ${esc(staff.work_email || staff.email || "Not set")}
            </button>
            <button class="btn w-full" onclick="sendStaffInvite('${id}', 'personal')">
              Send to personal email: ${esc(staff.personal_email || "Not set")}
            </button>
          </div>
        `
      );
    };

    window.sendStaffInvite = async function sendStaffInvite(id, destination) {
      try {
        await api("/api/staff-invite", {
          staff_id: id,
          destination
        });
        await audit("send_staff_invite", "smartcore_staff", id, { destination });
        closeModal();
        alertMsg("Invite sent.");
      } catch (err) {
        alertMsg(err.message);
      }
    };

    window.archiveStaff = async function archiveStaff(id) {
      if (!confirm("Archive employee and disable login?")) return;

      const { error } = await sb
        .from("smartcore_staff")
        .update({ archived: true, active: false, is_active: false })
        .eq("id", id);

      if (error) {
        alertMsg(error.message);
        return;
      }

      await audit("archive_staff", "smartcore_staff", id, {});
      await loadAll();
      renderStaff();
    };

    async function renderAudit() {
      if (!isOwner()) {
        renderDashboard();
        return;
      }

      shell(
        "Audit Logs",
        "Owner only. Easier to read activity history.",
        "",
        `<div id="auditRows" class="space-y-3">Loading...</div>`
      );

      const { data, error } = await sb
        .from("audit_logs")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(250);

      if (error) {
        $("auditRows").innerHTML = `<div class="text-red-300">${esc(error.message)}</div>`;
        return;
      }

      $("auditRows").innerHTML = (data || []).map((log) => {
        const action = humanAction(log.action);
        const who = log.actor_name
          ? `${log.actor_name} (${log.actor_email || ""})`
          : (log.actor_email || "Unknown user");

        return `
          <div class="card p-4">
            <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
              <div>
                <b>${esc(action)}</b>
                <span class="muted"> - ${formatDateTime(log.created_at)} • ${esc(who)}</span>
              </div>
              <span class="tag">${esc(log.target_table || "system")}</span>
            </div>
            <pre class="code-box mt-3">${esc(JSON.stringify(log.metadata || {}, null, 2))}</pre>
          </div>
        `;
      }).join("");
    }

    function humanAction(action) {
      return String(action || "")
        .split("_")
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }

    $("modalClose").addEventListener("click", closeModal);
    $("modal").addEventListener("click", (event) => {
      if (event.target === $("modal")) closeModal();
    });

    $("signOut").addEventListener("click", async () => {
      await audit("logout", "smartcore_staff", state.staff?.id, {});
      await sb.auth.signOut();
      window.location.href = "/";
    });

    window.addEventListener("mousemove", () => {
      if (state.vaultUnlocked) resetVaultTimer();
    }, { passive: true });

    window.addEventListener("keydown", () => {
      if (state.vaultUnlocked) resetVaultTimer();
    }, { passive: true });

    init().catch((err) => {
      console.error(err);
      $("content").innerHTML = errorScreen("HQ failed to load", err.message || String(err));
    });
  </script>
</body>
</html>
