<script>
/******************************************************************
  CONFIG + BASIC HELPERS
******************************************************************/
const $ = (id) => document.getElementById(id);
const sb = window.supabase.createClient(window.__SUPABASE_URL, window.__SUPABASE_ANON);

const state = {
  user: null,
  staff: null,
  companies: [],
  staffList: [],
  transactions: [],
  events: [],
  module: "dashboard",
  vaultUnlocked: false
};

function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function money(n){ return "£" + Number(n || 0).toFixed(2); }
function num(v){
  const clean = String(v || "").replace(/[^0-9.]/g, "");
  return clean ? Number(clean) : null;
}
function normalEmail(v){ return String(v || "").trim().toLowerCase(); }
function toast(message){ alert(message); }
function isAdmin(){ return !!state.staff && (state.staff.is_admin === true || ["admin","owner"].includes(String(state.staff.role || "").toLowerCase())); }
function isOwner(){ return String(state.staff?.role || "").toLowerCase() === "owner"; }
function staffActive(staff){
  if (!staff) return false;
  if (staff.archived === true) return false;
  if (staff.is_active === false) return false;
  if (staff.active === false) return false;
  return true;
}

function openModal(title, sub, html){
  $("modalTitle").textContent = title || "";
  $("modalSub").textContent = sub || "";
  $("modalBody").innerHTML = html || "";
  $("modal").classList.add("show");
  document.body.classList.add("noScroll");
}
function closeModal(){
  $("modal").classList.remove("show");
  $("modalBody").innerHTML = "";
  document.body.classList.remove("noScroll");
}
window.closeModal = closeModal;
$("modalClose").onclick = closeModal;
$("modal").addEventListener("click", (e)=>{ if(e.target === $("modal")) closeModal(); });

async function api(path, payload){
  const { data: { session } } = await sb.auth.getSession();
  const headers = { "content-type":"application/json" };
  if (session?.access_token) headers.authorization = "Bearer " + session.access_token;

  const res = await fetch(path, {
    method:"POST",
    headers,
    body: JSON.stringify(payload || {})
  });

  const text = await res.text();
  let data = null;
  try{ data = JSON.parse(text); }catch{ data = { raw:text }; }

  if (!res.ok || data?.ok === false) throw new Error(data?.error || data?.raw || "Request failed");
  return data || {};
}

async function audit(action, target_table, target_id, metadata){
  try{
    await api("/api/audit-log", { action, target_table, target_id, metadata: metadata || {} });
  }catch(err){
    console.warn("Audit log failed:", err);
  }
}

/******************************************************************
  AUTH + LOAD
******************************************************************/
async function init(){
  const { data: { user }, error: userErr } = await sb.auth.getUser();

  if (userErr || !user){
    window.location.href = "/";
    return;
  }

  state.user = user;

  let staff = null;
  let staffErr = null;

  const byUser = await sb
    .from("smartcore_staff")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (byUser.error){
    staffErr = byUser.error;
  } else {
    staff = byUser.data;
  }

  // Fallback for older rows that only have email/work_email but no user_id yet.
  if (!staff && user.email){
    const email = normalEmail(user.email);
    const byEmail = await sb
      .from("smartcore_staff")
      .select("*")
      .or(`email.eq.${email},work_email.eq.${email}`)
      .maybeSingle();

    if (!byEmail.error && byEmail.data){
      staff = byEmail.data;

      // Best effort link the row so future checks use user_id.
      if (!staff.user_id){
        await sb.from("smartcore_staff").update({ user_id:user.id }).eq("id", staff.id);
        staff.user_id = user.id;
      }
    }
  }

  if (staffErr){
    alert("Staff check failed: " + staffErr.message);
    return;
  }

  if (!staff || !staffActive(staff)){
    await sb.auth.signOut();
    window.location.href = "/";
    return;
  }

  state.staff = staff;

  const displayName = staff.full_name || staff.name || user.email || "SmartCore Staff";
  $("who").innerHTML = `<span class="dot"></span>${esc(displayName)}`;

  await loadAll();
  renderNav();
  renderDashboard();
  await audit("login", "smartcore_staff", staff.id, { page:"hq" });
}

async function loadAll(){
  const companyQuery = sb.from("companies").select("*").order("created_at", { ascending:false });
  const staffQuery = sb.from("smartcore_staff").select("*").order("full_name", { ascending:true });
  const eventQuery = sb.from("calendar_events").select("*").order("event_date", { ascending:true });
  const transactionQuery = isAdmin()
    ? sb.from("payments_transactions").select("*").order("transaction_date", { ascending:false })
    : Promise.resolve({ data:[] });

  const [companies, staffList, transactions, events] = await Promise.all([
    companyQuery,
    staffQuery,
    transactionQuery,
    eventQuery
  ]);

  if (companies.error) console.warn(companies.error);
  if (staffList.error) console.warn(staffList.error);
  if (transactions.error) console.warn(transactions.error);
  if (events.error) console.warn(events.error);

  state.companies = companies.data || [];
  state.staffList = staffList.data || [];
  state.transactions = transactions.data || [];
  state.events = events.data || [];
}

/******************************************************************
  NAV + SHELL
******************************************************************/
const moduleActions = {
  dashboard: renderDashboard,
  customers: renderCustomers,
  finance: renderFinance,
  vault: renderVault,
  calendar: renderCalendar,
  staff: renderStaff,
  audit: renderAudit
};

const modules = [
  ["dashboard", "Dashboard", "Overview"],
  ["customers", "Customer Portal Manager", "Companies"],
  ["finance", "Payments & Finance", "Admin only"],
  ["vault", "Credentials Vault", "Admin only"],
  ["calendar", "Calendar", "Shared"],
  ["staff", "Employee Management", "Admin only"],
  ["audit", "Audit Logs", "Owner only"]
];

function allowedModules(){
  return modules
    .filter(m => m[0] !== "finance" || isAdmin())
    .filter(m => m[0] !== "vault" || isAdmin())
    .filter(m => m[0] !== "staff" || isAdmin())
    .filter(m => m[0] !== "audit" || isOwner());
}

function renderNav(){
  $("moduleNav").innerHTML = allowedModules().map(m => `
    <button class="navBtn ${state.module === m[0] ? "active" : ""}" data-module="${m[0]}">
      <span>
        <b>${esc(m[1])}</b><br>
        <span class="text-xs muted">${esc(m[2])}</span>
      </span>
      <span class="muted">›</span>
    </button>
  `).join("");

  document.querySelectorAll("[data-module]").forEach(btn => {
    btn.onclick = () => {
      state.module = btn.dataset.module;
      renderNav();
      (moduleActions[state.module] || renderDashboard)();
    };
  });
}

function shell(title, sub, actions, body){
  $("content").innerHTML = `
    <div class="glass p-6">
      <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
        <div>
          <div class="text-xs uppercase tracking-[.18em] muted">Module</div>
          <h1 class="text-3xl font-extrabold mt-2 tracking-tight">${esc(title)}</h1>
          <p class="muted mt-1">${esc(sub || "")}</p>
        </div>
        <div class="flex gap-2 flex-wrap">${actions || ""}</div>
      </div>
      <div class="mt-6">${body || ""}</div>
    </div>
  `;
}

function renderDashboard(){
  const tiles = allowedModules().map(m => `
    <button class="card p-5 text-left hover:bg-white/10 transition" data-dash-module="${m[0]}">
      <div class="text-xl font-bold">${esc(m[1])}</div>
      <div class="text-sm muted mt-2">${esc(m[2])}</div>
    </button>
  `).join("");

  shell(
    "SmartCore HQ",
    "Manage customers, packages, payments, credentials, calendar, staff and audit logs.",
    "",
    `<div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4">${tiles}</div>`
  );

  document.querySelectorAll("[data-dash-module]").forEach(btn => {
    btn.onclick = () => {
      state.module = btn.dataset.dashModule;
      renderNav();
      (moduleActions[state.module] || renderDashboard)();
    };
  });
}

/******************************************************************
  CUSTOMERS
******************************************************************/
function companyName(id){ return state.companies.find(c => c.id === id)?.company_name || "Global Expense"; }

function renderCustomers(){
  shell(
    "Customer Portal Manager",
    "Full list of customers. View, edit or delete companies and their packages.",
    `<button class="btn primary" onclick="openCompanyForm()">+ Add New Company</button>`,
    `
      <input id="companySearch" class="inp" placeholder="Search customers..." />
      <div class="mt-4 overflow-auto">
        <table>
          <thead>
            <tr>
              <th>Company</th>
              <th>Contact</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Packages</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="companyRows"></tbody>
        </table>
      </div>
    `
  );
  $("companySearch").oninput = drawCompanies;
  drawCompanies();
}

function drawCompanies(){
  const q = normalEmail($("companySearch")?.value || "");
  const rows = state.companies.filter(c => !q || JSON.stringify(c).toLowerCase().includes(q));

  $("companyRows").innerHTML = rows.map(c => `
    <tr>
      <td><b>${esc(c.company_name)}</b><br><span class="text-xs muted">${esc(c.website || "")}</span></td>
      <td>${esc(c.primary_contact_name || "")}</td>
      <td>${esc(c.primary_contact_email || "")}</td>
      <td>${esc(c.primary_contact_phone || "")}</td>
      <td>${Array.isArray(c.packages) ? c.packages.length : 0}</td>
      <td>
        <div class="flex gap-2 flex-wrap">
          <button class="btn" onclick="viewCompany('${c.id}')">View</button>
          <button class="btn" onclick="openCompanyForm('${c.id}')">Edit</button>
          <button class="btn danger" onclick="deleteCompany('${c.id}')">Delete</button>
        </div>
      </td>
    </tr>
  `).join("") || `<tr><td colspan="6" class="muted">No companies found.</td></tr>`;
}

function workingHoursEditor(hours = {}){
  const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  return `
    <div class="grid md:grid-cols-2 gap-3">
      ${days.map(day => {
        const v = hours?.[day] || {};
        return `
          <div class="soft p-3">
            <div class="flex items-center justify-between gap-2">
              <label class="font-bold text-sm">${day}</label>
              <label class="text-xs muted"><input type="checkbox" class="whClosed" data-day="${day}" ${v.closed ? "checked" : ""}> Closed</label>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-2">
              <input class="inp whStart" data-day="${day}" type="time" value="${esc(v.start || "09:00")}">
              <input class="inp whEnd" data-day="${day}" type="time" value="${esc(v.end || "17:00")}">
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function collectWorkingHours(){
  const out = {};
  document.querySelectorAll(".whClosed").forEach(chk => {
    const day = chk.dataset.day;
    out[day] = {
      closed: chk.checked,
      start: document.querySelector(`.whStart[data-day="${day}"]`)?.value || null,
      end: document.querySelector(`.whEnd[data-day="${day}"]`)?.value || null
    };
  });
  return out;
}

function packageEditor(packages = []){
  return `
    <div id="packagesBox" class="space-y-3">
      ${(packages || []).map((p,i) => packageCard(p,i)).join("")}
    </div>
    <button class="btn primary mt-3" onclick="addPackageCard()">+ Add Package</button>
  `;
}

function packageCard(p = {}, i = 0){
  const staffOptions = state.staffList.map(s => {
    const label = s.full_name || s.name || s.work_email || s.email || "Unnamed";
    return `<option value="${s.id}">${esc(label)}</option>`;
  }).join("");

  const devSet = new Set(p.developer_ids || []);
  const selectedDevOptions = state.staffList.map(s => {
    const label = s.full_name || s.name || s.work_email || s.email || "Unnamed";
    return `<option value="${s.id}" ${devSet.has(s.id) ? "selected" : ""}>${esc(label)}</option>`;
  }).join("");

  return `
    <div class="card p-4 packageCard" data-i="${i}">
      <div class="grid md:grid-cols-2 gap-3">
        <div>
          <label class="label">Package Name</label>
          <input class="inp pkgName" placeholder="Package name" value="${esc(p.name || "")}">
        </div>
        <div>
          <label class="label">Package Type</label>
          <select class="inp pkgType">
            <option value="website" ${p.package_type === "website" ? "selected" : ""}>Website</option>
            <option value="system" ${p.package_type === "system" ? "selected" : ""}>System</option>
            <option value="other" ${p.package_type === "other" ? "selected" : ""}>Other</option>
          </select>
        </div>
        <div>
          <label class="label">Lead Developer</label>
          <select class="inp pkgLead">
            <option value="">Select lead developer</option>
            ${state.staffList.map(s => {
              const label = s.full_name || s.name || s.work_email || s.email || "Unnamed";
              return `<option value="${s.id}" ${p.lead_developer_id === s.id ? "selected" : ""}>${esc(label)}</option>`;
            }).join("")}
          </select>
        </div>
        <div>
          <label class="label">Developer(s), up to 50</label>
          <select class="inp pkgDevs" multiple size="4">${selectedDevOptions || staffOptions}</select>
        </div>
        <div class="md:col-span-2">
          <label class="label">Code / File Notes</label>
          <textarea class="inp pkgCode" placeholder="File names, folders, line numbers, code notes...">${esc(typeof p.code === "string" ? p.code : JSON.stringify(p.code || {}, null, 2))}</textarea>
        </div>

function collectPackages(){
  return [...document.querySelectorAll(".packageCard")].map(card => {
    const choices = [];
    if (card.querySelector(".payMonthly").checked) choices.push("monthly");
    if (card.querySelector(".payYearly").checked) choices.push("yearly");
    if (card.querySelector(".payOne").checked) choices.push("one_time");

    const rawCode = card.querySelector(".pkgCode").value;
    let code = { text: rawCode };
    try{ code = JSON.parse(rawCode || "{}"); }catch{}

    const developers = [...card.querySelector(".pkgDevs").selectedOptions].map(o => o.value);
    const uniqueDevelopers = [...new Set(developers)].slice(0,50);

    return {
      name: card.querySelector(".pkgName").value.trim(),
      package_type: card.querySelector(".pkgType").value,
      lead_developer_id: card.querySelector(".pkgLead").value || null,
      developer_ids: uniqueDevelopers,
      code,
      payment_choices: choices,
      monthly_fee: num(card.querySelector(".feeMonthly").value),
      yearly_fee: num(card.querySelector(".feeYearly").value),
      one_time_fee: num(card.querySelector(".feeOne").value)
    };
  }).filter(p => p.name);
}

function renderFinance(){
  if (!isAdmin()) return renderDashboard();

  const years = [...new Set(state.transactions.map(t => new Date(t.transaction_date).getFullYear()).filter(Boolean))].sort((a,b)=>b-a);

  shell(
    "Payments & Finance",
    "Track incoming and outgoing transactions, filter by year and company, and export to CSV.",
    `<button class="btn" onclick="exportCSV()">Export CSV</button><button class="btn primary" onclick="openTransactionForm()">+ Add Transaction</button>`,
    `
      <div class="grid md:grid-cols-3 gap-3">
        <select id="yearFilter" class="inp"><option value="all">All time</option>${years.map(y => `<option value="${y}">${y}</option>`).join("")}</select>
        <select id="typeFilter" class="inp"><option value="all">All</option><option value="incoming">Incoming</option><option value="outgoing">Outgoing</option></select>
        <input id="companyFilter" class="inp" placeholder="Search company / global" />
      </div>
      <div class="mt-5 grid lg:grid-cols-2 gap-4">
        <div class="card p-4">
          <h3 class="font-bold text-xl">Summary</h3>
          <div id="financeSummary" class="grid sm:grid-cols-3 gap-3 mt-4"></div>
        </div>
        <div class="card p-4">
          <div class="flex justify-between gap-3">
            <h3 class="font-bold text-xl">Transactions</h3>
            <span id="txCount" class="muted text-sm"></span>
          </div>
          <div id="txRows" class="mt-4 space-y-3"></div>
        </div>
      </div>
    `
  );

  [$("yearFilter"), $("typeFilter"), $("companyFilter")].forEach(el => el.oninput = drawFinance);
  drawFinance();
}

function filteredTx(){
  const y = $("yearFilter")?.value || "all";
  const type = $("typeFilter")?.value || "all";
  const q = normalEmail($("companyFilter")?.value || "");

  return state.transactions.filter(t => {
    const txYear = String(new Date(t.transaction_date).getFullYear());
    const name = companyName(t.company_id) || t.company_label || "Global Expense";
    return (y === "all" || txYear === y)
      && (type === "all" || t.type === type)
      && (!q || name.toLowerCase().includes(q) || String(t.description || "").toLowerCase().includes(q));
  });
}

function drawFinance(){
  const rows = filteredTx();
  const income = rows.filter(t => t.type === "incoming").reduce((sum,t)=>sum + Number(t.amount || 0),0);
  const expenses = rows.filter(t => t.type === "outgoing").reduce((sum,t)=>sum + Number(t.amount || 0),0);

  $("financeSummary").innerHTML = `
    <div class="kpi"><div class="muted text-sm">Income</div><b class="text-xl">${money(income)}</b></div>
    <div class="kpi"><div class="muted text-sm">Expenses</div><b class="text-xl">${money(expenses)}</b></div>
    <div class="kpi"><div class="muted text-sm">Profit</div><b class="text-xl">${money(income - expenses)}</b></div>
  `;

  $("txCount").textContent = `${rows.length} items`;
  $("txRows").innerHTML = rows.map(t => `
    <div class="card p-3">
      <div class="flex justify-between gap-3">
        <div>
          <span class="tag"><span class="dot ${t.type === "outgoing" ? "red" : ""}"></span>${esc(t.type)}</span>
          <div class="mt-2 font-bold">${esc(companyName(t.company_id) || t.company_label || "Global Expense")} • ${esc(t.transaction_date)}</div>
          <div class="muted text-sm">${esc(t.description || "")}</div>
        </div>
        <div class="text-xl font-extrabold">${money(t.amount)}</div>
      </div>
    </div>
  `).join("") || `<p class="muted">No transactions found.</p>`;
}

      <div><label class="label">Company</label><select id="txCompany" class="inp"><option value="">Global Expense</option>${state.companies.map(c => `<option value="${c.id}">${esc(c.company_name)}</option>`).join("")}</select></div>

function renderCalendar(){
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const last = new Date(year, month + 1, 0);
  let grid = "";

  for (let d = 1; d <= last.getDate(); d++){
    const date = `${year}-${String(month + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const count = state.events.filter(e => e.event_date === date).length;
    grid += `
      <button class="card p-3 min-h-[86px] text-left hover:bg-white/10" onclick="openEventForm('${date}')">
        <b>${d}</b>
        <div class="text-xs muted mt-1">${count} event${count === 1 ? "" : "s"}</div>
      </button>
    `;
  }

  shell(
    "Calendar",
    "Company public calendar for SmartCore staff.",
    `<button class="btn primary" onclick="openEventForm()">+ Add Event</button>`,
    `
      <div class="grid md:grid-cols-7 gap-2" id="calendarGrid">${grid}</div>
      <div class="mt-5 space-y-3" id="eventList">
        ${state.events.map(e => `
          <div class="card p-4">
            <b>${esc(e.title)}</b>
            <div class="text-sm muted">${esc(e.event_date)} ${e.all_day ? "All day" : `${esc(e.start_time || "")} - ${esc(e.end_time || "")}`}</div>
            <p class="text-sm mt-1">${esc(e.description || "")}</p>
          </div>
        `).join("") || `<p class="muted">No events yet.</p>`}
      </div>
    `
  );
}

window.inviteStaff = async function(id){
  const s = state.staffList.find(x => x.id === id);
  if (!s) return;

  const sendToWork = confirm("Send to work email? Press Cancel for personal email.");
  const emailTo = sendToWork ? staffEmail(s) : s.personal_email;

  if (!emailTo){ toast("No email found."); return; }

  try{
    await api("/api/staff-invite", { staff_id:id, email_to:emailTo });
    toast("Invite sent.");
    await audit("send_staff_invite", "smartcore_staff", id, { to:emailTo });
  }catch(e){ toast(e.message); }
};

window.archiveStaff = async function(id){
  if (!confirm("Archive employee and disable login?")) return;

  const { error } = await sb
    .from("smartcore_staff")
    .update({ archived:true, is_active:false, active:false })
    .eq("id", id);

  if (error){ toast(error.message); return; }

  await audit("archive_staff", "smartcore_staff", id, {});
  await loadAll();
  renderStaff();
};

/******************************************************************
  AUDIT
******************************************************************/
async function renderAudit(){
  if (!isOwner()) return renderDashboard();

  shell("Audit Logs", "Owner only. Everything important is logged.", "", `<div id="auditRows" class="space-y-2">Loading...</div>`);

  const { data, error } = await sb
    .from("audit_logs")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(200);

  if (error){ $("auditRows").textContent = error.message; return; }

  $("auditRows").innerHTML = (data || []).map(a => `
    <div class="card p-3">
      <b>${esc(a.action)}</b>
      <span class="muted text-sm">${esc(a.created_at)} • ${esc(a.actor_email || "")}</span>
      <pre class="text-xs muted mt-2 whitespace-pre-wrap">${esc(JSON.stringify(a.metadata || {}, null, 2))}</pre>
    </div>
  `).join("") || `<p class="muted">No audit logs found.</p>`;
}

/******************************************************************
  SIGN OUT + START
******************************************************************/
$("signOut").onclick = async function(){
  await audit("logout", "smartcore_staff", state.staff?.id, {});
  await sb.auth.signOut();
  window.location.href = "/";
};

init().catch(err => {
  console.error(err);
  alert("HQ init error: " + (err.message || err));
});
</script>
