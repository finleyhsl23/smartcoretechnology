  <script>
    window.__SUPABASE_URL = "https://hjdpcfhozhoyeqevnupm.supabase.co";
    window.__SUPABASE_ANON = "PASTE_YOUR_SMARTCORE_SUPABASE_ANON_KEY_HERE";
  </script>

  <style>
    :root{
      --bg0:#020617;
      --bg1:#06153a;
      --text:#eaf0ff;
      --muted:rgba(234,240,255,.70);
      --muted2:rgba(234,240,255,.52);
      --stroke:rgba(255,255,255,.12);
      --stroke2:rgba(255,255,255,.08);
      --panel:rgba(255,255,255,.06);
      --panel2:rgba(255,255,255,.04);
      --blue:#3b82f6;
      --blue2:#2563eb;
      --green:#22c55e;
      --red:#ef4444;
      --amber:#f59e0b;
      --radius:24px;
      --shadow:0 28px 90px rgba(0,0,0,.52);
    }

    *{box-sizing:border-box}

    html,body{min-height:100%}

    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 700px at 50% -10%,rgba(59,130,246,.22),transparent 62%),
        radial-gradient(900px 700px at 80% 40%,rgba(37,99,235,.14),transparent 62%),
        linear-gradient(180deg,var(--bg0),var(--bg1));
      overflow-x:hidden;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:64px 64px;
      mask-image:linear-gradient(to bottom,black,transparent 85%);
    }

    .glass{
      background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.04));
      border:1px solid var(--stroke2);
      border-radius:20px;
    }

    .cardHover:hover{
      background:linear-gradient(180deg,rgba(59,130,246,.18),rgba(255,255,255,.05));
      border-color:rgba(59,130,246,.35);
      transform:translateY(-1px);
    }

    .muted{color:var(--muted)}
    .muted2{color:var(--muted2)}

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border:1px solid rgba(255,255,255,.13);
      background:rgba(255,255,255,.075);
      color:var(--text);
      border-radius:14px;
      padding:11px 14px;
      font-weight:800;
      font-size:13px;
      cursor:pointer;
      transition:.15s ease;
      white-space:nowrap;
    }

    .btn:hover{background:rgba(255,255,255,.12);transform:translateY(-1px)}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .primary{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
      border-color:rgba(255,255,255,.18);
      box-shadow:0 12px 32px rgba(37,99,235,.26);
    }

    .danger{
      background:rgba(239,68,68,.78);
      border-color:rgba(255,255,255,.14);
    }

    .success{
      background:rgba(34,197,94,.16);
      border-color:rgba(34,197,94,.28);
    }

    .inp{
      width:100%;
      background:rgba(2,6,23,.50);
      border:1px solid rgba(255,255,255,.11);
      border-radius:15px;
      color:var(--text);
      padding:13px 14px;
      outline:none;
      font-size:14px;
    }

    .inp::placeholder{color:rgba(234,240,255,.38)}
    .inp:focus{border-color:rgba(59,130,246,.45);box-shadow:0 0 0 4px rgba(59,130,246,.12)}
    textarea.inp{min-height:120px;resize:vertical}

    label,.label{
      display:block;
      font-size:12px;
      font-weight:800;
      color:var(--muted);
      margin-bottom:6px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(255,255,255,.13);
      background:rgba(255,255,255,.07);
      border-radius:999px;
      padding:7px 11px;
      font-size:12px;
      font-weight:800;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--green);
      box-shadow:0 0 0 4px rgba(34,197,94,.13);
    }

    .sideBtn{
      width:100%;
      text-align:left;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:15px;
      border-radius:17px;
      background:rgba(255,255,255,.055);
      border:1px solid rgba(255,255,255,.08);
      transition:.15s ease;
    }

    .sideBtn:hover,.sideBtn.active{
      background:rgba(59,130,246,.18);
      border-color:rgba(59,130,246,.35);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      padding:14px 12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:left;
      vertical-align:top;
    }

    th{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.68);
      z-index:100;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .modal.show{display:flex}

    .modalBox{
      width:min(100%,1100px);
      max-height:88vh;
      overflow:auto;
    }

    .hide{display:none!important}

      min-height:135px;
      text-align:left;
      padding:12px;
      cursor:pointer;
    }

    .calendarBlank{
      min-height:135px;

    }

    @media(max-width:980px){
      .desktopTable{display:none}
      .mobileCards{display:block}
    }

    @media(min-width:981px){
      .mobileCards{display:none}
    }
  </style>
</head>

<body>
  <header class="sticky top-0 z-50 border-b border-white/10 bg-black/20 backdrop-blur-xl">
    <div class="max-w-[1500px] mx-auto px-5 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-11 h-11 rounded-2xl bg-black/30 border border-white/10 flex items-center justify-center overflow-hidden">
          <img src="/SmartCore Official Logos/SC Icon - Black Background.png" class="w-8 h-8 object-contain" onerror="this.style.display='none'" />
        </div>
        <div>
          <div class="font-black tracking-wide leading-tight">SMARTCORE HQ</div>
          <div class="text-sm muted leading-tight">Internal Management System</div>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <span id="who" class="tag"><span class="dot"></span>Loading...</span>
        <button id="signOut" class="btn">Sign out</button>
      </div>
    </div>
  </header>

  <main class="max-w-[1500px] mx-auto p-5 grid grid-cols-1 xl:grid-cols-[320px_1fr] gap-5">
    <aside class="glass p-4 h-fit xl:sticky xl:top-24">
      <div class="text-xs uppercase tracking-[.20em] muted px-2 mb-3">Modules</div>

    </aside>

    <section id="content" class="min-h-[760px]"></section>
  </main>

  <div id="modal" class="modal">
    <div class="modalBox glass p-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <div class="text-xs uppercase tracking-[.18em] muted">SmartCore HQ</div>
          <h2 id="modalTitle" class="text-3xl font-black mt-2"></h2>
          <p id="modalSub" class="text-sm muted mt-1"></p>
        </div>
        <button onclick="closeModal()" class="btn">Close</button>
      </div>
      <div id="modalBody" class="mt-6"></div>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);

const sb = window.supabase.createClient(window.__SUPABASE_URL, window.__SUPABASE_ANON);

let state = {
  user: null,
  staff: null,
  companies: [],
  staffList: [],
  transactions: [],
  events: [],
  module: "dashboard"
};

let calendarDate = new Date();

const modules = [
  ["dashboard","Dashboard","Your profile and overview"],
  ["customers","Customer Portal Manager","Companies and packages"],
  ["finance","Payments & Finance","Admin only"],
  ["vault","Credentials Vault","Admin only"],
  ["calendar","Calendar","Shared calendar"],
  ["staff","Employee Management","Admin only"],
  ["audit","Audit Logs","Owner only"]
];

function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function money(n){
  return "£" + Number(n || 0).toFixed(2);
}

function num(v){
  v = String(v || "").replace(/[^0-9.]/g,"");
  return v ? Number(v) : null;
}

function isAdmin(){
  return !!state.staff && (
    state.staff.is_admin === true ||
    ["admin","owner"].includes(String(state.staff.role || "").toLowerCase())
  );
}

function isOwner(){
  return String(state.staff?.role || "").toLowerCase() === "owner";
}

function staffEmail(s){
  return s?.work_email || s?.email || "";
}

function msg(m){
  alert(m);
}

function openModal(title, sub, html){
  $("modalTitle").textContent = title;
  $("modalSub").textContent = sub || "";
  $("modalBody").innerHTML = html;
  $("modal").classList.add("show");
}

function closeModal(){
  $("modal").classList.remove("show");
  $("modalBody").innerHTML = "";
}

window.closeModal = closeModal;

async function api(path, payload){
  const { data:{ session } } = await sb.auth.getSession();

  const headers = { "content-type":"application/json" };
  if(session?.access_token) headers.authorization = "Bearer " + session.access_token;

  const res = await fetch(path, {
    method:"POST",
    headers,
    body:JSON.stringify(payload || {})
  });

  const txt = await res.text();
  let data = null;

  try{ data = JSON.parse(txt); }catch{ data = { raw:txt }; }

  if(!res.ok || data.ok === false){
    throw new Error(data.error || data.raw || "Request failed");
  }

  return data;
}

async function audit(action, target_table, target_id, metadata){
  try{
    await api("/api/audit-log", {
      action,
      target_table,
      target_id,
      metadata
    });
  }catch(e){
    console.warn("Audit failed:", e);
  }
}

async function init(){
  showLoading();

  const { data:{ session } } = await sb.auth.getSession();

  if(!session?.user){
    location.href = "/";
    return;
  }

  state.user = session.user;

  const { data: staff, error } = await sb
    .from("smartcore_staff")
    .select("*")
    .or(`user_id.eq.${session.user.id},email.eq.${session.user.email},work_email.eq.${session.user.email}`)
    .limit(1)
    .maybeSingle();

  if(error){
    renderBlocked("Staff check failed: " + error.message);
    return;
  }

  if(!staff){
    renderBlocked("No SmartCore staff profile found for this account.");
    return;
  }

  if(staff.active === false || staff.is_active === false || staff.archived === true){
    renderBlocked("Your SmartCore staff account is not active.");
    return;
  }

  state.staff = staff;

  $("who").innerHTML = `<span class="dot"></span>${esc(staff.full_name || state.user.email)}`;

  await loadAll();
  renderNav();
  renderDashboard();
  await audit("login","smartcore_staff",staff.id,{ page:"hq" });
}

function showLoading(){
  $("content").innerHTML = `
    <div class="glass p-8">
      <div class="tag"><span class="dot"></span>Loading HQ...</div>
    </div>
  `;
}

function renderBlocked(message){
  $("content").innerHTML = `
    <div class="glass p-8">
      <div class="tag" style="border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.12)">
        Access blocked
      </div>
      <h1 class="text-4xl font-black mt-4">Could not open SmartCore HQ</h1>
      <p class="muted mt-2">${esc(message)}</p>
      <button class="btn primary mt-5" onclick="location.href='/'">Back to website</button>
    </div>
  `;
}

async function loadAll(){
  const companyQ = sb.from("companies").select("*").order("created_at",{ ascending:false });
  const staffQ = sb.from("smartcore_staff").select("*").order("full_name",{ ascending:true });
  const txQ = isAdmin()
    ? sb.from("payments_transactions").select("*").order("transaction_date",{ ascending:false })
    : Promise.resolve({ data:[] });
  const eventsQ = sb.from("calendar_events").select("*").order("event_date",{ ascending:true });

  const [c,s,t,e] = await Promise.all([companyQ,staffQ,txQ,eventsQ]);

  state.companies = c.data || [];
  state.staffList = s.data || [];
  state.transactions = t.data || [];
  state.events = e.data || [];
}

function allowedModules(){
  return modules
    .filter(m => m[0] !== "finance" || isAdmin())
    .filter(m => m[0] !== "vault" || isAdmin())
    .filter(m => m[0] !== "staff" || isAdmin())
    .filter(m => m[0] !== "audit" || isOwner());
}

function renderNav(){
  $("moduleNav").innerHTML = allowedModules().map(m => `
    <button class="sideBtn ${state.module === m[0] ? "active" : ""}" data-mod="${m[0]}">
      <span>
        <b>${esc(m[1])}</b><br>
        <span class="text-xs muted">${esc(m[2])}</span>
      </span>
      <span class="muted">›</span>
    </button>
  `).join("");

  document.querySelectorAll("[data-mod]").forEach(btn => {
    btn.onclick = () => {
      state.module = btn.dataset.mod;
      renderNav();
      renderCurrentModule();
    };
  });
}

function renderCurrentModule(){
  const map = {
    dashboard:renderDashboard,
    customers:renderCustomers,
    finance:renderFinance,
    vault:renderVault,
    calendar:renderCalendar,
    staff:renderStaff,
    audit:renderAudit
  };

  (map[state.module] || renderDashboard)();
}

function shell(title, sub, actions, body){
  $("content").innerHTML = `
    <div class="glass p-6 lg:p-8">
      <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4">
        <div>
          <div class="text-xs uppercase tracking-[.20em] muted">Module</div>
          <h1 class="text-4xl lg:text-5xl font-black mt-2 tracking-tight">${title}</h1>
          <p class="muted mt-2 text-base lg:text-lg max-w-4xl">${sub}</p>
        </div>
        <div class="flex gap-2 flex-wrap">${actions || ""}</div>
      </div>

      <div class="mt-8">${body || ""}</div>
    </div>
  `;
}

/* DASHBOARD */

function renderDashboard(){
  const s = state.staff || {};

  const income = state.transactions
    .filter(t => t.type === "incoming")
    .reduce((sum,t) => sum + Number(t.amount || 0), 0);

  const expenses = state.transactions
    .filter(t => t.type === "outgoing")
    .reduce((sum,t) => sum + Number(t.amount || 0), 0);

  shell(
    "SmartCore HQ",
    "Your profile, permissions, quick stats and internal SmartCore tools.",
    `<button class="btn primary" onclick="openMyProfile()">Edit My Profile</button>`,
    `
      <div class="grid grid-cols-1 xl:grid-cols-[1.2fr_.8fr] gap-5">
        <div class="card p-6">
          <div class="flex flex-col md:flex-row md:items-center gap-5">
            <div class="w-20 h-20 rounded-3xl bg-blue-500/20 border border-blue-300/20 flex items-center justify-center text-3xl font-black">
              ${esc((s.full_name || state.user.email || "S").slice(0,1).toUpperCase())}
            </div>
            <div class="min-w-0">
              <h2 class="text-3xl font-black">${esc(s.full_name || "SmartCore Staff")}</h2>
              <p class="muted mt-1">${esc(staffEmail(s) || state.user.email)}</p>
              <div class="flex flex-wrap gap-2 mt-3">
                <span class="tag">${esc(s.role || "employee")}</span>
                ${isAdmin() ? `<span class="tag"><span class="dot"></span>Admin</span>` : ""}
                ${isOwner() ? `<span class="tag"><span class="dot"></span>Owner</span>` : ""}
              </div>
            </div>
          </div>

          <div class="grid md:grid-cols-2 gap-4 mt-8">
            <div class="card p-4">
              <div class="muted text-sm">Job Title</div>
              <div class="font-extrabold mt-1">${esc(s.job_title || "Not set")}</div>
            </div>
            <div class="card p-4">
              <div class="muted text-sm">Employment Type</div>
              <div class="font-extrabold mt-1">${esc(s.employment_type || "Not set")}</div>
            </div>
            <div class="card p-4">
              <div class="muted text-sm">Start Date</div>
              <div class="font-extrabold mt-1">${esc(s.start_date || "Not set")}</div>
            </div>
            <div class="card p-4">
              <div class="muted text-sm">Notice Period</div>
              <div class="font-extrabold mt-1">${esc(s.notice_period || "Not set")}</div>
            </div>
          </div>
        </div>

        <div class="grid gap-4">
          <div class="card p-5">
            <div class="muted text-sm">Customers</div>
            <div class="text-4xl font-black mt-2">${state.companies.length}</div>
          </div>

          <div class="card p-5">
            <div class="muted text-sm">SmartCore Staff</div>
            <div class="text-4xl font-black mt-2">${state.staffList.length}</div>
          </div>

          ${isAdmin() ? `
            <div class="card p-5">
              <div class="muted text-sm">All Time Profit</div>
              <div class="text-4xl font-black mt-2">${money(income - expenses)}</div>
            </div>
          ` : ""}
        </div>
      </div>

      <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4 mt-5">
        ${allowedModules().filter(m => m[0] !== "dashboard").map(m => `
          <button class="card cardHover p-5 text-left transition" onclick="state.module='${m[0]}';renderNav();renderCurrentModule();">
            <div class="text-xl font-black">${esc(m[1])}</div>
            <div class="muted text-sm mt-2">${esc(m[2])}</div>
          </button>
        `).join("")}
      </div>
    `
  );
}

window.openMyProfile = () => {
  const s = state.staff || {};

  openModal(
    "Edit My Profile",
    "Update your SmartCore staff profile.",
    `
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label>Full Name</label>
          <input id="myFullName" class="inp" value="${esc(s.full_name || "")}">
        </div>
        <div>
          <label>Job Title</label>
          <input id="myJobTitle" class="inp" value="${esc(s.job_title || "")}">
        </div>
        <div>
          <label>Work Email</label>
          <input id="myWorkEmail" class="inp" value="${esc(staffEmail(s) || "")}">
        </div>
        <div>
          <label>Personal Email</label>
          <input id="myPersonalEmail" class="inp" value="${esc(s.personal_email || "")}">
        </div>
        <div>
          <label>Personal Phone</label>
          <input id="myPersonalPhone" class="inp" value="${esc(s.personal_phone || "")}">
        </div>
        <div>
          <label>Title</label>
          <input id="myTitle" class="inp" value="${esc(s.title || "")}">
        </div>
        <div>
          <label>Pronouns</label>
          <input id="myPronouns" class="inp" value="${esc(s.pronouns || "")}">
        </div>
        <div>
          <label>Gender</label>
          <input id="myGender" class="inp" value="${esc(s.gender || "")}">
        </div>
        <div>
          <label>Date of Birth</label>
          <input id="myDob" class="inp" type="date" value="${esc(s.dob || "")}">
        </div>
        <div>
          <label>Nationality</label>
          <input id="myNationality" class="inp" value="${esc(s.nationality || "")}">
        </div>
        <div class="md:col-span-2">
          <label>Address</label>
          <textarea id="myAddress" class="inp">${esc(s.address || "")}</textarea>
        </div>
      </div>

      <button class="btn primary mt-5 w-full" onclick="saveMyProfile()">Save My Profile</button>
    `
  );
};

window.saveMyProfile = async () => {
  const payload = {
    full_name: $("myFullName").value.trim(),
    job_title: $("myJobTitle").value.trim() || null,
    work_email: $("myWorkEmail").value.trim().toLowerCase() || null,
    email: $("myWorkEmail").value.trim().toLowerCase() || null,
    personal_email: $("myPersonalEmail").value.trim().toLowerCase() || null,
    personal_phone: $("myPersonalPhone").value.trim() || null,
    title: $("myTitle").value.trim() || null,
    pronouns: $("myPronouns").value.trim() || null,
    gender: $("myGender").value.trim() || null,
    dob: $("myDob").value || null,
    nationality: $("myNationality").value.trim() || null,
    address: $("myAddress").value.trim() || null
  };

  const { error } = await sb
    .from("smartcore_staff")
    .update(payload)
    .eq("id", state.staff.id);

  if(error) return msg(error.message);

  await audit("update_own_profile","smartcore_staff",state.staff.id,{});
  closeModal();
  await loadAll();

  state.staff = {
    ...state.staff,
    ...payload
  };

  $("who").innerHTML = `<span class="dot"></span>${esc(state.staff.full_name || state.user.email)}`;
  renderDashboard();
};

/* CUSTOMERS */

function companyName(id){
  return state.companies.find(c => c.id === id)?.company_name || "Global Expense";
}

function defaultWorkingHours(){
  return {

    tuesday:{ closed:false, start:"09:00", end:"17:00" },

function workingHoursEditor(hours){

  return `
    <div class="grid gap-3">
      ${days.map(day => {

            <div class="font-bold capitalize">${day}</div>

              <input type="checkbox" class="whClosed" data-day="${day}" ${d.closed ? "checked" : ""}>
              Closed
            </label>
            <input class="inp whStart" data-day="${day}" type="time" value="${esc(d.start || "")}">
            <input class="inp whEnd" data-day="${day}" type="time" value="${esc(d.end || "")}">
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function collectWorkingHours(){
  const out = {};
  document.querySelectorAll(".whClosed").forEach(chk => {
    const day = chk.dataset.day;
    out[day] = {
      closed: chk.checked,
      start: document.querySelector(`.whStart[data-day="${day}"]`)?.value || "",
      end: document.querySelector(`.whEnd[data-day="${day}"]`)?.value || ""
    };
  });
  return out;
}

window.addPackageCard = () => {
  $("packagesBox").insertAdjacentHTML("beforeend", packageCard({}, Date.now()));
};

function collectPackages(){
  return [...document.querySelectorAll(".packageCard")].map(card => {
    const choices = [];

    if(card.querySelector(".payMonthly").checked) choices.push("monthly");
    if(card.querySelector(".payYearly").checked) choices.push("yearly");
    if(card.querySelector(".payOne").checked) choices.push("one_time");

    let code = { text:card.querySelector(".pkgCode").value };

    try{
      code = JSON.parse(card.querySelector(".pkgCode").value || "{}");
    }catch{}

    const devs = [...card.querySelector(".pkgDevs").selectedOptions]
      .map(o => o.value)
      .filter((v,i,a) => a.indexOf(v) === i)
      .slice(0,50);

    return {
      name:card.querySelector(".pkgName").value.trim(),
      package_type:card.querySelector(".pkgType").value,
      lead_developer_id:card.querySelector(".pkgLead").value || null,
      developer_ids:devs,
      code,
      payment_choices:choices,
      monthly_fee:num(card.querySelector(".feeMonthly").value),
      yearly_fee:num(card.querySelector(".feeYearly").value),
      one_time_fee:num(card.querySelector(".feeOne").value)
    };
  }).filter(p => p.name);
}

function renderFinance(){
  if(!isAdmin()) return renderDashboard();

  shell(
    "Payments & Finance",
    "Track incoming and outgoing payments, filter by year/company, and export reports.",
    `
      <button class="btn" onclick="exportCSV()">Export CSV</button>
      <button class="btn primary" onclick="openTransactionForm()">+ Add Transaction</button>
    `,
    `
      <div class="grid md:grid-cols-3 gap-3">
        <select id="yearFilter" class="inp">
          <option value="all">All time</option>
          ${[...new Set(state.transactions.map(t => new Date(t.transaction_date).getFullYear()))]
            .filter(Boolean)
            .sort((a,b) => b - a)
            .map(y => `<option>${y}</option>`)
            .join("")}
        </select>

        <select id="typeFilter" class="inp">
          <option value="all">All</option>
          <option value="incoming">Incoming</option>
          <option value="outgoing">Outgoing</option>
        </select>

        <input id="companyFilter" class="inp" placeholder="Search company or global expense">
      </div>

      <div class="mt-6 grid xl:grid-cols-[.9fr_1.1fr] gap-5">
        <div class="card p-5">
          <h3 class="text-2xl font-black">Summary</h3>
          <div id="financeSummary" class="grid md:grid-cols-3 xl:grid-cols-1 gap-3 mt-5"></div>
        </div>

        <div class="card p-5">
          <div class="flex justify-between gap-3">
            <h3 class="text-2xl font-black">Transactions</h3>
            <span id="txCount" class="muted text-sm"></span>
          </div>
          <div id="txRows" class="mt-4 space-y-3"></div>
        </div>
      </div>
    `
  );

  ["yearFilter","typeFilter","companyFilter"].forEach(id => $(id).oninput = drawFinance);
  drawFinance();
}

function filteredTx(){
  const y = $("yearFilter")?.value || "all";
  const type = $("typeFilter")?.value || "all";
  const q = ($("companyFilter")?.value || "").toLowerCase();

  return state.transactions.filter(t => {
    const yearOk = y === "all" || String(new Date(t.transaction_date).getFullYear()) === y;
    const typeOk = type === "all" || t.type === type;
    const companyText = `${companyName(t.company_id)} ${t.company_label || ""}`.toLowerCase();
    const qOk = !q || companyText.includes(q);
    return yearOk && typeOk && qOk;
  });
}

function drawFinance(){
  const rows = filteredTx();

  const inc = rows.filter(t => t.type === "incoming").reduce((sum,t) => sum + Number(t.amount || 0),0);
  const out = rows.filter(t => t.type === "outgoing").reduce((sum,t) => sum + Number(t.amount || 0),0);

  $("financeSummary").innerHTML = `
    <div class="card p-4">
      <div class="muted text-sm">Income</div>
      <div class="text-3xl font-black mt-2">${money(inc)}</div>
    </div>
    <div class="card p-4">
      <div class="muted text-sm">Expenses</div>
      <div class="text-3xl font-black mt-2">${money(out)}</div>
    </div>
    <div class="card p-4">
      <div class="muted text-sm">Profit</div>
      <div class="text-3xl font-black mt-2">${money(inc - out)}</div>
    </div>
  `;

  $("txCount").textContent = `${rows.length} items`;

  $("txRows").innerHTML = rows.map(t => `
    <div class="card p-4">
      <div class="flex justify-between gap-4">
        <div>
          <span class="tag">${esc(t.type)}</span>
          <div class="font-black mt-3">${esc(companyName(t.company_id) || t.company_label || "Global Expense")}</div>
          <div class="muted text-sm">${esc(t.transaction_date || "")}</div>
          <div class="muted text-sm mt-1">${esc(t.description || "")}</div>
        </div>
        <div class="text-2xl font-black">${money(t.amount)}</div>
      </div>
    </div>
  `).join("") || `<p class="muted">No transactions match your filters.</p>`;
}

window.saveTransaction = async () => {
  const payload = {
    type:$("txType").value,
    company_id:$("txCompany").value || null,
    company_label:$("txCompany").value ? null : "Global Expense",
    amount:num($("txAmount").value),

  };

  if(!payload.amount || !payload.transaction_date){
    return msg("Amount and date are required.");

window.exportCSV = () => {
  const rows = filteredTx();

  const csv = "Type,Company,Amount,Date,Description\n" + rows.map(t => [
    t.type,
    companyName(t.company_id) || t.company_label,
    t.amount,
    t.transaction_date,
    t.description
  ].map(v => `"${String(v ?? "").replaceAll('"','""')}"`).join(",")).join("\n");

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{ type:"text/csv" }));
  a.download = "smartcore-finance.csv";
  a.click();
};

window.unlockVault = async () => {
  try{
    const out = await api("/api/vault-unlock", {
      code:$("vaultCode").value
    });

    sessionStorage.vaultSession = out.session_id;
    await audit("unlock_vault","vault",null,{});
    await loadVault();
  }catch(e){
    msg(e.message);
  }
};

async function loadVault(){
  const out = await api("/api/vault-list", {
    session_id:sessionStorage.vaultSession
  });

  $("vaultGate").classList.add("hidden");
  $("vaultUnlocked").classList.remove("hidden");

  $("vaultList").innerHTML = (out.items || []).map(v => `
    <div class="card p-5">
      <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">

        </div>
      </div>
    </div>
  `).join("") || `<p class="muted">No credentials saved.</p>`;
}

window.lockVault = () => {
  delete sessionStorage.vaultSession;
  audit("lock_vault","vault",null,{});
  renderVault();
};

    "Shared SmartCore calendar. Add meetings, all-day events, reminders and work plans.",
    `
      <button class="btn" onclick="changeMonth(-1)">Previous</button>
      <button class="btn" onclick="goToday()">Today</button>
      <button class="btn" onclick="changeMonth(1)">Next</button>
      <button class="btn primary" onclick="openEventForm()">+ Add Event</button>
    `,
    `
      <div class="card p-5">
        <h2 class="text-3xl font-black mb-5">${esc(monthName)}</h2>

        <div class="grid grid-cols-7 gap-2 text-center text-xs uppercase tracking-[.12em] muted mb-2">
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
          <div>Sun</div>
        </div>

        <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
      </div>

      <div class="mt-5">
        <h3 class="text-2xl font-black mb-3">Events this month</h3>
        <div id="eventList" class="space-y-3"></div>
      </div>
    `
  );

  drawCalendarMonth(year, month);
}

function drawCalendarMonth(year, month){
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startOffset = (first.getDay() + 6) % 7;

  let html = "";

  for(let i = 0; i < startOffset; i++){
    html += `<div class="card calendarBlank"></div>`;
  }

  for(let d = 1; d <= last.getDate(); d++){
    const date = `${year}-${String(month + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const events = state.events.filter(e => e.event_date === date);

    html += `
      <button class="card calendarDay cardHover" onclick="openEventForm('${date}')">
        <div class="flex justify-between gap-2">
          <b>${d}</b>
          ${events.length ? `<span class="tag">${events.length}</span>` : ""}
        </div>
        <div class="mt-3 space-y-1">
          ${events.slice(0,2).map(e => `<div class="text-xs muted truncate">${esc(e.title)}</div>`).join("")}
        </div>
      </button>
    `;
  }

  $("calendarGrid").innerHTML = html;

  $("eventList").innerHTML = state.events
    .filter(e => {
      const dt = new Date(e.event_date);
      return dt.getFullYear() === year && dt.getMonth() === month;
    })
    .map(e => `
      <div class="card p-4">
        <b>${esc(e.title)}</b>
        <div class="text-sm muted">
          ${esc(e.event_date)} ${e.all_day ? "All day" : `${e.start_time || ""} - ${e.end_time || ""}`}
        </div>
        <p class="text-sm mt-1">${esc(e.description || "")}</p>
      </div>
    `).join("") || `<p class="muted">No events this month.</p>`;
}

window.changeMonth = amount => {
  calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + amount, 1);
  renderCalendar();
};

window.goToday = () => {
  calendarDate = new Date();
  renderCalendar();
};

window.openEventForm = (date = "") => {
  openModal(
    "Add Calendar Event",
    "Everyone in SmartCore can see this event.",
    `
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label>Event Title</label>
          <input id="evTitle" class="inp">
        </div>
        <div>
          <label>Date</label>
          <input id="evDate" class="inp" type="date" value="${esc(date)}">
        </div>
        <label class="flex items-center gap-2 m-0">
          <input id="evAll" type="checkbox">
          All day
        </label>
        <div></div>
        <div>
          <label>Start Time</label>
          <input id="evStart" class="inp" type="time">
        </div>
        <div>
          <label>End Time</label>
          <input id="evEnd" class="inp" type="time">
        </div>
        <div class="md:col-span-2">
          <label>Description</label>

        </div>
      </div>

      <button class="btn primary mt-5 w-full" onclick="saveEvent()">Save Event</button>
    `
  );
};

window.saveEvent = async () => {
  const payload = {
    title:$("evTitle").value.trim(),
    event_date:$("evDate").value,
    all_day:$("evAll").checked,
    start_time:$("evAll").checked ? null : $("evStart").value || null,
    end_time:$("evAll").checked ? null : $("evEnd").value || null,
    description:$("evDesc").value.trim() || null,
    created_by:state.user.id
  };

  if(!payload.title || !payload.event_date){
    return msg("Title and date are required.");
  }

  const { error } = await sb.from("calendar_events").insert(payload);

  if(error) return msg(error.message);

  await audit("add_calendar_event","calendar_events",payload.title,{});
  closeModal();
  await loadAll();
  renderCalendar();
};

/* STAFF */

function renderStaff(){
  if(!isAdmin()) return renderDashboard();

  shell(
    "Employee Management",
    "Add, edit, archive and invite SmartCore employees.",
    `<button class="btn primary" onclick="openStaffForm()">+ Add Employee</button>`,
    `
      <div class="desktopTable card overflow-auto">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Work Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${state.staffList.map(staffRowHtml).join("")}
          </tbody>
        </table>
      </div>

      <div class="mobileCards space-y-3">
        ${state.staffList.map(staffCardHtml).join("")}
      </div>
    `
  );
}

function staffRowHtml(s){
  return `
    <tr>
      <td>
        <b>${esc(s.full_name)}</b><br>
        <span class="text-xs muted">${esc(s.job_title || "")}</span>
      </td>
      <td>${esc(staffEmail(s))}</td>
      <td>${esc(s.role)} ${s.is_admin ? "• admin" : ""}</td>
      <td>${s.archived ? "archived" : s.active === false ? "disabled" : "active"}</td>
      <td>
        <div class="flex gap-2 flex-wrap">
          <button class="btn" onclick="viewStaff('${s.id}')">View</button>
          <button class="btn" onclick="openStaffForm('${s.id}')">Edit</button>
          <button class="btn" onclick="inviteStaff('${s.id}')">Send Invite</button>
          <button class="btn danger" onclick="archiveStaff('${s.id}')">Archive</button>
        </div>
      </td>
    </tr>
  `;
}

function staffCardHtml(s){
  return `
    <div class="card p-4">
      <b class="text-lg">${esc(s.full_name)}</b>
      <div class="muted text-sm">${esc(staffEmail(s))}</div>
      <div class="muted text-sm">${esc(s.role)} ${s.is_admin ? "• admin" : ""}</div>
      <div class="flex gap-2 flex-wrap mt-4">
        <button class="btn" onclick="viewStaff('${s.id}')">View</button>
        <button class="btn" onclick="openStaffForm('${s.id}')">Edit</button>
        <button class="btn" onclick="inviteStaff('${s.id}')">Send Invite</button>
        <button class="btn danger" onclick="archiveStaff('${s.id}')">Archive</button>
      </div>
    </div>
  `;
}

    s.full_name || "Staff Details",
    "Full staff record",
    `<pre class="card p-4 whitespace-pre-wrap text-sm overflow-auto">${esc(JSON.stringify(s,null,2))}</pre>`
  );
};

window.saveStaff = async (id) => {
  let role = $("stRole").value;

  if(role === "owner" && !isOwner()){
    return msg("Only owners can add owners.");
  }

  let ec1 = {};
  let ec2 = {};

  try{ ec1 = JSON.parse($("stEc1").value || "{}"); }catch{ return msg("Emergency Contact 1 must be valid JSON."); }
  try{ ec2 = JSON.parse($("stEc2").value || "{}"); }catch{ return msg("Emergency Contact 2 must be valid JSON."); }

  const workEmail = $("stWork").value.trim().toLowerCase();

  const payload = {
    full_name:$("stName").value.trim(),
    job_title:$("stJob").value.trim() || null,
    work_email:workEmail,
    email:workEmail,
    personal_email:$("stPersonal").value.trim().toLowerCase() || null,
    personal_phone:$("stPhone").value.trim() || null,
    employment_type:$("stEmployment").value,
    notice_period:$("stNotice").value.trim() || null,
    role,
    is_admin:$("stAdmin").value === "true" || role === "admin" || role === "owner",
    start_date:$("stStart").value || null,
    title:$("stTitle").value.trim() || null,
    pronouns:$("stPronouns").value.trim() || null,
    gender:$("stGender").value.trim() || null,
    dob:$("stDob").value || null,
    nationality:$("stNationality").value.trim() || null,
    address:$("stAddress").value.trim() || null,
    emergency_contact_1:ec1,
    emergency_contact_2:ec2,
    active:true,
    archived:false
  };

  if(!payload.full_name || !payload.work_email){
    return msg("Full name and work email are required.");
  }

  const res = id
    ? await sb.from("smartcore_staff").update(payload).eq("id",id)
    : await sb.from("smartcore_staff").insert(payload);

  if(res.error) return msg(res.error.message);

  await audit(id ? "update_staff" : "add_staff","smartcore_staff",id || payload.work_email,{});
  closeModal();
  await loadAll();
  renderStaff();
};

window.inviteStaff = async (id) => {
  const s = state.staffList.find(x => x.id === id);

  if(!s) return msg("Staff member not found.");

  openModal(
    "Send Onboarding Invite",
    "Choose where to send the onboarding email.",
    `
      <div class="grid md:grid-cols-2 gap-4">
        <button class="card cardHover p-5 text-left" onclick="sendStaffInviteNow('${id}','work')">
          <div class="text-xl font-black">Send to Work Email</div>
          <div class="muted text-sm mt-2">${esc(staffEmail(s) || "Not set")}</div>
        </button>

        <button class="card cardHover p-5 text-left" onclick="sendStaffInviteNow('${id}','personal')">
          <div class="text-xl font-black">Send to Personal Email</div>
          <div class="muted text-sm mt-2">${esc(s.personal_email || "Not set")}</div>
        </button>
      </div>

      <div id="inviteMsg" class="mt-4 text-sm text-red-300 hidden"></div>
    `
  );
};

window.sendStaffInviteNow = async (id, type) => {
  const s = state.staffList.find(x => x.id === id);
  const email_to = type === "personal" ? s.personal_email : staffEmail(s);
  const auth_email = staffEmail(s);

  if(!email_to) return msg("No email address found.");
  if(!auth_email) return msg("No work/auth email found.");

  try{
    await api("/api/staff-invite", {
      staff_id:id,
      email_to,
      auth_email
    });

    $("inviteMsg").classList.remove("hidden","text-red-300");
    $("inviteMsg").classList.add("text-green-300");
    $("inviteMsg").textContent = "Invite sent successfully.";
    await audit("send_staff_invite","smartcore_staff",id,{ to:email_to });
  }catch(e){
    $("inviteMsg").classList.remove("hidden");
    $("inviteMsg").textContent = e.message;
  }
};

window.archiveStaff = async (id) => {
  if(!confirm("Archive employee and disable login?")) return;

  const { error } = await sb
    .from("smartcore_staff")
    .update({ archived:true, active:false })
    .eq("id",id);

  if(error) return msg(error.message);

  await audit("archive_staff","smartcore_staff",id,{});
  await loadAll();
  renderStaff();
};

/* AUDIT */

async function renderAudit(){
  if(!isOwner()) return renderDashboard();

  shell(
    "Audit Logs",
    "Owner only. Important system activity appears here.",
    "",
    `<div id="auditRows" class="space-y-3">Loading...</div>`
  );

  const { data, error } = await sb
    .from("audit_logs")
    .select("*")
    .order("created_at",{ ascending:false })
    .limit(200);

  if(error){
    $("auditRows").textContent = error.message;
    return;
  }

  $("auditRows").innerHTML = (data || []).map(a => `
    <div class="card p-4">
      <b>${esc(a.action)}</b>
      <span class="muted text-sm"> ${esc(a.created_at)} • ${esc(a.actor_email || "")}</span>
      <pre class="text-xs muted mt-2 whitespace-pre-wrap overflow-auto">${esc(JSON.stringify(a.metadata || {}, null, 2))}</pre>
    </div>
  `).join("") || `<p class="muted">No audit logs found.</p>`;
}

/* SIGN OUT */

$("signOut").onclick = async () => {
  await audit("logout","smartcore_staff",state.staff?.id,{});
  await sb.auth.signOut();
  location.href = "/";
};

$("modal").addEventListener("click", e => {
  if(e.target === $("modal")) closeModal();
});

init().catch(err => {
  console.error(err);
  renderBlocked(err.message || String(err));
});
</script>
