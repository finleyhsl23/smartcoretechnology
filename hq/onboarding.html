<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SmartCore Staff Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>window.__SUPABASE_URL="https://hjdpcfhozhoyeqevnupm.supabase.co";window.__SUPABASE_ANON="PASTE_YOUR_SMARTCORE_SUPABASE_ANON_KEY_HERE";</script>
  <style>body{margin:0;font-family:Inter,system-ui;color:#eaf0ff;background:radial-gradient(900px 700px at 50% 0%,rgba(59,130,246,.18),transparent 60%),linear-gradient(180deg,#020617,#06153a);min-height:100vh}.glass{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.12);border-radius:24px;box-shadow:0 24px 70px rgba(0,0,0,.45)}.inp{width:100%;background:rgba(2,6,23,.45);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#eaf0ff;padding:12px;outline:none}.btn{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);border-radius:13px;padding:12px 14px;font-weight:800}.primary{background:linear-gradient(180deg,#3b82f6,#2563eb)}.muted{color:rgba(234,240,255,.7)}.hide{display:none}</style>
</head><body><main class="max-w-4xl mx-auto px-4 py-8"><div class="glass p-5 flex items-center justify-between"><div><div class="font-extrabold">SmartCore Technology</div><div class="text-sm muted">Staff Onboarding</div></div><button id="signOut" class="btn hide">Sign out</button></div><section id="screen" class="glass p-6 mt-5"><h1 class="text-4xl font-extrabold">Preparing onboarding...</h1><p id="msg" class="muted mt-2">Please wait.</p></section></main>
<script>
const $=id=>document.getElementById(id);const sb=window.supabase.createClient(window.__SUPABASE_URL,window.__SUPABASE_ANON);let state={user:null,staff:null,invite:null,token:new URL(location.href).searchParams.get('token')||''};function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function render(html){screen.innerHTML=html}async function api(path,payload){const res=await fetch(path,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload||{})});const t=await res.text();let d;try{d=JSON.parse(t)}catch{d={raw:t}}if(!res.ok||d.ok===false)throw new Error(d.error||d.raw||'Request failed');return d}
async function start(){try{const {data:{session}}=await sb.auth.getSession();state.user=session?.user||null;if(!state.user){const hash=location.hash;if(!hash.includes('access_token'))throw new Error('No active invite session found. Ask HR to send a fresh link and open it immediately.');const p=new URLSearchParams(hash.slice(1));const access_token=p.get('access_token'),refresh_token=p.get('refresh_token');const {error}=await sb.auth.setSession({access_token,refresh_token});if(error)throw error;history.replaceState(null,'',location.pathname+location.search);const u=await sb.auth.getUser();state.user=u.data.user}signOut.classList.remove('hide');if(!state.token)throw new Error('Missing onboarding token.');const out=await api('/api/staff-invite-verify',{token:state.token});state.invite=out.invite;state.staff=out.staff;renderPassword()}catch(e){render(`<div class="inline-flex px-3 py-1 rounded-full bg-white/10 text-sm">Something went wrong</div><h1 class="text-4xl font-extrabold mt-4">We couldn’t complete onboarding</h1><p class="muted mt-2">${esc(e.message||e)}</p><div class="mt-5 flex gap-2"><button onclick="start()" class="btn">Retry</button><a class="btn" href="mailto:support@smartcoretechnology.co.uk">Email support</a></div>`)}}
function renderPassword(){render(`<div class="inline-flex px-3 py-1 rounded-full bg-white/10 text-sm">Step 1 of 2</div><h1 class="text-4xl font-extrabold mt-4">Set your password</h1><p class="muted mt-2">Welcome to SmartCore, ${esc(state.staff.full_name)}.</p><div class="grid md:grid-cols-2 gap-3 mt-5"><input id="pw1" type="password" class="inp" placeholder="Password"><input id="pw2" type="password" class="inp" placeholder="Confirm password"></div><div id="err" class="text-red-300 mt-3 hidden"></div><button class="btn primary mt-5" onclick="savePassword()">Save password</button>`) }window.savePassword=async()=>{err.classList.add('hidden');if(pw1.value.length<8){err.textContent='Password must be at least 8 characters.';err.classList.remove('hidden');return}if(pw1.value!==pw2.value){err.textContent='Passwords do not match.';err.classList.remove('hidden');return}const {error}=await sb.auth.updateUser({password:pw1.value});if(error){err.textContent=error.message;err.classList.remove('hidden');return}renderDetails()};
function renderDetails(){const s=state.staff;render(`<div class="inline-flex px-3 py-1 rounded-full bg-white/10 text-sm">Step 2 of 2</div><h1 class="text-4xl font-extrabold mt-4">Your details</h1><p class="muted mt-2">Please complete your staff profile.</p><div class="grid md:grid-cols-2 gap-3 mt-5"><input id="title" class="inp" placeholder="Title" value="${esc(s.title||'')}"><input id="pronouns" class="inp" placeholder="Pronouns" value="${esc(s.pronouns||'')}"><select id="gender" class="inp"><option value="">Gender</option><option>Female</option><option>Male</option><option>Non-binary</option><option>Prefer not to say</option><option>Other</option></select><input id="dob" class="inp" type="date" value="${esc(s.dob||'')}"><input id="nationality" class="inp" placeholder="Nationality" value="${esc(s.nationality||'')}"><textarea id="address" class="inp" placeholder="Address">${esc(s.address||'')}</textarea></div><h3 class="text-xl font-bold mt-6">Emergency Contact 1 *</h3><div class="grid md:grid-cols-2 gap-3 mt-3"><input id="ec1Name" class="inp" placeholder="Name"><input id="ec1Rel" class="inp" placeholder="Relationship"><input id="ec1Email" class="inp" placeholder="Email optional"><input id="ec1Phone" class="inp" placeholder="Phone"></div><h3 class="text-xl font-bold mt-6">Emergency Contact 2</h3><div class="grid md:grid-cols-2 gap-3 mt-3"><input id="ec2Name" class="inp" placeholder="Name"><input id="ec2Rel" class="inp" placeholder="Relationship"><input id="ec2Email" class="inp" placeholder="Email optional"><input id="ec2Phone" class="inp" placeholder="Phone"></div><div id="err" class="text-red-300 mt-3 hidden"></div><button class="btn primary mt-5" onclick="submitDetails()">Save onboarding</button>`) }window.submitDetails=async()=>{err.classList.add('hidden');if(!gender.value||!dob.value||!nationality.value||!address.value||!ec1Name.value||!ec1Rel.value||!ec1Phone.value){err.textContent='Please complete all required fields.';err.classList.remove('hidden');return}try{await api('/api/staff-onboarding-complete',{token:state.token,user_id:state.user.id,title:title.value,pronouns:pronouns.value,gender:gender.value,dob:dob.value,nationality:nationality.value,address:address.value,emergency_contact_1:{name:ec1Name.value,relationship:ec1Rel.value,email:ec1Email.value,phone:ec1Phone.value},emergency_contact_2:{name:ec2Name.value,relationship:ec2Rel.value,email:ec2Email.value,phone:ec2Phone.value}});render(`<div class="inline-flex px-3 py-1 rounded-full bg-white/10 text-sm">Complete</div><h1 class="text-4xl font-extrabold mt-4">Onboarding complete</h1><p class="muted mt-2">Welcome to SmartCore. You can now sign in to HQ.</p><a class="btn primary inline-block mt-5" href="/hq">Go to HQ</a>`)}catch(e){err.textContent=e.message;err.classList.remove('hidden')}};signOut.onclick=async()=>{await sb.auth.signOut();location.href='/'};start();
</script></body></html>
