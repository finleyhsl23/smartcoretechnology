<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #181b26;
    --border: #1e2231;
    --border2: #252a3a;
    --text: #e2e6f0;
    --text2: #9aa3b8;
    --muted: #5a637a;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,.1);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,.1);
    --amber: #f59e0b;
    --red: #ef4444;
    --mono: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
    --sans: system-ui, -apple-system, sans-serif;
    --radius: 10px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#f0f2f7;--surface:#fff;--surface2:#f7f8fc;--border:#e1e5ef;
      --border2:#d0d6e8;--text:#111827;--text2:#4b5563;--muted:#9ca3af;
      --accent-dim:rgba(79,142,247,.08);--green-dim:rgba(34,197,94,.08);
    }
  }
  :root[data-theme="light"] {
    --bg:#f0f2f7;--surface:#fff;--surface2:#f7f8fc;--border:#e1e5ef;
    --border2:#d0d6e8;--text:#111827;--text2:#4b5563;--muted:#9ca3af;
    --accent-dim:rgba(79,142,247,.08);--green-dim:rgba(34,197,94,.08);
  }
  :root[data-theme="dark"] {
    --bg:#0c0e14;--surface:#13161f;--surface2:#181b26;--border:#1e2231;
    --border2:#252a3a;--text:#e2e6f0;--text2:#9aa3b8;--muted:#5a637a;
    --accent-dim:rgba(79,142,247,.1);--green-dim:rgba(34,197,94,.1);
  }

  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.6; min-height:100vh; }

  /* ── Progress bar ── */
  #progress-bar {
    position:fixed; top:0; left:0; right:0;
    background:var(--surface); border-bottom:1px solid var(--border);
    z-index:100; padding:12px 24px;
    display:flex; align-items:center; gap:16px;
  }
  .pb-label { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; }
  .pb-track { flex:1; height:4px; background:var(--border2); border-radius:99px; overflow:hidden; }
  .pb-fill  { height:100%; background:linear-gradient(90deg,var(--accent),var(--green)); border-radius:99px; transition:width .3s ease; width:0%; }
  .pb-count { font-family:var(--mono); font-size:12px; color:var(--accent); font-weight:600; white-space:nowrap; min-width:60px; text-align:right; }
  .pb-actions { display:flex; gap:8px; }
  .pb-btn {
    font-family:var(--mono); font-size:10px; letter-spacing:.04em; text-transform:uppercase;
    background:var(--surface2); border:1px solid var(--border2); color:var(--text2);
    border-radius:6px; padding:4px 10px; cursor:pointer; transition:border-color .15s, color .15s;
  }
  .pb-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* ── Sync indicator ── */
  #sync-badge {
    display:flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:10px; color:var(--muted);
    letter-spacing:.04em; white-space:nowrap;
  }
  #sync-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--muted); flex-shrink:0;
    transition:background .3s;
  }
  #sync-dot.live    { background:var(--green); }
  #sync-dot.syncing { background:var(--amber); animation:pulse .6s ease-in-out infinite alternate; }
  #sync-dot.error   { background:var(--red); }
  @keyframes pulse { to { opacity:.4; } }

  /* ── Name prompt overlay ── */
  #name-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:500;
    display:flex; align-items:center; justify-content:center; padding:20px;
    backdrop-filter:blur(4px);
  }
  #name-box {
    background:var(--surface); border:1px solid var(--border2);
    border-radius:16px; padding:28px 24px; max-width:360px; width:100%;
    box-shadow:0 16px 48px rgba(0,0,0,.4);
  }
  #name-box h2 { font-size:16px; font-weight:700; margin-bottom:6px; }
  #name-box p  { font-size:13px; color:var(--text2); margin-bottom:16px; }
  #name-input {
    width:100%; padding:9px 12px; background:var(--surface2);
    border:1px solid var(--border2); border-radius:8px;
    color:var(--text); font-size:14px; outline:none; margin-bottom:12px;
    transition:border-color .15s;
  }
  #name-input:focus { border-color:var(--accent); }
  #name-submit {
    width:100%; padding:10px; background:var(--accent); color:#fff;
    border:none; border-radius:8px; font-size:14px; font-weight:600;
    cursor:pointer; transition:opacity .15s;
  }
  #name-submit:hover { opacity:.9; }

  /* ── Who's here ── */
  #presence-bar {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:8px 24px; background:var(--surface2); border-bottom:1px solid var(--border);
    font-size:12px; color:var(--text2);
  }
  .presence-label { color:var(--muted); font-size:11px; font-family:var(--mono); letter-spacing:.04em; text-transform:uppercase; }
  .presence-chip {
    display:inline-flex; align-items:center; gap:5px;
    background:var(--accent-dim); color:var(--accent);
    border:1px solid rgba(79,142,247,.2); border-radius:99px;
    padding:2px 8px; font-size:11px; font-weight:600;
  }
  .presence-dot { width:6px; height:6px; border-radius:50%; background:var(--green); }

  /* ── Main ── */
  main { max-width:860px; margin:0 auto; padding:80px 24px 80px; }
  header { padding:32px 0 36px; border-bottom:1px solid var(--border); margin-bottom:32px; }
  .header-eyebrow { font-family:var(--mono); font-size:11px; color:var(--accent); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
  h1 { font-size:26px; font-weight:700; line-height:1.2; text-wrap:balance; margin-bottom:10px; }
  .header-sub { font-size:13px; color:var(--text2); max-width:500px; }

  /* ── Sections ── */
  .section { margin-bottom:12px; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; background:var(--surface); }
  .section-header { display:flex; align-items:center; gap:12px; padding:14px 18px; cursor:pointer; user-select:none; border-bottom:1px solid transparent; transition:background .12s; }
  .section-header:hover { background:var(--surface2); }
  .section.open .section-header { border-bottom-color:var(--border); }
  .section-icon { font-size:16px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; background:var(--accent-dim); border-radius:7px; flex-shrink:0; }
  .section-name { font-size:13px; font-weight:700; color:var(--text); flex:1; }
  .section-badge { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.04em; }
  .section-badge.done { color:var(--green); }
  .section-chevron { color:var(--muted); transition:transform .2s; font-size:12px; }
  .section.open .section-chevron { transform:rotate(180deg); }
  .section-body { display:none; }
  .section.open .section-body { display:block; }

  /* ── Test items ── */
  .test-item { display:flex; align-items:flex-start; gap:12px; padding:11px 18px; border-bottom:1px solid var(--border); transition:background .1s; cursor:pointer; position:relative; }
  .test-item:last-child { border-bottom:none; }
  .test-item:hover { background:var(--surface2); }
  .test-item.checked { background:var(--green-dim); }
  .test-item.remote-flash { animation:flash .5s ease; }
  @keyframes flash { 0%,100%{} 50%{background:rgba(79,142,247,.18);} }

  .test-cb { width:16px; height:16px; border:1.5px solid var(--border2); border-radius:4px; flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:border-color .12s, background .12s; }
  .test-item.checked .test-cb { background:var(--green); border-color:var(--green); }
  .test-cb svg { display:none; }
  .test-item.checked .test-cb svg { display:block; }

  .test-text { flex:1; font-size:13px; color:var(--text2); line-height:1.5; }
  .test-item.checked .test-text { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--muted); }

  .test-tag { font-family:var(--mono); font-size:9px; letter-spacing:.06em; text-transform:uppercase; padding:2px 6px; border-radius:4px; flex-shrink:0; margin-top:3px; }
  .tag-ent      { background:rgba(245,158,11,.12); color:var(--amber); }
  .tag-biz      { background:rgba(34,197,94,.1);   color:var(--green); }
  .tag-critical { background:rgba(239,68,68,.1);    color:var(--red);  }

  .item-who { position:absolute; right:10px; bottom:4px; font-size:10px; color:var(--muted); font-family:var(--mono); }

  @media (max-width:600px) {
    #progress-bar { padding:10px 14px; gap:10px; }
    .pb-label { display:none; }
    .pb-btn { padding:4px 8px; }
    #presence-bar { padding:8px 14px; }
    main { padding:100px 14px 60px; }
    .section-header { padding:12px 14px; }
    .test-item { padding:10px 14px; }
  }
</style>
</head>

      {text:"Leaderboard toggle enables / disables leaderboard"},
      {text:"Staff list shows all employees with roles"},
      {text:"Invite new staff member"},
      {text:"Change staff member role"},
      {text:"Pipeline stages editable from settings"},
      {text:"Portal user management visible and functional"},
    ]
  },
  {
    icon:"🛡️", name:"Tier Gating (Verify Locks)",
    items:[
      {text:"Lite tier: quotes page shows upgrade prompt"},
      {text:"Lite tier: reports page shows upgrade prompt"},
      {text:"Lite tier: leaderboard page shows upgrade prompt"},
      {text:"Lite/Pro tier: projects page shows upgrade prompt"},
      {text:"Lite/Pro tier: customer portal shows upgrade prompt"},
      {text:"Lite/Pro/Biz tier: AI chat button not visible in nav"},
      {text:"Direct API call to /api/crm/support-chat on non-enterprise returns 403",tag:"critical"},
      {text:"Lead score hidden on lite tier"},
      {text:"Department management accessible on ALL tiers"},
    ]
  },
  {
    icon:"📱", name:"UI & Responsiveness",
    items:[
      {text:"All pages usable on mobile (375px viewport)"},
      {text:"Messaging: company list fills screen on mobile"},
      {text:"Messaging: thread slides in on tap, back button works"},
      {text:"Calendar grid scrolls horizontally on mobile"},
      {text:"Modals appear as bottom sheets on mobile"},
      {text:"Pipeline kanban scrolls horizontally on mobile"},
      {text:"Tables scroll horizontally on small screens"},
      {text:"Tabs scroll horizontally when there are many"},
      {text:"Company detail grid collapses to 1 column on mobile"},
      {text:"Dark mode looks correct on all pages"},
      {text:"Light mode looks correct on all pages"},
      {text:"Toast notifications appear and auto-dismiss"},
      {text:"Confirm dialogs fire before destructive actions"},
      {text:"Loading spinners show during data fetches"},
      {text:"Error states shown clearly when requests fail"},
    ]
  },
];

// ── State ──────────────────────────────────────────────────────
const TICK_SVG = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const TAG_HTML = {
  'ent':     '<span class="test-tag tag-ent">Enterprise</span>',
  'biz+':    '<span class="test-tag tag-biz">Business+</span>',
  'pro+':    '<span class="test-tag tag-biz" style="background:rgba(79,142,247,.1);color:#4f8ef7">Pro+</span>',
  'critical':'<span class="test-tag tag-critical">Critical</span>',
  'removed': '<span class="test-tag" style="background:rgba(239,68,68,.08);color:#f87171">Removed</span>',
};

// remote state: Map<id, {checked, updated_by}>
let remoteState = new Map();
let myName = localStorage.getItem('qa_name') || '';
let channel;

// ── Name setup ─────────────────────────────────────────────────
function setupName() {
  const overlay  = document.getElementById('name-overlay');
  const input    = document.getElementById('name-input');
  const submit   = document.getElementById('name-submit');
  if (myName) { overlay.style.display = 'none'; init(); return; }
  input.focus();
  const go = () => {
    const v = input.value.trim();
    if (!v) { input.style.borderColor = 'var(--red)'; return; }
    myName = v;
    localStorage.setItem('qa_name', v);
    overlay.style.display = 'none';
    init();
  };
  submit.onclick = go;
  input.onkeydown = e => { if (e.key === 'Enter') go(); };
}

// ── Init ───────────────────────────────────────────────────────
async function init() {
  setSyncState('syncing');

  // Load all rows
  const { data, error } = await sb.from('qa_checklist_items').select('*');
  if (error) { setSyncState('error'); console.error(error); }
  else {
    (data || []).forEach(row => remoteState.set(row.id, { checked: row.checked, updated_by: row.updated_by }));
    setSyncState('live');
  }

  render();
  subscribeRealtime();
  setupPresence();
}

// ── Sync state indicator ───────────────────────────────────────
function setSyncState(state) {
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  dot.className = '';
  if (state === 'live')    { dot.classList.add('live');    text.textContent = 'live'; }
  if (state === 'syncing') { dot.classList.add('syncing'); text.textContent = 'syncing…'; }
  if (state === 'error')   { dot.classList.add('error');   text.textContent = 'offline'; }
}

// ── Realtime subscription ──────────────────────────────────────
function subscribeRealtime() {
  channel = sb.channel('qa_checklist')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'qa_checklist_items',
    }, payload => {
      const row = payload.new || payload.old;
      if (!row) return;
      remoteState.set(row.id, { checked: row.checked, updated_by: row.updated_by });
      applyRemoteChange(row.id, row.checked, row.updated_by);
      updateProgress();
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') setSyncState('live');
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') setSyncState('error');
    });
}

// ── Presence ───────────────────────────────────────────────────
function setupPresence() {
  const presenceChannel = sb.channel('qa_presence');
  const bar   = document.getElementById('presence-bar');
  const chips = document.getElementById('presence-chips');

  presenceChannel
    .on('presence', { event: 'sync' }, () => {
      const state = presenceChannel.presenceState();
      const users = Object.values(state).flat().map(p => p.name).filter(Boolean);
      const unique = [...new Set(users)];
      if (unique.length > 0) {
        bar.style.display = 'flex';
        chips.innerHTML = unique.map(u =>
          `<span class="presence-chip"><span class="presence-dot"></span>${u}</span>`
        ).join('');
      } else {
        bar.style.display = 'none';
      }
    })
    .subscribe(async status => {
      if (status === 'SUBSCRIBED') {
        await presenceChannel.track({ name: myName });
      }
    });
}

// ── Apply remote change to DOM ─────────────────────────────────
function applyRemoteChange(id, checked, updatedBy) {
  const el = document.querySelector(`.test-item[data-id="${id}"]`);
  if (!el) return;
  el.classList.toggle('checked', checked);
  // Update "who" label
  let who = el.querySelector('.item-who');
  if (checked && updatedBy) {
    if (!who) { who = document.createElement('span'); who.className = 'item-who'; el.appendChild(who); }
    who.textContent = updatedBy;
  } else if (who) {
    who.remove();
  }
  // Flash to draw attention
  el.classList.remove('remote-flash');
  void el.offsetWidth;
  el.classList.add('remote-flash');
  // Update section badge
  const section = el.closest('.section');
  if (section) updateSectionBadge(section);
}

// ── Toggle ─────────────────────────────────────────────────────
async function toggle(id, el) {
  const checked = !el.classList.contains('checked');
  // Optimistic update
  el.classList.toggle('checked', checked);
  let who = el.querySelector('.item-who');
  if (checked) {
    if (!who) { who = document.createElement('span'); who.className = 'item-who'; el.appendChild(who); }
    who.textContent = myName;
  } else if (who) { who.remove(); }
  updateSectionBadge(el.closest('.section'));
  updateProgress();

  // Upsert to Supabase
  setSyncState('syncing');
  const { error } = await sb.from('qa_checklist_items').upsert({
    id,
    checked,
    updated_by: checked ? myName : null,
    updated_at: new Date().toISOString(),
  }, { onConflict: 'id' });

  if (error) { console.error(error); setSyncState('error'); }
  else { setSyncState('live'); }
}

// ── Progress ───────────────────────────────────────────────────
function updateProgress() {
  let total = 0, done = 0;
  document.querySelectorAll('.test-item').forEach(el => {
    total++;
    if (el.classList.contains('checked')) done++;
  });
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('pbFill').style.width = pct + '%';
  document.getElementById('pbCount').textContent = `${done} / ${total}`;
}

function updateSectionBadge(section) {
  if (!section) return;
  const items = section.querySelectorAll('.test-item');
  const done  = section.querySelectorAll('.test-item.checked').length;
  const badge = section.querySelector('.section-badge');
  badge.textContent = `${done}/${items.length}`;
  badge.className = 'section-badge' + (done === items.length ? ' done' : '');
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('sections');
  el.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    const div = document.createElement('div');
    div.className = 'section' + (si === 0 ? ' open' : '');
    const itemsHtml = sec.items.map((item, ii) => {
      const id      = `${si}_${ii}`;
      const state   = remoteState.get(id);
      const checked = state?.checked || false;
      const who     = state?.updated_by || '';
      return `<div class="test-item ${checked ? 'checked' : ''}" data-id="${id}" onclick="toggle('${id}', this)">
        <div class="test-cb">${TICK_SVG}</div>
        <div class="test-text">${item.text}</div>
        ${item.tag ? (TAG_HTML[item.tag] || '') : ''}
        ${checked && who ? `<span class="item-who">${who}</span>` : ''}
      </div>`;
    }).join('');

    const total   = sec.items.length;
    const done    = sec.items.filter((_, ii) => remoteState.get(`${si}_${ii}`)?.checked).length;
    const allDone = done === total;

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(this.parentElement)">
        <div class="section-icon">${sec.icon}</div>
        <div class="section-name">${sec.name}</div>
        <div class="section-badge ${allDone ? 'done' : ''}">${done}/${total}</div>
        <div class="section-chevron">▾</div>
      </div>
      <div class="section-body">${itemsHtml}</div>`;
    el.appendChild(div);
  });
  updateProgress();
}

// ── Utils ──────────────────────────────────────────────────────
function toggleSection(sec) { sec.classList.toggle('open'); }
function expandAll()   { document.querySelectorAll('.section').forEach(s => s.classList.add('open')); }
function collapseAll() { document.querySelectorAll('.section').forEach(s => s.classList.remove('open')); }
async function resetAll() {
  if (!confirm('Reset ALL checks for everyone?')) return;
  setSyncState('syncing');
  const ids = [];
  SECTIONS.forEach((sec, si) => sec.items.forEach((_, ii) => ids.push(`${si}_${ii}`)));
  const { error } = await sb.from('qa_checklist_items')
    .upsert(ids.map(id => ({ id, checked: false, updated_by: null, updated_at: new Date().toISOString() })), { onConflict: 'id' });
  if (error) { setSyncState('error'); return; }
  remoteState.clear();
  render();
  setSyncState('live');
}
function toggleTheme() {
  const r = document.documentElement;
  r.dataset.theme = r.dataset.theme === 'dark' ? 'light' : 'dark';
}

setupName();
</script>
