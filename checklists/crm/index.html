<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #181b26;
    --border: #1e2231;
    --border2: #252a3a;
    --text: #e2e6f0;
    --text2: #9aa3b8;
    --muted: #5a637a;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,.1);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,.1);
    --amber: #f59e0b;
    --red: #ef4444;
    --mono: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
    --sans: system-ui, -apple-system, sans-serif;
    --radius: 10px;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --surface2: #f7f8fc;
      --border: #e1e5ef;
      --border2: #d0d6e8;
      --text: #111827;
      --text2: #4b5563;
      --muted: #9ca3af;
      --accent-dim: rgba(79,142,247,.08);
      --green-dim: rgba(34,197,94,.08);
    }
  }
  :root[data-theme="light"] {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #f7f8fc;
    --border: #e1e5ef;
    --border2: #d0d6e8;
    --text: #111827;
    --text2: #4b5563;
    --muted: #9ca3af;
    --accent-dim: rgba(79,142,247,.08);
    --green-dim: rgba(34,197,94,.08);
  }
  :root[data-theme="dark"] {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #181b26;
    --border: #1e2231;
    --border2: #252a3a;
    --text: #e2e6f0;
    --text2: #9aa3b8;
    --muted: #5a637a;
    --accent-dim: rgba(79,142,247,.1);
    --green-dim: rgba(34,197,94,.1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Progress bar */
  #progress-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .pb-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .pb-track {
    flex: 1;
    height: 4px;
    background: var(--border2);
    border-radius: 99px;
    overflow: hidden;
  }
  .pb-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    transition: width .3s ease;
    width: 0%;
  }
  .pb-count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }
  .pb-actions {
    display: flex;
    gap: 8px;
  }
  .pb-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .04em;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .pb-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Main content */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 80px 24px 80px;
  }

  header {
    padding: 32px 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    text-wrap: balance;
    margin-bottom: 10px;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text2);
    max-width: 500px;
  }

  /* Section */
  .section {
    margin-bottom: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background .12s;
  }
  .section-header:hover { background: var(--surface2); }
  .section.open .section-header { border-bottom-color: var(--border); }
  .section-icon {
    font-size: 16px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-dim);
    border-radius: 7px;
    flex-shrink: 0;
  }
  .section-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }
  .section-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .04em;
  }
  .section-badge.done { color: var(--green); }
  .section-chevron {
    color: var(--muted);
    transition: transform .2s;
    font-size: 12px;
  }
  .section.open .section-chevron { transform: rotate(180deg); }

  .section-body {
    display: none;
  }
  .section.open .section-body { display: block; }

  /* Test items */
  .test-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    cursor: pointer;
  }
  .test-item:last-child { border-bottom: none; }
  .test-item:hover { background: var(--surface2); }
  .test-item.checked { background: var(--green-dim); }

  .test-cb {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border2);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .12s, background .12s;
  }
  .test-item.checked .test-cb {
    background: var(--green);
    border-color: var(--green);
  }
  .test-cb svg { display: none; }
  .test-item.checked .test-cb svg { display: block; }

  .test-text {
    flex: 1;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }
  .test-item.checked .test-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--muted);
  }
  .test-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .tag-ent      { background: rgba(245,158,11,.12); color: var(--amber); }
  .tag-biz      { background: rgba(34,197,94,.1);   color: var(--green); }
  .tag-critical { background: rgba(239,68,68,.1);    color: var(--red);  }

  /* Subsection label */
  .sub-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 18px 6px;
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    #progress-bar { padding: 10px 14px; gap: 10px; }
    .pb-label { display: none; }
    .pb-btn { padding: 4px 8px; }
    main { padding: 72px 14px 60px; }
    .section-header { padding: 12px 14px; }
    .test-item { padding: 10px 14px; }
  }
</style>
</head>

      { text: "Pipeline kanban scrolls horizontally on mobile" },
      { text: "Tables scroll horizontally on small screens" },
      { text: "Tabs scroll horizontally when there are many" },
      { text: "Company detail grid collapses to 1 column on mobile" },
      { text: "Dark mode looks correct on all pages" },
      { text: "Light mode looks correct on all pages" },
      { text: "Toast notifications appear and auto-dismiss" },
      { text: "Confirm dialogs fire before destructive actions" },
      { text: "Loading spinners show during data fetches" },
      { text: "Error states shown clearly when requests fail" },
    ]
  },
];

const TICK_SVG = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const TAG_HTML = {
  'ent':      '<span class="test-tag tag-ent">Enterprise</span>',
  'biz+':     '<span class="test-tag tag-biz">Business+</span>',
  'pro+':     '<span class="test-tag tag-biz" style="background:rgba(79,142,247,.1);color:#4f8ef7">Pro+</span>',
  'critical': '<span class="test-tag tag-critical">Critical</span>',
  'removed':  '<span class="test-tag" style="background:rgba(239,68,68,.08);color:#f87171">Removed</span>',
};

function itemKey(si, ii) { return `qa_${si}_${ii}`; }
function loadState(si, ii) { return localStorage.getItem(itemKey(si, ii)) === '1'; }
function saveState(si, ii, val) { localStorage.setItem(itemKey(si, ii), val ? '1' : '0'); }

function updateProgress() {
  let total = 0, done = 0;
  SECTIONS.forEach((s, si) => s.items.forEach((_, ii) => { total++; if (loadState(si, ii)) done++; }));
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('pbFill').style.width = pct + '%';
  document.getElementById('pbCount').textContent = `${done} / ${total}`;
}

function render() {
  const el = document.getElementById('sections');
  el.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    const total = sec.items.length;
    const done  = sec.items.filter((_, ii) => loadState(si, ii)).length;
    const allDone = done === total;
    const div = document.createElement('div');
    div.className = 'section' + (si === 0 ? ' open' : '');
    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(this.parentElement)">
        <div class="section-icon">${sec.icon}</div>
        <div class="section-name">${sec.name}</div>
        <div class="section-badge ${allDone ? 'done' : ''}">${done}/${total}</div>
        <div class="section-chevron">▾</div>
      </div>
      <div class="section-body">
        ${sec.items.map((item, ii) => {
          const checked = loadState(si, ii);
          return `<div class="test-item ${checked ? 'checked' : ''}" onclick="toggle(${si},${ii},this)">
            <div class="test-cb">${TICK_SVG}</div>
            <div class="test-text">${item.text}</div>
            ${item.tag ? (TAG_HTML[item.tag] || '') : ''}
          </div>`;
        }).join('')}
      </div>`;
    el.appendChild(div);
  });
  updateProgress();
}

function toggle(si, ii, el) {
  const checked = !el.classList.contains('checked');
  saveState(si, ii, checked);
  el.classList.toggle('checked', checked);
  const section = el.closest('.section');
  const total = SECTIONS[si].items.length;
  const done  = SECTIONS[si].items.filter((_, i) => loadState(si, i)).length;
  const badge = section.querySelector('.section-badge');
  badge.textContent = `${done}/${total}`;
  badge.className = 'section-badge' + (done === total ? ' done' : '');
  updateProgress();
}

function toggleSection(sec) { sec.classList.toggle('open'); }
function expandAll()   { document.querySelectorAll('.section').forEach(s => s.classList.add('open')); }
function collapseAll() { document.querySelectorAll('.section').forEach(s => s.classList.remove('open')); }
function resetAll() {
  if (!confirm('Reset all checks?')) return;
  Object.keys(localStorage).filter(k => k.startsWith('qa_')).forEach(k => localStorage.removeItem(k));
  render();
}
function toggleTheme() {
  const r = document.documentElement;
  r.dataset.theme = r.dataset.theme === 'dark' ? 'light' : 'dark';
}

render();
</script>
