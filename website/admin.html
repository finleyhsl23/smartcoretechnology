<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | The Travelling Taverna</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-body">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="assets/logo.png" alt="The Travelling Taverna logo" />
        <span>Admin</span>
      </a>
      <nav class="site-nav open">
        <a href="index.html">View website</a>
      </nav>
    </div>
  </header>

  <main class="admin-main container">
    <section class="admin-login" id="loginPanel">
      <div class="login-card">
        <p class="eyebrow">Private admin</p>
        <h1>Admin login</h1>
        <p>Demo login for now. Replace this with Supabase Auth before the site goes live.</p>
        <label>Email
          <input id="adminEmail" type="email" value="admin@travellingtaverna.co.uk" />
        </label>
        <label>Password
          <input id="adminPassword" type="password" value="admin123" />
        </label>
        <button class="btn primary full" id="loginBtn">Log in</button>
        <p class="form-note" id="loginNote"></p>
      </div>
    </section>

    <section class="admin-dashboard hidden" id="adminDashboard">
      <div class="admin-title">
        <div>
          <p class="eyebrow">Dashboard</p>
          <h1>Manage website</h1>
        </div>
        <button class="btn secondary" id="logoutBtn">Log out</button>
      </div>

      <div class="admin-tabs">
        <button class="tab active" data-tab="productsTab">Products</button>
        <button class="tab" data-tab="ordersTab">Orders</button>
        <button class="tab" data-tab="settingsTab">Settings</button>
      </div>

      <section class="tab-panel" id="productsTab">
        <div class="admin-grid">
          <form class="admin-form" id="productForm">
            <h2 id="productFormTitle">Add product</h2>
            <input type="hidden" id="productId" />
            <label>Product name
              <input id="productName" required />
            </label>
            <label>Category
              <input id="productCategory" placeholder="Meals, Boxes, Desserts..." required />
            </label>
            <label>Price
              <input id="productPrice" type="number" step="0.01" required />
            </label>
            <label>Stock
              <input id="productStock" type="number" step="1" required />
            </label>
            <label>Image URL
              <input id="productImage" placeholder="Paste image URL or use placeholder" />
            </label>
            <label>Description
              <textarea id="productDescription" rows="4" required></textarea>
            </label>
            <button class="btn primary full" type="submit">Save product</button>
            <button class="btn secondary full" type="button" id="clearProductForm">Clear form</button>
          </form>

          <div class="admin-list">
            <h2>Products</h2>
            <div id="adminProductList"></div>
          </div>
        </div>
      </section>

      <section class="tab-panel hidden" id="ordersTab">
        <div class="admin-list wide">
          <div class="admin-list-head">
            <h2>Orders</h2>
            <button class="btn secondary" id="clearOrdersBtn">Clear test orders</button>
          </div>
          <div id="adminOrderList"></div>
        </div>
      </section>

      <section class="tab-panel hidden" id="settingsTab">
        <form class="admin-form settings-form" id="settingsForm">
          <h2>Website settings</h2>
          <label>Minimum order amount (£)
            <input id="settingMinimumOrder" type="number" step="0.01" />
          </label>
          <label>Delivery email address
            <input id="settingEmail" type="email" />
          </label>
          <label>Delivery radius message
            <input id="settingRadiusMessage" />
          </label>
          <label>Open days
            <input id="settingOpenDays" />
          </label>
          <label>Open times
            <input id="settingOpenTimes" />
          </label>
          <button class="btn primary full" type="submit">Save settings</button>
          <p class="form-note" id="settingsNote"></p>
        </form>
      </section>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
