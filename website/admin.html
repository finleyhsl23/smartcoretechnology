<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><link rel="icon" href="favicon.png" /><link rel="stylesheet" href="styles.css" /><title>Admin | The Travelling Taverna Greek Deli</title></head><body class="admin-body"><header class="site-header"><div class="container header-inner"><a href="index.html" class="brand"><img src="assets/logo.png" alt="The Travelling Taverna logo" /><span>Greek Deli Admin</span></a><nav class="site-nav open"><a href="index.html">View website</a></nav></div></header><main class="admin-main container"><section class="admin-login" id="loginPanel"><div class="login-card"><p class="eyebrow">Private admin</p><h1>Admin login</h1><p>Log in to manage products, orders, enquiries and website settings.</p><label>Email<input id="adminEmail" type="email" autocomplete="email" /></label><label>Password<input id="adminPassword" type="password" autocomplete="current-password" /></label><button class="btn primary full" id="loginBtn">Log in</button><p class="form-note" id="loginNote"></p></div></section><section class="admin-dashboard hidden" id="adminDashboard"><div class="admin-title"><div><p class="eyebrow">Dashboard</p><h1>Manage website</h1></div><button class="btn secondary" id="logoutBtn">Log out</button></div><div class="admin-tabs"><button class="tab active" data-tab="productsTab">Products</button><button class="tab" data-tab="ordersTab">Orders</button><button class="tab" data-tab="enquiriesTab">Enquiries</button><button class="tab" data-tab="settingsTab">Settings</button></div><section class="tab-panel" id="productsTab"><div class="admin-grid"><form class="admin-form" id="addProductForm"><h2>Add product</h2><label>Product name<input id="addProductName" required /></label><label>Category<input id="addProductCategory" required /></label><label>Price<input id="addProductPrice" type="number" step="0.01" required /></label><label>Stock<input id="addProductStock" type="number" step="1" required /></label><label>Product image<input id="addProductImageFile" type="file" accept="image/*" /></label><label>Description<textarea id="addProductDescription" rows="4" required></textarea></label><button class="btn primary full" type="submit">Add product</button><p class="form-note" id="addProductNote"></p></form><div class="admin-list"><div class="admin-list-head"><h2>Products</h2><button class="btn secondary small" id="refreshProductsBtn">Refresh</button></div><div id="adminProductList"></div></div></div></section><section class="tab-panel hidden" id="ordersTab"><div class="admin-list wide"><h2>Orders</h2><div id="adminOrderList"></div></div></section><section class="tab-panel hidden" id="enquiriesTab"><div class="admin-list wide"><div class="admin-list-head"><h2>Enquiries</h2><button class="btn secondary small" id="refreshEnquiriesBtn">Refresh</button></div><div id="adminEnquiryList"></div></div></section><section class="tab-panel hidden" id="settingsTab"><form class="admin-form settings-form" id="settingsForm"><h2>Website settings</h2><label>Business name<input id="settingBusinessName" /></label><label>Minimum order amount (£)<input id="settingMinimumOrder" type="number" step="0.01" /></label><label>Management email address<input id="settingEmail" type="email" /></label><label>Delivery radius message<input id="settingRadiusMessage" /></label><label>Open days<input id="settingOpenDays" /></label><label>Open times<input id="settingOpenTimes" /></label><label>Allowed postcode prefixes, separated by commas<input id="settingPostcodes" /></label><label>Derby delivery charge<input id="settingChargeDE" type="number" step="0.01" /></label><label>Leicester delivery charge<input id="settingChargeLE" type="number" step="0.01" /></label><label>Nottingham delivery charge<input id="settingChargeNG" type="number" step="0.01" /></label><label>Birmingham delivery charge<input id="settingChargeB" type="number" step="0.01" /></label><button class="btn primary full" type="submit">Save settings</button><p class="form-note" id="settingsNote"></p></form></section></section></main><div class="modal" id="editProductModal"><div class="modal-card wide-modal"><button class="modal-close" id="closeEditProductModal">×</button><h2>Edit product</h2><form class="admin-form modal-form" id="editProductForm"><input type="hidden" id="editProductId" /><label>Product name<input id="editProductName" required /></label><label>Category<input id="editProductCategory" required /></label><label>Price<input id="editProductPrice" type="number" step="0.01" required /></label><label>Stock<input id="editProductStock" type="number" step="1" required /></label><label>Current image URL<input id="editProductImageUrl" /></label><label>Upload replacement image<input id="editProductImageFile" type="file" accept="image/*" /></label><label>Description<textarea id="editProductDescription" rows="4" required></textarea></label><label class="checkbox-row"><input id="editProductActive" type="checkbox" /> Active on website</label><button class="btn primary full" type="submit">Save changes</button><p class="form-note" id="editProductNote"></p></form></div></div><script type="module" src="admin.js"></script></body></html>
