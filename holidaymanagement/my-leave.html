<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Leave</title>
  <link rel="icon" href="/images/smartfitsfavicon" />
  <link rel="stylesheet" href="/holidaymanagement/assets/css/holidaymanagement.css?v=4" />
</head>
<body class="app-page">
  <div id="appLoader" class="page-loader">Loading leave history...</div>

  <div class="app-layout hidden" id="appLayout">
    <aside class="sidebar glass-card">
      <div class="brand-wrap">
        <img src="/images/smartfitslogo.png" alt="Smartfits" class="sidebar-logo" />
        <div>
          <h2>Holiday Management</h2>
          <p class="muted small">Built By SmartCore Technology</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="./home.html" class="nav-link">Dashboard</a>
        <a href="./calendar.html" class="nav-link">Calendar</a>
        <a href="./request.html" class="nav-link">Request Leave</a>
        <a href="./my-leave.html" class="nav-link active">My Leave</a>
        <a href="./employee-management.html" class="nav-link admin-only-link">Employee Management</a>
        <a href="./company-holidays.html" class="nav-link admin-only-link">Company Holidays</a>
        <a href="./admin.html" class="nav-link admin-only-link" id="adminNavLink">Admin</a>
      </nav>

      <button class="btn btn-secondary btn-block" id="logoutBtn">Sign Out</button>
    </aside>

    <main class="main-content">
      <header class="topbar glass-card">
        <div>
          <h1>My Leave</h1>
          <p class="muted" id="myLeaveWelcome">Welcome back. Here are your leave statistics.</p>
        </div>
      </header>

      <section class="stats-grid">
        <div class="glass-card stat-card">
          <span class="stat-label">Annual Allowance</span>
          <strong class="stat-value" id="annualAllowance">--</strong>
        </div>
        <div class="glass-card stat-card">
          <span class="stat-label">Used Days</span>
          <strong class="stat-value" id="annualUsed">--</strong>
        </div>
        <div class="glass-card stat-card">
          <span class="stat-label">Remaining</span>
          <strong class="stat-value" id="annualRemaining">--</strong>
        </div>
      </section>

      <section class="content-grid single-column">
        <div class="glass-card panel">
          <div class="panel-header panel-stack-mobile">
            <h2>Leave History</h2>
            <div class="filters-inline">
              <div class="custom-select-wrap">
                <select id="statusFilter">
                  <option value="all">All Statuses</option>
                  <option value="pending">Pending</option>
                  <option value="approved">Approved</option>
                  <option value="rejected">Rejected</option>
                </select>
              </div>

              <div class="custom-select-wrap">
                <select id="typeFilter">
                  <option value="all">All Types</option>
                  <option value="annual">Annual Request</option>
                  <option value="sick">Sick Leave</option>
                  <option value="other">Other Leave</option>
                </select>
              </div>
            </div>
          </div>

          <div id="myLeaveList" class="card-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/holidaymanagement/assets/js/my-leave.js?v=4"></script>
</body>
</html>
