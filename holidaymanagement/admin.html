<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Admin Panel</title>
  <link rel="icon" href="/images/smartfitsfavicon" />
  <link rel="stylesheet" href="./assets/css/holidaymanagement.css" />
</head>
<body class="app-page">
  <div id="appLoader" class="page-loader">Loading admin panel...</div>

  <div class="app-layout hidden" id="appLayout">
    <aside class="sidebar glass-card">
      <div class="brand-wrap">
        <img src="/images/smartfitslogo" alt="Smartfits" class="sidebar-logo" />
        <div>
          <h2>Holiday Management</h2>
          <p class="muted small">SmartCore / Smartfits</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="./home.html" class="nav-link">Dashboard</a>
        <a href="./calendar.html" class="nav-link">Calendar</a>
        <a href="./request.html" class="nav-link">Request Leave</a>
        <a href="./my-leave.html" class="nav-link">My Leave</a>
        <a href="./admin.html" class="nav-link active">Admin</a>
      </nav>

      <button class="btn btn-secondary btn-block" id="logoutBtn">Sign Out</button>
    </aside>

    <main class="main-content">
      <header class="topbar glass-card">
        <div>
          <h1>Admin Panel</h1>
          <p class="muted">Review, approve, reject, and monitor leave across the company.</p>
        </div>
      </header>

      <section class="stats-grid">
        <div class="glass-card stat-card">
          <span class="stat-label">Pending Requests</span>
          <strong class="stat-value" id="adminPendingCount">--</strong>
        </div>
        <div class="glass-card stat-card">
          <span class="stat-label">Approved Today</span>
          <strong class="stat-value" id="adminApprovedToday">--</strong>
        </div>
        <div class="glass-card stat-card">
          <span class="stat-label">People Off Today</span>
          <strong class="stat-value" id="adminOffToday">--</strong>
        </div>
        <div class="glass-card stat-card">
          <span class="stat-label">Sick Logged Today</span>
          <strong class="stat-value" id="adminSickToday">--</strong>
        </div>
      </section>

      <section class="content-grid single-column">
        <div class="glass-card panel">
          <div class="panel-header panel-stack-mobile">
            <h2>All Leave Requests</h2>
            <div class="filters-inline">
              <select id="adminStatusFilter">
                <option value="all">All Statuses</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
              </select>

              <select id="adminTypeFilter">
                <option value="all">All Types</option>
                <option value="annual">Annual Leave</option>
                <option value="sick">Sick Leave</option>
                <option value="other">Other Leave</option>
              </select>
            </div>
          </div>

          <div id="adminLeaveList" class="card-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./assets/js/admin.js"></script>
</body>
</html>
