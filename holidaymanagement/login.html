<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smartfits Leave Login</title>
  <link rel="icon" href="/images/smartfitsfavicon" />
  <link rel="stylesheet" href="./assets/css/holidaymanagement.css" />
</head>
<body class="auth-page">
  <div class="page-shell auth-shell">
    <div class="auth-card glass-card">
      <img src="/images/smartfitslogo" alt="Smartfits Installations Ltd" class="auth-logo" />
      <h1>Leave Management</h1>
      <p class="muted">Sign in to manage annual leave and sick leave.</p>

      <form id="loginForm" class="form-stack">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <div id="loginMessage" class="form-message"></div>
    </div>
  </div>

  <script type="module" src="./assets/js/login.js"></script>
</body>
</html>
